第三部



私とエヴァンゲリオン（竹熊健太郎）





竹熊　いきなりでなんですが、庵野さん、やたらとファンの批評に対して攻撃的ですよね。

庵野　ファンの批評ですか？　まあ批評以前というか、ただの悪口というのが大半なんですけど。作品のことも書いてる本人自身のこともわからずに書いてるみたいですね。表層的な方法論の部分でしか語れないわけですよ。それはいいんですけど、自覚が伴っていない。世間と自分が客観できてないんですね。そういう人ほど積極的に外界との接触を望んでいる。自分が絶対に傷つかない範囲でですが。だから声を大にして意見を言う。

竹熊　うう。今回は最初から飛ばしてますね、庵野さん（笑）。

庵野　『エヴァ』は注目されてますからね。効率がいいんですよ。悪口言いやすいし。もちろん中にはありがたいとか励ましになるとか嬉しくなるとか、素直に感謝したり喜んだり、意義というか、やってよかった、と感じるものも多々あります。ただ、物を作っている人の言葉の中にはやはりシンパシーを感じるものが多いですね。

竹熊　作品の作り手の方が、まだ理解してくれる度合いが高いと？

庵野　そうですね。血を流して物づくりに没頭しているような人の方が、（『エヴァ』との）シンクロ率は高いと思いますね。日々、のんべんだらりと過ごしている人は、もう全然……。いわゆるオタクって自分の世界を大事にするんですよ。それが自分の世界だから。そういう人に世間を見ろと言っても、難しいんですよね。世間に染まったらそれはオタクではなくなってしまうし。だから自分の世界に固着してしまう。インテリと同じで自分の知っている世界、自分の理解可能な範囲でまとめてしまうんですね。他を知る必要もないし、認めることもない。関係ないんですよ。

　だから例えば（『エヴァ』の）１二五話～二六話をですね。確か『２トーキングヘッド』だったかな、３押井（守）さんの作品のマネだと括くくったりしてしまうんですね。自分の知っている世界で一番近いものが押井さんのそれしかなかったりするわけなんです。あくまで表層的方法論にしか過ぎない部分で。そうとしか認知できないんですね。もう、そうせざるを得ない。僕はそれ、見てないのに（笑）。

　ただ、（そういう当てはめをするのは）僕もそうなんで（笑）。（他人の）アニメ見てたりすると、反射的に「あ、あれだ」と思ったりしますね。

竹熊　そういうことを言わないで、それは庵野さん、黙ってればいいじゃないですか。作品に対して何を言おうがファンの勝手でしょう。

庵野　確かに黙ってりゃいいんですけど。相手にし過ぎというか、サービス過剰だとも言われるんですが。要はバカなんですよ、自分が。（ファンの言動を見ていると）どうも自分を見てるみたいな感じもあって、言ってしまうんですね。

　しかしまあ、最近は「人を見て法を説け」という言葉が身にしみてます。何を言っても悪意としか解釈できない人もいるみたいだし。ただ嫌われてるだけだとも思うんですが（笑）。

　まあ悪意も善意も自分との関係という点から見れば等位ですから。悪口言われてるだけマシって部分もあります。ただ、そういう意味でも黙っているよりは言った方がいいか、という気持ちもありますね。言われたことで初めて手にする情報ってのもあるわけじゃないですか。どう受け取られるかはその人によりけりですけど。ただ、そう言うことで自分を客観視するチャンスにはなると思うんですよ。自分を相対的に知って損はないと思うし。周辺の現実を認めて現実原則の中でオタクとしての自分の在り方を考えるのもいいと思います。それは余裕につながりますからね。……こういうこと言うと偉そうに聞こえるんですけど。まあ、さすがにもう言ってもせんない気もするし。

　ああ、でも、４野火ノビタさんの批評はグーでしたね。読んで、ぜひこちらからお会いしたいと思いました。いちおう、コネで電話番号を間接的に聞いたんですけど。

竹熊　まだ会ってないんですか。

庵野　この間、お会いしたんですよ。友達に、コミケで野火さんが出した５エヴァの同人誌を買ってきてもらったんです。読んで、ぜひお会いしたいので連絡したら、ずっと旅行中で会えなくて。結局６『別冊ＪＵＮＥ』の対談が最初になっちゃいました。

竹熊　（野火氏の論文を読んで）ああ、庵野さんのこと「分裂病」って書いてる（笑）。なるほど。実はこないだ大泉さんともそういう話はちょっと出たんです。やっぱり庵野さんは分裂気質だろうと。大泉さんには、そういう友達が多いんですよ。

編集部（赤田）　呼ぶよね。あの人は。

竹熊　呼ぶ。ただ僕は最近知ったんだけど、大泉さん自身にも、けっこうエキセントリックなところがあるんですよ。

庵野　分裂病がわかるのは、分裂病の人だけですから（笑）。

竹熊　大泉さんの守護神はガメラなんだそうです。それで『ガメラ２』を見て三回泣いたという（笑）。

庵野　いい年してそれはヤバイですね（笑）。

竹熊　それで今度、破防法がオウムに適用されるかもしれないじゃないですか。そしたら捕まるんですよ、大泉さん（笑）。ああいう文筆活動（オウムへの〝入会〟ルポ）やってるとね。それでもう妻子と水杯かわしてるんですよ。

庵野　よく妻子ができましたね。

竹熊　それで妻が元アニメ同好会という（笑）。

（ここで大泉氏登場）

大泉　どうも、遅くなりまして。何、話してたんですか？

竹熊　いや、別に（笑）。じゃ、始めましょうか。





故郷では優等生





大泉　今回は、庵野さんの個人史をお聞きしたいと思うんです。とりあえず、子供時代の話あたりから。どんな子供だったかとか。

庵野　どんな子供なんでしょうね。

竹熊　ご出身は山口県ですね。

庵野　ええ。山口県宇部市です。もう、ド田舎です。保守的なところです。僕は、学級委員をずっとやってましたね。まあ、まじめタイプに見えたんでしょうね。根が臆病者ですから。

大泉　毎回、立候補したんですか？

庵野　ああいうのは立候補はないんですよ。早い話、やらされてるという。ウチの親も喜んでたし。田舎の発想ですよね。ただ、嫌じゃなかった。

竹熊　いじめとか、いじめられたとかいうことはありました？

庵野　うーん、あんまりないです。中一の時に、体育会の先輩にちょっと、ああ、これがいじめなんだろうなというのはありましたけれど。でも、その人だけなんです。それ以外には、そういう経験はないです。ケンカもほとんどない。殴り合いのケンカって、数回ぐらいしか。まあ昔からこういう顔だったんで、「外人、外人」って呼ばれたりとか。その程度なんです。本当にいじめられてるクラスメイトは別にいましたからね。

　中学の時までは、どっちかと言うと、優等生の方です。中学になると実力テストで順番が出るじゃないですか。あれが学年の二〇番ぐらい。ちょっと調子がいい時は、一〇番台ぐらいで。

大泉　最大出力で一ケタになるという感じですね（笑）。

庵野　一度、勉強しなかったんですよ。勉強しなかった時、八六番まで落ちてまして。それで先生に「なんで勉強しないんだ」って言われて、「面白くないんですけど」って答えたことがある（笑）。





家族のこと





大泉　実家は海とか近いんですか。

庵野　遠くはないです。でも海水浴なんか、行かないですね。

大泉　そうなんですか。いや『エヴァ』を見ると、夏と海のイメージが強いので。

庵野　なんでですかね。家族とはめったに海へ行かないんです。母親の皮膚が弱かったのと、親父に足がないんで。人前で裸になるからつらかったんでしょうね。何度か潮干狩りに行った記憶しかないっス。

竹熊　家の教育方針はどうだったんですか。過保護か、放任かみたいな。

庵野　中途半端ですね。あんまりどっちとも言えない。

大泉　ご兄弟とかは。

庵野　妹が一人。でも年が七つも離れてるんで、あんまりピンと来ないです。全然、他人みたいなもんです。実家で会う以外、お互いに連絡とらないですから。まあ希薄な兄妹関係ですね。電話番号も知らないですから。家族のことは、あまり考えたことないです。貧乏でしたし、何もできなかったですよ。

竹熊　貧乏だったんですか？

庵野　身障者の父親が、そんなに稼げるほど世間は甘くないですね。日本という国は、足が一本ない人間に対して、そんなにいいことはしてくれない。まあ、どっちかと言うと貧乏の方だと思う。親はほとんど朝から晩まで働いてましたから。親に遊んでもらった記憶って、ほとんどない。祭りの日とか、年に数回ですよね。正月とか盆とか。

竹熊　じゃあ子供時代は、一人遊びをやっていた感じですか。

庵野　友達もそれなりにはいましたけど。そんなに友達に苦労するとか、そういうのはなかった。まあ、どうなんでしょう。そんなに嫌われてた感じはなかったです。





最初に見た映像





竹熊　最初に映画館で見た映画ってなんですか？

庵野　一番古い映画っていうのは、親に連れられて行ったんですけれど、ワンカットしか覚えてないんですよ。どういう映画だったかも忘れてしまって。タンクローリーが横転して爆発する映像だけ強烈に覚えている。

竹熊　タンクローリーが爆発。それは何歳ぐらいですか。

庵野　幾つぐらいなんでしょうね。四つか。夜のシーンなんですよ。そのカットだけ覚えてる。まあ、要するに爆発なんですよね、最初に映像として覚えてるのは。

大泉　これはすごい原体験だなあ。

庵野　テレビで覚えてるのは『鉄人28号』。ＬＤボックスが出た時に、秋葉原で買ったんですが、けっこう鮮明に覚えてました。細かいカットや台詞まで覚えてたんですね。けっこう外れていなかったのが、すごい。

竹熊　記憶力が。

庵野　でも、覚えてるわりには鉄人への思い入れって、あまりないんですよ。『鉄腕アトム』もないですね。『エイトマン』の方が、僕は濃いですね。あと『スーパージェッター』ですかね。『ウルトラＱ』は、怖かったんで、外が明るい時間にやった再放送まで見なかったっていうのがあるんですけどね。いや、本当に怖いのはダメです。『怪奇大作戦』は二話の「人食い蛾」で見るのやめたんですよ。あれ以来、蛾が怖くてダメなんです。





怪獣とヒーロー





大泉　怪獣はどうです？　僕らの世代だと、ウルトラマンごっこやったり。あと『ゴジラ』や『ガメラ』はテレビでも時々放映するじゃないですか。それでゴジラ派、ガメラ派が必ずできて。

庵野　『ガメラ』も見てたし、〝７東宝チャンピオンまつり〟も行ったんですけど、そんなに僕、『ゴジラ』の影響ってないんですよ。むしろテレビの巨大ヒーローの方ですね。

竹熊　『仮面ライダー』は？

庵野　『仮面ライダー』は最初の八話までです。全話ＬＤ買っていても、見るのは最初の二枚だけとか。残りのやつは、封も開けてない（笑）。

竹熊　やっぱり、いま見るとちょっと。

庵野　かなりひどいですよね（笑）。ただ『ライダー』の一話と二話って、けっこう見直せるんですよ。何かあったら必ず見直すんです。

　なんか、マンガもアニメも〝それなり〟なんですよ。大半はやっぱ見ててつまんなかったし。どっちかと言うと、熱中したのは『ウルトラマン』とか、そっちの方ですね。あと「８ＩＴＣ」物とか。

大泉　ウルトラシリーズはどのあたりまで見てたんですか。

庵野　えーと、『ウルトラマンエース』から抜けはじめて、『９ウルトラマンタロウ』が途中まで。あれは大人になって初めてあの良さが（笑）。

竹熊　『タロウ』、ださかったよね（笑）。

庵野　『ウルトラマンレオ』も大人になってからですね。『タロウ』と『レオ』の良さは、やっぱり年をとらないと。大人にならないと。

竹熊　『タロウ』のどこがいいんですか（笑）？

庵野　世界観がいいです。要するにあれは、小さい子供の夢の世界なんです。それまでシリアス一辺倒だったウルトラシリーズの世界観を、あそこで子供向けのファンタジーな世界に戻そうとしたと思うんですよ。「なんでもあり」の世界ですよね。特撮もナイスです！

竹熊　ああ、そうか。だから子供だった僕にはダメだったんだな。子供って、いかにも子供然としたものより、アダルトな方に憧れるから。

大泉　僕は『エース』の時ですね。これはダメだって感じですね。

庵野　『エース』は圧倒的にデザインがカッコ悪いんですよ。『ウルトラマン80』も、とにかくヒーローがカッコ悪い。あれで損をしましたね。『80』の特撮技術はすごいんですけど。『帰ってきたウルトラマン』はグーですね。これは本編がいい。かなりのめり込んで見てました。





白黒テレビで『ヤマト』を





竹熊　それで問題のヤマトなんですけど。

庵野　『１０宇宙戦艦ヤマト』は最初、白黒で見てたんです。テレビが二台あって、カラーテレビで妹が裏番の『アルプスの少女ハイジ』を見てて。

竹熊　二台あって、良かったじゃないですか。

庵野　いや、結局うちが貧乏だったんで、カラー買っても白黒を捨てないという（笑）。普通、新しいテレビ買えば、古いのは捨てちゃうじゃないですか。

竹熊　邪魔だからね。

庵野　それを捨てないで。途中から親がカラーテレビを買い直したんで、古いカラーになりました。色が薄くて（笑）。番組を知ったのは、最初に『１１冒険王』に載った１２松本零士のマンガを見て。

竹熊　ああ、アニメとタイアップでやってましたね。

庵野　ええ。メディアミックスで、松本零士がマンガ版を連載してて。第一話の最後が夕日に沈むヤマトのあのコマで、すごくひかれた。だから『冒険王』読まなかったら、たぶん人生変わってましたね。





もう僕は勉強しない





庵野　それで高校になると、小遣いがガンとあがったんですよね。

大泉　いくらもらってたんですか。

庵野　五〇〇〇円なんです。

竹熊　それはでかいじゃないですか。僕は二五〇〇円だったな。

大泉　僕は三〇〇〇円だった。

庵野　それはですね。地方の一番有名なというか、いわゆる進学校があるんです。宇部高というところなんですけれども。そこに入ってると、地元じゃエリートと言われる。そういうところなんですよ。そこに入ったら、親が小遣いを五〇〇〇円にすると。それで受けたんです。

竹熊　じゃあ親も、ちょっと無理して、みたいな。

庵野　ええ。相当無理してたと思います。そこからですね。マンガとか小説とか買い始めるのは。やっと経済力がついて来たんですね。たまたまその時、苦手だった英語の出来が良かったんです。たぶんギリギリで入れたぐらいの気がするんですけど。それで高校の入学式の時に誓ったんですよ。もう僕は勉強なんかしないと。

大泉　素晴らしい。

庵野　中学までは、勉強も面白かったというか。でも高校に行ってまで、なんで勉強すんだろうと思って。まだ波動とか、確率論とか面白かった。でも数ⅡＢになったら……微積なんて、社会に出て何の役に立つのか。

大泉　まさしく。

庵野　進学校だったので、授業もほとんど受験勉強なんですよ。そんなもん何が面白いんだろうって感じで。だから高校に入ったら、マージャンとかマンガや八ミリとか、そんな感じで。友達とずっとマージャンしてて。

竹熊　酒は飲んだりしました？

庵野　酒は飲んでました。タバコはやらなかった。タバコはいまでもやらないっスね。当時は高校から帰ったら、即マージャンという感じでしたね。特に試験中は（笑）。





伝説のヤマト特集





竹熊　それで七六年か七七年、僕らが高校一年か二年ぐらいで、アニメブームが起きるじゃないですか。

庵野　そうですね。

竹熊　『１３ＯＵＴ』創刊二号での１４ヤマト特集。あれは鮮明に覚えてる。まさかアニメを特集する雑誌があるとは思わなかったから、びっくりしましたね。

庵野　ええ、マッハ速攻で買いました。最初、『ＯＵＴ』の創刊号を友達が見かけたんです。次でヤマト特集をやるというのが予告で出てて。

竹熊　僕も創刊号の次号予告で、「君は覚えているか？　あのヤマトの熱い血潮を！」みたいなキャッチコピーが載ってて、あれっと思って。なんでヤマトを、いま頃こんな雑誌がやるんだと。放映が終わって何年たってるかって。……思えば、あれがすべての始まりだったわけですねえ（遠い目）。

庵野　ヤマトブームはそうですね。火付けは間違いなく『ＯＵＴ』でしょう。潜在的なファン層はあったんです。中二の時から僕はずっと『ヤマト』の布教活動をしてましたからね。やっぱり高校に行くと、数人いるんですよね。『ヤマト』好きだった奴が。それで仲間みたいになって。

竹熊　それで『ヤマト』がブームになって、１５劇場版ができて。

庵野　ああ、見ました。

竹熊　僕は新宿の東映パレスで上映したのを見たんです。最初の劇場公開版。行ったら、もう劇場を二重、三重に人が囲んでて、すごい熱気でした。あれがアニメに行列ができた最初。

大泉　それは幾つの時ですか。

竹熊　だから高二ぐらい。七七年かな。ヤマトブームが起こって半年後ぐらいに、劇場版できたんでしたっけ。

庵野　あれは再編集のやつが劇場にかかってから、ブームになったんですよ。初めはファンクラブですね。ヤマトのファンクラブっていうのがあちこちにできて、そこを１６西崎義展さんがうまく利用したんですよね。

　ファンクラブ、僕も入ってたんですけど。協力要請の葉書が来たりしました。葉書が五枚来て、それで深夜放送でリクエストしてくれって。『宇宙戦艦ヤマト』の「１７真っ赤なスカーフ」をかけてくれっていう。それで確か一位になって、かかったんです。僕は出さなかったけど。

竹熊　当時はアニメの歌が、ちゃんとした音楽扱いでラジオでかかるっていうのが、前代未聞だったわけですよね。

庵野　それまでアニメファンというのはほとんどなかったと思うんです。『ヤマト』が初めて（マスとしての）アニメファンを作ったんだと思いますけどね。要するに中学にもなって『海のトリトン』の話をしているとか、『勇者ライディーン』の話をしているような女の子と、あとは『ヤマト』の話をしているような男の子が、学年揃えても一〇人ぐらいもいなかったのに、それが初めて全国区になった。僕の知らないところにも、『ヤマト』を好きな人が、こんなにいたんだと。あれがいまのオタクのハシリですよね。『ヤマト』が好きというだけで、強烈な同胞意識っていうんですか。

竹熊　連帯感が持てたと。

庵野　ええ。それがダーッと増えて。もう万単位ですよね。万単位でそういう人が増えるというのが、ものすごい安心感につながったと思うんです。それがアニメファンというものを作ったと思うんです。市民権を得たという錯覚のもとだったんですね（笑）。





さらば『ヤマト』よ





庵野　そこからスタートしたんだけど、『ヤマト』は劇場版で一回冷めちゃいましたね。こんなに人が周りにいると、なんかもういいやって。

竹熊　ああ、同じだ（笑）。僕も『ヤマト』の最初の劇場版を見て冷めて帰って来た記憶があるんですよ。なんだテレビの再編集じゃないか、手抜きじゃんこれはって（笑）。

大泉　劇場版は普通に見てたなあ。

庵野　『１８さらば宇宙戦艦ヤマト』を見た時には、周りが皆泣いてるのを見て、笑ってたんですよ、僕ら。

竹熊　スーッと引いてく自分っていうの？

庵野　ええ。僕らのグループだけ笑ってたんです、ラストで。

竹熊　すごくすれっからしのマニアになっちゃったわけですね、その時点で。

庵野　まあそうです。現に、あのラストは、僕は好きじゃないんですけどね。

竹熊　『さらば～』は最後に主人公が特攻して、ジュリーの歌が流れたっていうのだけ覚えてる。ヒロインの森雪が死んで、森雪の亡なき骸がらと一緒に古代進がヤマトを操縦して、それで敵めがけて特攻するんだよね。

庵野　あのあたりはもう、やらせのご都合にしか見えなかった。

大泉　俺も『ヤマト』の記憶ははっきりしてないですけど、拡散波動砲っていうのは、何に出て来るんですか。

庵野　あれはアンドロメダという新造戦艦についてるやつです。『さらば～』に登場する兵器です。

大泉　それでアンドロメダがやられて、ヤマトが出て行って、最後、特攻って話ですか。

庵野　そうです。いや、それで敵が巨大な都市型宇宙船じゃないですか。その中から巨大宇宙船が出て来るんです。もうラッキョの皮むき。最初は彗星だったのが。

竹熊　ああ、思い出した。白色彗星。

庵野　彗星から都市型宇宙船が出て来て、それが壊れたら中から巨大戦艦が出て来て、みせしめに月を壊すんです。それで月を壊したあと、ゾーダ大帝、何にもしないで帰っちゃうんですよ。

竹熊　月を壊して、満足して（笑）。

庵野　それをわざわざヤマトが追って行ってやっつけるんですよね。

竹熊　じゃあストーリーとしては、目茶苦茶ですね。

庵野　破綻しているんです。全然ダメなんです。それで古代が死ぬ意味もないんです。単に悲壮感を出して、泣かせるためのものなんです。そんなんに誰がはまるものかっていう（笑）。





八ミリ映画に夢中





大泉　『ヤマト』でアニメブームになって、ウチのかみさんも高校でアニメ同好会作っちゃうんですけど。庵野さんは作りました？

庵野　いや、アニメ同好会なんて、そんなのないんですよ。山口県というのが、頭の固い土地で。マン研もないんですよ。いまは知らないですけれど、当時はどこにもなかったです。まあ美術部の中に、マンガの好きな奴とかが若干いるというだけで。それで美術部の部長になってですね。部長になったからには、部費は全部俺のもんだって。で、アニメーションを勝手に作り始めたんです。

大泉　もう作ったんですか。

庵野　高二の時に、いままで貯めた金をはたいて八ミリ買って。高校の部費が五万円しかなかったんですけど、それでセルとかセル絵の具とか買い集めて、初めて描いたのが、ヤマトの描き送りの絵で。奥から手前に航行して来るやつでしたね。

竹熊　やっぱり最初は『ヤマト』？

庵野　『ヤマト』です。一番最初に描いたのはそれなんです。あと巨大ロボットが爆発するシーンだけとか（笑）。ショート・ショートみたいなフィルムを一気に作って。それは大失敗でした。皆に謝るしかなかったっスね。テレビアニメを見たままやろうって。１９イメージＢＧみたいな背景も描いて、セルに色塗って。後輩や友達にセル塗らせてですね。自分らでカセットに台詞入れて。まるでつまんなかったですね。それでも初めて動いたフィルムは感動でしたけど。あの感動があったからまだアニメ作ってんでしょうね。

竹熊　アニメ以外の八ミリ映画は？

庵野　ええ。ヒーロー物みたいなのを。当時の八ミリ仲間で、生徒会長やってる中村っていうのがいたんですけど、それのゴロあわせで『ナカムライダー』というのを。

竹熊　よくあるパターン（笑）。

庵野　でも、よくできてたんですよね。当時にすると、やたらと凝ってます。

大泉　発表の場は文化祭？　客の反応はどうでした？

庵野　ウケましたね。でも最初にできたフィルムを見た時の方が嬉しかったですね。そっちの方が大きいですね。客ウケは、まあ二次的なものでした。

大泉　ああ、動いたっていう。

庵野　やってることは、いまとそんなに変わらないですね。他に粘土やパペットの真似事をちょこちょこっとやって、その後始めたのが紙のアニメなんです。

竹熊　切り紙アニメ？

庵野　いや、切り紙じゃなくて、紙にピグマで絵を描いて、セルを使わない。上京した時に見た自主アニメに影響受けたんです。『２０ＰＡＦ』プライベート・アニメ・フェスティバル）っていうのがありましてね。そこに〝２１グループえびせん〟という自主製作グループが参加してたんです。そのメンバーの原さんがやった『セメダインボンドＧ17号』という作品がすごく面白かったんですよ。あの時、目からうろこが落ちたんです。

竹熊　ああ、こういうアニメもあると。

庵野　ええ。セルアニメじゃなくて、紙にサインペンで描いて、それを撮影して。ちょこっとだけ色がついてる。ワンポイントで。

竹熊　『エヴァ』の二六話に出て来たような、あれですね。線画のアニメ。

庵野　あれを見て、セルアニメじゃなくても、アニメーションって面白いんだって。それからは紙アニメばっかりですね。手軽ですから。一〇〇円の計算用紙でいいんですよ。ピグマで下描きもなしに、描き送りなんですけれど。これは超面白かったですね。





１

ファンの間で〝監督によるストーリーの放棄か？〟〝これは自己啓発セミナーではないか？〟と物議をかもした『新世紀エヴァンゲリオン』最終二話のこと。

二四話までのＳＦドラマは完全に放棄され、学校の体育館のような外界から隔離された場所で、対人恐怖症の主人公・シンジが、他のキャラクターたちから質問攻めにされている。シンジはむき出しの心情を吐露し、自分と自分を取りまく世界との関係、その解釈の仕方による「自分」の成り立ちを整理する。そして最後に世界をポジティブにとらえ、その世界を生きる自分を自由に演じることで、自己を肯定する結論に至る。シンジは周囲の祝福を受け、再生する。

しかし主人公の苦悩の解消を箱庭療法めいた観念劇ではなく、本来の物語中で問うていくことは放棄されたままであり、ファンの非難もこうした監督の態度に集中している。ビデオ版・劇場版での〝補完〟が期待されている。





２

押井守監督による実写映画第三弾。大作映画製作中のアニメスタジオで、突如監督が失踪。そこに登場する流れ者の天才演出家。彼の出現でこの〝終わりのない映画〟は完成するかに見えたが……。次々と起こる謎の連続殺人により、主人公が、そして映画それ自体が混迷を深めていく。不条理な設定とストーリー、難解な台詞、舞台劇風の演出は、なるほど『エヴァ』最終二話に類似していると言えなくもない。





３

五一年東京生まれ。騒乱（全共闘）の時代に生き遅れた諦感と、野蛮な現実（他者）へのコミットを本質的に嫌うインテリ的なニヒリズムの間を漂い「虚構と現実の曖昧さ」というオチに納める自己完結的な作風で、理屈好みのファンの人気を集めている。代表作は『うる星やつら２　ビューティフル・ドリーマー』『機動警察パトレイバー』『攻殼機動隊』など。





４

九三年にマンガ『幽遊白書』を読んだことがきっかけになり、ＯＬ生活からマンガ執筆＆評論活動に転じる。コミケでの同人活動の他、『ＪＵＮＥ』など商業誌でも活躍。





５

九六年の夏コミケに出品された、野火ノビタ執筆・編集による同人誌『大人はわかってくれない』のこと。Ｒ・Ｄ・レイン著の精神分裂病の研究書『引き裂かれた自己』（みすず書房）をひきながらエヴァのメインキャラクター達や庵野監督の精神分析を行っている。





６

『別冊ＪＵＮＥ』九六年一一月号で、庵野監督は野火ノビタ氏と『エヴァ』を巡る対談を行なった。





７

六九年から約一〇年間、怪獣映画を中心にアニメなどを組み合わせて春休みなどに上映した子供向けのシリーズプログラム。





８

『サンダーバード』や『謎の円盤ＵＦＯ』を製作した英国のテレビ映画会社。





９

『ウルトラマンエース』に続くシリーズ第五作。怪獣が『サインはＶ』の坂口良子とバレーボールしたり、ウルトラマンが餅つきしたりと、楽しい趣向が盛り沢山。





１０

七四年一〇月～七五年三月放映。

西暦二一九九年、謎の星ガミラスからの遊星爆弾による攻撃で、地球は放射能汚染され、地下に逃れた人類も絶滅まであと一年。そんな時、大マゼラン星雲にある惑星イスカンダルから救いの手が差し延べられた。旧日本海軍の戦艦大和は、イスカンダルの波動エンジンを搭載した最後の宇宙戦艦として改造され、放射能除去装置コスモクリーナーＤを受け取るべく前人未到の往復二九万六〇〇〇光年の大航海に旅立つ。

松本零士やスタジオぬえによる、当時としては驚異的に作り込んだＳＦ設定と世界観、クレーターだらけの赤い地球や夕日を背に聳える赤サビだらけの大和など画面のインパクト、超未来物でありながら濃厚なロマン主義と生活感に溢れる松本キャラと、まさにすべてが圧倒的だった。

しかしあまりに新しすぎ、本放映時は平均六％程度と視聴率は振るわなかった。が、再放送で人気に火が付き、アニメブームの先駆けとなった。





１１

秋田書店から発行されていた、月刊少年漫画誌の老舗。





１２

「ガニマタ・短足・近眼・チビで貧乏な主人公が、非現実的なまでに美しい女性たちに見守られながら、己の鉄の意思に殉じて無法の世界を押し渡っていく」。というように、生活のペーソスをしっかりと踏まえながら、若さの他に何も持たない読者を雄大なロマンの旅へと橋渡しし続ける、厳しくも優しいマンガ界の叙情詩人。『宇宙戦艦ヤマト』『銀河鉄道９９９』の大ヒットを初め、七〇年代後半に起こったアニメブームとは、松本零士ブームとイコールだった。





１３

みのり書房より七七年創刊。当初はサブカルチャー全般を扱っていたが、「ヤマト特集」をきっかけにアニメのサブカルチャー化を牽引するメディアという位置を担うことになり、ついにはファンのパロディが誌面を覆うアニメファンの『ビックリハウス』のような雑誌になっていった。九六年終刊。





１４

『月刊ＯＵＴ』創刊第二号（七七年六月号）における六〇ページにも及ぶ「ヤマト特集」は、まだ「オタク」という言葉すらなかった当時のアニメファンに巨大な驚きをもって迎えられた。それまで「テレビマンガ」を特集する雑誌など、子供向けメディア以外には皆無だった時代である。放映終了（七五年）から二年後、全国に点在していたファンクラブに協力を仰いだその内容は、全話ストーリー解説をはじめ用語辞典、名セリフ集、カラーグラビアを使っての名場面集、作品の矛盾点を突っ込んだＱ＆Ａ、西崎プロデューサーへのインタビューなど硬軟とり混ぜ、バラエティに富んでいる。いまもアニメ雑誌が踏襲する手法はこの時、確立されたと言ってもいいだろう。この創刊二号は記録的な売れ行きを示し、青年向けカルチャー誌だった『ＯＵＴ』は徐々にアニメ誌化して行く。これは後発のアニメ誌の登場を促したばかりか、アニメブームそのものの起爆剤にもなった。





１５

七七年八月公開。基本的にはテレビの再編集だが、イスカンダルにヤマトが着くとスターシャはすでに死んでいるという新作部分が加えられていた。ところが翌年のテレビ放映の際にはもとにもどされている。公開初日には、前夜からファンがラジオ特番を聴きながら劇場前に行列し、アニメファンの一大イベント的な様相を呈した。





１６

三四年東京生れ。『ヤマト』の企画・原案・制作・総指揮。隅々までよく口を出し、作品カラーを決定していた。強面で押しの強い、アニメ界には珍しいタイプの人。『ガンダム』の富野監督曰く「本気でアニメをやっていこうとした、最初の商売する大人」。





１７

阿久悠作詞・宮川泰作曲による『ヤマト』の副主題歌。アダルトでアニメらしさのかけらもない、ムード歌謡風の渋い名曲である。





１８

前作の大ヒットを受け、完全新作の続編として制作された七八年公開作。

ガミラスとの戦いから一年。地球は驚異的な速度で復興を果たしていた。しかし平和に浮かれ堕落した人類に反発を隠せない旧ヤマト乗組員たちは、廃艦処分が決定したヤマトに結集。宇宙からの新たな脅威を伝える正体不明の通信と、地球に近付く白色彗星の謎に挑むべく、反逆者として地球を後にする。彗星帝国との死闘の中で、乗組員たちは次々に倒れ、主人公古代進は単身ヤマトで敵の本体である超巨大戦艦に突攻、自爆する。

自己犠牲賛美が右翼チックであるといった批判も聞かれたが、当時はおしなべてファンも好意的、ブームの盛り上がりはピークをむかえ、四〇〇万人を越える動員を記録した。





１９

ＢＧとは背景（バックグラウンド）のこと。イメージＢＧは、背景に具体的な風景ではない、光や色などの抽象的なパターンを持ってくる場合をいう。





２０

六七年に発足し、特色ある上映会を開いていた東京のアニメファンサークル「アニドウ」が、七五年にスタートさせたアマチュア作品の上映会「プライベート・アニメ・フェスティバル」。後、計一〇回開催された。

『劇場アニメ70年史』（徳間書店）によると、最盛期だった八〇年頃、突如山ロ県から現れた「グループＳＨＡＤＯ」の達者さに驚いていたら、彼らはのちに『オネアミスの翼』の主力スタッフとなった、とある。





２１

「日本アニメーション協会」が七八年に開催した、アマチュアのためのアニメーションワークショップの受講生たちが自主結成した、アニメ制作サークルの一つ。





竹熊　大阪芸大は現役合格ですか。

庵野　いや、浪人です。一回目は、国立の教育学部を受けたんですけれど。共通一次の英語が四〇点で。全然ダメでした。それで一年遊んで、二年目はさすがにもう、どこでもいいから親に入れと言われて。それで案内を見たら、大阪芸大というところが当時は学科試験なしだったんですね。実技のみで。

大泉　（笑）おかげで大阪芸大、すごい人材生み出してますからね。

庵野　映像計画学科を受けたんですが、試験が絵コンテだったんです。当時、２２宮崎（駿）さんの絵コンテを、友達が買ったりして見てたんです。『２３未来少年コナン』の絵コンテを、日アニ（日本アニメーション）が売ってたんです。通信販売で。それを見て。

竹熊　勉強して？

庵野　いや勉強してというか。こんな感じでやればいいのかと。あとで担当教授に聞いた話だと、僕のはかなり優秀だったそうです。ここまで描き込んだ絵コンテというのは、いままでなかったと。専門用語まで書いてましたから。背景指示とかフォローとか。

大泉　そうすると大阪芸大で、一躍エリートになるわけですね（笑）。

庵野　まあ大阪芸大に入って良かったっていうのは、２４赤井（孝美）とか２５山賀（博之）がいたってことですね。

竹熊　この時期の大阪芸大というのは、そういう意味ですごいですよね。

庵野　うーん、まあ。でもそうでもない人も多いですよ。僕の感覚だと当時の大阪芸大は、四年制の専門学校ですから。誰も勉強する気がない。映画をやりたいから来てるわけでもないんですよ。入りやすいから来てると。

　ファースト・ピクチャーズ・ショウと言って、二回生になるとフィルムを三分間作って、全員参加で発表する。出せば単位になるんです。とりあえず三分のフィルムを出さなきゃいけないという時に、その大半はゴミのようなフィルムなんです。なんでこの人達、ここにいるんだろうなって。ずーっとフィルム流しっぱなしにして、音楽入れてるだけっていう。でも、その中で、やっぱり何本かはいいのがあるんですよね。一回生の時は赤井と合作で紙アニメを出しました。山賀に撮影手伝ってもらって。それが大学で作った最初のアニメですね。





山賀博之との出会い





庵野　僕は山賀と同じ寮だったんです。それで大家さんのところに挨拶に行った時に山賀がいて、初めて話をしたんです。

竹熊　初対面の印象は？

庵野　なんかおかしい奴。

竹熊　向こうもそう思ったでしょう。

庵野　らしいですね（笑）。それでなんか話ないかなと思った時に、僕が「『２６機動戦士ガンダム』って見てました？」って話をしたら、向こうが「ガンダム、何それ？」って。新潟（山賀氏の出身地）じゃやってなかったし、そもそもアニメって何も見てなかったんスね。

大泉　山賀さんとは、よく行ったり来たりとかしてたんですか、部屋同士で。

庵野　うん、そうですね。

大泉　僕が大学の頃は、哲学の勉強やってるか、マージャンやってるかって。やっぱり寮みたいなところだったんですけれど、マージャンは、その頃は切れてたんですか。

庵野　きれいさっぱりです。マージャンやる暇はなかったですね。と言うか、マージャンやる友達がいなかったですね。フィルム製作ばかりで。

竹熊　やっぱり山賀さん、赤井さんの影響というのもあるわけでしょう。

庵野　大きいですね。

竹熊　お互いに一目置きあうみたいな関係？

庵野　どうなんでしょうね。僕が一番バカだと思いますけど。マジに。

竹熊　山賀さんっていうのは、映画青年というイメージがあるんだけど。

庵野　いや、全然。彼、あんまり映画見ないですよ。有名になるための方法論が映画監督だったということで。だから映画監督になるにはどうしたらいいんだろうというので、淀川長治のエッセイを読んだらしいんですよ。そこに「同じ映画を一〇回見れば、誰でも映画監督になれる」って書いてあったんで、それで２７『がんばれベアーズ特訓中』を一〇回見て、これで映画監督になれるって。

大泉　（爆笑）

竹熊　ただものじゃないね。よりにもよって『ベアーズ』……。

庵野　『がんばれベアーズ』ならまだわかるんですけど、『特訓中』ですから。つまんないと言ってましたね。

竹熊　そのつまんなかったやつを一〇回も。山賀さん、それでもう映画はわかったと。

庵野　映画監督にこれでもうなれると。

大泉　実際なったからすごいね（笑）。





ガンダム放映開始！





大泉　『ガンダム』のテレビ放送って、何年ですか。

竹熊　七九年。

大泉　それで大学に入ったのが。

庵野　八〇年。

大泉　じゃあ、浪人中に見てたんですか。

庵野　ええ。かなり本気で見ました。それまでもロボット物はけっこう見てたんですけど、やっぱり、すごくバカバカしいじゃないですか。

竹熊　まあ、ミもフタもないことを言えば（笑）。

庵野　『マジンガーＺ』とか、子供心になんかすごく頭が悪いと思ってたんですね。だって、どう考えてもアシュラ男爵の方が勝てるわけじゃないですか。なんで勝てないんだろう。頭の悪いアニメばかりだったんですね。ところが『ガンダム』の予告を見た瞬間、「これは違う！」って。

竹熊　『ヤマト』以来の、なんかクルものがあったと。

庵野　起き上がって、目が光るっていう有名なカットなんですけれど。その予告を見た瞬間ですね、「新しい！」って感じですね。それで一話見たら、しびれてしまいまして。もうあとはビデオ録りですね。

竹熊　もうビデオは持ってたんですか？

庵野　持ってないですよ。だから近所の電器屋に、ビデオテープ買うから、ビデオデッキ貸してくれって。

竹熊　ああ、その手で？　レンタルビデオデッキ（笑）。

庵野　無理やりなんですけど。当時、ビデオ持ってる友達が近所に誰もいなかったんですよ。高くて。

竹熊　メチャ高かった。六〇分テープ一本が何千円でしょう。

庵野　そうなんです。まあそのテープを買うから、とにかく録らせて、店頭で見させてくれっていう。もう電器屋の迷惑かえりみず。当時、新聞配達やってたんで、リアルタイムで見れなかったんです。最初のうちは、それでもしようがないんで配達さぼったんです。そのうち近所の人から、「金曜日になると、夕刊がいつも七時ぐらいになるね」「いや、なんか金曜は荷物多くて大変なんですよ」とウソついて（笑）。配達途中で抜けて、家に戻って見てましたね、ガンダムだけは。でも、さすがに辛いんで。

竹熊　それでビデオを。

庵野　電器屋に五時三〇分前に必ず寄って、それでガシャーンと自分でスイッチを入れてから配達にまた戻る。

竹熊　ああ、電器屋で撮ったと。それはすごいな（笑）。

庵野　配達終えたあと、電器屋に行って、その場で見るってやつですね。

竹熊　『ガンダム』が決めちゃったわけですね。いまの庵野さんの道を。

庵野　まあ、『ヤマト』『ガンダム』ですね。ただ『ヤマト』の熱気というのは、途中で冷めたじゃないですか。他のアニメも見てたんですけど、そこそこでしかないんですよ。本気になりたくてもなかなかなれない。

それで、なんかアニメもつまんなくなったなあ、とか思ってた矢先に『ガンダム』がガーンと。ロボット物がここまで……ついにこれが出たんだって。

竹熊　わかる。耐えがたきを耐えて、やっと報われたと（笑）。

庵野　ええ。すべてにおいて、リアルタイムで見た以上、ファースト・ガンダムってエポックだったんです。

大泉　当時、あれだけ作り込んだロボットアニメがあったっていうのは、やっぱり驚きますね。

庵野　『ガンダム』からなんですよね。ロボットに人が乗っているというのを意識させるようになったのは。それまでのロボット物って、乗ったら、もうあとはロボットですものね。ロボットが必殺技を叫ぶとかだったんですけれど、ガンダムはロボットの絵の時は、めったにしゃべらないんです。ロボットの画面のところに、わざわざ人の顔だけ画面分割で出て、その中でしゃべる。あれも新しかったですね。すべてにおいて『ガンダム』はロボット物のエポックです。グーでしたね。





『ウルトラマン』事始め





庵野　僕の通ってた大学は、フィルムみたいなのを作ったら、単位をくれるというところだったんですね。

大泉　まるで庵野さんのためにあるような大学（笑）。

庵野　それで一回生の時の映像実習で、僕らの班はオムニバスでＣＭ集を作ったんです。誰かを監督に立てて、一本作るだけの意見がまとまらなかったので、各人バラバラにＣＭを作ることになったんですよ。その中の一本が、僕のタイヤのＣＭ２８（『じょうぶなタイヤ』）で、山賀がワインのＣＭを作ったんですね。でもＣＭだけだとつまらないので、ちょっと番組を中に入れようと僕が言い出して。

大泉　ＣＭを見せることが本来で、そのオマケとして番組を作ると。

庵野　ええＣＭの方が本編なんです。僕が作ったオマケの番組というのが、『２９ウルトラマン』なんですよ。

竹熊　はあ、すると庵野さんが後に監督した名作八ミリ『３０帰ってきたウルトラマン』の原型なわけですね。

庵野　ええ、要するに、カラータイマーだけ作ってですね。素顔丸出しで、衣裳がウインドブレーカーで。それで同じ寮の友達に、芸大のジャージ姿でイダーゲ星人というのをやらせてですね。まあ他愛もないものなんですけど。ウラの空地で撮りました。

竹熊　『３１ウルトラファイト』（笑）。

庵野　それで二回生になった時に、ファースト・ピクチャーズ・ショウで、これまた時間がなくて、どうしようって時に、山賀が監督で『３２ウルトラマンＤＸ』を作ったんです。今度は前よりはちょっと豪勢に。なにがデラックスかというと、まず赤井が怪獣の頭だけ作って、着ぐるみがある。あと前作でビルとかなかったんで、だから今回は牛乳のパックを積み立ててビルにして、そこにぶつかって壊れるのを、七二コマで撮る。スローモーションで、牛乳パックが壊れるところを。

　ああいうのって、結局音なんですよ。音をテレビから撮ったんです。『ウルトラマン』の本当のビルが壊れる音、ガラガラガラッと入ってたら、それなりに見れるんです。それでまた同じ寮にいる奴が、「じゃあ俺がウルトラマンの最終回を作るか」って（笑）。

竹熊　シリーズ物になっちゃったと（笑）。

庵野　そうなんです。まあそれでウルトラマンが故郷に帰るという話だけ最後に入れて。だから３３ダイコンフイルムでやった時は、〝帰ってきた〟んですよ。

竹熊　ああ、それで『帰ってきたウルトラマン』。その前史があるからですか。やっと飲み込めました（笑）。

庵野　あれはダイコンフィルムの宣伝用の作品として、なんか八ミリを作りたいというアイデアがあった時に、僕の方から企画を出したんです。『ウルトラマン』やりますかと。





ダイコンフィルムの誕生





竹熊　ダイコンフィルムには、どういういきさつで参加することになったんですか？

庵野　高校時代の友達が、当時、京都に住んでて、近所にソラリスという喫茶店があったんですけれど、ＳＦファンが常連になってる喫茶店が。そこで彼が３４武田康廣さんや３５岡田斗司夫さんと知り合ったんですよ。彼の紹介で京都まで行って、ソラリスでその二人と。面白い人達がいるんで、会ってくれといわれて。

大泉　八一年に、第二〇回３６日本ＳＦ大会『ＤＡＩＣＯＮⅢ』ですよね。

庵野　ええ。ＳＦ大会やるので、それのオープニングでアニメーションを上映したいと。

竹熊　そこから岡田さんや武田さんと関わり始めたと。その頃はもう、二人はＳＦ大会をやっていたわけですか。

庵野　いえ、ＳＦショウというのをそれ以前にやっていましたね。

竹熊　なんか、オタク漫才みたいなのをやってたんでしょう。

庵野　それまでは各地のＳＦ大会に出てくる関西芸人って、二人とも有名だったらしいんですけれど。

竹熊　なんか、名物コンビだったらしいんだよね、岡田さんと武田さん。『スター・ウォーズ』を口真似で全部やるとかさ。それは武田さんでしたっけ。

庵野　どうだったかな。ゴジラの芸は面白かったです。

大泉　なんですか、ゴジラの芸って。

庵野　いや、高圧鉄塔のところのゴジラの真似とか。

大泉　コアですね（笑）。それで、その岡田さんや武田さんがプロデュースする形で、八一年の第三回大阪ＳＦ大会で上映した３７『ＤＡＩＣＯＮⅢ』オープニング・フィルムを製作するわけですね。

庵野　そこからダイコンフイルムが始まったんです。

大泉　こないだ竹熊さんのところで見たけど、もう全カットにオタクの夢がつまっているという（笑）。

庵野　山賀が背景を描いて、僕がメカとエフェクトやって、赤井がキャラクターと怪獣を担当したやつですね。『Ⅲ』の時は、主なパートは事実上ほとんど三人でやってたんで。

竹熊　山賀さんと庵野さんと赤井さん。

庵野　それで次の『Ⅳ』はもっと規模を大きくしたいというので、山賀が監督という形で立って、自主アニメなんですけれど、プロのシステムというのを導入したわけなんです。そのために山賀が東京に行って『３８超時空要塞マクロス』を手伝いながら、プロの仕事を見てきたんですけれどもね。

竹熊　もう『マクロス』が？

庵野　始まってました。

大泉　それは大学何年ぐらいの時？

庵野　大学何年でしたっけ。いや二年ぐらいまでしか行ってないです。三年からもう学校行ってなくて。大学二年の時が『ＤＡＩＣＯＮⅢ』です。

大泉　卒業してないんですか。

庵野　してないです。放校処分です。

大泉　優秀な学生だったから（笑）。

庵野　三年目には大学、行かなかったですね。『帰ってきたウルトラマン』とか『３９愛國戦隊大日本』とかが始まっちゃって。





ウルトラマンになった理由





大泉　『帰ってきたウルトラマン』の話って、庵野さんにとっては、ある種原点という感じですか。

庵野　あれは原点です。

大泉　俺、もうゲラゲラ笑っちゃったんですけど。一番初めにウルトラマンになった時の気持ちというのは、どういう気持ちだったんですか。

庵野　気持ち良かったですよ。昔からの夢でしたから。

大泉　ポーズとかは、昔のシリーズ見直して、研究してとか。

庵野　いや、もう身についてたから。『ウルトラマン80』までは全部、真似できます。

大泉　顔もなんとなく似てるような。

庵野　僕一八〇あるんで、初代ウルトラマンの役者さんと同じ背の高さなんですよ。やっぱりイメージというのは大事です。腹なんて出てると、イメージがなんともなんないから。

竹熊　『帰ってきたウルトラマン』は製作中、かなり煮詰まったとか。

庵野　凝りすぎたんですね。圧倒的に。ダイコンフィルム製作で『愛國戦隊大日本』『４０快傑のうてんき』と三本立てで進行してたんですけど、それをまとめてＴＯＫＯＮ８に出さなくてはいけなかったんで。

竹熊　東京のＳＦ大会。

庵野　それに出すというのが当初の目的だったので。もうこのままだと間に合わないというので、グループとしては『ウルトラマン』を凍結して、『大日本』を完成させるために、一回、中断したんです。ＭＡＴ本部の撮影後に。とにかく本部の司令室のセットを組んじゃったんで、そこは全部撮っておいて、一回中断。それでＴＯＫＯＮが終わってから、九月ぐらいに……。

竹熊　撮影再開？

庵野　ええ。やっぱりその後、僕は壊れてたんですね。中断して緊張感が切れて。それで九月ぐらいに、やっぱりこのままじゃあイカンと。

竹熊　完成させねばということで。

庵野　ええ。それで撮影を再開したんですが、もう泥沼だったですね。最初、阪大の友達のところで、ほとんど居候みたいな形で住み込んで、ミニチュアを作りながら撮っていったんですが、全然ラチがあかない。それで今度は米子にある赤井の実家の方に詰めて、そこでオープンのロケをやると。それでも撮りきれずに帰って来て、大阪の十じゆう三そうにスタッフのベースになってたマンションがあるんですけれど、そこで残りを全部撮るという。その頃はもう、グチャグチャでした。

竹熊　庵野さんの行き詰まり癖というか（笑）、完全主義が出ちゃったわけですね。

庵野　あの時は、とにかく人間関係の問題がでかいんですけど。皆、学生ですからね。報酬があるわけじゃないし、こっちは学校を休んでやってくれと言っているわけですね。周りの人間巻き込んで、留年までさせてるんです。

大泉　『ウルトラマン』で留年（笑）。

竹熊　そこで責任というものが、庵野さんの肩に……。

庵野　それに応えるだけのものを作んなきゃいけない。とにかく疲れきってました。一日二四時間、それしかやらない暮らしになりましたから。





挫折、そして決別





庵野　そうなった時に、正月だけ休みになったんです。正月は実家に帰って、その間にフィルムを編集する予定だっ

たんですけれど、実家にスプライサーが無かったんですよ。

竹熊　ああ、編集する装置が。

庵野　ええ。二トラックのものがなくて、一トラの編集機しかなかったんです。買おうにも金がなくて、なおかつ正月休みでテープも売ってなかったんです。だから作業ができなかったのをきっかけに、五日間、もう友達と遊んだんです。これじゃできないやと思って。スタッフに連絡もせずに、なまけちゃったんです。その時に、連絡入れれば良かったんですけれど……。

竹熊　責任問題が発生しちゃった。

庵野　ええ。結局、やらずに大阪に戻って、武田さんや岡田さんに怒られました。いま考えれば、そこで怒って、僕をやる気にさせるという方法論だったとも思うんですけれど、僕はそこでめげちゃったんですよ。もういいやって。

竹熊　その時の話を岡田さんから聞いたんですけど、岡田さんが言うには、庵野さんがなまけて、正月休みに編集してこなかったというので、この編集は別の奴にやらせると。それで、赤井さんにバトンタッチですか？

庵野　ええ。

竹熊　だから自分達で作品を仕上げるから、庵野はもういいみたいなことを言ったら、庵野さんがそれから七時間、喫茶店のその席で、ずっと悩んでたっていう話を聞いたんだけど（笑）。

庵野　七時間もいたかな。

竹熊　七時間だかなんだか、とにかく延々いて、喫茶店から連絡があって、まだあの人いますけど……みたいな。それで岡田さんが喫茶店に戻ってみたら、庵野さんが別れた時と同じポーズで悩んでたっていう話を聞いたんですが。

大泉　それは本当なんですか。

庵野　ショックでしたからね。……要するに、まさか（自分の作品が）取り上げられるとは思わなかったんです。それでああ、（仲間にとって自分の存在は）どうでも良かったんだって。結局、連絡しなかったというところが問題だったんですね。イカンですよね。

竹熊　そこで岡田さんや武田さんに電話すればいいじゃありませんか。

庵野　僕、貧乏くさいんで、長距離電話すると、金が実家にかかると思うんですよ。まあ、大阪に帰ってから話せばいいやって。要するに、電話代がもったいないと。サボる理由が欲しかったんでしょうね。連絡しなかったのは、確かに悪いと思ったんですけれど。

　一番ショックだったのは、まあ一年近くそれしかやっていなかった自分の人生みたいなものが簡単に取り上げられてしまった、ということですね。自分はその程度の存在だったのかと思い知りました。もともと責任感薄いんですよ。なまけ者だし。つくづく監督には向かない、と思いました。でもその時は自己嫌悪よりは、簡単に捨てられたショックの方が大きくて、そんなグループはもう嫌だと、東京に『マクロス』手伝いに行ったんです。

　その後赤井が完成させてくれたフィルムを上映会で見た時は、号泣しましたね。監督降ろされた時の慰めと励まし、そしてフィルムを完成させてくれたこと等、言葉にならないですね。赤井には感謝程度じゃすまないです。結果、またグループにも戻ったし。





　庵野秀明が生まれて初めてアニメらしきものを制作したのは、山口県立宇部高校二年の時。美術部長に就任して間もなくのことだった。私費と部員の金をかき集めて八ミリカメラを入手した庵野は、さっそく『宇宙戦艦ヤマト』のセル・アニメ化に挑戦。「それは大失敗でした。」（本人談）

　庵野にとって最初の転機となったのは、大学浪人中（七九年）に上京して参加した、アニドウ主宰の「ＰＡＦ５」

（第五回プライヴェート・アニメーション・フェスティバル）だった。ここでアマチュア参加者によるさまざまな技法の作品に触れたことは、それまでセル・アニメしか知らなかった庵野にとってまさに〝目からウロコ〟体験となったという。

　とりわけ庵野の興味を惹いたのは、グループえびせんが精力的に発表していた一連の「紙アニメ」である。紙アニメとは、白紙にマジック等で簡単な線画を描き、それをコマ撮りするだけのシンプルで安価な技法のこと。シンプルなだけに、アニメ本来の動きや変形の面白さをそのまま表わすことができる。庵野は仲間と共に制作集団「グループＳＨＡＤＯ」を結成、紙アニメによる多数の作品を制作し、八〇年の「ＰＡＦ６」等で発表した。





　こうした庵野〝紙アニメ〟の最高傑作が、大阪芸大一回生の時（八〇年）に課題として制作したＣＭ集の一本『じょうぶなタイヤ』である。

　伊福部昭の軽快なマーチをバックに、衝突しても水没してもめげずに猛スピードで走る車を一秒二四コマのフルアニメで描いたこの作品は、後の天才アニメーター・庵野秀明のすべてが既に現われている。学生作品のレベルを遥かに越えた『じょうぶなタイヤ』は、当時、これを見たプロからも高く評価されたという。





　またこのＣＭ集にはもうひとつ楽しいオマケが付いている。庵野秀明監督・主演のミニドラマ『ウルトラマン』である。同級生の山賀博之・赤井孝美らの協力で撮られたこのささやかな作品は、特撮マニア・庵野秀明のもうひとつの原点である。着ぐるみひとつない超低予算作品ながら、スロー撮影や光学合成などきちんと処理されており、『エヴァ』のＡＴフィールドを思わせるバリヤーまで登場するから面白い。これがやがて八ミリながら巨額の予算をかけた超大作『帰ってきたウルトラマン』に結実するのだ。





　さらにこの時期、庵野は岡田斗司夫や武田康廣らとも出会う。八一年に大阪で開催される第二〇回日本ＳＦ大会（第三回大阪ＳＦ大会＝ＤＡＩＣＯＮⅢ）の企画に参加していた岡田らは、庵野・山賀・赤井に開会式で上映する短編アニメーションの制作を持ちかける。こうして完成した『ＤＡＩＣＯＮⅢ』は、ＳＦ・特撮・アニメのパロディ満載の美少女アクションの快作となり、マニアのツボを押さえたその内容は大喝采で迎えられ、伝説のフィルムとなった。





　八二年、大阪・桃谷に日本初のＳＦマニアショップ「ゼネラルプロダクツ」を開店した岡田と武田は、さらに「ダイコンフィルム」を設立する。

　これは大阪芸大三羽烏（山賀・庵野・赤井）を制作の中心とした自主映画サークルだが、同時に翌年再び大阪で開催予定のＳＦ大会（ＤＡⅠＣＯＮⅣ）の運営スタッフを、映画制作を通じて養成するという目的も込められていた。





　その手始めに企画されたのが『快傑のうてんき』『愛國戦隊大日本』『帰ってきたウルトラマン』の三本である。いずれも脚本は岡田斗司夫が執筆した。

　武田康廣主演の『快傑のうてんき』は『快傑ズバット』のパロディである。武田が着用した能天気な衣裳（写真参照）は、高校の映研を思わせる意図的にテープな作りとあいまって異様なインパクトをかもしだした。現在はガイナックスの統括本部長を務める武田は、一〇数年を経た今でもマニア間で「のうてんきの人」と呼ばれている。





　また『愛國戦隊大日本』（赤井孝美監督）もマニアの間では伝説となったフィルムである。基本的には東映戦隊物のパロディなのだが、主人公らの戦う相手が共産主義の怪人デス・グレムリン！　もちろん当時はまだソビエトが健在であり、その「危なさ」と馬鹿馬鹿しさの共存が大受けしたことはいうまでもない。撮影テクニックや編集も完璧に近く、ミニチュアや爆発シーンを含めてプロも唸る出来栄えである。庵野秀明はフィルムの光学処理の他、ナレーションやロボットの着ぐるみ役者としても活躍している。





　以上の二本は八二年八月の東京ＳＦ大会（第二一回日本ＳＦ大会東京大会＝ＴＯＫＯＮ８）で上映され大評判となったが、残る一本の『帰ってきたウルトラマン』（庵野秀明監督）だけは、庵野の完全主義が災いして完成には至らなかった（完成は翌年三月）。

『帰ってきた……』は、庵野秀明が本家円谷プロに壮大なオマージュを捧げた八ミリ超大作である。実相寺昭雄チックな画面構成、上原正三を想わせる情念的な脚本、入魂のセットと特撮は、八ミリ映画の限界に挑戦したと言っても過言ではないだろう。また主題歌はオリジナルの没版をそのまま使用という凝りようながら、ウルトラマンはウインドブレーカーに着色しただけの素顔の庵野自身が演じるという大技が、すがすがしかった。





　この作品を撮り終えた庵野は、上京してテレビアニメ『超時空要塞マクロス』の作画スタッフとなる。すでにここには山賀博之や赤井孝美、また後にガイナックスの仲間となる貞本義行や前田真宏らも参加していた。

『マクロス』終了後、プロ経験を経た彼らは山賀を監督に『ＤＡⅠＣＯＮⅣ』に着手する。『Ⅲ』のスーパー・グレードアップ・ヴァージョンとも言うべき『Ⅳ』は、後のプロ作品で使用するあらゆるテクニックが試されていた。こうしてダイコンフィルムは株式会社ガイナックスへと移行していく。





２２

四一年東京生まれ。六三年東映動画に入社。六五年東映動画労働組合員の自主管理による『太陽の王子ホルスの大冒険』の制作に参加。

ここで監督の高畑勲と出会い、後に数々の傑作でコンビを組む。監督作に『未来少年コナン』『風の谷のナウシカ』『となりのトトロ』など、現代日本を代表するアニメ監督である。





２３

七八年四月放映の、ＮＨＫ初のテレビアニメシリーズ。宮崎駿が初めて単独で監督した作品。





２４

六一年鳥取生まれ。大阪芸大在学中に庵野・山賀と出会い、ダイコンフィルムの中核メンバーとなる．『プリンセス・メーカー』シリーズのゲームデザインやキャラデザインを始め、マンガ・映像等のメディアを越えて活躍するアーチスト．現在は有限会社ナインライブス代表取締役。





２５

六二年新潟生まれ。大阪芸大在学中に、ガイナックスの中核となったアマチュアサークルのメンバーと出会い、後に株式会社ガイナックスを設立。八七年『王立宇宙軍・オネアミスの翼』を監督する．現ガイナックス代表取締役。





２６

七九年放映。ロボットアニメというフォーマットで生々しい群像劇が描けることを示し、テレビアニメというジャンルの可能性を大きく開いた、富野喜幸（現・由悠季）監督の出世作。

「人類が増えすぎた人口を宇宙に移民させるようになって、既に半世紀」宇宙世紀００７９、スペースコロニーサイド３はジオン公国を名乗り、地球連邦に独立戦争を仕掛けた。自閉症気味の少年アムロをはじめ、戦火に巻き込まれた少年少女たちが、理不尽な戦いの中で生きるために必要なものを認識していく。

物語に説得力を与える突き詰められた世界観、作り込まれたディティールは、以降のアニメに決定的な影響を与え、ほとんどすべてがガンダムごっこのような亜流になってしまった。「人の成長とはどういうことか」を問うためのニュータイプという新人類の設定もオカルト的な深読みをされることが多かったが、最近作では、他者への想像力を育む関係性のための具体的な問題提起が込められていく。





２７

リトルリーグのダメチームの奮戦を描いて大ヒットした前作を受けての第二弾。七七年公開。





２８＆２９＆３０

「アマチュア時代の庵野秀明（１）」





３１

六九年から放送された、プロレス風の実況をつけた名場面集的な五分間怪獣番組。末期には、造成地や砂浜でアトラクション用のショボいスーツでボカボカ殴りあうような寒いものになっていったが、これが新たな怪獣ブームを巻き起こすのだから、世の中ホントにわからない。





３２

「アマチュア時代の庵野秀明（１）」





３３

「アマチュア時代の庵野秀明（２）」





３４

五七年大阪生まれ。近畿大学在学中に岡田斗司夫と共にＳＦファンダム活動を開始。八一年の日本ＳＦ大会「ＤＡＩＣＯＮⅢ」を主宰し、その企画時に庵野・赤井らと出会う。八二年に日本初のガレージキット専門店「ゼネラルプロダクツ」を岡田と共に設立（現在は解散）。ガイナックス設立時には発起人・取締役として参加。現ガイナックス取締役・統括本部長。





３５

五八年大阪生まれ。八一年第二〇回日本ＳＦ大会を主宰、「ゼネラルプロダクツ」代表取締役を経て、株式会社ガイナックスを設立、後に退社。国際オタク大学学長にして東京大学教養学部「オタク」文化論ゼミ非常勤講師。オタク界の理論的指導者とも目される。著書に『ぼくたちの洗脳社会』（朝日新聞社）、『オタク学入門』（小社刊）がある。





３６

六二年から現在に至るまでファンによって毎年開かれているＳＦ大会の老舗。この席上で決められる星雲賞は、前年に発表された全ＳＦ作品の中から大会参加者の投票で決定される。第一回大会は東京の目黒で開かれ「ＭＥＧＵＣＯＮ」と名打たれたのだが、これは世界ＳＦ大会の第一回がニューヨークで開かれた際に「ＮＹＣＯＮ」と呼ばれた伝統に即してのもの。コンとはＣｏｎｖｅｎｔｉｏｎ（代表者大会）の略。例えば東京で開かれれば「ＴＯＫＯＮ」、大阪で開かれれば「ＤＡＩＣＯＮ」である。





３７

「アマチュア時代の鹿野秀明（２）」





３８

八二年放映。キャラクターデザインの美樹本晴彦、メカデザインと脚本の河森正治をはじめ、ヤマト・ガンダムを見て育った世代が中心になって作った最初の商業アニメである。

宇宙人の大艦隊による戦闘の中を漂流するマクロス要塞艦の内部につくられた都市では、若者たちが消費生活を謳歌しているというとんでもない設定は、当時の冷戦下の気分と妙にダブって見えて面白い。リアリティの基準の置き場において、マンガにおける江口寿史のような転換点といえるだろう。

八四年の河森監督による映画化は、ＯＶＡによるジャンルの自閉と先細り前夜の、アニメブーム最後のお祭りとなった。





３９

「アマチュア時代の庵野秀明（２）」





４０

「アマチュア時代の庵野秀明（２）」





庵野　話は前後しますけれども、ＳＦ大会で『ＤＡＩＣＯＮⅢ』を上映した時に、４１スタジオぬえの人が来てて。その時に、テレビの企画をやってると。それで「パワードスーツが描けるんだったら、うちのロボットも描けるだろう。その時は手伝ってくれないか」と声かけられたんです。それで岡田さんと一緒に上京した時にぬえに行って、４２板野一郎さんを紹介してもらったんです。板野さんとはそこで初めて会ったんです。その時『４３ガンダムⅢ』の原画を見せてくれたんです。ものすごくうまくて。ああ、すごい人がいる、この人とは仕事を一緒にしてみたいと切に思いました。

　それで僕は東京に行って、『マクロス』の原画をしばらくやってました。四カ月ぐらいかな。一六話の手伝いぐらいから、二五話の「愛は流れる」のところぐらいまで。

竹熊　『マクロス』は、もう伝説になってますよね。つまり、オタク世代というか、僕らの世代が作った最初の商業作品という印象がありますよね。

庵野　オタクによるオタクのためのアニメですよね。オタクの夢が詰まっている、最初のものだと思いますけれど。それで参加して、面白かったです。勉強にもなりましたし。板野さんの仕事ぶりを間近に見て、ホントによかったっス。

竹熊　板野さんが、最初の師匠という感じになるわけですか。

庵野　（キッパリと）師匠ですね。

大泉　どういう方ですか。一言で言うと。

庵野　ミサイルとか、爆発描かせたら天才でしたね。「キ」の字でしたけど（笑）。





『風の谷のナウシカ』で大抜擢





竹熊　それで『マクロス』のあと、宮崎駿監督の『４４風の谷のナウシカ』に参加するわけですか。

庵野　いや、『ＤＡＩＣＯＮⅣ』です。

竹熊　ああ、その間に『ＤＡＩＣＯＮⅣ』が。『マクロス』で培った技術を、『ＤＡＩＣＯＮⅣ』に投入していくわけですね。

庵野　ええ。もうシステム的にプロと同じでしたからね。『ＤＡＩＣＯＮⅣ』が終わった頃は学校ももう行かなくなってたし、結果は放校処分でしたね。（笑）それで就職を考えるようになりまして、そこで『ナウシカ』ですね。

大泉　就職活動をしたんですか？

庵野　就職活動です。カバン一つで東京へ行って。

竹熊　それは宮崎駿さんに面接されたんですか？

庵野　そうですね。『ＤＡＩＣＯＮⅣ』のビデオと原画を宮崎さんに見せたら、ＯＫもらったんです。宮さんからすれば、渡りに船なんですよ。「４５巨神兵」を描くアニメーターがいなかったんで。こんな大変なのを誰にやらそうかと思ってたら、ノコノコ若いのがやってきて。

竹熊　だって、一番派手なクライマックスですよ。すごい重要なシーンじゃないですか。

庵野　ええ。よくこんな素人にやらせたなと思って。あとで宮さんを知る人に聞いたら、「よくやらせたな」。「動画の経験もない奴に、いきなり原画をやらせるなんてことは、宮さんはしない」と。よっぽど人手不足だつたんでしょうね。時間もなかったし。運もよかったと思います。





ド生意気な新人





竹熊　それで、いろいろ伝説が残ってますよね。宮崎監督に、すごい描き直しくらったとか。

庵野　いや、人物がまさかあんなに描けないとは思わなかったって（笑）。

竹熊　巨神兵の横の４６クシャナが、なかなかうまくいかなかったとか。

庵野　いや、人物はまるで描けません。メカやエフェクト専門でしたね。宮さんもまさか、メカが描けて人物がまるでダメというタイプがホントにいるとは思わなかったらしくて。最初はまとめてキャラも描かせてたんですが、そのうち「人間、あまり得意じゃないね」「人間ヘタだね」「人間描けないね」「もういい。マルチョンで描いとけ！　あとはオレがやるから」「この未熟者め！」と（笑）。

　結局巨神兵や戦車とか爆発等は僕が全部描いて、キャラだけはラフで丸チョン。それを宮さんが第二原画で描くという。ド生意気ですよね（笑）。あと、エフェクトの大半は直すのが面倒だったらしくて、「失敗したらお前のせいだ」と（笑）。それでも二カットほど修正されてたんです。僕、動画チェックの段階でそれ見つけて「ああダサくなってる！」。で、勝手に動画から自分で描き直していたりしました。ド新人のくせに超ナマイキでしたね（笑）。最初の頃は宮さんの前では上がってたくせに、途中からタメ口きいてたりしましたからね。そんなバカで生意気なところが良かったんでしょうね。逆に親しくしてもらいました。

　４７トップクラフトにずーっと寝泊まりをして。会社にはタイムレコーダーあったんですけれど、僕だけ白紙なんです。そのうち、寝た時間と起きた時間だけ押してくれればいいって言われて。

大泉　飯場ですね（笑）。

庵野　集団の中で寝るのは、大学の時からずっとなんですよ。いまでもアパートに帰るのは年に数回です。

竹熊　会社に寝泊まりして一六年（笑）。

庵野　『ナウシカ』の時の宮さんは、楽しそうに燃えてましたね。当時、アニメの仕事を干されてて、しばらくぶりじゃないですか。結局、４８テレコムを辞めて悶々としたところで、マンガ描きませんかって、４９アニメージュの鈴木さんから話が来て。それで鈴木さんの尽力で、それが映画に。もう起死回生のチャンス。相当緊張しながらやってて良かったですよ。

大泉　当てるつもりというところで？

庵野　いや、映画ができればいいやって。アニメ作れるだけでも良かったんでしょうね。

　宮さんのアニメって、『ナウシカ』まで当たったことが一回もないんですよ。『５０カリオストロの城』も大コケですから。

大泉　あれはコケたんですか。

庵野　コケたんですよ。客、全然入ってないです。一部、コアなファンが騒いだだけで、興行的には大失敗です。『ナウシカ』からある程度数字が出て、そのあと売れ始めて今は順調ですよね。ようやく時代に乗ったんでしょう。





第二の師匠





大泉　それで宮崎さんという人を見て、どういうふうに思ったんですか。

庵野　いや、すごい人です。僕の第二の師匠です。

大泉　どういうところが一番？

庵野　いや、もう全部ですよ。宮さんはすごいです。アニメーターとしては、天才ですね。スピードもアイデアもテクニックも。あとは思想的な部分とか、やっぱりすごいと。

大泉　思想的な部分がすごい？

庵野　物の作り方とか、考え方とかからスタートして、技術的なものまで。僕はかなり影響を受けてます。

大泉　あの人の『ナウシカ』を読んで僕が驚いたのは、僕は当時哲学科だったんですけれども、いろんな哲学書に匹敵するぐらいの世界観をアニメで作りあげてしまう。それにびっくりしたんですね。たとえば「５１腐海」みたいなものとか。

庵野　思想的なものは５２高畑勲さんの影響が大きいと思うんですけれども。

竹熊　本質的にエンターテイナーでしょう。宮崎駿という人は。

庵野　ええ。思想的なものは、もともと高畑さんだと思いますね。だからやはり『５３ホルスの大冒険』が原点だと思うんですよ。あれを高畑さんが監督して、宮崎さんが重要な役割で抜擢されて。

竹熊　労働組合映画ですものね。社会主義万歳映画。

庵野　そういう部分というのが、ダッと入り込んでると思うんです。

大泉　その高畑さんの本の中で、要するに宮崎駿という人は、お姫様を助けに行く、エスコート・ヒーロー・ストーリーしかできない。一種の『ドラクエ』だよね。延々それしかできないんだと書いてありましたね。僕も宮崎さん本人に、なんでそういうのしか作らないんですかって聞いたことがあるんですが、それは、しようがないですとか言ってたけど。

竹熊　これはちょっと僕の、まったく部外者の勝手な印象で、間違ってるかもしれないんだけれども。山賀さんと庵野さんの関係というのと、高畑さんと宮崎さんの関係というのが、ひょっとするとシンクロするのかなという感じがあるんですけど……。

庵野　ちょっと似てますね。

竹熊　山賀さんって、コンセプトの人でしょう。それで庵野さんの本質はエンターテイナーかなっていう気がして。ちょっと似てるかなと、僕は思ったんだけど。

庵野　ええ、僕は装飾の人間です。枝葉の人間です。山賀は根幹です。幹の人間です。山賀は幹がないと作れないし、僕は枝葉から入る。枝葉だけだとなんか形がアレだから、幹が欲しいと。山賀は幹だけだと誰も見てくれないんで、枝葉が欲しいということですね。





『火垂るの墓』





竹熊　宮崎さんと仕事をしたのは、『ナウシカ』の時だけなんですか？

庵野　ええ、一緒に仕事をしたのは、『ナウシカ』です。それ以降、プライヴェートでは会ってますけど、仕事として誘われたのは、『５４となりのトトロ』ぐらいです。『トトロ』の時、僕は失業してたんで、なんか仕事ないかって言って。それで『トトロ』のオープニングと、高畑さんの『５５火垂るの墓』のメカシーンと、どちらをやるかってことになって。僕は『火ほ垂たる』を選んだんです。

竹熊　ああ『火垂る』と『トトロ』は同時上映の二本立て進行でしたものね。

庵野　高畑さんと仕事をするのはこれが最初で最後かも知れないと。やっぱり一生に一度は高畑さんと仕事をしようと思って。それで高畑さんに紹介してもらったら、ちょうど観艦式のシーンがあいてたんですよ。「船はどうですか」「船は大好きです」「じゃあお願いします」と。

竹熊　あの闇の中に満艦全飾の軍艦が。バーッと登場するシーンですね。

庵野　ええ。あそこと花火のシーン。あとは飛行機のカットをちょっとぐらい。でも一〇年早かったです。高畑アニメは全然難しかったですね。一カ月ぐらいプレッシャーだけで、とても描けなかった。宮さんはもっと気楽にできたんですけど、高畑さんは厳しかったですね。正座してやんなきゃいかんなと。まず船の資料を集めるところからです。昔の資料を集めて、どこまで描けるか。そういう意味では、ラッタルの数まで合わせたんですけれども、できあがったフィルムを見たら、なんと真っ黒（笑）。

竹熊　船のディテールまでちゃんと描いたわけですね。

庵野　ラッタルとか。手すりの数まで合わせたんです。可能な限り時代考証に合わせようと。苦労したのにな、チクショウ。その艦の５６ハーモニィ処理はシンちゃんの嫁さんがやったんですけど。

竹熊　あの５７樋口真嗣さんの奥さんが塗り潰した（笑）。

庵野　本人は美術監督の山本さんの指示で仕方なくやったと言ってますけど、満艦飾にライトが点いてて真っ黒はないですよね（笑）。

竹熊　せっかくの苦労がってやつですよね。





高畑勲という監督





竹熊　高畑さんとは、会話とかは。

庵野　若干。そんなには立ち入ったことは。

大泉　宮崎さんのほうがフレンドリーなんですね。そういう意味では。

庵野　ああもう全然。いや高畑さんも、いつもニコニコしてて、世間話とかするんですけどね。でもあの笑いの奥にあるものは、本当に怖い。高畑さん、極悪人ですね。僕が知る限り、一番だと思いますよ。

竹熊　ケツの毛まで抜くような感じですか。アニメーターの。

庵野　いや、もっと戦略的なとこですね。人を人と思わない。冷たいというか、計算の人ですよね。

竹熊　高畑さんの作品って完璧でしょう。いつもすごいなと思って見るんだけどさ、でも、冷たさが出てるよね。

庵野　冷たいですよ。突き放したところで作ってますね。作品というのを。あれがいいですね。

竹熊　すごいけど、面白くないよね。高畑さんのは（笑）。

大泉　面白くない。見てショックは受けるんだけど、よくここまでと思うんだけど、次を見る気が起きないっていう、そういう感じですよね。

竹熊　ただ『火垂るの墓』は、今でも気になりますね。異様な映画でしょう。

庵野　あれは高畑さんの冷たさが、面白さになってる。皆が忘れたがってる部分をわざわざフタを開けて見せてるようなところもいいですね。

竹熊　何が悲しくて、こんな悲惨な映画をって（笑）。実は俺、『トトロ』を二〇回見てるんですよ、劇場に通って。

大泉　なぜ、そんなに（笑）。

竹熊　というのは、子供の反応が面白くて。途中からもう映画は見てなくて、会場の子供の方を見てたの。でも同時に『火垂る』も見なきゃなんないと思うと（笑）。

大泉　見ないで逃げてくりゃあいいじゃないですか。

竹熊　『火垂る』の時はしようがないから、始まったらロビーで本読んでた（笑）。映画終わるとさ、ものすごい顔して親子連れが出てくんの。子供は恐怖で顔が引きつってるし、ロビーで泣き崩れて動けなくなった母親も見た。あれは臨死体験映画ですよ。今から考えるととんでもないですよ、あの『火垂る』と『トトロ』の二本立ては。

庵野　辛いですよね。アニメを見て、辛いと感じるところはすごいですよね。だって絵なんですよ。絵を見て、なんでこんなに辛い思いをしなきゃなんないんだろうと思わせる。それが高畑さんのすごいとこですが。いわゆる善人と呼ばれる人は、演出には向かないと思うんですよ。人を騙だましてなんぼの商売ですからね、監督とか演出って。僕の知る限り、面白いフィルムを作ってる人はすべからく悪人ですね、こりゃもう例外なく（笑）。





宮崎駿の『王立宇宙軍』観





竹熊　宮崎さんに言われて、今まで残っている言葉は、何かあります？

庵野　確か毛沢東の言葉だと思うんですけれども。物をなし遂げる三つの条件っていって、若いこと、貧乏であること、あとは無名であること。この三つが揃っていればできるというのを言ってましたね。僕らが『５８王立宇宙軍』を製作した時も、その意味で応援してくれたんです。若い連中がそういうことをするのはけっこうなことだと。あがったものを見て怒ってましたけど（笑）。

大泉　何が怒らせたんですか。

庵野　宇宙軍の将軍が、最後に（ロケット打ち上げを）あきらめるじゃないですか。ここに宮崎さん、ひっかかったんですよ。「いや、あそこであきらめないんだよ」って。

竹熊　いかにも宮崎さんですね。

庵野　まあ、監督の山賀から見た中年のおじさんっていうのは、最後にあきらめる連中なんだってことですね。

竹熊　それは山賀さんから見たおじさん世代の、典型的なダメさを描いたわけでしょう。

庵野　宮さんは、俺はそうじゃないと（笑）。それから宮さんって、ああいう実写風のロケットが許せないんですよ。実際にある形のロケットなんかつまらないって。根がマンガ映画の人だから、山に滑走路を作って打ち上げるとか、ガーッと、誰も見たこともないような方法で打ち上げろって言うんですよ。そうしたら山賀は「そんなのマンガじゃないですか」って（笑）。

竹熊　山賀さんは、マンガはやりたくなかった。映画がやりたかったわけでしょう。

庵野　ええ、マンガだと思われたらおしまいだと。「なんだアニメじゃん」っていうのが、山賀にとっての一番怖い言葉だったと思います。





ガイナックス結成





竹熊　その『王立宇宙軍・オネアミスの翼』を製作するために、岡田さんや武田さん、山賀さんらダイコン時代の仲間

が中心になって、５９ガイナックスを作るわけですよね。それで庵野さんは、『王立』の最初から参加したんですか。

庵野　途中からです。企画段階ではビデオの話でしたね。僕が聞いた時は。

竹熊　６０ＯＶＡ？　それで、会社もそれ用に作るみたいな？

庵野　まだ、そこまではなかった。６１バンダイに企画を持って行って、ビデオでやろうかって。山賀が監督で。

竹熊　どこらへんから、あんな予算八億とか、自分たちの会社作るとか、話がふくらんじゃったんですか。

庵野　どこからでしょうね。まあ、バンダイが当時、勢いに乗ってたんですね。山科社長が映画やりたかったということでしょう。これからは模型だけじゃダメ、オモチャだけじゃダメだから、映像事業に取り組まなきゃいけないということで、打ち上げ花火が欲しかったんですね。

竹熊　バンダイと交渉したのは岡田さんになるわけですか？

庵野　山賀と岡田さんだと思いますけれども。バンダイの渡辺さんと話してましたね。それでバンダイが乗り気になって、どんどん話が大きくなっていった。

竹熊　僕は『王立』を見た時にすごいショックを受けたんですよ。映画自体の出来もショックだったけど、それ以上に自分と同い年ぐらいの人間が、ああいうことをやったというのが大きかった。確か山賀さん、あの時点で二四歳くらいでしょう？　こないだまで八ミリ作ってた人達が、いきなり劇場映画、しかも億単位の金つかって、坂本龍一に音楽やらせてさ。そりゃないだろうと（笑）。山賀さん、それ以前は映画監督としての実績はないですよね。

庵野　ゼロです。６２フィルムの面積が一六倍になったと喜んでましたよ（笑）。

竹熊　それが、いきなり予算八億。

庵野　時代というか、アニメ自体の勢いがあったと思うんですよ。『ガンダム』が一段落して、『ナウシカ』があって。

竹熊　『ナウシカ』と同じ年（八四年）に押井守さんも『６３ビューティフル・ドリーマー』でブレイクする。確かにありましたね、盛り上がりが。

庵野　それにも乗っかってたっていうのがあります。

竹熊　でも『王立』はあれですね。企画開始は八四年だけど、完成したのは八六年ですよね。

庵野　ええ。一年半ぐらい設定期間とか、そういうのが。まあ、そういう作業に一年半をかけたというのが大きいと思うんです。『王立』は山賀の方法論で作ってます。他の人間は手伝いでしかないです。フィルムのどこを切っても山賀ですよ。

竹熊　それで庵野さんは、ロケット打ち上げシーンを担当されて。

庵野　あと戦闘とか。まあ、特技監督みたいなものですね。

竹熊　何百枚もの氷の破片を、一枚一枚描いていくという。若い奴がいま見ると、たぶんＣＧ使ったと勘違いするんじゃないかな（笑）。

庵野　そこだけ独立して、僕がコンテ切ってということをやったんですけれど。まあ、アニメーターとしての自分は『王立』がピークでした。若さだったんですね。いま見たら、そう思いますね。あの時代だったら、たぶんああいうシーンをやらせたら、僕が世界一だと思う。アニメーターとしては、あれが旬でした。





解散しなかったガイナックス





大泉　その頃、竹熊さんは？

竹熊　僕はもう物書きはやってました。ただもう悶々とね。僕は、山賀さんや庵野さんに仲間がいるっていうのがうらやましかったですね。

庵野　まあ執筆は個人作業ですものね。でも、映画は個人ではできない。

竹熊　もちろん庵野さんは、仲間がいることの大変さを嫌というほど味わっていると思うんだけど。

大泉　竹熊さんはその時、例えば奮い立ったとか、そういうことはないんですか。

竹熊　正直言うと嫉妬しましたよ。それで俺には何ができるだろうかってことで、でも、なんにも見えなかったですね。

大泉　それから『６４サルまん』になったわけ？

竹熊　直接は関係ないですけど。『サルまん』での僕と相原君は、あくまでも一ユニットですから。プライヴェートはともかく、仕事としては、あの企画限りの関係。最初からそういうイメージがあったんです。

庵野　うちもそんなですよ。

竹熊　幻想はなかったですか？　みんなでずっと映画をやっていくという。

庵野　なかったです。『王立』の時も、映画が完成したら、会社を解散するっていう話だったんですよ。

大泉　それが解散できなくなっちゃったわけですか。

庵野　完成しても、会社は存続するということになったんです。それで僕は、一回離れたんです。「話が違う」って（笑）。それで距離を置いてつきあおうと。アニメそのものに対する挫折みたいなのも手伝って、その年はほとんど仕事をしなかったですね。

竹熊　フーテンみたいな感じだったんですか。

庵野　フーテンです（笑）。年収七〇万だったかな。なにしろ仕事しなかったんで。『ナウシカ』が終わったあとは、仕事先のスタジオを泊まり歩いていたのと、あとは女の子の部屋に転がり込んでとか。人に迷惑ばかりかけてましたね。で、『王立』の時は、さすがに部屋を借りたんです。練馬にアパート借りて、その時から借りっぱなしで、今でもめったに帰りません（笑）。





『トップをねらえ！』





竹熊　『６５トップをねらえ！』でまたガイナックスに戻られる。あれは庵野さんの商業初監督作品ですよね。

庵野　『トップ』は、まあ四重人格ですよね。あれは、山賀と岡田さんとシンちゃんと僕と、この四人の合作で。ドラマ担当の山賀と、ＳＦ担当の岡田さんと、ギャグ担当のシンちゃん、かっこいい担当の僕という。それを料理して客に出せるようにするのが、僕の仕事だったんで。でも、僕は最初、やる気がなかったんです。ないどころか嫌悪してました。

竹熊　ああいう企画を？

庵野　ええ。企画をです。僕も全然知らないうちに進んでいた企画だったんで。終わってから見た６６イメージボードがあるぐらいですから。でもまあ、結果としては、やって良かったですけど。

竹熊　その前の『王立』が、商業的にはコケたわけでしょう。それでその後、ガイナックスとしては『トップ』でまったく逆のことをやったわけじゃないですか。やはり意識的な転換なんですか？　今度は売れることをやってやろうぜみたいな。

庵野　『王立』の作業中に、岡田さんがもうこの企画を進めてたんですよ。終わる前に次の話をしてるんで、話が違うと思ったんです。僕にしてみれば、あれ、終わったら解散するんじゃなかったのって。

竹熊　あれは岡田さんに言わせると、要するに『王立』を作ることですごい借金ができてしまうことが目に見えてたからだと。

庵野　僕はそれでも（会社を）潰せば良かったと思いますよ。スタッフも優秀だったので、もったいないとも思ったんでしょうね。だから残したんでしょう。『トップをねらえ！』というのは、最初は軽いつなぎの企画だったんですよ。某所にグロスで下請けに出しちゃって、それでトップオフで金だけ取ろうっていう。

竹熊　そういうやり方は嫌だったと。

庵野　イヤっスね。全然やる気なかった。

竹熊　でも作品はウケましたよね。

庵野　ウケましたね。

竹熊　それを見て、別になんとも？

庵野　いや、つまり、僕がやる以上、自分の納得できる方向に持ってっちゃった。企画自体を軌道修正してもらったんです。

竹熊　そこまで嫌った企画なのに、どうして監督する気になったんですか？

庵野　上がっていた山賀の二話の脚本を読んで泣いたんですよ、うかつにも（笑）。いや、いいホンでしたね。完成したフィルムもあのホンには勝てなかった。自分の力不足を痛烈に感じましたね。監督やらせてくれと決心したきっかけはそのホンなんですよ。これだけのホンがありながら監督も不在のまま適当に外に出して作ろうとしている。当初、監督予定だった人も「こんな状況じゃやるだけ損だ」と降りてたんですね。僕も監督やりたいと決心するまでは、悶々と悩んでました。前の『帰ってきたウルトラマン』の時の失敗とかあるし、性格的にも責任感とかないし監督には向かないんですよ。それを押しても、とにかくやろうという何かが自分の中にできたんでしょうね。『トップガン』見てなかったのに（笑）。

　要するに会社としては、監督に誰かを立てて、あとはグロスで下請けに出して安くあげようという考えだったんです。作品ごとどこかに押し付けてしまえと。でもそれって、他の会社がやってるのとまったく同じじゃないですか。

大泉　それが現場の貧困を生んでるんですよね。

竹熊　そのへん実は当時の社長だった岡田さん本人に聞いてみたことがあるんですが、「庵野は会社を経営するということの困難さを、まったく理解していない」って返事でしたよ。

庵野　理解してしまったら経営者になってしまいますよ（笑）。自分がそうなったら、守りのフィルム作りになってしまう。（サラリーマン的な）会社のためのフィルム作りって面白くないんですよ、やっぱり。そういうのを覆すために僕達は『王立』をやったんじゃなかったんですか。なのに、そういうやり方に、もう二作目にして成り下がる。それも嫌になって、いったん（ガイナを）離れたんですけれど……。

竹熊　最初は本当にチープな企画だったわけですね。じゃあ下請けに押しつけずに、ガイナックス・オンリーの仕事に持って行ったというのは、庵野さんですか。

庵野　オンリーというか、メインの仕事に、ですけど。まあ、あんな大変にする予定は、なかったんですけどね。

竹熊　とても一〇〇〇万とかそこらの予算のフィルムには見えないですよ。かなりオーバーしたわけでしょう。

庵野　予算のオーバーというか、超過による持ち出しはあったんですけど、それ以上にスタッフの頑張りですね。みんな、もらっているギャラ以上の仕事をしている。それがフィルムを制作予算以上のものにしてしまっているんですけどね。いろんな矛盾を内包する問題なんですけど。難しいっスね、これは。





アニメは大赤字





竹熊　それでそのあとがＮＨＫでの『６７ふしぎの海のナディア』ですよね。

庵野　『ナディア』は本当にいろいろあって、なかば行きがかり上というやつですね。監督やる人が降りちゃったし、（会社として）もう仕事は受けちゃったんで、これはやらなきゃいけない。僕は『トップ』で会社に借金作らせちゃったから。まあ、申し訳ないっていうのもあって。それで結局、『ナディア』でまた大赤字になりましたけどね。

竹熊　ヒットしたのに大赤字ですか。

庵野　お金入ってこないんですよ。ウチには（著作権）もなにもないですから。ＮＨＫからウチまでの間にいくつも会社が入っているので、いわゆる下請け、孫請けなんですよ。それで、あれもサービス過剰な作品なんです。本来のギャラ以上に作っていますね。

竹熊　もっと思い切り手を抜いて作らないと、バカをみてしまうと？

庵野　経済的にはですね。あれでなんか、ガイナは大儲けとか言われてますけれど、大赤字。

竹熊　聞くところによると、庵野さんのポケットマネーで作り直した回があるとか。あれほんとなんですか。

庵野　ああ、一本あります。二週間で自腹で作りました。まあコーヒーおごって原画を一枚頼むとか、そういうものですけど。ごめんちょっと、ここ直してくれないかなって。そうやって。

竹熊　よくやってくれましたね。

庵野　もう、ありがたいです。もうタダ働きに近いですから。あとは財布から二〇〇〇円出して、いまちょっと払うからここやってくれないかなあとか、それだけです。一本、色指定まであがってた原画を全部捨てちゃいましたから。いくらやっても、経済的には毎回辛かったですね、スタッフは。ホント感謝しかないというか申し訳なかったです。会社としてもアニメ作るたびに赤字なんで、もうアニメ作るのやめようという意見もあったらしいんですけど。ゲームだけで充分だと。ただし、もしそうなっていたら僕はガイナを出ていったでしょうね。





『蒼きウル』の凍結





大泉　それでそのあと『６８蒼きウル』の企画が立ち上がるわけですね。

庵野　『ナディア』のあと、いろんな企画が、出ては消え、出ては消え。色々あったんですけれども、どれも僕がやる気にはならなかった。

竹熊　もう『トップ』とか『ナディア』みたいなことはやりたくないと？

庵野　そうですね。でもあがる企画は、全部その路線なんですよ。『６９オリンピア』という企画もあったんですけど、結局ダメでしたね。責任をとる人間が最終的にいなくなって。

竹熊　企画は立ち上がるけど、実行まで持って行く人がいなかったと。

庵野　ええ、責任者というのは心中覚悟じゃないとできないんです。この企画と心中しようというほど思い入れを込めないと、ウチではできない。にっちもさっちも行かなくなったところで、山賀と組んでやりましょうというのが、『蒼きウル』です。

竹熊　『王立』の後日談ですよね。

庵野　山賀が『王立』でできたものにケリをつけたかったというのがあった。今の自分にケリをつけたいという。

竹熊　山賀さんは『王立』以降、ずっと監督をやってないわけですよね。

庵野　そうですね。その間の自分にケリをつけるんだと。それで山賀が原作と脚本とプロデュースで、僕は監督という感じですよね。でも諸般の事情で、金銭的行き詰まりから、凍結になっちゃって。

大泉　あれは何億ぐらいの見積りだったんですか。

庵野　なんか試算すると何十億になっちゃって（笑）。

大泉　なるほど。『王立』も八億ですものね。

庵野　『王立』も八憶じゃあ、本当はできない作品なんですよ。それでも安く作っちゃった。それで『ウル』の場合、子供もいるようなスタッフがいるのに、もうあの値段じゃさすがにできない。７０ジブリ並のものを作ろうと思ったら、ジブリ並の金がかかるんですよ。

竹熊　金銭的に行き詰まったというのは、バブルがはじけたということですか。

庵野　そういうわけです。タイミングの問題もありました。

竹熊　でも実作業が始まってからはじけたら大変だったですよね。企画段階で良かったですよね。まだ。

庵野　いや、実際にもう始まってたんです（笑）。Ｂパートまで絵コンテできてて、Ａパートは原画まで入ってます。

竹熊　それで凍結は辛いですわな。

庵野　持ち出しですからほとんど。億単位でやってましたから。

竹熊　それで『ウル』が凍結になって。

庵野　そこで初めて、ああもう自分でやるしかないんだと。

竹熊　「逃げちゃだめだ」っていうのは、そういうことなんですね。

庵野　まあそうです。自分で最初からやるしかない。それまでの僕は岡田さんとか山賀とか、常に他人の敷いてくれたレールの上に乗っかってたんで。そういう意味では『エヴァ』が初めて、僕のオリジナルと言える作品なんです。





　八三年の暮れ、庵野はアマチュア時代のフィルムを手土産にアニメ制作会社トップクラフトの門を叩いた。当時この会社は宮崎駿監督『風の谷のナウシカ』を制作中であり、有能なアニメーターを募集していたからである。

　庵野の才能は宮崎の目にとまり、大胆にも、この素人同然のアニメーターに重要なシーンを任せる決断を下す。『ナウシカ』の有名なクライマックス、巨神兵の登場シーンである。そして大役を見事に務めた庵野は、一躍トップ・アニメーターの仲間入りをする。





　一方、岡田と山賀は、オリジナルの商業アニメを制作するため企画書を片手にバンダイと交渉を開始した。それは当初ビデオ専用の企画に過ぎなかったが、バンダイが乗り気になり、企画は一挙に巨費を投じた劇場作品にグレードアップする。これに伴い、株式会社ガイナックスが発足した。

　八七年に公開された『王立宇宙軍・オネアミスの翼』は、当時弱冠二五歳であった山賀監督による異世界が舞台のファンタジーであり、同時にリアルな青春映画でもある。その世界（架空の惑星）は地球でいえば一九三〇年代程度の文明レベルという設定であり、他国との戦争状態の中、初の有人宇宙船を打ち上げるために奮闘する若者たちの姿を描く。





　練りに練った設定と脚本、それ以前はほとんどアマチュアだったスタッフの情熱のほとばしった入魂の作画と、巨額の制作費（約八億）、坂本龍一の音楽、ハリウッドでのプレミア公開も話題になった。庵野はこの作品でメカ作監として活躍、ド迫力の戦闘シーンやクライマックスのロケット発射シーンを担当してその評価を決定づけた。

　しかしスタッフの情熱に反して『王立宇宙軍』は不入りであり、会社は借金返済のために苦闘を強いられることになる。一時は庵野も会社を離れ、高畑勲の『火垂るの墓』に参加した。





　庵野が再びガイナックスに戻るのは、八八年のＯＶＡ『トップをねらえ！』の監督としてである。当初予定の監督が降番してのリリーフ的な起用だったが、庵野は持ち前の完全主義を発揮し見事に作品を完成させる。

　宇宙怪獣との戦闘で父を失ったヒロインが厳しいコーチのシゴキで立派なロボット乗りとなり、勝利する。ＳＦ・アニメファンならではのサービス満載の一作であり、後半二作の完成度の高さと、驚愕のラストシーンは語り草となっている。ＯＶＡの最高傑作と評するファンも多い。「美少女キャラによる根性と浪花節のロマン」という独特のムードや父親への拘りは、第二作『ふしぎの海のナディア』（九〇年）にも通底する庵野秀明の体質である。





　ＮＨＫで放映された『ナディア』は、ベルヌの『海底二万哩』をベースとしたオリジナル作品。テレビの制約をかいくぐり、庵野の拘りが色濃く出た作品に仕上がっている。きまぐれなヒロイン・ナディアの魅力とハードなメカ描写がファンの人気をさらった。





４１

作家・高千穂遙、メカデザイナー・宮武一貴らによって七〇年代初頭に設立されたＳＦクリエイター集団。『宇宙戦艦ヤマト』のメカデザインやＳＦ設定を担当して有名になった。マニア企業の元祖といえるだろう。





４２

ファンの間で「板野サーカス」と呼ばれる、三次元的かつ超絶スピードのメカバトルシーンで名を轟かせた天才アニメーター。『伝説巨人イデオン』後半や、『超時空要塞マクロス』でのミサイル飛び交う空中戦が有名。ＯＶＡ『メガゾーン２３パート２』などの監督も務める。





４３

『機動戦士ガンダム』映画版は、八一年春から八三年春にかけて三部作で公開された。基本的にはテレビの総集編だが、部分的に新作シーンが加えられた。特に第三部『めぐりあい宇宙編』は、八割方がリメイクされたオール新作に近い内容。第一作の公開前には、新宿アルタ前広場で「アニメ新世紀宣言」と銘打ったイベントが開かれ、一万五千人余りのファンを動員した「事件」となった。





４４

八四年三月公開。八二年から『アニメージュ』誌上で連載されていた宮崎駿の同名漫画の、本人の監督・脚本による映画化。最終戦争から千年後の世界の物語に仮託し、エコロジー的な視点で文明と人の在り方を照らし出した。マンガ映画を標榜する宮崎作品としては異例な、ストレートに重い内容。

前作『ルパン三世・カリオストロの城』の商業的不振以来沈黙を守っていた宮崎が、徳間書店のバックアップを得、復活を賭けて制作した。『ナウシカ』の成功は、彼の名を広く一般に知らしめ、以後監督作がコンスタントに制作されるようになる。





４５

『風の谷のナウシカ』に登場する、「火の七日間」で使用され、世界を滅ぼした巨大な人型の生態兵器。

映画では、不完全体でラスト近くに登場。登場シーンこそ短いが、庵野秀明入魂の作画により見事に映画のクライマックスを支えた。

爛れた皮膚をドロドロ溶かして白骨化しながら熱線を吐き、オームの大群を爆破した。





４６

『風の谷のナウシカ』に登場する、トルメキア王国の第三王女。親族同志の血まみれの権力争いという俗世の中で健気に頑張るクシャナは、どこか浮き世離れしたナウシカとは対称的。





４７

まだ宮崎駿のスタジオジブリが発足していなかったため、『風の谷のナウシカ』の制作母体として間借りした制作スタジオ。





４８

東京ムービー新社内の作画スタジオ。新人アニメーターの養成機関的な性格を持っていた。





４９

鈴木敏夫。元『アニメージュ』編集長。宮崎にマンガ連載を依頼し、『風の谷のナウシカ』誕生のきっかけをつくる。現スタジオジブリ・プロデューサー。





５０

七九年一二月公開。『ルパン対複製人間』に続く劇場長編第二作にして、宮崎駿第一回劇場監督作品。

宮崎と作画監督大塚康生コンビによる熟練の技が爆発した冒険大活劇マンガ映画。





５１

『風の谷のナウシカ』に登場する、最終戦争の影響で生じた増殖し続ける巨大菌類の森。有毒な胞子を飛ばし、周辺部の人間の生活を脅かすが、実は汚れた大地を浄化するはたらきをもっていた。





５２

三五年生まれ。五九年東映動画に演出助手として入社。初監督作『太陽の王子ホルスの大冒険』の制作を通じて宮崎駿に出会い、幾多の傑作を生み出す。監督作に『アルプス少女ハイジ』『母をたずねて三千里』『火垂るの墓』『おもひでぽろぽろ』。活劇体質の宮崎に対し、高畑は深い人間洞察による純文学肌の作風が多い。





５３

『太陽の王子ホルスの大冒険』。

六八年七月公開。深沢一夫の戯曲『チキサニの太陽』を原典とした作品。高畑勲演出のもと、共同体と労働の意味、団結の困難と尊さを描き出した。

東映動画における激しい労働争議を背景に、何回も制作が中断されながら、自主参加のスタッフ達によって議論を尽くし、三年余りの歳月をかけて完成された。これは高畑・宮崎らにとって決定的な原体験となり、二〇年後、若きガイナックスのスタッフの熱意によって制作された『王立宇宙軍』にも、深い共感の発言を寄せている。





５４

八八年四月公開。その年の映画賞を総嘗めにした宮崎駿の代表作である。昭和三二年頃の関東近郊の農村を舞台に、都会から引っ越してきた幼い姉妹と、自然の精である森のモノノケ達の交歓を描いた。





５５

『トトロ』と同時公開された高畑勲監督作品。野坂昭如の直木賞受賞作を忠実にアニメ化。太平洋戦争末期の神戸を舞台に、過酷な状況の中で世界に見捨てられていく兄妹の姿を、アニメにおけるリアリズム表現の極致ともいうべき描写力で淡々と追い、平和論云々というレベルではない、人間の本質的な酷薄さに観客を立ち会わせていく。





５６

セルに直接色を塗り重ねて陰影等をつける技法。





５７

六五年東京生まれ。一〇代の頃から『さよならジュピター』『ゴジラ』などの東宝特撮映画の現場に参加。ダイコンフィルム時代の庵野らと出会い、『八岐之大蛇の逆襲』では特殊美術を務める。ガイナックス設立後は、『王立宇宙軍』助監督、『トップ』で絵コンテと設定、『ナディア』監督と主たる作品に参加。特撮監督としては『ガメラ・大怪獣空中決戦』『ガメラ２』『帝都物語』などで高い評価を得ている。





５８＆５９

「ナウシカからナディアまで」





６０

オリジナルビデオアニメーションの略。テレビ放映や劇場公開を想定せず、初めからビデオソフトとしての販売を目的に制作されたアニメーションのこと。ちなみに世界初のＯＶＡ作品は、押井守監督の『ダロス』。





６１

ヤマト・ガンプラで当てて以来、プラモデル・ＯＶＡ・ゲームを一手に引き受けるオタク文化のスポンサー的企業。映画進出第一回作品が『王立宇宙軍・オネアミスの翼』。





６２

三五ミリフィルムは八ミリフィルムのちょうど一六倍の面積がある。





６３

『うる星やつら２・ビューティフルドリーマー』。八四年二月公開。

高橋留美子原作で、押井守の出世作でもある。「外界から閉ざされた友引町で、エンドレスに学園祭前夜の喧騒が繰り返される異常な世界が、実はラムの夢の中だった」という、原作の世界観をパロディーにしたような自己言及的な内容で、オタク世代に衝撃を与えた。





６４

『サルでも描けるまんが教室』。

相原コージ・竹熊健太郎によるマンガでマンガを笑いものにした自己言及的ギャグ作品。八九年から二年間『ビッグコミックスピリッツ』に連載された。





６５

「ナウシカからナディアまで」





６６

アニメーションを制作にするにあたって、その作品の世界観やキャラクター、見せ場のシーンなどを説明するために用意される彩色スケッチ画。





６７

「ナウシカからナディアまで」





６８

「ガイナックスのスタートであった『王立宇宙軍』を、現在のわれわれならどのようにとらえることができ、かつ作品に反映できるのか」との命題と共に山賀博之から出された企画。『王立』の五〇年後の世界を舞台にしたスカイアクションである。現在は作業凍結中だが、『エヴァ』以降のガイナの、そして山賀監督一〇数年ぶりの満を持しての新作として、否が応にも期待は高まる。





６９

「監督である庵野君が最も構築しやすい世界を舞台にすればどうか」との意見に沿って生まれた企画。『トップ』路線をより押し進めたトレンディーなロボットアクションものだったが、庵野監督はじめ現在のスタッフ自身が思い入れられるものとはならず、立ち消えとなった。





７０

宮崎駿と高畑勲を主宰者として、八五年に徳間書店が設立したアニメーション制作スタジオ。『天空の城ラピュタ』以降の二人の作品のほか、近藤喜文監督の『耳をすませば』、テレビスペシャル『海がきこえる』などを制作した。





大泉　７１綾波レイを見てると、オウムの女の子を思い出すんですよ。要するに麻原というグルに依存しているわけじゃないですか、全員が。

竹熊　一途でね。固い殻のような心を。

大泉　まったくそうです。それで、置き換えということで言うと、綾波レイは、しか庵野さんのお母さんみたいな人っていうふうに考えちゃっていいんですか。

庵野　なんか違いますけどね。

竹熊　前に付き合ってた女性っていうのが、そういうイメージがあるとか、そういうこともないですか。

庵野　ないですよね。まあ、レイは自分の深層心理に一番近いんじゃないですかね。自分じゃよくわからないんですが。……実は僕、レイって、全然思い入れないんですよ。

竹熊　え？　そうなんですか？

庵野　ええ。僕の中になんの思い入れもない。まあ分裂症の象徴というふうに、野火さんは書いてますけどね。実際そうしたかった部分もあります。

竹熊　でも世間のファンが受け入れる、それこそ一番のキャラクターがレイでしょう。やっぱり僕もレイで最初引っ掛かったし。

大泉　それはそうですよ。７２林原めぐみさんの声も最高だった。

庵野　でも、レイが一番よくわかんないですね。あと、興味がそんなにないというか。意識的にそうしてたところもあるんですけどね。積極的に思い込みを排除しょうとしてました。自分の中の一番プリミティブというか、コアというか、ピュアな部分を出そうと。

大泉　レイは、無意識のうちに埋め込まれちゃって、言語が及ばないのかな。

庵野　『エヴァ』を作ってる最中でも、　バッと気がついたら、僕、忘れてましたからね。彼女の存在すら。七話なんて、思い出してレイのシーンを一カット足したぐらいです。全然思い入れがなかったですね。そこが良かったんだと思います。八話なんか、出て来ないですからね。一カットも出て来ない。

竹熊　そうか。それは面白いですね。そうとはとても見えないところが。

庵野　うーん。ひとつには、僕の計算ミスもあるんです。７３六話が早過ぎたんですよ。

竹熊　六話が早過ぎた？　ああ、第三新東京決戦の。あそこで最終回みたいな盛り上げになっちゃった。

庵野　『エヴァ』のキャラクターを作ってる時に、７４アスカの場合は、「あんた、バヵ？」と「チャーンス」というセリフで、ああこれでイケるって思ったんですけど。レイの場合は、六話の「あなたは死なないわ。私が守るもの」っていう、このセリフと。あとは最後でレイの「どうしたらいいかわからないの」っていう台詞に、７５シンジが「笑えばいいと思うよ」って言った時に、レイが笑顔を見せると。ああこれでイケるという気はしたんですよ。この二点で、綾波レイというキャラクターはできたんです。でも後になって考えたら、「しまった！」と。つまり、そこでシンジとコミュニケーション取っちゃったら、終わりじゃないかと。その瞬間に僕の中で、レイって終わっちゃったんですよ、一度。

竹熊　描き切っちゃった。

庵野　そうなんです。笑ったところで、もうおしまいじゃん、このキャラクターって。

竹熊　なるほど。だからあの後、一歩後退した感じがするんですよね。人間関係が。

庵野　ええ。円谷の『帰ってきたウルトラマン』で、郷とＭＡＴの仲間が仲良くなって、これで他人とまたうまくいけるのかなと思ったら、次の週には、また仲違いからスタートってやつと同じですよね。僕の他人に対するコミュニケーションの不信感とか、恐怖っていうのが出ていますね、その辺は。





葛藤





竹熊　だから『エヴァ』のギクシャクしたところって、確かにありますよね。シンジがちょっと心開いたかなと思ったら、また暗い少年に戻ったりとか。レイもそうですよね。　一歩進んで、二歩下がるみたいなところで、ずーっと来てるんだよね。

大泉　それで、心を開くようになっていった綾波を、いっぺん殺すじゃないですか。あれは良かったですけどね。新しい綾波が登場したら、また冷たい、切ない感じの女になってて。

竹熊　僕はてっきり、そこを含めて庵野さんの計算かと思ってたんですよ。つまりクローン人間であるレイというのは、どうせ殺せるキャラなんだと。だから主人公がハッと気がついたら、（明るくなりかけた綾波が）また元の暗い女に戻ってるのは、実はもう一人の綾波レイで、レイというのはもともと実体のない、クローン人間だというオチになる。その時のシンジや視聴者のショック。そこまで考えてやったのかなと思っちゃったんだけど。

庵野　ああ、それに近いものはありますね。最初っから一回殺す予定でしたから。

竹熊　せっかくシンジとの関係が進展したのに、また元に戻っちゃう。ショックだよね。これは。

庵野　今まで皆さんが、いつくしんでくれました綾波レイは今週で終わりです。来週からは、新・綾波レイ（笑）で一からスタートって。

竹熊　でも、あんな不条理で悲劇的なキャラクターはいないんじゃないですか。自分で自分がどうにもなんないわけでしょう。

庵野　いろいろ葛藤はあったんですけどね、レイに関しては。そういう意味では、人間にしようか、人間じゃないものにしようかっていうその辺は。答えがなかなかでませんでした。レイというキャラクターが、一番自分から近くて遠いですね。スタートする時は、確かに、某マンガからの借り物なんですけれど。二つのマンガのキャラクターを足して、自分の中で二で割ったという。そういう意味では、モデルのキャラクターがいるんですけど。

竹熊　あれは７６貞本義行さんのキャラデザインも良かった。

庵野　ええ。とにかく存在感を希薄にしようと。僕は包帯、そんなにピクリと来ないんですけれど、お貞（貞本義行）が描いた包帯姿のレイの絵に、周囲がやたらと反応していて。「このキャラクターはグーっスよ」とか。なるほど、そういうものかって感じでした。僕自身は７７ミサトにこだわってましたね。アスカはまあ、ナディアの髪形変えればいいやって（笑）。

大泉　そんなミもフタもない言い方を。





ゲンドウのどこがいいのか





大泉　うちのかみさん、７８赤木リツコ博士が大好きなんです。時々、似たようなことを言うことがあるんで「似てる」っていうと、すっげえ喜ぶ。「潔癖症は辛いわよ」って。

竹熊　最後、ゲンドウの愛人だと判明してビックリしました。あんなオヤジのどこがいいんですか。

庵野　うーん、どこでしょうね。

竹熊　妻の７９碇ユイさんも「でも可愛いとこあるのよ」みたいなことを言うじゃないですか。

大泉　あれがいろんなギャグのネタになってて。

庵野　どこがいいんでしょうねえ。うーん。まあ一応、あるんですけど。言ってもせんないので。

竹熊　それって要するに、庵野さんのことでもあるわけでしょう（笑）。

庵野　まあ、一部そうですね。

竹熊　「こういう人だけど、でも可愛いとこあるのよ」っていうのは。

庵野　チンチンですかね（笑）。僕の可愛いとこって、チンチンぐらいですから。「あら、小さい」とか。

竹熊　そんなに自信ないんですか？

庵野　チンチンはないですね。

竹熊　僕もないけどさ（笑）。

大泉　ああ、同じぐらいだったりして。やになってきたな（笑）。

庵野　まあ、日本人の標準ですかね。標準よりちょっと小さい。

大泉　でも、でかすぎるのも問題ですよ。ビール瓶ぐらいある友人がいて、風俗嬢に嫌がられたって。

庵野　それはそれで悲劇ですね。

大泉　悲劇ですよ。

庵野　まあ、小さいのも「あら、もう入ってるの？」って言われたら、そのショックはもう一生ものですからね。

竹熊　でも女って、そんなに気にしないんじゃない？　実際には。

大泉　竹熊さんは、どうですか（笑）。

竹熊　自慢じゃないが包茎です（笑）。反対にさ、オッパイがでかい小さいって、こだわる人はこだわるかも知れないけれど、俺はあんまりないよね。

大泉　僕はでかいのはダメ。庵野さんはどうですか。好みから言うと。

庵野　うーん、まあ、小さいのはダメですね。デカ過ぎるのもダメ。よく巨乳マンガがあるでしょう。全然ダメですよ。もう乳に見えなくて。

竹熊　牛とか、そういう世界ですよね。

庵野　いや、ないよりあった方がいいんですけど。あり過ぎるのもどうかなあ。

大泉　俺、ちょっとミサトだとでかすぎるかな。

竹熊　ミサトさん、あんな食生活で、しかも三〇歳でしょう。なんでああいうナイス・バディなんですか。

庵野　でも、乳垂れてましたよね。ミサトさんも、ハリがなくなってて。





「人間を描く」ということ





竹熊　孤独感みたいなものは、ずっとあったんですか。

庵野　孤独感？　いや、あんまり認識してないです。そんなに人間というのに興味なかったんじゃないですか。

竹熊　８０離人症って言っちゃあ変だけど、リアリティがなかったとか。現実の人間関係に。

庵野　現実の…いや…自分にしか興味がなかったんじゃないですか。

竹熊　ナルシシズムみたいな。

庵野　まあ、そんなんだと思いますけれど。結局、家族を含めて、周囲にあまり興味がないというか。なかったんでしょうね、実は。自分でもよくわからなかったスね、その辺。

竹熊　人間嫌い？

庵野　うーん。いや、人間以前に、生物嫌いですね。動物も好きじゃないです。８１僕が肉や魚を食わないのも、たぶん、嫌いなんですね。そんな気持ち悪いもの食えるか、と思うんですけどね。まだ明解な答えとなってはいないんですけど。

大泉　植物とかは……。

庵野　いや、それも嫌いなんですよ。本当は。

竹熊　その辺で、たとえばメカの方に行っちゃうとか。

庵野　まあメカが好きなのは、そうだと思う。

竹熊　自分で人間が嫌いというか、生き物の絵が描けないということに対しては、悩んだりしました？

庵野　うーん……困るというのはありますね。仕事にならないから。人に興味がないから、やっぱり人間ドラマは一番難しいですよね。

竹熊　でも『エヴァ』ではそれをやろうとしたわけでしょう？

庵野　やろうとしたけど、まだまだ全然やれてないです。力不足ですね。相変わらず情けない。

大泉　やれてないというふうに庵野さんは思ってて、ただ周りの人間が、あのキャラがどうだとか勝手に盛り上がってるから、なんだろう？　というところがあるわけですか。

庵野　そこは比較の問題だと思うんです。

大泉　ああ、なるほど。他の作品はもっとやれてないと（笑）。

庵野　ええ。だってみんな、簡単に人間ドラマやってますとか言うじゃないですか。なんで言えるんだろうと思いますよ。

竹熊　そんな簡単なものじゃないと。

庵野　人間ドラマなんて、そうそうやれるもんじゃないですよ。だって、全然わからない他人を描くってことじゃないですか。その上、その関係までも描かなきゃならない。生易しいものじゃないと思いますよ。典型的なキャラクターが出て来て、それがこうすればこうなるだろうみたいな結果論というか、パターンとしての人間ドラマがありますけれども、それはエセですもんね。まあ、それはそれで安心して見られる作り物の世界なので、いいんですけど。僕は今回、ダメでしたね。スタッフも含めてその段階じゃ満足できなかったということです。まあそれで僕は、結局、頭の中で考えてもできないんで、しかたなく自分をドラマにそのまま投影している。だから、なんか人間ドラマっぽい感じがするだけで。

竹熊　ああ、庵野さんが「『エヴァ』のキャラは全部自分自身だ」という意味はそれですね。

庵野　ノンフィクションですよね。自分が今やってるのは。これをフィクションでやれっていうのは、とても無理ですよ。そんな才能ないっス。そういうのを簡単にやれると思ってる人達に、僕は傲慢を感じますね。傲慢、もしくは何もわかってないんだという。まあ、『エヴァ』は実はドラマというより、ドキュメンタリーに近いですね。

竹熊　それこそ『さらば宇宙戦艦ヤマト』みたいな、最後に無理やり特攻してさ、主人公が死んで、これが人間ドラマでございとか。人間なんて全然描けてないんだけど、とにかく泣けるものがいいとかさ。まあ、テクニックとしてはあるわけですよね。

大泉　僕、小説を高校の時に書いたんですよ。人は褒めてくれたんだけど、自分でどうしようもないやと思ったの。過去に読んだ小説のサンプリングにすぎないって、自分が一番よく知ってるわけだから。結局現実の方がよっぽど面白い。現実の人間は現実のドラマを生きていますから、それを取材して切り取ることはできます。自分にとって、それが唯一の人間を描く方法で、だからノンフィクションをやるようになったんです。

竹熊　自分の頭の中で一から描くなんて、おそれ多いんだと。

大泉　だから俺、笑っちゃうんですよ。自分で書いた小説って。ウソくさくて、恥ずかしくて、これはダメだと。筒井康隆さんに「大泉さんの文体は小説に向くから、書いてみないか」と言われたんだけど、全然その気になれなくて。





世界は何も変わらない





竹熊　しかし８２アニメ界久々の大ヒットですよね。製作中はだいぶ足が出たらしいですけど、もう元はとれたんじゃないですか。

庵野　いつまでもつかわからないですけれども。まぐれ当たりだし、当たった金も、ＬＤとビデオの収益はスタッフにできるだけ還元してます。映像で儲かった金は、映像を作った人に返すと。

竹熊　そこがキチンとできるって、すごいじゃないですか。

大泉　このアニメ界の賃金体系や一連のどうしようもないところを、ちゃんと現場に還元したという点に、僕は感動しますね。

庵野　作業中はホントに金も時間もなかったんで。それは作ろうとしているフィルムに比してということなんですが。潤沢な制作費と充分な時間というのは難しいですね。常にまとわりつく問題です。ただ儲かったら、無理してやってくれたできるだけ多くのスタッフに、可能な限り利益は還元した方がいいと思うんですよ。当たんなきゃそれまでですけど。

　これはある程度システム的にすでに保証されている脚本家や声優だけじゃなく、ですね。世間の基本は経済ですから、金銭的報酬は必要だと思います。責任職は特にですね。今回のは僕の感謝の気持ちでしかないんですけど。こうしてあちこちのスタッフの人達に無理してやってもらった努力というか、そういう精神的なものとしか、いまは言いようがないんですが、それに対してお金という形でもいいからできるだけ返そうと。いままで面白いフィルムを作るというところ（精神的満足感）でしか返しようがなかったんで。せめて上がりができた時というか、やっとそれができる権利ができた時くらいは。本当に僕の感謝の気持ちです、としか言いようがないんですが。確かにシステムとしては多くの問題を含むんですけどね。

　ただこれにしても、「ガイナは成金だ。金をバラまいている」とかの悪口もあるそうですね。ホント、せんない話なんですけど。それを聞いた時には、何とも言えない気分になりました。でも、何言われても出さないよりはいい。『エヴァ』に関して言えば、ウチはアニメで儲かったことなんかなかったんで、最初からせめて赤字にだけはならないようにしようというのが目標だったんです。赤字になった時は、いよいよアニメは撤退するという話もありましたからね。

竹熊　当たってよかったですね。会社の信用的にも、でかいじゃないですか。

庵野　会社はそんなに儲かってない。ウチがアニメだけじゃないというのもあると思います。周辺事業で会社は持っているんですね。

竹熊　これ、まぐれ当たりだと思うんですか。

庵野　当たるのはまぐれでしょう。

竹熊　まあ、やる前に、必ず当たるかどうかなんてわからないでしょうけど。

庵野　当たるアニメなんてないですよ。当たったアニメがあるだけです。勝つは偶然、負けるは必然という言葉の通りだと思います。たまたまのもんでしょう。これが二年前だったらダメだったろうし、二年あとでもダメだっただろうと。あとは僕のアンテナが、要するに自分自身には何にもないので、無意識に社会を反映できるというのがあるかも知れない。

竹熊　うまくシンクロできちゃった。

大泉　それは便利な体じゃないですか。

庵野　みたいですね。おまけに、自分のオナニーがショウにまでなる。

大泉　それは僕から見ると、オウムともシンクロしていて、結局時代の部分が大きいとは思うんですね。ただオウムと違うのは、ものすごく美しいものを庵野さんが作ったというところだと。

竹熊　だから作品で解消する人と……。

大泉　王国を作る人がいて。

竹熊　作品ではなく、現実を変えないと気が済まない人っているでしょう。庵野さんの中に、麻原的なものというか、現実を変えたいみたいな意識ってあるんですかね。

庵野　あると思います。

大泉　アニメ製作という形で、それをやってらっしゃるわけですか。

庵野　うーん、そうですね。ある程度アニメーションの業界自体の意識も変えようというのはあったんです。でも、それはどうやらダメでした。

竹熊　業界の人は『エヴァ』を特殊事例だというふうに見ているわけですか。

庵野　そうなんです。あそこ（ガイナックス）は特別だからっていうふうに。だから自分たちの物とはしてくれないんですよね。それで生まれて来るのは、羨望と誹謗と中傷と、ひがみみたいなものでしょうね。

　でも若干名、いてくれたんです。僕たちが何をやってたのかというのを、わかろうとしてくれている人と、けっこうわかってくれる人がやっぱりいて。それは嬉しかった。スタッフやファンの人達にもですね。だから、やった意義はあったと思うんです。

竹熊　だから絶望することないですよ。

庵野　絶望は、思うんですけれども、そこからスタートです。物事、絶望してからがスタートですから。三島由紀夫の言葉に「愛は絶望からしか生まれない」とか、「真の改革者は絶望を口にしない」というのがあって、そういうものかなあと思うんですけれども。





恋愛について





竹熊　でも、アニメに明日はないとか言いながら、作り続けるわけですよね。やっぱり、どこか希望は持ってるんでしょう。

庵野　希望……わからないですね。作れば、何かあるかも知れないという、それが希望というなら。しかし、まあ、アニメ作って誹謗中傷されるよりは、好きな女の子と風呂に入ってる方が、やっぱりいいなって（笑）。

竹熊　モテるんじゃないんですか、庵野さん、本当は。

庵野　僕は好きな女にはふられる系統ですね。

竹熊　俺もそうだ（笑）。人間うまくいかないですね。

庵野　いかないです。

大泉　庵野さん、これまでの恋愛経験はどうなんですか。

庵野　過去、何人かと別れてます。片想いのままふられた方が圧倒的に多い（笑）。同棲してたこともありますが、現在は……まあ、ヒミツですね。その方が含みもあっていいでしょう（笑）。

大泉　僕も自分の処女作を書いてた時は、今のかみさんのところに転がりこんでました。そこから出て行って、漂泊して、たまに戻って来るということやってたんですけど。いまだにそうなんです。よくかみさんはこれを我慢するなと。庵野さんはどうなんですかね。こういう仕事をしつっ、恋愛をやることのしんどさみたいなのは。

庵野　まあ、人によりけりだと思うんですけれどね。大多数の人は、結婚するともうダメですね。いきなり薄味になっちゃって。

竹熊　守りに入っちゃうということ？

庵野　守りもあるし、やっぱりそっち（結婚）の方で満足しちゃう。でも、こういう仕事って「飢え」じゃないですか。物を作るというのは、飢えてて、ガツガツ食うかわりに、何か作るわけです。それは空いてる（心の）穴を埋める作業だと僕は思うんです。僕のは他の人に比べて、穴がやたらとでかくて、けっこう深いので、スコップ程度じゃ足りないです。もうダンプカーでガーッと毎日毎日往復してないと、埋まった気にならないんです。それでも全然底が見えない。

大泉　それは深いですね。

竹熊　すると庵野さんにとっては、恋愛経験も、その穴を埋めるものではなかったということですかね。

庵野　うーん。埋まっているとは思うんですけど。穴が違う場所にあるのかも知れない。穴の数が多いんですね。

竹熊　心が蜂の巣みたいになってると。

庵野　ええ。もうしようがない。どうしようもないんですね。

竹熊　あれですね。賽さいの河原みたいなものですね。賽の河原の亡者が、ザルで三途の川の水を全部汲めって鬼に命令されるみたいな。

庵野　なんか最近、やたらといろんな人から誹謗中傷を受けたりするんですけれども。それって、今の僕が幸せだったら、いいんですけど。でも、そんなに人に言われるほど自分が幸せじゃないから、辛いですよね。

竹熊　ああ……。

庵野　人にねたまれるほど、俺、幸せ感じてないんですけど（笑）。





女の胸で泣く





大泉　この間、８３村上龍の『８４すべての男は消耗品である』の話をしてたんで読んだんですが、その後、村上龍ファンの女の子に会ったんです。「何がいいんだ」という話をしたら、結局、女の人は女の人であがめられたがっている。そこがすごく満足するらしいんです。

庵野　ああ、そうでしょう。フェミニストですよね。村上龍は。

大泉　そうなんですよ。それで彼の作品を読んでると、元気になってくるんだと。

庵野　反対に『すべての男は消耗品である』を読んだ男が怒ったりするのも、よく聞きますね。まあ、あれを怒るというのは、要するに僕の発言を聞いて（ファンが）怒るのと似てると思うんです。なんとなく同じようなものかなと勝手に思ったんですけれども。村上龍も情けない人ですからね。

大泉　情けなさ。

庵野　ええ。いま出ている『８５五分後の世界』の続き（８６『ヒュウガ・ウィルス』）っていうのは、その情けなさの方法が出ていて、いいですね。それまでの村上龍の小説って、神様の位置に村上龍が立ってるんです。

『８７愛と幻想のファシズム』だと、冬二という独裁者ですね。もう絶対的な強い男に自分を投影してるんです。そういうふうに思い込まないと、自分が維持できないところも含めて、なんか情けなくて、グーっスよね。

　ところが、『ヒュウガ・ウィルス』っていうのは、主人公が、強さだけじゃなくて、それを目指す人間の弱さも描いたんだと。だから村上龍が、己のことをやっと認めて、やっと自分の位置に立った。素直になったなあと思いましたね。

大泉　それで庵野さんは、村上龍と自分は、同じところがあると思ったわけですね。

庵野　その情けなさをウリにしたようなところが、まあ（自分と）似た雰囲気があるんだと勝手に思って。

大泉　それで村上ファンの子に、あんな女の胸で泣くことにこだわる情けない男のどこがいいんだって話をしたんです。彼女が言うには、自分の胸で泣かれる時、その瞬間自分が高められてるって言うんですよ。

竹熊　女としてね。

大泉　それで、こないだ庵野さんからもらった『８８逆襲のシャア』の同人誌。あれを理解しようと思って、『８９逆襲のシャア』を見たんですけれども。やっぱりシャアも、女の胸で泣く……ところまで行ってるかどうかわかんないけど。

庵野　ああ、そうですね。９０ナナイの胸を借りてますよね。

大泉　その辺は、庵野さん、どうなんですか。

庵野　女の胸で泣くっていうのは、いいと思いますよ。本当に泣きたいです。例え借り物であっても、それでその先、生きていけますからね。





発言の真意は





竹熊　庵野さんのメディアでの発言聞いてて思うのは、庵野さんが他者を批判する時って、実は自己批判の部分もあるでしょう。例えばアニメファンを批判する時も、アニメファンである自分自身も含まれてるわけでしょう。

庵野　まあ、そうですね。

竹熊　よく読めばそれがわかるんだけど、そこのところで、けっこう誤解を受けやすいしゃべり方をするでしょう。

庵野　ああ、それは、そっちの方が面白いからです。

竹熊　じゃあ、妬まれてもしようがないじゃないですか。はたから見ると庵野さんは、大成功者なんですよ。

庵野　らしいんですよね。そういうふうに言われるんですけど。でも成功した気分って、これっぽっちもない。そう言うと、ものすごい贅沢だと言われるんですけど。逆に、中央線に乗ってて、知らない人にサイン求められた時には、動揺とか、そういうのは全然ないんです。まあしごく当然のように感じてしまって。なんでかなと思って。一つは、そういうのを当然と思っている傲慢さかも知れないし。あとはなんか、現実感がなくて。（自分が有名になりつつあることを）人ごとのように醒めて見てて、なんかピンと来ないというか。なんだったかな。理由を三つ思いついたんだけど、二つしか思い出せない。

大泉　（指を折って数えて）幸福じゃない、現実感がない……。

竹熊　なにやら話が佳境に入って来ました（笑）。





女性に母親を求める





庵野　なんか、まあそんなんですよね。全然幸せに感じないんだな。彼女一人いるわけでもないし。最近は片想いのまま、パーになるパターンばっかりです（悲）。

竹熊　昔、彼女と別れたというのは、つまりケンカしちゃったわけですか。

庵野　ケンカもあります。あとは、自分が子供なんですね。女性にどうしても母親の部分を求めてしまう。それが重荷の人は、やっぱりダメでしょうね。

竹熊　やたらと世話を焼いてもらっちゃう？

庵野　もっと自分はタチが悪いんで。焼いてもらったらもらったで、鬱陶しいし。相手してくれなきゃ、してくれないで。

竹熊　ああ、母親だね。本当に（笑）。

庵野　僕、スキゾイドですからね。物事は全部オール・オア・ナッシングなんで、女性にはそこらがきついんでしょうね。

大泉　うちの子供に似てますね。

庵野　それはあれですよ。大泉さんの責任です（笑）。うちの子供がそうですねって、子供がそういうふうにされてるんですよ。大泉さんの手によって。人ごとじゃないッスよ。

大泉　いやいや、まったくそうなんです。その状況っていうんですか。やっぱり世話焼いてくれなきゃ怒るし、かと言って面倒みると鬱陶しいとなるのは。

竹熊　９１ヤマアラシのジレンマ（笑）。

大泉　子供の様子見てると、納豆かぶったりとか、牛乳かぶったりとか、獣なんですよね。その獣をどう人間に仕立てていくかという作業が子育てなんだと思うんですけれども。でも獣のままの状態を維持していると、とにかくしゃべることとか動作とか、ものすごく意表をついてて、面白いですからね。それは明らかにまだ人間になってない面白さなんだけれども。庵野さんの場合、大人になっても、それを維持しようという努力なんですかね。

庵野　うーん。

竹熊　いや、庵野さんは、子供とは違うわけですね。

大泉　それは本物の子供だと言ってるんじゃなくて……。

竹熊　（自分は子供だと）自覚はしてるわけでしょう。自覚はしてて、でもどうしようもないといったところで、あきらめと同時に、そういう自分でいたいという部分もあるんでしょう。

庵野　うーん……いや、あまり自己肯定にはいかないですね。変革の方に行きたいというのはありますよね。

竹熊　落ちつきたい。それこそ彼女が欲しいとか、結婚して安定したいとか。

庵野　それもあると思う。そういう意味では、バラバラですね。

竹熊　それで分裂症と言われるようなことになっちゃうと。

大泉　でもスキゾ（分裂）だけじゃなくて、パラノ（偏執）の部分もあるじゃないですか。

竹熊　仕事にのめり込む時は、もう完全にパラノイアで、ずっと覚醒して絵を描いたりしてるわけで。それで作業を離れるとスキゾ性みたいなものが出てくる。

庵野　まあ、気違いですね。





何が狂気か





大泉　この間、９２筒井さんと「隣のきちがい」という対談をしたんだけれど。筒井さんの人間把握として、面白い気違い、つまらない気違いということを聞きに行ったんですよ。筒井さんに。これまで付き合ってた気違いで、どういう奴が面白くて、どういう奴がつまらなかったかと言って。そしたら「ばかやろう、何言ってんだ。人間っていうのは、全部気違いなんだ。どういう種類の気違いかっていうのを、把握しなくちゃダメなんだ。それがそいつの一番面白い部分なんだ」って。筒井さんの認識のほうが僕の思ってたことより先に行ってたんです。まあ面白い気違いというのは、そういう部分を持ったクリエイティブな人ってことになるんだと思うんだよね。だから庵野さんだけじゃなくて竹熊さんも、そういう意味では（笑）。

竹熊　何言ってんですか。大泉さんだってこないだ、『エヴァ』のビデオを間違って消してしまったって半狂乱で電話してきてさ。ちょっと……。

庵野　「キ」の字ですよね。

竹熊　わざわざそんなことで、一日何回も留守番電話に入れてくる。何事かと思いましたよ。誤って消してしまったというだけで、一生の大事みたいに。

大泉　だって毎日見てるんですもん。それが消えてしまったんで。

竹熊　あと『ガメラ２』で三回泣いたとか。

大泉　そう。あれは泣けましたね。

庵野　「キ」の字入ってますよ。

竹熊　あと、やっばり妻子と水杯交わしてオウムに入会してさ、破防法で捕まることを待ってるとか。これは大気違いですよね。

庵野　ええ。はたから見れば気違いです。

大泉　だけどしようがないですよ、それは。

竹熊　だって、嬉しそうにさあ、オウムに破防法、いっそ適用されないかなあみたいな感じなんだもん。刑務所にそんな嬉しそうに入りたがる人っていないですよ（笑）。

大泉　いや、だけど破防法で捕まると、やっぱり庵野さんじゃないけど、自分と社会の関係がものすごく明確になって来るっていう気がしてるんですけど。

竹熊　まあね。ある意味で大義名分のある逮捕だもんね。逮捕されて、それが仕事にもなるという。

庵野　捕まったらウハウハじゃないですか。

竹熊　ウハウハなんですよ、この人。もう公安とか警察の取り調べを受けたくて受けたくて。ワクワクですよ。どんな手を使って来るのかと。

大泉　だからこの間も、松本サリン事件の河野さんのところに行って、警察に捕まったらどういう目にあうんだっていうのを聞いてきたんですよ。

庵野　予習もバッチリなんですね。

大泉　そんなことないですよ。俺、自分はすごく小市民で常識的な人間だと、ずっと思い込んでたんですが。

庵野　大泉さん、オウムで洗脳されたんじゃないですか。

竹熊　この三人じゃあ、俺の方がまだまともだな。

大泉　何言ってんですか（笑）。

庵野　虚しい作業だ。三人そろって、誰が一番健常者に近いかって。俺の方が一般人に近いなんて。





エピローグ





竹熊　最後につかぬことを聞くんだけれども、『９３クイック・ジャパン』ってどう思います？

庵野　いや、面白いです。いやホント、初期の『ＯＵＴ』みたいで（笑）。

赤田さん、あれですよ、注意しないと。このままだと『エヴァゲリオン』で……。

編集部（赤田）　『ＯＵＴ』の二の舞（笑）。

庵野　そうなんですよ。新しくアニメ誌になって、装丁変えてですね（笑）。

編集部（赤田）　前号の編集後記にもチラッと書いたんですけれども、９４マーク・ヴォネガットという作家がいるんですよ。カート・ヴォネガットの息子で。彼が『９５エデン特急』という、ヒッピーがだんだん狂っていく話を書いたんですよね。あれは分裂病の話だよね。

竹熊　分裂気質の人がＬＳＤやりすぎて、コミューンで生活して狂っていくのを克明に書いている。

編集部（赤田）　心の流れみたいなのを書いているんですね。それが『エヴァ』の最終二話にすごい近いなと思って。

庵野　ヤクもやらずに、あれ（最終二話）をやったというのは、すごいことなんですかね。

竹熊　ええ、立派な狂人です（笑）。

庵野　いろいろな脳内物質が出っぱなしって感じで。二五話って、最初にフィルムができて見た時には、自分で、俺天才かなあと思ったんですけどね。でも、後からもう一回編集して見直すと、ウワァ～！　全然ダメだとガッカリして。力不足で恥ずかしいですね。スタッフに申し訳ないです、ハイ。

竹熊　いや、でもあの最終回（二六話）の画面がピキーッって割れて、キャラクター全員がパチパチ拍手して主人公を祝福するというラストは、かなりのもんですよ。見てて気が狂いそうになった。あそこまでやるかって。

庵野　まあ、あれは自分の中でも色々あるんですけど。そこの一番の理由というのは、言うつもりないんですよ。誰にも核心を話してない。なぜ二六話をああしたかという理由の一番コアな部分というのは、まだどこにも、『クイック・ジャパン』にも言ってない。そこの部分だけは言わないでしょう、誰にも。

大泉　誰にも話せない、何か原体験があるわけですか。

庵野　もうちょっと思想的なところですかね。まあ『クイック・ジャパン』のこの間のインタビューで、内堀のところぐらいまでは来ていますけれど。……まあ、その部分は僕と一緒に墓の中ですね。

　（九六年八月二八日、ガイナックスにて）





碇シンジ　幼少時に母・ユイをＥ計画実験中の事故で亡くし、ネルフ司令官である父・ゲンドウとも離別して、施設に引き取られた。「父に捨てられた」というショックから、極度に内向的で対人恐怖症的な性格に育つ。そんなシンジにゲンドウはエヴァ初号機専属パイロットとして、「使徒」と戦うことを強要する。





碇ゲンドウ　国連直属の非公開組織ネルフの司令官で、冷酷非情なリアリスト。ネルフの表向きの目的は使徒を殱滅し、人類滅亡につながるサードインパクトを未然に防ぐことだが、真の目的は謎の裏組織ゼーレの命を受けて「人類補完計画」を推進することにある。だがゲンドウはゼーレに従うふりをしながら別の計画を進めているらしく、両者間には緊張関係が続いている。





綾波レイ　エヴァ零号機専属パイロット。クローン技術で生まれた「いれもの」だけの人間、子供として育った経験のないレイには、世界がリアルに実感できない。他人に興味がないから感情が生じない。それでも不思議と毅然として見えるのは、創造者（？）ゲンドウとの絆をこの世と自分を結ぶ根拠として迷わず受け入れ、絶対的に帰依しているからだ。野蛮な世界から閉じこもったまま他人の視線が気になってばかりいるシンジ（と視聴者）にとって、レイは謎の象徴であり、不安であり、同時に憧れでもあるのだろう。





惣流・アスカ・ラングレー　エヴァ弐号機専属パイロットで、ドイツ生まれの少女。エヴァ操縦の天才としての誇りを振りかざす、勝気でわがままな性格だが、それは幼い頃に「母に捨てられた」コンプレックスの裏返しでもある。使徒の精神攻撃によってエヴァとのシンクロが不能となった時、彼女の自我は内面から崩壊する。





葛城ミサト　ネルフ作戦部長。少女時代に嫌いだった父をセカンドインパクトで失い、トラウマのために失語症になる。失った父親への依存心を克服しようとむやみに明るく振るまうが、空回りして混乱することも。監察者兼親代わりとして、シンジと同居する。





赤木リツコ　Ｅ計画責任者で、死んだ母親（ナオコ）が設計したスーパーコンピューターＭＡＧＩの管理者でもある。理性的な技術者で職業人だが、嫌っていた母親と同じくゲンドウとの情欲におぼれ、苦悩する。





加持リョウジ　ネルフ特殊監察部所属。と同時に内務省とゼーレ委員会の三重スパイでもある。かってはミサトの恋人でもあった。女たらしの食えない男だが、シンジに対しては年上のよき友人として振るまう。





渚カヲル　ゼーレが送り込んできた五番目のエヴァ操縦者。シンジにとっては初めての心を許せる友人であり、同性愛的な恋愛対象でもあった。しかしその正体は「使徒」であり、ネルフの地下に安置される第一使徒アダムと融合してサードインパクトを起こそうとする。シンジは苦悩の果てに、エヴァ初号機でこの最愛の友を殺す。





７１

「『エヴァ』主要キャラクター紹介」





７２

若手トップクラスの人気と実力を持つ、現在の声優ブームの立役者の一人。出演作は『エヴァ』のレイ役を始め、『ＮＩＮＫＵ』の里穂子、『爆れつハンター』のティラミス、『スレイヤーズ』のリナなど多数。





７３

前半の山場「ヤシマ作戦」を背景にレイとシンジのドラマ（の発生の瞬間）を描く、第五話『レイ、心のむこうに』第六話『決戦！第３新東京市』の前後編。自分ばかリエヴァで怖い思いをする理不尽に投げやりになるシンジと、ゲンドウの命令に殉じ、平然と身を投げ出してシンジの盾になるレイ。レイとシンジが（そして視聴者も）人を支えている関係性の物語の誕生に出会う瞬間。『エヴァ』最大の収穫のひとつ。





７４＆７５

「『エヴァ』主要キャラクター紹介」





７６

六四年山口生れ。八〇年少年チャンピオン新人賞を受賞し漫画家デビュー。その後アニメーターに転身、テレコム入社後、ガイナックスへ移籍。『王立宇宙軍』『ナディア』『エヴァ』のキャラクターデザインを手掛ける。現在『エヴァ』のコミック版を『月刊少年エース』に連載中。





７７＆７８＆７９

「『エヴァ』主要キャラクター紹介」





８０

自我や外界の実在感が稀薄化ないし消失する現象。体験世界のタイプによって、自分と外界との間に一枚膜があるように感じる「外界の離人」、自分のからだが自分自身と感じられない「身体の離人」、自分が自分とはまったく別のものになってしまったと感じられる「自我の離人」の三領域に分けられる。思春期から青年期にかけて、成長の過程でこれらの体験をするのは珍しくない。





８１

『別冊ＪＵＮＥ』九六年一一月号の庵野インタビューによれば、庵野監督は別にベジタリアンというわけではなく「嫌いなだけです。普通の生活に興味がないですし、食うのにも興味がないんですよ。

だから宇宙食というのは、子供の頃からの理想だったんですよ」「親が殴ろうが蹴ろうが食わなかったですからね。余計に依怙地になって食わないんです。だから親が真っ先に諦めました」とある。ここ三〇年間、食べているものはほとんど同じ内容だという。





８２

現在ＬＤ売り上げは累計二〇〇万枚を突破。サントラ盤はアニメでは『銀河鉄道９９９』以来一七年ぶりのオリコンチャート一位を記録した。アニメ誌は勿論、『クイック・ジャパン』をはじめ『ＳＦマガジン』『スタジオボイス』『ユリイカ』などが特集、またはそれに準ずる形でとりあげ、軒並み部数を延ばしている。





８３

七六年、福生でのドラッグや乱交パーティーなどの体験をクールかつ過剰な細部描写で作品化した『限りなく透明に近いブルー』での芥川賞受賞により鮮烈にデビュー。虚弱さによる苦悩に依存した既成の日本文学を否定し、サバイバルと快楽のための「情報」であることを志向する。代表作は『コインロッカーベイビーズ』『愛と幻想のファシズム』『五分後の世界』など。





８４

子供を生めず、自分の子を確認するすべもない男は、女に対し種として劣性な消耗品である。だからこそ社会・文明・物語といった「幻想」を生み出すパワーに賭けざるを得ない（しかも、それに依存しきってはいけない）という思想をベースに、危機感を持続し生き延びるための「情報」を語る長期連載中のエッセイ。

文庫のあとがきを書いた山田詠美に裏返しの女性蔑視であると鋭く批判されているが、ここには性的な魅力を守りつつ社会的存在であることの主張をしたいという彼女の文学的根拠のアンビバレントな困難さも同時に浮き彫りになっていて興味深い。





８５

九四年刊行。無条件降伏しなかった日本軍がストイックな先鋭集団となって戦い続ける〝アンダーグラウンド〟と呼ばれるパラレルワールドに迷い込んだ中年男。激しいゲリラ戦に参加する中、自分の世界に決定的に欠けている「明確な意思」を獲得している戦士達に尊敬と共感を深め、この世界に止まる決心をする。





８６

九六年刊行。『五分後の世界』の続編。前作と同じく、ストレンジャーの目を通して、猛威をふるうウィルスに対するアンダーグラウンド兵士達の姿勢を描くシミュレーション小説。





８７

八七年刊行。ハンターの主人公・鈴原冬二が相棒のゼロ・相田剣介と共に政治結社を作り、混迷する日本にファシズム政権を樹立する。





８８

九三年暮れに発行された庵野秀明編集のルポルタージュ同人誌。庵野監督によれば、『エヴァ』制作にあたって、巨大な影響とプレッシャーを受けている富野由悠季監督とその作品を総括することで、自らの立ち位置を確認するために作ったものだという。

富野監督はじめ制作スタッフの他、押井守・山賀博之らアニメ界を代表する才能や、雑誌関係者・ファン出身の同世代などへ広くインタビューを試みている。多角的に富野像を浮かび上がらせるに止まらず、富野の強烈な個性に反射させる形で、相互批評がタブーとなっているアニメの現場関係者達の生の声を例外的に引き出しそれぞれの立場を浮き彫りにした、ルポとしても第一級の力作。





８９

八八年三月公開。第一作の主人公アムロとシャアの確執にケリをつけ、富野監督自身ガンダムの物語に区切りを付けようとしたと思われる作品。

柔らかなプライベートの関係を育めず、性急な革命者となって周囲の人々を目的のための道具にし孤独を深めるシャア。自閉症的な傾向を職場やプライベートの関係で支えているアムロ。それぞれが抱える限界の為に、互いを意識し合う二人の現在が、母親的な存在だったララアと、彼等に「父」を求める少女クエスを挾んで浮き彫りになる。





９０

シャアの愛人。純粋な理想家としてのシャアと、理想と裏腹の抑圧された彼の少年性を愛する。有能かつ母性的な肉体を持った大人の女性。声はナウシカのクシャナ、パトレイバーの南雲忍など、凛とした女性を演じて定評のある榊原良子。





９１

「鋭いトゲを持つヤマアラシは、自分のぬくもりを伝えるために他者に身を寄せると、相手も自分も傷ついてしまう」というドイツの哲学者ショーペンハウエル寓話に由来する、対人間の心理的距離の取り方に関するアンビバレンツな状態を表わす精神分析用語。





９２

『別冊宝島２８１　となりのサイコさん』に掲載された大泉実成と筒井康隆の対談記事。





９３

赤田祐一編集による小社刊行の若者向け雑誌。内なる妄想を楽しむようなレアな味わいは、シニカルさに自家中毒気味の八〇年代サブカル残党組とは一味違い、エヴァにも通じるところが!?　巷では「ＱＪは第二のＯＵＴか？」と噂されているともいう。





９４＆９５

『スローターハウス５』などで知られるカート・ヴォネガット・ジュニアの長男。七五年に六〇年代のヒッピー体験をまとめた記録的小説『エデン特急』を発表。ドラッグにまみれたコミューン生活をどこまでが幻覚で、どれが真実かわからない筆致で描写し、話題となった。現在は医師として生活しているらしい。『エデン特急』は、みすず書房から日本語版が刊行されている。





［なぜ主人公は男なのか]





竹熊　１「庵野秀明〝欠席裁判〟座談会（後編）」を始めたいと思います。では貞本さん、『エヴァ』の企画立ち上げ時の話をもう少し……。

大泉　最初、庵野さんからイメージ・メモを渡されたわけですね。

貞本　ええ。パラパラパラと、一、二行ずつ、ダーッと並んでるようなメモを。それで最初に思ったのは、なんでこんなに女の子が一杯出て来んの？　って。まあ彼の答えはわかってんですけど、一応聞いてみたら、「こういうのはいっぱいいた方が」って（笑）。でも具体的に考えていくのはこっちなんだから、根掘り葉掘り聞きましたよ。庵野さん、本当は考えてないんだろうけれど、聞いたらそれなりに答えるから。

鶴巻　口から出ると本当になる。まあ、一応考えてたのかなぁと思うんですけどね。

竹熊　ボーッと、漠然としたイメージが頭の中でグルグル渦巻いてるのかな。

鶴巻　本人の中ではっきりしていない部分を、どうなんですか？　って問いただすと、庵野さんが何か答える。で、口に出て初めて、ああ、こういうことを俺は考えていたのか！　みたいな感じになるっていうタイプですね。

貞本　最初、庵野さんは延々、主人公を女の子にすることにこだわってましたね。

大泉　それは綾波レイ？

貞本　いや、『トップをねらえ！』じゃないですか。トップ路線。それで僕も一応、女の子の主人公も描いてみたんだけど、庵野さんには見せなかったんですよ。それはほとんどアスカみたいな感じのキャラなんですけどね。

　でも、これ見せたら庵野さん食いつくから、やめとこうと思って。見せずに延々と、どうして女なの？　どうして女なのって問いただしたんです。男を主役にしようよって。ちょうど『ナディア』の後だったから、いいかげんに主人公が女々しいの、俺は嫌いだとか言って。『トップ』『ナディア』と来て、ここらで男が主人公のやつがあった方がいいんじゃないかと僕は思って。こんなに女の子を主人公にしてると、宮崎さんになっちゃうよって（笑）。

大泉　そうしたら……。

貞本　そしたら何回かして、急にコロッと「じゃあ男にしよう」って向こうから言ってきたんです。なんかきっかけがあったと思うんですよ。たぶんシンちゃんが間に入って、いろいろ話してるうちに。

竹熊　ああ、樋口真嗣さん。

貞本　でもまさか、あんな女々しい男になるとは思わなかったけど（笑）。それで、どうして主人公が子供で、一四歳じゃなきゃいけないのかってことを話してた時、ちょうど僕がＮＨＫの『脳と心』って番組を見ていて、ロボットの中にお母さん（の精神）が入ってて、そこに息子なり娘が乗って、ロボットとシンクロするっていうのはどうかなと。２『キャプテン・ハーロック』みたいな、なんでしたっけ、アルカディア号でしたか。ああいうのはどうかなと言った瞬間に、なんか。

竹熊　ハッと庵野さんが。

貞本　たぶんそうでしょうね。じゃあ主人公は男にしてみようと言い出した。それで（メモを）見たら、トウジとケンスケってキャラが書いてある。「この二人は何？」って聞いても教えてくれないんですよ、村上龍の『愛と幻想のファシズム』のことを。たぶん（主人公を男にする）大きな理由として『愛と幻想のファシズム』もあったんですね。男のああいう世界を作りたいというのが。

竹熊　そういうのがムラムラと出て来た。

貞本　「トウジとケンスケってなんだろうなあ」って聞くと、「いやまあ、親友はいた方がいいから」（笑）。じゃあ乗るパイロットがあと二人いるけど、主人公の横にいるこの女二人は何？　どうして女二人なのって。せっかく男の親友がいるんだから、こっち乗せればいいじゃんって僕は聞いたんです。男二人で女一人でもいいのに、どうしてダメなの。そういうことを根掘り葉掘り聞かないと、庵野さんの口から（理由が）出て来ないんです。あっちから攻め、こっちから攻め。

　あんまりビジュアル面は注文してこないんですよ。この顔でいってくれっていうような発注の仕方はしないんです。普通の監督だったら、あの映画のあの役者みたいな感じとか、そういうふうに来るんだろうけど、庵野さんは文字でバーッと書いて。何歳、血液型どうのこうのとか。それでメインのエピソードがたまに書いてある。

貞本　もう一枚のペラに七人ぐらいとか。加持リョウジのことも書いてありましたね。





［「逃げちゃダメだ」について]





貞本　僕が『エヴァ』の設定会議に出たのは、六話ぐらいまでじゃないですかね。途中から３マンガの方が忙しくなっちゃって。最後に参加したのは、確か五話か六話だったと思う。４眼鏡ゆがませたらいいんじゃないのとか。それをアイデアとして使ってよって言って。

竹熊　あとはマンガに専念するからと？

貞本　そうですね。というか、だんだんスケジュールがずれて行って、参加できなくなっちゃった。たまに（庵野さんが）夜中に僕の部屋に来て、ちょっと話しておしまいとか。

竹熊　それで今後、マンガ版のストーリーは貞本さんのオリジナルに持って行くわけですか。

貞本　全然わからないですよ。考えてない（笑）。

大泉　いや、ウチのかみさんは、もう全然違うって。貞本さんの方が、私は好きって（笑）。

貞本　やっぱりファンレターで見ると、二種類ありますよ。勝手にいじるんじゃねえとか、もっと変えろとか。

大泉　マンガ版は心理描写がものすごく丁寧ですしね。シンジ（の性格）はたぶんアニメと違う。

大泉　イジイジしてない。

貞本　というか、最初のテーマから違うと思いますね。僕は「自分に正直に付き合いましょう」っていうテーマだから、「逃げちゃダメだ」じゃないんですよ。

竹熊　ああ、それでマンガ版では（「逃げちゃダメだ」の）セリフを変えてるわけですね。アニメの第一話では、シンジがエヴァに乗るにあたっての、５非常に重要なセリフなんだけど。
