まえがき





　あらかじめ申し上げておきますが、本書は一部の方々が期待しているであろう、スタジオジブリに対する悪口雑言、ツッこみ放題、言いたい放題を活字にして私憤を晴らすという意図で出版されたものではありません（まあ、一部にはそれも含みますが）。

　本書の意図は大雑把に言って二つあります。

　スタジオジブリおよび宮崎駿監督に対する批判の類いは、まず公の場で見掛けることがありません。共通の利害を暗黙の了解として、その内部における批判を許さない共同体を「インナー・サークル」と称しますが、例えばスポーツの世界におけるフィギュアスケート団体などは、この典型と言えるでしょう。世間の注目度の高いわりに参加者が限定されており、その評価が客観性を証明しにくい競技などに、この傾向が見られるようですが、「少数のプロと大多数のアマチュア」で成立する世界には往々にしてこの「インナー・サークル」が発生します。スタジオジブリおよび宮崎駿作品に対する批判の類いが、なぜか公の場で語られず、活字になりにくいという背景には、同様の事情が存在するのではないか、というのがかねてからの私の考えでした。鈴木敏夫が暗躍し、ダンアツして回っているからだ、などということがある筈がありません。私は彼を評して「ゲッベルスの末裔」とか「東小金井のジェルジンスキー」とかの悪口を垂れ流してきましたが、一介の映画プロデューサーである彼に、全マスコミの口を塞ぐ政治的権力などあろう筈がありません。

　スタジオジブリの作品はなぜ批判に晒されないのか。

　その全ての作品が名作傑作のオンパレード、などということはあり得ません。むしろ事態はまったくの逆であり、その表現力の卓越さはともかく、映画作品としてはツッこみ放題のトンデモ映画と呼ぶしかないものが殆どです。いやそんなことはない、オレは何度も観て、その度に感動したぞ、と主張される方も多いでしょうが、それはそれで一向に構いません。しかし、観客として十分以上に楽しめた、と言う主張と作品の評価とは、あくまで別物なのです。この世に１００パーセント完璧などと言う作品も個人も組織も存在するわけがありません。事実として、他のどんな監督作品も、興行成績とは別の次元で作品としての評価が問われ、必ずと言ってよいほど賛否が分かれるのが通常でありながら、なぜスタジオジブリの作品は（公式の場では）絶賛されつづけるのか。この辺の事情を具体的な個々の作品に触れながら明らかにしてみたい、あらゆるバイアスを無視して語ってみよう、というのが本書の最初にして最大の意図であり、動機でもあります。そんなことをして何になるのか、と問われるなら、それをして何故いけないのか、とお答えしたい。映画は語られるべきであり、語られてはじめて映画になるものなのです。

　さらにもうひとつ。スタジオジブリという製作会社はなぜ創設され、かくも永きに渡って日本の映画業界にその存在感を示し続けることができたのか（君臨したとは申しません）。やや大袈裟に言うなら、その歴史的背景とでも言うべきものを検証してみたい、という意図がそれです。宮崎駿監督が引退を表明し（すでに復活も表明しましたが）スタジオジブリという特異なアニメスタジオが、（敢えて申せば）その歴史的使命を終えたいまこそ、それを語るべきなのです。

　なお、読者の便宜を図りつつ、語る私自身も楽しむために、敢えて評論形式ではなく対談形式としました。語る相手は『友だちはいらない。』にひきつづき、映画ライターの渡辺マキさんにお願いしました。彼女は持ち前の特異な（天然系の）キャラクターで、世界に名だたる映画監督たちの懐深く侵入し、ユニークなインタビュー記事をものした得難い人材であり、またきわめて説得し難いその性格が、今回の意図には適材であると判断しました。ただし困ったことに、私もマキさんも本格的な脱線人間であり、話題が逸れることがしばしばで、対談の行方は杳ようとして定まらぬこともしばしばで、担当編集さんには大変なご苦労をおかけしました。また滑舌が悪いくせに早口で「何を言ってるのか判らない」私の言葉を、テープから起こしてくれた野口くんに、この場を借りて感謝を述べておきます。

　反論も文句もあるでしょうが、とりあえず最後まで読んでいただければ幸いです。

インナー・サークル



──『誰も語らなかったジブリを語ろう』、まずはどこから行きましょうか？

押井　みんな、誤解しないで欲しいんだけど、僕は別に悪口を言うつもりはないからね。目的は、スタジオジブリという、日本のアニメーションの歴史のなかで明らかにひとつの時代を築いたスタジオの功罪について語ること。スタジオはいま、休止状態にあり、ひとつの区切りがついたからこそできる企画なんだよ。宮さんはまた何か作るつもりで動いているようだけど、それはオマケのようなもので、ジブリの評価が変わることはない。ジブリの歴史的使命というのは確実に終わっているんだよ。

　千万単位の人間が、まるで儀式のようにジブリ作品を劇場に観にいったのは何ゆえなのか？　僕はそこにも非常に興味がある。最終的に、これほどの大衆を動員する──これはもう鈴木敏夫の大計画だったわけだけどさ。

──鈴木さんの計画だったんですか？

押井　間違いなくね。あいつにはそれ以外、テーマがないから。彼の生涯のテーマのひとつが〝大衆動員〟。実質的にスタジオジブリを立ち上げたのも鈴木敏夫だから。

──でも、鈴木さん『ナウシカ』『ラピュタ』『トトロ』は製作委員会のひとりとしてクレジットされていますよ。プロデューサーというわけじゃない。

押井　クレジット的にはそうなっているけど、実質的に動き回ったのは鈴木敏夫だよ。『ナウシカ』は、当時の『アニメージュ』の編集長だった尾形さんが、同誌から発信する長編アニメーション映画を作りたいという一心で始めた企画だった。そのため徳間康快に、原作漫画はベストセラー級に売れているとかウソを並べてゴーサインを勝ち取ったんですよ。映画はヒットしたので原作漫画も売れ、結果的にウソじゃなくなったけど、当時はそうやって始まった企画なの。

──私も尾形さん、少しだけ存じ上げていますが、策略を練って奔走するような感じの方ではなかったですよ。

押井　そう、だからすべては鈴木敏夫なんだって。なぜジブリに対する批判的な意見が活字にならなかったと思う？　鈴木敏夫が悪口とかスキャンダルを潰していったわけじゃない。まぁ、あったかもしれないけどさあ（笑）。そういう恫喝的なことをやらなくても、メディア自体が批判を封印した。なぜなら、ジブリを貶めることで得るものが何もなかったから。ジブリは褒められることで利益を上げるようになっていたからなんだよ。いわばインナー・サークルのような関係を築いたんだよね。外からは窺い知れない情報を共有しつつ、それを外部に漏らさないことで、ある種の利益をお互いに共有する。そういうインナー・サークルが30年くらいにわたり成立し続けたことは驚異的だよ。そこには鈴木敏夫の力がモノをいったのはいうまでもない。

　トシちゃんと宮さん、そして高畑さんの３人は恫喝を得意技としていて、３人による恐怖政治が始まったのがここから。トシちゃんはさしずめ秘密警察の元締めのような存在になる。

──それ、すっごく怖くないですか？

押井　そう、怖い。優れた頭脳がすべてを支配するという考えなので、何事も彼ら３人で決められていたのがジブリだから。鈴木敏夫の名言が「テーマのない人間が、テーマのある人間に使われるのは当たり前だ」だしね。

　そういう関係が生まれた発端が『ナウシカ』だった。そのなかでもっとも大きなことが、トシちゃんが、宮さんと高畑さんと組もうと決めたことなんだよ。

──じゃあ、スタジオジブリの最初の作品、宮崎監督の『風の谷のナウシカ』から語っていただきたいのですが。

押井　いや、ジブリとしての最初の作品は『天空の城ラピュタ』。『ナウシカ』は原さんの「トップクラフト」が制作している。

　原さんというのは、とても男気のあるかっこいい人で、自分の原作である『ナウシカ』を長編アニメーションにしたいと熱望する宮さんのその熱い思いに応えて制作を引き受けた。だから『ナウシカ』の一番の功労者は原さん。あくまで制作者である原さんは、その後、スタジオジブリを立ち上げ、連続的に作品を作ってスタジオを維持していくということになってからは身を退いたんだ。

　革命を成すことと、革命を維持するというのは全然別のテーマで、その先に何が待っているかと言うと一党独裁政治。それに則して考えると、そのままそこに残れば革命が裏切られる過程を見なきゃいけなくなる。おそらく原さんは、そういうのを見たくなくて最終的には退いたんじゃないかと、僕は思っている。

──『おもひでぽろぽろ』まで原さんの名前はクレジットされていますね。

押井　一応ね。でも、トップクラフトは『ナウシカ』のあとに解体され、それに代わって徳間書店の出資によってジブリが設立された。原さんは複雑な心境だったと思うよ。でも、ひとつ成功してしまうと、次も作ってみよう。作るんだったらちゃんと組織化して、スポンサーも固めたほうがいいと、どんどん環境は変化していく。映画を作るというのは、ある種の軍事作戦のようなものであり、革命と似ている部分もあって、ジブリが生まれたのもそういう流れのなかだった。

　つまり、何が言いたいかというと、スタジオジブリは『ナウシカ』の成功が生みだした産物。志のある人間が集まって作ったスタジオなんかじゃなくて、言ってみれば成り行きで生まれたようなものということだよ。





『ナウシカ』はなぜ難解な作品になったのか



──『ナウシカ』は７億円以上の収益をあげたようですね。動員は90万人。これは当時としては大成功だったんですか。

押井　公開館は90くらいだったのに、その数字というのは凄いんじゃない？　同じ84年に僕の『うる星２』が公開されたけど、確か動員は80万人くらいだった。『マクロス』も同年に公開されて、これもヒットしたと思うよ。

　ちなみに、公開の順番で行くと、『うる星２』が２月（11日）、『ナウシカ』が３月（11日）、そして『マクロス』が７月（21日）。これで判ると思うけど、『うる星２』は春休み前公開の、いわば「穴埋め」。しかも『すかんぴんウォーク』と２本立て。僕としては複雑な心境だった。『ナウシカ』は春休みだけど、僕の記憶では博打っぽい立ち位置だったと思う。で、本命が夏休み公開の『マクロス』。ある意味、判りやすい（笑）。

　とはいえ、これだけ公開されたんだ。84年は劇場用アニメーションにとってはエポックな年だったと言えるよね。３本すべてがそれなりの数字を稼ぎ、アニメーション映画はマニアだけのものじゃないことを証明したようなかたちになったから。宮さん、河森正治、そして僕の名前をみんなが覚えてくれたのもここからだよ。

　ジブリに関しては、そういう成功があって『ラピュタ』を作ったわけだけど、これは『ナウシカ』の数字を越えられなかったと記憶している。それで失敗作と言う人もいるくらい。僕はそういう状況を見て、映画監督にとっての成功や失敗には、複雑な要因がからんでいて、絶対的な評価の基準があるわけじゃないということを学んだんです。

──なるほど。で、押井さん『ナウシカ』ですよ。

押井　印象的だったのは、大仰なキャッチがついていたこと。「少女の愛が奇跡を呼んだ。」。なぜいまでも覚えてるかと言えば、僕が最初に聞いた企画とは違う方向だったから。そもそも企画の立ち上げのときに呼ばれたのが伊藤君で、彼が宮さんの原作を基にプロットを書いたんだよ。そのときのタイトルは『トルメキア戦記』。戦記オタクの宮さんはこれを大変気に入ったんだけど、そこに待ったが入った。ナウシカの物語なんだから、彼女の名前が入るべきだって言い出した人が現れた。それが高畑さん。結果的には伊藤君とそのアイデアは弾かれ、宮崎＆高畑が二人三脚で『ナウシカ』を作ることになったんだよ。

──宮崎さんと高畑さんは東映時代からご一緒ですが、やはり気が合っているんですか？

押井　彼らの関係性には独特のニュアンスがあって、第三者には窺い知れないところがあるんだけど、少なくとも共に闘った同志ではあった。東映動画の労働組合の副委員長が高畑さん、書記長が宮さん。ふたりの結束力が『ホルス』の原動力になった。東映がまったく期待していなかったこの作品を、実質的に作画面で支えたのが宮さん。ふたりはそれ以来の、まさに同志なんだよ。

　嗜好も趣味も考え方も全然合わないにもかかわらず、ふたりは互いを必要としていた。当時、宮さんは優秀なアニメーターで、自分が演出するなんて考えていなかったからこそ、高畑さんの監督能力を高く評価していたし、高畑さんからすれば、宮さんは自分の作品を支えてくれる豪腕のアニメーター。その関係は『赤毛のアン』まで続いたんだよ。宮さんが初めて監督した『未来少年コナン』のときも、実は高畑さんが協力して何本かコンテを切っている。そういう関係だから『ナウシカ』のプロデューサーとして高畑さんが参加するのは当然の成り行きだったわけだ。

──実は私、今回初めて『ナウシカ』を観たんですが、戦争ものだったのでびっくりしました。もっと穏やかなファンタジーだと思い込んでいたので。原作漫画も読んでないし、心構えができてなかったことも手伝ってか、国同士の関係性が判りづらかった。最初に地図を出して世界観を説明して欲しかったと思いました。

押井　世界観の説明はファンタジーのお約束のようなものだからあって当然だし、宮さんにも当初はそういう意識はあったと思う。そもそも元ネタは、宮さんの大好きな『指輪物語』や『デューン／砂の惑星』に違いないんだから、あったに決まっているんだよ。では、なぜなくなってしまったのか。そこには〝ナウシカの物語なんだから、タイトルにはナウシカを入れるべきだ〟と言った高畑さんの意思が介入している、たぶん。

　つまり、ファンタジーの場合、まず大状況を語って、それから主人公を語るという流れが定式であるにもかかわらず、『ナウシカ』の場合は、局所的な事件から始めて、そのなかでディテールを語りつつ全体像を見せるという変則的な構成になっている。これはもう、高畑さんの意図としか思えない。あの人は大状況から下ろしていくという、ある意味大仰な身振りが嫌いだから。もれなく個別状況から入る人だからね。人間の物語である以上はキャラクターの周辺から始めるべきだという確固たる考えをもっているのが高畑さん。彼はリアリズムの人で、その文法で映画を作るとしたら間違いなくそうなるんだよ。それがたとえ戦争ものであったとしても。

　ファンタジーや戦記が大好きな宮さんはおそらく、ファンタジーの王道を踏みたかったはずだよ。ファンタジーを志す者はみんな同じだけど、それに対する憧れや理想から入る。宮さんだって同類だよ。そんな宮さんに〝それは映画としてはいかんのだ〟と言えた人物は高畑さんだけ。

──宮崎さんは、原作漫画があるから、ある程度説明を端折ってもいいと考えたんでしょうか。

押井　自分で原作漫画も描いているので、国同士の対立から、大破壊以前の歴史を含めて、あらゆる設定が頭のなかにすでに入っているはずではある。その膨大な情報を２時間に収めなきゃいけないわけだから、これはとても大変な仕事になるわけだ。

　でもさ、そういうときって、自分はすべて判っているから、そう簡単には観客の目線にはなれないもんなんだよ。『ナウシカ』はジブリ作品のなかでももっとも大風呂敷を広げた映画。初めて触れる人にとってはかなり難解な作品になったんだと思うよ。

──それに、もっとエコロジカルな作品だと思っていたんですが、その要素が薄いのにも驚いたんです。やっぱり戦争映画色が一番強かった。

押井　当時の劇場用アニメーションのほとんどは、好戦的な戦争映画っぽいものばかりだったのは事実。だって『ヤマト』『ガンダム』なんだからさ。そのほかのアニメといえば『東映まんがまつり』くらいだったんじゃない？

　で、その戦争もののなかでもとりわけ多かったのが核戦争後の話。いわゆるポストアポカリプスもの。当時はそれがとても流行っていて、『マッドマックス』や『北斗の拳』等、映画も小説もアニメもみんな同じテーマばかりだった。

　当時、なぜそんな状況だったかというと、冷戦時代だったから。第三次大戦、核戦争というのは、世界にとってリアルな恐怖だったんだよ。誰も冷戦が終わるなんて考えもしなかったし、冷戦が終わるときは世界が終わるときだとみんな考えていた。核戦争後の廃墟という設定を使えば、ならず者もエスパーもモンスターも宇宙人も何でもオッケー。そのなかで、世界を救うとか、やたら大風呂敷を広げた〝テーマ〟の作品がたくさん作られるようになった。あの頃のアニメーションには〝救う〟という大義名分が必要だったんだ。まあ、実際にやりたかったのはただの戦争なんですけどね（笑）。『ガンダム』も『ヤマト』も世界を救うという大義名分を振りかざした戦争映画。みんな自分のやりたい戦争を正当化するために〝世界を救う〟というテーマにしがみついたわけ。僕も戦争ものをやりたかったから、そういう心理はよく判ります。

──『ナウシカ』もそうだったんですね？

押井　『ナウシカ』もそのなかの１本で、時代の産物と言っていいと思う。ただ、宮さんは単に流行に乗ったわけじゃなく、ファンタジーとして、壮大な戦争状況のなかでひとりの少女の物語を語りたかっただけなんだと思うよ。





気分で突破する宮崎、理詰めの高畑



──『ナウシカ』、押井さんは好きなんですか？

押井　僕はまったく好きじゃありません。公開当時からそれは変わらない。世界を救うレベルの話が嫌いだし、ナウシカは完全無欠のヒロインすぎる。

──父親（族長ジル）を助けようとして、敵をメッタ斬りにするのにはちょっと驚きました。ここまで描くんだって。

押井　そうなんだよ。後半には重機関銃まで登場して、ナウシカは腰だめで撃つ。必要とあらば暴力をいとわないボリシェビズム。ナウシカは堂々と殺している。公開当時は「それが嫌だ」という人がいたし、子供文化関係のおばさんは「女の子が人を殺しまくる映画がなぜ評価されるのか理解できない」と言っていた。ある意味、まっとうな意見だと思うけどね。

──でも、自然描写は素晴らしかった！

押井　それは宮さんの十八番。『赤毛のアン』の頃から「自然描写といえば宮崎駿」と言われていたのは事実だから。単純な塗り分けだけですべてを表現できるし、本人も「線と塗り分けだけで表現できないものはない」と豪語していた。実際その通りなのだから、これは認めざるを得ない。

　ほかにも、パンを頰張ったりシチューをすすったりという、ものを食べる描写の上手さは天下一品。あとは服のボタンをかける仕草とかね。宮さんの口癖のひとつは「基本的にアニメーションは感覚の再現」というもので、これは僕も散々聞かされた。感覚を再現できるのがアニメーターであって、正確に手順を踏んで描くのはアニメートではないというのが持論なんだよ。

──それって、リアルを追求する高畑さんとは真逆じゃないですか？

押井　うん、だからふたりは全然違う。気分で突破しちゃう宮さんと、理詰めで全部やらないと気が済まない高畑さんは、演出レベルではまさに水と油。作りたいものも、たとえ大テーマで一致できたとしても、個々の場面では明らかに違う。だから、袂を分かつというのは時間の問題でもあった。

　ふたりのその大テーマは、ある種の社会的なもので「人間社会はいかにあるべきか」というような話になってしまう。

　そういう意味で言えば『ナウシカ』は、宮さんの原点でもある作品だろうね。というのも『コナン』や『カリオストロ』には、やっぱりアニメーションの楽しさが横溢していて、ある種の爽快感とリズム感で成立している。設定の使い方やアクションの躍動感が際立ち、その一方で物語は極めてシンプル。これは、宮さんがいつも言っている「漫画映画とは、とにかく楽しいものでなくてはいけない」というポリシーに基づいていて、くだんの２作品には確かにその楽しさが息づいていた。

　でも、作品をそれ以上のものにしたいのなら、あるいは、２年、３年かける大作の場合には、やはりテーマが必要になる。大上段に振りかぶったテーマだよ。『ナウシカ』で宮さんは、大テーマを掲げて、それをアニメーションの得意ワザの連続で説得しようとしたわけだ。そういう意味で『ナウシカ』は、宮さんのひとつの原点となった作品なんだよ。あとの話になるけど、そういう姿勢が『となりのトトロ』を歪んだ作品にしてしまったんだけどね。

──押井さんはよく、宮崎さんはロジックがないとおっしゃってますよね。

押井　うん。宮さんは没論理的な人ですから。彼は本能的な人間で、鋭い勘が大きな武器。高畑さんは理詰めですべて考える。「こうあるべきだ」「なぜならば」が常にあるのが高畑さん。

　ふたりが企画会議をしている場面を何度か目撃したことがあるけど、ディスカッションじゃなくケンカだったから。宮さんはディテールから入る人で「こういうシーンを描きたいな」等が、どんどん頭のなかで膨らんでいく。全体を見渡せる人じゃないんですよ。

──それこそオタクですね。

押井　宮さんこそ〝元祖オタク〟なんだから。オタクが欲しがるアイテムを作り出した張本人。美少女、戦う美少女、ガジェット……胸は巨大でルックスは童顔の美少女も宮さん。（『カリオストロ』の）クラリスは違うけど、ナウシカは巨乳だしね。でもそれは、宮さんに言わせれば劣情じゃなく、正当な美意識。つまり宮さんの場合、ただそれが普通の人と違うだけなんだよ。アニメーションって特殊な形式で、作った人間のフェチが丸出しになってしまうから仕方ないんだけどね。

──ナウシカの自己犠牲はどうです？

押井　それも宮さんの得意ワザ。宮さんは僕の『天使のたまご』を観て「まるで特攻隊だ」と表現したんだけど、それは映画の作り方が、帰って来ることを考えていない特攻隊のような感じだったからで、「アンタ、あんなものを作っちゃダメなんだ」ということになる。

　じゃあ宮さんはどうかというと、確かに映画の落としどころは知っているだろうけど、描いているものは特攻隊そのもの。自己犠牲によってしか救われないという物語ばかり描いている。『ナウシカ』から『ラピュタ』、『もののけ姫』なんてその最たるもの。僕は自己犠牲なんて大嫌いだから、一回もやったことはありません。

──押井さんの言うことも判りますが、自己犠牲はやっぱり目頭が熱くなりませんか？

押井　だから『忠臣蔵』なんだよ。最後は腹を切ればいいというのは、日本人の心のなかに必ず眠っている価値観。僕は大嫌いですから。

──でも、押井さんの好きなジェームズ・キャメロンは自己犠牲映画をたくさん作ってますよ。『ターミネーター』や『アビス』なんて自己犠牲映画のホームラン王じゃないですか。

押井　ヒーロー映画は基本的に自己犠牲でしか成立しないんだよ。『ターミネーター』の場合は、カイル・リースが、写真のサラ・コナーに恋をして過去にタイムトラベルする。彼女を救うために命を差し出すわけだから、筋は通っている。

　じゃあ『ナウシカ』は何のために死のうとしたのか？　それ判る？　おそらく判らないと思うよ。主人公の心理線を辿り、彼／彼女がそこで何を考え、どの時点で命を差し出そうと決意したのか。それを観客に辿らせてあげるのが演出の基本。でも、宮さんはそのプロセスをちゃんと踏まないから、ストーリーがよく判らない。

　とはいえ『ナウシカ』は、そういう宮さんの欠点がまだ顕わになっていない作品ではある。そういうストーリーの甘さや、実は破壊や殺戮が好きなところも、まだ露骨じゃない。宮さんの本質がギリギリのところで見えにくい。要するに、時代の産物である核戦争後の廃墟の物語というバランスのなかで、わりと幸せな一致を見た作品ではあるんだよ。

　とはいえ僕の目は、それでも宮さんの暗黒面の萌芽をあちこちに見てとれるんだけどさ（笑）。





スタジオジブリ



　85年に設立されたアニメーションスタジオ。その名の由来は「サハラ砂漠に吹く熱風」。14年に制作部門の休止を発表したが、17年に宮崎新作制作のため制作部門が再稼動した。





宮さん



　宮崎駿（みやざき はやお）のこと。41年東京生まれ。58年の東映動画作品『白蛇伝』に感動してアニメに興味を覚える。学習院大学卒業後、63年に東映動画に入社。『ホルス』等を手掛ける。73年に日本アニメーションに入り『アルプスの少女ハイジ』『コナン』等を担当。79年にテレコム・アニメーションフィルムに移籍。85年からスタジオジブリに。





鈴木敏夫（すずき としお）



　48年名古屋生まれ。72年徳間書店に入社。『週刊アサヒ芸能』編集を経て『アニメージュ』の副編集長に。その後編集長となり89年にジブリに移籍する。





『アニメージュ』



　日本初のアニメーション専門誌。74年、『宇宙戦艦ヤマト』の大ヒットによってアニメブームが起き、78年に徳間書店から創刊された。





尾形さん



　尾形英夫（おがた ひでお）のこと。33年宮城県生まれ。『アニメージュ』初代編集長。同誌で『風の谷のナウシカ』の漫画連載を始めた。ジブリの『ナウシカ』『トトロ』等では企画、『豚』では製作総指揮。押井の『天使のたまご』でも企画としてクレジットされている。07年逝去。





徳間康快（とくま やすよし）



　21年神奈川県生まれ。43年読売新聞社入社。61年徳間書店を設立。『ナウシカ』から『千尋』までジブリ作品の製作・製作総指揮を務めた。『コクリコ坂』には当人と思われる「徳丸」なる人物が登場する。





高畑さん



　高畑勲（たかはた いさお）のこと。35年三重県生まれ。東京大学仏文科卒業後、東映動画入社。ＴＶアニメ『狼少年ケン』で演出家デビュー。宮崎とともに日本アニメーションに移り『ハイジ』『母をたずねて三千里』『赤毛のアン』の演出を手掛ける。ジブリに入社後、最初の監督作は87年の実写ドキュメンタリー『柳川堀割物語』だった。





原さん



　原徹（はら とおる）のこと。35年福岡県生まれ。59年東映動画に入社し『ひみつのアッコちゃん』等の製作を担当。72年に自身の制作会社トップクラフトを設立。海外アニメを中心に制作し、宮崎の頼みで『ナウシカ』を制作。そのヒットでジブリが設立され、トップクラフトはそこに吸収される形になった。ジブリでは常務取締役。『ぽろぽろ』まで製作・製作総指揮を務めるも、同作を最後にジブリを退社した。





『うる星２』



　『うる星やつら２ ビューティフル・ドリーマー』のこと。押井の監督・脚本作で、永遠に繰り返される学園祭前夜というアイデアが光った。驚愕のラストも話題となり、後年『ダークシティ』（98）が同様のエンディングだったため、監督アレックス・プロヤスに『うる星２』の影響を尋ねたが「観ていない」と答えた。





『マクロス』



　『超時空要塞マクロス愛・おぼえていますか』のこと。ＴＶシリーズの人気を受けた劇場版第１弾。共同キャラデザインに美樹本晴彦。ヒロインのリン・ミンメイが歌う主題歌『愛・おぼえていますか』が大ヒットした。





河森正治（かわもり しょうじ）



　メカニックデザイナー、アニメーター、監督。60年富山県生まれ。『マクロス』で頭角を現した。代表作に監督もした『創聖のアクエリオン』、メカデザイン担当の『交響詩篇エウレカセブン』。変形ロボのプロ。押井とは『パト２』等のメカデザイン、『立喰師列伝』では出演を果たしている。





伊藤君



　脚本家の伊藤和典（いとう かずのり）のこと。54年山形県生まれ。スタジオぴえろに入社し、押井がチーフ監督を務めたＴＶシリーズ『うる星やつら』で文芸、シリーズ構成、脚本を担当。のちに押井たちと『パト』の原作チーム、ヘッドギアを結成した。押井作品の脚本は『アヴァロン』まで。その他の代表作に『ガメラ　大怪獣空中決戦』、ＴＶアニメシリーズ『.hack』等がある。





『ホルス』



　『太陽の王子　ホルスの大冒険』のこと。68年製作。王子ホルスと悪魔グルンワルドの戦いを描くファンタジーアドベンチャー。作画監督に大塚康生、宮崎は原画マンとして参加した。





『赤毛のアン』



　79年１月から同年12月までオンエアされた日本アニメーション製作のＴＶシリーズ。高畑が演出、宮崎が作画として参加。





『未来少年コナン』



　78年４月から10月までＮＨＫでオンエアされた日アニ製作のＴＶシリーズ。宮崎初の監督作として知られるＳＦアドベンチャー作品。米国の作家アレグザンダー・ケイの『残された人びと』をベースにしているが、大きく翻案されている。





『指輪物語』



　英国の作家Ｊ．Ｒ．Ｒ．トールキンが54年に発表したファンタジーシリーズ。『旅の仲間』『二つの塔』『王の帰還』の３部構成。架空の世界、中つ国を舞台に、世を統べる〝ひとつの指輪〟を巡って善と悪が戦いを繰り広げる。ラルフ・バクシが78年にアニメ化、ピーター・ジャクソンが実写化した。





『デューン／砂の惑星』



　65年に米国の作家フランク・ハーバートが発表したＳＦ小説。のちにシリーズ化され６作まで書かれた。デューンと呼ばれる砂の惑星アラキスを舞台に、宇宙を支配するというスパイスを巡る戦い、そして救世主と革命の物語が綴られる。『ナウシカ』の王蟲は本作の砂虫の影響と言われている。84年にデヴィッド・リンチが映画化した。





『ヤマト』



　『宇宙戦艦ヤマト』のこと。74年開始のＴＶアニメが好評を博し77年にこの劇場版が作られた。人類を滅亡から救う装置を求めイスカンダル星に旅立つヤマト。企画・原案は西崎義展、監督は松本零士。のちにたくさんの関連作が作られた。





『東映まんがまつり』



　69年の春に始まった、東映の複数作品による劇場公開スタイルの総称。春休み、夏休み、冬休みに公開された。90年からは「東映アニメフェア」と改名され02年まで続いた。





ポストアポカリプス



　第三次大戦や核戦争によって廃墟となった地球を描く小説や映画等を指す。「終末もの」ともいう。





『マッドマックス』



　79年の豪州映画。砂漠と化した豪州を舞台に、妻子を殺された警官マックスの復讐を描く。砂漠化した世界は、のちのＳＦ映画に大きな影響を与えた。本作は世界的に大ヒットしシリーズ化。メル・ギブソン版が３本、二代目トム・ハーディ版が１本作られた。監督はすべてジョージ・ミラー。





『北斗の拳』



　83年から88年まで『週刊少年ジャンプ』に連載されていた漫画。原作は武論尊、作画は原哲夫。84年～88年までＴＶアニメシリーズが放映され、86年には映画版も作られた。核戦争後の荒廃した世界を舞台に、北斗神拳伝承者ケンシロウの活躍を描く。





『カリオストロ』



　『ルパン三世　カリオストロの城』のこと。79年の宮崎監督初劇場作品にして『ルパン三世』の劇場映画第２弾。その昔に恩を受けたカリオストロ公国の姫クラリスを政略結婚から救おうとするルパン三世の活躍。





『天使のたまご』



　85年に製作された押井守、原案・監督・脚本によるＯＶＡ作品。廃墟の町で少年と、たまごを抱えた少女が出会う。キャラクターデザインは天野喜孝。





ジェームズ・キャメロン



　米国の監督・脚本家・製作者。54年カナダ生まれ。ロジャー・コーマンの会社のＳＦＸマンからキャリアを始め『ターミネーター』で注目される。代表作に『タイタニック』『エイリアン２』『アバター』等。脚本を書け、ＶＦＸに明るいのが強み。





『ターミネーター』



　ジェームズ・キャメロン監督・脚本の84年製作のＳＦアクション。マシンに支配される未来から、ふたりが現代のロスに送り込まれる。ひとりは人類の救世主ジョン・コナーの母親サラを救おうとする戦士カイル・リース、もうひとりはジョンを消すためサラを亡き者にしようとマシンが送り込んだアンドロイド、ターミネーターだった。のちにシリーズ化され合計５本が作られたが、キャメロン自身が監督を担当したのは本作と『２』の２本だけ。





『アビス』



　89年製作のＳＦ映画。海底油田の採掘基地で人類が出会ったのは未知の生命体。彼らの目的を知ったとき主人公は……。ＳＦ好きでダイビング好きで自己犠牲好きのキャメロンらしさが詰まりまくった作品。主演エド・ハリス。





STORY



少年パズーは、空から落ちてきた少女シータと出会う。彼女は空に浮かぶ伝説の帝国ラピュタ王家の末裔だった。ラピュタの秘密を手にしたい特務機関のムスカ、空中海賊ドーラ一家に狙われつつ、シータとパズーはラピュタを探す冒険に出る。





キャスト：田中真弓　よこざわけい子　初井言榮　原作・脚本・監督：宮崎駿　プロデューサー：高畑勲　公開日：１９８６年８月２日　上映時間：約１２４分　興行収入：約11・６億円　キャッチコピー：ある日、少女が空から降ってきた…





宮さんの漫画映画の理想が形になった『ラピュタ』





──次は『天空の城ラピュタ』です。『ナウシカ』から２年半ほどで公開された冒険ファンタジーアニメーションですね。脚本は宮崎さんのオリジナル。

押井　確か『ラピュタ』を作っていた前後だと記憶しているんだけど、僕はフリーになったばかりで毎日、二馬力に通っていたんだよね。だから宮さんとはいろいろ話していたし、トシちゃんもよく来ていたから３人で飯を食ったり、いつもワイワイやっていた。

──そういう時期もあったんですね。だったら『ラピュタ』のバックグラウンドには詳しいとか？

押井　いや、別にそういうことはないけど、『ラピュタ』は結構好きかな。もしかしたら宮さんの作品のなかで一番好きかもしれない。

──『ラピュタ』のほうが好きなの？『ハウルの動く城』が一番好きだと思ってました。

押井　『ハウル』は、宮さんが珍しく本音でいいことを言っているから評価しているわけで、完成度で言うなら『ラピュタ』のほうが上。技術的なこと、作画の面で言うと、あちこちにボロが出ているけどね。当時はスタッフが揃っていたわけじゃなく、それを宮さんが力技でカバーして、やっと完成にこぎつけたというのが内情。だから、最終ロールでいきなりクオリティが下がっていて、エンディングなんてＴＶアニメ並みだから。

　でもストーリーは、古典的な構造をもった少年少女の冒険物語として非常に魅力があり、よくできている。まさに王道だよ。ある種、『カリオストロ』に近いのかも。みんな『ラピュタ』にいい印象をもっているのは、そのせいなんじゃない。

──王道といえば、オープニングの画がまるで絵巻物のようで、いかにもファンタジー。ちょっとカレル・ゼマンっぽいところも好きでした。

押井　あれは「なるほど、この手で来たか」という感じだよね。昔からある古典的な表現を、いまの時代のデザイン、いまの時代のグラフィックな作画でやってみたわけだ。この頃の宮さんには、まだそういうモチベーションがあった。つまり、かつて自分が観たものに対する憧れ、それを自分の手で生み出したいという気持ちが確かにあったんだよ。だから『ナウシカ』と『ラピュタ』には、宮さんのファンタジー力というか、ファンタジーの教養が全面展開している。それは宮さんのいい部分。

──そういうファンタジーのシーン、『ラピュタ』にはたくさんありますよね。

押井　僕がさすがだと思ったのは、パズーが監獄に放り込まれ、ムスカにお金を貰ってトボトボと帰って来るエピソード。パズーは「自分は無力だ、何もできないんだ」という現実を突きつけられて打ちのめされるんだけれど、そこから見事立ち直って、もう一回、あの要塞に突撃する。そのときのパズーは超人的な活躍をみせるから、確かにありえないと言う人もいるかもしれない。でも、それを敢えてやるのが漫画映画。もっと言えばそれこそが映画なんだよ。

　お金を貰ったことでパズーは、シータを売り渡したような気持ちになる。もし、そこで終わってしまえばリアリズムとしては成立するだろう。父親が変人扱いされ、たったひとりで生きてきた少年に突きつけられる現実。僕は好きになった少女ひとりさえも助けられないのかってね。「人生は厳しく、残酷なものだ」というだけの物語で、どこがネオレアリズモと違うんだということになる。で、そんなの誰が観たいのかと考えるのが宮さん。それこそが宮さんの映画に関する思想のすべてなんだよ。「ウソは承知で、敢えてやる」という考え方だよ。

──そういう展開には痛快さがありますよ。

押井　『ナウシカ』にもその要素はあるけれど『ラピュタ』の場合は正面からぶつかっているから、まさに真骨頂と呼べる大胆さがある。打ちのめされ、それから再び立ち上がってからが、言ってみればファンタジーで、宮さんの漫画映画の理想になる。それを堂々とやってみせて、みんなが爽快感を味わうんだから、素晴らしいことには違いないよ。

　でも、その一方で、残念な矛盾点もある。「（映画を）観ている間、信じられればいい」というコンセプトで作っているくせに、びっくりするような残酷さがあるじゃない？　ゴリアテ（飛行戦艦）から兵士たちがバラバラと落ちていくシーンだよ。しかも、その様子を眺めながらムスカが「見ろ！　人がゴミのようだ」と言って笑うんだから、あれには正直、かなりびっくりした。残酷さはファンタジーに付きものの要素だとはいえ、この映画でやる必要があるんだろうかと思ったわけ。僕に言わせれば「不必要な残酷さ」。作品が目指しているものと、実現したものがある種の破綻を起こしている。それは宮さんのもっている本質的な残酷さだと、僕は思っているけどね。

──確かに、ちょっとぎょっとしました。

押井　うちの師匠だって絶対、それは避けるよ。それは『魔女の宅急便』の飛行船の落下シーンと同じ。まあ、それについてもまた話すけど、少なくともうちの師匠は激怒していたから。

──宮崎さん、盛り込みたい性格なのでは？

押井　そうそう。スペクタクルを描かなきゃ映画として成立しないと思い込んでいる。そのゴリアテのシーンも本人はスペクタクルのつもりでやっているんだろうけど、結局、そうは見えてないから破綻しているんだよ。





海賊ばあちゃんは世間のシンボル



──盛り込みたいシーンをいろいろ考えるんですかね？

押井　宮さんは脚本を書かなくて、その代わりに大学ノートにびっしりメモを書く。自分のやりたいシーンを細かく書くんだよ。ストーリーや言わせたいセリフとか、あらゆることをメモり、それをベースに絵コンテを切っていく。

　宮さんが『ラピュタ』の最後の絵コンテを切っている頃にスタジオに行ったら、その部分のコンテについていろいろ話してくれた。ほら、ラピュタが崩壊したあと、海賊のばあちゃん（ドーラ）が、ちゃっかり懐に宝を入れていて「さんざん苦労して、これっぱかしさ」と言うシーンがあるじゃない？　僕が見せてもらった絵コンテには確か、ドーラがパズーたちに「お前たちには絶対必要になるから、これを持っておいき。邪魔にはならないよ」みたいなセリフを言うシーンもあって、宮さんは「これがいいんですよ！」と自画自賛していた。

──完成版にはないですよ。

押井　うん、なぜ切ったのかは知らないけれど、僕もそのエピソードとセリフはいいと思った。要するに、このドーラというばあちゃんは〝世間〟みたいな存在で、若いふたりが知らない知恵をたっぷりもっている。だからこそ、お金は将来必要になるということを教えてくれるわけだ。シンドバッドじゃないけど、大冒険の末、宝はすべてなくしても、一番大切な宝であるお姫様はちゃんと手に入れました、なんてことじゃあ世間では成り立たない。宝の一握りくらいは必要だという現実を、ドーラは教えてくれる。つまり、このばあちゃんは世間のシンボルのような存在で、僕はそこに「なるほどな」と思ったわけ。映画の落としどころとしての社会性。若いふたりがこれから辿るだろう人生を感じさせるじゃない？　こういう要素がなければ、ただの絵空事に終わってしまうだろう……なんてことを、いろいろと僕も教えてもらったんだよ。ファンタジーを、単なる絵空事に終わらせないために、この社会性の必然を感じたんだよね。





フェティッシュと語りたい物語



──あと、押井さんが『ラピュタ』でよく言うのは、パズーのおやじ化ですよね。

押井　シータを自宅で眠らせ、一夜明けたとき、パズーが自分の胸をボリボリと搔く。これはもう完璧にオヤジの仕事で、少年とは思えない。「オレにもオンナができたぜ」みたいな感じ。おそらく宮さんは無意識にそういうシーンを入れたんだろう。でも、そうやってクリエーターの趣味嗜好や欲望がまんま出てしまうのがアニメーションなんだよ。沖浦の場合で言えば足首の太い女の子だし、僕で言うと女性の手足が好きだから、ついそっちを描いてしまうとかだよね。だから、アニメーションはフェティッシュの形式とも言えるんですよ。

──（『ルパン三世（ＴＶ第２シリーズ）』の最終話に出てくる）ラムダに似たロボット兵も、宮崎さんの欲望の塊なんですか？　元ネタはフライシャー兄弟だと言われていますが、アレンジはとても宮崎さんっぽいですよね。

押井　フライシャー兄弟のロボットが元ネタだけど、あと出しジャンケンだから、宮さんのロボット兵のほうがいいのは当たり前。腕から羽のような翼が何枚も出て空を飛んだり、身体に緑の枝や葉っぱがついていたりと、本当にいろんなアイデアが満載されている。しかも、それを説得力をもって描けるから、その才能は本当に素晴らしい。宮さんが『ラピュタ』で愛しているのはロボット兵とシータ。一番愛しているのはロボット兵だね。

　なぜかと言えば、あれは宮さん自身だから。宮さんによる自分の定義はエスコートヒーロー、大切な女の子を守るモンスターです。あの人の自己意識は完全にエスコートヒーローで、それが爆発しているのが『紅の豚』であることはまた語るけど、ここに宮さんの映画が常に破綻している理由がある。つまり、語りたい物語や描きたい画と、自分の性癖とがいつも闘っているんだよね。だったら自分のフェティッシュを封じ込めればいいと言う人がいるかもしれないけど、それこそが作品を作るモチベーションなのでできるはずがない。だから、時にめちゃくちゃバランスの悪い作品が生まれてしまう。『ナウシカ』やこの『ラピュタ』が誰にでも普通に楽しめるのは、比較的そのバランスが取れているからなんだよ。

──じゃあ、バランスのもっとも悪いのが『紅の豚』、なわけですか？

押井　そう、まさに宮さんのなかでバランスが崩れた瞬間が『紅の豚』になる。宮さんの作品には、だから常にそういう危うさがある。それにもかかわらず、多くの人が宮さんの作品に魅せられてしまうのは、ディテールの凄さ。彼はディテールに対する執着が凄まじく、しかも説得力もある。それこそ宮さんの類いまれな才能で、誰も真似できない。だから、少々ストーリーが矛盾を抱えていたり、破綻していても、何となくみんな説得されてしまう。冷静になればツッこみどころ満載であるにもかかわらず、見ている間、そんなことが気にならないんだよ。宮さんは、ドラマツルギーとか構造がある人じゃないんです。

──その原因は、脚本ではなく絵コンテを切ることから始めるせいなんですか？

押井　脚本の才能はないよ。うちの師匠とは正反対。師匠の口癖は「演出は脚本がすべてだ。自分の思いなんて入れなくていい。そんなもんは家に帰って日記に書いとけ」だったから。「まず監督としての義務を果たせ」とも言われていた。監督は常に客観性をもち、絶えず修正し続けるんだということを、僕も教え込まれましたから。

──じゃあ、宮崎さんは……。

押井　ゼロです。客観性なんてカケラもありません。

──ゼロとは凄いですね。

押井　本人はあると思ってるけど、ゼロです。

──そういうこと、宮崎さんに直接、言ったことあります？

押井　うん、散々ケンカしているけど、その原因の多くはそういうことだったから。「映画は熱い思いで作るもんだ」というのが宮さんで、僕は「それだけじゃ、ダメでしょ」。だから常にぶつかっていた。

──でも、宮崎さんの映画には、確かにそういう〝熱さ〟を感じますよね。だから共感する人が多い。

押井　僕は自分のスタッフから「あんたの映画には、宮さんのようなキャラクターは絶対出てこない」「だからダメなんだ」とか、「あんたの登場人物には感情とか情緒がないんだよなー」とか、言われてるよ。

──それ、意外と正解なのでは？

押井　もちろん正解ですよ。だって、そうやって作っているんだから先刻承知だって。キャラクターに思い入れすることで（物語を）成立させているんじゃなくて、映画の構造で説得しているんだから、宮さんとはまったく違うんだよ。だからこそ、宮さんの作品の構造がよく見えてくる。僕は人の映画を観るときは、構造的なものしか意識しない。それこそが映画の本質だから。

──あと、『ラピュタ』にも、ちょっと説教臭いところがありますよね。天空の人はこうやって滅びたんだという部分。

押井　人間は大地に根っこを張って生きるものだという考え。「ほうら出てきた」って（笑）。森林信仰であり農村回帰ですよ。でも、大地に生きることだけやっていたら、人間は人間にならなかった。だって文明拒否だよ？

──だから時代を産業革命時にしているの？

押井　そこがおかしいんだよ。パズーが住んでいる炭鉱町とラピュタの本質的な違いなんてないでしょ。どちらも機械文明なんだから。それを否定してパズーたちはどうやって生きていくの？　あの子が乗っている飛行機はどうするんだって。パズーが飛行機マニアという設定と、大地に帰れという『ラピュタ』のテーマとは対立しちゃうんだよ。言うまでもなく、パズーが飛行機マニアなのは、宮さんがそうだからなんだけどね。

──それが「語りたい物語と、自分の性癖の闘い」になるわけですね。

押井　宮さんが言っていたのは「空中戦は世界で一番上手に描ける自信がある。でも、やらないんだ」。なぜ、やらないかというと、戦争を肯定したくないから。でも、本当にやりたいのは空中戦。そこに矛盾を抱えているんだよ。

　その一方で、戦闘機や爆撃機、戦車とか、あらゆるものを描いている。要するに宮さんは軍オタ。間違いなくマニアで、それは僕も同じだからよく判る。ただ、お互い好きな時代がずれているのでバッティングはしない。宮さんは第一次大戦と第二次大戦の間まで。僕の場合はそのあとで、趣味は一致していない。だから共存できたんだよ。宮さんが評価するのはレシプロだけで、ジェット機は大嫌い。要するに複葉機とか、見える技術が好き。見えない技術を憎んでいるくらいだから。僕はジェット機大好き。でもさ、僕に言わせれば、複葉機であろうがジェット機であろうが、生まれたその時代の最先端の技術には変わりがない。時代が変わっただけで、本質は何も変わっていないんだよ。

──なるほど。そういう宮崎さんの抱える矛盾については、これからもたくさん出てきそうですね。





二馬力



　84年に宮崎が設立した個人事務所。名前の由来は自らの愛車、シトロエン２ＣＶ。２ＣＶとは二馬力の意味。16年にジブリに吸収合併された。





カレル・ゼマン



　10年生まれのチェコスロバキアのアニメーション監督。ジュール・ヴェルヌの原作を基にした、『悪魔の発明』（58）がつとに有名。モデルアニメや切り絵、俳優を自在に使い、その風合いはエッチングの版画のよう。ヴェルヌが考えただろう空想科学小説の世界を見事にビジュアル化している。89年逝去。





ネオレアリズモ



　40年代から50年代にかけてイタリアで起きたリアリズムを追求する風潮。映画や文学にその影響が大きく、映画ではロベルト・ロッセリーニの『無防備都市』（45）、ヴィットリオ・デ・シーカの『自転車泥棒』（48）が有名。





師匠



　アニメーション監督・脚本家・小説家の鳥海永行（とりうみ ひさゆき）のこと。タツノコプロでキャリアをスタートし、のちにスタジオぴえろに移籍。代表作に『科学忍者隊ガッチャマン』（72）、『ニルスのふしぎな旅』（80）、『太陽の子エステバン』（82）等がある。押井は彼のあとを追ってタツノコからぴえろに移ったほど。その関係性は、押井による弊社エッセイ本『友だちはいらない。』に詳しい。





沖浦



　沖浦啓之（おきうら ひろゆき）のこと。アニメーター、アニメ監督。66年大阪府生まれ。92年『走れメロス』（キャラクターデザイン・作画監督・絵コンテ）等を手掛け、押井原作の『人狼 JIN-ROH』（00）で監督デビュー。その他の作品に12年『ももへの手紙』（原案・監督・脚本・絵コンテ）等。参加した押井作品は89年『パト１』（原画）、93年『パト２』（原画、作画監督補佐）、95年『GHOST IN THE SHELL／攻殻機動隊』（キャラクターデザイン・作画監督・レイアウト・原画）、04年『イノセンス』（キャラクターデザイン・作画監督・原画）。





フライシャー兄弟



　マックス＆デイブ・フライシャーのこと。21年にフライシャー・スタジオを設立し、『ベティ・ブープ』『ポパイ』『スーパーマン』を製作。劇場用長編は『ガリバー旅行記』（39）、『バッタ君町に行く』（41）等。なお、『ラピュタ』のロボット兵のモトネタは『スーパーマン　なぞのロボット大暴れ』に登場する銀行強盗ロボ。





レシプロ



　レシプロエンジンのこと。20世紀前半の自動車や航空機等の動力源。レシプロとは往復を意味するレシプロケーションの和製略語。





STORY



小学６年生のサツキと妹のメイは、父親に連れられ母親が入院する病院近くの農村に越してきた。森の近くに建つ和洋折衷の一軒家での暮らしを楽しむふたり。そんなある日、子供にしか見ることのできない不思議な生き物トトロに出会う。





キャスト：日高のり子　坂本千夏　糸井重里　島本須美　北林谷栄　原作・脚本・監督：宮崎駿　公開日：１９８８年４月16日　上映時間：約86分　興行収入：約11・７億円　キャッチコピー：このへんないきものは、まだ日本にいるのです。たぶん。





鎮守の森のファンタジーを成立させた〝洋館〟





──では『となりのトトロ』です。この作品、アニメーションとしては初めて『キネマ旬報』の年間ベストワンに選ばれた。宮崎さんが映画界、映画評論家という人たちに注目されるようになった最初の１本だと思いますよ。

押井　そうだったっけ？　麻紀さんはいつ観たの？

──実はずっと観てなくて、今回初めて観たんです。思いのほかよかったのでちょっと驚いちゃって。これも宮崎さんのオリジナル脚本ですよね。

押井　一応、そういうことになっているよね。元ネタがないということはありえないんだけど、敢えてそれを言わないというのもジブリ神話を支えた要素のひとつ。

──『トトロ』の原作者としてクレジットされているのは一応、宮崎さんですよ。

押井　それはそうなんだけど、宮さんの元ネタは北欧民話に登場するトロール。それを自分流にアレンジして登場させている。日本には鎮守の森の伝承や民話があるものの、そこには擬人化された妖精は出てこない。せいぜい出てきても座敷わらしくらいかな。じゃあ、日本には存在しないそういう妖精を、どうやって登場させようとしたのか。そのひとつのポイントになるのが、一家が移り住む田舎の一軒家。

──田舎にもかかわらず、家の一部が洋館の佇まいというのが印象的だった。大学で教えているらしいパパがそこでお仕事してましたけど。

押井　そう、なぜなら『トトロ』は昭和30年代の日本の田舎を舞台にしながらファンタジーを語ろうとした作品で、それをより説得力のある物語にするにはヨーロッパ的な要素が必要になる。日本の鎮守の森の物語を、そのままファンタジーに転化することはできないので、宮さんはトトロというトロールのような妖精を登場させ、家の一部を洋館にしたんだよ。そういう設しつらえをしないと、鎮守の森の物語はファンタジーとして成立しない。そのまま差し出せば諸星大二郎の世界だから。

──確かにそうかも。

押井　売る側としては、やはり宮崎駿のオリジナルとして売りたいわけじゃない？　最初の『ナウシカ』のときから、〝宮崎駿の世界〟というふうに売っていたわけだし。

──その傾向は、この『トトロ』から強く感じるようになりましたよね。

押井　そういう色を作ったのは誰だと思う？

──鈴木さん？

押井　そう。トシちゃんがセット売りを始めたんだよ。

──その洋館ですが、宮崎さんの作品だけじゃなく、高畑さんを除くジブリ映画の監督は洋館が大好きですよね。

押井　それはヨーロッパのファンタジー小説を日本を舞台に翻案しているからで、『トトロ』と同じように洋風な設しつらえが必要になる。そもそも、ファンタジーを志向するということはヨーロッパの教養なしには成立しないからさ。宮さんもヨーロッパ大好きですよ。それはもう当たり前のこと。

──お父さんがメガネをかけているのも、いつものジブリですよね。

押井　だって宮さんだからね。言っておくけど、ガキ大将のような田舎の少年（カンタ）も宮さんの分身。そんなの当たり前。アニメーションなんてもれなくそうだから。キャラクターは監督のアルターエゴなの。『ガンダム』のアムロ・レイもシャアも富野さんの分身だって知ってるでしょ？

──押井さん、みんなの夢を打ち砕くようなことを……せめてシャアだけはやめてというファンの悲鳴が聞こえましたよ（笑）。

押井　何言ってるの。決まってるじゃない。僕だってそうだよ。バトーとか荒巻とかは、そういう意味で言えば僕の分身。僕はああいうクソジジイになりたいんですから！　トグサの出番が少ないのは、自分の部分が少ないし興味がないからだよ。





『トトロ』は大仰。『めいとこねこバス』こそ傑作



──で、話を戻して『トトロ』です。

押井　『トトロ』を語るには、宮さんの『めいとこねこバス』に触れないわけにはいかない。ジブリ美術館でしか観られない短編だけど、これは正真正銘の傑作です。これこそ子供が観るべき作品だし、紛れもなく宮さんは子供たちに見せるために作っている。上映時間は15分くらいだけど、子供が一瞬たりとも目を離さないような作り。子供が観たら大コーフン、たまらないと思うよ。宮さん得意のディテールだけの映画だから当然、素晴らしいし。いわゆる、アニメーションの楽しさにあふれた作品だよ。

──もう絶賛ですね。

押井　うん、これは手放しで褒めたい。でも、それに比べて同じネコバスが出る『トトロ』はどうなんだってこと。そもそも、あんなに大上段に構えるような物語じゃないでしょと言いたい。

──そんなに大袈裟でしたっけ？　都会の家族が田舎に引っ越してトトロに会うというだけの映画ですよ。むしろ小さくないですか？

押井　それは見えている物語。語られざる部分が問題なんだよ。あの家族がなぜ田舎に引っ越したかというとお母さんの静養のためで、それはひとつの動機付けにはなっている。でも、お父さんと姉妹を見てヘンだとは思わなかった？

──めちゃくちゃ田舎暮らしを楽しんでいるなーとは思いましたよ。それと、またパパがインテリだって（笑）。

押井　まさに、そこが問題なんだよ。お姉さんのサツキはまだ小学生だというのに、嫌な顔ひとつせずせっせと家事を切り盛りして、父親は自分の研究みたいなことに没頭している。何が言いたいかといえば、果たしてそんな家族がいるのだろうかということ。つまり、すべてが宮さんの妄想の産物なんだよね。宮さんの頭のなかに存在する親であり子供であり、さらには農村である。「子供が楽しめる作品にしたかった」というんだったら、そういう要素はいらないの。舞台は昭和30年代でしょ？　わざわざ田舎に引っ越さなくても東京近郊でも森林は残ってるって。にもかかわらず敢えてそうしているわけで、僕に言わせればそれが「大仰」なんだよ。結果的には、宮崎駿という看板を背負った作家の映画になっちゃった。なぜって、主張が入っているから。そりゃあ高畑さんほど露骨じゃないとはいえ、ある種の農村崇拝には違いないからね。

──たとえそうであっても、子供も大人も楽しめたんじゃないですか？

押井　僕は珍しく『トトロ』は劇場で観たんだけど、子供たちはその辺を走り回っていた。なぜだと思う？　トトロが出てくるのが遅いからだよ。それまで退屈なんでみんな通路で遊んでるわけ。子供を楽しませたいのなら、すぐにトトロを登場させなきゃいけないのに、もったいぶってそうしてないでしょ？　しかも、出てきてもイビキかいて寝てるだけで何もしない。じゃあ、子供たちはメイに共感するかというとそうでもない。彼女を「かわいい」なんて言うのはもっと年上の、それこそおばさんとかばあさんだよ。だから、別に宮さんは子供の目線で作ったわけじゃないってこと。明らかに、この作品を楽しんだのは大人たちのほうだよ。

──そうか、だから『キネ旬』のベストワン。

押井　そういうこと。正直、最初はそこまで確信がなかったんだけど『めいとこねこバス』を観ちゃうと、僕の考えが絶対正しいということになっちゃったわけ。

──でも、押井さんの考えは、「宮崎さんはこういう意図で作ったはずなのに、そうなってない」ってことでしょ？　敢えて、その意図を考慮しなければ『トトロ』もいいと思いませんか？

押井　何言ってるの、それは全然違うよ。僕が言っているのは、宮さんの作品を観客がどう思うかじゃなく、宮さん自身を語っているの。「宮さんの頭はどうなっているのか？」それを考察しているんだから、勘違いしちゃいけない。

　だから、宮さんが「子供のために作った」というその「子供」は、宮さんが妄想する子供。あの人が理想とする子供にすぎないということを言っておきたい。

──宮崎さんが好きなのは健気でかわいいメイやサツキなわけですね？

押井　そうそう。自分の映画を観に来る子供もそうあるべきだと思っている人だから。ゲームに夢中だったりＴＶが大好きなんていうのは、宮さんにとっては否定すべき子供。

──ゲームは判るけど、ＴＶもダメなの？

押井　もちろん。「子供はＴＶなんて観るべきじゃない。私の作品をＴＶで観て欲しくない」というのが宮さんの本心。

──ジブリの作品って配信がまったくないんですけど、そのせいなんですか？

押井　おそらく。ＤＶＤを出すことすら嫌がったから。宮さんの持論は「手間隙かけて観た漫画映画が子供の記憶に残る。いつでもＤＶＤをトレイに乗せるだけで観られますというんじゃ、記憶には残らない」。本人が言っていたけど「年に一度、もしかしたら２年に一度、そうやって観られたのが漫画映画。だからこそ一生覚えている」ということだよ。そういう意味でも、宮さんにとってアニメーションはスペシャルなんだよね。ほら、宮さんってウォルト・ディズニーを嫌っているじゃない？　その理由、判る？

──いや、いつも何でだろうと思ってました。

押井　僕が思うに、ほかのアニメーションを全部駆逐した上に、アニメーションを産業にしちゃった張本人だからだよ。トトロをジブリのロゴマークにしているにもかかわらず、続編を作ったりしないのは、ミッキーマウス化したくないという宮さんの気持ちの表れなのかもしれないよね。

──それ、かなり説得力ありますね。

押井　宮さんは、自分の経験に重ねて、子供たちにとっての特権的な時間、非日常を演出したいんじゃないのかな。映画というメディアは、どこまで行っても非日常性をもっているから。

──私も、いそいそと劇場に行って観た高校時代の映画はよく覚えています。

押井　昔のＴＶなんて前情報がないから、今週はどんな作品で誰が監督かなんて何も判らない。『ウルトラセブン』のオープニングを観てやっと「あ、今週は実相寺昭雄だ」って判る。だからこそよく覚えているというのはあるし、確かにいまはYouTubeで観られたりするから、数のなかに迷い込んでしまって印象が薄くなる。だから気持ちとしては判るけど、『めいとこねこバス』に関しては、どういう状況で観ようが、子供たちにとっては忘れられない１本になるのは間違いないって。学校を回って子供たちに見せるべきだと思うし、絶対子供たちもいつでも観たいはずだからＤＶＤにすべきだって言ってるの。

──うわー、とことん絶賛。

押井　文句なく、宮さんの最高傑作だって言ってるじゃない。本当にびっくりした。この人は凄いよって、マジで思ったから。宮さんは短編の名手だよ。

──でも、長編を作っている……。

押井　短編じゃ商売にならないから仕方ない。そこもまた、宮さんが抱える〝矛盾〟だよね。ＴＶも嫌いなはずなのに、いつの間にかＴＶに愛される存在になってしまったし、そういう矛盾を体現している人と言ってもいい。簡単に言ってしまえば、自分のなかに一貫性がない人なんだよ。

──『ラピュタ』のときに押井さんがおっしゃっていた「語りたい物語と、自分の性癖」ですね。

押井　うん。環境派のくせに、乗っていた車は２ＣＶ。排ガスを撒き散らす車に、敢えてハイオクで乗っていたし、戦争反対のくせに空中戦が大好きで軍事オタク。僕が知っている限りでは、読んでいる本の９割は戦記や戦争ものだったから。それは僕と同じだけど、僕は「戦争とは人間がなした最大の文化事業」と公言してる。でも、宮さんはもちろん違うじゃない。本当にいろんな矛盾を抱えているんだよ。

──でも、その矛盾のせいで面白い映画が生まれるんじゃないですか。

押井　確かに、それが宮さんの作っている作品の面白さでもある。でもさ、僕が言いたいのは、認めちゃえばいいのにってこと。「戦争は嫌いですが、空中戦は大好きです」って言ってしまえばラクなのにって思うんだよ。

──でも、言えなかったんですよね。

押井　そこにはトシちゃんの影響もあるよ。彼が宮さんのひとつの側面、作家であり文化人である部分だけを拡大して世に送り出したということがある。でも、それがイヤなら「やめろ」と言えば済むだろうに、それを受け入れてしまったじゃない？　僕は一時期、〝デジタルの旗手〟扱いされたことがあって、それは頑なに否定したからね。宮さんだってできたはずだよ。それはつまり、彼の処世術のようなもの。さらには、そもそも本人が矛盾を抱えてしまうようなキャラクターだったってことなんだよ。

　人間はそういう自己矛盾を抱えて生きるのが当然だし、そういう葛藤のない人間がいるはずがない。僕だってそれは同じ。メディアで仕事しているから、そういう矛盾をより抱えることになる。そもそも、メディアで仕事するってどういうことだと思う？

──みんなの目に晒される？

押井　いや、コピーで食っているということ。自分が作ったものをコピーして売っているようなもんだよ。そこにオリジナルを見つけるのは難しい。

──押井さんはそれを認められるけど、宮崎さんはできない？

押井　なぜなら、宮さんは絵描きだから。絵描きである以上、オリジナルで勝負したい。高畑さんのような、絵は一枚も描かない１００パーセント監督人間は、基本的にそういう葛藤をもちようがない。自分の手で創造したものは何ひとつとしてないから。僕が小説を書いているのもそういう理由。

──ひとりで何かを創造したい？

押井　うん。それだって結局、印刷物のコピーとして流通するだけなんだけど、ひとりで創造したものには違いない。言葉のひとつひとつに責任をもてるからね。僕も絵を描かないから、スタッフに「あんたは絵描きじゃないから判らない」ってよく言われてたし。

──宮崎さんもそんなことおっしゃってました？

押井　「あんたの仕事とオレの仕事はまったく違うんだ。オレはあんたの５倍も10倍も働いている」って言われてた。まあ、正しい（笑）。もちろん、宮さんはアニメーターとしては不世出の天才であることは認めるよ。それに異論はまったくない。『トトロ』の樹木が空に向かってニョキニョキと伸びる画なんて宮さんの真骨頂。彼にしかできないから。でも、敢えて言わせてもらいますが、監督としての力ははっきり言って二流以下です。

──二流どころか二流以下？

押井　はい。いつも言っていることです。彼の作品を支えているのは演出力じゃなくて、アニメーターとしての手腕。さっきも言ったように構成力がなく、よって長編もできない。にもかかわらず長編を作ってしまうから破綻している。僕はさんざん言ってきたことだけど、活字として語られたことはないと思うよ。これまで、誰も活字にしなかったから。

──うーん、責任感じてしまいますね。

押井　『トトロ』に関して言えば、自分のやりたいことと建前が分裂しちゃった最初の作品だよね。つまり、誰のために作ったのか、という時点からしてすでに分裂している。それを証明したのが、宮さん的最高傑作の『めいとこねこバス』というのが皮肉というか面白いというか。だから『トトロ』が大好きというファンは、がんばってジブリ美術館詣でをして、『めいとこねこバス』を観るべきだと思う。そうすればきっと『トトロ』の観方も変わるから。





諸星大二郎（もろほし だいじろう）



　漫画家。49年長野県生まれ。日本の歴史や伝奇等を題材にした作品で知られる。代表作に『生物都市』『妖怪ハンター』『マッドメン』等。





アムロ・レイ



　『ガンダム』に登場するガンダムのパイロット。





シャア



　『ガンダム』に登場するジオン軍のエースパイロット、シャア・アズナブルのこと。アムロ・レイの好敵手。





富野さん



　富野由悠季（とみの よしゆき）のこと。アニメ監督、脚本家。41年神奈川県生まれ。虫プロでは『鉄腕アトム』を手掛け、『海のトリトン』で実質的に初監督となる。『機動戦士ガンダム』でブレイク。その他の作品に『伝説巨神イデオン』等。





バトー



　『攻殻機動隊』シリーズに登場する公安９課所属の電脳戦のプロフェッショナル。身体のほとんどが義体化されている。隊長である草薙素子の相棒的存在。イヌ好きで愛犬はバセットハウンドのガブリエル。





荒巻



　荒巻大輔のこと。『攻殻』シリーズに登場する公安９課の部長で素子やバトーの上司。ハリウッド実写版ではビートたけしが演じた。





トグサ



　『攻殻』シリーズに登場する公安９課のメンバー。彼だけが家族もちで、義体化も少ない。





『めいとこねこバス』



　02年からジブリ美術館で上映されている宮崎駿による短編アニメーション。さまざまなねこバスが登場する。上映時間は14分。





ジブリ美術館



　三鷹の森ジブリ美術館のこと。01年に開館。地下の映像展示室〝土星座〟では『めいとこねこバス』『コロの大さんぽ』『やどさがし』等、宮崎の短編が上映されている。屋上には『ラピュタ』のロボット兵の等身大モデルも。宮崎ファンを公言する監督ギレルモ・デル・トロはこの美術館に行くため自腹で家族と来日したほど。ここでしか買えないロボット兵を手に入れ大喜びした。





『ウルトラセブン』



　67年から68年までオンエアされていた円谷プロダクションの特撮ＴＶシリーズ。宇宙からやってきた正義の味方ウルトラセブンと、侵略者から地球を守るウルトラ警備隊の活躍を描く。





実相寺昭雄（じっそうじ あきお）



　映画監督、脚本家、小説家。37年東京生まれ。監督の代表作に『曼陀羅』（71）、『あさき夢みし』（74）、『帝都物語』（88）等。『ウルトラセブン』では「狙われた街」「第四惑星の悪夢」「円盤が来た」等を監督した。06年逝去。





STORY



13歳の少女キキは一人前の魔女になるため、黒猫のジジを連れて１年間の修行に旅立つ。海辺の町コリコを修行の場に選んだキキは親切なパン屋のおかみ、おソノさんのおかげで、唯一使える魔法〝空を飛ぶ能力〟を使い、荷物の配達を始める。





キャスト：高山みなみ　佐久間レイ　山口勝平　原作：角野栄子　プロデューサー・脚本・監督：宮崎駿　公開日：１９８９年７月29日　上映時間：約１０２分　興行収入：36・５億円　キャッチコピー：おちこんだりもしたけれど、私はげんきです。





ウジウジする子は嫌い





──『魔女の宅急便』の原作は角野栄子の同名児童文学。宮崎さんにとっては初の原作ものですね。

押井　原作者は宮さんのこのアニメーションを気に入ってなかった。だからあとで実写版を作らせたでしょ？

──14年に東映が作ってますが、これはまったくいただけなかった（笑）。角野さんが気に入っているのか、それさえ疑わしい。何だかキングの『シャイニング』論争を思い出しましたよ。みんなが絶賛するキューブリック版をキングは大嫌いで、その後にＴＶでリメイクして失敗した。

押井　僕も似たような目に遭っているから、その状況はよく判る。『うる星２』は一般的には高評価だったけど、原作者の高橋（留美子）さんは全然気に入ってなくて「私とはまったく関係のない作品」と言うぐらい（笑）。ジブリの原作ものというのは、語るべきもうひとつのテーマなのかもね。たとえ原作があっても、ジブリが作るとジブリのオリジナルになっちゃうから。

──それ、ディズニーと同じです。『クマのプーさん』『ピーター・パン』『人魚姫』……すべて有名な児童文学なのに、その原作者の名前は消えてディズニーの作品になっている。物語も変更したディズニーのほうが正しいと思われてますよね。

押井　ジブリもディズニーも原作で売ってないから。宣伝でも原作を前面には出していないでしょ。ジブリ作品、宮崎駿監督作品、高畑勲監督作品で売っているのであって、原作を宣伝に利用したことはほとんどない。

──ベストセラーやロングセラーといった、誰もが知っている作品を選んでない。『魔女の宅急便』も原作を知らない人が多かったんじゃないですか。

押井　原作のイメージは極端に薄いよね。ただこの時期、トシちゃんは宮さんがオリジナル・ストーリーで続けていくことに恐れを感じていて「何かやらなきゃ」という気持ちになっていたことは確かだと思う。プロデューサーであるなら、誰だって考えることだよ。『魔女宅』は当初、宮さんはプロデュースだけの参加だったのに結局、自分で監督することになった。で、僕の興味としては宮崎駿と鈴木敏夫、果たしてどちらが勝つんだろうって。

──どういう意味ですか？

押井　僕が想像するに──と言っても、間違ってないはずだけど──なぜあの女の子の物語を選んだのか？　たぶん、鈴木敏夫が選んだんだよね。当時のトシちゃんは自分の娘にハマっていたから。昔から自分の娘が大好きな男だったけど、あの頃がピークだったんじゃない？　だから『魔女宅』の、女の子が世の中に旅立つという物語をやりたくなった。ひとりの娘をもつ父親としてね。そこまでは何の問題もないわけだけど、しかし、その主人公の少女は、宮さんが求める少女像とは微妙に違っていたわけだ。

──宮崎さんが求める少女って？

押井　完全無欠。賢くて何でもできて健気で真っ直ぐ。要するにナウシカであり『トトロ』のサツキだよ。ところが、キキの場合は世の中に出たこともない、何の経験もない、能力があるかどうかさえ判らない。魔女としては非常に未熟な女の子が、その力を利用して宅急便を始めるというファンタジーでしょ？　原作は読んでないけど。そういう女の子、宮さんは好きじゃないはずなんだよ。もし宮さんが魔法少女を描くのなら、最初から完璧でエリート、魔女の正当な一族の末裔で、そんな少女がさまざまな困難を克服して成長するという話になる。あんな落ちこぼれ寸前の少女が奮闘するなんて物語に興味をもつとは思えない。

──とても健気でいい子だけど、確かにまったくパーフェクトじゃない。

押井　キキがパン屋の離れに下宿することになった朝のシーン、覚えてる？　キキはトイレに行く。それもこっそりね。僕はそこが一番印象的だった。ヒロインをトイレに行かせるなんて、それまで宮さんは一度もやったことがない。宮さんのヒロインはトイレなんて行きません──それはアニメファンの間では有名な話です。美少女は、何か食べるのはギリギリ許されるけど、トイレは絶対ダメ。にもかかわらず、宮さんは描いていた。しかもコソコソ、恥ずかしそうに。初めて世の中に出たことの象徴的な表現という解釈もできるだろうけど、宮さんはこれまでたくさんの美少女を描いてきたとはいえ、その生理には一度も立ち入ったことはないし、やりたいはずもない。にもかかわらずやったのは、鈴木敏夫がいたから。これもまた想像だけど「宮さん、いままでの美少女じゃダメだよ。もっと現実の女の子が共感できるキャラクターにしなきゃ」とか鈴木敏夫が耳元で囁き続けたんじゃないかと思うわけ。これは僕の確信的推論。たぶん正しい。おそらく、そうやって徐々に説得されていったんだよ。そんなことでもなきゃ、宮さんは絶対描くはずのない女の子だもん。

　では、鈴木敏夫は本作で何をしたかったのか？　これも僕の確信的推論だけど、プロデューサーとしての自己実現をしたかった。プロデューサーには二通りしかなくて、ひとつは黒子に徹する人、もうひとつはプロデューサーとしての自己実現を目指す人、そのどっちかなんだよ。言うまでもなくトシちゃんは後者。

──自己実現を目指すって、自分でクリエイターを操り、自分の映画を作るってこと？

押井　簡単に言えば、自分のテーマを実現する。プロデューサーにとっては監督もスタッフのひとりだから、自分のコントロール下に置きたいという気持ちがある。監督にテーマと脚本を与え、現場を預けて、最終的な管理は全部自分がやる。要するにハリウッド型のプロデューサーだよ。ただし、彼らは最終的には権力と金で全部を押さえつけるけど、トシちゃんの場合は得意の恫喝と懐柔（笑）。

──押井さんが鈴木さんを語るときに必ず出てくる単語が〝恫喝〟です。

押井　本当に上手いんだよ。トシちゃんに囁かれて、どれだけ多くの人が人生を誤ったか。僕はそういう人をたくさん見てますから。自分は利口だと思っている人ほどトシちゃんの魔法にかかり、自分が優秀だと思っている人ほど騙される。洗脳されまくって、喋り方までトシちゃん化していた人もいたくらいだからね。本当にそのマジックは凄いわけ。トシちゃんは、その能力を駆使して『魔女宅』を生んだんだよ。





機能しはじめるジブリブランド



──宮崎さんはでき上がった『魔女宅』に満足しているんでしょうか？

押井　聞いたことはないけど、たぶん好きじゃないと思う。半信半疑でやらざるを得なくて、だからこそ、最後の飛行船のエピソードを付け加えた。あれがないと宮崎印にならないと思ったからだよ。もちろん、原作にはないし、おそらく脚本にもなかったんじゃない？　追加で自分でコンテを切って入れたんだよ。

──飛行船のエピソードがなかったら、どうやって終わるの？

押井　預かった荷物をちゃんと届けておしまい、ですよ。

──それだけじゃ物足りなくないですか。

押井　そう感じるのは面白く作られてないから。「届けておしまい」だけじゃ納得できないのなら、そもそも映画として失敗しているってことだよ。この作品のテーマは、最初のミッションを終えて、初めて魔女として一人前になった、その少女の成長の記録でしょ？　でも、それだけじゃあ終点が見えすぎているから、その間に（原作にはない）いろいろな事件を付け加えなきゃいけないと考えて実行した。しかし、そのせいで不自然になってしまったという作品。サラっと語って、サラっと作るべきだったのに、宮さんは盛り込みたい性格だから、ついついやってしまったんだよ。

──でも、画はいいですよね。街並みの美しさ、あの浮遊感、素晴らしかった。

押井　画のレベルで言えばジブリ作品のなかで一、二を争う完成度。作画的に驚くほど丁寧に作られているし、浮遊感に関しては、それこそ宮さんの十八番だから。一流のワザですよ。あの頃はスタジオ自体が、いい作品を作るぞという意欲に燃えていた。「自分たちが作るアニメーションは、その辺のスタジオのものとは違う。絶対に手抜きをしない」なんて気概が伝わってくるよね。

──ジブリの作品が、コンスタントに数字を稼ぐようになったのも、『魔女宅』からですよね。何と配給収入21億円です。

押井　宣伝の勝利だろうね。この作品あたりからジブリというブランドが機能しはじめた。それまでの『ラピュタ』や『トトロ』のときは（ずっとやっていける）確信はなかったんじゃないかな。やはりブランド・パワーはここからですよ。

　それにひと役買っているのがテーマ曲。ユーミンのヒット曲（『ルージュの伝言』『やさしさに包まれたなら』）を使っていて、これが一般に浸透したひとつの勝因になっている。既成のヒット曲や名曲をテーマ曲にするというのは以来、ジブリのパターンのひとつになったよね。もちろん、やったのは鈴木敏夫ですが。

──押井さんも、鈴木さん宣伝プロデュースの『イノセンス』では『アランフェス』を使ってますよね。

押井　トシちゃんの意向です。歌っているオバサンもトシちゃんの推薦。言っておくけど僕は、最後に主題歌が入っているのが大嫌いなんです。『うる星』のときから大嫌いだったし、フリーランスになって一度もやったことがない。実写は別だよ。『立喰師』のときは兵藤まこに歌ってもらってる。

　で、話を戻すと、だから、『イノセンス』は『うる星２』以来になる。これはもちろん、トシちゃんの口癖のひとつが「映画には主題歌が必要」だから。『イノセンス』で鈴木敏夫が絶対譲らなかったことがふたつあって、そのひとつがこの主題歌、もうひとつが『イノセンス』というタイトル。まあ、海外に行ったときは「何で主題歌が『アランフェス』でケンジ・カワイ（川井憲次）じゃないんだ」とか、「何でタイトルは『GHOST IN THE SHELL ２』じゃないんだ」とか、さんざん言われた。現場でも『攻殻２』。誰も『イノセンス』とは呼ばなかったしさ。

──押井さんは『イノセンス』でよかったの？

押井　『GHOST IN THE SHELL ２』ですよ、決まってるじゃない。でも、そこは宣伝プロデューサーに譲ったわけです。





実写版



　14年に東映が配給した実写版『魔女の宅急便』のこと。アニメ版のリメイクではなく原作の１巻＆２巻の映画化。主人公のキキには当時16歳だった小芝風花。監督が『呪怨』等のホラー作品で知られる清水崇というのも意表を突いていた。





キング



　スティーブン・キングのこと。小説家。47年米国メイン州生まれ。初めて手掛けた長編『キャリー』でブレイクした。代表作に『ザ・スタンド』『デッド・ゾーン』『グリーンマイル』『ドリームキャッチャー』等。多くの作品が映画化されていることでも知られている。本人も無類の映画好きで、監督作に『地獄のデビルトラック』（86）。出演作にジョージ・Ａ・ロメロによるオムニバス作品『クリープショー』（82）の第２話『ジョディ・ベリルの孤独な死』等がある。





『シャイニング』



　80年の米国映画。スタンリー・キューブリックがキングの同名小説を映画化。雪に閉ざされたホテルの管理人となった売れない作家がスランプに陥り、徐々に追い詰められて行く。ホラー度＆超能力度が低くなり、かわってサイコサスペンス度が高くなったため、キング原作とは異なる印象。一般的には高評価だが、当のキングは許せなかったようだ。タイトルの〝シャイニング〟は息子のもつ超能力のこと。狂気に囚われてしまう主人公にジャック・ニコルソン。





キューブリック



　スタンリー・キューブリックのこと。映画監督・脚本・製作者。28年米国生まれ。雑誌のカメラマンを経て『恐怖と欲望』（53）で長編デビュー。『現金に体を張れ』（56）で注目される。代表作に『博士の異常な愛情』（64）、『２００１年宇宙の旅』（68）、『フルメタル・ジャケット』（87）等がある。完全主義者と言われ、会心のショットをカメラに収めるまで何度もテイクを重ねることでも有名。『シャイニング』では、ニコルソンの狂気の表情を撮るだけで１９０テイク。息子と同じ能力をもつホテルの料理人が厨房を横切るだけで１３６テイク。彼が息子に〝シャイニング〟の意味を説明するシーンで１４８テイク。子役にもベテラン役者にも容赦ないキューブリック。何の説明もしないといわれているだけに、もしかして本人もよく判らないから？　という説もある。





ＴＶでリメイク



　97年の米国ＴＶドラマ。キューブリック版がどうしても許せなかったキングは、自分のお抱え監督ミック・ギャリスにメガホンを取らせ、自らが脚本＆出演してＴＶミニシリーズ化。原作に忠実を心がけたものの、原作にもキューブリック版にも及ばなかった。





『クマのプーさん』



　英国の作家Ａ．Ａ．ミルンが26年に発表した児童小説。自分の息子クリストファー・ロビンのために書いた童話で、プーさんはくまのぬいぐるみの名前。61年に『プー』の使用許可契約を結んだディズニーは66年から短編アニメを作るようになった。最初の作品はアメリカナイズされていて英国からは批判の声が上がり、のちに英国アクセントの声に変更したりした。アニメ版はプーをはじめ、みんな元気いっぱいだが、原作はのんびりムード。





『ピーター・パン』



　英国の作家ジェームス・バリーが１９０２年に発表した小説『小さな白い鳥』に登場するキャラクター。その後、戯曲『ピーター・パン あるいは大人になりたがらない少年』（04年初演）、小説『ケンジントン公園のピーター・パン』（06）、小説『ピーター・パンとウェンディ』（11）に登場する。53年に製作されたディズニーのアニメーションは、ピーターをかっこいい少年、対するフック船長を間抜けな男として描き、原作の深みを見事に消し去ってしまい、原作ファンからは批判も多い。





『人魚姫』



　デンマークの作家アンデルセンが１８３７年に発表した童話。王子に恋した人魚姫が声と引き換えに足をもらい王子のもとに行くが、その恋は実らず海の泡となる。89年のディズニーアニメ『リトル・マーメイド』は人間となって王子と結ばれる。





『イノセンス』



　04年製作のアニメーション。『攻殻』から９年を経た続編。日本アニメでは初めてカンヌ映画祭コンペティション部門で上映された。





『アランフェス』



　スペインの作曲家ホアキン・ロドリーゴによる『アランフェス協奏曲第２楽章』のこと。本作では『Follow Me』というタイトルに。





オバサン



　伊藤君子（いとう　きみこ）のこと。46年香川県生まれのジャズシンガー。





『立喰師』



　『立喰師列伝』（06）のこと。自らの小説をアニメ映画化した。〝立喰師〟と呼ばれる者たちを通して描かれる押井的戦後史。役者をブルーバックで撮影し、その画像をモノクロにしてから彩色、それを３Ｄ化して動かすというユニークすぎる手法がとられた。ヴェネツィア映画祭ではオリゾンティ部門（実験的作品）に出品された。続編は『真・女立喰師列伝』（07）。





兵藤まこ（ひょうどう まこ）



　女優・声優・歌手。62年東京生まれ。資生堂の専属モデルから歌手・声優・女優に。85年『天使のたまご』で少女の声を務め、押井作品の常連になる。『紅い眼鏡』（87）、『トーキング・ヘッド』（92）等に出演。





STORY



空中海賊を撃退し、賞金を稼ぐパイロットのポルコ・ロッソ。前は空軍のエースだったものの、いまは自らに魔法をかけ豚になっていた。やられっぱなしの空賊連合は、スゴ腕パイロットを雇い、ポルコの打倒を計画する。





キャスト：森山周一郎　加藤登紀子　桂文枝　上條恒彦　原作・脚本・監督：宮崎駿　プロデューサー：鈴木敏夫　公開日：１９９２年７月18日　上映時間：約93分　興行収入：54億円　キャッチコピー：カッコイイとは、こういうことさ。





１００パーセント言い訳映画





──今度は『紅の豚』です。宮崎さん自身がブタになったヒコーキ映画ですね。

押井　判るよね？　あのブタが宮さん自身だって。

──もちろん。これが初めての宮崎映画という人を除けば、判らない人はいないんじゃないですか。

押井　あのブタの頭をすっぽり取ると、なかから宮さんの顔が出てくるわけだ。でも宮さんは、ほかの人は判らないと思い込んでいる。ブタといえば宮さんのトレードマークだし、漫画で自分を描くときはいつもブタ。自分の車にまでブタの紋章貼っているくらいだから。

──そこまでアピールしてて、みんなが気づかないと思っているって、もしかして宮崎さんってノー天気なんですか？

押井　そう。その手の自意識が見事に欠如している、本当に〝天然〟のおじいさんです。

──私に限らず、この映画を観た多くの人が「宮崎さんはヒコーキ乗りになりたいし、きれいな熟女、聡明で元気でかわいい少女に愛されたいんだなー」って思ってますよ。

押井　でも、本人は気づかない。

──かわいいですね、宮崎さん（笑）。

押井　何言ってるの、全然かわいくないよ。だってこの『豚』は１００パーセント言い訳映画だよ。どんな監督でも一度は言い訳映画を作る。スティーブン・スピルバーグなら『カラーパープル』とか『ミュンヘン』とか。ロマン・ポランスキーなら『戦場のピアニスト』とか、みんな作っている。

──言い訳映画って、自分を正当化するという意味ですか？

押井　そうです。たとえば『戦場のピアニスト』の主人公はポーランド人のピアニストで、ナチがいる間、自分だけ天井裏に隠れてた。あれは、さっさと故郷のポーランドを捨て、亡命しちゃったポランスキーの言い訳ですよ。

──じゃあ、ポランスキーはその言い訳映画でオスカーを取っちゃったってことですね。嬉しさが倍増したかも。

押井　そういうこと。まあ、そういうふうに監督というのは、意識的にも無意識的にも言い訳映画を作ってしまうもので、『豚』はまさにその典型なんだよ。公開時もそれについてはさんざん喋ったんだけど、まったく活字にならなかったから、またしつこく言うんだけどさ。

　そもそも凄くヘンじゃない？「自分で魔法をかけた」ってどういう意味？　なぜそんなことをしたのか、そういう説明が一切ない。しかもそのブタは、ブタなのは頭だけで、手も指も人間だし、酒も飲んでタバコも吸い、メシを食ってトレンチコートを着込み、ひとりで孤島の海岸の洞窟に住んでいる。もっと詳しく言うと、大好きなイタリアの戦闘飛行艇を乗り回して、「二馬力」としか思えない孤島の洞窟で、音楽を聴きながらメシを食って酒を飲み、タバコをふかす。まんま宮さんです。

──『豚』と同時期に、ティム・バートンの『バットマン リターンズ』が公開されて、私は２本共に〝プライベート・フィルム〟だと思ったんです。『リターンズ』にはバートンの抱える〝闇〟がたくさん詰め込まれていて、その暗さに驚いたんですが、『豚』のほうは驚くほどノー天気だった。宮崎さんって闇がないのかしらって思いましたね。

押井　少なくとも、この映画では闇なんてないです。だって、とことん好き勝手やってるから。舞台が地中海というのは、シュナイダー・トロフィー（映画ではシュナイダー・カップ）をやりたかったから。あのレースは第一次大戦と第二次大戦の間、ヨーロッパで開かれていた水上飛行機のレースで、当時の飛行機のワールドカップみたいなもの。それで優勝するというのは飛行機好きの永遠の夢ですよ。つまり、宮さんは、それもここでちゃんと叶えているわけ。

　もちろん、飛行シーンの作画は見事なもんですよ。そもそも、戦闘飛行艇なんて面倒くさいものを描こうなんていう奇特なアニメーターは、世界でも宮さんくらいしかいないから。ただ飛行機を描くだけじゃすまなくて、〝水〟がもれなくついてくるんだから作画するのは大変なんだ。それをちゃんと丁寧にやっているんだから、さすがです。

──戦闘飛行艇って有名なんですか？　水上飛行機とは違うんですよね？

押井　もちろんマイナーだし、水上飛行機とはまったく違う。戦闘飛行艇はボディが船と同じ構造だから「艇」なんだよ。『豚』に登場するのはイタリア人が趣味で作ったようなもので、宮さんは大好き。『風立ちぬ』でもイタリアの飛行機を出していたことからも判るように、妄想の産物のような飛行機に入れ込むんだよ。自分の好きなデザインの飛行機があって、実際に役立つかはどうでもいい。もちろん、その妄想はここでも大爆発してますから。

　それにもうひとつ。おばさんたちが総出で飛行機を手作りするシーンがあるじゃない？　あれも昔、宮さんに聞いたことのある話で、本人は凄く気に入っていた。オヤジががんばるのも好きだけど、おばちゃんたちがワーワーワー言いながら作るのも大好き。実際、『風立ちぬ』に登場した（ジョバンニ・バッチスタ・）カプローニとかは、職工の家族を全員呼んでパーティやったりしていたと聞くからね。家庭的な雰囲気で飛行機を作るというようなことが、宮さんは大好き。反対にロッキードがラインで作りましたなんていう飛行機にはまったく興味がないからさ。





『魔女の宅急便』のご褒美



──自分の願望をもれなくやっているということですね。

押井　まさに！　じゃあ、そこで問題なのが、なぜそんな自分勝手ができたのか？　鈴木敏夫がそれを許したからです。なぜ許したかと言うと、宮さんの前作『魔女の宅急便』のとき、自分の主張を押し付けてしまったから、そのエクスキューズで好き勝手やらせた。宮さんにガス抜きが必要だと思ったんだよ。違う言い方をすれば、ご褒美みたいなもの。

──ご褒美ですか。映画を観る限りでは宮崎さん、そのご褒美に大喜びしてますね。イタリアが舞台のせいなのか、色も鮮やかでとてもきれい。

押井　色に関しては、「歳を取ると目が悪くなるので、鮮やかな色を使いたくなる」なんてことを言ってたけどさ。

　まぁ、だから最高のご褒美なんですよ。喜びが伝わるのは当然です。クリエーターなんて、自分で作るもののなかでしかストレス解消できないんだから、映画のストレスは映画ではらすしかないの。

　で、話を戻すと、『豚』は鈴木敏夫との関係性があったからこそ生まれた作品。大上段に振りかぶったテーマというのは、宮さんにとってはやりたいことをやる方便──とはいえ、作っているうちに本当にその気になるんだと思うけど。ジブリにはそういう社会的なテーマが必要だった。にもかかわらず、この『豚』にはそれがない。大上段に振りかぶったテーマもなければ、小さなテーマすらない。ブタの姿を借りて好き放題やっているだけ。お面をかぶっているからできるということは、好きなことをやるためにはお面が必要だったということなんだよ。その一方で、なんで『風立ちぬ』の主人公はブタじゃないんだということになるんだけど……。

──『風立ちぬ』の原作漫画では、主人公はやはりブタなんですか。

押井　そう、だからブタだと思っていたのに、その予想を裏切って人間だった……という話はまたするけど、女の子、女性だけが人間というのは宮さんの常套手段。ブタが好きなら女性キャラクターもブタにしちゃえばいいのに、それはイヤ。やっぱり女の子はかわいく描きたいんだよね。ブヒブヒじゃイヤなんだよ。ほかの男たちは普通の人間だけど、ヒロインたちは、そういう普通の人間よりもブタのオレのほうを選ぶというわけ。凄く屈折してるよね。

──いや屈折なんてしてませんよ。すっごく素直。やっぱりかわいい（笑）。

押井　違う違う、本人のなかでは屈折しているんだってば！　でも、かたちにしちゃうと、ただのノー天気なブタになっちゃうんだよ。さっきのティム・バートンだって、映画を観れば、どんだけ屈折して暗いんだということが判り、それが人間の深みにもなっているけど、この『豚』のどこに奥行きがあるのって。

──はい、ないですね。

押井　あの人は何でも白黒はっきりさせたい人で、曖昧なのは大嫌い。グズグズ言っているのも大嫌い。よくセリフにも出てるじゃない？「グズは嫌いだよ！」とか。

──そういうことを聞くと、確かに『魔女宅』のキキはウジウジ派でしたね。

押井　だから鈴木敏夫の娘の話なんだよ。まあ、監督なら誰でも、自分の娘のために作ったり、自分の奥さんや両親のために作ったりするもんだから。

──押井さんにもあるの？

押井　たぶん、あるんじゃない？

──他人ごとなんですか？

押井　自分じゃそのつもりはなくても、結果的にそうだった、というのがあるんじゃないのって言いたいわけ。『天たま』やってるときに「あれはお前の娘だよな？」って師匠に言われたから。それはそうかもしれない。でも、作っているときは無意識だった。

──そういう押井神話ってありますよね。たとえば「自作には必ず幼い少女が出てきて、それは押井さんが一年に一度しか会えないお嬢さんのことを思っているからだ」とか。前にそれ、押井さんに聞いたら「いや、一年に何度も会ってるけど？」みたいな答えだった。

押井　なぜか自分でも判らないけど、ある時期まで小さな女の子がもれなく自作に登場していたことは認めるよ。そういうふうに個人的な動機というのが、本人の気づかないうちに紛れ込んでくるんだよね。コンテを切っているとき、そういう意識はないから、あとで気づく場合が多い。

──観るほうは、何かと理由づけしたくなりますからね。

押井　それはあると思う。実際、娘が結婚してから女の子は出なくなったから。それに、ある時期まで娘が観る前提で作っていて、「娘が観るんだから、恥ずかしいものは絶対に作れない」と思ってやっていた。だから一本一本全力投球だよ。一本たりとも力を抜いてない。





定着したジブリのブランドイメージ



──押井さん、お父さんだったんですね。お嬢さんの好きな作品って何なんですか？

押井　……それが『紅の豚』……。

──えっ!?　押井さんの作品でですよ？

押井　いや、久しぶりに娘に会ったとき「セルが欲しい」と言われて当然、自分の作品を想像するじゃない？　ところが彼女の口から出たタイトルは『紅の豚』でさ。「『紅の豚』のセルが欲しいの！」だよ？　それでやるかたなく、ジブリの制作担当者に電話して用意してもらい、取りにいったんだよ。それも恥ずかしかったから喫茶店で待ち合わせして。その彼に「（宮崎さんの）サインは？」って尋ねられて「いらない」って言ったけどさ。

──押井さん、ショックでした？『パトレイバー』って言って欲しかった？

押井　その頃の娘はまだおチビちゃんだったから『パト』とか言われたら、それはそれでちょっとビビるかもしれないけど、でも、やっぱりショックだよ。

──すみません、でもそれ、面白すぎですよ。もしかして、そういうこともあって『豚』に対して攻撃的なんじゃないですか。

押井　別に攻撃的じゃないよ。でも、それで言ったら『天たま』でも同じようなことがあったんだから。宮さんがいつも起用している優秀なアニメーターが、僕の『天たま』も手伝ってくれたんだけど、彼女、とても『天たま』を気に入ってくれてさ。アニメーターが足りなくなったときもすぐに助っ人に来てくれたし、でき上がった作品も絶賛してくれて、僕としてはとても嬉しかった。でも、宮さんはどうかというと、『天たま』に関しては「大嫌い」どころかボロクソ（笑）。何というか、信頼していたり、大切にしていたりする身近な人間に仮想敵を褒められちゃうと、当人はコタえるんだよ、きっと。

──〝仮想敵〟ですか……。

押井　いや、僕はちゃんと平常心で観てますから。だって麻紀さんも、あれが宮さんのプライベート・フィルムだって認めるでしょ？　しかも、相当に単純な！

──そうですね。私に限らず、みなさん認めると思いますよ。

押井　だから、ジブリが凄いのは、そういう自己満足のプライベート・フィルムであってもヒットさせてしまうところ。ちゃんと商売にできるのが恐ろしいし、その勢いが当時はあったわけだ。

──ジブリのブランドイメージが定着したというわけですね。確かに、興収は54億円で、配給は27億円ですから立派ですよ。やっぱりジブリが年に一本、一定のクオリティの作品を作ることによって、アニメーションが一般的になったのは確かですよね。

押井　それは間違いない。

──『マクロス』等だったらオタク御用達で、映画ファンや映画評論家という人たちは観なかったかもしれないけど、ジブリが出てきたことで、彼らもアニメーションを観るようになり、評論もするようになった。

押井　ところが──それがこの本のテーマのひとつなんだけど、ジブリに関してはちゃんとした評論が書かれたことがない。最初に言ったように、ジブリをけなしても誰も得をしないから。それこそがジブリの功罪というやつだよ。確かにアニメーションを映画のスタンダードにはした。しかし、同時に評論をことごとくできない雰囲気も作ってしまったということ。

──そこまで酷いんでしょうか？

押井　たぶんね。誰も反対できないものとして、ジブリのブランドを作ってしまったんだから。最初に言った通り、ジブリのブランドが生まれ、インナーサークルができ上がった。ジブリを貶めることで誰も得をしない構造ができ上がってしまったんだよ。





スティーブン・スピルバーグ



　映画監督・プロデューサー。46年米国生まれ。ＴＶ映画として撮った『激突！』（71）で認められ『ジョーズ』（75）で大ブレイクした。『シンドラーのリスト』（93）と『プライベート・ライアン』（98）でアカデミー監督賞を受賞している。代表作に『Ｅ．Ｔ．』（82）、『インディ・ジョーンズ』シリーズ（81～08）、『ジュラシック・パーク』シリーズ（93～97）等がある。





『カラーパープル』



　85年の米国映画。黒人姉妹の40年に及ぶ波乱に富んだ人生を描く。同年のオスカーでは作品賞をはじめ10部門でノミネートされるものの、スピルバーグは監督賞にノミネートされなかった。ユダヤ人であるスピルバーグのマイノリティ魂が作らせた良質の人間ドラマ。原作はピューリッツァー賞を受賞したアリス・ウォーカーの同名小説。





『ミュンヘン』



　05年の米国映画。72年のミュンヘンオリンピックで起きた、パレスチナゲリラによるイスラエル選手殺害事件の顚末を描いたポリティカルスリラー。改めてスピルバーグの実力を見せつけられる入魂の傑作だ。報復を誓うイスラエル側の実行部隊の主人公が徐々に心を病み、それを彼が作る料理で表現する手法は秀逸。やっぱりいい映画に〝料理〟はつきもの!?





ロマン・ポランスキー



　映画監督。33年パリ生まれ。３歳のときにポーランドに移り、家族と共にゲットーに入れられるが、父親の手助けで脱出。その後、逃亡しながら終戦を迎える。父は生き残ったが、母親はアウシュビッツで虐殺されたという。戦後、映画学校で学び『水の中のナイフ』（62）で監督デビュー。これが西側諸国で評価されて英国へ。ハリウッド第１作は『ローズマリーの赤ちゃん』（68）。代表作に『チャイナタウン』（74）、『テス』（79）、『ゴーストライター』（10）等がある。二度目の妻、女優のシャロン・テートがチャールズ・マンソンの信奉者らに殺害されたのはあまりにも有名。





『戦場のピアニスト』



　02年の仏・独・ポーランド・英映画。ナチス政権下のヨーロッパでひたすら生き抜いたユダヤ人ピアニストを描く。そのサバイバルにポランスキーの体験が重なっているといわれている。同年のオスカー監督賞を獲得するが、授賞式は欠席。ポランスキーは、77年に起きた13歳の少女淫行容疑で米国を追放されていたからだ。





ティム・バートン



　映画監督・プロデューサー・脚本家。58年米国生まれ。ディズニーのアニメーターからキャリアを始め『ピーウィーの大冒険』（85）で長編監督デビュー。『ビートルジュース』（88）、『バットマン』（89）で人気監督に。代表作に『シザーハンズ』（90）、『ナイトメアー・ビフォア・クリスマス』（93）、『チャーリーとチョコレート工場』（05）等。モデルアニメ大好きで、日本の怪獣映画の大ファンとしても知られている。





『バットマン リターンズ』



　92年の米国映画。『バットマン』の続編。異形ゆえに両親に捨てられた過去をもつ怪人ペンギンがゴッサム・シティを恐怖に陥れる。バットマン、キャットウーマン、そしてペンギンを心に闇を抱えた異端児として描き、これまでにないダークなスーパーヒーロー映画にしてしまったが、それこそがバートン・タッチ。彼にしかできないユニークな解釈だった。





STORY



室町期の日本。タタリ神にかけられた呪いを解くため西方へ旅立った少年アシタカは、幼い頃から山犬に育てられた〝もののけ姫〟のサンと出会う。やがて、森を切り開こうとするタタラ製鉄集団と森を守る山犬一族との戦いに巻き込まれていく。





キャスト：松田洋治　石田ゆり子　田中裕子　小林薫　西村まさ彦　上條恒彦　原作・脚本・監督：宮崎駿　プロデューサー：鈴木敏夫　公開日：１９９７年７月12日　上映時間：約１３３分　興行収入：１９３億円　キャッチコピー：生きろ。





宮崎駿の日本人論





──では、宮崎監督の『もののけ姫』。その年を代表する大ヒット作になりましたね。ジブリの作品としては初の１００億円超えどころか、興収１９３億円ですよ！

押井　確かにこの数字は凄い。好き勝手やった前作『紅の豚』にはテーマがまったくなかったけど、今回は満を持して大テーマに回帰した。そのテーマとは〝宮崎駿の日本人論〟。

──だから〝山の民〟等が出てくるんですね。

押井　宮さんが考えている日本的なるもののオールスター。蝦夷えみしの民からタタラ場の人たち、ハンセン病の人たち、さらにはシシ神等、日本のなかの少数民族やマイノリティがテーマになっている。

──宮崎さん、そういうことをよく勉強なさってたんですか。

押井　宮さんは勉強家であることは確かで、歴史書等をしっかり読んでいて、その勉強の成果をちゃんとかたちとして残したかった。高畑さんにもそういう部分はあるし、僕にだってある。いわばクリエーターのひとつの願望みたいなものですよ。その興味が宮さんの場合は、知られざる、もうひとつの日本人の流れになる。それが〝山の民〟だよね。

──主人公のひとり、アシタカは？

押井　彼は蝦夷の一族になっているけど、山の民の一派。彼らは独自の宗教観や自然観をもっていて、それが宮さんの志向にマッチする。宮さんは農耕民族にはまったく興味がない。山の民はもれなく狩猟民族であり物作りですから。

──あ、宮崎さんの好きな物作り。

押井　そうです。だから、自分がもっとも感情移入できる人たちであり世界なんだよ。

──じゃあ、宮崎さんは高畑さんと違って農民には興味ないんですね。

押井　ないない。一度でも（自作で）やったことある？　農村が得意なのは高畑さんのほうで、宮さんはまったくナシ。

──で、押井さんは『もののけ姫』はどうご覧になったんですか？

押井　今度は構えすぎてガチガチになっちゃった。大上段に振りかぶりすぎて、収拾がつかなくなっている。思いっきり風呂敷を広げてみたんだけど、どうやって回収すればいいか判らなかったから、思いっきりぶん投げて終わり。最後に何となく花が咲き、いつものように音楽が流れ、何ひとつ解決せずにおしまい。そもそも、解決しようとさえしてないじゃない？　だいたい映画を作る人間は風呂敷を広げるのが大好きなんだけど、それをちゃんと綺麗に畳める人はまずいない。でも、本当はその部分こそ監督の腕の見せどころなんだけどね。

──クリストファー・ノーランは、まずラストから考えるって言ってました。しかも、それを絶対に変更しないって。確かに彼の映画、ラストが印象的ですよね。

押井　いや、それが普通ですから。僕だってラストから考えている。構造が命の映画なんだから、それが当たり前。でも、ちゃんとした脚本を書かない宮さんはその反対で、頭から始めて、終わりのことを考えない。何度も言うけど、だから監督に向かないわけだ。

──でも、そういう話を押井さんに聞けば聞くほど愛らしい方だなと思うようになりましたよ。だって一貫しているから素晴らしいじゃないですか。

押井　それがかわいいって何なの？　ある意味、自分の才気だけで（映画を）作っている人なんだよ。確かにある種の天才で、後先なんて何も考えない。そういうところをフォローするのがトシちゃんの役目なわけだ。

　で、麻紀さん『もののけ』のラストは覚えてる？

──それぞれが、それぞれの場所に帰って終わり。なぜかアシタカは故郷に帰らず、タタラ場にいるというので、「おい、帰れよ」とツッこみましたが。でも、公開当時はよく判らなかった。正直、ストーリーについていけない部分が結構あったと思います。あのとき、いろんな雑誌が『もののけ姫』の特集を組み、それが結構売れましたが、みんなストーリーがよく判らなかったからだと聞いてますね。

押井　ジブリ映画、とりわけ宮さんの映画って、ラストを覚えている人がどれだけいるんだろうと思うよね。主題歌や久石譲のメインテーマが流れて「おしまい」。無理やり終わらせている。この辺はトシちゃんの策略。

──『もののけ』は、最後に米良さんの歌が流れるんですよね。

押井　宣伝もその曲をこれでもかというくらい使っていた。みんなの耳にこの主題歌がこびりつくくらい。じゃあ、なぜその曲ばかり使ったのか？　宣伝するほうも、ストーリーがよく判らなかったからですよ。『もののけ姫』って、そもそもどんな話なんだ？　アシタカとサンの話だけど、それってどうなってたっけ？　麻紀さん、ちゃんと説明できる？

──文明対自然ですよね。サンは自然派、アシタカは中間、エボシさんが文明派。それらの価値観がぶつかり合う！　観直したばかりなんで、ここまでは言えますが、アシタカとサンの話は正直、弱い感じがしました。

押井　そう、本来ならアシタカとサンは、『ラピュタ』のパズーとシータのような話になってなきゃいけないのに、そうはなっていない。驚くべきことに、サンにまったく魅力がないんだよね。僕が試写会で一番驚いたのは、まさにその部分。美少女をずっと描き続けてきた宮さんが、サンには気合が入ってないというか、そう見える。キャラクターとしての官能性がいつもより明らかに足らないんだよ。思わず「どうしちゃったんだ、宮さん」ってツッこんじゃったくらいで。





宮崎流漫画映画の魔法



──確かにヒロインのはずなのに、印象は薄いですね。むしろ印象的なのはアシタカでした。

押井　そう、全然アシタカのほうが強い印象。あとはエボシ。彼女は宮さんの一番好きなタイプだよね。宮さんが面白いのは、単純な自然賛美、文明否定だけでは納得しないところ。何度も言っているけど、宮さん自身、その一方で戦闘機が大好きで機械文明も好き。そういった矛盾の塊だから。

──その宮崎さんの本音を代弁しているのがエボシさんなの？

押井　文明化するというのは人間の必然で、自然を破壊しなければ生きていけないのが人間でしょ。タタラ場のエボシは、言ってみればそんな人間の代表選手。『ナウシカ』のクシャナみたいな存在だよね。

──エボシさんは最後に片方の腕を失い、クシャナも片手が義手ですよね。

押井　言ってみれば、その代償。代償を背負わせるべきというのが宮さんの考え方で、それを腕にしたのは絵的に判りやすいからだよ。

　宮さんには独特のバランス感覚があって、必ずバランスを取ろうとする。『コナン』の悪役レプカでは、開いたトランクからパンツを撒き散らしながら逃げ出すシーンを入れてみたりして、彼を本当の悪にはしない。悪役のキャラクターにもかわいげのあるところを付け加えるのが宮さんなんだよ。エボシも強烈なイデオロギーを持っているけど、その代償としての〝腕〟が、宮さんには必要だった。そういう意味ではバランス感覚の天才なんだよね。

　それでいて、かわいい女の子に一箇所だけ傷を付けるとか、そういうことはしない。子供にもそう。女の子と子供は宮さんの聖域。彼らに代償を払わせたり、傷つけたことは一度だってないから。

──でも、エボシさんって葛藤がないですよね。たとえばアシタカが、タタラ場の女たちが大変だと報せに行っても「女たちは己が身を守れる」と言ってシシ神殺しに没頭する。普通なら、少しは逡巡してもいいと思いません？　だから彼女の強さに魅力を感じなかったんですけど。

押井　それは宮さんの本質だから。各論併記になって、いろんな価値観をもれなく差し出しつつ、葛藤しない個人が好きということは、あの人にとって矛盾はしないんだよ。宮さんは葛藤するキャラクターが大嫌いだから。悩んでウジウジする、苦悩する人間というのをまったく評価しない。要するに葛藤が嫌いなの。

──面白い価値観ですね。

押井　自然はもちろん大好き。でも、だからといってシシ神を肯定していくと人類否定にしかならない。その片方で、必要になるのが、人間の立場を代表する存在のエボシなんだよ。

　宮さんはそれほど単純な人間じゃない。人間がなぜ工業化したのかということもよく勉強しているし、それが必然だということも頭では判っている。でも、それをそのまま肯定する気にもなれない。とはいえシシ神を認めてしまえば「人類は滅びるべきだ」という結論にしかならなくなる。だからこそそこに、サンのような自然児を出さざるを得なくなる。アシタカは、そういうサンとエボシの中間的立ち位置だよね。

──でも、アシタカって自分の村に帰らなきゃいけないですよね。みんなが待ってますよ。なぜタタラ場に残るんですか？　そういう選択をするなら、やはり葛藤しなきゃ。

押井　だから、葛藤する人間は嫌いだって言ってるじゃない。そもそもストーリーが収拾つかなくなっているんだから、そうやって終わらせるしかなかったんだよ。

　基本的にはドラマじゃないの。価値観の葛藤がないんだから。映画としては「どこに行っちゃうの、この話？」というふうに迷走しっぱなしだし、そうなるのも、すでにある意味では結論が出ている問題だからだよ。つまり、文明は絶対に逆行しない、人間は文明を作ることによって人間になったんだからね。本当に自然のなかで生きられる人間は、それが自然であることすら判らない。エデンの園から一歩も出ないんであれば、人間という意識すらないわけだから。工業化社会は人間の必然で、自然を征服することによってしか人間は生きられない。でも、その自然に共感する部分を否定はしたくないんだよ。

──なるほど。

押井　そういうことをすべて判った上で『もののけ姫』を作ったんだけど、頭では判っていても、心が納得しない。だから必ず分裂する。その分裂をどうやって映画として終わらせればいいのかを考えないので、ラストがよく判らない映画になってしまう。

　そもそも、勧善懲悪の世界じゃないから、子供たちが理解できるとも思えない。宮さんは子供に見せるためにアニメーションを作っていたはずで、現実がどうあれ、少なくとも作品のなかではいい悪いをはっきりさせるというのが、あの人の監督としてのテーマのはずなのに、一貫性はゼロ。大テーマではあるんだけど、それゆえに収拾がつかなくなった。まあ、宮さんに限らず、そういう映画は珍しくはないしね。

──でも、画には力がありますよね。今回、観直してドキドキしてしまいました。

押井　そうやって、何となく凄いのを見せられて、何となく納得させられてしまうのは、宮さんだからこそかけられる漫画映画の魔法だよ。演出家や評論家は破綻をすぐに見抜いて騙されることはないだろうけど、これがアニメーターになると「凄かった！」って大コーフン。もちろん、本当に凄いですよ。タタリ神だろうがシシ神だろうが、メチャクチャに大変なことをやっているんだから。もれなくみんな、見事に動いているし、背景だって大したもの。まあ、動物、とりわけイヌのオーソリティの僕に言わせれば、犬神に関しては全然よくなかった。そういう、（宮さんが）目をつぶったところはあちこちにあるけどね。

──そうなんだ。圧倒されて、あまり気づかなかった。

押井　作画的にも極めてハードルが高い作品だし、長尺じゃない？　それをパーフェクトにできるはずはないんだよ。犬神だけじゃなく、タタラ場のレイアウトにもいろいろ問題はある。犬神を担当したアニメーターは、『人狼』にも参加しているんだけど、『人狼』のほうが圧倒的にいい。少なくとも獣の走りはアニメーターにとっては関門のひとつで、鳥よりも馬よりも難しい。犬のように姿勢が低くて走りが速いのはアニメーター泣かせですよ。その作画に関しては『人狼』のほうに軍配が上がるけどね。

──シシ神の顔もユニーク！

押井　宮さんの得意ワザです。キノコみたいなコダマ。あれも得意ワザ。ちゃんと動いているし、子供は大喜びだよ。

──かわいくって大人も喜びました！（笑）　あとは、シシ神が大地を踏みしめると花や草がふわーっと生えてくる。思わず「うわー」という声が漏れるほど、本当にきれいだった。

押井　あそこは官能的だよね。もう匂い立ってくる。あれこそを官能と呼ぶんですよ。もの凄くエロチック。シシ神だけは僕も感心した。『トトロ』で樹木が空に向かって一気に伸びるシーンと一緒。

　そういうのは、本当に動画の世界の真骨頂。もしそれをＣＧでやったとしても、ああいうふうには絶対にならない。宮さんだけがもつ、動きに対する独特の感覚というか官能性。植物エロチシズムがあるんだよ。宮さんは本当に植物が上手い。動物より植物のほうが全然上手い。そういう意味で言えば、確かに『もののけ』には素晴らしいシーンがたくさんあるよね。おそらく、宮さんがもっとも思い入れしたキャラクターもサンとかじゃなく、このシシ神だよ。だから、みんな目が釘付けになる。

──シシ神が水の上を歩くシーンや、撃たれて一度、水中に沈んで行き、再び水面に浮かび上がる……感動的ですらあった。

押井　宮さんは〝水〟も上手いんだよ。もう天才的。

　だから、別にいつもクサしてるばかりじゃないんだって！　ちゃんと褒めるところは褒めている。正当に評価しているんだから。あんなアニメーター、二度と現れないよって言ってるでしょ。ただね、しつこいようだけど、監督には向きませんって（笑）。

──久しぶりに観たんですが、収拾がついてないところとか、ストーリーの破綻とか、問題はたくさんあるけど、やっぱり画には魅せられちゃいますよね。

押井　月日が経って観れば、大テーマなんかはみんなぶっ飛んで、パートパートで楽しんでしまうところはある。やっぱり独自の色気が魅力的だから抗えない。

──でも、デジタルでやったところは、やっぱりよくなかった、というか、手描きのところが素晴らしいので、それに比べるとデジタルはちょっとでしたね。

押井　デジタルを初めて使ったことが公開当時、大きな話題になったよね。アシタカを乗せてヤックルが疾走するシーン等にマッピングを使っているけど、宮さんには向かないと思ったね。宮さん独自の、流れるように移動していく風景がもつ移動感や快感、それがテクスチャマッピングなんかで表現できるわけがない。それは確信した。『ナウシカ』の雲海や『ラピュタ』のときの流れる風景みたいに、全部作画でやるべきだと思った。でも、それをやっていたら完成しなかったかもしれないけどさ。

──もうひとつ、特徴的だったのは声優です。今回はやけに豪華ですよね。

押井　言うまでもなくトシちゃんの策略です。森繁久彌とか美輪明宏、西村まさ彦、田中裕子に森光子まで、もれなく集めている。これまでも俳優を声優に起用したことはあっても、ここまで大量に投入したのは初めて。メインのキャラクターのほとんどは顔出しができる面子だよ。日本人ならまず、その役者の顔が頭に浮かんでくる。

──サンは女優の石田ゆり子、アシタカは松田洋治ですね。松田さんは『ナウシカ』でもアスベルの声を当ててます。

押井　さっきサンについて、宮さんの美少女とは思えないくらい存在感が薄いと言ったけど、それは彼女の声が心に響いてこなかったことにも原因がある。ほかの美輪明宏も何で？　という感じじゃない？

──でも、押井さんだって『スカイ・クロラ』で女優の菊地凛子を起用したじゃないですか。加瀬亮も。

押井　でも、当時の日本人で菊地凛子のこと、知っている人なんていないでしょ？　加瀬亮の起用に関しては、まあ、いろいろあったんだけど……でも、凛子に関しては知らないだろうからいいかと思ったんだけど。

──いや、知ってました。だって『バベル』でオスカー助演女優賞にノミネートされて大注目されたあとですよ。

押井　それは麻紀さんが映画業界にいるから知っているだけ。一般の日本人は知らなかったんだよ。それに、何かのときに彼女と会い、僕が気に入ったから。いま思えば彼女、『攻殻』のラストで少女素子が着ていたような黒いドレスを着ていたんだよね。

──それって意図的だったんですか？

押井　おそらく。ヤル気満々だったから。役者ってそれでいいんだよ。「絶対、この役は取る」という意気込みを見せるというのは大事なこと。『ガルム』のときのメラニー・サンピエールだって、オーディションのビデオはオカッパ頭で銃を構えてたもん。

──押井さんの心をつかむのは意外と簡単です。オカッパ頭で銃を持てばいい（笑）。

押井　何言ってんの！　似合っているかどうかが重要なの。それこそが大切なんだからさ。

　ということはさておき、なぜ僕がそういうふうに声優陣が気になったかと言えば、本編を観たのがプレミア試写で、そのときズラリと彼らが壇上に並んだからなんだよ。面子も凄いけど、数もハンパなかったから。

──そういう風に声優を役者にする場合、いつも思うんですけど、石田ゆり子が声優をすることで集客できます？　作品を観たいと思わせる原動力にはなりませんよね？

押井　トシちゃんの「やることは全部やる」だよ。有名人をズラリと並べればマスコミの注目を集めるし、そもそも当時は、宮崎駿より森繁久彌のほうが有名だったじゃない？　別に石田ゆり子で集客しようというんじゃなく、マスコミに取り上げられることを目的にしているだけ。公開前に注目させて映画の認知度を上げるのはトシちゃんの役目だし、第一『もののけ姫』はいろんな意味で重要な作品。絶対ヒットさせなきゃいけない。そうじゃないとジブリが終わってしまうくらいの規模だったんだから。

──入魂作だったんですね。

押井　そう。宮さんにとっては頭のなかだけで大上段に振りかぶった入魂の一作だった。鈴木敏夫の入魂は、この作品を興行的に成功させること。さっきも言ったけど、これは宮さんのやりたい放題が生んだ作品で、いろんなセンシティブな問題もたくさん抱えていた。その後始末をやったのもトシちゃんだから。

　みんな、忘れちゃっているかもしれないけど、アニメーションでここまで首が飛んだり腕が飛んだりする作品って、まずないですから。公開当時、どこのアニメスタジオも『もののけ』の話で持ちきりだった「あの宮さんが首を飛ばしまくっているよ」ってね。それは何を意味しているかと言えば、宮さんがアンストッパブルになったってこと。トシちゃんの言うことなんて何も聞かない、アンコントローラブルな状況になったんだよ。

　僕が考えるに、その兆候は『豚』からあった。あれだけ好き勝手をやっているんだから。その一方で、鈴木敏夫が宣伝のためにますます奔走しなくてはいけなくなった。

──とはいえ、映画史に残る大ヒットですからね。凄いですよ。

押井　結果的には大ヒット。だからますますイケイケになって止まらなくなった。

　これで２本、続けて好き放題やったわけだけど、この２本は全然違う。『紅の豚』でやった好き放題は個人的なこと。でも『もののけ姫』は、日本および自然、人間、文明論まで、自分の興味があること、勉強したことを全部投入して大テーマを掲げ、作家としてやっちゃった。つまり、本格的に作家デビューしたんだよ。

──ということは『もののけ姫』は、宮崎監督の集大成ですね？

押井　集大成？　「大成」してないし。そういう興味や知識をただ集めただけ。編集も構成もしてないから、集めて並べただけ。

──じゃあ、何と言えばいいんですか？

押井　大棚ざらえかな。いや、蔵出しのほうがあってる。根こそぎ出したんだからさ。





蝦夷の民



　主人公のひとりアシタカの一族。大和朝廷との戦いに敗れ山のなかで暮らしている。宮崎曰くアシタカは、その戦いの蝦夷族の勇者アテルイの末裔という設定だそうだ。





タタラ場



　製鉄所のこと。当時は、山を切り崩して砂鉄を集め、それを製鉄するという手法を取っていたため、山にこの作業場があった。





クリストファー・ノーラン



　監督・脚本家・製作者。70年英国生まれ。『フォロウィング』（98）で長編監督デビュー。代表作に『ダークナイト』シリーズ（05～12）、『インターステラー』（14）、『ダンケルク』（17）等。３Ｄを否定し、デジタルにもできる限り頼らないという主義を貫いている。





久石譲（ひさいし じょう）



　作曲家・ピアニスト。50年長野県生まれ。『ナウシカ』からすべての宮崎作品の音楽を担当する。その他の代表作に『あの夏、いちばん静かな海。』（91）、『ソナチネ』（93）等の北野武監督作品。





米良さん



　米良美一（めら よしかず）のこと。歌手。71年宮崎県生まれ。自身の歌う楽曲を、偶然ラジオで聴いた宮崎が感銘を受け本作の起用につながった。





『人狼』



　『人狼　JIN-ROH』のこと。00年製作のアニメーション。戦勝国ドイツの占領から解放されて間もない架空の日本を舞台に、体制側の巡査とセクトと呼ばれる過激派集団の運び屋〝赤ずきん〟の道ならぬ恋を描く。原作・脚本は押井。監督・絵コンテ・キャラクターデザインは沖浦啓之。彼の監督第１作。





マッピング



　３Ｄ－ＣＧモデルの表面に画像を貼り付け、質感を豊かにする方法。





森繁久彌（もりしげ ひさや）



　俳優。13年大阪府生まれ。映画の代表作に『社長』シリーズ（56～70）。舞台『屋根の上のヴァイオリン弾き』（67〜86）でも知られる。09年逝去。





美輪明宏（みわ あきひろ）



　俳優・歌手・演出家。35年長崎県生まれ。代表作『黒蜥蜴』は舞台版・映画版ともに主演。宮崎作品では『もののけ姫』のモロの君、『ハウル』の荒地の魔女の声。





西村まさ彦（にしむら まさひこ）



　俳優。60年富山県生まれ。映画の代表作に『のぼうの城』（12）等。宮崎作品では本作の甲六役、『ギブリーズ』の野中くん、『風立ちぬ』では黒川の声。





田中裕子（たなか ゆうこ）



　俳優。55年大阪府生まれ。ＴＶシリーズ『おしん』（83～84）で国民的女優に。宮崎作品ではエボシ御前。『ゲド戦記』のクモの声。





森光子（もり みつこ）



　俳優。20年京都府生まれ。代表作にＴＶシリーズ『時間ですよ』（70～89）。林芙美子原作の舞台『放浪記』がライフワークに。12年逝去。





石田ゆり子（いしだ ゆりこ）



　俳優。69年東京生まれ。代表作に『悼む人』（15）等。ジブリ作品では『ぽんぽこ』のおキヨ、『コクリコ坂』の北斗美樹の声。





松田洋治（まつだ ようじ）



　俳優・声優。67年東京生まれ。ＴＶシリーズ『家族ゲーム』（83）等に出演。『タイタニック』『ザ・ビーチ』のレオナルド・ディカプリオの声。





『スカイ・クロラ』



　08年のアニメーション『スカイ・クロラ The Sky Crawlers』のこと。戦争代行会社のパイロットはキルドレと呼ばれる、思春期で成長が止まり永遠に生き続ける子供たちだった。原作は森博嗣の同名小説。





菊地凛子（きくち りんこ）



　俳優。81年神奈川県生まれ。『バベル』（06）でアカデミー助演女優賞にノミネート。以降、日本だけに留まらず活躍。『ノルウェイの森』（10）、『パシフィック・リム』（13）等。





加瀬亮（かせ りょう）



　俳優。74年横浜市生まれ。代表作に『硫黄島からの手紙』（06）、『それでもボクはやってない』（07）等。





『バベル』



　06年の米国映画。監督はアレハンドロ・ゴンザレス・イニャリトゥ。モロッコ・アメリカ＆メキシコ・日本を舞台に心を通じ合えない現代人の姿を描く。出演はブラッド・ピット、ケイト・ブランシェット、役所広司。





『ガルム』



　『ガルム・ウォーズ』のこと。北米は15年、日本は16年公開。バンダイが立ち上げたデジタルエンジンプロジェクトの１本として、00年に公開予定だった『ガルム戦記』がベースのオリジナル・ファンタジー。出演はランス・ヘンリクセン、ケヴィン・デュランド。日本語版プロデューサーは鈴木敏夫。





メラニー・サンピエール



　俳優。85年カナダ生まれ。『ガルム』では主人公のカラを演じた。その他の出演作にＴＶシリーズ『ヒーローズ・リボーン』（15～16）。





STORY



親の都合で引っ越すことになった10歳の少女・千尋。引っ越し先へ向かう途中のトンネルから、八百万の神が集う不思議な町に迷い込む。偶然ハクに出会った千尋は、湯屋に潜入。湯婆婆に湯屋で働く許しを得て、生き抜くために働き始める。





キャスト：柊瑠美　入野自由　夏木マリ　菅原文太　原案・脚本・監督：宮崎駿　プロデューサー：鈴木敏夫　公開日：２００１年７月20日　上映時間：約１２５分　興行収入：３０８億円　キャッチコピー：トンネルのむこうは、不思議の町でした。





千尋とカオナシの物語



──『千と千尋の神隠し』は日本の映画史を塗り替えてしまった作品です。興行収入が驚きの３０８億円。当然ですが、この数字はまだ破られていません。

押井　僕が観たときにとても驚いたのは、その冒頭。揺れる車の後部座席で千尋がぶーたれているシーンから始まるじゃない？　これって実は、宮さんが『柳川堀割物語』のオープニングとして考えていたシチュエーションとほぼ同じなんだよ。確かそっちは男の子で、あとはほとんど一緒だと思う。宮さんは『～堀割物語』を劇映画でやりたがっていて、その企画会議のときに言っていた冒頭のアイデアがこの『千尋』のオープニング。つまり、何が言いたいかというと、僕も執念深いほうだけど、宮さんも相当だなと。

　で、『千尋』ですが、いつもと同じように自分がやりたいシーンをただつないだだけの映画ですね。

──観直してみると、確かにストーリーがとっちらかっている。そもそも、何で千尋の両親がブタにならなきゃいけないのって。しかも、料理をむさぼるブタがリアルで、ホラー映画のようだった。

押井　僕もあのシーンは「ブタ好きな宮さんなのに、なんでこんなにかわいくないんだ」って思ったからね。ブタの負の面しか出ていない。いつもの愛嬌あるブタとはまったく違うから。食べ物もあのシーンに限り、みんなまずそうに見える。

　その理由はよく判らないけど、両親をブタにしたのはおそらく、千尋が湯屋でこき使われるための必要条件を考えてだと思う。途中、あまり両親の話は出てこないでしょ？

──ブタになった両親を探しに行くエピソードはありましたが、少なくとも後半、両親を元の姿に戻すのが彼女の最優先事項という感じではなくなりましたね。

押井　まず宮さんが考えたのは、都会出身の千尋が重労働して、何かに目覚めてちゃんとした子供になるというアイデア。それを実行するために両親をブタにしただけなので、そこを一生懸命追う必要もない。両親のミッションはそこでほぼ完了しているんだよ。こういうのをご都合主義と呼びます。

──手厳しい！

押井　だってそれが宮崎映画なんだから仕方ないじゃない。ストーリーラインもなければ、主人公の心理線すら怪しいし。

──ハクから貰ったおにぎりを食べて泣くところ。一緒に泣いちゃったんですけど。

押井　それは単なるディテールです。その場だけのこと。ディテールの説得力がたいしたもんだというのは、さんざん言ってるじゃない。それと映画の評価は別。少なくとも僕は、ディテールのために映画を観ているわけじゃないですから。ディテールはとても重要だけど、それだけで映画は成立しない。監督の力はどこで機能してるんだよ、と訊きたい。一本筋を通す、映画に芯を与え、構造を作り出すのが監督の仕事ですから。クレジットでは脚本も宮さんなんだからね。まあ、実際には何も書いてないだろうけどさ。

──一時期の香港映画みたいですよね。脚本を書かないって。とはいえ、当時の香港映画には絵コンテもなかったようですけど。

押井　ジャッキー・チェンの体当たりアクションならそれもアリだよ。だって観客が見たいのは命がけのジャッキーなんだからさ。でも、ジブリの作品は常に大テーマを掲げているんです。それじゃあ済まないでしょう、普通。作品がそうなっているんじゃなくて、鈴木敏夫の策略である宣伝方針としての大テーマだとしてもさ。

──今回のキャッチコピーでいうと「トンネルのむこうは、不思議の町でした。」ですね。

押井　それは最初のほう。あとで変わりました。トシちゃんは必ず中押しするから。そのときにコピーを変えて、今度はカオナシに焦点を移動させた。トシちゃんの理屈で言えば〝カオナシと千の物語〟になった。

──途中から「みんなの中に、カオナシはいる。」になりましたね。

押井　そう、実は『千尋』はカオナシの映画だったということ。どうもトシちゃん、キャラクターの登場カット数をカウントしたらしく、脇キャラのなかでは、意外なことにカオナシが一番多かったらしいよ。確かに、ポロポロと画面の隅っこによく出てくるから。

──宮崎さんが意図して何度も登場させたとは思えないけど。

押井　監督の無意識の発露、ですね。宮さんだってカオナシの映画になるなんて、たぶん思ってもいなかったはずだよ。その無意識を掘り当てる名人が鈴木敏夫なんです。だから、つくづく宣伝に向いている（笑）。

──カオナシって『禁断の惑星』のイドの怪物みたいなもんなんですか？

押井　カオナシは、現代を生きている人間の欲望の象徴。どれだけ大量に食って、どれだけいろんなものを与えられても絶対満足しない。欲望そのものだから顔もなく、名前もカオナシ……そう言われているよね。それと千尋がどうやって向き合うかという物語が『千尋』になる。違う言い方をすれば、苦労して、それなりに人の気持ちを判ってきた千尋という少女が、カオナシを説諭する物語。だから、千尋とカオナシの物語というのは、とても正しいんだよ。ハクなんか、どこかに行っちゃったじゃない。あの美少年、どこに行ったの？

──私のなかには常にいましたけど？

押井　なんだよそれ。ハクはペラペラの脇役じゃない。

──ええ、ええ、ホントに扱いが酷いんですよ。最初は意味シンでしたけど、途中から監督に飽きられちゃって……悲しい末路でしたね。

押井　誰だって最初は千尋とハクの物語になると思うよ。ところが途中から、いままでチラチラ出ていた、ヘンなおばけみたいなおっさんがどんどん比重を増していって、この話、どこに行っちゃうの？ってね。無自覚に映画を作っている宮さんらしいと言ってしまえばその通りで、宮さんの本質がもっともよく出た映画なんだよ。それは間違いない。





始まりはいつも〝問題を抱えた子供たち〟



──観直して気になったのは千尋でしたね。彼女の性格がよく判らない。確かに、住みなれた東京から田舎に転校するので悲しくなるのは判りますが、それは彼女がいま置かれた状況なだけで、性格じゃないですよね？　でも、それがあたかも性格のように描かれていません？

押井　そう、つまりそれは、宮さんがこの女の子を、ひとりの人間として描く気があまりないことを意味している。状況を描き、あとはぶーたれている描写を入れれば、それで成立すると思っている。

　それにしてもジブリの作品は、欠陥や問題を抱えた都会の子が田舎に行って自己更正を果たす、自分を見つけ出すという物語が多いと思わない？『魔女宅』はその逆で田舎から都会だけど、『千尋』も『ぽろぽろ』も、あとで出てくる『思い出のマーニー』も同じ。ではなぜ、同じパターンを踏むのか？　僕はそこに、宮さんの本質とのかかわりを見つけ出せないんだよ。興行上の理由しか思いつかない。つまり、鈴木敏夫が作り出したパターンという説。いまの日本に生きる人々にアピールしなきゃいけないんだ、テーマをあげなきゃいけないんだ。そうしないと、宣伝プロデューサーである私の出番は永遠に来ないから──と、トシちゃんが考えたことは予想できる。宣伝することは、世の中にアピールすることだからね。

　いまの日本に生きている人間がどんな問題を抱えているのか？　それを誰もが理解できるかたち、最大公約数的に集約すると「問題を抱えながら都会に生きている子供が、田舎に行って自分を見出す」になる。これならみんな判るし、誰もが興味をもつ物語なんだというわけさ。身も蓋もなく言っちゃえばそうなるんだよ。だから、いつも問題を抱えた子供から始める。ほぼ例外なく。そうでないのは『豚』くらいであって『ラピュタ』だって厳密に言えばそう。

──宮崎さんも鈴木さんに操られていたってことですか？

押井　『魔女宅』のとき、トシちゃんに無理やりやらされたウジウジする少女の物語が、いつの間にかジブリの〝定番〟になってしまったわけ。

──『千尋』の場合、最初はウジウジしていますが、割と早い段階で立ち直り、がんばりまくっていい子になりますよね？　そのプロセスが短すぎると思ったんですけど。

押井　だから何度も言っているじゃない。宮さんはウジウジしたり、こんな仕事やだーなんてグチる子は大嫌いだから、そういう部分はすっ飛ばしちゃうの。すぐに、大好きな一生懸命がんばる子にしちゃう。絵描きなので、自分の嫌いな子はできるだけ描きたくないんだよ。

──それだけで？　普通はその成長過程が重要ですよね？

押井　普通はね。でも、宮さんだから普通じゃないんだし、これは、いわゆる〝宮さんの文法〟で作られた映画。『豚』とは違う意味で、あの人らしさが爆発した、宮崎駿の最高作なのかもしれない。

──メガヒットしたことも含めて、「最高作」ということですか。それにしてもなぜ、ここまでヒットしたのか、ですよね。確かに、魅力的なキャラクターがたくさん登場しますから、そういうところも人気の秘密？

押井　ツッこみどころ満載にもかかわらず、なぜメガヒットしたか──その「なぜ」の部分の答えは簡単に出る。「ジブリ映画が大成功しているから」。日本人って、大成功したものにはツッこみを入れないんですよ。黒澤明だってそうでしょ。

　昔、シンちゃんが言っていたけど、シンちゃんの発明した〝椅子理論〟によれば「黒澤明の椅子には誰が座るのか」という問いの答えは「宮崎駿」になるわけ。誰も批判できない椅子で、最初から巨匠であると決まっちゃってるわけだ。巨匠の場合、日本では批判の対象外ですから。

──それは判りやすいですね。

押井　ついでにもうひとつ、シンちゃんの〝パンツ理論〟をあげると、「監督というのは、自分のパンツをいかに下ろすかで、その資質が問われる」というやつ。意外なことに、これはあらゆる監督に適用できる。宮さんの場合は「（パンツを）下ろしかけて、実は下ろさない天才」。だからこそのエンタテイナーなんだと。庵野の場合はすぐに下ろすんだけれど、問題なのは「そこにあったモノはヘンなカタチをしていた」。

──それは言いえて妙ですね。で、押井さんは？

押井　シンちゃんに言わせれば「確かにいつもパンツは下ろすんだが、そこに付いていたのはニセモノだった」って。

──上手い！　じゃあ、樋口さん本人は？

押井　自分自身になると、そう冷静に分析はできないみたいだよ。でも、さっきの椅子理論をシンちゃんに当てはめると「佐藤純彌の席」。シンちゃんの周辺はみんな、彼の『新幹線大爆破』が大好きだから、ああいう底抜け大作映画を連発する席に座りたいんだよ。

　まあ、それはおいといて、日本人なら誰でも知っている映画監督と言えば、ちょっと前まで黒澤だった。でも、いまは宮崎駿。上はじいちゃんから下は幼稚園児まで、みんな知っている。そういうふうに出来上がっちゃったから、いまさら誰が何を言おうと関係ない。それについては、賞賛する以外の言葉はないんだよ。日本ではね。





画のクオリティと成熟度



──３００億円の映画を作ってしまうと、そういう評価になってしまうのかもしれませんよね。しかもこれ、アカデミー賞まで受賞したんですよ！　確かに、あの湯屋の色の洪水は美しかった。九谷焼みたい。

押井　いや、クオリティ面で見るといいとは言えない。色も濁った感じ、とりわけ湯屋のシーンがね。

──そうなの？　まっくろくろすけのご飯がカラフルな金平糖だなんて、すてきじゃないですか。色のコントラストを考えてるんだなーって思ったんですけど。

押井　だから、何度も言っているように、それはディテールです。本当に何度も言っちゃうけど、宮さんの映画を語るときの常套句が「あのシーンが凄かった」「あの子がかわいい」「あのキャラクターが最高」。「あの」しか出てこない。作品全体を語るということが、まずないんだよ。

　で、この作品で僕が気になったのはレイアウト。レイアウト力がめっきり落ちてしまった。釜炊き場の空間や、湯屋の内部の空間に見られる不整合は、いまに始まったことじゃないから目をつぶるとしても、レイアウトのダイナミズムがなくなった。あんな凄い立体的な湯屋を作っておきながら、高さのレイアウトがあまりないんだよ。カメラが横にしか移動しないし、上下移動のときはエレベーターだなんてありえない。昔の宮さんだったらあんなラクチン、絶対しないから。すげえ階段作ってワーワーやるに決まってる。エレベーターという発想なんて、ホントにありえない。驚いた。

　おそらく、最初は「凄いことをやる」というつもりだったんだと思う。でも、気力がそれについていかなかった。それは『もののけ』の頃から感じていたことで、徐々にほかの原画マンに任せるようになったんだよ。アニメーションの現場ではやはり画のことがもっとも話題になるから、そういう意味で『千尋』のときは「さすがの宮さんも」という表現が多かった。つまり〝歳〟を感じちゃったわけ。アニメーションは基本、全部手作業だから、そういう変化を隠しきれないんだよ。

　そういう視点で改めて宮崎作品を観てみると、画のクオリティのピークは『魔女宅』だと思う。そして、自分の作品としてのピーク、つまり成熟度は『千尋』辺りからかな。面白いよね、自分の作品のピークと、クオリティのピークは一致しないんだよ。それは宮さんに限らず、そういうことになる。『魔女宅』は宮さんがもう一度、観たい映画じゃないと思うから皮肉でもあるんだけどさ。

──押井さんの場合は？

押井　クオリティのピークは『イノセンス』、作品としてのピークは『スカイ・クロラ』。これは自信がある。僕は確信があるけど、宮さんが確信しているかは怪しいよ。

──あと〝春巻き伝説〟というのがありますよね。宮崎さんが、両親の春巻きの食べ方が違うと言って、何度も何度も担当原画マンにダメ出ししたという逸話。

押井　それはＮＨＫのドキュメンタリーか何かに出てくるエピソードだよ。でも、僕に言わせると「いまさら」だね。

　そんなこと、僕が出会ったときから延々と言い続けている話。「いまどきのアニメーターは、実感の世界からどんどん遠ざかっている」ってね。それでケンカしたこともあるんだから。

──またケンカですか（笑）。

押井　僕が『イノセンス』を作っている頃、宮さんが『ハウル』をやっていて、僕はよくジブリに出入りしていたんだよね。あるとき、最初は穏やかに話していた宮さんの機嫌がだんだん悪くなってきて「最近のアニメーターは……」「絵描きの心情が……」とかグチャグチャ言い始めた。僕はだんだん腹が立って来て「いまさら何言ってんだ。そんなものは10年も20年もまえから何も変わってないよ！」って。で、怒鳴りあいになった。もうスタジオ中に響き渡る怒鳴りあい。たぶん、それが最後。宮さんとはそれ以来、会ってないよ。

──へー、本当に仲がいいんですねえ（笑）。

押井　はぁ？　全然よくないよ！

──いやいや、で、その「春巻き」についてはどう思います？

押井　まあ、宮さんの言うことが正しいのには変わりなくて、いまどきの若いアニメーターは、要するに紙の上でしか仕事をしていない。そして、アニメーションしか観て育ってない。しかも、ロボットもののような作品しか観ていないので、人間がものを食べて排泄するという、もっとも〝生〟の実感を得られるところから一番遠い場所で仕事をしている。でも、アニメーターって本来そういうもんじゃなくて、実感の世界を再現するのが仕事なんだよ。だから宮さんの言う「正確である必要はない。実感を再現することがアニメーターの最終的な仕事」になるわけだ。僕もこの意見には賛成する。「まず、ものを観察するところから始めろ」と言うんだよ。優秀なアニメーターというのはもれなく観察の天才だから。言うまでもなく、その点でも宮さんは天才です。





映画史上最高のシーン



──だからいつも、宮崎さんの食事シーンは本当に美味しそうなんですね。こんなに美味しそうなおにぎり、初めてでしたから。

押井　うん。ものを食べる芝居はその典型。少なくとも宮さんは、僕の知る限り、ものを食べるという芝居に関しては第一人者ですよ。

　僕はね、自作に食べるシーンを入れるという意味でも、とても宮さんに共感していた。『コナン』の頃から、食事シーンは本当に素晴らしい。僕も実写、アニメ問わず、食べるシーンは必ず入れるんだけど、そう簡単じゃないんだよ。とりわけアニメーションになると難易度が上がり、ほとんどは失敗してしまう。そもそも僕と宮さんが意気投合したきっかけも、その食事シーンのことがあったからだからね。宮さんにとって食べることは、走ったり飛んだりすることと同じ。おにぎりを食べながら泣くなんていうのは、まさに美味しそうに食べるという行為の究極的表現でしょ。

──あのシーンで泣く人がたくさんいますよね。私もそうですが。確かＤＶＤを出すとき、あのハクのおにぎり型を特典でつけてませんでしたっけ。鈴木さんってその辺、商魂逞しいなあって思っちゃいましたけど。

押井　それこそ宮さんのジレンマ。「人間の手で握った、ぬくもりのある握り飯こそがおにぎりであって、ラップされたコンビニのおにぎりなんか、人間の食うもんじゃない！」って言いたいはずなんだよ。でも、その言葉は呑み込まなきゃいけない。成功すればするほど、自分が呪う世界に利用されて行く。でも、商業主義で仕事をするというのはそういうことだから──。

　これまで宮さんの抱えているだろう矛盾についていろいろ言って来たけど、最大の自己矛盾はこれなんじゃないかな。自分の呪うべき世界で大成功を収めたことに対するお釣り。言い方を換えれば、本来のあるべき自分の姿から逆襲されている。でも、それを認めたくないからわめき散らしたりしているわけだ。

　自分だけが儲かってしまうことにも後ろめたさがあって、僕でさえもヨーロッパのリサーチ旅行に連れていってくれたりしていたから。まあ、ほかにもオトナの事情があるんだろうけど（笑）。僕はそれを、宮さんなりの贖罪だったんじゃないかなーって思うんだよね。

──何かしんみりしちゃいますね。

押井　でも、相変わらずイメージの爆発力は凄まじくて、特に千尋とカオナシが路面電車に乗って銭婆に会いにいくシーン。あれは明らかに三途の川。宮さん自身も意識していると思うよ。浅く冠水した線路を千尋がカオナシと一緒に列車でゴトゴト行く──。あの三途の川のイメージは、これまで観た映画のなかで最高だった。

──宮崎さんの映画のなかで？

押井　全部の映画のなかで。

──えっ!?

押井　同じようなことを鈴木清順もやっているし、いろんな監督がやっているけど、この宮さんの表現が最高に素晴らしい。

──『火垂る』の路面電車よりもいいんですね。

押井　もちろん。あれは暗くて憂鬱だった。しかし、宮さんの三途の川は、驚くほど透明感があり、ある種の清々しさがある。さらに静寂に包まれていて、本当に素晴らしいと思った。乗客もぼやっとした黒い影みたいなかたちで、実はこの表現には手間がかかる。つまり、ちゃんと力を入れたシーンなんだよ。

　いわば、宮さんの死生観が現れたシーン。『火垂る』の高畑さんと比べると、遥かに宮さんの死生観のほうが深いということが、これでよく判る。高畑勲という所詮、クソインテリであって、インテリゲンチャが夢想した三途の川の異界なんてあんなもんであってさ。

──でも、押井さん、『火垂る』のそのシーン、褒めてますよ。

押井　『火垂る』で心に残るのはそこしかないから、もちろん褒めた。なぜって、そこまで行かない映画がほとんどだからだよ。でも、宮さんの三途の川に比べたら数段落ち。説得力がまったく違う。人間が死ぬという死生観の深さがまるで違う。絶えず人間が生きることの実感を求め続けてきた宮さんと、観念的にしかそれを考えてこなかった高畑さんの違いがはっきり出ているよ。これは声を大にして言いたい。本当にあのシーンは素晴らしいんだから！

　たださ、問題なのは、行っちゃった向こう側を描いてしまったことだよね。

──千尋は、銭婆の家でお茶をいただきますよね。

押井　それまでは素晴らしいのに、着いたところを見てしまうと「あ、こんなものか」という感じになっちゃう。やっぱり、そこまで踏み込むものではない。

　というのもあれはね、どんな監督であろうと描けませんから。向こうに渡るまでの表現はできても、渡った先の表現はできない。それをやっちゃうと丹波哲郎の『大霊界』になってしまう。漫画になっちゃうんだよ。

　なぜ死後の世界が表現できないかというと、誰も体験したことがないから。宮さんの理屈で言えば「見たことのないものは、アニメーターは描けない」になる。

──じゃあ、何で描いちゃったんです？

押井　カオナシとコトコト揺られて、ふと目が覚めた──なんてふうに終わらせることもできたのになぜやったのか？　それはもう、宮さんが「そこまでやらないと、まずいんじゃないか」というふうに、余計な気を回してしまったからだよ。もともとワケの判らん話をやってるんだから、その辺の辻褄になぜこだわるんだと言いたいんだけどさ。

──結局、ハクが迎えに来るわけですから、ハクと千尋の関係をはっきりさせるためのシチュエーションも欲しかったのかも？

押井　だから、ハクと千尋の関係なんて後付けだって。宮さんにとっては、もうどうでもよくなっている。余計なことを盛り込むから馬脚を現してしまうんですよ。

　でもさ、僕としてはカオナシが宮さんのどこから生まれたのかは気になるけどね。宮さんは無意識の天才だけど、宮さんの独創にしてはカオナシって異色じゃない？　向こうから来た、つまり彼岸の世界から来たんだろうという予想はつくし、だからこそ三途の川も出て来る。でも、宮さんのどこからあのイメージがわいたのか、それはいまでも気になるんだよね。





『柳川堀割物語』



　87年製作のドキュメンタリー。福岡県柳川市を走る水路こと「堀割」の過去を探り、未来を考察する。製作は宮崎駿。製作期間１年の予定が３年に延びたため資金が底をついた宮崎は、自宅を抵当に入れたという逸話もある。





ジャッキー・チェン



　俳優・監督・製作者。54年香港生まれのアジアを代表するアクションスター。７歳から京劇や中国武術を学び、映画のエキストラを務める。『スネーキーモンキー蛇拳』（78）『ドランクモンキー　酔拳』（78）をヒットさせてスターに。代表作に『プロジェクトＡ』（83）、『ポリス・ストーリー／香港国際警察』（85）等。米国で本格的に大ブレイクしたのは『ラッシュアワー』（98）から。『タキシード』（02）のとき、初めて会ったスピルバーグにまずサインを求められたという。作品のエンドクレジットに流れるＮＧ集が人気で、そのなかには実際に血を流しているシーンもあった。





『禁断の惑星』



　56年の米国映画。20年前に消息を絶った宇宙入植者たちを探し、ある惑星に向かった捜索団。そこには博士とその娘、そしてロボットがいた。シェイクスピアの『テンペスト』を宇宙を舞台に翻案したＳＦサスペンス。劇中に登場する正体不明のモンスターが、博士の潜在意識が生んだ「イドの怪物」。流線型のデザインが美しいロビー・ザ・ロボットはＳＦ映画史に残る逸品。





黒澤明（くろさわ あきら）



　映画監督・脚本家。10年東京生まれ。『姿三四郎』で映画監督デビュー。代表作に『羅生門』（50）、『七人の侍』（54）、『蜘蛛巣城』（57）、『用心棒』（61）、『デルス・ウザーラ』（75）等。世界の映画人が多大な影響を受けた日本人監督のひとり。とりわけ『七人の侍』の人気は高く、これまで『荒野の七人』（60）、『マグニフィセント・セブン』（16）としてハリウッドでリメイクされている。98年逝去。





シンちゃん



　樋口真嗣（ひぐち しんじ）のこと。特技監督・監督。65年東京生まれ。ガイナックスに参加し『王立宇宙軍 オネアミスの翼』（87）で助監督を務める。『ガメラ 大怪獣空中決戦』（95）で特技監督。監督作『ローレライ』（05）が大ヒットし『日本沈没』（06）も手掛ける。代表作に『進撃の巨人 ＡＴＴＡＣＫ ＯＮ ＴＩＴＡＮ』『進撃の巨人 ＡＴＴＡＣＫ ＯＮ ＴＩＴＡＮ エンド オブ ザ ワールド』（15）、『シン・ゴジラ』（16）。





庵野



　庵野秀明（あんの ひであき）のこと。アニメーター、監督。60年山口県生まれ。『ナウシカ』制作に参加するため上京。原画マンとして参加する。注目されたのは作画監督を務めた『王立宇宙軍 オネアミスの翼』（87）。監督デビュー作をＯＶＡの『トップをねらえ！』（88〜89）で飾り、ＴＶシリーズ『ふしぎの海のナディア』（90～91）でブレイクする。ＴＶシリーズ『新世紀エヴァンゲリオン』（95～96）で一大ブームを起こし、同作の劇場版も手掛けた。大ヒットした実写映画『シン・ゴジラ』（16）では総監督・脚本等、あらゆる部門でクレジットされている。06年には自らが代表取締役を務めるアニメ製作会社株式会社カラーを設立。劇場版『ヱヴァンゲリヲン』の製作を手掛けている。





佐藤純彌（さとう じゅんや）



　映画監督・脚本家。32年東京生まれ。『陸軍残虐物語』（63）で監督デビュー。代表作に『君よ憤怒の河を渉れ』（76）、『野性の証明』（78）、『敦煌』（88）、『北京原人 Who are you?』（97）、『男たちの大和／ＹＡＭＡＴＯ』（05）等がある。





『新幹線大爆破』



　75年の日本映画。走行速度が時速80キロを下回ると爆発するという爆弾を仕掛けられた新幹線を巡り、国鉄・政府・犯人の三つ巴の攻防戦が展開する。日本では珍しいパニックアクション映画。





ＤＶＤ



　ビデオ・ＤＶＤ予約特典として付いていたのがハクのおにぎりフィギュア。何でも宮崎監督の握ったおにぎりをかたどっているんだとか。監督がおにぎりを握っている証拠写真付き。





鈴木清順（すずき　せいじゅん）



　監督。23年東京生まれ。代表作に『肉体の門』（64）、『東京流れ者』（66）、『殺しの烙印』（67）、『ツィゴイネルワイゼン』（80）等。「三途の川」が暗示されている作品は『ツィゴイネルワイゼン』。17年逝去。





丹波哲郎（たんば てつろう）



　俳優・心霊研究家。22年東京生まれ。『殺人容疑者』（52）で映画デビュー。代表作に『豚と軍艦』（61）、『切腹』（62）、『十三人の刺客』（63）等。ＴＶの代表作に『キイハンター』（68～73）、『Ｇメン'75』（75～82）。心霊や霊界に造詣が深く、著書のほとんどはその関連書だった。06年逝去。





『大霊界』



　『丹波哲郎の大霊界　死んだらどうなる』のこと。89年製作。原作・脚本・総監督・出演すべて丹波哲郎。事故死した男が霊人に導かれ転生するまでを描く。配収９億円を記録し続編『丹波哲郎の大霊界２　死んだらおどろいた!!』（90）、３作目『大霊界３』（94）まで作られた。





STORY



帽子を作って暮らす18歳のソフィーは、荒地の魔女の呪いで90歳の老婆の姿に変えられる。店にいられず飛び出したソフィーの前に現れたのは、美貌の魔法使いハウルが住む〝動く城〟。ソフィーは城の掃除係として住み込むことにするのだった。





キャスト：倍賞千恵子　木村拓哉　美輪明宏　原作：ダイアナ・ウィン・ジョーンズ　脚本・監督：宮崎駿　プロデューサー：鈴木敏夫　公開日：２００４年11月20日　上映時間：１１９分　興行収入：１９６億円　キャッチコピー：ふたりが暮らした。





シンプルだけど深い〝カチャカチャ〟



──『ハウルの動く城』も大ヒットしましたね。興行が１９６億円です。この数字はジブリの作品では『千と千尋の神隠し』に続いて２番目になります。原作はダイアナ・ウィン・ジョーンズで、脚本は宮崎さんです。

押井　『ハウル』はいい。ジブリの作品のなかで一番好き。ストーリーが明解じゃないとか、辻褄が合ってないとか、そういうことはいままでの宮さんの映画と何ら変わりはない。そういうことはいまさら言ってもしょうがないから。じゃあ『ハウル』の何を評価するのか？　ひと言で言うと、あのカチャカチャですよ。宮さんが歳を取ったという心境の変化を、カチャカチャがよく表していると思った。

──ハウルの城のドアに取り付けられたチャンネルみたいなものですね。扉の向こうが４つに分かれている。

押井　僕はあれに本当に感心した。カチャカチャするたびにドアが違う世界に通じて、黒いチャンネルは戦場で、炎がゴーゴー燃えていて、ハウルは化け物のような鳥になって飛びまくっている。そして、疲れ果てて城に帰って来るんだよ。そんなハウルを見てカルシファーが「戻れなくなるぞ」と言う。あれは何を表していると思う？

──宮崎さんの心が４つに分かれているということ？

押井　いや、その数は関係ない。女性には判りにくいかもしれないけど、男はすぐ判る。とりわけオヤジならすぐピンとくる。オヤジは無意識にあのカチャカチャをやっているから。つまり、意識的であろうが無意識であろうが、いくつかの人格を演じ分けているんだよ。会社で働いてきたオヤジが家に戻るとカチャっと変わる。どこかでお姉さんとよろしくやっているときもカチャっと変わる。息子や娘を相手にしているときも変わる。要するに人間って、いくつかの世界を別々に生きている生き物だということ。そのなかにはモンスターになってしまう暗黒面もある。モンスターになって戦場を飛び回っているダークサイドを必ず抱えて生きてるということなんだよ。

　オヤジの内面的世界の多重性を、たったあれだけで、説得力をもって表現されたのを映画で観たのはおそらく初めて。僕はとても気に入った。カチャカチャ回して一瞬で切り替わる。素晴らしいよ。

──絶賛ですね！

押井　うん。しかもかなりヤバいでしょ。ときどき間違えて、奥さんや子供の前で見せちゃいけない顔を出してしまう。それくらい、奥さんは察しているだろうけど、あんまり口には出さない。僕に言わせれば、男と暮らすということは、そういうこと。付き合っている時期には判らないけど、結婚して子供が生まれたりすると、オヤジがいろんな顔を使い分けているんだということに気づき始める。

　こういう表現が生まれたのも、宮さんがカチャカチャで苦労した人だからだと思うよ。

　いまは宮さんも上手くやっているだろうし、僕もやっている。映画監督なんてカチャカチャの天才じゃないとやっていけないしね。スタッフに対する顔、役者に対する顔、プロデューサーに対するときの顔、自分ひとりのときも家族といるときも。本当にいろいろ使い分けなきゃいけない。

──苦労しているということですね。

押井　そうそう。宮さんみたいな人は、ヘビー級のモンスターを抱えているんじゃない？　ハウルにとっては、ヒューマニズムも何もかも消し飛んで、一匹のモンスターになる時間。血みどろになるくらいに大変だけど、それでもやめられない。なぜなら、その時間がないと生きていけないから。

　もしかしたら元ネタはあったのかもしれないけど、あんなに上手に表現されてはいないと思う。宮さんのは本当にスペシャル。カチャカチャがよすぎたので、後は全部吹っ飛んじゃった。だって、例によって戦争は突然、終わっちゃうんだよ。

──だいいち、何の戦争だったのかよく判らなかった。というか、判らないことだらけでしたね。ソフィーの目的は、魔女にかけられた呪いを解くことのはずなのに、それもいつの間にか消し飛び、なぜかその魔女と一緒に暮らし始めるし。

押井　だから、理屈を言っても無駄なの。あれはまるごと宮さんの妄想の世界。因果律なんてないんだってば。あの世界自体、宮さんの妄想ですから。

──でも、原作がありますよ。

押井　たぶん、跡形もないんじゃない？　残っているのは設定くらいかも。だいたい、あのお城のデザインが凄い。魚雷発射管まで付いてんだよ？「何、この魚雷発射管？　どこを狙って撃つんだ」って。宮さんが好きなものが全部くっついている感じ。





宮さんと僕の〝家族論〟



──あのデザイン、大好きですよ。

押井　何でもくっつけているから、今度は〝家族〟までくっつけるようになった。

　これはトシちゃんの言っていたことなんだけどさ。当時、トシちゃんは僕の『イノセンス』のプロデューサーもやっていて、こんなことを言ったんだよ。「いやあ面白いなあ。図らずも宮さんとアンタが同じような映画を作ってる。要するに家族。家族の物語なんだ。片方は、魔法使いのばあさんだろうが孤児だろうが、誰でも家に引きずり込んで、みんな家族でどこが悪いという映画。アンタの家の場合は、イヌだろうが人形だろうがなんだっていい。人間かどうかさえも関係ない。新しい絆としての家族論として考えると、実に面白い」ってさ。

──鈴木さん、深いですね。

押井　そういう見方はできる男なんだよ。誰も思いつかない見方をするのがあいつの強みだとも言える。

　もちろん僕は無意識。家族の物語をやってるつもりなんてまったくなかった。無意識の天才の宮さんも当然そうだよ。でも、トシちゃんに言われると「そうなんだ」ってね。人間が他者とある種の共同性を作ろうとするとき、一番原初的なありようが家なんだよね。もちろん男女の関係はあるけど、それを社会的な関係のなかで落とし込む場となるとやはり家族という関係しかない。それは血縁である必要すらもはやないんじゃないか。そもそも赤の他人と家族を始めるわけだから、血縁とは呼ばないでしょ。夫婦は基本的に赤の他人同士だから血縁じゃないし、そこから出発して血縁になるわけでさ。寺山修司の『家出のすすめ』みたいな話じゃなくて、いったんバラバラになっちゃって、みんないろんな形で家族を模索している時期なんだということなのかもしれないよ。

　そうやって考えると『ハウル』の場合、彼らの住む家でさえも二足歩行で動いているわけじゃない？　これは何を意味しているかと言うと、家族のひとつの象徴でもある〝定住〟ということすらもう関係ないということ。家がもっている土着性ももはやどうでもいいんだよ。

　一方で『イノセンス』は、人間じゃなくたっていいわけなんだけど、それでも誰かと一緒にいないと人間としてやっていけないんだということになる。

　家族論として２本の作品を考えると、いろいろと判りやすくなることは間違いない。そう考えなかったら、どんどん判らない映画になっていくのが『ハウル』なんだからさ。





宮崎駿はデヴィッド・リンチだった!?



──その家族で言うと、ソフィーの家族も判りませんよね。どうもモテモテの華やかな妹がいるらしいくらい。

押井　『ハウル』のストーリーを事細かく思い出せる人なんていないよ。僕は珍しく２回観たんだけど、やっぱりストーリーは覚えられなかった。主人公のハウルだって突然出てくるし、ソフィーも帽子を縫っているところから始まるけど、何で帽子屋？

──原作が帽子屋なんです。

押井　でも、きっと宮さんのことだから、帽子を作っているシーンを描きたかったんじゃない？　宮さんは職人が好きだから、何か物作りをしているところを描きたかっただけだよ。

　いままでも自分が思いついたシチュエーションや妄想を、ある程度整合性を犠牲にしてまでも実現したいという傾向はあったんだけど、こと『ハウル』にいたってはほぼ完全に開き直ったかのごとく、妄想一直線になっちゃった。『ハウル』はそういう映画です。原作があろうがなかろうが関係ない。ハウルの師匠の話なんて、その典型だよね。

──加藤治子が声をやっていた、おばさん魔法使い、サリマンですね。

押井　流れ星のようにいろいろ飛んでくるのは、確かに美しい見事なシーンだったけど、あの話とどんな関係があるの？　宮さんの魔法のイメージがきっとあの美しさだから、やってみただけだって。

──それに限らず、あの師匠はわけが判らなかった。

押井　本当に何度も言うけど、宮さんの映画に整合性を求めちゃいけないんだって。妄想なんだから。リンチの『ツイン・ピークス』と同じだと考えればいいんだよ。

──リンチには整合性なんて求めていませんから。誰も筋の通った話を期待してない。

押井　じゃあなぜ、宮さんの映画でそれを期待するの？　リンチも宮さんもたいして変わらないよ。自分の妄想を映画化しているという点においては。

──「宮崎駿はデヴィッド・リンチだった」って、それは凄い説ですね。

押井　リンチと宮さんが決定的に違うのは、リンチは人間を不気味なものとして見ている。リンチのテーマは人間の不気味さしかないから。リンチ・ファンの僕が最近、やっと到達した結論がそれ。人間という不気味な存在。その人間がしでかす不気味な事件。それがテーマなんだよ。人間それ自体が不気味だから、善も悪も関係ない、天使も悪魔も関係ないというような作品になってしまう。だから唯一無二の映画になる。

　じゃあ、宮さんの場合はどうか？　宮さんは人間を、本当は善き者として見たいし、美しい世界を見たい。取り憑かれたように不気味な世界に没入するリンチとは決定的に違うんだよ。ただ、どちらも、自分の妄想を映画で実現したいタイプであることには変わりない。もうひとつ違うのは、リンチの場合は確信犯としてその不気味さを描いているけど、宮さんは無意識というところ。

──後半になってソフィーが、突然、若くなったり、おばさんになったり、おばあさんになったりするのも意味はない？

押井　ない。その場にふさわしい姿になっただけ。「ここはちょっと若いほうがいいかな」って感じで決めたんだと思うよ。それ以外に理由はないです、おそらく。だから、そこを深ヨミしても何も出てこないよ。

──リンチの映画は理解できなくてもいいと思うけど、宮崎さんの映画は理解したいと思っちゃうんですよね。

押井　それは、一見するとちゃんとした劇映画に見えるからです。

　それだけ妄想を爆発させといて、ケリはつけようとするじゃない？　つまり、最後の最後に開き直れない。そういう意味ではリンチよりも明らかに小心者です。

──でも押井さん、『ハウル』が一番好きなんですよね。

押井　うん。最後には開き直れなかったけど、それまではかなり清々しいよ。劇映画の体裁を取ろうと無理をしていないから。そういう意味ではわりと好意的。それにカチャカチャとか、師匠が星を降らせるシーンなんて、とてもきれい。さすがですよ。王宮の描写はこんなもんかと感心しなかったけど、王宮の階段をフウフウ言いながら上がるシーンは面白い。ホント、いいシーンはたくさんある。





ハウルは宮さん自身



──その階段のシーンに出てくるイヌのヒンって押井さんに似てませんでした？

押井　あれはさー（笑）公開当時、スタッフにもさんざん言われたけど、明らかに僕に対する悪意を感じるよね。だってヒンってダメイヌでしょ。性格も悪そうだし。

──だから押井さんなんですよ。「押井さん出たぁ！」って思っちゃいましたから。

押井　僕も自分の作品のなかでさんざんからかって来たからさ。『パト』に登場する上海亭のオヤジの名前を「崎宮駿」にしたりしてるし。高畑さんは「高畑警部」として登場させて、まあ、こっちは悪役だけど（笑）。言うまでもなく、鈴木敏夫は何度も出しているから。

　でも、そのイヌが僕だというなら、ハウルは宮さんだよね。主人公に自分を投影したのって『豚』以来じゃない？

──ちょっと待ってください。あのハンサムなハウルくんが、ですか？

押井　そうだよ。『紅の豚』『ハウルの動く城』、そして『風立ちぬ』かな。宮さんが主人公に自分を投影したのは。

──ハウルのどこが宮崎さんなの？　それショックを受けるファンがいそう。

押井　ああいう男でありたい。魔法使いだし、あの家族の主宰者。間違いなく自分を投影しているよ。

──「美しくないと生きていけない」なんて言うんですよ。

押井　そうそう、ブタから一転してそんなことを言っちゃってる。何せ声がキムタクだからね。宮さんって実は結構、かっこつけなんですよ。ただ、自分がかっこつけても似合わないのは判っているから地味にしているけどね。いつ頃だったか、司馬太郎の真似してた時期もあった。黒いコート着こんでさ。宮さん、司馬を尊敬しているから。僕は大嫌いですけど。

　僕がハウルでもっとも宮さんっぽいと思ったのは、怪物になって城に帰ってきてズルズルと２階に上がってゆくシーン。あれは宮さんの実感がこもっているよ。外で大暴れして、這うように自分の部屋に帰るわけだから。ソフィーに「またこんなにして！　仕方ないわね」って叱られるのも、奥さんにそう言われていたのかなーと思わせるじゃない？　やっと帰ってきたら、こんな怪物になっちゃってって。そういう意味では、本当に判りやすい人なの（笑）。

　宮さんを知っていれば、そういう面白さもある。でも、知らなくても、楽しいシーンは満載だし、美しいシチュエーションもたくさんある。ドラマがどうとか言う筋合いじゃない。だから、世間にそう言っちゃえばいいのにと思うんだけど、その世間は「（宮さんの映画は）ドラマが素晴らしい」と思いたいんだよね。





ダイアナ・ウィン・ジョーンズ



　英国のファンタジー作家。34年ロンドン生まれ。代表作に『ハウルの動く城』シリーズ、『大魔法使いクレストマンシー』シリーズ等がある。本作の原作はシリーズ１作目にあたる『魔法使いハウルと火の悪魔』。また、『七人の魔法使い』も英国のＴＶでミニシリーズ化されている。11年逝去。





寺山修司（てらやま しゅうじ）



　劇作家・歌人。演劇実験室〝天井桟敷〟主宰者。35年青森県生まれ。自身の代表作、評論集『書を捨てよ町へ出よう』の舞台台本、そして映画版の監督・脚本を務めた。自らの歌集『田園に死す』をもとに74年、同名の映画を監督した。83年逝去。





『家出のすすめ』



　寺山修司の青春論。若者に家族とは、家とは何かと問いかけ、自立を促してくれる。





加藤治子（かとう はるこ）



　俳優。22年東京生まれ。ＴＶの代表作に『七人の孫』（64）、『寺内貫太郎一家』（74～75）、『浅見光彦』シリーズ（94～09）等。映画の代表作に『私が棄てた女』（69）、『ときめきに死す』（84）等。宮崎作品は本作のほか『魔女宅』で老婦人の声を当てた。15年逝去。





リンチ



　デヴィッド・リンチのこと。映画監督・脚本家・プロデューサー等。46年米国生まれ。『イレイザーヘッド』（76）で長編デビュー。代表作に『エレファント・マン』（80）、『ブルーベルベット』（86）、『ワイルド・アット・ハート』（90）、『マルホランド・ドライブ』（01）等。ＴＶシリーズに一世を風靡した『ツイン・ピークス』（89〜91、17）がある。基本、現実と幻想が交錯する摩訶不思議な作品。明快な物語がないぶん、中毒性があると言われる。





上海亭のオヤジ



　ＴＶアニメ版『パト』第29話『特車二課壊滅す！』に登場する中華料理店・上海亭の店主、崎宮駿のこと。ノライヌに食べさせた皿を洗わずに使ったため、特車二課の隊員が食中毒になるという物語。脚本は押井。シリーズのなかでも傑作と呼ばれるエピソード。ちなみに、その店主は宮崎監督によく似ている。





高畑警部



　ＴＶアニメ版『パト』第９話『上陸 赤いレイバー』に登場する公安外事一課の男の名前が「高畑」。尊大な態度で特車二課の連中に接する。





キムタク



　元ＳＭＡＰ木村拓哉（きむら たくや）のこと。この起用について鈴木の言葉によると、ジャニーズのほうからジブリに、木村さんが何らかのかたちでやってみたいらしいという話があって実現したとコメントしている。また、アフレコの本番のとき、彼の第一声を聴いて宮崎さんがガッツポーズのような仕草をしたので安心した、とも言っているが……。





司馬太郎（しば りょうたろう）



　小説家・ノンフィクション作家・評論家。23年大阪府生まれ。代表作に『梟の城』『竜馬がゆく』『国盗り物語』『翔ぶが如く』等。





STORY



家出をして海岸へやってきたさかなの女の子ポニョは、頭を空き瓶に突っ込んで困っていたところを、５歳の少年・宗介に助けてもらう。宗介に出会ったことをきっかけに人間になりたいと願うポニョだが、その強い思いが、世界を巻き込んでいく。





キャスト：山口智子　長嶋一茂　天海祐希　所ジョージ　原作・脚本・監督：宮崎駿　プロデューサー：鈴木敏夫　公開日：２００８年７月19日　上映時間：約１０１分　興行収入：１５５億円　キャッチコピー：生まれてきてよかった。





水の表現は天下一品





──『崖の上のポニョ』も宮崎さんのオリジナル脚本です。押井さんは、宮崎さんの水の表現は天下一品だとおっしゃってましたね。

押井　あまり語られたことはないけど、天下一品です。『もののけ姫』のシシ神が水の上を歩くシーンなんて他の人には無理ですから。だから、これも徹底的に水を表現してみたかったんじゃないかな。だから冒頭の水のなかのシーン、そして中盤に登場する、水没した町を古代魚が優雅に泳いでいるシーンとか、もう宮さんの独壇場。あれは本当に素晴らしい。技術的にもスゴいけど、ああいう情景を作り出す才能はさすがですよ。宮さんのイマジネーションが弾けまくって、まさに〝ハヤオ・オン・ステージ〟。

　それに、前作の『ハウル』はデジタルを使ったから、それにかなりウンザリした。次の『ポニョ』は動画の魅力をみんなに見せつけたいという気持ちが強かったんだと思う。つまり〝ハヤオ・ストライクス・バック！〟。〝宮崎駿の逆襲〟ですよ。

──何だか、鈴木さんと宮崎さんが果てしなき闘争を続けている感じですね。

押井　まさにそうです。面白いことに、興行成績や動員が増せば増すほど、相対的に鈴木敏夫の発言力が低下し、宮崎さんの発言力が強化された。トシちゃんの宣伝が成功すればするほど自分の発言力が低下していったんだから皮肉というか面白いというか。本人はきっと「もともと裏方だ」とか「オレはプロデューサーだから（仕方ない）」とか言うんだろうけど。相当、いじけてたんじゃない？

──宮崎さんは喜んでいたのかしら？

押井　そりゃそうでしょう。『ポニョ』みたいな映画を作れるんだから、嬉しいに決まってますよ。いつもストーリーがムチャクチャだけど、今回はよりメチャクチャ。それは宮さんがどんだけバクハツしていたかを物語っている。

──波に乗って宗介を追いかけるポニョの姿がクルクル変わるじゃないですか。あれってポニョの変化を描きたかっただけ？

押井　それ以外に理由はないでしょう。

──じゃあ、『ハウル』のときに、ソフィーの見た目がコロコロ変わるのと同じ？

押井　それはちょっと違う。『ハウル』のときは説話行為。物語を語るときのテクニックのひとつだけど、『ポニョ』の場合はメタモルフォーゼ。表現の問題で物語は関係ない。その辺の表現は独走しているというか、もう暴走に近い。話が極端に破綻しているひとつの理由はここにあって、『ポニョ』の表現力の暴走に、物語がまったく追いついていってないの。今回のラストなんて辻褄合わせにすらなっていない。ポニョのお母さんと宗介のお母さんがヒソヒソ話をしている姿を見せるだけで、何を話したかも聞かせない。で、じゃああんたたちあとで結婚しなさいって、もうムチャクチャ。辻褄合わせを放棄し、物語も放棄している。

──でも、いつも放棄してますよね。

押井　まあ、そうなんだけど、これまでは辻褄だけは合わせようという努力のあとは見られた。今回はそれすらないからね。

　子供たちの母親まで暴走していて、宗介の母親、とんでもないでしょ。わざわざ海際の危険な道路をアクセルをベタ踏みで疾走するんだよ。表現力が暴走しているというか、ああいう表現をやりたかったんだよね。波との追いかけっこ。

──私は宗介が母親のことを「お母さん」とか「ママ」とは呼ばずに、「リサ」と名前で呼んでいたので驚いたんですけど。彼は５歳児なので、（クレヨン）しんちゃんと同じようにしたのかなって。

押井　あれはたぶん、宮さんのなかでの新しい家族のイメージだよ。ジジイになったせいかもしれない。

──というと？

押井　ジジイって孫とかに「おじいちゃん」と呼ばれるのもいいけど、呼び捨てにされるのもまた嬉しいんだよね。

──押井さんも「マモル」って孫に呼ばれたい？

押井　僕の場合は「東京のジイジ」なんだけどさ（笑）。

　いや、それはさておき、宮さんの抱いている家族のイメージが『トトロ』のときと比べると変化していることの表れなんじゃない？　父親がいつも海の上にいて、息子とはモールス信号で会話しているという設定は、父親とは宮さんのことで、家族とは離れていてもちゃんとコミュニケーションはとっていますよと言い訳をしているだけです。最後はお母さん同士の話し合いで決まるというのも、宮さんが口を出せないということを表現している。





妄想全開映画でも大ヒット！



──あと驚いたのは、突然「月が落ちてくる」と言い出すでしょ。あれは何なんだろうって。

押井　もちろん、単なる思いつきです。一応、トシちゃんもある時期まで、宮さんの暴走を抑えようとしていたと思うけど、『ハウル』の頃からすっかりあきらめた。そもそも、妄想全開映画にしても数字は落ちないんだから、トシちゃんも匙を投げるしかないんだよ。で、宮さんも「何をやってもいい」と思ってしまった。

　実は世間は宮さんに、壮大なテーマとか、この世の中をどうしようなんてこと、求めてなかったということでもある。あるファンが「ジブリの映画を観ている間だけは自分が許せるんだ。とってもいい人間になったような気がするから。でも翌日から、またロリコンのアイテムを集めまくるのは判りきっている。自己嫌悪に陥ってしまうよ」というようなことを書いていて、これは面白いと思った。確かにその通りかもしれないって。

　不思議なことに、ジブリの作品を観ている間は、自分がいい人間だと思えるんだよ。こんなすてきな映画に感動する自分はいい人だって。みんな感動したがるし、感動したいから映画館に行くわけでしょ？　特に若い観客というのは絶えず感動を求めているから。感動している間だけは生きていることに希望が持てるからですよ。ジブリの人気は、こういう人たちも支えていたんだよね。

　で、僕の場合は、これっぽっちも感動したくないわけ。歳を取ると、むしろ感情に波風立てたくないからね。疲れるのがイヤなんだよ。若い人は逆だから。

──宮崎さんもみんなを感動させたいと思ってる？

押井　それこそが宮さんの本当の大テーマです。感動させるというか、生きる喜びみたいなものだよね。現実がクソなんだから、みんなに夢をもたせたい。「せめて映画のなかだけでも素晴らしいものを見せたい。それがオレの仕事だ」って。

　ところが、ときどき暗黒面をちらつかせるわけだ。『ハウル』のカチャカチャとか『ナウシカ』の暴力、『トトロ』だって子供たちを喜ばせるためなら、最初からトトロを出せばいいのに、そうはしてないでしょ？　しかも、いろいろ言いたいことがあって、いざ映画を作り始めると〝作家〟になってしまう。それはおそらく、作家という存在にリスペクトもあるからだろうけど、実のところ、そういう作家の資質には全然向いていないんだよ。

　でも、その一方で、綺麗なものを手品みたいに瞬間的に見せる、その才能はあふれかえっている。あの人の妄想は確かに人を揺り動かす力があるんだよ。だけど、１本の映画に構造を作り出すとか、世界観を作り出すとか、物語を作り出すとか、そういう才能はない。それは相反するものだから。フェティッシュが強すぎたり、妄想癖が激しすぎる人は、一貫性というものには向かないんです。

　監督というのは、「あえてこれはやらない」ということが重要なんだよ。僕は監督って、基本的に引き算の存在だと思っているから。頭のなかはやりたいことでパンパンになっているけど、これとこれは捨てるという決断をしなければいけない。そこで初めて構造が生まれると言ってもいいくらい。構造の何がいいかと言うと、それによって確固とした普遍性を獲得できるから。これこそが、僕がいつも言っている、10年経っても20年経っても存在し続けられる映画の絶対条件。強固な構造をもつことですよ。

──宮崎さんの作品は、そういう構造はないのに普遍的な力はありますね。

押井　ディテールの魔術です。ジブリの映画が好きな人はもれなくそう。「あのシーンがよかった」「あのキャラクターがいい」で、ストーリーはほぼ、覚えてないはずですから。僕も妄想人間だから判るんだよ。妄想をいかに現実に着地させるか、そのために延々と努力してきたんだから。

──宮崎さんは妄想のまま着地させちゃってるわけですね。

押井　だから、最初はちゃんと着地させようと努力していたけど『千尋』のあたりからあきらめちゃった。ジブリの場合、スタジオを維持するためには絶対に失敗は許されないわけじゃない？　一度の失敗も許されないって荷が重過ぎるよ。だから、もうどうでもいいやという気分になったけれど、それでも大ヒットし続けたんだから、これはもう奇跡ですよ。そういう意味では本当に大したもの。もちろん、それができたのは、トシちゃんという相方がいたからなんだけどさ。





しんちゃん



　『クレヨンしんちゃん』の主人公・野原しんのすけのこと。90年に『漫画アクション』で連載が始まった臼井儀人の漫画の主人公。92年にＴＶアニメ化され現在も続いている。マイペースな５歳児で、ＴＶシリーズが始まった当初は母親を「みさえ」と名前で呼び捨てにしていたが、視聴者からクレームがつき「かあちゃん」と呼ぶようになったといわれている。





STORY



大正時代、少年・堀越二郎は、飛行機の設計者になる夢を抱いていた。時は経ち、軍需産業のエリート技師となった二郎は、飛行機設計の才能を開花させる。そんなある日、二郎は関東大震災の折に助けた少女・菜穂子と再会し、恋に落ちる。





キャスト：庵野秀明　瀧本美織　西島秀俊　西村まさ彦　スティーブン・アルパート　原作・脚本・監督：宮崎駿　プロデューサー：鈴木敏夫　公開日：２０１３年７月20日　上映時間：約１２６分　興行収入：１２０億円　キャッチコピー：生きねば。





宮さんが自分のリビドーに忠実に作った映画



──ジブリで最後の宮崎作品になるのが『風立ちぬ』です。何とこれも大ヒット。興行収入１２０億円って凄いですよ。

押井　その数字は、ジブリのブランド力以外、考えられないけどね。だって宮さん、子供たちのことなんて、何も考えずに作っているから。

──この原作は宮崎さん自身が『モデルグラフィックス』に連載していた漫画で、それは子供向けじゃないんですか？

押井　堀越二郎という実在の人物を扱っているから、子供向けの冒険ものではないよ。ただ、原作の主人公は『紅の豚』と同じくブタなんだよね。だから映画でもブタ、女の子だけが人間だと思っていたら主人公も人間だった。堀越二郎の関係者に確認をとる作業が必要となり、ブタというわけにもいかなかったんじゃないかな。

──堀越二郎というのはゼロ戦の設計者ですよね。

押井　でも、この映画の堀越二郎は僕の知っている堀越二郎とはまったく違います。ひとつ例をあげると、国家機密である戦闘機の設計中に、恋人が病気だからと言って仕事をほっぽり出して駆けつけるなんてことをやるはずがないし、できるはずもない。だからこの映画は、たとえ実在の人物を扱っていようが、宮さんのファンタジー。それを理解しなきゃ始まらない。

──確かに、主人公の夢のシーンもとても多かった。

押井　その夢と現実の境界線があやふやなところは、とても老人的だと思ったんだよ。老人になると夢と現実の区別がつかなくなってくるし、もっと言えば区別をつける必要もなくなるから。黒澤明なんて、そのものズバリの『夢』を撮ってるじゃない？　僕は若いときから夢の話ばかりだったけどさ。

　まあ、老人はそういうもので、どんどん外界に対する興味が薄れ、何をはばかることもなくなって、自分のリビドーに忠実になる。宮さんが、そういう立ち位置で作ったのがこの映画。だから今回は、老人になった宮さんがむき出しになっている。青春の衣をまとっているだけで、宮さんもついにパンツを下ろしたなって。これは大いに意味があることだよ。見せているのはまだ、オシリだけだけどさ（笑）。

──ということは、言い方を換えると、もう開き直っちゃった？

押井　うん、開き直りまくっている。まず子供のために作ってない。オトナの観客のためですらない。じゃあ誰のためって、自分のためですよ。自分のためだけに作っている。だから、オトナ・ジブリじゃなくてオレ・ジブリが正しい。多くの人がジブリ、宮崎駿作品というので子供と一緒に観にいったと思うけど、新婚初夜のシーンなんてどうしたんだろうと思うよね。キスだってしまくっているし。親は困ったんじゃない、きっと。

──その辺のオトナな描写は意外と大胆でしたね。

押井　宮さんの好きなオトナの女性は薄幸な深窓の令嬢タイプ。つまりこのヒロインの菜穂子だよ。言うまでもなく、少女の場合は利発でハキハキしたタイプが好みですから。

　菜穂子は結核を患っているという設定で、おそらくこれも宮さんの趣味。『トトロ』のお母さんも療養所にいたでしょ？　この映画で軽井沢のシーンに出てくるドイツ人の男はトーマス・マンの『魔の山』の主人公で、その宮さんの愛読書の舞台もサナトリウム。ここでもまた、宮さんの結核フェチが炸裂しています。

──結核フェチか……そんなフェチ・ジャンルはないと思ってましたけどね。

押井　そこに漂う薄幸なイメージ、ひ弱なイメージが宮さん的にはいいんだよ、きっと。菜穂子は最後に死んじゃってる感じでしょ？　だからこそ成立したストーリーで、そのまま生きて子供をふたりも産んだら宮さんのファンタジーにはならないから。でも、臆面もなく趣味を出したことで、この作品には久しぶりに官能を感じた。

──官能？　感じませんでしたけど。

押井　ちゃんと見てる？　匂い立つばかりだよ。しかもその官能が飛行機じゃなく女性に向けられているのがポイントで、僕もそれには驚いたけどね。筋金入りのヒコーキ少年も最後には女性を選ぶのかって。これまでの宮さんの官能は（『ナウシカ』の）王蟲とか（『ラピュタ』の）ロボット兵だとか、ナウシカが重機関銃をぶっ放す姿だとかに対してだったのに。飛行機に対するフェティッシュが少ないのは、それが女性に向けられているからだよ。麻紀さんは飛行機に向けられているほうがよかったんだよね？





傍系に愛を注ぐ。それが宮崎流



──そうなんです。とはいえ、ユンカースの描写にフェチは感じましたよ。ゼロ戦はあっさりしてて驚きでしたけど。

押井　僕も驚いた。確かにゼロ戦は思いっきり淡泊だった。でも、宮さんはゼロ戦よりユンカースのほうが好きだから、その描写に力が入っているのは当然ではある。ドイツ機なら普通、メッサーシュミットなのにユンカースなのは、宮さんが大好きだから。もちろん、堀越二郎が実際にドイツに行って見ているという事実もあるだろうけど、やっぱり宮さんの場合、好きであることが重要。ユンカースはドイツ空軍の主力にならなかった飛行機で、宮さんはそういう人物、そういう飛行機に愛着があるんだよ。

　二郎の夢のシーンに何度も登場するカプローニもそう。相変わらず構成がないので、彼が登場しないと映画として成立しないということもあるけれど、カプローニも宮さんが大好きな人だよね。イタリアの貴族で、飛行機作りのパトロン的存在だったものの、彼が資金を出した飛行機の多くは実用向きじゃなかった。イタリアに名機なんてないですから。戦車なんて最低の代名詞みたいなもんだからね（笑）。いいのはデザインだけ。

──宮崎さんのデザインするメカ類はかっこいいけど、実用性はなさそうですもんね。

押井　というか、そもそも実用性に興味がない。飛行機だってレシプロ機以外は興味ないって言ったけど、戦艦もドレッドノート以降は興味ナシだから。戦車もタイガーぐらいで、それ以降の近代戦車には興味ないんじゃない？

──ご本人が乗ってらっしゃった車も２ＣＶでしたよね？

押井　そう、けったいな車ばかり。シトロエンの２ＣＶのあとには奇妙な三輪車、トライキング・スリーホイラーに乗ってたからね。後輪が一輪しかないので横転しやすいし、実用性からはかけはなれている。手のかかる車ほどかわいいんだよ。僕なんて、２ＣＶで北海道まで行きましたからね。ホント、もう二度と乗りたくない。

──で、話が脱線しちゃいましたが、その宮崎さんのマイナー趣味です。

押井　マイナーというんじゃなく、宮さんは傍系が好きなんだよ。宮さん自身、自分が傍系という自負があるんじゃないかな。

──傍系どころかバリバリの主流ですけど。

押井　だから、これまでも何度も言っているように、そういうたくさんの矛盾を抱えているのが宮さんなの。

　それに、この映画ではその矛盾がひとつのテーマになっている。飛行機を作るのが夢なのに、それは戦争の道具であるという矛盾。仕事に本腰を入れたい、だから結婚するという矛盾。飛行機の設計中は信じられないくらいに忙しいはずで、家に帰る時間さえないくらい。にもかかわらず結婚する矛盾。

　堀越二郎が抱えるそんな矛盾は、そのまま宮さんに当てはまる。宮さん自身、矛盾のカタマリ。もう何度も言っているけど（笑）。その傍系好きもそうだし、良識人っぽくふるまっていても、ドイツ軍の兵器が大好きで女性も大好き。あとは職人も大好きだよね。ある時点から、本人もエプロンをつけて登場するようになったじゃない？　あれは職人のつもりらしく、自分でかなり気に入ってたみたいだよ。でも、僕から見たら（『悪魔のいけにえ』の）レザーフェイスだからね（笑）。

　ということはさておき、ここではそうやって自分をさらけ出してるんだよ。





ナチュラル・ボーン・アニメーター



──レザーフェイスですか……。あとウケたのは二郎の新婚生活。結核の新妻が床に伏せっている側で煙草を吸いまくり、夜中に電気をつけて仕事をする。自己チュー度マックスですよね。

押井　それでも文句を言わない女性、手をつないでいるだけで幸せを感じてくれる女性。つまり宮さんの憧れであり理想なんだって。二郎が吸っている煙草だって「ＣＨＥＲＲＹ」だよ。宮さんの好きだった銘柄だからね。もう何年も会ってないけど、いまだってスパスパなんじゃない？　そういうふうに、煙草についてだけでも、この二郎が宮さんだってことが判る。

──彼女が死んだあと、夢のなかのカプローニとお酒飲もうって。

押井　それは、宮さんが老人だから。老人ならそれしかない。愛も失った、心血を注いだ飛行機も一機も生還しなかった。彼は、人生でなにか成し遂げるなどということはないだろうと判ってしまい、だからこそ酒を飲むわけだ。僕は正直でいいと思ったよ。

──キーワードは〝リビドー〟と〝老人〟ですね。ところで、二郎の声を当てた庵野秀明さんはどうでした？

押井　いいわけないじゃん。宮さんは少なくとも、自分がどんな映画を作ったかは知っていて、トシちゃんには宣伝しなくていい、必要ないと言っていた。だから最近つるんでいる庵野を入れた。これが僕の推理。当たってると思うよ。

　でも、この作品は庵野の『エヴァンゲリオン』の延長線上にあると思う。なぜなら、いつものジブリの王道から一歩踏み出している。あるひとつの価値観のなかに踏み出しているから。そういう意味では、最近のジブリ映画のなかでは抜きん出てるよ。この作品は誰にも真似できない。70歳まで生きた人間にしか作れない作品になっているし、老アニメーターの迫力は伝わってきた。

──その「老アニメーターの迫力」というのは？

押井　久しぶりにちゃんと作画しているアニメーションを観たという感じがしたからね。宮さん個人の生理と願望がはた迷惑になっていないのは、宮さんがアニメーターとして天才だからなの。それはもう彼の本能みたいなもので、とことん狡猾にやっちゃうわけだ。つまり、やっぱり宮さんはナチュラル・ボーン・アニメーターであるということ。凄い人物であることは認めざるを得ないんです。
