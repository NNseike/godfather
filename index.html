第三部



綾波レイとは何か？（大泉実成）





　九五年九月。オウム・杉並道場。上祐史浩説法会。

「私はいま、アニメを研究しています。オウムは、いわば１『ニュータイプ』なんです。アニメを見ている子供達は、無意識のうちに自分の未来の姿を選択し、予知しているんですよ。将来、多くの人々が超能力を持つことになるでしょう。ハルマゲドンは、来ます」

　上祐史浩はこう言った。

　そして九五年一〇月四日、アニメ『新世紀エヴァンゲリオン』は始まった。それはハルマゲドンの物語だった。

　以下のインタビューを読んでもらえばよくわかるのだが、経過は次の通りである。まず茨城県日立市で一歳児の育児をしながら延々とアニメのビデオ・チェックをやっていた僕（大泉）のかみさんが『エヴァ』にはまり、次に東京までフィルムブックを買いにやらされた僕がはまり（この時、雑誌２『クイック・ジャパン』編集長赤田君に「フィルムブックを買うようになったらもうオシマイですよ」と言われる）、九六年三月二七日放映終了後、評判を知ってビデオで全編を見た竹熊さんがはまった。

　それからの竹熊さんは凄かった。『エヴァ』の特集をやるべきだと言って赤田君を口説きに口説き（僕もやったが）ほぼ丸一日かけて、竹熊家において『エヴァ』を作った「ガイナックス」そして庵あん野の秀ひで明あきがどのような歴史をたどってきたか、大学生時代のアニメから『エヴァ』に至るまでの大上映会をやり、アニメ業界にうとい僕にその歴史を認識させ、赤田君に『エヴァ』特集を納得させた。

　同時に竹熊さんは、プライヴェートで庵野氏と接触、このインタビューを受けてもらうための下地を作ってくれた。

　僕はノンフィクションの業界にいて、九五年は丸一年をほぼオウム取材（特に信者インタビューと体験修行）で潰つぶしつつ、『クイック・ジャパン』で「消えたマンガ家」を連載するという、アニメ業界とは縁もゆかりもない人間だった。一方庵野氏は、完全にアニメ業界で生きてきた人だった。『エヴァ』にはまったという以外、まったく接点のない二人の間に立って、竹熊さんは実に見事に翻訳者の役割を果たしてくれ、インタビュアーとしても無類の能力を発揮してくれた。記して感謝の意を表したい。そして何より、このようなロングインタビューを受け、腹の底までさらけ出してくれた庵野秀明氏に、心より厚く御礼申し上げたい。





オウム真理教と『エヴァ』





大泉　僕自身は去年の一月くらいから、オウムの取材をずっとやっていまして、彼らがどんな集団だかわからなかったので、最終的には入会して、どういう人たちが麻原彰晃の磁力に引っぱられてきたのかを、ずっと取材して本にしてきたんです。去年『エヴァンゲリオン』が始まって見た時に、『エウァンゲリオン・テス・バシレイアス』っていうまったく同じものがオウムのロシアのラジオ番組にあったもんですから、こんな番組が始まっちゃっていいのかってびっくりしたことがあるんですよ。

庵野　同時多発でしたね。全然、僕は知らなかったです。

大泉　それでとても強烈な印象があって、それから、もう一つ、オープニングには３カバラのデザインの絵があって、麻原もいろんな宗教に飛び込んだ人ですけれど、４カバラには入っていなかったんで（笑）。それでちょっと安心しました。

竹熊　でも後期オウムは、キリスト教までパクってたから、けっこう、危なかったですね。

大泉　カバラはユダヤ教密教だから、その辺が５ギリギリの線でした。『エヴァンゲリオン』を初めて見た時、６カバラの思想がベースになるんだなって思いました。

庵野　大いなる勘違いですけれどね（笑）。

大泉　かみさんがいま子育てをしてるんですが、高校の時にアニメ同好会にいたことがあって、当時、ソ連の実験アニメとか見てて、アニメっていうのはセルだけじゃないんだって、上映会やって宣伝していた。

庵野　ノルシュテインとか。

竹熊　切り紙アニメね。

大泉　その後、コンピュータのインストラクターをやっていて、「こんなに面白いアニメは十何年ぶり」だって言ってて、とりあえずフィルムブックを買ってくるように言われた（笑）。かみさんが子育てをしてるのは茨城県の日立市ってところなんで、僕は茨城と東京を行ったり来たりの生活をしてまして、茨城で手に入りにくい場合は東京に行って買ってきた。それで、僕もこんな話なのかって見るようになってきたという流れがある。毎回、テンションが高いんで、どうなるか自分なりに推理とかしながら見ていた。

竹熊　大泉さん自身も、はまったわけですね。

大泉　かみさんに初めてフィルムブックを買って来いって言われてもよくわからなかったんですよね。それでフィルムブックを読んでこういう話かってわかってから、マンガを読んで、それで、〝ヤシマ作戦〟の後くらいかな、かみさんがビデオを撮っていたので、見出してからどんどんはまっていった。そういう流れですね。

　７最終話ではかみさんは完全に〝ちゃぶ台ひっくり返し状態〟になってまして（笑）……。

庵野　適切な反応ではないでしょうか。

大泉　僕はびっくりしたのと、こういうのもあるのかなっていう両方の感情を持ちましたね。で、竹熊さんはどんなふうにはまったんですか？

竹熊　僕は実を言うと放送当時は見てなかったんですよ。ここ数年はもうニュース以外はあんまり見ない生活になっちゃってて、見てなかったんだけど、今年の四月に、元ガイナックス社長の８岡田斗司夫さんが主催したイベントに出演させられて、なんか知らないけれど、『エヴァ』の最終回をめぐっての糾きゆう弾だん大会みたいになったんですよ。ちょうど放送が終了した頃で。僕はまだ見てなかったんで、さっぱりわかんなかったんです。で、適当に話を合わせて、作者がオチを放り投げるのはマンガの世界にもよくある話だなってことを言ってて、それでね、ちょっと気になったんで、友達のマンガ家からビデオを全部もらいまして、もちろんＬＤも買ってますけどね（笑）、それで、いざ見てみたら、やっぱり面白かったですね。

　ちょうど、僕と庵野さんは同い齢としぐらいだと思うんですけれど、僕らの世代は育ってきた過程で、いろんなアニメやマンガを見ましたよね。七〇年前後の一番テンションが高い時期っていうか。特に僕が思い出したのは９『デビルマン』や１０『バイオレンス・ジャック』を描いた頃の１１永井豪なんですけれど、それからジョージ秋山かな。あの辺にすごく熱中した記憶が蘇よみがえってくるような感じがあって、この作品を作っている人は、すごく僕と似た精神形成過程を経てきたんじゃないかって思ってました。もちろん庵野さんの名前は知っていたし、１２『トップをねらえ！』とか面白く見てましたけど。俺らの時の最良のマンガにはまったようなテンションを感じた。で、問題の『エヴァ』最終回に関して言えば、『サルまん』（『サルでも描けるまんが教室』、小学館刊）をやってましたんで……。

庵野　毎週楽しみにしておりました。

竹熊　だからあの最終話で、僕は手をたたいて喜びましたね。『サルまん』でできなかった一線を踏み越えたって感じがしてね。『サルまん』は、あくまでパロディの部分で作っていたわけですよね。庵野さんの作品を見て思うのはオマージュの人だなってことです。パロディと、ちょっと違いますよね。

庵野　言葉の使い方の違いだと思うんですよね。

竹熊　パロディは批判的な視点も入ってくるんだけど、オマージュっていうとある種、信仰的なところがあるじゃないですか。愛情告白ですよね。そのテンションがすごく高くて、これは僕にはない部分です。ついていけない部分もある反面、憧れもある。僕における『エヴァンゲリオン』の魅力っていうのは、シリーズ後半になるに従って庵野さんのテンションが狂気スレスレまで高まって、一体この作品はこれからどうなるんだろうという、手に汗握る雰囲気がもうたまらなかったというか（笑）。しかもあれはパロディとかお笑いじゃない形でやってるわけじゃないですか？　だから、正直言ってまいったなって思いました。でも、これは視聴者やスポンサーの顰ひん蹙しゆく買うに違いないって気もした（笑）。後先考えるとなかなかできないことだけど、僕は感嘆しましたね。もちろん、中で言われているテーマには一〇〇パーセント同意するわけではありませんが、周囲の非難を恐れず思い切って飛び降りちゃうってことは、僕なんか度胸がなくってできないから。





アニメファンが嫌になった





大泉　インタビューを拝見したんですけれど、この酔っ払って受けているインタビューはすごいですね（笑）。『アニメージュ』九六年七月号の１３宮村優子さんとのインタビューですね。

庵野　あれはあとで足したんですよ。元のままだとつまらないから酔っ払ってるって。そこまでは飲んでません。

大泉　すごく面白いと思ったのは、アニメファンを途中で嫌になったっていうところですね。それはどういう経緯でそうなったんですか？　ちょうど僕もオウム信者と一緒にいて始めは面白かったんだけど、だんだんと嫌になってきたこともあって（笑）。

庵野　嫌になる過程ですか？　なんて言うんですかね、これはアニメファンばかりでなく、テレビを見ている人全員に言えると思うんですけれど、テレビに対する依存が高すぎると思うんですよ。もう、魔法の箱でしょう。どんな情報でも快楽でも与えてくれる。ないのはエロ番組くらいですけれど、それだってレンタルビデオ店に行けば茶の間で見られるわけじゃないですか。

『エヴァンゲリオン』はサービス過剰なんです。ただで見せるものにしては凝り過ぎですから。ウチがもらってる予算で作るにしては、高価すぎる。経済的にも精神的にもそうですね。比較論で言えば、いま流れている他のアニメに比べてもサービスは過剰です、クオリティやテンションの高さの部分は。こういう業界は基本的にサービス業だと思いますからね。快感原則に則のっとったら皆こっちの方を選ぶ。快楽を多く含んでいるので。『エヴァンゲリオン』は快感原則に則ってやっている。ありとあらゆる人が見た時に、自分の鏡となって返ってくるような作りになっている。情報量がやたらと多いし、見た人の投射がそのまま返るようになってますからね。各個人によって感じる面白さも違う。そういう作りにして、どんどん人がはまってくれれば嬉しいんですけれど、はまり過ぎるのが嫌になってきたんですね。

　なんかもう、テレビって原則的にタダじゃないですか？　お茶の間でスイッチ入れて、チャンネルを変えれば、なんでも快楽的な映像が流れてくる。それに対して一方的な文句も言えるわけじゃないですか。それは、でも、ただの依存でしかないと思うんですよ。

大泉　視聴者に制作者は見えないから、逆に攻撃する時は無制限な攻撃力みたいなものを……。

庵野　それはそれでいいんですけれど、なんか自分は何も変わらずに、どんどんそこにだけ頼り切ってくるところが、とことん嫌になってしまったというのが一つなんですけれど。

大泉　例えば、それは手紙がきたりとかで感じたことですか。

庵野　それもあります。パソコン通信にアップされたファンの感想は、もう途中で読まなくなりました。最初は期待していたんですけれど、もう、大半がゴミなんですよ。感覚的なものなんですけれどね。この中から良いものを見つけるのにすごい苦労がいる。読んでいる時間がないんでやめたんです。もっと、作品を作る上で参考になるかと思ったんですけれど、少しレベルが低すぎましたね。

竹熊　でも、それは庵野さんの期待過剰ってこともあったんじゃないですか。

庵野　まあ、そういう意味ではそうかもしれないけれど、もうちょっとアニメファンって賢かしこいかと思ってたんです。そういう意味で僕はアニメファンにちょっと失望しています。

大泉　要するに、ファンに自分が、しがみつかれているって感じですか。

庵野　そうですね。教祖にされるのはイヤだってことです。このままだとこの番組はドグマ（編註・〝独断的な説〟の意）になってしまう。僕が出してるセリフのアイロニーもまったく理解してもらえなかった。そのまま理解しちゃっているんですね。コンニャク問答にはまっていって、僕がそう思ってないところまで深読みして、こうに違いないとか断定している人がいる。そうじゃないのにって僕は思ってるんですがね（笑）。どんどん作品が一人歩きしていて、その感じが嫌だったんですね。一人歩きは、まあいいですけれど、でもそれが大きくなり過ぎて、もう僕の責任の範はん疇ちゅうを越えていくような感じだった。

大泉　自分の欲望を番組に投射していくわけですよね。

庵野　どんどん欲望だけが膨らんでいく。快感原則に則っていればしようがないのかもしれないけれど、最後は自分でもうテーブルをひっくりかえしてしまった感じ（笑）。自分自身も含めて嫌になったんですね。





テレビ依存





大泉　『アニメージュ』のインタビューの中に、小さい頃から（テレビに）依存してきたし、自分自身に何もないんだよ、みたいな発言もありますね。

庵野　テレビ万能時代に生きたものの宿命ですね。もっと認識すべきだと思うんですよ、僕らには何もないっていうことを。世代的にスッポリ抜けている。テレビしか僕らにはないんですよ。学校に行ってまず昨日見た番組の話をする。１４『仮面ライダー』の怪人とか、『ウルトラマン』の怪獣の話にドリフのギャグ。『８時だよ！　全員集合』を見ない人は、そのグループに入れなかった。テレビ番組が僕らの社交場であったし、テレビ以外ではマンガですね。『ジャンプ』の１５『ど根性ガエル』とかがその週の話題になる。学校で当時、マンガの回し読みはできなかったですから、友達の家に行って読むとかね。共通言語となる媒体がテレビやマンガしかなかった。

　僕らの前の世代には、戦争というかなり大きく組み上げられたイベントがありますからね。生き死にまで賭けた相当ハードなイベントじゃないですか。これに参加したら、精神的な影響ってものすごく大きいと思うんですよ。国が一つにまとまって何かをやった時代だし、一体感がある。焼け野原から日本を立て直さないといけないって戦後派の人がそれからすごく頑張りましたよね。高度成長期に入って、今度はおかみに逆らう不ふ貞ていの輩やからが増えてきた。六〇年安保、七〇年安保と、いまあるものにとにかく反対を唱える思想的な運動が出てくる。それがおかみに敗北して、四畳半に閉じこもってフォークソングを歌う。いまでも中間管理職とか闇がどうしたとか言ってる人がいる。それからアングラの劇団とかに行く人。分散して引きこもってネガティブな作業を延々と続ける人達になるわけですよ。

　それでも、大きなイベントがあった時代なわけですが、僕らはそれを見て、なんて馬鹿らしいんだろうって思ってた。なんであんなことをしてるんだろう。安保って馬鹿みたいに見えますよね。でも、いま当時のフィルムとか見るとすごく熱気があってうらやましいと思うんですけど。いま、国会の前でバリケードを壊して中に突入しようなんて、誰も思わない。せいぜい、尾崎豊が死んだとき何万人ってくらいですね。その時代のヒーローが死んだら弔問で来るんですからね。死んだら集まって、で、それっきり。そこで一丸になって革命だなんて思う人はいない。やっても無駄だとわかっているから。

　あとはテレビのリアルタイムな映像の、ヴァーチャルな感じですよね。浅間山荘でも、目の前で銃撃戦が見られるわけですから。人の生き死にも箱の中のものだと思うんですよ。テレビ依存が完璧に進んでいる。僕はあんまりテレビは見ないんですけれど、友達の中にはもうテレビがないと生きていけない人がいますからね。ウチに帰って電気をつけたら真っ先にテレビのスイッチを入れる。テレビの音が流れていないと安心できない。何でもいいから八チャンネルをつけていればいい。僕らでもそうなんだから、ここから先の子供の世代は完璧にテレビがないと生きていけない。逆にどんな田舎にもテレビが標準語を普及させた。どんな田舎でもとりあえず情報をリアルタイムで流してくれる。原宿の風景が映れば向こうでも原宿みたいな格好をしますよね。全然、似合わないんですけれど、田舎に行っても一緒っていう現象が起こる（笑）。カジュアルな格好は田舎の子供も都会の子供も変わらないですね。昔はそういうのがなかったと思うんですよ。いまは情報が平べったくなってしまっているから。そんな状況の中で『エヴァンゲリオン』は生まれていると思う。

大泉　去年のオウム報道なんかも非常に典型的だったんですが、僕は個人的にサリン事件以前からオウムを取材していて、現場に行って修行したり、サティアンの中の空気とか、青山弁護士はどんな奴かを見て、報道では一つのイメージとして語られるわけですが、その時にものすごい違和感を覚えるんです。オウムっていうのはとんでもない連中で、まあ確かにそうには違いないけれど、それは麻原を含めたほんの一部なんです。ところがテレビでは「オウム＝悪」という図式が平べったく語られている。そういう情報は田舎まで広まっていくんです。ウチのかみさんは子育てをしているから外に出ようがなくって、子育てというのも一つの戦場に違いはないんですが、情報源といったらテレビという箱ぐらいしかない。逆にウチのかみさんのような存在がどうしても気になってしまったのが『エヴァンゲリオン』だったんだなって思うんです。自分の旦那が体験修行をしようが、やっぱりテレビの情報の方がリアリティがあるわけじゃないですか（笑）。そういうのは明らかに転倒だと思うんだけど、テレビの方から情報をもらって生活していて、ある程度それを信頼している。テレビという箱が圧倒的な影響力を持っている。そんな状況の中で、大勢の人が『エヴァンゲリオン』に飛びついたなっていう感じがするんですね。

竹熊　なにか、これは強烈なものがあって、普通と違うぞってみんなで思った。





『エヴァ』はプライベート・フィルムだ





庵野　あとは、個人というかパーソナルってこともあったと思うんですよ。『エヴァ』のキャラクターは全員、僕という人格を中心にできている合成人格なんですけれど、コアの部分には僕がいるんですが、平たく言えば僕個人があのフィルムに投影されているってことですね。

竹熊　プライヴェート・フィルムに近いですか。

庵野　そうですね。

大泉　これだけひきつけられた作品は、ホント、１６『（宇宙戦艦）ヤマト』以来って状況で、僕はかみさんを見て大丈夫なのかなって心配してしまった（笑）。そう思っているうちにこっちもどんどんはまっていった。

竹熊　『エヴァ』をやるに当たって、テレビアニメという発表形式にこだわりましたよね。なんかで、庵野さんのそういう発言を読んだ気がするんですけれど、それはいま言った話とつながってくるんですか？　平板化したテレビというメディアにカウンター・パンチを食くらわす狙いで始めたってことですか？

庵野　テレビアニメーションに関してはそういうのがあったけれど、テレビにこだわったのはメディアの広さですね。不特定多数の人が見てくれるってことですから、広がりがまだ見える。アニメはどんどん黄昏たそがれの時代に入っていって、ダメになっていくと思うんですけれど、テレビというメディアには外に向かっていく力がある。１７ＯＶＡはもう市場が決まっているから、これ以上広がることはまず考えられない。狭くなることはあるでしょうけれど。劇場版も市場としては狭い。レンタルビデオかＬＤの発売を待ちますよね。ただお金をかけてくれれば、メーカーがお金を回収しようと思って宣伝費もかけてくれますから、そうなった時、劇場は価値があるけれど、アベックが見に行くのも１８宮崎（駿）さんのアニメぐらいですから。デートに誘って恥をかくような映画はこれからダメになる（笑）。これからはデートに行っても外はずさない映画が生き残るんでしょうね（笑）。

大泉　『ナウシカ』の時に宮崎駿さんの作品に参加されたという話ですが、１９巨神兵の爆発シーンですか。あのシーンは、強烈な印象が残ってましたね。庵野さんってあのシーンやった人なのか、爆発させたら世界一だなって思った（笑）。宮崎さんはああいう展開で作品を作られていますね。

庵野　宮崎さんは……昔はよかったんですけれどね（笑）。

大泉・竹熊　（爆笑）。

庵野　次回作の２０『もののけ姫』は期待してるんですけれどね。聞いてる範囲から判断すると期待できる作品みたいですよ。でも、終わってみないとわからないけれど、どうなるか。

大泉　どの辺で関心が切れましたか。

庵野　一般向けのつまらない日本映画の仲間入りをしてしまいましたね。僕はもう物足りなさしか残らないですけれど。２１『トトロ』はよかったですけれど、そのあとはつまらなくなった。２２『（天空の城）ラピュタ』は嫌いですね。

竹熊　嫌いなんですか、『ラピュタ』？

庵野　ええ。

竹熊　２３『ふしぎの海のナディア』を見たときに、すごく『ラピュタ』を感じたんですけれど。

庵野　あれはＮＨＫから「『ラピュタ』をやってください」って注文があったからなんですよ（笑）。ＮＨＫの注文を聞く限りでは『ラピュタ』以外の何物でもない。できるだけ排除しようとしたんですけれど、ちょっとずつ取り入れて、ずらしながら路線を変更させていこうっていう戦略でした。最初に予定されていた監督は「これじゃ『ラピュタ』ですよ」って言って、大ゲンカしてやめちゃった。その後、僕が監督に入って、やった方法論っていうのはそれなんですよ。ＮＨＫの希望を可能な限り取り入れて、徐々に崩しながらやっていく。

『ナディア』の時に三人組が出てくるんですけれど、最初、あれはおばあちゃんと子供だったんですよ。もう、もろに『ラピュタ』でしょう。そう言われるくらいだったら、僕は２４『タイムボカン』って言われたかった。比較論でしかなくなって、言い訳にしかなってない。いま見れば申し訳ないですけれど。最初から言い訳しかなかった。『ナディア』が終わった時はもう僕は完璧に壊れてましたね。

竹熊　なんでそこまで壊れたようになってしまったんですか？

庵野　中身がなくなってしまったみたいなんですよ。冷蔵庫の中身が何もなくって、料理がまったく作れない。仕入れをしようと思ってもロクな仕入れがこなかった。それで、会社の方から出た企画があったんですけれど、岡田（斗司夫）さんがやったりしてたものがね。でも、『トップをねらえ！』を超えなかったんです。『ナディア』は我慢できて『トップ』の路線をちょっと変えて、もう一回できたんですけれど、もうさすがにもう一度同じことやるとなると、それは無理だった。嫌悪の方が大きくて、どうしてもできませんでしたね。仕事として意味がないし考えてもダメだった。どうせやるんだったら『ナディア』よりも、面白いものを作らないと。当時、言い訳で作ったにしても、全力投球したので、あれを超えるものはちょっとできなかった。

竹熊　『ナディア』は言い訳で始めたけれど、結果的に全力投球したってことですね。

庵野　そうです。基本的に僕の作りは２５『アストロ球団』なんですよ。一試合完全燃焼。ロッテと延々半年もかけて一試合戦っている。チーム自体も七人しかいない。終わった時は三人も四人も負傷している（笑）。次の試合は一体どうするのかわからない。とてもそんなんじゃリーグに出場できない。ロッテとでも全力でやる。ビクトリー球団戦は死人まで出ますからね。あれと同じですね。

竹熊　ということはペース配分ができない（笑）。

庵野　そうですね。『アストロ球団』を読んだからってことじゃないんですけれど（笑）、いちばん近いのはあれです。





「時に、西暦二〇一五年」

　南極で発生した「セカンドインパクト」と呼ばれる原因不明の大カタストロフから一五年後。水位の上昇、天変地異、民族紛争、内戦……人類の半数が失われたダメージから、世界はようやく復興しかけているように見えた。少なくとも形の上では……。

　異変は突然訪れた。日本の旧箱根に建設された新都市に向かって、巨大な人型の物体が移動していた。国連軍の攻撃は、「使徒」と呼ばれるその物体に傷一つ付けることができない。

　そんな時、この街に一人の少年が呼び寄せられていた。少年の名は碇シンジ。彼の父親ゲンドウこそ、この街、対使徒迎撃要塞都市「第３新東京市」の地下につくられた巨大な地下基地の主、国連直属の特務機関ネルフの司令官だった。幼い頃に別れて以来一〇数年ぶりで再会した息子に向かって、父親は平然と宣告する。巨大な人造人間「エヴァンゲリオン」に乗り、使徒と戦えと。急な事態への戸惑い、父の冷たい裏切り、そんな父の連絡に何かを期待していた自分への腹立ち。シンジはエヴァに乗ることを拒絶する。それを見たゲンドウは、もう一人のパイロット、綾波レイを呼びつける。

　彼女は、すでに重傷を負っていた。

　痛みに肩を震わせながら、なお立ち上がろうとするレイの姿に心を揺さぶられ、ついにシンジはエヴァに乗る。しかし、不慣れな操縦のシンジは、使徒の一方的な攻撃にさらされ、エヴァは機能停止に追い込まれてしまう。絶叫するシンジ（第壱話）。





　その瞬間、機能を停止したはずのエヴァは突如暴走。激しく使徒に襲いかかる。そしてエヴァもろとも自爆しようとする、使徒の捨て身の攻撃にさえ悠然と耐えたのだった。

　シンジはネルフの作戦部長を務める若い女性、葛城ミサトと共同生活を始める。内気なシンジに対して、ミサトはつとめて明るく振る舞うが、どこか胸の内を探り合うような空々しさは拭えない（第弐話）。

　ある日、転校先の中学のクラスメイト鈴原トウジに、シンジはいきなり殴られる。トウジの妹は、先日のエヴァと使徒の戦いに巻き込まれ、重傷を負ったのだった。だが、シンジも好きでエヴァに乗ってるわけではない。

　そんな時、新たな使徒が来襲。戦いを見ようと地上に出たトウジと友人の相田ケンスケに危機が迫る。シンジはエヴァごと盾になって二人を守り、意地になって使徒を倒す。二人はシンジの極限状況での絶望的な姿を目の当たりにし、言葉を失う（第参話）。

　なぜ自分だけがあんな怖い目に遭わなければならないのか。おまけに他人から嫌われてまで。すべてに嫌気がさしたシンジは、何日も学校を休んだあげく家出する。だが、行くあてもない。寄る辺ない気持ちで彷徨うシンジは、ネルフの諜報部に見つかりあっさり連れ戻されてしまう（第四話）。





　シンジがネルフに呼ばれる二二日前のこと。エヴァ零号機の起動実験中、暴走事故が起きた。この時、ゲンドウは普段の冷静さからは考えられない取り乱し方で、加熱した非常ハッチを素手で開け、操縦者のレイを助け出し、手にやけどを負うことになる。

　後日、レイの部屋を訪れたシンジは、廃墟の病院のような室内で、二二日前の事故で壊れたゲンドウの眼鏡を発見する。その時、シャワーを浴びていた全裸のレイが不意に現れ、シンジから眼鏡を取り上げた。慌てたシンジはバランスを崩し、折り重なるように倒れたレイの胸に触れてしまう。だが彼女は眉一つ動かさない。気まずさに話題を探すシンジが父ゲンドウへの不信を口した途端、レイの平手打ちが飛んだ。

　新たな使徒が襲来し、シンジは初号機で発進するが、強力な光線に胸を焼かれる（第伍話）。

　初号機は素早く回収され、シンジは無事だったが、恐怖のため無気力になってしまう。ミサトは使徒を攻撃するために、日本中の電力を集中させる「ヤシマ作戦」を計画する。その準備中、投げやりな言葉を吐き続けるシンジ。

「どうして綾波はエヴァに乗るの？」

「私には他に何も無いもの……」

　レイは「シンジは自分が守る」と平然と語り任務に就く。「さよなら」とだけ言い残して。そして使徒の攻撃を、エヴァ零号機ごと盾となって防ぎ、ヤシマ作戦を成功に導いたのだった。

　融解した零号機のハッチをこじあけ、目に涙を溜めながらレイの無事を確かめるシンジに、レイはこう語る。

「何、泣いてるの？　ごめんなさい……こういう時、どんな顔すればいいのか、わからないの」

「笑えばいいと思うよ」

　シンジの顔にゲンドウがだぶり、レイの表情はゆっくりと微笑みに変わっていく。レイと世界を結ぶもう一つの絆が生まれ、空っぽだった心に、これからの彼女を形作る感情が一つ刻まれた瞬間だった（第六話）。





１

『機動戦士ガンダム』用語。宇宙空間での生活に適応し、認識力、洞察力が拡大した人類の意味。





２

ニュージャーナリズム（オタク）を標榜する、小社刊の若者向け雑誌。シニカルさに自家中毒気味の八〇年代サブカル残党組とはひと味違うところは、エヴァにも通ずる!?





３

『エヴァンゲリオン』のオープニングに現われる三枚のカバラ的図像は、いずれも『生命の樹』の変形パターンである（一枚目は「天使」、二枚目は「さかさまの樹」三枚目が「標準型」）。





４

カバラはユダヤ教の密教で、神もしくは神的世界との個人的な交流・接触と、秘められた神智の獲得を目指す神秘主義。その歴史は古く、ピュタゴラス、ヘルメス、トリスメギストス、グノーシス派、新プラトン主義、錬金術師らの影響を受け、歴史的実体として確認できるのは、ＡＤ二世紀後半以降とされている。そしてこの多様な神秘主義を集大成させたのは『ゾハル（光輝）の書』を執筆したラビ・モーシェ・デ・レオン（一二五〇年頃～一三〇五）である。





５

実はギリギリで「アウト」だった。大泉が最近入手した「オウム真理教・ヴァジラヤーナコース・教学システム教本」の中で、麻原は「カバラにおける宇宙観と、そして、今オウム真理教が説き明かすテーラヴァーダの宇宙観は全く同じである」（九三年四月一八日・杉並道場における説法より）と述べている。オウムとカバラは全く同じだった!?　『エヴァ』とオウムのシンクロ率の高さは実に興味深い。





６

カバラの基本的な考え方は、非人格的な「隠れた神」を「エン・ソフ（無限なるもの）」と呼び、そこから流出した（神が神自身を見ようと欲したため）われわれの世界は、二次的な第二世界ということになる。それを『生命の樹（セフィロティック・ツリー）』のシンボリズムによって表現したものが、カバラ思想の中核である。

また『エヴァ』の人造人間という概念と大きな共通性を持つのが、人造人間「ゴーレム」の創造である。伝承によると「ゴーレム」は16世紀のラビ、エリア・バーシェルムにより創造されたという。ゴーレムは粘土や膠にかわから作られたもので、カバリストによって生命の火を与えられ、召使いとして使われていたが、その欠点は彼がすさまじい勢いで成長、巨大化することだった。この巨大さは、もともと完全な人間であった原人「アダム・カドモン」が持っていた性質だが、アダムが罪を犯したことによって、この巨大さという属性を失い現在の人間の大きさに縮小されたという。





７

正直な所は、二四話まではよくやったなという感じで（まあ本人はいろんなせめぎ合いで〝狂って〟いたと思うが）、完全主義の庵野さんには不満が残っているだろうが、素直に楽しんでいた。二五、二六話に関しては『うーん、時間がなかったんだろうなあ、でもこれもありか』と思いつつ「バカヤロー」と叫んでおりました。





８

五八年大阪生まれ。国際オタク大学学長。『エヴァ』を生んだガイナックスの創立者。プロデューサーとして『王立宇宙軍』『トップをねらえ！』を手がける。現在、東京大学教養学部のゼミで、「オタク文化論」の講師として活躍中。著書に『ぼくたちの洗脳社会』（朝日新聞社）、『オタク学入門』（小社刊）がある。





９

言わずと知れた永井豪の傑作。

黙示録をモチーフに、悪魔族と人類、そして悪魔の身体と人の心を持つデビルマンの戦いを描く。人間が、内なるエゴや弱さから生じた猜疑心のために、自らの手で滅び、目的を見失ったまま悪魔とデビルマンが果てしないハルマゲドンを戦い続ける。





１０

七三年から『週刊少年マガジン』で連載が開始され、その内容の過激さから、月刊誌、そして青年誌へと連載の舞台を変えていったマンガ。連載は一七年間に及んだ。現在、大泉が知るだけでも、講談社コミックスバージョン、ゴラク・コミックスバージョン、中央公論社バージョンと、三つのバージョンがあり、しかも内容が各々微妙に異なる。

主なあらすじは、巨大なジャック・ナイフを振るう、謎の巨人〝バイオレンス・ジャック〟と、生まれつき異常に筋肉が強すぎるため、重いヨロイをつけて生きるスラム・キングが、「関東地獄地震」後、弱肉強食となった関東を舞台に戦いを繰り広げるというもの。

『少年マガジン』連載時は荒々しいタッチの、狂気に近いようなハイテンションのマンガだったが、『週刊マンガゴラク』に移ってからは、他の永井マンガの主人公たち（キューティー・ハニー、ズバ蛮、アイアン・カイザー、あばしり一家）が姿を変えて現れるようになり、永井神話体系のような展開へと変貌。最後は『デビルマン』の世界体系へとつながり、バイオレンス・ジャック＝デビルマンＶＳスラム・キング＋人犬＝サタンの戦いで幕を閉じる。まあとにかくものすごいマンガ。





１１

内面が稀薄で無意識過剰なアッパー系キャラクターたちが、欲望を全開にして暴れ回った揚げ句、現実の様々な価値や基準が相対化されてしまうような、ポップかつ暴力的な作風で、怒涛の七〇年代に強烈なインパクトを放ったマンガ家。





１２

ガイナックスのオリジナル・ビデオ・アニメーション、庵野秀明監督。八八年一〇月にＶＯＬ１が発売となった。タイトルは当時大ヒットした『トップガン』と『エースをねらえ！』を足して二で割ったもので、同様に内容も両作に対するパロディあふれるものだが、ラストはハードで壮大なＳＦドラマになっている。





１３

エヴァ弐号機のパイロット、惣流・アスカ・ラングレーを演じた若手人気声優。『アニメージュ』での対談における、庵野監督とのやりとりでの突っ込みのはまり具合は、まさにアスカとシンジ。





１４

石森（現・石ノ森）章太郎原作。巨大ヒーロー物のウルトラシリーズに並ぶ、等身大変身ヒーロー物の代表的シリーズ。

七一年の第一作放映開始以来、Ｖ３、Ｘ、アマゾン、ストロンガー、新ライダー（スカイライダー）、スーパー１、ゼクロス、ＢＬＡＣＫ（ＲＸ）、真ライダー、Ｊ（ジャンボ）、ＺＯと、新シリーズやリメイクが、現在に至るまで断続的に作られ続けている。





１５

吉沢やすみ作。七〇年代初期『少年ジャンプ』を代表するヒット作のひとつ。七二年にアニメ化される。





１６

七四年一〇月～七五年三月放映。松本零士やスタジオぬえによる、当時としては驚異的に作り込んだＳＦ設定と世界観。夕日を背にそびえる赤サビだらけのヤマトなどの画面のインパクト。超未来物でありながら濃厚なロマン主義。生活感あふれる松本キャラ。まさにすべてが圧倒的に新鮮だった。





１７

オリジナル・ビデオ・アニメーションの略。テレビ放映や劇場公開を前提としない、ビデオ市場のみを対象に作られたオリジナル・アニメーションのこと。





１８

ちなみに『デラベっぴん』九六年八月号で宮崎駿は『エヴァ』に対してコメントを求められ、「見たことがありません」と答えている。愚考するに、それは宮崎の中の嫉妬が言わせた一言ではあるまいか。もちろん同業クリエイターに対する嫉妬というのは、健全な創造力の産物である。





１９

巨神兵は、『ナウシカ』に登場する、旧世界を滅ぼした人型の生体兵器。爛れた皮膚をドロドロ溶かして白骨化しながら熱線を吐き、オウムの大群を爆破した。登場シーンこそ短いが、庵野秀明入魂の作画により、見事にクライマックスを支えた。





２０

九七年夏公開予定の、宮崎駿監督作品。宮崎にとっては『紅の豚』以来五年ぶりの作品になる。宮崎作品の本質は「エスコート・ヒーロー・ストーリー」つまりお姫さまをエスコートするヒーローの物語であり、かつての作品はこのヴァリエーションに過ぎず、その根源となる物語がこの『もののけ姫』。期待を集めている。





２１

八八年四月公開。映画賞を総なめにした宮崎駿の代表作。昭和三二年頃の関東近郊の農村を舞台に、都会から引っ越してきた幼い姉妹と、自然の精である森のモノノケたちの交歓を描いた。





２２

八六年八月公開。前作『ナウシカ』から打って変わっての、レトロフューチャー的大活劇マンガ映画。かつて地上を支配した、伝説の天空の城ラピュタ帝国。その王族の末裔である少女シータと彼女を守ろうとする少年パズー、彼女の受け継ぐラピュタの鍵「飛行石」を狙う軍隊や海賊たちの、追いつ追われつの冒険を描く。





２３

ＮＨＫで九〇年に放映されたＴＶシリーズ（庵野秀明監督）。ジュール・ベルヌの『海底２万マイル』をベースとしたオリジナル・ストーリー。





２４

タツノコプロを代表するギャグアクションシリーズ。ヒーローよりも、ファンから「悪玉トリオ」と呼ばれた代々の悪役たちの方が、断然目立っていた。





竹熊　『エヴァ』の製作後半はスケジュール的にも凄まじかったと聞いてますけど……。

庵野　そうですね。よくもったと思いました。外にいる人にはわからないと思いますけれど、あそこまでもったこと自体が奇跡なんですよ。あのスケジューリングをこれだけ少数の人間でできたってことがね。少数精鋭だからできたってこともありますけれど。これだけの人数で、あれだけのものを、こんな短時間で、あんなふうによくできた。それはもうスタッフの熱意とか、メンタルな部分に頼った点が大きかった。でも、こういうことは外からでは見えてこないことですよね。大多数の人は結果でしか判断してくれませんから。僕から見れば、あの結果で充分、やれることはやったんです。やっぱり、ああいうことをやるには血を流さない奴はダメだなってことですね。血を流さない人間は深いところまでわかってくれない。

竹熊　先程、こういう仕事はサービス業だっておっしゃってましたけれど、そのあとで、そのサービスを裏切るようなこと（ストーリーの放棄）をしてしまったってことに、ご自分の中では矛盾を感じませんでしたか？

庵野　いや、あれが僕のサービスなんです（笑）。

竹熊　やっぱりね（笑）。

庵野　サービスに見えないけれど、サービスなんです。見えないサービス。怒るんだったら本気で怒らせようっていうのがありました。「なんだこの作画は！」って怒り方よりは、目の前のちゃぶ台をひっくりかえすような感情に持っていった方がなんかスッキリするだろうし。

大泉　ウチのかみさんは見事、それにはまってますね。

竹熊　精神崩壊を起こしたようなものだからね（笑）。

庵野　あと、こういうふうに話題になったでしょう、終わったあとも。そういう話題を提供することが僕の中でサービスだってことがある。前代未聞ですよ。これだけ作り込んでいて最後があれですから。

大泉　最後は財布もはたいてスッカラカンになったって話ですが、経済的なところで言いますと、アニメーターの人、いちばん下の現場に降りていくお金は少ないっていうのはすごく有名な話ですけれど。

庵野　そうですね。とても、内容に比例する金額ではないですね。それの穴埋めには精神的なものしかない。上がったフィルムを見てもらって、面白くてやってよかったと思ってくれることしかない。精神的な報酬しか僕は用意することができなかった。でも、それはそれでプレッシャーには、なりましたけれどね。つまらなくなったらやめるってことですから。常に面白いものを供給しないといけない。真剣勝負でしたね。

竹熊　最後の二話に関しては、他のスタッフの方はどうおっしゃってましたか？

庵野　納得ずくの人もいるし、これでＯＫという人もいた。

竹熊　納得できない人というのは、いなかったんでしょうか。

庵野　あんまりいなかったですね。最後の二本は、僕の中ではこういうふうに作らざるを得なかった。あとでリテイクすると言っていたことも関係してるんですけど。

竹熊　リテイクできないってことになると、もうちょっと違った反応になってくるでしょうね。





物語の終わらせ方





庵野　いや、やはり残るとは思うんですよ、欲求不満が。ストーリーの存在というのは、僕は物語にケリをつけることだと思う。基本的に『エヴァ』は僕の人生をフィルムに引き写しているだけなんで、僕が生きているわけだから、物語は終わらない。それでも番組を終わらせなければいけない。そうなったら、ストーリーが必要になってくる。

竹熊　風呂敷を閉じるのは、かなりテクニカルな問題になってくるわけですね。

庵野　ドラマとストーリーが必要なのはその点だけですね。

竹熊　以前、庵野さんは『エヴァ』の作り方を称してライブ感覚っておっしゃいましたけれど、自分の人生をそのまま作品にしている。あとは、もう成り行きというか、限られた状況の中で作っていく。

大泉　最後の終わらせ方っていうのは、何話くらいに考えられたんですか？

庵野　一八、一九話ぐらいかな。そこでスケジュールが行き詰まるのが見えていた。

大泉　一九話は僕もいちばん好きで、エヴァ初号機が覚醒して、もう誰も止められないってところですよね。

庵野　あれが最後の総力戦でしたね。あそこまでしかもたなかった。あれには持てるものを全部つぎ込んで、以上、これで全部終わりってことです（笑）。

大泉　で、その後二〇話で「もう誰も止められない」ってやつが止まっていたからびっくりした（笑）。

竹熊　余談ですけれど、なんで止まったんですか？

庵野　あのあと、勝手に止まってくれたんです。理由はない。よく聞かれるんですが。２６機関は停止してるんです。全部セリフだけでやっちゃってる。セリフを一つ一つ吟味すれば少なくとも理解できる。二〇話っていうのは最初から総集編だったんです。それでもあれは一週間から一〇日くらいですね。

大泉　でも、二〇話も、かなりのクオリティですよね。

庵野　あそこまでは、そうですね、よく作ったと思いました。

竹熊　作品に自分の人生が投影されているのはわかるんですけれど、家族関係も投影されているんですか。

庵野　わからないですね。ウチは両親ともまだ健在ですから。

竹熊　親子の確執は当然おありになったわけでしょう。

庵野　うーん、はっきりしたものじゃないと思うんですよ。きちんと理解してはやっていない。よくわかんない。ただ、最近わかったのは、ウチの親父は身体障害者なんですが、その親父のコンプレックスっていうものの直撃を受けている。

大泉　僕は水木しげるさんと少数民族の村へ取材でたずねて行ったりするんですが、水木さんは戦争で腕が一本なくなった人なんですよ。

庵野　ウチの親父は戦時中の事故なんです、戦争じゃなくって。事故で片足をなくして。一六の時ですね。ちょうどこれからっていう時にです。

大泉　戦争という大きな物語の中で血を流している世代。ウチの場合、婆さんが満州に行って、引き上げの時に満州で神秘体験があって、母親の兄弟が何人か死んだりもしたし、エホバの証人という宗教団体に帰国してから入信したんです。輸血をしちゃいけないっていう教義がある宗教なんですが、僕は子供の頃、婆さんと一緒にそこに入っていた。それで、一九七五年にハルマゲドンが来るっていう教義だったんです。でも、それが来なかったんで、三分の一くらいの人間がやめてしまった。僕もその頃、中学二年でやめたんです。いいかげんにしろって思って。それまでは、僕はハルマゲドンに向かって生きてましたからね。それ以来、ハルマゲドンは来ないってことが僕の人生の根本原理になっています（笑）。

　輸血を拒否して子供を死なせてしまった事件が八五年に起きてますよね。あの時には「僕もエホバのとき一〇歳だったんだけど、輸血を拒否しただろう」と思ったんです。マスメディアの中では、子供が生きたいと叫んだのに親が無理やり教義を押しつけて殺したってことになっているんですけれど、僕は潜入して子供を殺しちゃった両親と一緒に布教活動やりながら密着取材をしていた。あとで医者とか関係者に話を聞いてみると、子供は生きたいなんて叫んでいなくって、みんなマスコミが作ったお話みたいなんですよ。それですごくびっくりして、それ以来、僕はノンフィクションっていう、取材して話を書くことをしているわけです。今回のオウム事件でも、いかにメディアが意図的にお話を作ったかが非常によくわかる。お父さんの時代に血を流した大きな物語があって、それがだんだんそういう目に遭あわないようにって社会が動いていく。最終的にテレビの箱がすべての共通言語になっていった。そういう大きな流れがあって、その行き着いた果てがオウム事件だと僕なんか思うんです。

竹熊　オウムの事件には親子関係っていう要素がすごく大きいと思う。僕にも、親子関係のトラウマみたいなものがあるんです。ウチは普通の家庭で両親も元気なんですが、親父が高度成長期の企業戦士で、ほとんどウチじゃ顔を合わせたことがないくらい会社人間だった。母親はやることないから、子供にエネルギーが行くんですよ。で、僕はそのエネルギーにつぶされそうになってしまった。で僕は二〇歳で家出をしてしまって……まあそれで大変せいせいした（笑）。でも、その時のトラウマはいまだに引っ張っているんです。僕の場合は母親なんですね、強烈なものは。またオウムの例になってしまうんだけれど、信者が出家する気持ちはわかりますね。自分の場合は、オウムみたいなのに出会わずにエロ本屋でバイトしてっていう感じでいまに至りますけれど、きわどい心理はよくわかりますよ。『エヴァ』もオウムも根っ子の部分を考えたらみんな一緒だと思うんだけれど、いずれも親子関係の崩壊って要素がありますよね。それは自然にできた部分だと思うんですよ。別に真似をしたとか、影響を受けたとかじゃなくって。

庵野　僕らの世代が持っている共通のものだと思います。

竹熊　オウムというのは戦後をやり直そうと思った連中だと思うんです。戦争のようなリアルな体験がなくて、極限状態を体験していない、あるのはマスメディアが提供する疑似体験だけ。じゃあ、自前でリアルな体験をやろうじゃないかってことで、全共闘もオウムも動いたと思う。それで、あんなことを起こした。僕なんて、父親と話していてよく、早く大人になれって言われたんだけれど、でも、大人とか言われてもまるで説得力がなかった。彼らにとっての大人っていうのは、高度成長期を支えた倫理観でしかない。彼らは貧乏を知っていたから、それができた。さっきの話とリンクすると思うんだけど、僕らは決定的な飢餓感とは無縁だった。頭ではわかっていても体ではわからないって状態でずっと来ている。そこで、今日聞きたい話の核心になると思うんだけど、さっき庵野さんはテレビを否定するようなことを考えながら、でもテレビじゃなきゃダメだと言ってみたり、すごく矛盾しているんですよね。僕なんかもマンガ業界で仕事をしているけれど、大変似ていますよね。庵野さんはアニメはダメになりつつあるって言ってるけれど、まったく同じことがマンガにも言える。新しい時代の価値観が見つからない。

大泉　ある種のどん詰まりってことですか？

竹熊　ええ、それで僕なんかがオタクと呼ばれるものになっていくっていうのは、自分で選んだところもあるわけです。選ばない道もあったけれど、それ以外の道にリアリティがなかった。オタクっていうのは、対象に距離を置きながらのめり込むというアンビバレンツな状態ですよね。熱くなることができず、さりとてニヒリストになり切ることもできないとなったら、もうオタクになるしかないわけですよ。





一応のハッピーエンド





大泉　竹熊さん自身、『ヤングサンデー』で連載の『チャイルド・プラネット』でストーリーもの、ハルマゲドンを扱ってますよね。

竹熊　だから正直、『エヴァ』を見てまいったって思いました。同世代だなって。始めた動機には近いものがあったと思いますよ。あれも三年くらい前に考えた話なんです。

大泉　オウムでもそうですが、全然関係ないところから同時多発的なアイデアがボコッと出てくる。

竹熊　大人になるイメージが希薄で、大人にならなきゃいけないけれど、どんな大人になっていいかわからない。そういう状況で三六歳にもなってこんなこと言うのはみっともないんだけれど、実際に見つからないのは事実ですよね。それで、『エヴァ』もどつぼにはまった感じがした。２７シンジ君が大人になる話ですよね、ホントは。

庵野　それは、僕が大人になるってことと同じですよね。シンジ君って昔の庵野さんなんですかって聞かれるんですが、違うんですよ。シンジ君はいまの僕です（笑）。一四歳の少年を演じるくらい僕はまだ幼いんです。どう見ても精神医学的に言うなら２８オーラルステージ（口唇期）ですよね。２９メランコリーな口唇依存型。まあ、これは否定しようのない事実で、しかたがないことなんです。そこから前に進もうと思ってたんですが、それは結果として自己への退行になってしまった。袋小路ですね。

竹熊　となると、ある意味ではアン・ハッピーエンドですよね。『エヴァ』の最終回は。

庵野　ある意味ではそうですね。そこから前に出たのがハッピーと取れば、アン・ハッピーなんですけれど。これでよしとすればハッピーエンドですね。

竹熊　一応、ハッピーエンドの体裁は取ってますもんね。

庵野　サントラＣＤの最後の曲のタイトルにしてるんですよ。『グッド・オア・ドント・ビー』。ＯＫか生きるな、か。良いか悪いか。両方あるのか。そういうところに僕の心情をちょっと出してしまった。

　でも、僕らはこのまま成長を止めてモラトリアムのままずっとグルグル回ってますが、一つはモデリングがなくなったってことだと思うんですよ。人間にオリジナルなんてない。少なくとも日本語を知らなければコミュニケーションをとれないですよね。これはモデリングですよ。親がしゃべった言葉だからこっちに来ている。親が英語をしゃべれば日本にいても英語をしゃべる。友達が日本語をしゃべっていて、何だこれはってことになれば、今度は日本語をしゃべっていく。自分ひとりで日本語は発明できない。模倣でしかものはできていかない。その時に一番最初、身近な親兄弟の真似をし始める。親を尊敬して親のあとを継ぐか、反発して親と違う道を行くしかない。どっちにしろモデルがないとどっちにも行けない。

　どんな天才でもインスピレーションを起こすものがありますよね。中には僕みたいにアニメやマンガしか見ていないと、そこから思いついたものをパッとやった時には、思いついたものはただ自分の中で忘れていたもので、必ず何か元ネタがあるんですよ。それでハッと気がついて、あっ、あれだったのかってわかって、ちょっと嫌な気がする。そういうものしか見てないから、まあ、それは仕方がない。自分の中に沈降しているものを無意識に引き出しているだけですからね。どんな天才でも花を見た感動を音楽にするとか、小説にするとか、本当にその花を認識しないと、小説も音楽も出てこない。人間は無からものを作れない。これだけ情報量が氾濫していて、何をモデルにしていいのかわからないんです。特にテレビみたいなものから疑似的な情報がバーッと出てきて、自分のクラスメイトの生年月日を知らなくても、山口百恵の生年月日は知っているとか（笑）。アイドルのバスト、ウエスト、ヒップのサイズとかいう細かいプロフィールは知っている。クラスメイトよりも山口百恵に親近感のある世代だと思うんですよ。現実にいるクラスメイトよりテレビの中の人物の方の存在感が大きい。ヴァーチャルの方が現実よりも上という認識はすごいですね。そんな中で育っていて、きちんとしたものができたのかっていう気がします。大きくなれば、さすがにそれは嘘だってことになっても、ＮＨＫのニュースでアナウンサーが言われたことを本当だととってしまうんですよね。日本人はそういう傾向が強い。

大泉　オウム事件での誤報も、ものすごい量でしたけれど、ほとんど検証されなかった。僕もメディア批判を書きましたが、やっぱりメジャーな情報の方が圧倒的なイメージを作ってきた。

庵野　やっぱりイリュージョンでしかないと思うんですが、そのイリュージョンの方が快楽を持っているんです。やっぱり人間、気持ちのいい方に行きますから。本を読むくらいだったらテレビの方に行く。

大泉　できれば、第六サティアンで銃撃戦をやってほしかったとかね（笑）。

竹熊　あんな逃げ隠れはしないでね。

庵野　みんな期待したでしょう。あんな情けない捕まり方はね。

竹熊　でも、後々考えてみると、麻原のあの情けない捕まり方は味わいがあった（笑）。

庵野　でも、あそこで自決をしていたら、少なくとも一万人の神様には、なれたでしょうね。

竹熊　ただ、あの情けないもの以上のパワーがなかったというのが、いまの日本の現状ですね。

大泉　あの情けないものに去年一年、日本中が振り回された。

竹熊　二人ともオウムに関する本の仕事を去年やってたものだから、つい、この話になっちゃうんだけど『エヴァ』の最後は、まあ、物語としては失敗してるし、恥ずかしいところもある。でもこれ以上パワーのあるものがないって感じにはなっていた。〝いま〟だなあって感じがする。

大泉　覚醒という言葉はずいぶん昔から意識されていましたか、一九話での。去年一年、もうすこしで３０クンダリニーが覚醒するってオウム信者に言われ続けてきたもんですから（笑）。

庵野　それはサブリミナルやインプリンティングみたいなものだと思うんです。あのカッコよさには憧れたりしますね。わざわざ出会いのことを邂かい逅こうって言ったり。日本語のボキャブラリーの中で一番カッコいいものにしておきたい。それは僕が持っているペダンティックなものだと思うんですけれど。目覚めるより覚醒するって方がカッコいいですよね。





ただのコピーではない





竹熊　もう一つ、『エヴァ』というのは第一使徒のコピーですよね。でも、「ただのコピーではない」みたいなセリフを登場人物に言わせているじゃないですか。あれは思うところがあって、ああしたわけですか？

庵野　人の心が入ってくるってことですね。

竹熊　例えば過去の作品のコピーしかできない我々っていうのがいるわけでしょう。でも、ただのコピーじゃないぞってことで何かを作ろうとするわけじゃないですか。

庵野　僕らは結局コラージュしかできないと思うんですよ。それは仕方がない。オリジナルが存在するとしたら、僕の人生しかない。僕の人生は僕しか持っていない、それがオリジナルだから、フィルムに持っていくことが僕が作れるオリジナリティなんです。それ以外はすべて模造といっても否定はできない。僕が知らなかっただけで、あそこの場面は、あの映画のあそこの場面と同じだって言われたことがあるんですけれど、僕はそんな映画は見ていない（笑）。見ていない映画とそっくりだと言われても、僕は責任は取れない。僕の持っている人生観や考え方以外に確実なオリジナルは存在しない。それを突っ込んでしまえばただのコピーでしかないと言えるんですよ、胸を張ってね。そこの部分なんですよね。コピーをする時に自分の魂をこめる。まあ、それは人の魂が入っている、ただのコピーではない。いままでのマンガや特撮もの、アニメをコピーした『エヴァンゲリオン』はそこのメタファーみたいなところはありますけれど、いちおう、基本的には置き換えで作ってますんでね。

大泉　最後の終わらせ方ですが、あれはこれまでになかった終わらせ方なんでしょうか（笑）。

庵野　小説なんかにはあるんじゃないですか？

竹熊　アングラ演劇では、ありますよね。マンガでもまるで例がないわけじゃない。でもテレビ・シリーズのアニメでは前例がないでしょうね。

庵野　まあ、そこまで勇気ある馬鹿な奴がいなかったってことでしょう（笑）。監督はみんな最後のは、やりたがるとは思うんですけれど、やった奴はいなかった。

大泉　プロデューサーは納得したんですか？

庵野　プロデューサーは僕の作品だったんで、庵野さんがいいならそれでいいってことで、商売より何より僕が好きなようにやってくれと言われた。あそこは落とすもよし、ああするのもよし、出来の悪いストーリーで終わらせるのもよし。

竹熊　最終回はご自分が実写で出られるという企画もあったそうですね。何をしようと思ったわけですか。

庵野　まずあやまる（笑）。なぜこんなふうになってしまったかを説明する。最後はビデオで何とかするつもりですって弁解するんです。テレビ東京のプロデューサーと二人で出ようってことになったんだけど、ダメでしたね、さすがに。世間は甘くなかった（笑）。今回は世間を思い知りました。





毒は混ぜるべきだ





竹熊　ここまでわがままいっぱい作れるのって前例がないでしょう。

庵野　あんまりないですね。もう制約が来たらやめようと思ってましたから。その意味ではプロじゃないと思うんですが。自分たちの作りたいものを拒絶された時には、もうテレビでの放送はいいですって思ってましたから。テレビ東京のプロデューサーとの打ち合わせで最初からイメージしていたことなんです。僕は僕のモラルの中で、子供が見る場合でも毒は混ぜるべきだと思ってましたんで、毒がないと免疫がつかないんですよ。全部の番組が『エヴァ』みたいだったら、問題があるとは思いますけれど。一週間のテレビ番組の中でたった三〇分ああいうのがあったっていいと思ったんです。あとテレビは拒絶できるじゃないですか？　嫌だったら見なくてもいい。五秒見ていやだと思ったら切っちゃうと思うんですよ。最後まで見てなんだあれはってなれば、なんだお前らってことになるでしょうね。それはこちらの術中にはまっていることになるわけです。まあ、見なきゃいいと思うんです。それがまた一つの快楽につながると思う。嫌な番組なんか見てやるもんかっていうことがね。

竹熊　水曜日の夕方六時半ですよね、放映時間が。子供が見るってことは、どの程度意識されていたわけですか。

庵野　小さい子供はあまり見ないと思ってましたよ。そんなに視聴率はいかないと思ってた。あの時間帯を見る人はビデオを録るでしょう。リアルタイムで見る人は多くない。でも、結果的には小さい子がけっこう見ていたみたいですね。「ウチの子がファンです」とか言われて（笑）。中学になってから見せた方がいいですよって言ったんですけれど。情操教育に悪いですよ。この間来た編集者の息子さんが四歳なんだけど、『エヴァ』の大ファンで、しりとりをやると『エヴァ』に関係ある単語が並ぶらしい。「あ」と言えば３１綾波レイです。「え」と言えばエヴァンゲリオンで「ん」で終わるから、エントリープラグ。「い」は碇いかりシンジ（笑）。

竹熊　四歳にしてはかなりディープなファンですね。

庵野　ボキャブラリーがウチで埋まるっていうのもまずいと思うんですけれど。

竹熊　３２『ウルトラマン』や３３『ウルトラセブン』でも大人向けのストーリーだとしか思えない回があったじゃないですか？　僕ら子供だったけど、それなりに見てましたからね。

庵野　大人の雰囲気が見え隠れしていてすごくよかったですよね。

竹熊　それで心に残っているわけです。

庵野　子供ばかりに見せない感じがしましたね。

竹熊　小学校低学年であっても、そういうところにグッときたわけじゃないですか。『エヴァ』だって見ている子供達に無意識のうちに刷り込まれているってことがあるかも。

庵野　テンションの高さだけでも見てくれるかなってところはありましたね。でも、まあ、小さい子供だけを意識しているわけじゃないですけれど。小さい子が見てもつまらなくはならないだろうってぐらいで、それはまあ、僕に子供がいないので、感覚的にはわかんないですね。

大泉　ウチの子供は一歳何ヵ月でしたが、〝シンジ君〟という言葉は完全に覚えた。去年、初めて覚えた言葉のいくつかが〝オウム関係者〟と〝シンジ君〟ですよ。これはまいったな。

庵野　それは親が悪いんです。それはそういう親を持ったのがね……子供は親を選べないんですから。それはもう〝生まれの不幸〟としか言いようがないですね。





新しいレール





竹熊　『エヴァ』というのは事実上、庵野さんの自己プロデュース作品ですよね。

庵野　ええ、初めて一から自分でやった企画です。『トップをねらえ！』は岡田さんのレールに乗っかってやってるし、『ナディア』はＮＨＫでやってますから。そのレールを壊して自分たちで新しいレールを敷くことですから。『エヴァ』の直前に３４『ウル』という劇場の企画があったんです。それは３５山賀君にレールを敷くのを頼んだら、結局ダメで、そっちのレールがなくなってしまったので、どうしようってことになった時、初めて自分で一からやったんです。

竹熊　チャレンジだったわけですね。

庵野　僕の中では最初のチャレンジです。

大泉　『エヴァ』を見て典型的な終わらせ方だと思うのは、『デビルマン』みたいに覚醒したエヴァを主人公が意識的にコントロールして、３６それで羽がバッと開いてというのと、使徒を送り込んでくる真の敵との戦いですよね。

竹熊　３７サード・インパクトが起こって、エヴァと融合したシンジたちだけが新人類として生き残って、全部滅んだ地球の上で生きているとか、例えばそんなふうな終わり方だと思うんだよね。

大泉　典型的な終わらせ方だと思うんですけれど、それは『エヴァ』の原型となったという、岡田さんとの企画の話し合いでは出てこなかったんですか？

庵野　典型的なのが二人ともいやだったんです（笑）。そのうち風呂敷だけがでかくなって、うまく畳めない。方法論を思いつくまでやめましょうってことになった。

竹熊　風呂敷を畳むって難しいですよね。

庵野　きれいに畳む必要はないと思うんですよ。広げた風呂敷をどうするか、方法は三種類ある。畳むのと、ちぎるのと、あとは捨ててしまうのと。

大泉　今回のあれはなんでしょうか（笑）。

庵野　ちぎって捨てるのかな、あの終わり方は。

大泉　それがこういうテレビものでは強烈なオリジナリティにつながった。

庵野　そうですね。ちぎった奴はいないですからね。

竹熊　昔、３８『幕末太陽傅』という映画がありましたけど……。

庵野　ええ、あれをやりたかったんですよ。あれが近いと思う。３９川島雄三の気持ちはわかる気がします。

竹熊　最初のプランでは、ラストシーンでフランキー堺が撮影所から出ていってそのまま現代の街の中を逃げていく予定だったんですよね。でも、それはさすがに映画会社から拒否された。

庵野　今村昌平が文句を言ったって話ですね。「イカンなあ。馬鹿もんが、なぜそれを許さん」って。

竹熊　ストーリーを中断していきなりメタな領域に話を持っていくのは、わりと映画ではヌーヴェルヴァーグの連中がよくやりそうな手法ですよ、楽屋オチとか。

庵野　ヌーヴェルヴァーグに近い部分はある。結局自己の方へ還ってしまうんですから。

竹熊　４０『ホーリー・マウンテン』っていう映画があるでしょう。４１アレハンドロ・ホドロフスキーの。最後に「これは映画だ」って言って、いままでのものすごい話を全部捨てた。

庵野　あれも同時多発的だと思うんです。でも、僕は知らなかった。いま、ヴァーチャルなものと自分の中の現実の区別がつかなくなってきてるから、自分で区別をつけたと思うんですよね。すごくボーダーレスになっていると思う。特に『エヴァ』では一部の人間が水曜日を中心に時間が回っているという状況で（笑）、番組放映中の三〇分間がもっとも大切な時間だった。今日は『エヴァ』なんで帰りますなんてことにもなる。確かに、僕が『ヤマト』の時なんかそうだったんですよ。塾がＡＢＣと三つのクラスに分かれていて、僕は成績がよかった方なんでＣクラスに入っていた。七時三〇分から塾の講義が始まったんです。七時半の『ヤマト』だけじゃなく、４２『日本沈没』も見られなかった。あの時は４３『グレートマジンガー』（七時～）、『宇宙戦艦ヤマト』（七時半～）、『日本沈没』（八時～九時）とすごい番組が続けて放送されていたからすごかったんです。至福の時でした。





『ヤマト』の影響





竹熊　ご出身は山口ですよね。

庵野　ええ、そうです。それで、僕は塾の成績をわざと落として、Ｂクラスに行って、『グレートマジンガー』を犠牲にしても、『ヤマト』までには家に帰ることにしていました。

竹熊　あの当時にビデオがあればね。

庵野　もうリアルタイムで見るしかなかったですから。

竹熊　もう、一期一会の心境ですよ（笑）。

庵野　再放送の時はもうクラブ活動は中止でしたよ。

竹熊　カセットテープで音だけ録ってましたよね。母親がガチャガチャお勝手で洗い物をしていると、「シーッ」とか苦情言ったりして。

庵野　僕は親にねだってテープレコーダーを買ってもらったんです、テレビの音が入るやつ。一話見てガーンときて、二話からもうカセット録りです。

竹熊　俺は最終話も録ったよ。セリフを覚えちゃった。

庵野　『ヤマト』に関しては当時一話は覚えてませんけど、二話から最終話までは一時期ほとんど覚えてました、セリフを。波動砲発射の過程がいまでもそらで言えますから。中二って人生のうちでもいちばん記憶力のいい時期でしょう。『ヤマト』のセリフを覚えることに貴重な時間を使ってしまった（笑）。こんなこと人生の役に立つのだろうかって思っていたら、いまこんな形ですごく役に立っている（笑）。人生、どこでなにが役立つかわからないですね。『ヤマト』のセリフを覚えていることって、いま、すごく役に立ってます。専門用語を羅列するのに、僕はなんの苦労もないですから。そういう単語がバーッと出てくる。波動砲の発射過程だけで二分。大砲を撃つだけで二分も描写があるんですよ、五話の時には。

竹熊　ああ、あの五話の時ね（笑）。

庵野　あれがいまでも役に立ってます。自分のことを僕は『ヤマト』の正統な後継者だと思っている部分もあるんですが（笑）。





　ネルフドイツ支部からエヴァ弐号機と、そのパイロットがやって来た。惣流・アスカ・ラングレー。エヴァと最も高いシンクロ率を誇る天才少女だ。日本を目指し輸送航海中の国連軍大艦隊を、新たな使徒が襲った。

「チャーンス！」

　勝ち気なアスカは、シンジに実力をアピールするために、二人で弐号機に乗り出撃する。必死の戦いの中でいつか二人は協力しあい、使徒を撃退した（第八話）。

　アスカに同行して、ミサトのかつての恋人、加持リョウジも来日した。飄々として食えない加持の再アプローチに、ミサトは迷惑顔だが、心中は複雑そうだ。だが、加持のスパイまがいの不審な行動には、何か別の目的が感じられる。

　一方、自信家で積極的なアスカは、消極的で煮え切らないシンジの態度が気に障って仕方がない。しかし第七使徒に対する共同作戦のための特訓、浅間山火口内に眠る第八使徒捕獲作戦（結果は失敗）、レイを含めた三人の初めての連携による対第九使徒戦と、相次ぐ共同作戦の中で徐々に戦友としての信頼が芽生え始めているようにも見えた（第九～拾壱話）。





　その頃、ゲンドウはネルフ副指令の冬月と共に、セカンドインパクト一五年後の南氷洋を訪れていた。そこは、赤紫色の海に無数の塩の柱が立つ死の世界だった。セカンドインパクトを引き起こした原因について何かを知っているらしい彼らは、いままたここで何をしているのか？　すべてはまだ明らかにされない。

　そんな二人の留守中のネルフ本部に、大きな危機が訪れる。衛星軌道上から地上を狙い撃つ第一〇使徒が迫っていたのだ。ミサトはエヴァ三機でこれを受け止める作戦を計画する。計算によると成功確率は〇・〇〇〇〇一％。しかし、執拗に使徒撃滅にこだわるミサトは作戦を強行。彼女は「光の巨人（セカンド・インパクトの原因）」によって父を殺されていたのだ。その結果、奇跡的に本部は救われた（第拾弐話）。

　赤城リツコ博士。ミサトの学生時代からの友人で、ゲンドウの片腕的存在でもあるエヴァの開発責任者。そして亡き母は、ネルフをささえるスーパーコンピューターシステムＭＡＧＩ（マギ）の設計者だ。三つのマギコンピューターにはリツコの母の人格がそれぞれ移植されていた。技術者、母親、そして女としての自分。

　そのマギに、コンピューターウイルス的性格を持つ使徒が侵入した。三つのうち二つが乗っとられ、本部の自爆が自動決定されてしまった時、リツコは最後に残された一機から逆ハックをしかけ使徒を自滅させた。





「私は母親になれそうもないから、母としての母さんはわからないわ。けど学者としてのあの女性は尊敬もしていた。カスパー（最後の一機）は女としてのパターンがインプットされていたの。最後まで女でいることを守ったのね……ほんと、お母さんらしいわ」（第拾三話）。

　人類捕完委員会・特別招集会議。ゲンドウは、「ゼーレ」と呼ばれるネルフの上部組織のメンバーから、先日の使徒侵入について詰問を受けていた。彼らは国連にも大きな影響力を示す全世界的組織網を持っているらしい。また、使徒の正体を知っており、その存在を利用したあるシナリオを描いているようでもある。その背後に見え隠れする『死海文書』と呼ばれる謎の古代文献。しかし、ゲンドウにもゼーレの任務を装って密かに進める別のシナリオがあるようだ……。

　その頃ネルフ本部では、レイとシンジが初号機と零号機の互換実験を行っていた。レイと初号機は無事シンクロするが、零号機のシンジの頭の中に、突然不気味なレイのイメージが大量に流れ込む。シンジは精神汚染され、もがき暴れる零号機。原因を問い詰めるミサトに、リツコは「いまはまだ言えない」と答えるだけだった（第拾四話）。

　ある日ミサトは、リツコ、加持と共に、共通の知人の結婚式に出席した。その帰り道、酔った勢いからか、彼女は加持への秘めた感情を突然暴発させてしまう。かつて加持から逃げたのは、好きな男が父親に似ていることに気づいたからだと。「父を憎んでいた私が父によく似た人を好きになる。すべてをふっきるつもりでネルフを選んだけど、それも父のいた組織。結局使徒に復讐することでみんなゴマかしてきたんだわ」自虐的な独白を続けるミサトの唇を、加持はキスでふさいだ。

　翌日、ネルフ本部最深部、ターミナルドグマ。巨大な扉の前に加持がやってくる。その頭部に背後から突きつけられる拳銃。ミサトだ。加持は日本政府がネルフに送り込んだ調査員だったのだ。だが加持は、ゲンドウやリツコもミサトに隠しごとをしていると語る。そして、その扉の向こうにミサトが見たものは、セカンド・インパクトを起こした第一使徒「アダム」だった（第拾伍話）。





２５

七二年から七六年まで『週刊少年ジャンプ』に連載されていた野球マンガ。原作・遠崎史郎、マンガ・中島徳博。内容については庵野さんが言ってる通りで、大泉にはスカイラブ投法というとんでもない変化球が印象に残っている。





２６

第３新東京市に襲来する人類の敵・使徒エンジェル。そのコアとなるものが機関で、いわば使徒の心臓である。一九話では、覚醒した初号機が使徒を喰い、機関を自らの内に取り込む。





２７

碇シンジ。主人公。ＥＶＡ初号機専属パイロット。他人とコミュニケーションをとるのが苦手なタイプの少年。母とは幼い頃死別し、父ゲンドウとも一〇年以上離れて暮らしていた。突然父に呼び出され、ＥＶＡ初号機に乗るよう命じられる。





２８

フロイトのリビドー発達理論における最初の発達段階で〝口こう唇しん期き〟と訳される。母親の乳房へ、はじめは栄養摂取という自己保存的活動に依存した関係の中で快感が発達するが、やがて吸うことそのものが自律した自体愛的な快感になる。フロイトによれば、口唇期には、外界を自己の中にとり入れ、合体する働きと、不快な感覚や存在を外界に吐き出し、投影し、自己（快）と非自己（不快）を分離する自我の働きの芽ばえがある。





２９

メランコリーとは「うつ」のこと。精神医学者クラインは乳児の乳房に対する口唇的サディズムが母に投影され、母から食べられ破壊されるという被害的な空想を抱き、破壊の対象である母が口唇愛の対象でもあるというアンビヴァレンス、それに伴なう罪悪感、抑うつ感が生じると説明した。





３０

クンダリニーとはヨーガの用語で、しばしば蛇や女神に、たとえられる。尾てい骨に眠るとされる霊的なパワーのことで、クンダリニーを覚醒させることで、完全に自由な状態（解げ脱だつ）に至ることができるという。





３１

ＥＶＡ零号機専属パイロット。一四歳。感情表現に乏しく、人間関係に興味を持たないが、唯一碇ゲンドウだけには心を開く。髪が青く赤い瞳をしており、現在生きている人類とは思えないのに、クラスメイトが不思議がらないのも庵野監督の力ワザか。ちなみに大泉が個人的に一番そそられるキャラなので、たぶん僕はサディスト系なのだろう。そんなわけで綾波について書き出すとキリがなくなるのでもうやめます。





３２

六六年から放映された第一シリーズは、輝く未来と科学の「万博センス」あふれる、明るく、どこか暖かで脳天気な作風。しかしそこには、沖繩出身のシナリオライター金城哲夫のコスモポリタニズムヘの祈り、松竹ヌーベルバーグにも参加した佐々木守の、シニカルな社会派的な視点などが覗いていた。





３３

六八年より放映されたシリーズ第二作。ベトナム戦争下という世相も反映し、前作以上にハードな作風となった。ウルトラ警備体＝自衛隊、ウルトラセブン＝アメリカ第七艦隊、というのはよく指摘される構図。





３４

『王立宇宙軍』の二〇年後の世界を舞台にしたスカイアクション。エヴァ以降のガイナの、そして山賀監督一〇数年ぶりの、満を持しての新作として、否が応にも期待は高まる。





３５

ガイナックスの山賀博之氏のこと。山賀は八四年に『王立宇宙軍　オネアミスの翼』の監督を行ない、その独自の世界の巧みな構成と、アニメーションの完成度の高さから、国際的に高い評価を受けた。





３６

作品のオープニングでエヴァが一二枚の羽根を開くカットがあるのだが、本編にはついにそのシーンが存在しなかった。このため、あのオープニングはどういう意味があるのか、ファンの間で話題になった。





３７

『エヴァンゲリオン』の世界では、ＡＤ二〇〇〇年に南極大陸で大爆発が起こり、南極の氷の溶解による海進、地軸の変動等によって多くの都市は水没した。この災害はさらに世界規模の経済恐慌を招き、内戦や民族紛争を勃発させ、世界人口の約半分が失われるというハルマゲドン的な状況に陥った。これが「セカンド・インパクト」と呼ばれるものである。この「セカンド・インパクト」の原因については、公式には「宇宙から飛来した大質量の隕石が南極大陸に衝突したため」と発表されているが、これはあからさまに情報操作されたもので、南極での「光の巨人の出現」、がその真の原因とされる。第一使徒アダムは、特務機関ネルフの「セントラル・ドグマ」に存在し、使徒、あるいはエヴァがこのアダムと接触すると起こると考えられていたのが「サード・インパクト」である。しかし後に、これも虚偽であることが明らかになる。さらに、「セントラル・ドグマ」に存在していたのは、アダムではなく、リリスであったことも明らかになる。カバラ文献によれば、地上に最初に出現した男女は、同じ物質から同時に創造されたという。それがアダムとリリスである。





３８

昭和三二年公開。日活。脚本田中啓一、今村昌平、脚本・監督川島雄三、主演フランキー堺、南田洋子。これは落語の「居残り佐平次」を下地にした時代劇コメディで、川島が日活に移ってから初めて彼らしい力を出した作品。





３９

大正七年青森県生まれ。風俗喜劇、重厚な人間ドラマ、メロドラマなど、多様な作品を残している。特に松竹から日活に移ってから『洲崎パラダイス・赤信号』『わが町』などの作品を残した。『復讐するは我にあり』の今村昌平が熱烈に師と仰いだ監督。





４０＆４１

『エル・トポ』『ホーリー・マウンテン』等でカルトムービーの元祖として注目を集めた監督。ジョン・レノン、ミック・ジャガー、ウォーホル等に影響を与える。『ホーリー・マウンテン』は、様々な魂の遍歴の後にカルトリーダーとなった主人公が、聖なる山に上り、クライマックスを迎えるはずのタイミングで「これは映画だ」と、やった伝説の作品。





４２

小松左京のベストセラー小説のテレビドラマ化。映画の大ヒットの余勢を駆って、七四年一〇月～七五年三月放映。大地震で日本列島が沈没する特撮パニック作品。ドラマ化されたのは小説の前半部分。





４３

永井豪原作の、マジンガーシリーズ第二作。前作の最終回で、マジンガーＺをズタボロに叩きのめした敵を、軽く倒してしまったグレートマジンガーの登場シーンは、Ｚに夢中だった子供達に、圧倒的なショックとトラウマを残した。しかし、作風自体はハードで重く、しょっちゅうピンチになってはパイロットの剣鉄也はキビシイ顔をしていた。混血孤児で肌の色に悩む、グラマーなヒロインもディープ。





大泉　さっきの話まで戻りますが、宮崎駿作品は、どのあたりで嫌になってきたわけですか？

庵野　『トトロ』まではまだ良かったですね。『魔女の宅急便』あたりからかな。『紅の豚』はもうダメです。あれが宮崎さんのプライヴェート・フィルムみたいですけれど、ダメでした。僕の感覚だと、あれはパンツを脱いでいないんですよ。なんか、膝ひざまでずらしている感じはあるんですが、あとは足からパンツを抜くかどうか。パンツを捨てて裸で踊れば、いよいよ宮崎さんは引退を決意したかなと思います。

大泉　庵野さんは毎回パンツを脱がないと気がすまないでしょう。

庵野　自分のリアリティなんて自分しかないんですよね。うけなきゃもう裸で踊るしかない。ストリップしかないと思います。





奇形への愛着





大泉　お父さんの体のことでコンプレックスがあったという話ですけれど、例えば、『アニメージュ』のインタビューでも、ロボットを描いてもどっか身体の一部を消さないと気がすまないってお話でしたが。

庵野　奇形に対する愛着があるんでしょうね。どっか壊れていないと好きになれない。それは親父の影響だと思うんです。

大泉　エヴァもよく奇形になりましたよね（笑）。

竹熊　トウジは足がなくなったし。あれはなんで死ななかったんですか。

庵野　殺せなかったんですよ。

竹熊　やっぱり。

庵野　いや、あの、それはある約束があって、それを反ほ故ごにしちゃえばよかったなっていまになれば思うんですけれど……。４４キングレコードのプロデューサーの方と、いちばん最初にこの企画をやった時、「企画を出せば通す、どんなもんでも。庵野さんを信用してるから。でも、二つ条件がある。一つは、それで五年、ウチとつきあってくれ。劇場版はよそでとかってことはなしでね。もう一つは、子供を殺さないでくれ。大人は死んでもいいけれど、子供が死ぬのは嫌だ」と言われた。そういう条件があったから殺すことはできなかったですね。

竹熊　かなりギリギリまでコンテとか入れないタイプですか？

庵野　ええ。神様が降りてくるのを待ちますね。それまではダーッとそのことばかり考えていて、ギリギリになってパッとやり出す。いまだっていう時にやり始めるんです。「来た!!」って感じの時ですね。

大泉　一九話の時はそんな感じですね。

庵野　あれはすごく苦労しましたね。アニメの場合、どうしてもコスト・パフォーマンスを考えないといけない。作画で集まってくれた人の力量と、セル枚数、それからスケジュールなんかを全部トータルで考えて、どうすれば戦闘シーンがうまくできるだろうってことを考える。無駄なことはできるだけ避けざるを得ない。テンションを保つにはそこにこだわるしかないんです。止めで済むところは全部止めてしまって、動かすところは動かす。最小限の仕事量で最大限の効果を目指してます。

大泉　そういう理由でみんなどんどん不具者になってしまったんですかね。

竹熊　いちばんセル枚数を使ったのは一九話ですか？

庵野　そうですね。

竹熊　二六話に新作シーンがありましたよね。二五話の方は新作のセル画は使ってない？

庵野　三〇〇枚か四〇〇枚ですね。

竹熊　あとはいままでのフィルムを使っているんですか？

庵野　ええ、あったやつをですね。総集編のところも新作は五〇〇枚くらい。

竹熊　もう編集の極致ですよ。いままでのをうまく使って。パズルみたいに話を作ってる（笑）。





ガンダムの一話は最高





大泉　『アニメージュ』のインタビューの中で、（『エヴァ』の）一話が４５ガンダムの一話に勝てなかったということですが、それはどんなことなんでしょうか？

庵野　構成と脚本の部分ですね。あと、面白さです。ロボットが出てくるアニメーションとしてはガンダムの一話が最高なんですよ、第一話ということでは、一番シンプルに作って、一番いいところをついている。シンプルだから崩せない。４６富野（由悠季）さんでさえ、あの一話は越えることができない。あの見事な構成と脚本。カメラの持って行き方も含めてすごくきれいですから。何の疑間もなく普通の少年が……いまから見れば。〝アムロ〟って普通じゃないけれど、いままでと違った熱血タイプじゃない普通の少年が、ロボットに乗り込むっていうのをすごく素直に見せているんです。あれには勝てなかった。

　結局、なぜロボットに少年が乗るのかってことでダメだったんです。僕がとった方法論はとにかくわけがわからないうちに乗せてしまえってことですね。客が疑問を持つ前に乗せてから、アレよ、アレよと話が進んでしまう。それで終わらせるしかなかった。テンションの高いままでいきなり持っていくしかなかった。そうやってウヤムヤにして終わりにしてしまう。

竹熊　確かによく考えてみるとおかしいですよね。普通だったら乗らないでしょう。

庵野　そうですね。

竹熊　四話になって初めて乗らないで逃げるじゃないですか、シンジ君は。でも、それは正しいですよね（笑）。周りが異常なんです。オヤジを含めて。

庵野　ええ、根が気違い集団ですからね（笑）。

竹熊　これはちょっとオフレコでもかまわないんですけれど、自己啓発セミナーに行ったことがあるんですか？

庵野　ないです、それは。言われて、あっ、そういうものかって思ったけれど。

大泉　それは噂としてずいぶんあった話なんですか？

庵野　ええ、大塚英志さんが「『エヴァ』の最終回は自己啓発セミナー」とかって新聞で書いてしまったんです。それで皆そう思った。自己啓発セミナーを知らない人が大半だと思うんですよ。大塚さんがあんなふうに言ってるのを見ると、あの人は行ったことがあるのかなって思ってしまう。僕はそういうことは知らないんで、そうなんですかとしか言いようがない。この間、竹下通りで、新入社員の研修で、私の趣味はなんとかでって人前で大声でしゃべるのを見ただけで、ああいうのがそうなのかな。そんな認識しかないんです。





作品と他者





竹熊　それで最終二話を作り直すそうですけど、内容はまったくの極秘ですか。

庵野　極秘とかって言うより、まだ壊れたままなんですよ（笑）。

竹熊　でもアウトラインはあるんでしょう？　この間、チラッとプライベートで聞いてしまったけれど。

庵野　まだ、どうなるかわからないです。でもって、ことは決まっているので、それをなんとかつなげた上で、あとはビジュアル・インパクトですね。それから劇場（完全新作劇場版のこと）もありますから難しい。思いついた時のどっちを使うか迷いそうで。

竹熊　劇場版というのは、かなり違った話になるんですか。

庵野　そうですね。一〇〇分しかないんで、すごくシンプルな話になるでしょう。こじんまりしたものですね。キャラはいちおう出てきますが、性格設定がそのままとは限らない。これもまたほとんどこれからの作業です。テレビと同じものを見てもしようがないですからね。テレビの時と気分も変わっていますし、同じものにはならないでしょう。

大泉　それまで毎回、神様が降りてくるのを待つってすごいですね（笑）。

庵野　うん、そうですね。まあ、基本的に作家のやってることって、オナニー・ショウですから。それでしかないと思うんですよ。でも、あっちこっちに逃げたりはしますよ。あとは本を読んだりとかして、いいことがあれば発想が浮かんできたりする。座禅を組んで瞑想しているうちにハッとひらめくってわけじゃないですけれど。うろちょろしたりテレビを見たりはしますね。

大泉　結局他者とぶつかっても、最終的にオナニー・ショウになってしまう均衡みたいなものが今回のハイ・クオリティを生んでるんだという気がする。





絵になるオナニー





庵野　あとは下世話な話ですが、四畳半で一人シコシコやっているのが絵になるかっていう問題ですね。それが舞台の上に立って、パーッとやった方は、僕のオナニーはショウになりますっていうふうに。で、客は顔にかけてくださいってね、それで顔にかけてあげる。最終回はスペルマじゃなくってバケツの水をかけたようなものです。スペルマを待っていた人たちは「違うこんなんじゃない!!」と怒る。

竹熊　『エヴァ』を全編通して見た時に僕が思ったことを正直に言いますと、一話から二四話まで使って庵野さんはものすごい前ぜん戯ぎをやったんだと。とにかく手て練れん手て管くだの限りをつくして観客を身悶えさせたあげくに、いざ挿入、という段になって、二五、二六話でいきなり「セックスとは何か？」って議論を始めたようなものじゃないかと（笑）。そりゃ怒る人は怒るよね。でもセックスなんて射精したら終わりだってのも事実でしょう？　え～と、僕が何を言いたいかというと（笑）、庵野さんの中に作品を終結させることへの恐れがあったんじゃないかということなんですが。

庵野　今回はなかったんです。完成するかどうかが問題じゃなかったですから。やることがすべてでしたから。過程がすべてで結果は眼中になかった。僕は結果を求めてしまうタイプだったので、それが自分では嫌だったのかもしれません。

竹熊　それは客のウケとかですか。

庵野　そうですね。早い話、人にほめられるためにアニメをやるようなものですよね。

竹熊　でも、それはエンターテイメントとしては正しいんじゃないですか？

庵野　皆、俺をほめてくれっていうのが、こっちの頭の中にはある。で、そんな自分が嫌だったというのも当然あるわけです。とにかく、それを考えないで作っていって、あと非難を受けようが知ったことかって思ってましたけど、実際に非難を受けるのはやっぱりつらい（笑）。覚悟というか意識の問題だと思うんですけれど、つらいもんはつらいですね。

竹熊　問題はなんでそういう気持ちであの作品を作ったかってことですね。作品というのは本来、人に見せるものじゃないですか。『エヴァ』はとにかくカッコいい、本格ロボットアニメとしてスタートしますよね。ＳＦ的なオチを期待していたファンにしてみれば、あらゆるＳＦ的設定やドラマ上の伏線を無視したともとれるあの最終回はショックだったと思う。そこで監督個人が裸踊りをやってしまった時の非難はしようがないでしょう。でも庵野さんにとっては、もう自問自答で済む問題ではなかった。作らないと結果はわからないということですから。

庵野　そうですね。フィルムを作らないとわからない。作る過程で見えてくる。それがわかるのなら作品なんて作らない。そういう意味では自分自身の探求というのもあるわけです。結果としてそうなった部分も大きくて、最初からそんなこと考えないで作ったってことも大きいんですがね。

竹熊　初監督作の『トップをねらえ！』の時は完全にエンターテイメント・フィルムですよね。

庵野　そうです。

竹熊　あれも、ある程度予測がついていた？　こうすればウケるだろうみたいな予測はあったんですか。

庵野　ええ、こうすればこうやって泣くだろうというツボを心得た作りです。今回はそういうところがなかった。

竹熊　この先、どうするんですか？

庵野　たぶん、降りてくるのを待つしかない。いま、喪も中ちゅうの最中って感じなので。僕がね、あと一〇年生きてて、庵野さんはやっぱり『エヴァ』が最高だったねって言われるのは仕方がないと思う。僕の中では、それを避けるようにいくしかないと思うけれど。『エヴァ』の時に一番怖かったのは、『ナディア』の方が面白かったねって言われることだった。でも、今回は、それがなかったんでよかったです。この次からは『エヴァ』は面白かったねと言われることだけは避けたいってことですね。

大泉　それは恐ろしい話ですよね。

庵野　でも、もう先人の前例があるわけじゃないですか。それだけは避けられそうにもない。代表作は何って聞かれて、たいていの人が次回作だって言うけれど、それは仕方がない。そう言わないと作れないってことがあるから。『エヴァ』が最高だと思ったら、あとはもうプロデューサーしかやらない。監督はやめてますよ。もっとイキのいい人材にチャンスを与える仕事の方が、アニメーション業界全体のことを考えたら、いいに決まってますから。

竹熊　イキのいい後輩みたいなのはいますか？

庵野　ウチには、まだいると思うんですよ。外にもまだ若干いるでしょうね。でも、そんなにはいないでしょう。

大泉　後継者っていう意味では、宮崎さんもずっと後継者っていうことを言ってて……。

庵野　僕を欲しいでしょうね。宮さんは（笑）。

大泉　後継者と言ってるんだけど、どうも育っていない感じがする。

竹熊　育っているんですか、４７ジブリで。

庵野　いえ、ジブリじゃ育ちません。育つ環境じゃないですから。

竹熊　強力すぎますもんね。上が。

庵野　あそこは依存でできている会社ですから。まあ、宮崎さんがいなくなったらあそこはもう無力です。

竹熊　さいとう・たかをのいなくなったさいとうプロみたいなものでしょう（笑）。『もののけ』がこけたら大変ですよね。

大泉　それこそ金玉を見せるわけですから。

庵野　『もののけ』が来年の夏に終わりますかね。

大泉　最後に土下座をしてもいいから続けてほしい。

庵野　まとまらなくなったら、〝つづく〟にすれば男らしい。





アマチュア集団「ガイナックス」





竹熊　４８ネルフのことをスタジオ・ジブリだと論じた人もいますが（笑）。でも本当はネルフっていうのはガイナックスですよね。

庵野　そうなりますね。いわゆるアマチュア集団ですね。

竹熊　庵野さんが作品中のキャラクター全部に投影されているんだけれど、いちおう４９ゲンドウ（ネルフの司令官）の位置にいたわけですか。何を考えているかわからないけれど、とにかくスタッフは従わなくてはならない。

庵野　スタンスとしてはそこになりますね。そんなに投影しているかと思うと、そうでもないと思うんですよ。でも、５０シャドウであるのは確かですね。

竹熊　ドラマ的にいいますと、親子の確執ってことでは、戦いはまだ成立していないですよね。

庵野　そうです。あやふやです。最終話までとっておいたんです。そこでやろうと思って。

大泉　面白いと思ったのはとりあえず母親をみんな殺してしまいますよね。あれは庵野さんの母親像みたいなものの投影なんですか？

庵野　そうですね。

竹熊　あそこは僕と違いますね。僕の場合、父親が不在になるんですよ。僕の世代で父親との対決っていうのは珍しいと思う。

庵野　あれも本当の父親なのかって思いますね。まあ、父親という血のつながった親子じゃなくって、もうちょっと世間とかシステムの代表だと思う。だから、ああいう顔なんです。

竹熊　それでわりと、とらえどころがないんですね。

庵野　使徒っていうのもそうです。ああいうふうにとらえどころがないように見せるのは、僕の中で世間というものが、はっきりしなくて、敵の存在がはっきりしないから。

竹熊　ゲンドウは世間の枠や圧力そのものなんだ。

庵野　そうかもしれない。世間そのものかもしれない。





永井豪テイスト





竹熊　それから『エヴァ』の元ネタということでいうと、僕はてっきり『エヴァ』の設定は『バイオレンス・ジャック』に登場する５１スラム・キングから来てるのかと思ってたんですよ。

庵野　無意識でやっているんでしょうね。永井豪テイストはもう完全に入っているでしょう。拭ぬぐうことができない。『デビルマン』のインパクトが否定できなくなっている。それを否定してしまえば、自分の人生が根底からひっくりかえってしまう気がする。

竹熊　影響を受けたものはもう素直に出す。

庵野　そうですね。それしか自分の体にしみついているものはないわけですし。それを否定するだけのものが自分の中にあるわけでもないんです。つまんないものを作るくらいだったら、まだそっちの方がいい。





　第一二使徒襲来。迎え撃ったシンジは使徒の体内に飲み込まれてしまった。リツコはシンジの生命より、初号機回収を優先した使徒爆破作戦をたてる。ネルフがそこまでエヴァにこだわる理由は何なのか？　ミサトは感情を爆発させ、リツコに平手打ちを浴びせる。初号機の内部電源が切れるまで約一六時間。何もできないまま時間が過ぎていく。母親の胎内のように静かなエントリープラグ（コックピット）の中で、自問自答を始めるシンジ……幼くして母親を無くし、父親に捨てられた。そして自分の存在が他人にどう見られているか、いつも不安になった。悪いのは父さんだ。でも、父さんにほめられたい。それは依存にすぎないのか？　とにかくここは嫌だ。一人は嫌だ。

　死が迫っていること実感したその瞬間、シンジは我を失い、叫び暴れだす。「開けて、ここからだして！　ミサトさん、お願い、誰か助けて！」大声で泣き叫ぶシンジの最後の気力も尽きようとする時、光り輝く女性のイメージが現れ、シンジを抱き締めた。

「お母さん？」

　同時に唸り声をあげるエヴァ初号機。爆破作戦に入ろうとしていたミサト達の目の前に、球形使徒の影を引き裂いてエヴァ初号機が姿を現した。その底知れない力に、ネルフの人々は慄然とする（第拾六話）。





　北米ネバダのネルフ第二支部が突如消滅。そこで開発中のエヴァ参号機は本部に引き取られることになった。

　松代で行われる起動実験のために選ばれた四人目のパイロットはトウジ。シンジのクラスメイトは全員、パイロット候補として集められていたのだ。トウジは妹の治療のために、パイロットになる決意をする。そしてミサトは、そのことをシンジに告げられないまま松代に出掛けていった。

　起動実験中の参号機に異変が発生した。使徒に機体を乗っとられたのだ。トウジが乗り込んだまま、参号機は実験施設を破壊、暴走を続ける。

　初号機で出動したシンジは、トウジのことを知らない。が、人が乗っている参号機に攻撃できないでいた。

　指令を拒み続けるシンジに、ゲンドウはダミープラグによる初号機起動を強行する。そこにはレイのパーソナルデータが移植されているという……。

　初号機はシンジの意思を離れ攻撃開始。泣き叫ぶシンジをよそに、恐ろしい力で参号機をねじ伏せ、引き裂いた。ネルフ本部のモニターにシンジの絶叫が響いた。この凶暴な力こそエヴァ本来のものなのか？　それともダミープラグの中のレイの心が……。

　幸運にも参号機のパイロットは生きていた。しかし救助映像に、シンジは初めて残酷な事実を知らされる（第拾七、拾八話）。





　シンジは、トウジを傷つけたゲンドウとネルフを許せなかった。そして初めてゲンドウをはっきりと拒絶し、ネルフをあとにする決意をする。きっぱりとしたその態度に、ミサトもシンジを引き止めることはできなかった。

　その時、使徒が襲来。過去最強の戦闘力を持つ第一四使徒は地下に侵入。迎え撃つアスカの弐号機を破壊。レイの捨て身の攻撃も使徒に傷一つつけることさえできなかった。

　ネルフの絶望的な戦いを見詰めるシンジは加持に出会う。スパイ活動が発覚し、部署を外されたのだ。加持は小さな菜園の西瓜を世話しながら、静かに語った。

「シンジ君。俺はここで水をまくことしかできない。だが君には君にしかできない、君ならできることがあるはずだ。自分で考え自分で決めろ。自分がいま、何をすべきなのか。ま、後悔のないようにな」

　シンジは決断する。本部に向かって走り出す。表情に迷いはない。そして、ゲンドウに向かい、はっきりと言う。

「僕はエヴァンゲリオン初号機のパイロット、碇シンジです！」

　使徒はミサトたちの目前に迫っていた。最期かと誰もが思った瞬間、壁を破壊して初号機が躍り込み、使徒に体当たりした。決死の形相のシンジ。だが、戦いの最中、突然初号機は停止。活動限界がきたのだ。一方的に初号機を痛めつける使徒。胸部装甲板が吹き飛び、あらわになった胸には、なぜか使徒と同じ赤い光球が!?　そこに集中攻撃をかける使徒。反応のないレバーを動かしながら絶叫するシンジ。「動け！　動け！　今動かなきゃ、みんな死んじゃうんだ！　もうそんなのやなんだよっ!!」

　その時〝ドクン〟という鼓動が響き、初号機の目に光が戻った。そして信じられない力で反撃開始。使徒を蹴り上げ、引き裂き、餓鬼のようにその肉を貪る。雄叫びを上げる初号機は、さながら本能むき出しの獣だった。

　使徒と同じ光球を持ち、その肉を食らうエヴァは一体何なのか？　しかし、この事態さえ「シナリオ」に予定されていたことだと、ゲンドウは言う。謎は深まるばかりだった（第拾九話）。





４４

アニメサントラ界の老舗スターチャイルドレーベルのプロデューサー、大月俊倫氏のこと。詳しくは第二部参照。





４５

『機動戦士ガンダム』は、七九年放映の富野由悠季監督の出世作。第一話では、敵国ジオンのモビルスーツ〝ザク〟の侵入によって、軍はもとより民間人まで壊滅状態になったスペースコロニーサイド７で、偶然新型モビルスーツ「ガンダム」のマニュアルを拾ったアムロが、知人たちの死を目の当たりにしたショックから、ガンダムに乗り、ザクを撃破するまでが描かれた。





４６

書き割りのキャラクターではなく、内面や背景を描き込まれた、リアルなエゴを持った人間たちによる純文学的なドラマを、初めて本気でアニメの世界に持ち込み、しかもヒットさせた監督。

作品は『ガンダム』の他、『伝説巨神イデオン』『聖戦士ダンバイン』など。





４７

『天空の城ラピュタ』『となりのトトロ』などの作品を生んだ、宮崎駿監督の率いる「スタジオ・ジブリ」のこと。





４８

正確には「特務機関ネルフ」。国連直属の機関で、〝使徒″と呼称される人類の敵の調査・研究・殲ぜん滅めつを目的とする機関。





４９

碇ゲンドウ。主人公碇シンジの父。四八歳。「特務機関ネルフ」の司令官であるとともに、「人類補完計画」「アダム再生計画」（通称Ｅ計画）」「アダム計画」の遂行責任者。リアリストで、目的のためには手段を選ばないタイプ。





５０

ユング心理学の用語で、六つの「元型（アーキタイプ）」の一つ。シャドウとは、文字通りその人間の「影」に当たる人格で、通常、夢の中では「いやな奴」「見知らぬ男」等の姿で現れる。その人間の人格のネガティブな側面を表すが、同時に、その人格の存在を認め、受容していくことが、人格の統合の上で非常に重要であると考えられている。





５１

永井豪のマンガ『バイオレンス・ジャック』のヒール。はじめは、生まれつきの異常で筋肉が強すぎ、重い鎧よろいをつけていないと自分の筋肉で内臓を潰つぶしてしまうという説定だった。後に、スラム・キングは堕天使サタンが心の作用により創造した人間の一人で、サタンの破壊欲求の役割を果たし、最後のデビルマンとの戦いでは魔王ゼノンに変化する。





竹熊　５２村上龍の小説から名前を取ったりしてますよね。

庵野　５３『愛と幻想のファシズム』とか。あれのゼロが好きなんです。依存心の高い。村上龍も僕と同じで何もない人だと思う。すごく情けない人。

竹熊　すごく文体なんかもスタイリッシュでしょ。スタイルで読ませていくタイプ。

庵野　結局、そこでしかない。女に依存して自分を維持しようとしている情けない人なんでしょうね。

竹熊　村上自身を自己投影しているわけですね。ゼロというキャラクターに。

庵野　ゼロを否定しきれないまま終わってますよね。あれがまた情けないところが露呈していて、本人は逆を狙っているのかもしれないけれど、結局本音の部分がゼロに出ていて、すごくいい小説です。あとあれの中で、村上龍も依存型の口唇期だと思うんですよ。母親にやたらとこだわっていて、女にもやたらとこだわっている。女の胸で泣くってことにもこだわっている。あとはやたらと父親を排除しようと考えてますよね。エディプス・コンプレックスの話だと思うんですよ。

大泉　システムを破壊しようという、根源的な欲求がありますよね。

庵野　そうです。父親を殺して母親を犯すというエディプス・コンプレックスの話ですけれど、僕もこれをスタートする時同じだなと思った。シンジが父親を殺して、母親を寝取る話ですから。

大泉　巨大化した母親（笑）





幸せは幻影





庵野　ロボット——ということで置き換えることはしたけれど、オリジナルな母親はロボットで、同年代の母親として綾波レイが横にいる。実際の父親も横にいる。全体の流れをつかさどるアダムがもう一人の父としてそこにいるんです。そういう多重構造の中でのエディプス・コンプレックスなんですよ。やりたいのはそこだった。『愛と幻想のファシズム』なんです。思想的なところではこの小説と同じところはあると思いますね。あれを読んで、話がちょっと進んだっていうのはあります。

　一番感動したのは、あそこで鈴すず原はら冬とう二じという主人公が、いまの総理大臣を殺そうとした時にすごく父親みたいな感じがしたんです。俺は父親を殺し、日本っていう母親を犯すんだって思う。それで日本を破壊していくわけです。そのくだりがすごく好きなんですよ。あれが村上龍の本音が出ていて好きなんですよ。小説自体はすごくつまらないけれど（笑）。

　冬二が自分のスタッフを軽蔑する瞬間というのもわかるんですよ。僕もそういう瞬間が自分の中に一度ありましたから。その時、初めて監督という立場がわかったような気がしましたね。僕は監督兼プロデューサーという地位で、スタッフは僕に依存するしかない。それはシステムとしてしようがない。僕と同じ位置に身をおくことのできる人はいない。監督兼プロデューサーというのは独裁者でありしようがないんですけれど、それはそれで孤独ですよね。

大泉　その時にゼロだけが自分と同じ位置にいて、親近感がわいてくる。

庵野　そうですね。他から見ればイリュージョンでしかないんですが、しいて言えば幸せってこと自体が僕はイリュージョンだと思うんです。人間は孤独であることからは脱することはできない。孤独を忘れることしかできないわけです。その瞬間が幸せなんですから。それが最近の結論ですね。そのためにはアニメを見るのもいいし、女と寝るのもいいし、そういうことをしている間は孤独から逃れられれば幸せなのかもしれない。酒を飲んでグデングデンになっている時、俺は一人じゃないって思えれば、それはイリュージョンなんだけど、幸せなんですね。

大泉　妙に何かを育てるのがいいって、５４スイカを育てるのがあるでしょう？　ああいうのもある種の幻影なんだろうけれど、そこに逃避している瞬間は、とにかく幸せなんですかね。

庵野　幸せがすべてイリュージョンだってことを認識してしまえば、それはそうなのかな。

大泉　僕には最近子供ができてすごくかわいいなって思っているんですが、これは脳内ホルモンの作用もあるんだろうなって冷静に思っている自分と、本当に子供をかわいいなって思っている自分がいる。その二つがけっこう乖かい離りしているんです。子供にある部分を逃避している。ただ、何秒か救われている時が幸福なんです。

庵野　その瞬間に幸福なら本人の中では本物なんだろうと思いますよ。





唯脳論へ





大泉　『エヴァ』のテンションの高さでは、ある種の脳内ホルモンが出ていると思いますか？

庵野　そうでしょうね（笑）。精神分析の本をバーッと乱読して、いまはそっちに行きました。脳や薬物の本に興味があって、聞いたところによると村上龍もそうだっていうことですから。

竹熊　村上龍は米軍ハウスの時代を通過している人だから。さんざんやっているわけですから。

庵野　でも、あの依存心の高さはすごいです。それを否定しようとするぶざまなところがいい（笑）。親近感があります。こんなことを言うと、本人にすごく叱られてしまうと思うんですが。

竹熊　本人はそんなつもりはないと思いますからね。キューバ音楽とか言ってますけれど（笑）。

庵野　ジャズにだまされたとか。５５『すべての男は消耗品である』というのを『エヴァ』が終わってから読んだんですけれど、なんか読んだら、典型的な依存心の高さを実感した。あの文庫本は山田詠美のあの解説のオチを含めてよかったですね。情けないところが山田詠美に全部暴露されているみたいで（笑）。そのスタイルがなかなかよくって。村上龍が努力せずにこんなになったって書いているみたいだけど、すごい努力の人ですよ、彼は。そこまで自分を追い詰めて敵を作って、敵と自分という存在を認知しないと、プライドが維持できない。それは寂しい生き方かなとは思うんです。敵を作ることしかできないんだから。ネガティブで僻ひがみ根性の固まりみたいなものですよね。

大泉　敵を作るのが幸福の一つのあり方って言うか、何かないとアドレナリンとかが分泌しないってことですよね。そういうところにいまは行かれている。いろんな脳内物質の研究に入っているわけですか？

庵野　そういうところに行きつつあります。精神分析もやりましたし、本も相当読みました。

大泉　僕も『夢学修行』って連載を『鳩よ！』でずっとやってて、この前５６筒井（康隆）さんと対談したんですが、結局、精神分析にしろ科学になりえない文学じゃないか、そうなってくると、やっぱり立花隆が最近やっている化学工場としての脳っていうところに行き着いて、その先は養よう老ろう孟たけ司しの唯ゆい脳のう論ろんになっていくのかな。

庵野　くそー、同じ道をたどるのか（笑）。

大泉　養老さんとも一回話したことがあるんですけれど、脳の新皮質が言語を操るから、旧皮質については新皮質は説明できないんだそうです。だから、何かが降りてくるというのは旧皮質から新皮質へ突出してくるということなんです。それに関しては新皮質は干渉できない。

庵野　そこでユングはＵＦＯとかあっちへいっちゃってスポイルされたんですね。

大泉　そうですね。緊張感がそこで弱まると、もう宗教へ行くしかない。

庵野　世間から遠ざかるしかないんですから。でも、言葉にならないとそっちへ行っちゃうと思うんですよ。

大泉　緊張感をどれだけ維持できるかってことだと思いますが、どこを接点にしていくかとか。

竹熊　僕はお笑いに行ったんですけれどね。

大泉　なるほど。でも、脳内物質が出てくるとどんなことになるのかな。

竹熊　『エヴァ』自体もＡ10神経とか、多少脳がからんでいますよね。

庵野　そうですね。そのハシリというか、素養があったってことでしょう（笑）。ＮＨＫでやってた『人体』のシリーズですね。あれを見て、あっ、なるほどって思った。でも、実際には５７〝パイルダー・オン〟みたいじゃないですか。

竹熊　『マジンガーＺ』のね。主人公が乗り込むエントリー・プラグが、まさにそれですね。

庵野　人の心を加えた時にっていう、あれですよね。いまどきカシャンとなって頭にマシンというのもアレだなって思いまして、脊せき椎ついのところにさし込むという型で……。〝パイルダー・オン〟をいまふうにやっただけなんです。





死海文書





竹熊　あと５８死海文書ってその辺の本屋で売っているじゃないですか。あれは『エヴァ』の中の文書とその辺で売っている文書とでは違いますか。

庵野　違いますよ。死海文書でいいなと思ったのは公表されていない部分があるってことです。

竹熊　ええ、ありますね。あれは何百巻もあるはずですから。

庵野　キリスト教の根本がゆらいでしまって、いまのキリスト教も為い政せい者しゃが自分の都合のいいように編成したんですよね。旧約も新約もそうですよ。ものの本によればバラバラじゃないですか。いちばん最初に言語化＝体系化したのがあれで、アダムとイブの話だって、あれは男尊女卑の考えを植えつけるためにあとから勝手に作ったわけみたい。普通なら、女から作りますよ（笑）。

大泉　５９『リグベータ』とかはどっちなんでしょうね。比較神話学なんかやると、そんな話は全部相対化できますからね。

庵野　そういうのも含めて、死海文書というのは隠されている、意図して全部出していないというのが良くって、その隠された部分は何だろうっていうところから取ったわけです。





我々には時間がない





竹熊　本放送の時点で一二話くらいしかできてなかったという話ですが。

庵野　ええ、それも作画ができたっていうだけで、フィルムとして完成していたのはわずか数本。

竹熊　もうその時点でやばかったわけですね、かなり。

庵野　そうです。一年半から二年かけて一二本ですから、残り半年でもう一四本。三分の一から四分の一のスケジュールで後はやらなきゃいけない。

竹熊　『エヴァ』のファーストＣＤの解説で、庵野さんはじめスタッフの皆さんがパニクってる、というのを書いているじゃないですか。みなさん悲壮なことを書いていますよね（笑）。我々には本当に時間がないとか、オンエアの始まってしまった日とか、これは相当切せつ羽ぱ詰まってるなと思った。

庵野　オンエアが始まった時にもう崩壊が見えていた（笑）。

竹熊　その時に、大規模な戦闘シーンがあと何回しかできないってもう読めた？

庵野　そうですね。二五話では大規模な戦闘シーンを予定していたんですが、一九話の作業前にもう無理だってことがわかった。戦闘シーンができないんですよ。それで戦闘シーンを外したプロットでできるか検討してみたけど無理で、戦闘シーンはもうセリフで見せるか、リピートのへなちょこな絵で見せるしか方法はなかった。もうダメだっていうのが僕の中でありましたから。

竹熊　最後の方で、６０ゼーレ委員会がモノリスになっちゃうじゃないですか。あれもなんかスケジーュルと関係があるんですか。

庵野　あれは人間のイメージから外れていったんです。

竹熊　二〇話以降の『エヴァ』というのは、もうかなりインナースペースものになってきますよね。

庵野　どんどん抽象化してくる。もう人の形じゃないなって気がしましたから。意識的なものに行くっていうのは。最初は６１『謎の円盤ＵＦＯ』の宇宙局の委員会。ＳＨＡＤＯシャドーからすれば嫌味な連中、僕から見たらスポンサーですか（笑）。基本的には僕もインナースペースで置き換えですから、最初はそういう局の人とか代理店の人というイメージだったんですけれど。

竹熊　このへんはオフレコですね（笑）。

庵野　『王立』『トップ』『ナディア』の時とかの、過去に文句を言ってきた嫌味な連中というイメージがゼーレ委員会にはあった。そこで突き上げをくらう碇ゲンドウ。俺たちには時間がないとかってことでそこからスタートしたわけですけれど、そういう狭い世間から外れていた。最後は人から外れたってことですね。そういう生身で嫌味を言う小さい人間だなっていうことです。





デビルマン





竹熊　エヴァの羽は一二枚ですよね。あれは６２ルシファーですか。

庵野　そのイメージです。結局『デビルマン』から離れないと思うんですよ。でもしようがない。

竹熊　でも別にそれはそれでいいんじゃないですか。

庵野　僕の中に破滅願望があるんで。永井豪さんが６３『ハレンチ学園』で世間に叩かれて、それから社会に対する不信感がずっと自分の中にあるって言ってますよね。あれは僕にもなんとなくあります。こういうものを作っていると相当非難がありますから。

大泉　僕がエホバにいた時に、『デビルマン』を何回も読んだ。それまではエホバで神からの世界史観しか教えられてこなかったのが、悪魔から見た世界史観っていうのもあっていいと思ったし、そういう正当性があるんじゃないかっていう認識に触れて、あの作品を読んだのは、ホント革命的な出来事だった。だからどうしても『エヴァ』を『デビルマン』として見てしまうというのはあるでしょう。

庵野　永井さんは前にも後にも『デビルマン』の人だと思いますが。『バイオレンス・ジャック』も、とてもよかったですけれど。

大泉　そういう意味で『エヴァンゲリオン』も『デビルマン』的なオチなのかな。

竹熊　やっぱり、あの手の話をきれいに終わらせようとしたらあれしかないだろうね。

大泉　僕はテレビ放映の時、これが『デビルマン』的に落ちなかったから、どうなるんだろうって心配だったわけですよ。

庵野　『デビルマン』になるんですよ。話はあれしかないんです。

大泉　でも、『デビルマン』を超えるとなると、これは大変なことでしょう。

庵野　あと、マンガの『ナウシカ』の七巻ですね。

竹熊　あれはすごい。価値の逆転をやりましたよね。

庵野　あれが僕と同じものだって感じがしたんですけれど、あの後は『ナウシカ』も、もうきちんとしてしまって。しようがないんですね。『ナウシカ』の七巻と同じテーマでやらなきゃしようがない。

大泉　あれは生きていけないわけですよね、旧人類としてのナウシカが。

庵野　共生を否定しましたね。自分達が生き残るためにナウシカは血で汚れて、よかったです。忌み嫌っていた巨神兵の火で破壊しなければいけない業ごうの深さ、これがいいんですよ（笑）。もう、いつわりのない宮崎駿のポリシーが出ていてとにかくあそこではパンツを脱いでますから。マンガではパンツを脱いでチンチンを立てている（笑）。同じことをやってくれるように『もののけ姫』では期待している。いくら小さいとはいえ、やっぱりチンチンを立ててもらわないと。大きい小さいは関係ないんだから。立てたチンコの心意気ですよ。人前で立つってことはたいしたもんですよ。それでどんなに小さくても胸を張ってショウを見せるのがすごいわけです。

大泉　今日の結論はどうしてもそこへ行きますね（笑）。

竹熊　まあ、それしかないわけでしょう。ものを作る仕事の場合、パンツを脱いでチンチンを立てる……。

庵野　自分のチンチンをですよ。

竹熊　それをみっともないと感じる人が当然いるわけです。そういう人はもう関係ないっていうことですか。

庵野　いや、みっともないとは思いますよ。でも、やるんです。みっともなくてもかまわない。自分のチンチンが小さいのは、これはもうしようがないことだから。かといって、そこでペニスケースとか電動コケシでごまかすっていうのもダメ。小さいからといっても代用品で女を喜ばせるのはどうかと思う。

竹熊　結局、現代を生きる我々には真のオリジナルなんて存在しない。もし唯一あるとすれば、オリジナルは自分自身しかない。もう、それでパンツも脱ぎましょうってことなんですよね。でも、オリジナルが自分しかないってことで自分自身を出すのは、オリジナルをどっかで信じていることになる。

庵野　そうですね。

竹熊　でも、オリジナルなんて概念は人類が生み出した幻想であって、最初からそんなものはないんだってことで開き直ってやる方法がありますね。なぜ、そういう方法は取らないんですか。

庵野　最後に自分にすがっているわけですよ。





ＡＴフィールド





大泉　すごい自己言及的なものが庵野さんにも竹熊さんにもあると思うんです。

竹熊　そういう傾向が僕らの世代にはありません？

庵野　まあ、自分を知りたいんですね。

竹熊　自分があやふやで規範がないから、自己に言及するんです。

庵野　世間もあいまいですよ。あいまいな部分はいっぱいある。そのあいまいさが気持ち悪い。アニメファンも、オウムだってみんなモヤモヤしている。世間がそれらの価値観を決めているんです。オウムだって事件を起こす前はモヤモヤしているものだったでしょう。

大泉　僕はいまオウムの中に入ってますけれど、いまだに非常にあいまいですね。もう十人十色です。いろんな人がいるんだけど、世間がオウムとはこういう集団だって、断定しちゃってるから。

庵野　アニメファンも、アニメ業界もあいまいですから。そう言ってみると、日本全体もあいまいなんです。そういうのが嫌で自分と世間のボーダーを作ってみたいというのがあった。作品の言葉で言えば６４ＡＴフィールドなんですけれど、自分と他人との境界線を踏み込んでくるものを切り裂いたり、排除したりするパターン。心の壁っていうのかな。

大泉　僕もメディアが持っているあいまいさが信用できなくて、中に入って取材して書くしかないと思っているんです。そういうことを延々とやっている。いまのメディアの中では到底僕の発想ではやっていけないから、もう、一人でジクジクとやるしかない。自己言及的なノンフィクションですね。自己言及をしない奴は信用できないってとこがある。

竹熊　ただ自己言及ってどっかで行き詰まるんですよ。他人にしか見えない自分もいるからね。自己言及できる範囲は限られています。客観性がないですから。自分がオリジナルだと思って、皆が自己言及的にものを作っても、それらが最終的には皆似てくるんです。そういう問題はどうですか。

庵野　それはやっぱり仕方がないと思いますね。同時多発的な事件ですから。僕らの世代は共通体験が同じじゃないですか。僕らの世代のヒーローは〝とんねるず〟なんです。〝とんねるず〟のやっていることは昔のパロディみたいなもんでしょう。

竹熊　最初の頃は特にそうだった。山田邦子もそうでした。

庵野　パロディから出発して自分のものを乗せていく。『ハンマープライス』にしても、他の番組にしてもそうですね。彼らは行き詰まったら、自分の体を動かしてサッカーとかやる。自分でチームを作ってね。そういうテレビ中継をショウにする。結局、自分の趣味に行く。

竹熊　ビートたけしはどうです？　世代的には少し上だけど、僕にはすごくシンパシーがあります。

庵野　いいと思います。かっこいいですよ。映画撮ってる方がいい。

竹熊　たけしも自己言及の人ですね。

庵野　あの人も血を流している。

竹熊　筒井康隆はどうです？

庵野　あんまり読まなかったけれど、読んだ本は面白かった。

竹熊　あの人もメタ小説をやって行き詰まるじゃないですか。

大泉　絶筆前に『パブリカ』って夢の物語を書いているうちにどんどん無意識の方に入っていった。麻原がＬＳＤを飲ませてやったのと同じように、自己崩壊したあとの風景を見てしまって一晩で髪が真っ白になったそうです。言語化できない恐ろしい部分を見てしまって、恐ろしい方に入ってしまった。筒井さんは僕に、自分の夢はあんまりいじらない方がいい、恐ろしい目にあうよって一貫して言っている。





放映終了後の不安





庵野　なんか、ものすごく怖い考えに捕われたことが一回だけある。それが終わってからすごく鬱うつが激しくなった。死にたくなるなんてこともあって、愛を求める絶望的な叫びって言うんですか（笑）。そこまで行って、自分の孤独に耐えられなくなって、先がまったく見えなくなったんです。『エヴァ』が終わったあとですから、いまから一カ月前ですね。その時にガイナックスの屋上の辺に立って、実際に飛び込めるかどうか試してみた。死にたい気分じゃなくって、本当に死にたいのか、それを試した。その時は死ぬのが怖くて痛そうだってことで、物理的な苦痛から退しりぞいたんです。その後、オイオイ一人で泣いて寝たんです。そんな状態を引きずって打ち合わせに出席して、何も頭に入らない。とにかく気が狂いそうになって、どうしたらいいのかわからないって打ち合わせの席上で言い始めてしまったこともあります。その後、一人になってみようと思って久しぶりに自分のアパートに帰ってみたら、もう恐怖そのものみたいな感じに包まれてしまって、本当に自分の存在が消え失せてしまうように感じられて、言葉にならない。このままだと自分が何をするかわからないんで、着替えて外へ飛び出して、「タクシー！」って大声で叫んでから、ここ（ガイナックス）に来て明かりの中で人に近づいてね、自分を落ち着けることにしたんです。

竹熊　前に庵野さんに会ったときは、ちょうどそれがまだ残っていたんですね。いまにも死にそうな顔で、すごかったですから。

大泉　その話を聞いて来たので、今日はこんな安定した話になるとは思わなかったです、正直な話（笑）。

庵野　さすがに一カ月経って喪中って感じもだんだん持ち直していった。まだ残っている部分はありますけれど。

大泉　無意識から出てくるものを徹底的に拾ひろおうとしていじる作業だと思うんですよ、物を作るってことは。

庵野　いまではいい体験をしたとは思いますけれど。あれはよかったです。

大泉　でも、またそこへ行って死ぬ思いをして作るってことですよね。

庵野　あの時はこんな思いをして死ぬくらいだったら、もういいやって思ったけれど、いまになってみれば、よかった。なかなかいまの日本でこんな経験ができるなんてないですよ。

竹熊　僕は二〇代の頭にＬＳＤを一回だけやったことがあるんです。ものすごい効きくのをやってしまって、前半は天国、後半は地獄だった。それこそ〝気が狂う〟というのはこういうことなんだと実感できた。あれもいまではいい体験だったって言えるけれど、二度とやりたくない（笑）。

庵野　ヤクがなくてあんな体験ができた僕はナイスでしたね（笑）。

竹熊　『ナディア』が終わったあとの気分とはまた違ったものだったんですか。

庵野　あの時も、ここまでひどくはなかった。

大泉　回復するっていうのは、すごいですよ。

庵野　時間が解決するんでしょうね。

大泉　僕もオウムで修行をやっているとおかしくなるんじゃないかって思う瞬間がある。そんな時は部屋に立てこもる。まだ、自我崩壊まではいっていないけれど。自己の投影であるにせよ。僕は他人を描写しているって感じがありますから。自己言及的な傾向がまだ弱い部分もあって楽をしている。それがなかったらかなりきつい。いまも修行体験中ですが、信者の中には自我が崩壊して発狂する人もいるんです。自衛官とかは秘儀瞑想法を麻原から教えられても、やらないらしいんです。女とか酒の方がいいから。そんな奴を悟りに導みちびくと言って、麻原はＬＳＤを飲ませてたわけでしょう。薬で見せれば地獄のあることを納得する。そこで救えるのは自分だけだとビデオで繰り返す。自衛官がオウムに協力したのはそういう理由です。

竹熊　ホント、薬のパッド・トリップはハンパじゃないですからね。薬飲んで近所の公園に行ったんです。最初は『二〇〇一年宇宙の旅』みたいなんだけど（笑）、そのうちものすごく耳が良くなる。子供が上げている凧たこの糸が響く音も聞こえた。木の枝にヒモがひっかかっていて、そこから自殺という想像をしてしまったらバッドの方に行ってしまった。それからは地獄の苦しみです。まあバチが当たったんでしょう（笑）。日本では絶対にやらない方がいいですよ。こんなことでお巡りさんに捕まるなんて割に合わないから。クスリやって実感したのは、人間っていろんなもの（常識）にとらわれていて、とらわれることによって自分を守っているんだなってことですね。そこから外はずれることの恐怖ってすごいです。だって公園で遊ぶ子供の声がサルの声に聞こえたりするんだから（笑）。

庵野　今度アメリカに行った時に、ちょっと頼もうかな（笑）。帰ってこられなくなったりして（笑）。

竹熊　身の安全は保証できないですよ。まれに、躁そう鬱うつ状態でやると、そのまま頭が壊れたりしますから。

大泉　元オウム信者で精神病院に入院している人もいっぱいいます。

竹熊　リテイクの作業にはそろそろ入るんですか？

庵野　ええ、やらなきゃならないです。

竹熊　庵野さんがちょっとおかしくなったというのも、オフレコですか。

庵野　いや、まあ、別にいいですけれど。

大泉　すごいものを作る余波っていうのはこういうことなのかもしれない。

竹熊　監督っていうのは、しんどいでしょう？　精神的にも体力的にも。

庵野　人によりけりだと思いますよ。アニメの制作過程で監督っていうのは、何もしないで済ませられる。どこまでも手を抜くことができるんです。

竹熊　監督の仕事っていうものには、どんなものがあるんですか？

庵野　基本的にはＯＫとＮＧの判断です。ＯＫを出すのは、盲めくら判ばんで済むわけですよ。オールＯＫなら監督を通さないでいい。そういう名前だけの監督さんが現にいますからね。

大泉　ＮＧを出すのってものすごい直観力が必要ですね。直観力の、無意識の力のものすごい消耗。

竹熊　まじめにやろうと思ったらすごい大変じゃないですか。

庵野　ＮＧを出した場合が問題なんですよ。どうするかって考えないといけない。宮崎さんならそんな場合、自分で全部やってしまう、絵を描けるから。あそこまでやると、でもすごく大変なんです。僕の場合、自分で描ける範囲は描いてしまう。脚本も絵コンテも直してしまうんですよ。色を決める時もある。設定も自分でやらないといけない。こうなると、どこまでも抱かかえ込んで自分の仕事を増やすことになるんです。

竹熊　溝みぞ口ぐち健けん二じ監督っているじゃないですか。彼の場合、ＮＧがすごかったらしいです。自分では、やらないで、人にやらせるみたいだったから、何百回も果てしなくダメ出しするタイプ。

庵野　人にやらせるより自分でやった方が早かったり、自分しかできなかったりする場合はやっぱり自分でやりますよね。

竹熊　溝口監督の場合は自分ができる範囲以上のものをやってもらわないと納得しなかったらしいんです。だから、自分がイメージした通りのものでもダメ（笑）。となってくると、もうメチャクチャなことになってきますよね。

庵野　僕も、もっといいものを出してくれって思う気持ちがあるんですけれど、それは時間が許さないですから。あとはどこでいいやと判断するかがポイントです。ダメ出ししてやり直してもらうほど、いいギャラを出してないんですよ（笑）。そうなったら自分でやるしかない。

竹熊　『ナディア』の時も、すごい作り直しがあったって話ですけれど。

庵野　基本的にスタンスは全部変わっていないですよ。時間とクオリティ、予算とのせめぎあい。そういう問題ですね。

竹熊　でも、周りがそれを許す状態にあるかどうかってことが大きな要素になりますよね。

庵野　ウチ（ガイナックス）は特殊だって言われたことがあるんですけれど、その特殊な環境を維持するのはものすごい努力がいるってわかってますから。この環境を保っていられるのが、よそと違うところですね。もともとは岡田さん達と作った土壤なんですけれど。

竹熊　岡田さんはいまのガイナックスや『エヴァンゲリオン』に関しては結構醒さめてますね。

庵野　そうならざるを得ないんでしょう。

竹熊　僕も『エヴァ』を見て面白いと思ったし、岡田さんもそう思ってるに違いないと思うけど、つい最近まで最終回は見なかったですからね。

庵野　それはつらいと思いますよ、『エヴァンゲリオン』は。僕の前ではほめますけれど、つらいんじゃないのかな。

竹熊　かなりアンビヴァレンツに見てるみたいです。「『エヴァ』は世界一カッコいいアニメだ」と言う日もあれば、やっぱり庵野は格好だけだって言ったりもする。

庵野　『エヴァ』の面白いところって、あの作品を見た感想というのが、その人の本質的な部分なんですよ。その人が持っているいちばん強い部分が『エヴァ』の評価で出てくる。カッコよさだけが、って言う人は、自分がそういう人間だってことなんです。心理学的にその人の本質が見えてくる。

竹熊　ロールシャッハ・テストみたいになっているんですね（笑）。全部説明しきっていないところが逆にいいのかもしれない。各人がそれぞれ補ほ完かんしていくから。正解は各人それぞれの心の中にある。

庵野　残りの作業は見る人自分達の作業に回してしまっている。そこの関係を重視しちゃっているんです。ある程度のところまでいったら、あとは自分で答えを判断してほしい。あいまいなところを残しているんですけれど、そのあいまいさを自分がどう見るかってことですね。その人のキャラクターが出てくるとしたらその部分です。

　一〇人いたら一〇人がほめるとかじゃない。それもある意味、日本的ですよ。

竹熊　すごく勝手な希望なんですけど、『エヴァ』はうまい具合に未完のまま着地してほしいですね。未完のものの方が僕は完璧だと思っているから（笑）。

庵野　きれいに畳まないで、おおざっぱに三つくらいに畳む。

竹熊　そうすれば、見る側の参加する空間が生まれるじゃないですか。キューブリックだってそうじゃないですか。『二〇〇一年』って、全部説明のテロップを外したんでしょう、最後の最後で。

大泉　６５『カラマーゾフの兄弟』も未完ですし。なるほど、楽しみですね。これからどうなるかってことなんでしょうけれど（笑）。

庵野　さて、どうなるんでしょうね（笑）。

（九六年六月一九日、ガイナックスにて）





　暴走した初号機は回収されたが、シンジはその体内で一体化していた。

　リツコはシンジのサルベージを計画。プラグ内に保存されているシンジの身体成分を再構成し、そこに魂を定着させるのだ。だが、これと同じことが一〇年前にも行なわれ失敗しているという。その時エヴァに取り込まれた人物とは……。

　シンジの魂はプラグの中を漂い、自問自答を続けている。ゲンドウへの気持ちを整理できず、自己肯定できずに不安定な自我を持てあますシンジ。そこにミサト、アスカ、レイのイメージが次々に現れ、自我を捨てて自分と同化するように誘う。「私とひとつになりたい？」混乱を深めるシンジ。

　その時、サルベージ進行中のプラグのハッチが突然開き、内容物が流出してしまう。

「シンジ君を返して！　返してよ！」

　絶叫するミサト。シンジはその泣き声を遠くに聞く。それはシンジの誕生を祝福する、父と母のイメージにだぶっていく……。





　両親の声に導かれるように、光に向かって泳いでいくシンジのイメージ。その顔に迷いはない。そしてシンジは再びミサト達のもとへ還ってきた。翌日の夜、ミサトと加持は安ホテルのベッドで激しく抱き合っていた。ミサトは加持に、ネルフの秘密を問う。加持はそれには答えず、一粒の錠剤をミサトに託すのだった（第弐拾話）。

　一方、ゲンドウヘの不信を募らせたゼーレは、加持を使って冬月副指令を拉致した。ゼーレの尋問を受ける冬月は、ふと、ネルフのすべてが始まった過去へと思いを馳せる……。

　一九九九年京都。大学で教鞭をとる冬月は、優秀な生物工学の学生、碇ユイを知る。そしてユイに近づくきな臭い男。若き日のゲンドウだ。可憐なユイがゲンドウと付き合い始めたことが冬月には不思議だった。ゲンドウは彼女の才能とバックの組織を目的に近づいたという噂も聞く。その組織の名はゼーレ。

　やがて二人は結婚し、二〇〇〇年、セカンドインパクトが起こる。この原因にゼーレが関わっていることを冬月は知っていた。そしてゲンドウから知らされる「アダム再生計画」、エヴァンゲリオン建造……。

「冬月……オレと一緒に人類の新たな歴史をつくらないか」

　二〇〇四年。エヴァンゲリオン初号機の、何らかの実験が行われた。この実験でエヴァに乗ることになったユイは実験場に幼いシンジを伴っていた。

「この子には明るい未来を見せてやりたいんです」

　それがユイの最後の言葉になった。実験は失敗。イレギュラーな事件は、ユイをこの世から消し去った。

　この結果を心密かに願っていた人物。リツコの母、赤城ナオコ。彼女はゲンドウに思いを寄せ、密かな関係を続けていたのだった。しかし、いつの頃からかゲンドウが引き取り、養育しているユイに生き写しの少女、綾波レイによって、ゲンドウが自分を道具としか見ていない事実を知らされる。

「バアサンはしつこい。バアサンは用済みだ」

　激情に駆られたナオコはレイを殺し、自らも命を絶った。

　再び二〇一五年。捕らわれの冬月を救出したのは、拉致の手引きをしたはずの加持だった。

「真実に近付きたいだけなんです。僕の中のね」

　しかし、その直後。

　ミサトは加持からの留守電メッセージを聞く。

「真実は君と共にある。迷わず進んでくれ。もう一度会うことがあったら、八年前に言えなかった言葉を言うよ」

　号泣するミサト。彼女にはわかっていた。加持は既にこの世にいないことが（第弐拾壱話）。

　その頃、一見明るく勝ち気に見えるアスカも、精神的な試練を迎えていた。母親の自殺を目撃した幼い日から、能力に対するプライドだけを存在理由に生きてきたアスカ。しかし、自分の中の、他人を求める弱さを否定して身を固くする彼女は、パイロットとしてのシンジに対する敗北感から精神の落とし穴にはまり、エヴァとのシンクロ率を低下させていたのだ。

　そして、はるか衛星軌道上に現れた第一五使徒による心理攻撃は、さらにアスカの心の奥深くを掘り返す。

「いやああああっ！　私の中に入ってこないで！」

　アスカの中に蘇る忌まわしい記憶。「ママ！　お願いだから私を殺さないで」。

　ゲンドウは、アダムを貫いているロンギヌスの槍を使うようレイに指示。レイによって投げ放たれた槍は、一瞬で宇宙に到達。使徒を撃破した。

　辛うじてアスカは無事だった。しかしトラウマを暴かれ、支えを見失ったその心の傷は深い（第弐拾弐話）。





　人の心に直接触れようとし始めた使徒。第一六使徒は、迎え撃った零号機と一体化し、レイを直接侵食してきた。レイを襲う苦痛と快感。レイの心に、レイを象った使徒が語りかけてくる。

「一人でいるのがイヤなんでしょ。それを寂しい、というの。それはあなたの心よ。悲しみに満ち満ちているあなた自身の心よ」

　レイの膝の上に零れる液体。

「これが、涙？」

　レイは初めて自分の心を自覚する。

「碇君と、いっしょになりたい」

　レイの救出にむかう初号機にまで侵食しようとする使徒。レイはシンジを守るために、使徒ごと自爆した。

　翌日、悲しみにくれるシンジたちの前に再び現れるレイ。だが、彼女は以前のレイではなかった。

　一方ミサトは、錠剤に隠されていた加持のメッセージを読み、彼の遺志を継いで、ネルフの真実に向かい合う決意をする。

　その頃リツコは、全裸でゼーレの査問を受けていた。レイの査問を拒否したゲンドウによって、かわりに差し出されたのだ。解放されたリツコは、シンジを呼び出し、本部の地下深部へと向かう。そこに待っていたのは、銃を向けるミサトだった。「ここの秘密、この目で見せてもらうわよ」

　リツコが二人を案内した場所。巨大な水槽に漂う無数のレイ。それはレイの入れ物の生産工場だった。

　レイの入れ物達の方が、リツコよりもゲンドウに愛されている。彼女もまた、母と同じ相手（ゲンドウ）へのむくわれぬ愛に生きていたのだ。リツコは激情に身を委ねるように、二人の目の前ですべてのレイを破壊する（第弐拾参話）。

　レイ、アスカ、加持、リツコ。シンジの前から次々に姿を消していく親しい人々。そんな時、アスカに変わって五人目のパイロットがドイツから送られてきた。渚カヲル。カヲルはありのままのシンジに好意を表してくれた。彼はシンジにとって、初めて自然に打ち解けられる友人になった。





　しかし、彼の正体は最後の使徒だったのだ。心を弄ばれたと感じたシンジは逆上。カヲルを初号機で追う。

　ところがカヲルは、人類か自分のどちらかが消えるしかない二者択一を前に、永遠の命を放棄し、シンジに殺されることを選んだ。長いためらいのすえ、ついにシンジは初号機の手を血に染める……。

　自分によく似た、初めて自分を「好きだ」と言ってくれたカヲルを殺してしまった。皆が生き残るために。

「カヲル君が生き残るべきだったんだ」

　嗚咽し続けるシンジ（第弐拾四話）。

「カヲルをなぜ殺した」

　シンジの執拗な自問自答が続いていた。なぜエヴァに乗る？　皆のため。否、皆に嫌われるのが怖いから。結局自分のためだ。だからカヲル君を殺したのか……。

　アスカとレイも同様に、それぞれの存在不安の根拠を、執拗に掘り起こされていく。

　ゲンドウは言う。

「虚無に還るわけではない。すべてを始まりへと戻すにすぎない。この世に失われた母へと還るだけだ。すべての心が一つとなり、永遠の安らぎを得る」

　それが人類補完計画？

「余計なお世話だわ！　そんなのただの馴れ合いじゃない」

　反発するミサト。しかし彼女も、父への愛憎というトラウマに縛られ、恋人への依存を、自己嫌悪する苦しみを暴かれていく（第弐拾伍話）。

　自分のレゾンデートルを巡って、シンジの自問自答は続く……。

　なぜ、生きているのか？　自分のため？　だけど生きてて嬉しい？　楽しいことだけしていたいの？　どうして逃げちゃダメなの？　もっとつらいことになるから？　誰も相手にしてくれなくなるから？　お願い、僕を捨てないで！

　僕には何もない。だから他人の顔色を見てばかりだ。褒められたいからエヴァに乗る。だんだんエヴァから離れられなくなる。もっと本当の、不安にならずに生きられる価値が欲しい！　僕って何なんだろう？

　誰も僕のことなんてわからない。自分にしかわからない。でも、自分一人では自分が誰だかわからない。他人がいるから「僕」が生まれる。それは不自由なことだ。不自由を求めるのは自分の意思だ。その求め方で、自分と世界を変えていくことだってできる。ならば、エヴァに乗らない、違う僕だってあり得る。僕は自分が嫌いだ。でも、好きになれるかもしれない。僕は僕でしかない。僕はここにいていいのかもしれない。ここにいたい！

　そう認識した瞬間、突然、シンジを囲む体育館の壁がひび割れ、青空が現れた。シンジの新しい出発を、みんなが祝福している。

「父に、ありがとう」

「母に、さようなら」

「そして、すべての子供達に」

「おめでとう」

（第弐拾六話）。





５２＆５３

村上龍は七六年に『限りなく透明に近いブルー』で芥川賞を受賞し、鮮烈なデビューをした小説家。『愛と幻想のファシズム』は八七年に講談社から出版された作品で、主人公でハンターの鈴原冬二が、村上龍のシャドウと思われるゼロ・相田剣介とともに「狩猟社」という政治結社を作り、困迷する世紀末の日本でファシズム政権を作る過程を描いたもの。





５４

ネルフ特殊監察部所属・加持リョウジが、二重スパイというストレスのかかる仕事をやりながら、スイカを育てている。恋人の胸の中もいいが、死ぬ時はここにいたい、という大人の男としての言葉を残している。





５５

子供を産めず、自分の子を確認するすべもない男は、女に対して種として劣性な消耗品である。だからこそ、社会・文明・物語といった「幻想」を生み出す、自由な快楽へのパワーに賭けるしかない（しかも、それに依存しきってはいけない）という思想をベースに、危機感を持続し生き延びるための「情報」を語る長期連載中のエッセイ。

文庫で解説を書いた山田詠美に、裏返しの女性蔑視であると鋭く批判されているが、ここには性的な魅力を守りつつストレートな社会性を主張したいという、彼女の文学的根拠のアンビバレントな困難さも同時に浮き彫りになっていて興味深い。





５６

日本を代表するＳＦ作家の一人。九三年に差別語問題から〝断筆宣言〟を行ない、九六年末に解除、執筆を再開。





５７

『マジンガーＺ』（永井豪・作）で主人公の兜かぶとコウジが「パイルダー号」という特殊ヘリコプターに乗りこみ、マジンガーの頭部に着陸、接続し、マジンガーを起動させること。





５８

一九四七年二月に、死海の近くのクムランで発見された大量の文書。そこに記されている教団は、発見地から「クムラン教団」と呼ばれている。イエス・キリストがこのクムラン教団に属していたということは、死海文書の研究者間で定着しつつある。研究者の一人、バーバラ・スィーリングは、死海文書の詳細なテクスト・クリティークから「イエスは、一人の現実の人物であり、人間の文化の偉大な転換期の一つの中心に立っていた英雄的な人物だったのだ。だが彼は、奇跡など行わなかったし、死人の中から蘇りもしなかった」と述べている。イエスを歴史上の人物として見る彼女の著作『ＪＥＳＵＳ　ＴＨＥ　ＭＡＮ（人間としてのイエス、邦訳タイトルは『イエスのミステリー』ＮＨＫ出版）』は大ベストセラーになった。





５９

インドで最も古い時期（ＢＣ一二〇〇年～一〇〇〇年頃）に編纂された聖典。この中では「黄金の胎児説ヒラニアガルバ」「巨大な原人説プルシア」「意欲による創造説」という、異なる三つの創世神話が語られている。





６０

正確に言うと「人類補完委員会」と「ゼーレ」という二つの組織があるのだが、中味は同じで、表の顔と裏の顔といったところ。「ゼーレ」は、全世界的な組織網を持っており、国連に対しても多大な影響力を持ち、日本以外でのエヴァ製造を急ぎつつ、ある「シナリオ」を描いている。ゲンドウはこの組織に従属しているように見せかけながら、実は自分のやりたいことをやっている、という化かし合い関係。





６１

『サンダーバード』のスタッフが七〇年に製作したイギリス製ＳＦテレビ・シリーズ。ここに登場する地球防衛組織ＳＨＡＤＯは、『エヴァ』のネルフのモデルになっている。





６２

ルシファーはキリスト教の伝承によれば、もともと神の右側に座ることを許された、最も信頼される大天使であった。一二枚の光り輝く羽根を持ち、美と知恵と勇気と気品に満ち溢れていた。ところが、その「傲ごう慢まん」により神の玉ぎよく座ざに座ろうと反逆を起こしたため、神は激怒しルシファーを天界から地上に突き落としたのである。以後、彼はサタン（否定するもの）と呼ばれるようになる。悪魔王。





６３

六八年から少年ジャンプに連載され、以降「スカートめくり」ブームが起こるなど広く読まれたマンガである一方で、いわゆる良識派の評論家やＰＴＡたちからありとあらゆる抗議を受けた、という伝説的な作品。





６４

〝ABSOLUTE・TERROR・FIELD〟絶対恐怖領域の略。いわゆる〝バリアー〟ではない。使徒とエヴァだけが使うことができる。





６５

一九世紀後半のロシアの文豪・ドストエフスキーの代表作。本来は前・後編のはずだったのだが、前編のみを書いて死んでしまった。それでも「世界文学最高の作品（大泉もそう思う）」と呼ばれている。ちなみにハイデガーの『存在と時間』も前編しか書かれていないのだが、この本は「今世紀最大の哲学書」と呼ばれている。





［貞本義行氏と庵野監督の出会い］





大泉　とりあえず一杯、酒飲みませんか。乾杯しましょう。何だかよくわからないけれど（笑）。

竹熊　乾杯しましょう（笑）。さて、今日のテーマはもう二つしかありませんので。要するに『エヴァ』についてというのと庵野さんについてという、この二つに尽きるわけでして。どの辺から入りましょうか。

大泉　それぞれの方の庵野さんとの出会いの話から始めましょうか。当然、皆さんは『エヴァ』の前から、庵野さんとは接触があったわけですよね。一番古いのはどなたになります？

竹熊　摩砂雪さんですか？

摩砂雪　いや、違う。お貞（貞本）の方が、１『ＤＡＩＣＯＮ』からやってるから。

貞本　僕は『ＤＡＩＣＯＮⅣ』から。

摩砂雪　『Ⅳ』からでしょう。俺、そのあとだよ。

佐藤　２『マクロス』よりも前？

摩砂雪　えーと『劇マク』（劇場版マクロス）と『ナウシカ』の間ぐらいじゃないかな。だからお貞が早いよ。

大泉　とりあえずどういう経過があって。

貞本　僕はテレビシリーズの『マクロス』のアルバイトを学生時代にやってたから、原画を。学校の合間にちょこちょこ手伝ってて。それで庵野さんとは（『マクロス』を作っていた）３アートランドという会社で見かけたのが最初ですかね。メカ班と呼ばれている部署があったんです。４板野（一郎）さんを代表とするメカ班というのがあって、そこに皆、住みついていて（笑）。話せば長くなるんですけれど。

大泉　いや、どうぞゆっくり話してください。

貞本　僕は東京造形大学のマン研にいたんですけど、後輩に５前田真宏っていうのがいたんです。彼に誘われて一緒に『マクロス』に参加したんですよ。前田の高校時代の先輩に６赤井（孝美）さんという人がいまして、その大阪芸大の同級生に山賀博之と庵野秀明がいて。最初にその三人が『マクロス』に参加してたんですね。

　赤井さんは、さっさと『マクロス』に見切りをつけて大阪に帰っちゃったんですが、山賀さんと庵野さんはアートランドに残って『マクロス』を手伝っていた。それで山賀さんが九話（「ミスマクロス」）の演出を初めて担当することになって……。

佐藤　絵コンテもそう？

貞本　ええ。コンテ・演出を山賀さんがやることになって、人手が足りないと。誰か東京でうまい人はいないかって探してたんです、山賀さんが。それで赤井さんに相談したら、「オレの後輩（前田）が造形大のマン研にいるから、あいつを使え」って言われたらしいんですよ。そしたら前田真宏が、一人で行くのはやだっていう感じで、先輩、一緒に行きましょうよと僕を誘ったんです。僕もアニメーションに興味があったんで、それで一年間ぐらい手伝ってた。そのとき、会社でチラチラっと庵野さんを見かけただけですね。時々裸足で歩いている背の高い人がいるなあと（笑）。

竹熊　あんまり気安く話しかける雰囲気じゃなかったんですか、その頃は。

貞本　話しかけなかったですね。庵野さん、いつも一人で大声で、なんかしゃべってるんですよ。遠くからでも何しゃべってるか、よくわかる。廊下の向こうから「板野爆発のタイミングわかったー！」って大声が響いてきて（爆笑）。

佐藤　いまとおんなしや、それ。

貞本　「わかりましたー！」とか言って、バーッと絵をかいて、７河森（正治）さんとか、他の演出の人とか、僕の直接の演出家は高山文彦さんという人だったんですが、高山さんに、この絵が何コマで、それでフチがこうなって、こう消えていくっていうのを、こと細かに説明してるわけです。

　それで、ああなんか熱心な人がいるなあって、どういう人かなと思ったら、前田真宏から「あの人が庵野さんで、『ＤＡＩＣＯＮⅢ』をやってたんだよ」って言われて、ああなるほど、メカ描くのが好きなんだなと。まあ、そんな感じですね。

竹熊　それで、庵野さんの仕事はどう思ってました？

貞本　いや、もう全然レベルが違うじゃないですか。僕は入ったばかりで、フィルムが一秒間二四枚で動いていることさえも知らずに原画描いていましたからね。「タイムシートってなんですか？」という状態で（笑）。

　それで庵野さんたちのやってたメカ班の仕事って特別なんですよ。僕は（別の班だったので）一日三、四カットのペースでやったんだけど、もうメカ班の動きとか爆発とか、すごいじゃないですか。「これ、どのぐらいでやってんの？」「いや、一週間かけて一カットだよ」とか言われて。ああ、やっぱそうなのかって。「メカ班、たくさんお金もらってるんでしょうね」って言ったら、「いや、同じお金だ」って（笑）。「どうやって暮らしてんですか（笑）」って、そういう世界ですね。

竹熊　じゃあ皆、会社に住んでるみたいな。

貞本　そうですね。

大泉　庵野さんは、会社に住まざるを得なかったわけだ、最初から。

竹熊　『マクロス』に参加される前は、マンガ描かれてたんですよね、貞本さんは。

貞本　そうです。マンガ描いてたんですが、半分挫折しかけてて。そうしたら、後輩がアニメーションやりましょうと言ってきたので。アニメーション自体よく知らなかったんだけど、宮崎駿さんとか８大塚康生さんとか、すごく好きだったから。それで『マクロス』に参加して、ちょっとずつ仕事を覚えていって。

竹熊　それから『ＤＡＩＣＯＮⅣ』？

貞本　そうですね。『マクロス』がちょうど終わったあたりで『ＤＡＩＣＯＮⅣ』ですね。山賀さんが引き続き、大阪で自主制作アニメを作っているから、手伝いに来てくれって。お金は出さないけど、学生だからいいだろうと（笑）。





［摩砂雪氏と庵野監督の出会い］





竹熊　摩砂雪さんも『マクロス』からですか。

摩砂雪　いや、僕はテレビの『マクロス』はやってないんですよ。

竹熊　やってないんですか。じゃあどの辺から庵野さんとの接触は。

摩砂雪　えーと、あれやっぱり『劇マク』なのか。『劇場版マクロス』ですね。いや、『劇マク』をやった板野一郎さんのメカ班に、増尾昭一という人が参加していたんですよ。その増尾というのは僕が昔所属していた会社にいた人で、そこを辞めて、『劇マク』に参加していたんです。それで当時、変な飲み会開いてたんです。業界の集まりでもなくて、友達の友達を呼んで来て、とにかく月イチで飲もうみたいな感じで。そうしたら、なんか庵野とか河森さんとか連れて来て。その時、山賀もいたのかな。それで僕も飲み会に参加して、変な奴がいるなあと。

佐藤　それはアニメ関係者の飲み会？

摩砂雪　いや、アニメ関係者ってわけではないのにいるんだよ。

貞本　年末だとか、年始にやったやつが、あったじゃない。

摩砂雪　えーと、あれは違う。あれは板野さんが業界人を集めてやった時なんだけど、その前から知ってたんだ、結構。それで、その時から９『王立宇宙軍』までは、庵野とは単なる飲み友達で、仕事やったことないんですよ。

貞本　僕も（庵野さんと）口きいたのは『ＤＡＩＣＯＮⅣ』が終わってからですもの。ちゃんと話をしたのは、『王立』の時です。『ＤＡＩＣＯＮⅣ』の時にも山賀さんと、岡田（斗司夫）さんと、庵野さんがいきなりアパートにドカドカ泊まりに来て、居すわって、「一緒にやろう」って口説かれたことがありましたけど（笑）。ただその時庵野さんは初日に来ただけで、すぐに帰っちゃったんですけどね。残りの人たちは、なんだか知らないけどずっと居ました（笑）。

大泉　それは濃い連中が来ましたね。

貞本　それで「俺、昼間は大学行くから」とか言うと「じゃあ、僕らは町でレイアウトやってます」とかって出ていって、朝から晩までミスタードーナツで原画広げて、ずーっと『ＤＡＩＣＯＮⅣ』の仕事して、夕方、僕が大学から帰ったら、またうちのアパートに来て……（笑）。

竹熊　じゃあ、庵野さんと口きいたのはそのあとですか。

貞本　ええ。直接口きいたことない。仕事は知ってたけども、本人の人となりを知ったのは、やっぱり『王立』から。

竹熊　やっぱりその頃から独特のＡＴフィールドはあったわけですか。

貞本　奇人な感じがしました。いまみたいにちゃんとした人じゃなくて（笑）。どっちかというと人づての話の方が多くて。赤井さんとか、山賀さんの方がベラベラしゃべるタイプだから。「庵野って、こういう奴なんだよ」って。だから本人と話す前に、だいたいこういう人物だろうっていう概要は知ってて、本人見たらその通りだった（笑）。

竹熊　やっぱり、とっつきづらい感じはあったんですか。

佐藤　目線が高いんで、しゃべりにくいっていうのはありますね、第一印象が。

竹熊　ああ、目線が高い。背が高いから。

貞本　僕自身もあんまりしゃべらないから。向こうがしゃべりかけてきても、あんまり接点が。僕はオタク知識が薄いもんですから。

竹熊　『王立』の時に、キャラデザインをやりましたよね。その時は庵野さんとも深く関わったわけですか。

貞本　いや『王立』は、やっぱり監督の山賀さんとの思い出が大きいですよね。最初はオリジナルビデオの企画でしたからね。一〇〇〇万か二〇〇〇万ぐらいで安く作ろうっていう企画だったから。一緒にやろうよ、心中しようよみたいな。

大泉　すごい口説き文句（笑）。





［佐藤裕紀氏と庵野監督の出会い］





竹熊　その次に関わりが古いのは佐藤さんですか？

佐藤　そうですね。仕事としてはここ一〇年足らずですが。僕は高校卒業して、しばらく大阪の市役所に勤めてたんですけど。

大泉　えーっ！　市役所に。

佐藤　そうそう。で、高校の先輩にＳＦ研に入ってる大学生がいて。当時大阪の大学のＳＦファン同士が集まって、いろいろファン活動をやっていたんですよ。で、彼らが『ＤＡＩＣＯＮⅢ』を前の年に作って、それでその次の年には、東京のＳＦ大会に出品するために、１０『愛國戰隊大日本』を作ってたんです。

　その先輩も『大日本』を手伝ってまして、ＯＢとして高校にやってきては大阪芸大に面白い人ら（山賀・赤井・庵野）がおるという話を聞いて。ああ、そういえば『アニメック』に（紹介記事が）載ってましたねって話をしていたりしました。

　それから僕は公務員試験を秋に受けて合格したので卒業までバイトばっかりだったのですが、その先輩が来年の『ＤＡＩＣＯＮⅣ』を手伝ってくれって話で、もう二月ぐらいから（ゼネプロに）いりびたるようになって（笑）。市役所に勤めてからは五時になったら、じゃあって、そのままその足でトコトコと大阪の環状線に乗って、桃谷の駅に降りて。それがまあいまに続くと（笑）。

竹熊　桃谷って、ゼネプロ（岡田斗司夫と武田康廣が八二年に開店した、日本初のＳＦマニア・ショップ）があった場所ですね。

佐藤　そうそう。それで一緒に『ＤＡＩＣＯＮⅣ』に向けてずっとやってましてね。そのままダイコンフィルムに流れ込むんです。

竹熊　その『ＤＡＩＣＯＮⅣ』とかその辺は、佐藤さんはどういう関わりだったんですか。

佐藤　僕はただ単にあれですよ。〝ゆかいな仲間たち〟の一人で、イベント小道具を作れと言われてそれを作る。アニメのセル塗れと言われたら、セルを塗るわけです。それで一生懸命セルを塗っている時に、向こうの方で「なんとかー！」って大声がすると、だいたい庵野さんか、赤井さんか、岡田さん（笑）。

　たいがいしゃべってるか、怒ってるかっていう感じだったんです。それでその時に、貞本さんも、たぶん夏休みだからおられたと思うんですよね。

貞本　一週間ぐらいしかいなかったけど。

佐藤　男はものすご、ようけおるわけですよ。それで男の子のチームと、女の子チームで皆チョビチョビ塗ってるわけです。僕らは別にアニメーターさんみたいに絵が描けないわけですから、ひたすらこうして色を塗ってたんですけれども。毎日五枚ずつ。「お前、今日セル五枚塗れ」とかって言われて。花ビラが舞うシーンがありますよね。あれをツマヨウジで塗るんですよ。少しずつ、こう。

竹熊　その頃、庵野さんとの思い出は？

佐藤　いや、残念ながらないですね。なんか背の高い人がおって、あれは『大日本』の着グルミに入ってたあの人とか言われたら、ああ、あれがそうかぐらいの。赤井さんなんかは気安く話してくるんで、印象強かったです。ああ、あの人が、あの『ＤＡＩＣＯＮⅢ』の女の子のキャラクター描いた赤井さんか、なんて。

　庵野さんは『アニメック』なんかに写真とかチラチラ出てたんで。それでああ、なるほど、この人がそうかみたいな。どっちか言うと、岡田さんとか１１武田（康廣）さんのほうがキャラが立ってたんで。庵野さんとの本格的な仕事では、東京にゼネプロが移ってからなので『トップ』からですね。僕は。背の高い人ぐらいしか印象がなかったですね。





［大月俊倫氏と庵野監督の出会い］





竹熊　なるほど。それで鶴巻さんですよね。

鶴巻　ですかね。大月さんは『ナディア』よりあとですよね。

大月　俺、『王立』をやってる頃。庵野さんと会ったのは。

竹熊　じゃあ、大月さんの方が早いんですね。

大月　『王立』をやってる頃で、どこでどうして知り合ったかわかんないんですけど。高田馬場にガイナックスがあった頃、うちの会社（キングレコード）に庵野さんが来て、無駄話して、腹減ったっていうから、近所の喫茶店に行って、サンドイッチ食べさせて。その時、庵野さん、中のハムだけ抜いて……。

一同　（大爆笑）

鶴巻　やっぱりどこでもするんですね。

大月　ハム抜きのサンドイッチ食べてた。それで特撮物のＬＰレコードとか、昔はＬＰだったんですけれど、それのジャケットのレイアウト、やってもらって。

鶴巻　それはキングのやつだったんですか。

大月　キングの。

竹熊　１２スターチャイルドっていうのは、もうあったんですか。

大月　あったんですよ。

竹熊　最初からそっちの部署ですか。

大月　僕はもう他に能がないもんですから、ずっとそればっかりですね。

摩砂雪　なんだ、俺なんかより古いんじゃないの。

大月　それで喫茶店でコーヒー飲むと、お茶代出るじゃないですか。二人で一五〇〇円とか。それでただお茶を飲むわけにいかないですから。なんか仕事してよって。１３『ミラーマン』のＬＰのレイアウトとか。目の前でレポート用紙広げて、やってくれましたね。まだ二人とも若かったから、二二か二三でしたから、私もいろいろ注文つけてですね。勝手に私がレイアウト改かい竄ざんしたりしてね。あとで庵野さんから「なんでこうなるんだ」とかって、ちょこっとだけ怒られました。いまだったら、殺されてます（笑）。

佐藤　そんなことしたら、俺も死ぬとか。お前を殺して、俺も死ぬとかね（笑）。

竹熊　じゃあ最初はそういう付き合いで、プライベートでよく会うというのは、もうちょっとあとになるんですか。

大月　それで（関係が）ブツッと切れて。次に会ったのが、なんか誰かの結婚式の時で。その時もちょこちょことしゃべって、次に会ったのがアニメの１４『帝都物語』の打ち上げかなんかで。銀座でやった時にちょろっと会って。だから四年に一回ぐらいしか会ってなかったですね。『エヴァ』の前は。

竹熊　オリンピックですね。

大月　話すこと、共通項ないんですよ、ネタの。だからいまみたいに密接に会うようになったのは、『エヴァ』の企画のあたりからで。

竹熊　なるほど。『エヴァ』の誕生は、大月さんと庵野さんの出会いがでかいと思うんだけれど、その話はちょっとあとにとっておきましょう。





［鶴巻和哉氏と庵野監督の出会い］





竹熊　じゃ、最後は鶴巻さん。

鶴巻　僕は『ナディア』からなんですよ。『マクロス』の頃は学生だったし、それで『王立』があって、ああすごいなと思って。次に『トップをねらえ！』を見て「くやしい！」と思ったわけなんですよね。

竹熊　こういう仕事ができてうらやましいっていう？

鶴巻　そんな「俺にもやれるのに」とかそういう話じゃなくて。

竹熊　ああ、ひたすら……。

鶴巻　ただ単に、参加できなかったのが悔しいというか、その程度で。その頃はもうアニメーターになってたんですけど、だから参加しようと思えばできたのに、参加していないと。それで次にそういうのがあったら、ぜひ参加したいなあと思ってたんです。僕、摩砂雪さんと同じスタジオだったんですけど、摩砂雪さんとは、前のスタジオ時代は、面識ないんですよ。

摩砂雪　俺がその某会社を辞める頃にちょうど（鶴巻氏が）入ったんだよね。俺は知らんけど。

鶴巻　一年間ぐらいしか、同じスタジオに一緒にいなくて。摩砂雪さんは当時すでにバリバリの超有名アニメーターだった。動画と原画でスタジオが違ってて、それで僕は入ったばっかりのペーペーの動画だったから。

摩砂雪　うん。だから全然会ったこともない。

鶴巻　見たこともない。

摩砂雪　だからガイナに来て初めて、これが鶴巻だって。俊ちゃんに教えられたんだよね。

鶴巻　１５鈴木俊二さん、『エヴァンゲリオン』でも作監をやってる人なんですが、僕の先輩なんです。それで鈴木さんから『ナディア』の話を聞いたんです。今度ガイナックスがテレビをやるらしいと。どうもＮＨＫでやるらしいと。しかも第一話から身の丈二〇〇〇メートルのロボットが出る話らしいと（笑）。

摩砂雪　なんだ、ソレェ……（笑）。

鶴巻　そういうのを聞いて。

摩砂雪　そんな話あったの？

鶴巻　鈴木さんに言われて、それはやらねばなるまいと思ったんですね。

竹熊　二〇〇〇メートル（笑）。『ナディア』ってそんな話でしたっけ（笑）？

貞本　最初はロボット戦があったはずなんです。

鶴巻　シナリオの第一稿ではね。

貞本　完成した作品では冒頭が飛行機コンテストのシーンなんだけど、あれが最初、ロボットコンテストだったんですよ。

鶴巻　で、それはやらねばなるまいと思って。僕も前のスタジオを辞める決心をして。ガイナに来て、よろしくお願いしますと。

竹熊　そうしたら、ロボットのはずが（笑）。

鶴巻　そうですね。で、全然そういう、レトロな感じだとかも聞いてなかったし、スチームパンクっぽい感じだとも聞いてなかった。『トップをねらえ！』の直後だから、とてもああいう作品になるとは思わなかったから驚きましたけど、あれはあれで、面白いなと思ったわけです。それで、一アニメーターとして参加して。





［庵野秀明の「怖さ」］





竹熊　どういう人だと思いました？　庵野さんのことを。

鶴巻　『ナディア』の時は席がすぐ隣っていうか。ほとんど後ろだった。一番庵野さんに近いところに座ってたの。それで、どういう人だったのかなあ。わかんないな。キレると怖い人だっていう感じかなあ。

貞本　興奮すると対象を決めてしゃべらないでしょう。庵野さんって。一人でワーッとしゃベってる。

摩砂雪　『トップ』の時、すげえ怖かった。俺はもうなんじゃコレ？　って感じで。

竹熊　やっぱりぶち切れるわけですか。

鶴巻　前のスタジオは、もっとおとなしい人が多かったんです。だから僕なんかここではおとなしい方だけど、前のスタジオでは、まだ一番しゃべる方っていうか、これやりたいとか、ああいうのやりたいとか（積極的に）言うタイプだったの。前のスタジオじゃ、ほとんど皆、そういうことを言わないんですよ。たとえば、一本絵コンテが来て、どこをやりたいですかって言われたら、僕が一番最初に、ここをやりたいって感じで、おいしい仕事を取っていくみたいなタイプだった。

　それがガイナックスに来たら、庵野さんとか、もう、ドカッとロッカーを蹴りつけながら、怒鳴りちらしてましたね。怒ると、もう手つけらんないんですよね。誰も手をつけないというか。

佐藤　あんなの手つけたらねえ、当時はロッカー壊しちゃったからね（笑）。

摩砂雪　相手しちゃダメダメ。

鶴巻　あのぐらいすごいのって、なかなか。ああいうふうに、手がつけられなくなるぐらい怒る人って、僕の知り合いにいなかったんで。

佐藤　怒る前に、ワンクッションあるんですわ。まずね、（周囲に手を合わせて）「皆、すまん！」とかって、いきなりバン、ボンとその辺、叩き出すんです。

摩砂雪　いや、「すまん！」って言ってからやるようになった。

佐藤　でも『ナディア』の時は、もうそれやってましたよ。

摩砂雪　『ナディア』の時でしょう。『トップ』の時は、まだ……。

佐藤　『ＤＡＩＣＯＮⅣ』でも見たかな？　『トップ』の時は、もっとすごかったですね。

摩砂雪　すごかった。だって俺、最初は『トップ』やってなかったじゃん。最後の方しか。当時俺は前田真宏のやってた別の仕事手伝ってたんだけど、ある日ガイナへ入ったら、いきなり怒鳴ってるんですよ。エレベーターをチンッて開けたら、いつもにぎやかなスタジオがシーンと静まり返ってて、そこに怒鳴り声が響いてるんですよ。一人だけ。人が一杯いるんですよ。それなのに、フロア中がシーンとしてて一人の怒鳴り声だけして。

佐藤　その時、僕おりましたよ。ちゃんと。

摩砂雪　それで、『トップ』ができないことに対して、プロデューサーにやつあたりしてて。もう誰かれかまわずつかみかかって来る。俺のところに来て、「マサーッ！」って叫ぶから、「なに？」って言ったら、「お前、なんで俺の仕事手伝わないで、真宏のやつやってんだ！」って（笑）。

貞本　ああ、四話の時。

摩砂雪　うん。あの時、庵野は酔っぱらってたんですよ。なんかの結婚式の二次会かなんかの帰りなんだよね。そこにいた女の子に一人も声をかけられなかったって、それも手伝って、酔っぱらって、ストレスが一気に噴出しちゃって。

佐藤　もう間に合わねえみたいな。

竹熊　スケジュールが間に合わない？

摩砂雪　というか。やっぱ、やりたいこともできないし。このままじゃあ作品はどうなる、みたいな。まだいまみたいな大人じゃなかったからねえ（笑）。プロデューサーまでできるようになったからすごい！　本当、当時はわがまま言い放題な監督っていう感じで。

竹熊　これは、ちょっと付き合いきれないとか、そんなことはなかったですか？

摩砂雪　いやもう、そういう人間だっていうのを知ってたから（笑）。それでいいとは言わないけど、迷惑だよなって。そしたら、ちょうど『ナディア』を一緒にやってる窪岡俊之さんが、彼をアパートまで連れて帰ると。さあ庵野さん行きましょうと言って、タクシーに乗せて行ってくれたんで、みんなでホッとしたっていうのがあったんですけど（笑）。

貞本　しょっちゅうだったよね、『トップ』の時は。庵野さんが怒る度にみんながシーンとするんだけど、俺だけなんか、ニヤついちゃう（笑）。あ、まただって。

摩砂雪　でも『トップ』の五、六話とかさ。

貞本　最初は、外注した美術にまず切れたんだよね。こっちに美監（美術監督）がいたんだけど、（スケジュールの都合で）外に出したら、それがちょっと不本意な仕事だった。それで再さい出だしするにはお金がかかるけど、そのお金はないわけ。それで美監に頭を下げて「君が直してくれ」って頼むわけだけれども、「時間がないし、やってられないよ」と美監が言うわけですよね。そうするとしばらく下向いてて、ブルブルブルッて全身が震え出す。で、いきなりのその辺の本棚に、頭をガーン、ガーンとぶつけだして（笑）。涙ボロボロ流しながら、「チクショーッ、チクショーッ」とか言い始めて。そしたら、その美監、佐々木って言うんだけど、根負けして「泣く奴には勝てねえよな」（笑）。それで皆が徹夜で直すっていうような状態ですよ。

佐藤　有名ですよね、それ。

貞本　もう泣く奴には勝てないって。

竹熊　星飛雄馬状態ですね。

摩砂雪　あの時点で計算でやってたらすごいけどね。最近のは完全にやってんじゃない、計算づくで。

佐藤　でもね、最近でもやっぱりやってる時は、たぶんウソやないと思うんですよ。だんだん自分に怒ってくるっていうか。このシチュエーションで、どんどん心の中で盛り上がっていってんじゃないかなと思いますね。





［「巨神兵」でナンパ］





摩砂雪　『王立』の時は何もなかった？（本人注：ここからかなり酔ってます）

貞本　『王立』の時は、まあいちおう一アニメーターだから。割とメカ作画というのは、囲いというか、（自分の仕事の範囲が）作りやすいんですよ。最初にこれだけが俺の仕事っていうふうに決めてやってたから、そんなにたまってなかったみたいですね。

摩砂雪　だから『王立』の時は、仕事中、あんまりしゃべんない奴だなと思って。でも、飲むとね。

　……これ言っていいのかなあ。飲み会で女の子とか来るじゃない。それでなんか、すぐ引っかけるんだ。あいつ（笑）。引っかかるのかもしれないんだけど、外人顔してるから。いまみたいにヒゲなかったし。

貞本　庵野さんモテますよ。

摩砂雪　痩せてたし。背は高いでしょ、眼鏡とったら、彫りも深くて。

竹熊　モテるでしょう。そうだと思った（笑）。

佐藤　しゃべり、うまいですからね。

摩砂雪　それで俺の知り合いの女の子とかと、仲良くなってんだよね。「なんだ、こいつぁ？」って（笑）。

竹熊　まあ、その程度の話は大丈夫じゃないですか。いちおう、庵野さんから、（小指を立てて）コレの話はできるだけ避けてくれって（笑）。

大泉　どうせ最終チェックが入りますから。自由にしゃべってください。

貞本　その程度は全然大丈夫。

摩砂雪　庵野さんの言う、コレは、もっとすごい。ディープなとこだと思うよ。

竹熊　だからその話はちょっと勘弁してくれっていう。

貞本　そうか。××××とか（笑）。

佐藤　ああ、もう完全にカットですな。

鶴巻　（一同に、インタビュアー風に）昔から庵野さんはあれですか、コレの引っかけ方は一緒なんですか（笑）。

摩砂雪　なんか似てるよね。

鶴巻　真顔でウソつくじゃないですか、あの人。

摩砂雪　表情変えないんだ。奴ぁ。

竹熊　ポーカーフェイス？

貞本　いやポーカーフェイスとは少し違うんだよね。表情はあるけど真意が読みとれないんじゃないかな。

鶴巻　ネタはなんでもいいんだけど、例えば女の子がカクテルの名前とか、「えっ、そんなカクテル知らない」とか言うと、もう全然適当なことを、「これにはショウユが入っててね」みたいな感じのことを平然と言ってて、女の子は「へえ」みたいな（笑）。

貞本　ショウユ？

鶴巻　いや、それはさすがにないけど（笑）、もうちょっと、ああそうかもしれないな、とか思うようなことを、全然表情変えないで、真顔でペラペラ。例えば、大月さんにもうすごいこき使われて大変なんだ。みたいな話をしますもんね。本当は逆なんだろうに。

佐藤　絶妙のタイミングでサッと言う時ありますよね。

鶴巻　飲み屋にいても何やってる人だか、一見わからないじゃないですか、あの人。サラリーマンには絶対見えないっていう。かといって学生の年齢でもないし。とうぜん、「何やってらっしゃるんですか」みたいに聞かれると、平気でウソついて。

摩砂雪　そういえばあの当時、庵野は「巨神兵」ネタでひっかけてたよね。

竹熊　ええ!?

摩砂雪　『ナウシカ』はヒットしたから、結構誰でも知ってるんで、飲み会で「何やってる人？」って言われて……（笑）。

鶴巻　なんだ、それ正直じゃないですか。

摩砂雪　だからあれだよ、もう自慢しまくり大会！

鶴巻　へえ、意外だな。そういうことを言う人じゃないと思ってたけど。

摩砂雪　「あの巨神兵を描いて……」「えっ、あれを描いた方なんですか」とかいう感じだったよ。ちょっとはいまより可愛かったよな（笑）。

佐藤　アニメ描いてナンパっていうのも変やね。

摩砂雪　いや、だからその飲み会に連れて来るのは、別にアニメ界の人間じゃないんで。だから、本当に友達同士で飲んでるみたいな感じのところへ、たまたま友達の友達で庵野と山賀がいて、当時山賀はあんまりしゃべんないだよコレが！

大泉　いやあ、俺、庵野さんがナンパしている顔、想像もできないんだけど。

佐藤　ナンパの時は知らないですが、何かイタズラをしている時は、口が猫みたいになるんですよ（笑）。真ん中から、口がこう上がって。そんな時に「センセ何やってんですか」って声かけると「何が？」。「いい年して、そういうのやめてくださいよ」。「ニヤ」（笑）。口が真ん中だけ開いて「ニヤ」っと。それが、なんか可愛く見えるんですよ、庵野さん。

貞本　いや、可愛いとこあるんだよ。

佐藤　そう。こんな、女の子なら自分より身の丈、倍ぐらいあるような（笑）おっさんですけど。

摩砂雪　いや、いまよりもとっつきやすかったよね、全然。

竹熊　ああ、昔の方が？　いまはやっぱりいろいろ責任を抱え込んでますからね。

摩砂雪　いや、違う。見てくれもカッコいいじゃん、いまより！（笑）

竹熊　『クイック・ジャパン』一〇号の表紙になったでしょう。それで『クイック・ジャパン』に読者のハガキが来てさ。読んだら、女の読者で「庵野さんってハンサム！」という人がいましたよ。

摩砂雪　俺の知り合いの女の子がさ、なんだっけ、やっぱ庵野さんカッコイイとかって言ってんだよ。それで『クイック・ジャパン』見て、中のページでさ、なんだっけスタジオの中で半ズボンでこんなになってる全身写真が出てるんで、あれ見てさ、「あっ、やっぱデブだ」（笑）。

鶴巻　顔は、太ってないですけどね。

佐藤　誰やったかな、ガラモンとか書いてましたけど。スタジオの中にガラモンが立ってるって。

貞本　そういえば以前、仕事してたら後ろから「ねえ、お貞、アイルトン・セナってどういう人？」って庵野さんが近づいてきて（笑）。

摩砂雪　女に聞かれたんだぜ。絶対に！

貞本　絶対そう。もう顔がニコニコしてたから、「アイルトン・セナに似てるって言われたんでしょう」って。それで「庵野さんに似てますよ」って言ったら、「そうかあ」（笑）。

大泉　（爆笑）

摩砂雪　髪形だけじゃねえか（笑）。

貞本　眼鏡取ると、１６マルコム・マクドゥエルに似てる。『カリギュラ』の（笑）。





［アニメーターとしての庵野秀明］





熊　話を真面目に戻します（笑）。アニメーターとしての庵野秀明というのは、どういうふうに皆さんご覧になっているのかっていうのを、聞きたいんですけど。

鶴巻　うーん。やっぱすごいですよね。

摩砂雪　俺はだから庵野の仕事を最初に見たのは、アニメの仕事より、１７ダイコンフィルムの１８『帰ってきたウルトラマン』。１９北久保弘之っていう飲み友達から「こういうすごい奴らがいるんだ」って言ってそのビデオ見せられたんですよ。ダイコンフィルムは知っていたんだけれど、そいつらが作った『帰って来たウルトラマン』っていうのと、あとパラパラアニメみたいな……。

貞本　２０『じょうぶなタイヤ』とかあの辺？

摩砂雪　そうそう。ＳＨＡＤＯのやつね。あれとか見せられたんですよ。素人なのにこんなのやってるっていうんで。もうその頃、俺はプロでアニメーターやってるのに、なんかうらやましくてしかたなくって。アマチュアがここまでやっちゃうっていうのは。で、ああいいなあ、俺、こういうやつらと友達になりたかったなと思ってて、まさかあとで（友達に）なるとは思わなかった。それでそのあとは、やっぱり『マクロス』で見てて。

鶴巻　僕は『マクロス』では、あんまり庵野さんの印象がないんですよ。

摩砂雪　板野さん？

鶴巻　やっぱり板野さんの方に惹かれちゃったから。

竹熊　でも２１「愛は流れる」（『マクロス』二五話）のあたりっていうのは、庵野さん、かなりやってるでしょう。

鶴巻　やってると思う。数は少ないと思いますけれども。

竹熊　あれは板野さんですか。

鶴巻　めだつカットは庵野さんがやってるんでしょうけれど。でもほら、数がそんなにこなせるタイプじゃないから。

竹熊　まるまるやったというわけではない？

鶴巻　そういうのはたぶん、ナウシカが最初なんでしょう。「巨神兵」の。

摩砂雪　巨神兵のシーンを任されたっていう……。

貞本　わっ、すごいと思ったカットは、だいたい庵野さんだったから。あの核爆発、誰がやったのとか、（爆風で）屋根がバーンと揺れ戻しが来るっていう。ああ、なんか実写みたいだなあと。実写を観察しながら描いてるみたいだって。

摩砂雪　当時の庵野は細かいディティールはやたらこだわってたよね。いまもそうだけど（笑）。板野さんなんかは、空間把握とか流れと〝間〟で描いちゃう人なんだけど。

貞本　板野さんは空間の人だけどね。

摩砂雪　庵野は一つ一つの動きとか、細かい破片がどう飛ぶかとか、爆発の動感とか、そういうのにこだわる。いや、こだわってた。もう最近は、ねえ（笑）。自分でもよく言うんだよ。「アニメーターの庵野秀明はお亡くなりになられました」ってね（笑）。

鶴巻　『王立宇宙軍』をやった庵野秀明は世界一のアニメーターなんだけど、いまは死んでもういないとか（笑）。

摩砂雪　昨日かな、言ってたもんね。「俺、エヴァなんか描けねえよな」って。「よく皆、こんなの動かせるよ」って（爆笑）。「なぜ作監（作画監督）は修整入れん、俺のエヴァを」みたいなこと言ってましたよね。昔は作監にチェックなんか入れられたら怒ったくせに。

竹熊　ああ、自分でも『エヴァ』の原画をやる時があって、それに対して言うわけですか。

鶴巻　そうですね。

摩砂雪　だからもう急ぎで描いてて、自分なりに描いてんだけど、いまはもっと若手でうまい人いるわけじゃないですか。そいつらは、もう庵野さんというだけで、手をつけない。恐れ多くていじれない。んじゃなくて、最近は意地悪もあるんだよね（笑）。庵野秀明に対する意地悪。「庵野さんの絵、そのまま出しちゃえ」みたいな。

佐藤　しょうがないですなぁ（笑）。





［演出家としての庵野秀明］





貞本　今日は、鈴木さんとか２２本田（雄）君とか、作画監督レベルの、あのへんの人達を連れて来たほうが絶対良かった。たぶん、一番たまってるだろうから。

鶴巻　僕とか摩砂雪さんよりは、全然たまってますよ、たぶん。

摩砂雪　いや、そしたら、俺達のことも、言われちゃう（笑）。

鶴巻　それはそうなんですけど（笑）。本田さんがこの場にいたら、面白かっただろうに。発言全部、カットかもしれないけどね（笑）。

貞本　やっぱり作画が一番たまりますからね。庵野さんと付き合うと。

竹熊　やっぱり相当要求がきついわけですか。

貞本　要求がきついというよりは、待たされたりとか。

摩砂雪　それもあるけど好きなことができない。

竹熊　なるほど。

鶴巻　庵野さんから、ここはこうして、ここはこうしろって細かく言われちゃって、それじゃ僕は庵野さんの清書してるだけじゃないですか、となる。あれで全然絵が描けずに、純粋に演出家として、山賀さんみたいなタイプだったら、まだアニメーターの出る幕があるんだけど、庵野さんはやっぱりアニメーターだったから。

竹熊　その辺は、例えば宮崎駿さんの影響があるんですか。

鶴巻　全然でかいですよ。ほとんどリトル宮崎。

竹熊　じゃあ宮崎さんの仕事ぶりを見て、それで演出家というのは、こういうものだというのができちゃってるのかな。インプットされて。

貞本　でもタイムシートはいじらないよね。さすがに。

鶴巻　そうですね。そこら辺はやっぱり、宮崎さんほどひどいことできないっていうことだと思うんですよ（笑）。いちおう、本田さんの言動とか、すごい気にするから、庵野さんは。

摩砂雪　だから作画マンも、力量のある人であればね。

鶴巻　気にする。

貞本　宮崎さんみたいに自分で直したりは絶対ないですね。メカ以外はね。キャラはもっと正面顔にとかって、マルチョンで直しちゃうような、そういう感じですね。

鶴巻　宮崎さんは、最終的に全部自分でやっちゃいますものね。庵野さん自身キャラが描けないというのは、自分でもわかってるだろうから。その辺は、ある程度他の人にやってもらわなければいけないから、ちゃんとサポートするというか、ヨイショする。

竹熊　よく言われることですけど、人の上に立つ人って、他人を信頼して任せるようになった時に、初めて一人前だって言うんですよね。だからその意味では、監督・庵野秀明はこれからだ、というところもあるんでしょうけれども。

貞本　でも実はアニメーターを怒らせる原因って、反対に気を遣いすぎて、簡単なコンテを描き過ぎてる感じはするよね。

鶴巻　俺にはもっと能力あるのに、なんでこの程度しか要求しないんだ！　みたいな感じ。

貞本　また、同じことをやらせるっていう。

摩砂雪　気を遣うっていうか、歩留りを考えて。

鶴巻　例えば本田さん、うまいじゃないですか。その本田さんに、一〇〇カットやって欲しいと思うわけ。うまいアニメーターだから。でも、そこを大変な作画にしちゃったら、二〇カットしかできない。だったら簡単なのにして、一〇〇カットやってもらってトータルでクオリティを上げたいってことになるわけです。監督は当然、そう考えるでしょうから。でもアニメーターにしてみたら……。

竹熊　腕の振るいがいがない？

貞本　うまければうまいほど、アニメーター馬鹿というか、動かしたくなるんですよ。それで庵野さんは、キャラが動くこと自体には、そんなに興味のない人なんじゃないかなと、僕は思うんですけどね。レイアウトにはすごくこだわるけれど、動きそのものには、そんなにこだわらない。物をつかんだりする時のタイミングとかは、一切興味がない。その思想でコンテが描かれているから、わりと本田君レベルのアニメーターから見たら。

竹熊　物足りないわけだ。

貞本　ええ。たぶんコンテが食い足りないんじゃないかなと思うんですよね。いろいろぼやいているのを聞いていると。でも全部を本田君のレベルに合わせてコンテ描くわけにもいかないじゃないですか。それこそ本田君以外に誰もやってくれない、大変なコンテになっちゃうんで。

竹熊　まあ、そうでしょうね。他の人がついていけなくなっちゃう。

貞本　ええ。作画は誰がやるかわからないから。だから歩留り考えて。

鶴巻　監督になると、そうならざるを得ないかなと思うんですけど。『トップ』の時はどうだったんですか。事実上初監督なわけですけど。

貞本　『トップ』もそうですよ。窪岡さんとか、毎日、これじゃ紙芝居じゃないかとかボヤいてましたけどね。

鶴巻　『王立』の時、庵野さんはメカ作監だったけど、原画を描いてた時もあるわけでしょう。カメラも一緒に飛びながら飛行機を追いかけるようなシーンは、たぶん庵野さん以外の日本のアニメーターには、ほとんど描けないんじゃないかと思うんだけど。そういったシーンを、相当うまいと言われているアニメーターに要求しても、やっぱり描いてもらえない。業界でもメカを描かせたら一、二番と言われてる人に、そういうのを発注しても、自分が思っている絵になってこない、俺が描いた方がうまいってなっちゃったら、やっぱりここはレベルを落としてでもとか思うのかな。最悪でも自分で描ける範囲でやっちゃおうとか思うことで、そういうコンテになるんじゃないかと。

貞本　まあ歩留りの側面で考えると、メカに関しては庵野さんは自分でできるじゃないですか。いざとなったら自分でやればいい。でもキャラに関しては、ないわけですよ。いざとなっても、やっぱり自分ではできないわけだから。だから歩留りのレベルが下がっちゃう。それがわりと描ける人にとっては、つらいことです。

竹熊　ああ、逆にね。

貞本　目だけで演技させるとか、カットを割るだとか、そういう効果的に〝逃げる〟方法っていうんですか。確かに効果的なんだけど、基本的にそれは逃げている演出なんで、やっぱり日常を正直に描きたいアニメーターから見ればつらい。

鶴巻　一緒に仕事をしているアニメーターとかって、だいたい２３『うる星やつら』とか見てから入ってきているアニメーターが多いんですよ。で、『うる星やつら』はまったく逆だったわけじゃないですか。演出はどうでもいいとは言わないけれど、アニメーターに好きに描かせて、アニメーターのセンスで作品を面白くしていく作風だったから。俺もああいうのやりたいと思ってアニメーターになったのに、（庵野さんは）全然好きにさせてくれないっていうのが。あるんじゃないかな。

貞本　（摩砂雪氏に）どう、若い時に、いまの庵野みたいなコンテを渡されたら？

摩砂雪　『王立』誘われたのは、俺は庵野からなんだ。それで俺が、実は宮（崎駿）さんみたいなの好きだっていうのを、唯一わかってくれた人間なんだよね。それで岡田さんとか、山賀とかっていうのは、（摩砂雪は）〝コレもん〟で危ないって言って、もうお貞もだいたいそういうふうに思ってたらしいんだよ。

竹熊　〝コレもん〟とは？

摩砂雪　金田（伊功）さんみたいな作画というか。あの頃はテレビシリーズで、あのスケジュールでいいものを作っていくには「ああいうやり方しかないんじゃないか」と。仕方なくあればっかりやってたら、目立っちゃったんだよね。

竹熊　ああ、つまり金田さんゆずりの目茶苦茶に凝った作画をするんで、スタッフに入れると危ないと思われてた（笑）？

佐藤　暴走するアニメーターですから（笑）。

鶴巻　うまいから、目立ったんですよ。やっぱり見れば、うまいか下手かわかっちゃうから。

摩砂雪　だって俺、アニメーターとしてのスタートは２４『新ど根性ガエル』なんだよ（笑）。ホントはああいう日常芝居ばっかり描いていた人間だったのに。そういうのが好きだったんだけど、それができなくなってきて。結局コレもんばかり任されるようになって。

鶴巻　でも思うんですけど、『新ど根性』やってた亜細亜堂の芝山努さんの作画と、金田さんの作画は、非常に近いものを感じますけれどもね。いわゆるトリッキーな動きのタイミングが似ているというか。

摩砂雪　でもレイアウト自体にパースはないじゃない。レイアウトでパースつけたり、変な構図にしたりっていうのは、絶対ないわけだから（笑）。

大泉　すいません、金田さんというのは……。

竹熊　金田伊よし功のりさんっていう、ベテランの名物アニメーターがいるんですよ。ものすごいパースつけて、構図に凝る人。摩砂雪さんはその筋のアニメーターということになってるんですよね。でも摩砂雪さんは、実はアクション以外のシーンも好きなんだと、こういうことでしょうか（笑）。

　そういえば『ナディア』の時にまるまる一本作り直したってことがあったそうですね。

摩砂雪　『ナディア』作り直しだったっけ？

佐藤　一本まるまる原画を捨てたやつじゃないですか。三三話でしたっけ。

鶴巻　三七話ですよ、確か。庵野さんが原画を描いて。

摩砂雪　庵野が作監をやったんでしょう、結局。

貞本　コンテ段階からケチがついて、作画でぶちキレて、こんなん使えないよって。だったら、いまの『エヴァ』じゃないけど、あれ〝編集物〟のハシリだよね。

摩砂雪　というか、あれが『エヴァ』の一六話の元みたいな感じだね。

貞本　編集でストーリーが見せられるんだって初めて気がついた。

鶴巻　ありものだけ使っておいて、編集で全然違う話に作れるっていう。

摩砂雪　あれはよそで描いたコンテを捨てたんだ、確か。

鶴巻　結構庵野さんて、他人にダメにされるくらいなら「俺がダメにしてやる！」みたいな（笑）。そういうところがあったりするじゃないですか。

佐藤　いつでも同じ（苦笑）。

竹熊　そういうある意味、無茶苦茶なことやってても、皆さん一緒に仕事をしてるってことは、やっぱり庵野さんには魅力があるわけでしょう。

摩砂雪　魅力？　ハハハ（笑）。

竹熊　その辺の話が聞きたいんですけれど。人間的な魅力なのか、才能に対する魅力なのか。

摩砂雪　お貞なんか、一番あれなんじゃない、嫌気がさしてる人間なんじゃないの。

貞本　俺、今回は距離を置いちゃった人間だから（笑）。

竹熊　結局、貞本さんはアニメの実作業には深く係わっていないですものね。企画とキャラデザインぐらいで。

大泉　それはそれで大きいですけどね。

貞本　いや、もう（『エヴァ』の）企画さえ通っちゃえば、僕はまあ、お役ごめんかなとか思ったんで。だって今回は、スタッフがすごいでしょう。本田君入ってて、鶴巻入ってて、俊ちゃんがいて。もうこれだけいりゃあ、どう転んでもひどいものにはならないだろうっていう。

竹熊　スタッフのレベルが高かったんですね。

貞本　ええ。もうとにかく、今回の僕の仕事は企画を通すまでと悟った。

摩砂雪　お貞、（言うことが）うまいなあ。

貞本　でも、本当にそう思ってたよ。





［『エヴァ』の始まり（１）］





竹熊　じゃあちょっと大月さん、そろそろ出番という感じで。まあ『エヴァ』の発端の話で。大月さんと庵野さんの出会いで、『エヴァ』の企画が立ち上がるその辺の話をお聞きしたいんですが。

大月　発端ですか？　なんか私に電話かかってきて、それでまあお茶でも飲もうって言って、その時は大きい映画を庵野さんがやってて……。

貞本　『蒼きウル』。

大月　ええ。その映画が中断する、中断しないっていう瀬戸際の頃で。どうなるかわかんねえとか言って。それで万一そうなったら、もう映画はいいから、テレビやりたいから、その時はよろしくと。ちょうど私が、その時テレビで、『エヴァ』みたいな形で、スポンサーから局対応から一人で担当してた２５『ブルーシード』ってのをやってたんで。ああいうものがテレビで通用するなら、こいつ（大月）と組んでもなんかできるんじゃないかと思ったらしくて。テレビやることになったら、その時は手伝ってくれって言われて。

　それで何回かガイナに電話して、それで「どうだウル、つぶれたか、つぶれたか」って電話すると……。

貞本　うわー。すごい電話（笑）。

大月　そしたら庵野さん、絶対やります、やりますって。ガイナの電話に出てるから、つぶれるなんて言えないじゃないですか。それで自宅に電話したら、「いや、つぶれそうだ」って言って（笑）。

佐藤　どっちやねん。

大月　ガイナに電話すると、「ウル、やる」って言ってて。それでまた一月、二月と待ってて、それで結局電話かかってきて、『ウル』、降りたからって言って（笑）。そろそろ頭切り換えるからって、ぼちぼち動き出して。

竹熊　それが何年頃ですか。

佐藤　九三年でしょ？

大月　いやいや。

竹熊　九一、二年？

摩砂雪　九三年ぐらいじゃないですか。

大月　じゃないですかね。初夏ですね。

鶴巻　『ウル』の作業は、四月一杯で終わったんですね。四月一杯……五月でしたっけ。

摩砂雪　いや、なんか六月までかけてたんじゃない。夏前までやってたよ、なんか。

鶴巻　ああ、八月一杯までだ。

摩砂雪　そうそう。

鶴巻　それで終わっちゃったんだ。

竹熊　『ウル』の話というのは、どの程度出せるんですかね。でも、またやるんでしょう。凍結って言ってますよね。

佐藤　結局監督が、庵野から山賀に交替したってことなんですよ。

竹熊　庵野さんは降りたってことですね。

佐藤　そういうことですね。映画中断の時点で、社長の山賀が、じゃあ企画ごと召し上げみたいなかたちになりました。それで庵野さんとしては、じゃあ、（自分の企画を進めたいということで）新しくテレビシリーズを立ち上げましょうという流れになったんですよ。
