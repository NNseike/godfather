　また、長編アニメーションを作るとか言っているようだけど、出来上がれば無視は出来ないんじゃない？

──やっぱり押井さん、宮崎さんのことお好きなんですねー。

押井　それは違うって。僕のテーマのひとつは、宮さんより長生きすることです。絶対生きて、葬式出るぞってね（笑）。





『モデルグラフィックス』



　84年創刊の月刊模型雑誌。宮崎は創刊当時から『宮崎駿の雑想ノート』を不定期連載。その一編である『飛行艇時代』が『紅の豚』としてアニメ化された。本作の原作『風立ちぬ』の連載は09年から10年まで。





堀越二郎（ほりこし じろう）



　工学博士。03年群馬県生まれ。三菱内燃機製造（現・三菱重工業）に入社して航空機の設計と開発に務める。ゼロ戦の設計に尽力した。アニメでは恋愛結婚した妻を結核で亡くすが、実際はお見合い結婚し６人の子供をもうけたという。82年逝去。





『夢』



　90年の日米合作映画。黒澤が自分の夢をもとに８話のエピソードで綴ったオムニバス映画。第５話『鴉』にはマーティン・スコセッシがゴッホ役で出演している。日本で資金を集められなかった黒澤がスピルバーグに脚本を送り、彼の尽力によってワーナー・ブラザースが製作することになったといわれている。





トーマス・マン



　小説家。１８７５年ドイツ生まれ。代表作に『ヴェニスに死す』『トーニオ・クレーガー』『魔の山』。29年にノーベル文学賞を受賞した。55年逝去。





『魔の山』



　24年に出版されたトーマス・マンの小説。第一次大戦前、アルプス山脈のサナトリウムで療養する主人公が、その７年間のうちにさまざまなことを学び成長するさまを描く。マンの妻カタリーナは肺を病んでサナトリウムで療養していたという。





ユンカース



　ドイツの航空機。劇中、堀越二郎が視察に行くが、そこに登場するのはユンカースＦ．13という世界初の全金属製旅客機と巨大旅客機のユンカースＧ．38。





メッサーシュミット



　ドイツの航空機、車メーカー。第二次大戦におけるドイツ空軍の主力戦闘機。





カプローニ



　ジョバンニ・バッチスタ・カプローニのこと。１８８６年イタリア生まれの航空技術者・航空機設計者。二郎の夢に出てくるのはカプローニCa．36という多発大型爆撃機と、それよりデカいカプローニCa．90、それよりもっとデカいカプローニCa．60。





ドレッドノート



　第一次大戦時の英国海軍の戦艦。





タイガー（ティーガー）



　第二次大戦時のドイツ軍戦車。





トライキング・スリーホイラー



　英国製の三輪のオープンスポーツカー。宮崎監督はこれを94年に入手したという。





レザーフェイス



　トビー・フーパー監督の傑作スプラッタホラー『悪魔のいけにえ』（74）に登場する殺人鬼の通称。人の顔を剥いで作ったマスクをかぶっているためこの名前で呼ばれている。エプロンは人間を殺すときに着用する。





STORY



神戸大空襲で母を失った14歳の少年・清太と４歳の妹・節子。兄妹は叔母の家に身を寄せるがうまくいかず、防空壕でふたりだけの生活を始める。必死に生き抜こうとする兄妹だが、食料が得られず節子は栄養失調で死んでしまう。





キャスト：辰巳努　白石綾乃　原作：野坂昭如　脚本・監督：高畑勲　公開日：１９８８年４月16日　上映時間：約88分　興行収入：11・７億円　キャッチコピー：４歳と14歳で、生きようと思った。





文学の世界、アニメの世界





──高畑勲監督の作品、『火垂るの墓』。高畑さんのジブリでの初監督作です。原作は野坂昭如の短編ですね。

押井　麻紀さんは全然泣けなかったって言ってたよね？　僕も同じなんだけど、僕の周囲のアニメーターたちは、みんな目を真っ赤にして泣きはらしていた。

──私の場合はかなりあとで観たのですが、清太というにいちゃんに腹が立って。あんたが辛抱ないから節子が死んだんだって、泣くどころか怒りまくり。公開当初、みんなが「催涙弾映画」と言っていたのが信じられないくらいだった。

押井　麻紀さん、そこだけは正しい（笑）。兄が自分のプライドのために唯一の拠り所だった親戚の家を出て、結果的に妹を餓死させたという映画だよね。

──中盤くらいのところで、農家のおじさんににいちゃんが食料が欲しいと頼むと「もう家に帰れば？」と言われる。にもかかわらずガンとして帰らない。あの強情っぷりには驚きますよね。

押井　原作は文学だから、それでいいんですよ。文学の世界では、どんなに残酷であっても、エゴイストであってもいい。それは芸術なんだから何の問題もないんです。でもさ、これは映画だから。映画で、しかもアニメーション、宮さん言うところの「子供に観せようと思って始めた２本立て」なんだよ。ところが、結果的にそうはなっていない。あんなもの、親が子供に観せたいと思う？　僕も人の親だから言うけど、絶対に観せたくなかったから。だって残酷すぎるでしょ。あんな作品を幼いときに観たら、人間不信になってしまうよ。

──駅に転がっている死体が喋るというオープニングですからね。小さい子供だとトラウマになっちゃいそうです。

押井　文字だと何てことない表現が、画として起こすととんでもないものになってしまいがちなのがアニメーションという形式なの。これを判っていらっしゃらない方が多すぎますね。いい例をあげると、ＯＶＡの『デビルマン』。スタジオジブリがヒマな時期に、錚々そうそうたるアニメーターが作画を手伝ったんだよね。で、美樹というヒロインが、お風呂に入っているとデーモンに襲われるというシーンがあった。永井豪らしいエロチックなシーンで、そこをジブリのベテランアニメーターが担当したんだけど、どういうシーンになったと思う？　メチャクチャ丁寧な、よくできた作画だったものの、その技術で動かされた美樹は、驚くほどエロかった。本当にヤバいくらいにエロだったんだよ。おそらく、それは演出の計算外。プロデューサーや演出は、「上手いアニメーターだったらきっといいシーンになるだろう」という考えだったんだろうけど、それが大きな間違い。上手ければ上手いほど、演出家の思惑を超えてしまう。

　実写は役者が演じることによって、最初から抽象度の階梯が決まっているけど、アニメーションの場合は絵柄と作画でガラっと変わってしまう。だから、アニメーションのほうが遥かに演出的には難しい。あらかじめスタッフに、これくらいの抽象度で、こういう表現で、と言っておかないと、とんでもないものが立ち上がる瞬間がある。

　『火垂る』に話を戻すと、妹が餓死し荼毘だびに付すため、兄が隣の町に炭を買いにいくシーン、僕はそこでゾッとした。アニメーションで表現するとこうなるんだということを痛感したんだよ。もしこれが実写で、子役が演じていたら、そこまでの感想はもたなかったかと思う。

──それに妹のせっちゃんの声がかわいいですからね。あれでほとんどの人が彼女に感情移入し、泣いちゃったんでしょ？

押井　それもアニメーションだから。もし、普通の子役がやっていたら、あそこまでかわいくはなっていない。あの絵柄、たどたどしい声、それも関西弁で喋るから、みんなやられてしまった。彼女が「死んだ」という事実と、その悲しさに目が釘付けになり、「誰が殺したのか」というところまで考えが及ばないんだよ。

──なるほど、そういうことなんだ。

押井　高畑さんはこの兄に、いまどきの忍耐力のない子供たちを投影してみた、なんて言っているようだけど、それが本心とはまったく思えない。僕はアリバイにすぎないと考えているから。なぜなら、『火垂る』は１００パーセント作家の映画。高畑さんは、自分のやりたいことしかやってない。それをまっとうするため、公開日に間に合わなくても、そのまま未完成の作品を上映した。つまり、そこまで自分の表現に執着していたんだよ。これはもう執念以外の何物でもない。それを「子供に観せたかったから」だなんてウソに決まってるじゃない。





高畑さんの最高峰



──高畑さんは何を描きたかったんですか。

押井　死とエロス。死生観ですよ。あれは高畑勲の死生観。監督が一度は自分の作品のなかで追求するテーマだよ。どんなアリバイ、どんなウソを並べても、間違いなく高畑勲という映画監督の作家主義１００パーセントの作品に違いないんだから。

──確かに、表現のひとつひとつが濃密だった。画の迫力がとんでもなくて驚きました。

押井　監督の強い意志があるからこそ、そういう表現ができた。アニメーターたちを追い込めるんだよ。

　僕が『火垂る』でもっとも印象的だったのは、兄妹で電車に乗るシーン。あれは明らかに三途の川に向かって走っているという表現だよね。『千と千尋』のなかでも宮さんがやっていたけど、あれは『火垂る』のこの市電のリフレイン。

──その電車のなかで、せっちゃんがサクマ式ドロップスの缶をカラカラいわせてた……何か怖いと思ったんですけど。

押井　あれは骨壺。『火垂る』はその種の暗喩に満ちていて、怖いどころか気持ち悪いくらい。

　で、〝生〟のほうだけど、これは微妙に〝性〟になっている。だから〝死とエロス〟になるわけで、そのエロスは何かと言えば近親相姦になる。あの兄妹の関係は明らかに近親相姦でしょう。見る人が見たら、相当に気持ち悪い映画だよ。

──画に力があるだけに、生理的な何かを感じましたが、それが近親相姦とは。

押井　ディテールの迫力があるから。通り一遍に描いていたら、そういう生理は絶対に生まれない。高畑さんの演出家としての緻密な計算があり、表現に執念が宿っているからこそですよ。あの世の匂いがプンプンするし、近親相姦の匂いもプンプンする。

──でも、これを『トトロ』と２本立てって、まさに天国と地獄じゃないですか。

押井　そこにはまた鈴木敏夫の悪意が入っていると思ってしまうんだよね。２本はまったく異質の作品で、宮さんらしさのある世界と、高畑さんの本質がむき出しになった世界。それを２本並べて観せたかった。そこに悪意を感じるわけ。

──押井さんはどっちに軍配を上げます？

押井　間違いなく『火垂る』。『トトロ』はやっぱり短編向きだから長尺に感じてしまうし、宮さんにしてはパワーが足りないから。それに比べると『火垂る』は凄いわけじゃない？　高畑さんは冷徹な人で、実はリミッターがない人。子供が観るからとか、そういうことはお構いナシでとことんやる。しかも演出家としては超一流なんだよ。彼の影響を受けなかった人なんてアニメ業界にいないんだから。僕だって受けてますよ。そんな高畑さんが思う存分やった。公開日を無視してまでやったんだから、途方もない凄みが『火垂る』に宿るのは当然なの。僕も「ここまでやれるんだ」というか「ここまでやるんだ」と思ったからね。好きか嫌いかはさておき、高畑さんの最高峰には間違いないよ。





ターニングポイントの３本目



──それは判ります。

押井　『トトロ』と『火垂る』の２本立ては、ジブリを語る上では非常に重要な作品で、この頃からジブリは建前と本音が分裂し始めた。ジブリに限らず、個人のフィルモグラフィーにおいても、３本目はターニングポイントになりやすい。この辺から宮さんや高畑さんが文化人になりはじめちゃったんだよね。

──文化人ですか？

押井　言わば作家主義ですよ。スタジオジブリは宮崎駿と高畑勲という作家の作品を発表するスタジオになっちゃったわけ。それは、ジブリを始めたときの大義名分、〝娯楽漫画映画を作る〟とは明らかに違うでしょ。

──そうですね。

押井　もっと言えば、そこから先はプロデューサーの世界になる。つまり、作家の作った作品を売るべく、タイトルやキャッチフレーズを考える。要するにプロデューサーが〝名分〟を用意してくれるんだよ。

──そう聞くと、鈴木さんにぴったりの仕事ですね。

押井　だから、この２本立てから彼ら３人の力関係というか、ストレートに言っちゃえば、３人の闘いが始まったわけだ。それまでは高畑さんが宮さん作品のプロデューサーで、鈴木敏夫は黒子のような、もうひとりのプロデューサーだったけど、これを契機にトシちゃんが前面に出るようになったからね。

──３作目でつまずくって、押井さんの場合は『天使のたまご』ですが。確かに説得力あるかも……。

押井　判ってるって（笑）。だから経験者として言ってるんじゃない。僕も『天たま』のときはソノ気になっちゃった。アートに行って、アニメーションの表現力を最大限まで試して、その表現で作品を支えようとしてしまった。だから、ストーリーもセリフもナシでいいと考えてしまったわけ。

──押井守監督はタルコフスキーしたかったんですね！

押井　そうそうそう（笑）。『ストーカー』してみたかった。でも、それが大間違いで、おかげで３年間、干されちゃったから。それがやっぱり効いたんだよね。僕の場合はフリーランスだったから、守ってくれるスタジオもなければプロデューサーもいなかった。だから石川に流れ着くまではアニメーションを作る根拠をもてなかったどころか、食うことさえままならなかった。とはいえ、その３年間のおかげで「アート」への道を断つことができたし、文化人にも作家主義にもならなかった。自力でちゃんと帰って来ることができましたから。じゃあ、ジブリのふたりはどうかと言うと、スタジオと鈴木敏夫という、守ってくれる存在があったんだよ。だから、その勘違いを抱えたまま、どんどん知性と教養だけで映画を作るようになった。とりわけその傾向が激しいのが高畑さん。『火垂る』は、高畑さんが作家主義を爆発させた映画なんだよ。

──じゃあ、押井さんは作家じゃないつもりなんですね？　私たちから見ると作家性の強い監督というイメージなんですけど。

押井　勘違いです。

──もしかして自分はエンタテイナーだと思ってる？

押井　もちろん。娯楽映画を作るという意味じゃなく、商業主義のエンタテイナーという意味だよ。デヴィッド・リンチは僕に言わせれば商業主義の監督で、ヴィム・ヴェンダースは作家主義です。

──はあ……。

押井　要するに、伝統的な文化の価値観を信じるかどうかなんだよ。リンチはただやりたいことをやっているだけだし、自分の本質に忠実な映画作りをしている。一方、ヴェンダースは文化に目覚めてしまった。彼の意識は作家であり文化人だと思うよ。もともと作家という捉え方が近代以降のもので、昔は職人しかいなかったんだから。誰が作ったなんてことはどうでもよかった。ある作品には必ず一個の人格があるというのは近代以降の考え方ですよ。

　簡単に言ってしまえば、テーマはともかく、ひとりの人間が世の中に対して自己主張する、思想の表明をするということだよ。

──それだと、確かに押井さんはそういう自己主張はしてないですね。

押井　はい、やってません。





野坂昭如（のさか あきゆき）



　政治家、歌手等の顔をもつ作家。30年鎌倉市生まれ。『エロ事師たち』で作家デビューを飾り、『火垂るの墓』『アメリカひじき』で直木賞を受賞。その他の代表作に『戦争童話集』『東京小説』等。『火垂るの墓』は戦時中の自分の経験に基づいて書かれている。15年逝去。





『デビルマン』



　『デビルマン　誕生編／妖鳥死麗濡編』（87〜90）。デビルマン誕生までを描く「誕生編」と、妖鳥シレーヌ＆魔獣ジンメンのバトルを描いた「妖鳥死麗濡編」から成るＯＶＡ。





永井豪（ながい ごう）



　漫画家。45年石川県生まれ。『ハレンチ学園』が大ヒットして人気漫画家に。代表作に『デビルマン』『キューティーハニー』『ゲッターロボ』『マジンガーＺ』等。





せっちゃんの声



　節子の声を担当したのは関西出身の当時５歳、白石綾乃。本作が初の声優業だったため、アフレコではなくプレスコで声を収録。そのかわいくリアルな声に日本中が涙した。





タルコフスキー



　アンドレイ・タルコフスキーのこと。映画監督。32年ロシア生まれ。代表作に『僕の村は戦場だった』（62）、『惑星ソラリス』（72）、『ノスタルジア』（83）等。たゆたうように流れる時間と、美しい自然描写が特徴。86年逝去。





『ストーカー』



　79年のタルコフスキー監督作。ストルガツキー兄弟のＳＦ小説『路傍のピクニック』の映画化。立ち入り禁止の場所〝ゾーン〟へと希望者を案内する〝ストーカー〟。とある〝部屋〟は願いが叶うといわれているが…。全編〝水〟が効果的に使われている。





石川



　石川光久（いしかわ みつひさ）のこと。（株）プロダクション・アイジーの代表取締役社長、プロデューサー。58年東京生まれ。押井のアニメ作品は『パト１』から『スカイ・クロラ』まですべての製作を担当。実写映画『ガルム・ウォーズ』でも製作に名を連ねている。





ヴィム・ヴェンダース



　映画監督。45年デュッセルドルフ生まれ。『都会のアリス』（74）で注目される。代表作に『ハメット』（82）、『パリ、テキサス』（84）、『ベルリン・天使の詩』（87）、『ミリオンダラー・ホテル』（00）等。





STORY



東京での生活に物足りなさを感じている27歳のＯＬタエ子。10日間の休暇をとって、山形の親戚の家で紅花摘みの体験をする計画を立てる。ふとしたきっかけで頭から離れなくなった10歳のワタシの記憶と共に、夜行列車に乗るのだった。





キャスト：今井美樹　柳葉敏郎　原作：岡本螢　刀根夕子　脚本・監督：高畑勲　プロデューサー：鈴木敏夫　公開日：１９９１年７月20日　上映時間：約１１９分　興行収入：31・８億円　キャッチコピー：私はワタシと旅にでる。





妄想する〝クソインテリ〟





──高畑勲監督の『おもひでぽろぽろ』です。

『火垂るの墓』の次に作った作品ですね。これにも一応、同名の原作漫画がある。

押井　麻紀さんどうだった？

──私に聞くんですか？　どうって……ダメですよ。私は田舎出身者なので、田舎の嫌なところもたくさん知っている。この作品は田舎を賛美しすぎじゃないかと思いました。一部の都会の人がもっている〝田舎神話〟みたいなものがモロに出ているというか、そんな感じ。

押井　ふむふむ。じゃあ、ヒロインの女性は？

──タエ子ちゃんの子供時代はよかった。昭和の風景も懐かしいし、彼女がとても感受性豊かで、共感する部分も多い。でも、そんな少女がなぜ大人になったら田舎を愛するような女性になったのか、その部分が描かれていないのが気になりますよね。同じ人物とは思えないくらい子供時代と現在が分断されていて、子供時代がいいのはきっと、ここだけ原作があるからだろうって。

押井　そう、あのかわいかった少女が、成人して味気ない人生を送る女性になった、その理由があるはずの中間地点が描かれていないから説得力がないんだよ。それはなぜだと思う？

──テーマが田舎信仰で、作り手が少女の成長には興味なかったから？

押井　正解。

──（笑）なんで私が押井さんの試験を受けなきゃいけないんですか！

押井　それがたぶん、読者には一番判りやすいから。敢えて言っているの。

　『ぽろぽろ』は結論ありきの映画なんですよ。結論から出発した映画と言ってもいい。だから、インテリが作った映画。うちの師匠が激怒してたからさ。「クソインテリめ！」って。

──確かにインテリの匂いは立ち込めていますね。ヒロインがときめく農家の青年は、都会の仕事をやめて農村に戻ってきた男で、聴いている曲がハンガリーの「百姓」の音楽。しかも、「オレ、この車が好きで」みたいなこだわりを覗かせる。その彼に何度も何度も「オレ、百姓だから」と言わせているのも驚きでした。

押井　要するに日本型マルキストの典型であり、農本主義がむき出しになった映画。文字通りむき出しで、ドラマさえすっ飛ばしちゃった。映画として、本当は一番描かなくてはいけない部分──少女の成長を見事にスルーして、農村の素晴らしさを謳うことに終始してしまった。じゃあ、その素晴らしい農村の根拠はどこにあるのか？　高畑勲というインテリの頭のなかに宿った妄想のなかにしか存在しない。昔から、そういうインテリの妄想は歴史があるんだけどね。

──たとえば、どんな人なの？

押井　みんながよく知っている人物で言えば宮沢賢治。そして、満州事変を起こした陸軍参謀の石原莞爾。僕に言わせればふたりは同類。思想的には同じなのに、賢治は絶賛されて、なぜか石原莞爾は嫌われる。日本を戦争に導いた極悪人のように扱われる。この差は何なんだって思うよね。

　それはさておき、日本のインテリの多くは農村信仰が強い。なぜかと言えば、彼らは日本のマルキストで、本来のマルキストは工場労働者、プロレタリアートに基盤を求めたんだけど、日本の場合、それに該当する階級が近代工業の立ち遅れによって形成されてなかったので、農村に根拠を求めたんだよ。だから農村信仰になる。『ぽろぽろ』もそういう高畑さんの思想に基づいて作られているから「農村は素晴らしいところ。人間が人間らしく生きる根拠はそこにしかない」という部分がむき出しになっている。

──公開時のパンフレットに高畑さんは、「自己確立のために自己を対象化できる最も基本的な試金石は、人間の営みの根本をいまなお伝える田舎にあると確信する」なんて書いてますね。

押井　それはもうプロパガンダ。インテリが好きそうな脅迫だよ。

──ちなみに鈴木さんは「高畑勲と宮崎駿のふたりは、いつの時代も流行に背を向ける。そこに生きるヒントがある」と言ってますね。

押井　ただの反動です。確かに時代に背を向けているけど、それは反動思想として。高畑さんを語るときに使わなきゃいけない言葉は「クソインテリ」です。でも、日本のインテリはみんな同じパターン。自分が生きて来た自己史のようなものをもたないし、そこに立脚してものを考えようとも全然思わない。それこそが高畑さんで、だから「クソインテリ」なの。『火垂る』から知性と教養だけで映画を作るようになって、次の本作では結論から遡って映画を作っている。そうなると、もはや映画監督とは言えない。プロパガンダを発する文化人ですよ。





テーマとやりたかった実験



──プロパガンダの割には、本作を観て「紅花作ろう」「田舎に嫁ごう」なんて思う女性はいないと思いますよ。

押井　だから空回りしているの。何度も言っちゃうけど、映画を観ている間だけその気にさせれば勝ち、理想を言えば、そういうふうに影響を受けて欲しいけど、と思うくらいで、自分にそこまでの力があるとは考えていない。ただ、自分の方向性としては正しいことを言っていると思っている。

　でもさ、僕に言わせれば、そう思った時点で監督としてはアウトなんだよ。僕は、自分が作っている作品は結局、根も葉もない妄想なんだ、そう思ってずっとやってきたから。だけど、あるひと握りの人たちにとっては、僕のその作品が必要なんだって。それくらいはお役に立っているという……僕はＴＶの『うる星』をやっているとき、悲鳴のようなお手紙をたくさん貰ったから。

──ファンの方に？

押井　地方在住の中学生や高校生が「水曜日の７時半からの30分間だけが、僕の生きている時間です。あとは死んだように生きてますから」みたいな感じ。師匠にも「彼らの憧れのキャラクターを作るのがお前の仕事だ。それ以外のことをやりたいなら、帰って日記に書いとけ」って。まあ、「それ以外のこと」もさんざんやっちゃったんだけどさ（笑）。

　で、それがアニメーション監督の使命のひとつでもあるわけなのに、高畑さんは『火垂る』あたりから、そういう意識はなくなってしまった。それでも作品を作ることができたのはアニメーションだったから。高畑さんとアニメーションの出会いは、千載一遇の好機だったんだよ──本人はどう考えているか知らないけど。

──実写だったら、クサくて観られない？

押井　たぶん。山本薩夫の出来損ないみたいな監督になってたんじゃない？

──それにしても、なぜ紅花なんでしょう？　日本の場合、稲作農家のほうがいいと思うんですけど。

押井　女の子が何となく行きやすいから。

──えー、そんな理由？

押井　だって、そうでしょ。もしあれが稲作農家だったら、東京の女性が嫁ぎたいと思う？　最後に引き返したと思う？　紅花のほうが女性たちが共感しやすいじゃない。それしか考えられないよ。

　もうひとつあげるなら、おそらく高畑さんが紅花に興味があり、随分勉強してたんじゃないかな。自分が勉強したことはもれなく作品につぎ込む人だから。

──でも、原作のある子供時代はいいですよね。私は同世代なので楽しかった。

押井　懐かしの昭和をやっているからだよ。お父さんが会社の帰りにパイナップルを買って来て、菜切り包丁で切り分けて食べてみると、「意外と美味しくない」。その時代に生きた人だったら、みんな思い当たる節がある。パイナップルが美味しくなかったのは、熟れてないのに食べたからだけど、そういう小さなエピソードを含め、当時の家庭を丁寧に描いている。

──でも、お金持ちの家ですよね。千疋屋でパイナップルを買ったり、エナメルのハンドバッグを持っておめかしして中華料理を食べに行く。そもそも子供時代のタエ子ちゃんの着ているお洋服のかわいいこと！　高畑さん、センスいいわー。

押井　当時の一般家庭で、そんなことあるわけないじゃない。庶民を装ってるけど、一から十までウソですよ。映画を観ている間だけ、そのウソに気づかないようにできているだけ。みんなの願望を画にしているから、知らないうちに説得されているんだよ。人間というのは、望んでいるものが形にされれば、誰でも説得されちゃうんだって。

──そういう押井さんだって、ＴＶのブラウン管から流れる『ひょっこりひょうたん島』は嬉しくなかったですか？　あの見事な再現は公開当時も話題になってましたよね。

押井　昭和という時代の再現にひと役買っているのは事実。では、なぜ、そういうふうに手間隙かけて昭和の時代を再現したのか？　「昔はこんなによかったのに、なぜいまのような時代になってしまったんだろう」というステップですよ。昔は感受性が豊かでいい子だったというヒロインのアリバイになっているだけ。しかし、いまは何の目的意識もなく、何となく都会で流されて生きている。疲れました……というところはたぶん、トシちゃんが狙った部分。同じように疲れているおねえさんたちを観客のターゲットにして、劇場に呼ぼうとしたわけだよ。

──女性誌の特集になりやすいと思ったのかな。紅花というのをキャッチーだと考えたかもしれないし。あと、公開当時、話題になっていたことが、キャラクターの頰の線。筋肉をつけようとしたんでしょ？

押井　そうだよ。キャラクターが頰の筋肉を動かして喋っている。それはとても手間隙かかっていて、実際に声優たちが声を当てている様子をビデオ録画して、それを参考にして作画させたんだよ。つまり、ここでも高畑さんは方法論の実験をしたかった。で、それは実験に終わっているだけで、作品のテーマや本質には何の関係もない。高畑さんは、頰の筋肉を描くことでヒロインの人格も表現したかったとか言っているようだけど、それはアリバイにすぎないから。つまり、本作のテーマは、農本主義を浸透させるプロパガンダ。でも、やりたかった実験はそれ。要するに、いつもの高畑さんらしく、テーマと実験が分裂しているんです。

──あの頰の表現、もしよかったら誰かが継承しているはずだけど、その後のアニメで観たことがない。

押井　それは当たり前です。あれだけ手間隙かけて何が面白かったのか、ということにしかなっていないから。

──音楽はどうです？　今回は都はるみにベット・ミドラーの『ローズ』をカバーさせている。

押井　あれを映画的詐術と言うんだよ。つまり、詐欺。ラストでその曲がかかることで、何となく納得させられる。反対に、歌がなかったら、誰もが「何だ、この映画？」になっていたと思う。大なり小なり、監督なら誰もがやっていることで、僕だって川井（憲次）君の曲を壮大に鳴り響かせて何となく終わらせているし。

──確かに、最後に印象的な曲が流れると何となく丸くおさまっちゃう。

押井　『ぽろぽろ』の場合は、説得すべき内実がないから印象的な音楽を流して一応、終わらせてみた程度。そもそも、あんな農村あるの？　ってことだよ。

──農家の人が、みんなイイ人。田舎者にとってはファンタジーでした。

押井　昔、宮さんと話したことがあるんだけど、「多少なりとも、創造的な野心をもっている人間には２種類しかいない。収容所の所長になる男と、脱走を企てる男の２種類。映画監督もそのどちらかだ」ってね。宮さんや高畑さんはどっちだと思う？

──脱走をプランしそうには見えないから所長？　押井さんは脱走者のほうしか考えられない（笑）。

押井　アタリ！　だいたい映画監督なんて独裁者を目指すか、アナーキストになるかのどちらかですよ。スタジオを作った時点で宮さんも高畑さんも独裁者。そもそもスタジオを作り、自分がそれを動かすということ自体、独裁者的ですから。僕はスタジオなんてこれっぽっちも思ったことがないし、これからも絶対に思わない。だからアナーキスト。

──宮崎さんのお気に入りの庵野さんもスタジオを作りましたしね。

押井　あのふたりは似てるんだよ。言うまでもなく庵野は独裁者タイプ。人に犠牲を強いても何とも思っていないから。





ハンガリーの「百姓」の音楽



　「百姓の音楽、好きなんです。オレ、百姓だから」と短いワンフレーズのなかに二度も「百姓」という単語を使い、百姓への熱い想いをアピールするトシオ。その愛車のカーステレオから流れる曲は「ハンガリーのムジカーシュという５人組」と彼が説明する民族音楽グループによる「Teremtes」。





マルキスト



　マルクス主義を信奉する人のこと。マルキシストとも言う。





農本主義



　農業や農村社会こそが国の基本であるという考え方。





宮沢賢治（みやざわ けんじ）



　作家・詩人。１８９６年岩手県生まれ。24年『春と修羅』でデビュー。代表作に『風の又三郎』『銀河鉄道の夜』『注文の多い料理店』等。出身校は現在の岩手大学農学部で、花巻農学校（現在の県立花巻農業高校）で教鞭をとる。故郷の岩手を理想郷を意味する「イーハトーブ」と名付けたことでも知られている。33年逝去。





石原莞爾（いしはら かんじ）



　陸軍軍人。１８８９年山形県生まれ。31年に満州事変を起こし満州国を建国。その後、二・二六事件を鎮圧した。東条英機との確執により左遷される。49年逝去。





『うる星』



　『うる星やつら』のこと。高橋留美子の同名漫画のＴＶアニメシリーズ化。81年から86年までオンエアされた。アニメ制作はスタジオぴえろから後半、ディーンへ。押井はぴえろ時代に本作のチーフディレクターを担当した。





山本薩夫（やまもと さつお）



　映画監督。10年鹿児島県生まれ。37年『お嬢さん』で監督デビュー。代表作に『真空地帯』（52）、『白い巨塔』（66）、『戦争と人間　三部作』（70～73）、『華麗なる一族』（74）、『不毛地帯』（76）等。反体制的なテーマを扱う社会派監督でありつつ、娯楽性の高い大作も数多くこなした。83年逝去。





『ひょっこりひょうたん島』



　64年から69年までＮＨＫ総合でオンエアされた人形劇。原作は井上ひさしと山元護久（やまもと もりひさ）。子供たちが遠足で訪れたひょうたん島が火山噴火によって陸地と離れ漂流し始める。しかもそこに上空からギャングたちが落下してきた！　大変人気の高かった人形劇シリーズ。劇中にも流れている主題歌を歌っているのはこれがデビューになる前川陽子。





ベット・ミドラー



　歌手・女優。45年ハワイ生まれ。デビューアルバム『The Divine Miss M』がプラチナディスクに輝き歌手としてブレイク。役者としては初主演作『ローズ』（79）でオスカー主演女優賞ノミネート。『フォー・ザ・ボーイズ』（91）でも同賞にノミネートされた。





『ローズ』



　ベトナム戦争さなかの米国でアルコールとドラッグに溺れながら、歌うことに命をかけた女性シンガー、ローズの半生。モデルはジャニス・ジョプリン。ミドラー自身が歌ったテーマ曲『ローズ』も大ヒットした。『ぽろぽろ』で都はるみがカバーしたこの曲の日本語タイトルは『愛は花、君はその種子』。このフレーズは原曲にも出てくる。ちなみに訳詞は高畑監督自身。





川井憲次（かわい けんじ）



　作曲家。57年東京生まれ。押井初の実写映画『紅い眼鏡』で音楽を担当。以来、ほとんどの作品を手掛けている。その他の作品に香港映画『イップ・マン 序章』（08）、『ＧＡＮＴＺ』シリーズ（11）等。





STORY



多摩ニュータウン建設で住処を奪われたタヌキたちが、「化学」（ばけがく）を復興し、人間への反撃を決意。タヌキの三長老の指導の元、百鬼夜行でニュータウンを襲うが、逆に人間に喜ばれてしまう。タヌキたちのおかしくも切ない戦いを描く。





キャスト：古今亭志ん朝　野々村真　原作・脚本・監督：高畑勲　企画：宮崎駿　プロデューサー：鈴木敏夫　公開日：１９９４年７月16日　上映時間：約１１９分　興行収入：44・７億円　キャッチコピー：タヌキだってがんばってるんだよォ。





自然描写に手抜きアリ!?



──さて高畑勲監督の『平成狸合戦ぽんぽこ』です。これは原案も脚本も高畑さんですね。

押井　『おもひでぽろぽろ』のときもそうだったけど、高畑さんの自然描写はいきなりＢＧ（背景）だけになったりする。作画でもフィックス（固定カメラ）で１枚何か入れたりするくらいだし、本当にスケッチで点景ばかり。そういうのは黒澤明の『姿三四郎』の時代から何も変わってない。季節の移ろいをモンタージュでパッパッパッと表現するだけ。

──そうでしたけど、きれいでしたよ。

押井　僕は、そういう表現をアニメでやる意味があるのかと言いたいわけ。もしあるんだったら、もっともっと丁寧に描かなきゃ。レイアウトもありきたりで、色もよくない。僕に言わせれば、新海誠のほうがまともなんじゃないかってね。

　僕がそんなこと言うのも、背景に関してはいろいろ考えていて、これまでもいろんなことをやってきたからで、言う資格はあるんです。つまり、高畑さんはまったく演出をしていない。コンテ通りのレイアウトで、背景さんや作画が描いただけだし、雲ひとつ動いてないよ。そもそもストーリーのなかで自然描写をほとんど活かしてないでしょ？　この作品のテーマを考えれば、自然をキチンと丁寧に描写しなきゃいけないはずなのに、手を抜いている。

──テーマはおそらく「自然を守ろう」みたいな感じですよね。

押井　開発を進めて都市化することをどう考えるのか、という話ですよ。タヌキの、化けるといわれている特性を使ってファンタジーにして、そのテーマをもっとエンタテインメントとして語ろうとしているわけだよね。にもかかわらず、森が開発され都市へと変化する部分がただのオーバーラップだったりで、本当に動いてない。これが宮さんならちゃんと動かす。それこそ『もののけ』のときのように、足元からフワーッと草や花が生えてくるような感じで、ちゃんと動かしてみせる。これだけ自然描写を動かさずに自然がテーマだなんて、ありえないよ。

──高畑さんの原案・脚本で、お得意の自然なのに、どうしたんでしょうね。

押井　全然やっていない。この作品に関して言うと、驚くほど淡泊。おざなり。やる気があったとはまったく思えない。

──鈴木さんの提案で始めたんでしょうか。

押井　判らない。僕もトシちゃんから、そういうことはまったく聞いてないから。でも、企画としてはありそうな話ではある。タヌキは都市の周辺、人間の近くにいる動物だから。人間の側にいるからこそ、いろんな民話や童話に登場するんだよ。そういうタヌキを上手に取り入れれば、いわゆる「漫画映画」が作れるんじゃないか？　いいアニメーションになるんじゃないか？　しかも都市化や近代化との向き合い方を語ることもできる。これにゴーサインが出る理由も判る。

──和風のファンタジーができそうですよね。

押井　うん。高畑さんは基本、『御伽草子』や『鳥獣戯画』のほうが好きで、ダンゼンそっちのほうの造詣が深い。だから得意分野のはずなのに、ファンタジーとしても喜劇としてもまったく成り立ってないでしょ。だから、僕が思うに、インテリが喜劇やギャグをやろうとすると笑えないという典型なんじゃないか。つまり、教養が邪魔しちゃうんだよ。





インテリのギャグは笑えるか



──高畑さんの話のときは必ず、その教養が出てきますよね。

押井　だってそうなんだから。これ観て笑えた？

──いや、まったく。

押井　喜劇を目指した以上は笑わせなきゃいけないのに。高畑さんのことだから、タヌキのお勉強もキッチリやったはずだし、タヌキにゆかりのある各地の大御所タヌキを３匹登場させているにもかかわらず、何をさせたかったのかさっぱり判らない。彼らはほぼストーリーに関与していないよね。

──そのタヌキは、六代目金長、太三朗禿狸、そして隠神刑部という名前ですね。

押井　もちろん、結論としては、タヌキが人間に勝つはずはない。その負けると決まっている勝負をいかに面白く見せるかがアニメーションでしょ。最終的にタヌキが負けて、人間のふりをして人間社会のなかで生きる化けタヌキがいる一方で、化けることのできないタヌキもいる。過激派のタヌキが機動隊に殲滅されて、その死体がトラックに放り込まれたりとか、かなり残酷なことを平気でやっている。まあ、高畑さんは急進派が好きじゃないってことが判ったけどさ。

　要するに、「跳ね上がりはこういう目に遭う」ということ。やっぱり組織を作り、みんなで勉強して、研究して、知性で勝負しなきゃダメなんだということを言いたいわけだ。玉三郎という名前の中道左派みたいなタヌキがいたよね？　ああいうのが勝てるはずないのに、そういう内紛みたいなことをメインでやるのか、いわゆる一種の左翼運動のような話になるのかと思って観ていると、そっちにも行かないんだよ。そのわりに平気でマルクス、エンゲルス、レーニンのようなタヌキの長老を出してきている。うーん、本当によく判らない。

──いろんなエピソードが詰め込まれている感じ。まとまりはないかも。

押井　各地の古ダヌキ３匹が出てきた理由は結局判らず、しかもそのおかげでテンポが落ちる。というか、映画全体にも言えるんだけど、テンポというものがこの作品にはないし、メリハリもない。

──時間軸が判らないですよね。四国や佐渡の長老を招集に行って、どれくらいして連れて来たのかも判らない。

押井　さっき言った玉三郎というキャラクターも、出向いた先で結婚したり、何をしているのか、何がしたいのか、判らずじまい。そういう細かいことを言い出したらきりがないよ。

──私は下ネタが多いのに驚きました。タヌキの八畳敷きとか、実際にやられるとドン引いちゃったんですけど。

押井　意外に下世話。だから思うんだけど、インテリがギャグを目指すと笑えないだけじゃなく、なぜか下品になっちゃうんだよね。土俗的な笑いというのとも違う。今村昌平じゃないんだから。

──『にっぽん昆虫記』みたいな？

押井　そうそう。そこまでは絶対に行けない。今村昌平はそれができる下地をもっているけど、高畑さんはもっていないから無理。団地のなかで妖怪大会をやったときも、やっぱり教養が邪魔しているのか、鳥獣戯画の世界で終わっている。アニメーションならもっと凄いことができるのに、それをしていない。

──私は、そういう描写のおかげで、物悲しさが生まれていて好きでしたけど。

押井　いや、ああいうシーンはパワー主義で行かなきゃいけないの。それこそ動画の威力を見せつけなきゃ。麻紀さんの感じた物悲しさは結果的にそうなっただけ。目指したものじゃないから。ただ日本古来の妖怪たちを次々と出しただけで、アニメーション的にはもっと別の表現があっただろうと言いたい。要するに妖怪カタログになっていて、これは最悪のパターンだよ。宮さんなら、唐傘お化けで一個飛行中隊は出す。唐傘お化けだよ？　飛ばさなきゃ意味ないでしょ。そうやってカタログ的な表現になっているのは、高畑さんが、自分の見せたかった妖怪をすべて出しているから。つまり、ここでも教養が邪魔しているんだよ。

演出の教科書『じゃりン子チエ』





──一応、キャッチのひとつに「総天然色漫画映画」とありますけどね。

押井　そういう要素はゼロです。タヌキがしょっちゅう化けたり戻ったりするし、タヌキの種類だけで３、４種類出てくる。画の階梯のレベル、抽象度の違い。それを同じフレーム、同じカットのなかで変えてみせたりして、それをアニメーション的だと思っているだけ。とにかく昔から言われている「メタモルフォーゼこそがアニメーションの本質だ」をやったつもりになっている。

──それは具体的にどういうことですか。

押井　ネズミが人間のように歩いたり、服を着て喋ったりすることや、馬の群れが大波に変わったりとか、ディズニーが散々やったこと。みんなそれを信じていた時期があったんだけど、日本ではやらなかった。なぜなら、そこまで手間隙をかける余裕がなかったから。結果的にキャラクターを固定し、抽象度も固定してドラマでがんばったわけだ。ドラマや演出の面白さで見せる方法を取ったの。一言でいうと劇画にしたんですよ。まあ『タイガーマスク』の世界かな。日本のＴＶアニメは基本的にそれ。絵柄や抽象度を途中で変えると視聴者が混乱するしね。ただし、二頭身のマスコットのようなキャラクターが側に転がっていたりするのはＯＫ。メカものでもよくやっている。

　でも、僕がスタジオに入った頃は、アニメーションでしかできないことをやるべきではないかという、要するにリアルでないものに傾いていたんだけど、師匠も僕もそういう流れには反発していた。で、僕の認識では高畑勲という人もリアル志向だったはずなんですけどね。

──確かに、この前の『火垂る』を観ると、バリバリのリアル志向ですよね。もしかしたら、ちょっとやってみたかったとか？

押井　だから、それくらいのレベルなんだよ。信念がないからこういうことになる。こういうのを〝おざなり〟と言うんです。

　だからテーマまで〝おざなり〟になっちゃった。あとは音楽もかな。誰だっけ？

──テーマ曲は上々颱風の『アジアのこの街で』。エンディングに流れるのも同じバンドの『いつでも誰かが』ですね。

押井　当時の流行モンでしょ？　音楽もおざなりに選んでいる。

──押井さんの話を聞いていると、高畑さんって面白い物語を語りたいというつもりがあまりないように感じるんですが。

押井　全然ない。昔はあったよ。『赤毛のアン』の頃までは確かにあった。僕は当時の高畑さんを尊敬していたしね。『赤毛のアン』でどれだけ勉強させてもらったか判らないし、『じゃりン子チエ』でも相当勉強させてもらった。何度観たか判らないから。演出家としてあれほどためになる作品もないと思ったし、同業者の人はもれなく同じことを言うよ。何度も言うけど、当時の高畑さんは演出家としては超一流です。

──自分で画を描かない監督という意味では押井さんと同じですよね。

押井　だからある意味、共感もあった。ちゃんと映画として時間軸を演出で扱える珍しい人だったし、本当に勉強のために一生懸命観た。あの頃までは、ドラマというか物語を伝えたいという固い意志があったんだよ。

──何があったんでしょうね。

押井　映画監督ではなく文化人になったからだよ。もともとインテリだったから、文化人志向のある人ではあった。その色が濃くなると同時に、物語を伝えるという意志がどんどん消えていったんじゃないかな。映画という器のなかで、自分の知性と教養、そして薀蓄を語る文化人になってしまったんだ。





『姿三四郎』



　43年の黒澤明監督作。柔道家・姿三四郎の成長と活躍を描く青春ドラマ。出演は藤田進、大河内傳次郎、轟夕起子ほか。





新海誠（しんかい まこと）



　監督・脚本家・小説家。73年長野県生まれ。監督・脚本・作画等、ほぼすべてをひとりでこなした短編『ほしのこえ』（02）で注目される。初長編は『雲のむこう、約束の場所』（04）。その他の作品に『秒速５センチメートル』（07）、『言の葉の庭』（13）。最新作『君の名は。』（16）が２４０億円を超える大ヒット。『千尋』に続く歴代２位の成績を記録した。





『御伽草子』



　室町時代から江戸時代初期にわたって作られた、挿絵入りの短編物語のこと。そのなかには『浦島太郎』『一寸法師』『鉢かづき』等、馴染みのある物語が収められている。





『鳥獣戯画』



　正式名は『鳥獣人物戯画』。平安時代末期から鎌倉時代初期の間に複数の作者によって描かれたと言われる墨画の絵巻物。





マルクス



　カール・マルクスのこと。１８１８年ドイツ生まれの哲学者・思想家・革命家。資本主義社会の研究書『資本論』で知られる。





エンゲルス



　フリードリヒ・エンゲルスのこと。１８２０年ドイツ生まれの思想家・哲学者・ジャーナリスト・実業家。マルクスの友人で、共著に『共産党宣言』がある。





レーニン



　ウラジーミル・レーニンのこと。１８７０年ロシア生まれの革命家・政治家。ロシア革命で主導的役割を果たし、史上初の社会主義国家を発足させた。





今村昌平



　映画監督・脚本家。26年東京生まれ。『にあんちゃん』（59）で注目される。代表作に『赤い殺意』（64）、『神々の深き欲望』（68）、『復讐するは我にあり』（79）、『黒い雨』（89）等。『楢山節考』（83）と『うなぎ』（97）でカンヌ映画祭パルムドールを獲得した。





『にっぽん昆虫記』



　63年の今村昌平監督作。三代にわたる女性のセックスを通して人生を語ったパワフルな人間ドラマ。主演の左幸子が日本人としては初めてベルリン映画祭主演女優賞に輝いた。





『タイガーマスク』



　69年から71年までオンエアされたＴＶアニメ。原作漫画は梶原一騎と辻なおきによるもの。孤児たちを助けるためにリングに立つ悪役覆面レスラー〝タイガーマスク〟の壮絶な人生。





『じゃりン子チエ』



　81年から83年までオンエアされた東京ムービー新社製作のＴＶアニメ。総監督は高畑勲。原作は78年から97年まで『漫画アクション』に連載されたはるき悦巳の同名漫画。大阪でホルモン焼き屋を切り盛りするがらっぱちな女の子チエの日常を描く。





STORY



朝日新聞紙上で連載されたいしいひさいちの４コマ漫画をつなぎ合わせて長編アニメーション化。どこにでもいそうな普通の三世代家族、山田家の日常をほのぼのとしたギャグや、ペーソスを交えて描く。松尾芭蕉などの俳句も印象的に登場。





キャスト：朝丘雪路　益岡徹　中村玉緒　原作：いしいひさいち　脚本・監督：高畑勲　プロデューサー：鈴木敏夫　公開日：１９９９年７月17日　上映時間：約１０４分　興行収入：15・６億円　キャッチコピー：家内安全は、世界の願い。





上映時間が永遠に感じられた……



──『ホーホケキョ となりの山田くん』ですが、これを高畑さんが劇場用の長編アニメーションにすると聞いたときは、みんなが驚きましたね。

押井　驚いたというより、何をしたいんだと思ったよ。ひとつ考えられるのは、高畑さんにもう一度、ホームドラマをやらせようと考えたんじゃないかということ。つまり、『じゃりン子チエ』ですよ。

──なるほど！

押井　僕の推測だけど、トシちゃんは『おもひでぽろぽろ』を観てヤバいと思った。しかも、その次が『ぽんぽこ』だよ。「この人はどこまで行くか判らないぞ。プロパガンダの映画を作りはじめた」みたいな感じでさ。

──そういうプロパガンダ色って、脚本の時点である程度は判りますよね？　鈴木さんの得意の話術で軌道修正はできないんですか？

押井　もちろん、試みたと思うよ。でも、できなかった。途中でチビチビ軌道修正して成功することもあるけど、正面切って論争したら絶対、高畑さんには勝てない。からめ手が効かないから。宮さんには効くけど、高畑さんには通用しない。彼は完璧にロジックの人。ロジックしかない人だから。

　そんな人でもホームドラマには実績があるわけだから、そのホームドラマをぶつけたら、何か起きるかもしれないと考えたんだよ、きっと。でも、映画を観る限りでは何も起きてないし、何の説得もできてない。４コマ漫画の寄せ集めで、家族の歳時記的なエピソードがダラダラと描かれているだけ。そもそも、映画になっているかどうかさえ怪しい。これを長編映画と言っていいものかと思った人はたくさんいるんじゃない？　始まりもなければ終わりもないんだからさ。で、さすがの鈴木敏夫もキャッチコピーに苦労した。

──「家内安全は、世界の願い。」ですね。

押井　それも凄いけど、タイトルに『ホーホケキョ』なんてつけている。もちろん、いしいひさいちの原作漫画に『ホーホケキョ』はないよ。でも、トシちゃんは『となりの山田くん』だけじゃ宣伝すらまともにできないと思って『ホーホケキョ』をくっつけた。これで「どんな意味なんだろう？」とみんなに思わせることができるから。トシちゃんの苦労のあとがにじみまくってますよ。

──主題歌が矢野顕子で、これも鈴木さんの苦肉の策、なんでしょうね。

押井　いつもの詐術です。しかし、得意のその詐術を使ってもどうしようもなかった。上映時間の１０４分は普通だけど、本作に関しては永遠に感じるほどだったから。

──本当に長かったですねー。

押井　はっきり言って、芝山（努）さんが東京ムービーで作った『がんばれ!!　タブチくん!!』のほうがよっぽど面白いよ。両方とも原作はいしいひさいちで、片方は芝山さんのワザだけで「あらよ」という感じで作って、これが意外と面白い。だいいち、いしいひさいちらしいから。高畑さんがやると妙にアートになって、面白くもなんともないよ。





〝表現上の実験〟はアニメーター泣かせ



──しかもこの作品、とても製作費がかかっていると聞きました。20億円以上とか？　きっとそのアートの部分ですよね。

押井　詳しい数字は知らないけど、確かにお金はかかっている。アニメーターにムチャクチャな仕事をさせたから。「水彩のような感じで仕上げてみたい。輪郭がないような色付けをしたい。そういう画を実現してくれ。そのためにはどうすればいいか、考えてくれ」というようなね。

──それだけ聞くとスティーブ・ジョブズみたいですね。自分は画は描けないけど、できる人に無理難題を突きつける。

押井　そういう部分は似てるかもしれないけど、ジョブズはむしろトシちゃんのほう。高畑さんには経営戦略的なことはできないし、興味もないから。でも、言うまでもなく高畑さんは映像の実験には興味があった。だから、そういう無理を突きつけ、ああいう映画を作ってしまったわけだよ。

　『山田くん』で使われた彩色の技術は、いまだとデジタルで一発でできてしまう。そういう、のちの新しい技術で簡単にできるようになる方法は、表現上の実験とかチャンスとか言っちゃいけないんだよ。だから、ここでも浮かび上がるのは、高畑さんの「まず結論ありき」。

──なるほど。高畑さんは、それから『かぐや姫の物語』まで監督はしてませんね。

押井　この作品で高畑さんとジブリの関係は破綻した。宮さんもはっきり「パクさん（高畑さんのこと）にはもう撮らせない」と言っていたから。つまり、そこまで怒ったんだよ。宮さんもアニメーターだから、彼らにこれだけの苦労を負わせて、できたものがコレというので、さすがに怒ったわけだ。

　そういうわけで、高畑勲、宮崎駿、鈴木敏夫の３人が共同でやった最後の仕事が『山田くん』。ジブリというスタジオで言うと、いろんな矛盾が覆い隠せないところまで加速していった時期になるんじゃないかな。





矢野顕子（やのあきこ）



　シンガーソングライター。55年東京生まれ。代表作に『春咲小紅』『いろはにこんぺいとう』等。『山田くん』の主題歌は作詞・作曲・編曲・歌の『ひとりぼっちはやめた』。藤原先生の声も務めた。





芝山さん



　芝山努（しばやま つとむ）のこと。アニメ監督。41年東京生まれ。ＴＶアニメシリーズの代表作に『ドラえもん』『ちびまる子ちゃん』『忍たま乱太郎』等。劇場アニメの代表作に『ドラえもん のび太の海底鬼岩城』（83）から『ドラえもん のび太のワンニャン時空伝』（04）等。





『がんばれ!!　タブチくん!!』



　79年製作。オムニバス形式の劇場アニメ。この１作目がヒットしたため『がんばれ!!タブチくん!!　第２弾　激闘ペナントレース』（80）、『がんばれ!!タブチくん!!　初笑い第３弾　あゝツッパリ人生』（80）が作られた。監督はすべて芝山努。





スティーブ・ジョブズ



　米国の実業家。55年米国生まれ。アップル社の共同設立者。実際にコンピュータを作ったのはスティーブ・ウォズニアックだったが、それを作らせ売ったのはジョブズだった。11年逝去。





STORY



日本で最も古い物語と言われる「竹取物語」が題材。光る竹から現れた女の子を連れ帰った翁は、媼と共に大切に育て、娘を高貴な姫君に育てようと都に移り住むのだった。やがて姫の美しさを聞きつけた５人の求婚者が現れる。





キャスト：朝倉あき　高良健吾　原案・脚本・監督：高畑勲　製作：氏家齊一郎　企画：鈴木敏夫　プロデューサー：西村義明　公開日：２０１３年11月23日　上映時間：約１３７分　興行収入：24・７億円　キャッチコピー：姫の犯した罪と罰。





表現者・高畑勲



──高畑さんが『山田くん』から14年ぶりに作ったのが『かぐや姫の物語』です。製作に８年を要したと言われていますよね。

押井　だから、相当凄いものができているんじゃないかと思ったんだけど、そうでもなかった。僕の趣味とはまったく違うだろうけど、完成度はきっと高いんだろうという予測を見事に裏切ったので、むしろ驚いたくらい。

──私が驚いたのは『山田くん』のときと同じような手法を使っていたところ。もっと進化させているから、より手間がかかったのではないかと思いました。

押井　高畑さんの辞書には「懲りる」なんて言葉はありませんから。自分の作り出すものの価値を信じて疑わないのが高畑勲。「もしかしたら、何の役にも立たないものを作っているのかもしれない」なんていう自意識はゼロです。

──宮崎さんや鈴木さんは反対しなかったの？

押井　ジブリにはパトロン的存在の日テレの氏家齊一郎さんという方がいて、彼の遺言が「高畑勲に映画を作らせろ」だった。当然、これに歯向かえるわけがない。本当は宮さんもトシちゃんも「よそのスタジオでやってくれるんだったらいいけど、ジブリでは……」くらいに思っていたはずだよ。

──確かに『かぐや姫』のクレジットは、これまでとは違うんですよね。鈴木さんは「企画」でクレジットされていて、宮崎さんの名前は見当たらない。その氏家さんは「製作」でクレジットされています。

押井　企画というのはワケ判んないポジションだから、トシちゃんの名前は一応、そこに置いてみた。宮さんの名前がないのは、私は関わりたくないという抵抗の証だろうね。

　そういうことからも判るように、これはジブリのなかから生まれたものじゃなく、高畑さん自身の企画。随分前から彼が抱えていたんじゃないかな。もし、ジブリのなかで揉まれていたなら、「なぜいま『竹取物語』なのか」ということへの答えがあったはずだし、いつものように時代を現代に移すようなことだってやっていたかもしれない。でも、そういう形跡はまったくないから、高畑さんがひたすら奔放に作ったんだと思うよ。まあ、製作費は50億円だったって聞くけどね（笑）。

──『山田くん』でも使っていた、あのフレデリック・バックのような表現はどうです？　本人がこだわっているんでしょうが。

押井　もちろん、とてもこだわっていますよ。なぜなら高畑勲は表現者だから。ああいう様式に文化的な価値があると考えているからですよ。日本のセルアニメーションなんてディズニーが作り出したひとつの形式にすぎない。あの形式が普及したのは、経済的にもっとも費用対効果が高いという以外の理由はないから。

　そもそもアニメーションというのはもっと広範な表現だったんだよ。モデルやらパペットやら、絵でもどんなモノでも、何かを連続的に動かせばみんなアニメーション。僕の『立喰師列伝』だって人間をモノ扱いしてアニメーションにしているんだし。

　そういう認識から言えば高畑さんが「ディズニー的なアニメーションなんてやってられるか」と思っても何の不思議もない。表現者なんだったら、もっといろんな表現を目指すべきだということですよ。つまり、ノルシュテインでありフレデリック・バックになる。何度でも言いますが、高畑さんはクソインテリですから。

──押井さんは、あの表現はどう思ったんですか。

押井　気になったのは、キャラクターの統一がデザイン的に取られてないところ。かぐや姫の顔だけ別系列ですよ。高畑勲ともあろうものが、何やってんだと思ったね。

──絶世の美女にしなきゃいけないからなのでは？

押井　同じ系列の顔でいくらでも美人にできなきゃダメでしょ。美人というのは記号になっちゃダメなんです。ある瞬間とても綺麗に見えたということがもっとも重要であって、高畑さんはそれをかつて『じゃりン子チエ』で実現している。あの下駄のような顔のチエが、ときどきものすごくかわいい顔をするんだよ。「これがアニメーションなんだ」って感心したんだから。

　アニメの美少女って、出てきた瞬間から全カット美人に描こうとするじゃない？　でも、それは表情を描いたことにはならない。キャラクターになってないから。それじゃ松本零士のキャラクターと同じだよ。かっこいいヤツと、みっともないオヤジ、そして美人。この３通りしかないんだから。あと、ばあさんもいるか。

　で、『かぐや姫』はキャラクターの統一が取れていません。





かぐや姫は魔性の女



──でも、赤ちゃんの頃のかぐや姫はかわいいですよね。

押井　ああいう作画の力だけは随所にある。（赤ちゃんのかぐや姫が）瞬間的にズンと重くなったり、寝返りを打つうちに大きくなったり。そういう仕掛けはアニメならではでよくできている。かぐや姫のように地球に来て月に戻ったというおばさんが、一瞬だけ振り返るシーンがあったけど、そのおばさんは非常によかった。ワンカットだけだけど、強烈な印象だったよね。

　あとは、かぐや姫が凄い形相で都から逃げ出すところ。ああ、これがやりたかったのかって。だからこそ、強弱がつきまくった、ラインのつながっていない絵柄なんだって。でも、あの表現をするため、どれだけのアニメーターが死ぬ思いをしたのかと言いたくなる。

　確かに、迫力があるし面白い。でも、それだったら短編でやればいいじゃない。あのシーンだけで短編を作れば誰も死ぬ思いをしなかっただろうし、50億もかからなかった。

　じゃあ、なぜ２時間を越える物語にしたのか？　どこかにその理由があるはずだと僕なりに探してみたら「サンカ」に行き着いた。さすがインテリだけあって、どうしても自分が勉強したことを形にしないと気が済まないわけだ。

──原作には登場しない、かぐや姫の幼なじみの少年、捨丸の存在ですか？

押井　そう、捨丸。炭焼きのおっさんがしっかりと説明してくれている。「彼らは10年ごとに山を替えるんだ。山を殺さないためにな」って。ご丁寧に竹ひごで籠を作る描写があり、お椀を作る描写もあった。竹ひごはまだしも、お椀は間違いなく「サンカ」の記号だから。彼らの存在を知っている人間なら誰でもピンとくるよ。

　では、それで物語が豊かになったのか？　面白くなったのかと言うと、そこまでではない。ただひとつ、かぐや姫が選んだというか、好きだった異性が捨丸だったという部分を深ヨミすると、マイノリティの物語という見方もできる。つまり、言い寄ってくる貴族たちをすべて振って、マイノリティの民である捨丸に惹かれるんだからね。もともとかぐや姫自体が月から来たマイノリティであり、月の住人ということ自体が例外者の比喩にもなる。もしかしたら、そういう意図もあったのかもしれないけど。

　かぐや姫の５人の求婚者のエピソードもひとつひとつ丁寧にやっているんだけど、そこまでする必要性は感じなかったし、省略しなかったことにどんな意味があったのかも判らなかった。一番、納得いく答えは、高畑さんが、何でも全部やらなきゃ気が済まないから、になってしまうんだけどさ。

　演出はテンポも感じられず、ダラダラとやっているだけ。往年の高畑勲の演出力から見ると、めちゃくちゃユルいですよ。

──私は、かぐや姫が何を考えているのか、よく判らなかったですね。

押井　かぐや姫の感情の起伏はかなりよく描いてはいるけど、彼女の気持ちがどこで変わったのか、それは伝わってこなかったよね。

──私は、高畑監督の女性観が出ているのかなあと思いました。女は自分勝手でロクなもんじゃないって。再会した捨丸を惑わせ、都中の男を惑わせて、最終的には自分は月に帰って何も覚えてません。これはもうファム・ファタールですよ。

押井　魔性の女だよね。しかも本人は無自覚だから。でも、男から見ると、それはそれでいい。ヴァンプは許容できなくても、ファム・ファタールは許容できる。

──美人だから？

押井　はい、基本的にはその通りです。僕は別にそうじゃないけど、ファム・ファタールがＯＫなのは、これまで幾度となく描かれてきたことからも判る。映画はファム・ファタールと縁が切れたことがないんだよ。少なくとも男は彼女たちの存在を納得してしまう。「女ってそういうもんだよな。そういうのがなかったらこの世はつまんないよ」ってね。女性がムカつくのはたぶん、男と女の価値観の違いだよ。男はどこか美女に振り回されたいという願望があるからさ。

──ということは、かぐや姫の話を作ってみたら、ファム・ファタールものになってしまった？

押井　そういうこともあったんじゃない（笑）。

　あと、もうひとつ気になったのはあの歌。「鳥、虫、獣……」という劇中に流れる『わらべ唄』だよ。これは高畑さん自身が作詞作曲したんだよね？　あの歌で何が言いたかったんだと思う？

──まんまですが、「自然は美しい。大切にしましょう」じゃないんですか？

押井　『かぐや姫』観て、そう思った？

──ええ、そう言いたいんだろうなって。でも、私の場合はそれより「かぐや姫って面倒臭い」というほうが勝ってましたけど（笑）。

押井　僕は自然賛歌には見えなかった。自分の勉強したことをかたちにしたに過ぎないという映画が『かぐや姫』だと思ったよ。だから高畑勲はクソインテリってことです。





氏家齊一郎（うじいえ せいいちろう）



　実業家・元日本テレビ代表取締役会長。26年東京生まれ。東京大学卒業後、読売新聞社に。日本テレビの副社長時代からジブリとの提携を深めていった。『山田くん』を気に入ったことから高畑監督の新作を望み『かぐや姫』が製作されることになったという。11年逝去。





フレデリック・バック



　アニメーター、アニメ監督。24年フランス生まれ。48年にカナダ・モントリオールに移住。代表作にアカデミー短編アニメ賞を受賞した『クラック！』（81）、『木を植えた男』（87）がある。後者は色鉛筆を使い、２万枚にも及ぶ画をほとんどひとりで描き、製作には５年を費やした。高畑は自ら『かぐや姫』を持ってバックの自宅を訪れ、作品を観てもらったが、それから１週間後の13年12月24日、バックは逝去した。癌で闘病中だったという。





ノルシュテイン



　ユーリ・ノルシュテインのこと。アニメーター・アニメ監督。41年ロシア生まれ。代表作に『霧につつまれたハリネズミ』（75）、『話の話』（79）等。いずれも切り絵を使った短編。





松本零士（まつもと れいじ）



　漫画家。38年福岡県生まれ。少女漫画からスタートし『男おいどん』でブレイク。監督・設定デザインとして『ヤマト』のＴＶシリーズに参加。劇場版も監督した。同作がブレイクしたことで自分の念願の企画『銀河鉄道９９９』『宇宙海賊キャプテンハーロック』のアニメ化が実現。とりわけ『９９９』は大ヒットした。





サンカ



　定住せず、農耕もせず、戸籍ももたず仕事を求めて移動する漂泊の民のこと。明治時代には全国で約20万人いたともいわれている。いまだに謎の多い民。





ファム・ファタール



　フランス語で直訳すると「運命の女」。有名なファム・ファタール映画は『ギルダ』（46）、『エヴァの匂い』（62）、『ロリータ』（62）等。ブライアン・デ・パルマはそのままズバリの『ファム・ファタール』（02）という映画を作った。





ヴァンプ



　男を惑わす妖しい魅力をもつ女性、悪女。サイレント時代のセックスシンボル的女優セダ・バラのニックネーム、ヴァンプがその語源。これは〝ヴァンパイア〟の略語で、男性の生気を吸い取るような意味あいをもつ。ヴァンプが登場する映画に『深夜の告白』（44）、『白いドレスの女』（81）、『氷の微笑』（92）等がある。





STORY



読書が好きな中学３年生、月島雫は、図書館で借りる本を必ず先に読んでいる〝天沢聖司〟に関心を抱く。ある日、偶然訪れた古道具屋「地球屋」で聖司に出会った雫は、彼がバイオリン職人を目指していることを知り、自分の夢について考え始める。





キャスト：本名陽子　原作：柊あおい　製作プロデューサー・脚本・絵コンテ：宮崎駿　監督：近藤喜文　プロデューサー：鈴木敏夫　公開日：１９９５年７月15日　上映時間：約１１１分　興行収入：31・５億円　キャッチコピー：好きなひとが、できました。





僕もジブリ第三の監督になりかけた



──監督はジブリのアニメーター、近藤喜文さん。宮崎・高畑の両氏以外が監督した初の作品ですよね。原作は柊あおいの同名漫画です。

押井　近藤さんが『中学生日記』が大好きで、これを作ったと聞いているけど。

──そもそも、なぜ近藤さんの名前が浮上したのでしょう。

押井　あの時期はきっと、宮崎・高畑に続く三番目の監督を作り出そうとしていたんだと思う。実際、僕も声をかけられたから。

──あら、それは面白いですね。

押井　そりゃそうでしょう。スタジオを維持するためには毎年毎年、長編アニメーションを作っていかなきゃいけないわけで、監督がふたりしかいないジブリにとっては相当に大変なこと。１本作るのに最低でも２年はかかるんだから、当然、第三の監督がマストだと考えて探し始めたんだよ。細田守にも声がかかったし、僕も２回くらい声をかけられた。もちろん、決裂しちゃったけど（笑）。

──どんな作品で声がかかったの？

押井　１本は『アンカー』という企画。声がかかった時期は覚えてないけど、高校生の話だった。リレーの最終走者のことだから。

　宮さんの別荘で、宮さん、高畑さん、トシちゃん、（宮崎）吾朗くん、そして僕かな。その面子で企画会議をやったんだよ。宮さんは「俺は絶対口出ししない。アンタの好きなようにしていい」とか言っていたけど、その時点でもう「俺ならこうやる」って言い出してるから（笑）、信用なんてできるわけがない。で、延々と議論して、最終的には決裂。最後は確か、高畑さんと僕の怒鳴りあいだった。

　というのも、僕は参考にと思って『安寿子の靴』という、当時好きだったＮＨＫのＴＶドラマのビデオを持っていったんだよ。90分くらいの単発もので、脚本は唐十郎。それを観た高畑さんが「この作者は面白い人間だ。現実的に可能なシチュエーションだけでファンタジーを作っている」みたいなことを言い始めたの。僕はもうびっくりで「アンタは何を見てるんだ？　この物語のどこが日常で起こり得る範疇で収まっているんだよ！」という感じ。唐十郎なんだから、とんでもない設定が入ってるし、タイトルからも判るように『山椒大夫』、つまり『安寿と厨子王』なんですよ。「安寿子」と書いて「やすこ」と読ませるんだからね。唐十郎がよくやっていた、昔の民話を現代に置き換えて、特有の寓話を作っているわけ。それを、日常的なシチュエーションに収まっているなんて見当違いなことを言われて、怒鳴りあいになった。

──ほんと、みなさんケンカ好きですよねー。

押井　『アンカー』の話とは関係ないけど、まあそうやってケンカしておしまい。

　でも、それに懲りてないのか、あるいは本当に人材に困っていたのか、再び呼ばれたんだよ。今度は『墨攻』という作品でね。

──それは知らなかった！『墨攻』は漫画にもなったし、香港で実写化もされましたよね。原作は『後宮小説』の酒見賢一だった。

押井　『後宮小説』は僕の師匠がＴＶスペシャルのアニメ（『雲のように風のように』）を監督したから。あれは傑作でしたけどね。そういうこともあって『墨攻』には僕も心が動いた。集団戦闘で攻城戦だし、墨子というのが籠城戦のスペシャリスト。だったらやってみたいという気持ちになったわけだ。

　当時は貧乏だったんだけど、ローンを組んでン十万円の資料本を買い込んだりしてた。高価な建築の本も買ったね。その本屋は宮さんが紹介してくれた店なんだけどさ。ケンカはしたものの、一応付き合いはあったから。

──それ観たかったですね。アンディ・ラウの香港版は観ましたか？

押井　観たよ。川井君が音楽をやっているし。僕が考えていたのとは違うけどね。でも、やっぱりやりたかったというのはある。もしやっていたら、モブシーンとかどうするんだと、大変なことになっていただろうけどさ。

　話を戻して近藤さんなんだけど、彼がやるとなれば、内部で反対する人はまずいない。ジブリを支えた功労者だから。人間的にも穏やかないい人だし、そもそもアニメーターとしては超一流。文句をつける人はいない。僕もそれを聞いて「なるほど」と思ったもん。





現実離れした家族像



──近藤さんの監督作はこれ１本だけ。そもそも監督をやりたかったの？

押井　どうなんだろう。最初はいやがったという話を聞いたような気もするけど、本当のところは判らない。でも、出来上がった作品はご覧の通りで……ここは麻紀さんの意見を聞こうか。

──私ですか？　ラストにびっくりでした。突然、抱きついて「結婚しよう！」で終わり。中学生で「結婚」というのにびっくりでした。『小さな恋のメロディ』みたいって。でも、こちらは思春期の中学３年生ですからね。

押井　他には？

──中学生でバイオリン職人になりたいという志の高さにも驚きましたが、それに負けられないと小説を書く主人公も凄い。彼女が住んでいる家が公団住宅のようなところというのも、これまでにないジブリでしたし、その一方でちゃんと洋館も出てくる（笑）。もっともイヤなのは『カントリー・ロード』です。

押井　あれはねー、トシちゃんの趣味だから（笑）。大好きな自分の娘に訳詞をやらせている。選曲はちょっとオヤジっぽい。

　僕がもっとも驚いたのは、公団住宅のような家。大学生の姉と二段ベッドで寝ていて、父親は図書館勤務、母親は大学に戻って修士論文を書こうとしている。僕の独断と偏見で言えばこれ、共産党の一家。いまどき、こんな健全で前向きな家庭はどこにあるんだろうと考えたとき、行き着いたのが共産党の一家だった。

──原作の母親は専業主婦だったのに、大学に通っているように変更したみたいですね。

押井　僕に言わせれば『サザエさん』の一家とさして変わらないくらい、現実離れもはなはだしい。家族全員が前向きで、さしずめ「家族というものはみんな愛し合っているもので、貧しいかもしれないが、それぞれを思いやり、それぞれが向上心をもって知的に生きましょう」でしょ？　僕の経験で言うと、家庭なんて闘争の場ですから。僕を含め、僕の姉弟はもれなく家庭内闘争をやってきた。

──それも特別すぎますが。この家庭はいわゆる理想なんでしょうね。

押井　ある種の理想的家族なんだけど、なぜ彼らをそういうふうに描かなきゃいけなかったのかということだよね。僕はそういうのが生理的にダメ。気持ち悪かった。あとは『カントリー・ロード』も気持ち悪い。はるか昔に流行った歌声喫茶なんていうモノを思い出しちゃったよ。

　この作品に関しては、気持ち悪すぎてちゃんと観られなかった。もう悪夢に近い。申し訳ないけど、冷静に批評はできないくらいで。これがドラマなら、ここまで生理的な嫌悪感はなかったかもしれないけど、アニメーションだからね。そもそも、なぜアニメーションでこんなドラマをやるのか理解できなかった。

　監督という人種はそれぞれのフェティッシュがあるもので、宮さんはその塊だし、僕だってそう。でも、この映画にはそれをまったく感じない。登場人物の誰もがいい人で、この人たちの欲動とかリビドーとか、どうなっているんだろうって。

──もしかしたら最後の「結婚しよう！」はその発散だったのかも？

押井　相当に唐突な終わり方だよね。本当によく判らない。作画を見ても、丁寧によくできているんだけど、淡々とした日常が芝居化されているだけで、動画の世界がもっている魔術や官能性、心が弾むようなリズム感とか躍動感がまったくない。あらゆる意味で、何でこんな映画にしようと思ったのか、意味が判らない。

──ということは、ジブリのなかでも異色の作品ですね？

押井　明らかに異色中の異色。面白いことに、宮さんが絵コンテまで切っているのに、宮さんの匂いがまるでしない。この作品以降、いろんな監督がジブリ作品を作ったけれど、大体が宮さんの劣化コピー。みんな宮さんの影を引きずっている。でも、この一本だけはほぼ影響を感じないんだよ。

──やっぱり近藤さんの監督作だったから？

押井　さすがの宮さんもあまり口出しできなかったのかもしれない。僕は近藤さんとは直接の付き合いはまるでなくて、会ったら会釈するくらい。でも、彼が人望が厚く、みんなに慕われ、宮さんも一目置いていたことぐらいは知っている。アニメーションの世界で近藤さんを知らない人はいないから。

──近藤さんは98年に亡くなられていますね。

押井　だから、本人がどうこの作品と向き合ったのか、その辺のことはもう判らない。でも、たとえいざこざがあったとしても、口にはしなかったんじゃないかな。職人だったから。





近藤喜文（こんどう よしふみ）



　アニメーター、監督。50年新潟県生まれ。日本アニメーション時代には『コナン』『赤毛のアン』に参加。テレコム・アニメーションに移籍後は『名探偵ホームズ』のキャラクターデザイン、作画監督を担当。宮崎演出、近藤作監の『青い紅玉（ルビー）』はオンエア前に『ナウシカ』の併映作品として上映され、同コンビによる『ミセス・ハドソン人質事件』はオンエア後に『ラピュタ』と併映された。その後ジブリに移籍し、『火垂る』『魔女宅』『ぽろぽろ』『もののけ』で作監。『火垂る』『ぽろぽろ』でキャラデザを担当。『耳をすませば』が唯一の監督作となった。98年逝去。





『中学生日記』



　72年から12年までＮＨＫ総合でオンエアされていた30分番組。製作はＮＨＫ名古屋放送局。名古屋の架空の中学校の生徒たちの抱える悩み等にフォーカスした青春ドラマ。生徒役は基本、オーディションで選出した一般人だった。





細田守（ほそだ まもる）



　アニメーター、アニメ監督。67年富山県生まれ。東映アニメーションからキャリアを始め『ゲゲゲの鬼太郎（第４シリーズ）』（96〜98）で演出家デビュー。『劇場版デジモンアドベンチャー　ぼくらのウォーゲーム！』（00）で注目される。その後、東映から出向というかたちで『ハウル』にとりかかるが諸般の事情で降板。東映を退社後『時をかける少女』（06）を監督しブレイクした。代表作に『サマーウォーズ』（09）、『おおかみこどもの雨と雪』（12）、『バケモノの子』（15）。数字も稼げる監督として〝第二の宮崎駿〟と言う人も多い。11年に自身のスタジオ、スタジオ地図を立ち上げた。





『安寿子の靴』



　84年にＮＨＫでオンエアされたドラマスペシャルの一話。90分。姉を亡くした少年。そんなとき、彼は不思議な少女と出会う。演出は三枝健起、脚本は唐十郎のオリジナル。彼の息子・大鶴義丹のデビュー作。番組主題歌は中島みゆき。





唐十郎（から じゅうろう）



　劇作家・作家・監督・俳優。劇団唐組の主宰。40年東京生まれ。戯曲の代表作に『腰巻お仙』シリーズ、岸田國士戯曲賞の『少女仮面』、泉鏡花文学賞の『海星・河童』。小説の代表作に芥川賞受賞作の『佐川君からの手紙』等がある。





『山椒大夫』



　森鷗外の短編小説。中世の説話を基にしている。タイトルは安寿と厨子王の姉弟を奴隷としてこき使う荘園領主の名前。姉は弟を逃がし、自分は自殺。弟は都で出世して戻り、山椒大夫を懲らしめる。その後、生き別れの母と再会するという物語。61年には東映動画が『安寿と厨子王丸』として劇場アニメーション化。54年には溝口健二が映画化し、彼の代表作となった。





『墨攻』



　戦国時代の中国を舞台にした歴史小説。作者は酒見賢一。墨者の青年が、思想を失った墨家集団から離れ、趙軍に攻められる梁城の守りにつく。墨者とは、独自の思想をもつ武装防御集団・墨家の者。後に森秀樹の作画、久保田千太郎の脚本で漫画化。06年には香中韓日合作で実写映画化された。監督はジェイコブ・チャン。





『後宮小説』



　中国の架空の国を舞台にしたファンタジー小説。酒見賢一のデビュー作。後宮に14歳で入った少女の波乱万丈の半生を描く。そのＴＶアニメ化が『雲のように風のように』。キャラクターデザインは近藤勝也。





アンディ・ラウ



　俳優・製作者・歌手。61年香港生まれ。代表作に『いますぐ抱きしめたい』（88）、『欲望の翼』（90）、『神鳥伝説』（91）、『インファナル・アフェア』（02）、『LOVERS』（04）、『おじいちゃんはデブゴン』（15）等。





『小さな恋のメロディ』



　71年の英国映画。11歳の少年ダニエルと少女メロディが結婚宣言する。英米ではコケたものの、なぜか日本では大ヒット。メロディ役のトレイシー・ハイドも大人気になった……日本だけで。監督はワリス・フセイン、脚本はアラン・パーカー、製作はデヴィッド・パットナム。





『カントリー・ロード』



　『故郷に帰りたい』のこと。米国のシンガーソングライター、ジョン・デンバーの大ヒット曲。原曲は故郷を想い、故郷に帰りたいと願う歌詞だが、本作で使われている鈴木麻実子の歌詞はもっと前向きで、故郷を振り返らず、前に進もうというまったく異なる内容。ストーリーに合わせて変更したようだ。





STORY



柊あおいが書き下ろしたコミック『バロン 猫の男爵』が原作。車に轢かれそうになった猫を助けた女子高校生の吉岡ハル。なんと助けられた猫は猫の国の王子・ルーンで、その恩返しとして猫の国に招待される。しかしそれは国王の罠だった。

※『ギブリーズ episode２』と同時上映





自分の時間を生きる？



──『耳をすませば』に次ぐ宮崎＆高畑監督以外のアニメーション『猫の恩返し』です。森田宏幸監督の作品で、『～すませば』のヒロイン、月島雫が猫の男爵バロンを主人公にして書いた物語という裏設定があるようです。

押井　猫好きから見るとどうなんですか？

──生意気なデブ猫はよかったです。

押井　僕もあのデブ猫はよかったけど、あとの猫はことごとく気に入らなかった。バロンなんてどこがいいのかさっぱり。何度もテーマみたいに「自分の時間を生きる」という言葉が出てくるけど、その意味は判った？

──いえ、まったく。何なんでしょう。

押井　「自分の時間を生きる」ということをテーマとするなら、その内実を描くのが映画でしょ？　でも、全然描かれてないじゃない。だいたい主人公の女子高生が日常に不満を抱いているとも思えなかった。「自分の時間を生きてない」と感じているとも思えない。物分かりのいい母親がいて、父親はいなかったけれど、なぜいないかは判らない。写真１枚出てくることもなく、不在というわけでもなさそうだ。なぜなら、不在すら描いてないから。僕はそれ、いつも厳密に描き分けているから。「登場しないことと不在であることは別だ」ということ。これは重要ですよ。

　それにあの女子高生、自分でどんどんダメなほうに行っているだけじゃない。そういうのはドラマとは言いません。必然性というものが何もないから。必然性に導かれるからドラマになるわけじゃない？　でも、この女子高生は成り行き任せで、しかも悪いほう悪いほうへと行くばかり。それは自分自身の責任だよ。その挙句に「自分の時間を生きる」って何だよと言いたい。このテーマは明らかに後付けで、ひと言で言うと、でき損ないのファンタジーです。

──言っちゃいましたね。

押井　それで終わっちゃうんだよ。いろいろとファンタジー風の設しつらえはしているんだけど、肝心な主人公の動機すら判らないって何なんだと言いたい。

　そもそも彼女、別に猫が大好きってわけでもないでしょ？　たまたま車にはねられそうな猫を救うんだけど、その行為がもう命がけ。大好きというわけでもない猫をなぜそこまでして救うのかという疑問がわいてきてしまう。

──子供の頃、ノラの子猫に魚の形をしたクッキーをあげただけですね。

押井　それを本人もすっかり忘れていて、母親に言われて思い出す。しかもその子猫が最後に登場して、王子と結婚する女官だ、お使いだとか言うから、これもまた後付け感がある。女子高生にアドバイスする不思議な声も彼女でしょ？　その辺にもかなり無理があるよ。

──猫は普通、クッキー食べませんけどね。たとえそれが魚の形をしていても。

押井　食うわけないじゃん。そういうところを見ると「監督は決して猫を好きじゃない」と思うよね。

──まあ、疑問だらけですよね。デブ猫の案内でバロンに会いに行った不思議な町も、カラスとデブ猫、バロンしかいない。ここは何なのか、まったく判らない。

押井　そのデブ猫を追いかけながら街の路地や塀、屋根を越えて行くんだけど、もっと面白くなりそうなシチュエーションなのに全然そうはなっていない。

　ある意味で言えば『不思議の国のアリス』なんだよ。身体が小さくなったり、狭いところに無理やり入ったり。登場する猫たちはみんなクレイジーだし、あの王様なんて『アリス』のハートの女王みたいなもんでしょ？　でも、『アリス』の主人公は小さな女の子なんだよ。小さな子供だったら好奇心だけで不思議な動物を追いかけるという設定に納得がいくけど、本作の場合は高校生だから何か動機が必要になる。普通はそれが日々の不満だったり悩みだったりするわけなんだけど、それがまったく見当たらない。





見せつけられたブランド力



──でも、猫好きなら猫の国、行きたくなりますよ。なので私は、女子高生のハルが猫の国に行くのは別にヘンだとは思わなかったけど。

押井　普通のお客さんは、騙されようとして映画館に行くから、そのことに疑問をもたない。『ダイ・ハード』と同じだから。

──なぜ『ダイ・ハード』なんですか？

押井　「またマクレーン刑事は巻き込まれてしまいました」というだけで、何の説明もないけど、観客はそれで疑問を抱かない。だって、それこそが『ダイ・ハード』のお約束だって観客は知っているからだ。

　でもさ、『～恩返し』の場合、テーマは「自分の時間を生きる」なんだよ。『ダイ・ハード』のようにブルース・ウィリスのアクションを観てスカッとする映画とは違うんだから、そこはちゃんと責任をもたなきゃいけない。それができないなら、テーマがあるふりをするなと言いたい。

──そもそも、ハルがどんな性格なのか、どんな生活を送っているのかよく判らないのでストーリーが混乱するんじゃないですか？

押井　僕たちの言葉で言うと心理線というものが通ってない。心理のライン、そこに説明がない。だから「なんでそっちに行くの？」「なんでそっちを選択する？」「なんでそういうセリフを言うの？」ということになってしまう。物語の流れを作るために、全部強引にエピソードを並べているだけ。本当ならひとつひとつ説得して行かなきゃ映画にはならないのに、それを全部放棄しているから、最後に彼女が突然バロンに向かって「あなたのこと、好きになっちゃったかも」なんてセリフが吐ける。確かにスーパーマンかもしれないけど、さっきまで「猫のお嫁さんはイヤ」って言ってましたよね？　とツッこみたくなる。

　それに、技術的な面を見ても、動画の官能性はないし、猫の動きも感心しなかったし、あらゆる意味ですべて減点。いいところをあげるなら、ブタ猫だけです。

──丹波哲郎が声を担当した猫王も面白かったですけどね。

押井　丹波哲郎が声なんて、これもトシちゃんだよ。彼のファンだったから会いたかったんじゃない？　まあ、猫王に宮さんの姿が重ならないでもないけどね（笑）。

　いくら腐ってもジブリだろうと思っていたら、ただ腐っているだけだった。これはちょっと酷すぎるよ。

　──でも、64億円の大ヒットですから。

押井　それこそジブリの魔法だよね。それに、鈴木敏夫の後付けテーマは成功することが多いんだけど、この作品に関しては大失敗している。にもかかわらず興行的には大成功。おそらくトシちゃん自身、「これで大ヒットするんだったら、宮さんが監督じゃなくても、ジブリブランドというだけで行けるかもしれない」と思っても不思議じゃない。ブランド力を見せつけられたってことだよ。





森田宏幸（もりた ひろゆき）



　アニメーター・アニメ監督。64年福岡県生まれ。『老人Ｚ』（91）、『走れメロス』（92）等の原画を担当。ジブリ作品では『山田くん』（99）、美術館の短編『コロの大さんぽ』（02）の原画を手掛け、『猫の恩返し』を監督することになったといわれている。劇場作品の監督はこれが初。その後も『ゲド戦記』や『かぐや姫』で原画を担当。





『不思議の国のアリス』



　英国の作家ルイス・キャロルによる１８６５年のファンタジー小説。ディズニーのアニメ、ヤン・シュヴァンクマイエルによるモデルアニメーション等をはじめたくさんの映像作品があり、その影響が顕著な作品も『マトリックス』（99）等多数ある。





『ダイ・ハード』



　88年の米国製アクション映画。ＮＹからＬＡにやってきた刑事マクレーンがビルを占拠したテロリストたちとたったひとりで戦う。伏線を丁寧に拾っていった脚本が秀逸で世界中で大ヒットした。シリーズ化され全部で５本作られた。マクレーンはなぜかいつも事件の起きる場所にいて、なぜかいつも闘い、なぜかいつも生き延びるという設定になっている。





ブルース・ウィリス



　俳優・プロデューサー・シンガー。55年ドイツ生まれの米国人。ＴＶシリーズ『こちらブルームーン探偵社』（85～89）で人気者になり『ダイ・ハード』で大ブレイク。代表作に『パルプ・フィクション』（94）、『12モンキーズ』（95）、『シックス・センス』（99）、『ＲＥＤ／レッド』（10）等。マスコミに対して愛想はよくないが、同業者や友人に対してはよきアニキ、といわれている。





STORY



『ゲド戦記』　父王を刺し国を出た王子・アレンは放浪の最中、大賢人のハイタカに誘われ、旅に同行。その途中、顔にやけどの痕を負う少女・テルーに出会う。

『コクリコ坂から』　１９６３年、コクリコ荘を切り盛りする高校２年の松崎海は、学園にある文化部の部室棟〝カルチェラタン〟取り壊しに反対する風間俊と出会い、恋に落ちる。





キャスト：長澤まさみ　岡田准一　竹下景子　監督：宮崎吾朗　公開日：２０１１年７月16日　上映時間：約91分　興行収入：44・６億円　キャッチコピー：上を向いて歩こう。





宮さんの劣化コピー



──宮崎さん、高畑さん以外のジブリ監督として近藤さん、森田さんに次いで登場したのが宮崎吾朗さん。宮崎駿さんの息子さんです。彼の２作品『ゲド戦記』と『コクリコ坂から』をまとめて語っていただきます。

押井　実は『ゲド戦記』には長い歴史があるんだよ。だから、ジブリで『ゲド』をやるというニュースを聞いたときはびっくりした。しかも宮さん本人じゃなく、息子の吾朗君が監督をするという。ますます驚いた。

──『ゲド』が作られる過程に関してはいろんなウワサがありましたよね。宮崎さんは原作の大ファンで、原作者のル＝グウィンに映像化の許可を貰いにいったけど、まだ無名だったので断られた。その代わりに作ったのが『ナウシカ』だとか。

押井　それはもっともらしいけど、たぶん基本的にデマです。

──そうなんですか。じゃあその「長い歴史」を教えてください。

押井　僕が『ゲド』のアニメーション化について宮さんと話したのは、確か『ラピュタ』のあとくらい。さんざん話しまくった。で、ふたりの一致した結論が「これは映像化不可能」だったんだよ。第一巻の『影との戦い』のその「影」をどうやって映像化するのか？　おそらく無理だろうってね。だから、製作のニュースを耳にして「いまさら」と思ったんだよ。

　で、僕が聞いた話は、「宮さんが吾朗君に監督を任せていいものか逡巡していたけど、吾朗君の作ったポスターの絵（主人公のアレンとドラゴンが向かい合っている図柄）を見て気が変わり、監督を任せる気持ちになった」。これもたぶんトシちゃんがでっちあげたガセ。

　でも、吾朗君が監督をすることになって、宮さんがル=グウィンに会いにいったというのは本当らしい。

　「監督はあなたじゃないんですか？」と言われた宮さんは「息子がやります。でも、必ずあなたが気に入ってくれる作品にします。もし、そうならなかったら私が責任を取る」。するとル=グウィンが「そこまで言うのに、なぜあなたが監督をしないんだ」って。

　そんな会話が交わされたらしいともいわれているよね。最後のル=グウィンの質問に答えられないまま吾朗君が監督をしたわけだから、そのあたりからもう無理があった。

　作り始めてからも、宮さんに絵コンテを見せないようにしたとか、宮さんがしょっちゅう（現場を）覗きに来たとか、これもまたいろんなウワサが流れたけど、どこまでが正しいのかは判らない。でも、それが判ったからといって映画の評価に影響があるわけではないし。

──では、ご覧になってどう思われましたか。

押井　『ゲド戦記』で驚いたのは、アレンが父王を刺すエピソードから始まったこと。もちろん、そんな話は原作にはないわけだから、そうか、吾朗君は初っ端ではっきり「父親殺し」を宣言したんだと思ったんだよ。つまり、「私はここで独立する」と言ったんだってね。

──あれは驚きでしたね。私も原作が大好きだったのでショックでした。しかも、それだけ大胆なことをやっているのに、結局は作品に役立ててなかった。

押井　そうなんだよ。物語はそっちには行かず、極論すればアレンは田舎で農業をやっているだけ。それに、父王を刺したものの、殺したという描写はない。それも曖昧なんだよね。

　僕は吾朗君と対談したことがある。各界の二世クリエーターと僕が対談するという某雑誌の企画で、僕がまず彼に聞いたのもその「父親殺し」のことだった。

　「なぜとどめを刺さなかったんだ。あんたにしかできないのに」と投げかけてみた。「父親を殺せ。そうしないと監督にはなれない。それは二世の宿命。同じ監督という職業を選んだ以上は、宮さんを殺せ。さもなくば、あんたはいつまでたっても〝宮崎駿の息子〟と呼ばれ続ける」。そういう感じで挑発したんだよ。

　何て答えたと思う？「僕は父親を監督として尊敬してます」だよ。まあ、そのとき会った二世の多くはそう言ったけどさ。

──一応、無難にそう言っちゃうんじゃないですか。

押井　もちろん、尊敬しているでも構わない。同じ表現者としてリスペクトするのは当然だろう。だけど、僕が言っているのは、監督として作品を作るのなら、父親を殺すくらいの覚悟が必要だということだよ。

　監督というのは、たとえそれが安い映画であってもみんな対等であるべきだから。監督って基本的にはアナーキーな職業で、自分以外の権威なんかを認めた瞬間、監督でも何でもないヤツに成り下がってしまうんだよ。ましてや吾朗君の場合、宮崎駿の息子という呪いは一生ついて回る。だったら潔く殺すしかない。だからこそ「さっさととどめを刺せ。あんたしかできないんだから」になる。

──押井さん、自分では殺せないから吾朗さんに殺させようとしてません？

押井　だって、彼しか殺せないんだよ？　おそらく宮さんも、出来上がった『ゲド戦記』を観て安心したんじゃない？「なんだ、吾朗はまったく俺の脅威じゃないじゃないか」ってさ。

　僕にだって宮さんの気持ちは判るよ。自分の子供が同じ職業を選んだら、そういう葛藤が生まれるのは当然。僕はラッキーなことに息子はいなかったし、娘は監督になる気は毛頭ないわけだから。

──結局、吾朗さんとの対談は面白かったんですか？

押井　いや、かみ合わなかった。僕が挑発していることには気づいたみたいだけど、最後までそれに乗ることはなかったよね。ただ、面白いなと思ったのは「監督として尊敬している」という言い方。つまり、父親としては尊敬してなかったということだよ。

──そもそも父親殺しネタを入れたのは吾朗さんのアイデア？　それとも……。

押井　もちろん、誰もがそこに鈴木敏夫の影を感じるわけだ。少なくともけしかけたことは間違いない。トシちゃんのずるいところは、そうやって暗にほのめかすんだよね。僕は吾朗君に「殺すべきだ」と面と向かって言ったけど、トシちゃんはそういう空気を醸成したに決まってる。「父子の対決」にすれば、話題にもなるから、世間に対しても何となく匂わせた。

──でも、成功しなかった。

押井　うん。鈴木敏夫の思惑通りには運ばなかった。作品の出来はともかく、吾朗君にそのつもりはまったくなかったから。

──で、映画としてはどう観ました？

押井　語ることはほとんどないよ。ありていに言ってしまえは〝宮さんの劣化コピー〟。たとえば表情とか、同じでは済ませないというような意志がまったくなかったとは言わないし、後半は全然ジブリっぽくはなかった。でも、それがよかったかというと、これもまた全然よくなかった。

──クモと戦うシーン？

押井　うん。あそこは突然、松本零士みたいになっちゃった。そもそもキャラクターの統一が取れてない。

　やっぱりさ、設定が全然足らないんだよ。宮さんの作品と比べたら桁違い。宮さんの百分の一しかない。それでいてパースは全部宮さん。これをどう評価すればいいんだよって。しかも音響はうるさいだけで最悪だしさ。ひとつだけ確信したのは、吾朗君に関しては、２本目からが勝負だということだよ。





トシちゃんの送りたかった青春





──宮崎吾朗さんの監督２作目が『コクリコ坂から』。原作は『なかよし』に連載されていた佐山哲郎（原作）と高橋千鶴（作画）の少女漫画ですね。

押井　『コクリコ』は、宮さんの作品でもなければ吾朗君の作品でもない。鈴木敏夫の作品。彼がかくありたかった青春の物語です。

──ということは鈴木さんは、ヒロインの海ちゃんが好きになる風間俊ですか？

押井　言うまでもないでしょ。あのハンサム君ですよ。おそらく舞台設定もトシちゃんの年齢に合わせて変えていると思うよ。しかも、彼らが直談判に行く徳丸書店は、ジブリの前にトシちゃんが在籍していた徳間書店。入り口なんて新橋にあったビルを模しているとしか思えないし、徳丸理事長は徳間康快にそっくり。間違いなくトシちゃんの青春です。

──確かに、この高校生たちは１９６３年に16歳くらいですから、48年生まれの鈴木さんとはほぼ同い年になりますね。

押井　ついでに言うと、その俊の友人の生徒会長もおそらくトシちゃん。トシちゃんが、かわいくってしっかり者の女の子と出会い、ビンボーでいたかったという、いわばトシちゃんの自伝的ファンタジー。もっと正しく言うと、「トシちゃんの送りたかった青春」です。トシちゃんはお坊ちゃまの慶応ボーイだけど、徳間に入ってやさぐれた。ビンボーな家庭にコンプレックスがある戦後インテリです。そういう点では学習院出のお坊ちゃまだった宮さんと同じだよね。

──でも、後半の「もしかしたらふたりは兄妹かもしれない」という展開は、使い古された少女漫画の世界ですよ。

押井　だって原作は少女漫画じゃない？　僕もこの漫画は読んでいて、『ラピュタ』の頃だったかはっきりしないけど、みんなで宮さんの別荘に泊まっていたとき、退屈して回し読みしていたの。みんなというのは、僕に庵野に山賀、もしかしたら真宏もいたかもしれない。みんな「なんだか胸があったかくなるなあ」とか「これで安らかに眠れる」とか言っちゃって。その頃から宮さんは「『コクリコ坂から』をやりたい」と言っていたから、かなり長い間、この企画を抱えていたことになる。ホント、宮さんも僕と同じように執念深い（笑）。

──原作は、そんなに長い期間、温めるほど面白い漫画なんですか。この作品を観る限りではそうは思えませんけど。

押井　僕も詳しくは覚えてないけど、途中から少女漫画には珍しく、高校生の学生運動みたいな話になっていた。でも、映画のようにバンカラな感じの高校生が出てきたり、理事長に直談判に行ったりはしないはず。だから僕も「なんでこんな映画に？　何でトシちゃんのファンタジーに!?」と驚いたんだよ。

　でもさ、トシちゃんの青春を描くためだけに舞台を１９６３年に変えているから、ドラマと舞台が見事に分裂しているんだよ。なぜ現代ではなくてこの時代なのか？　団塊の世代に向けて作ったのか？　その辺の理由も一切判らない。一番の大きな問題は、その時代を生きたのは監督の吾朗君じゃないということ。そのせいで映画に〝監督の確信〟がなくなってしまった。

──舞台は東京オリンピックの前年ですよね。こういう時代にこだわりのある押井さんから見ていかがでしたか。

押井　東京オリンピックの前なら東京は当然、建築ラッシュのはずなのに、そういう描写は一切ない。63年ということが判るのはオリンピックのポスターの存在だけ。やはり、吾朗君が原風景としてその時代を生きていないからだと思うよ。

──監督が吾朗さんだとはいえ、ヒロインの女の子は宮崎さん仕様と言えるほど健気ですよね。まだ高校生なのに、買い物をして、みんなのご飯を作り洗濯しと、本当によく働く。誰も手伝ってくれなくたってグチひとつこぼさない。

押井　彼女も宮さんの大好きなタイプ。かいがいしく働くかわいい女の子。でも、ただいい子というだけで、何の魅力もない。そもそも善人しか出てこないというのも問題。あの徳間康快もどきのキャラクターもめちゃくちゃいいヤツじゃない？　そのおかげで映画がツルツルになっちゃった。あとはやっぱりフェティッシュ。それが足りなさすぎる。これは監督としても弱点になるから。そのせいで人間関係やその描写も、すべてがサラっとしすぎちゃったんだよ。

──そういう部分にひっかかりがないから、ますます〝鈴木化〟が気になる？

押井　「気になる」なんてレベルじゃないから。この映画のトシちゃんの「私物化」はあまりに酷すぎる。『魔女宅』で娘に捧げ、今度はついに自分に捧げている。頭がおかしくなっちゃったんじゃないかと思ったくらいだよ。

──鈴木さんの監督作でもないですしね。

押井　まだそれが、社会的なテーマに結びついているなら許されるかもしれない。『魔女宅』のように、たとえ娘のために作ったとはいえ、その向こうに現代を生きる女の子の姿が見えるならまだいい。でも『コクリコ』は何もない。ただ私物化しただけです。

──『ゲド』は06年ですから、５年後に『コクリコ』を発表したことになります。監督としての吾朗さんの成長は感じましたか？

押井　感じなかったなー。それで言うと麻呂（米林宏昌）のほうが全然マシです。吾朗君には成長の気配すら感じないから。

　やっぱりさ、フェティッシュがなさすぎるんだよ。現場の連中も「こんなにフェティッシュのない監督は初めて」みたいなことを言っていたし、それは見事に『コクリコ』にも出ている。何度も言うけど、ツルツルだから。

──吾朗さんって、アニメの監督はしたことないですよね。それで突然、できちゃうもんなんですか？　自分もできると思っちゃったんですかね？

押井　できると思ったかは判らない。もしかしたら鈴木敏夫にノセられたのかもしれないし。でも、もちろん、監督はそう簡単にはできません。できるわけがない。アニメに限らず、それまでに何か作ったことがあればまた違うかもしれないけど、吾朗君にそういう経験はなかったはずだから。

──そのわりには、一応、作品にはなってますよね。

押井　そりゃそうだよ。ジブリが作ったんだから。スタッフがちゃんとしていれば、監督は無能であってもアニメーションは成立します。ただし、出来上がったものは監督の作品にはならない。それは当たり前。

　そもそも、吾朗君に監督を任せた時点で、アニメーションを舐めているとしか思えない。鈴木敏夫だよ。これだけ長いことアニメーションの側にいて、それが判らなかったとするなら、それこそ鈴木敏夫の限界です。

──結局、新しい監督を求めたものの、次々とダメになって、さすがに息子なら宮崎さんもうるさくは言わないだろうと考えた？

押井　もちろん、いろんな思惑があったんだと思うよ。プロデューサーとして、宮さんと延々と付き合った人間として、吾朗君がどこまでがんばれるか、それを見たいという個人的な気持ちもあったんだろう。いろんな興味と思惑があって成立したことだよ。

　ただひとつ、トシちゃんが理解していなかったのは、アニメーションの監督がいかにして機能するのか。

──それって、もっとも重要なことじゃないですか？

押井　そうです。アニメーションの監督になるための必要不可欠な条件は〝フェティッシュ〟なの。フェティッシュなしに、画を動かして映画を作るなんてめんどくさい仕事、できるわけないじゃない。アニメーションの監督には、もれなくフェティッシュはあります。

　実写の監督は、素人でも成立する場合はある。日本でもミュージシャンや作家が突然、実写映画の監督をしたりするけど、現場さえちゃんとしていればできないことじゃない。しかも、ある程度なら自分の思惑を反映することもできる。まあ、だからといっていい作品ができるわけでもないのは、桑田佳祐や小田和正が証明しているけどね。

　でも、アニメーションでは無理。アニメーションは、作っている人間の身体性の産物だから。フェティッシュがマストと言っているのはそのためなんです。吾朗君の作品も一応はアニメーションのていをなしてはいるけど、彼の作品にはなっていないということだよ。おそらく、そういうことは本人も判っているんじゃないかな。





『ゲド戦記』



　米国の作家アーシュラ・Ｋ・ル=グウィンによるファンタジー小説シリーズ。68年から01年にかけ６巻にわたって物語が綴られている。小説はアースシーと呼ばれる世界を舞台にした、魔法使いにして大賢人のゲドの生涯を描くもの。映画版は第３巻『さいはての島へ』を中心に独自の解釈が施されている。このアニメについての詳しい感想・意見はル=グウィンがウェブに上げたので読むことができる。





ル=グウィン



　アーシュラ・Ｋ・ル=グウィンのこと。米国のＳＦ＆ファンタジー作家。29年米国生まれ。代表作は『ゲド戦記』のほかに『闇の左手』『天のろくろ』『世界の合言葉は森』。日本でも人気の高いＳＦ作家のひとり。





山賀



　山賀博之（やまが ひろゆき）のこと。監督・脚本家・製作者。62年新潟県生まれ。84年に監督＆脚本作『王立宇宙軍　オネアミスの翼』を制作するためアニメスタジオ、ガイナックスを立ち上げた。ガイナックスの作品『エヴァンゲリオン』シリーズではプロデューサーを務めている。





真宏



　前田真宏（まえだ まひろ）のこと。アニメーター・アニメ監督・漫画家。63年鳥取県生まれ。原画マンとして『ナウシカ』『ラピュタ』『ぽろぽろ』『豚』に参加。庵野秀明や樋口真嗣と交友が深く『ヱヴァンゲリヲン新劇場版：Ｑ』の監督（12）、『シン・ゴジラ』（16）ではゴジライメージデザインを担当している。また『マッドマックス　怒りのデス・ロード』（15）でもデザイナーとして参加している。監督作にＯＶＡの『青の６号』（98〜00）、『アニマトリックス セカンド・ルネッサンスパート１・パート２』（03）、ＴＶシリーズ『巌窟王』（04〜05）がある。





桑田佳祐（くわた けいすけ）



　シンガーソングライター。サザンオールスターズのリーダー＆ボーカリスト。56年神奈川県生まれ。その唯一の監督作は『稲村ジェーン』（90）。〝ジェーン〟というビッグウェーブを待つサーファーたちの青春を描く。興行的には18億円を記録してヒット作となったが、評価は低かった。





小田和正（おだ かずまさ）



　シンガーソングライター。47年横浜市生まれ。オフコースのリーダー＆ボーカリストを務め、その後ソロに。第１回監督作は『いつか どこかで』（91）。理想に燃える若き建築家がひと目惚れした女性を追い求める物語。脚本・音楽も小田和正。監督２作目は『緑の街』（98）。人気ミュージシャンが映画を作るという実体験に基づいた物語。本作は映画会社による公開ではなく、全国のホール等で上映するという形式をとっている。こちらも脚本・音楽を兼任。





STORY



『借りぐらしのアリエッティ』　人間の家の床下に住む小人たち。「人に見られてはいけない」のだが、小人の少女・アリエッティはその姿を、12歳の少年・翔に見られてしまう。





キャスト：志田未来　監督：米林宏昌　公開日：２０１０年７月17日　上映時間：約94分　興行収入：92・６億円　キャッチコピー：人間に見られてはいけない。





『思い出のマーニー』　両親を亡くし、養母とも距離をとる少女、杏奈。療養にやってきた親戚の住む村で、〝湿っ地屋敷〟を発見。住人の少女マーニーと親友になる。





キャスト：高月彩良　監督・脚本：米林宏昌　公開日：２０１４年７月19日　上映時間：約１０３分　興行収入：35・３億円　キャッチコピー：あなたのことが大すき。





これも宮さんの劣化コピー



──宮崎吾朗さんに続いてジブリ監督として白羽の矢が立ったのが米林宏昌さんですね。『もののけ姫』から宮崎さんの作品の原画マンをやっています。

押井　麻呂の作品は『借りぐらしのアリエッティ』と『思い出のマーニー』があるけど、彼の場合も、その２本を一緒に語ったほうがいいと思う。というのも、麻呂はちゃんと進化しているから。『アリエッティ』と『マーニー』を比べたら、明らかに『マーニー』のほうがいい。語るに足る作品になっているから。『マーニー』ってさ、明らかにジブリの物語のパターンから言ったらいつも通りではあるんだよ。でも、パターン通りというところから出発しても、『アリエッティ』とは違う作品になっている。『アリエッティ』はほとんど語るに足りない作品。ひと言で言うと宮崎さんの劣化コピーです。

──押井さん、また「劣化コピー」って言ってますよ。

押井　その言葉しか思いつかないよ。パターン通りやろうとして、ものの見事に失敗した『猫の恩返し』よりはマシ、というくらい。もっと違う言い方をすると「宮さんの呪い」がかかったハンパな作品。

──『アリエッティ』の原作は英国のファンタジー小説で、私は大好きだったんです。それをわざわざ日本に置き変えているんですが、小人たちはまんま英国人というか白人系。日本になんで白人の小人が？　という違和感がありますよね。

押井　これもヨーロッパのファンタジーが大好きな宮さんの企画にはちがいないんだけど、問題のひとつはその部分だよね。オリジナル通り英国を舞台にすればいいのに、なぜわざわざ日本に変えたのか。少なくとも宮さんはどこが舞台であってもオッケーだったはず。『豚』ではイタリアを舞台にしてるんだからね。

　じゃあ、誰が変えさせたのか？　言うまでもなく鈴木敏夫だよ。トシちゃんが「絶対、日本が舞台じゃなきゃダメだ。そうじゃないと観客の心をつかめない」なんてことを言ったんだと思う。でも、無理やり日本にしたことで、いろんなところが破綻している。

　そもそも「アリエッティ」って何よ？　ってことでしょ。どう見ても白人の小人なわけだから、彼らはどうやって日本に定住したのか？　以前はイギリスにいて密航して日本に来たのか？　それが本当ならなぜそこまでして日本に来たかったのか？　あるいは、何かの偶然で日本に来てしまったのか？　そういう答えを用意しなきゃいけないのに、見事に何もない。なぜなら、それだけでもうひとつのドラマになってしまうから面倒臭かったんだよ、おそらく。

　「どうせファンタジーだから、（細かい点は）いいや」なんて考えたのかもしれない。というか、そうとしか考えられない。でも、それは僕に言わせると、ファンタジーとは呼ばないの。寺山修司の言葉に「虚構というのは、虚構と現実の二通りがあるんじゃないんだ。現実の原則に基づく虚構と、エロチシズムに基づく虚構のふたつがあるだけなんだ」というのがあるけど、ファンタジーはそういうもの。ファンタジーは現実との対立物ではないんだから、何をやってもいいというのは大きな勘違いなんだってね。ファンタジーにも約束事がちゃんとあるんだよ。

──それを見事に映像で見せてくれたのがピーター・ジャクソンでしたね。

押井　そうです。『ロード・オブ・ザ・リング』でジャクソンは、完全に違う世界の話をするために、その舞台である「中つ国」を緻密に作り上げた。ファンタジーに関わろうとする人間の常識ですよ。

──ということは、そういう常識がなかったってことですね？

押井　そうです。そういう常識を平然と無視できるのが鈴木敏夫だから。

──というか、鈴木さんはファンタジーに興味がないのでは？

押井　まったくない。リアリストだからこそ、平気で物語を捻じ曲げることができる。だから観客はアリエッティの出自も気になれば、「借りぐらし」って何だよという疑問を抱いてしまうんだよ。

　あの一家は「借りてる」んじゃなくて「盗んでいる」じゃない？　これが原作通り英国が舞台だったら「借りる」という行為に真実味が出る。英国やヨーロッパには貴族のような有産階級がいて、彼らに寄生して生きている人たちがいる。農民たちも土地を「借りて」生活しているから、そういう「借りる」という行為に社会的認知があるの。でも、それを日本にもってくるとバックグラウンドがなくなって、単なるかっぱらいになっちゃう。夜な夜な人間の部屋に忍び込んで、いろいろとかっぱらいつつ生活している家族だよ。しかも、娘のアリエッティは、そのかっぱらいをやりたくって仕方ないんだから！

　僕は彼らに違和感しかもたなかった。日本人の家に寄生している、国籍不明の怪しい小人一家。職業はかっぱらい。途中、まるでジムシー（『未来少年コナン』に登場する少年）のような野生児ふうの小人少年が登場するじゃない？　彼とアリエッティ一家との差が大きいのにも驚いたよ。片や優雅にハーブティを飲んでいるのに、ジムシーはコミュニケーションさえあやふやで原始人な感じなんだから。交渉がなかったとか言っているけど、同じ種族なのか、そもそも小人にはいろんな種族があるのか……もう謎だらけ！

──小人たちを捕まえようとする家政婦のおばさんの邪悪っぷりにも驚きますね。気持ち悪いくらいだった。

押井　あのキャラクターも謎。表情も邪悪だし、おばさん、あんたは一体何を考えているんだ？　だよ。少年は少年で「君たちは滅びゆく種族なんだ」なんて言い出すし、もう登場するキャラクターがデタラメ。

──宮崎さんのストーリーも破綻してましたが、ここまで酷くなかったと思いましたね。

押井　なぜ、その破綻がここまで気になるのか？　それこそディテールのマジックが明らかに不足しているからですよ。それが宮さんとの違い、「劣化コピー」と言われてしまう所以なんだよ。

──「コピー」と言っていいのか判りませんが、またも洋館が舞台で、少年は療養中でしたね。

押井　今回は多摩の洋館に心臓病の静養のために来ている。『マーニー』にも洋館が出てきてヒロインは喘息の療養で札幌から田舎に来ている。これはもうフェティッシュに近い。病気を抱えた子供、もしくは母親。そして洋館だよね。ジブリというか宮さんの洋館趣味ももうフェティッシュの領域。宮さんは「日本の建売住宅を舞台にして何ができるんだ」なんて言うだろうけど、僕はいつも四畳半のボロアパートでやっていたクチですから。とはいえ、建築物に関しては宮さんに借りがあるんだよ。

──もしかして影響受けたとか？

押井　建築に興味をもったのは、宮さんと付き合ったから。なのでしばらくは必ず建築を意識して作品を作っていた。いまはもうやめたけど、しばらくはイタリア風の農場とか、英国風の館とか、そういうんじゃないところでやってみようって。

──宮崎さんとは別のところで勝負したかったんですか？

押井　いまさら宮さんと同じことをやってもしょうがないし、そもそも僕の好みじゃない。『パト１』のときは看板建築とか、日本独自の和洋折衷建築をバンバン出してみた。それは宮さんの影響だったから。





麻呂は本気だ



──へー、そうだったんですね。

押井　で、話を元に戻すと、確かに『マーニー』にもそういうジブリ印というか宮崎印は出てくるんだけど、少なくとも麻呂が『アリエッティ』の二の舞にならないようにしたことは、ちゃんと伝わってきた。「２本目を作る機会があったら、自分はどうやろうか」それをちゃんと考えている。

　僕もその気持ちは経験者だからよく判るんだよ。『うる星１』のあと『うる星２』を手掛けることになり、これをどう作るべきなのか。やっぱり自分の思い込みと呪縛から解放されない限り、次には行けないと思ったからね。

　麻呂も、もう一回『アリエッティ』をやってどうするんだ。もしそれを繰り返したら、宮さんの影武者でしかない。自分が監督として作品を世に問う以上は、監督としての責務を果たそう……そんなことを考えた、おそらく。たとえ鈴木敏夫が何を言おうが関係ねえ、そう腹をくくったんだよ。

──『マーニー』のどういう部分にその気概を感じるんですか？

押井　やっぱり主人公の杏奈のキャラクターだよね。冒頭の彼女は宮さんがもっとも嫌うタイプ。どんより暗くてウジウジしていて、何か言われると突然キレたりする。もし宮さんが彼女を描けば、始まって５分でいい子になってますよ。

──ああ、千尋ちゃん（笑）。

押井　でも、麻呂はそうはしなかった。いい加減な人間描写をする気はない。誰もが納得できるようにこの少女の変化を描くんだ。そう決心して異様に手間暇をかけた。最初はまずそうにご飯を食べていた彼女が、元気いっぱい目玉焼きを切ってご飯を頰張るところまで、たぶん50分くらい。あれだけ葛藤が激しくて、コミュニケーションが上手に取れないヒロインはジブリでは初めて。だから「麻呂はホンキだ」って思ったわけだよ。

──でもこれも、原作は英国で書かれた小説ですよね。それをまた日本を舞台に翻案している。

押井　ジブリでやる以上、それは避けられない。だからせめてもの抵抗ですよ。で、僕にしては珍しく、その原作が気になった。麻呂がどこまで翻案しているのか、彼の監督としての判断はどうだったか知りたくて、検索してみたんだよ。

──どうでした？　この物語、結構複雑ですよね。

押井　原作通りだった。マーニーは杏奈の死んだ婆ちゃんで、子供の頃、眠る前に母親に聞かされていた話を断片的に覚えていたから、初めて会った気がしなかった。突然、マーニーが消えたりするのは、そこから先を聞いてなかったから。要するに記憶の反芻だったということだよね。でも、それは文字で書かれた世界では成立するけど、映画でその理屈は通用しない。あの赤ちゃんが、婆ちゃんの話を記憶しているはずはないから。

──最後に、そういう種明かしをするわけですが、その表現はちょっと演出として貧しい感じでしたしね。

押井　だからもっと原作を翻案して、マーニーは完璧に杏奈の脳内幻想、イマジナリーフレンドだったというくらいのほうが、よっぽどいい話になったんじゃないかと思ったけどね。そうすれば、中途半端なマーニーの婚約者とかいう日本人の青年を出す必要もないし。

──中途半端なキャラクターといえば、あの船のおっさん。何も喋らないという意味ありげな設定ですが、最後まで別に何もなかったですよね。

押井　あのおっさんがボートを漕いでヒロインを、マーニーがいる向こう岸の洋館に連れて行く。あれは三途の川のイメージだよ。

──また三途の川ですか。ジブリアニメ、三途の川、多すぎじゃないですか？

押井　だってそうでしょ。言ってみればマーニーは幽霊ですから。あの子にしか見えない幽霊ですよ。いっそのこと、そういう幽霊譚にしてしまうのも手だったんだけど、そうはしなかったので整合性を図るため、いろんな無理をやらなきゃいけなくなった。突然、昔の写真が出てきたり、養育費の話になったりと、無理が次々と噴出してくる。これが原作通り、英国を舞台にしていたら、ここまで無理する必要はなかったと思うよ。やっぱり無理やり日本に置き換えるからワケが判んなくなってしまう。鈴木敏夫は作品は成立させたけど、作品の説得力は成立させていないから。杏奈の悩みの原因も説得力ないしね。

──杏奈がお世話になる田舎の家の親戚夫婦。彼らもジブリっぽいですよ。

押井　あの夫婦は、それこそ宮さん好みのナチュラリストで職人。でも、どうやって生活しているのかはいまいち判らない。手作りの土産物を売っているのか、それとも本当の芸術家なのか。まあ、宮さんの好きな職人なんだろうけどさ。

　そういう意味ではジブリの記号はたくさんある。スイカを食べたり、トマトを切ったり、目玉焼きを作ってみたり、ジブリの記号が満載だけど、明らかに一歩踏み出そうという意志は伝わってくるよ。

──成功してます？

押井　成功しているとは言えない。つまり、大胆さがないから。原作に引きずられてしまったという感じかな。最後のほうは、ただの答え合わせになっちゃってるし。伏線もなしに突然、写真を見せたり髪留めに意味をもたせたり。もっと思い切って、そういうところをばっさり切っちゃえばよかったのにと思うよね。

　宮さんが激怒してもいい。だったらケンカしろと言うの。ジブリで監督をやる限り、宮さんとの衝突なしに監督業が成立するわけがないんだから。

──画はどうでした？

押井　好みで言うと、僕の好みではない。でも、ジブリの絵柄から離れてみようという意志は、少しだけど感じるよ。『マーニー』は、まだ劣化コピーではあるものの、少しよくなっている。半歩前進くらいかな。監督として共感できる部分があるし、割と好意的に観ることができた。

　何度も言うけど、やっぱり捨て身になって宮さんとケンカしなきゃ。宮さんみたいな怪物とやりあうためには、そういう大胆さが必要なんだよ。そうじゃなきゃ監督として自立できないから。それは吾朗君のときにも感じたんだけどね。

──怪物とやりあうのは勇気が必要だし。

押井　だからみんな、ことごとく逃げ出しちゃったわけじゃない。ジブリに出入りしていたいろんな監督が逃げ出した。細田守、そして僕もだよ。

──でも、細田さんのアニメーションはちょっとジブリっぽくないですか？

押井　彼はコピーの天才だから。別に悪い意味じゃないよ。コピーであっても天才なんだからさ。いまの日本の映画界で言ったら貴重な才能ですよ。

──押井さん、庵野監督のことも「コピーの天才」って言ってましたよ。

押井　庵野は細田君より上。庵野に比べれば細田君はまだまだ。頭のほうは細田君のほうがちょっといいと思うけど、庵野には強烈なリゴリズム（厳格主義）があるから。そういう意味では監督としては、庵野のほうが向いているだろうね。

──声優はどうでしょう？

押井　声優？『マーニー』に限らず、ジブリ作品の声優にはほとんど意味がない。もはやそれは悪い伝統みたいなものですから。「さすがにこの人だな」と思ったのは『もののけ』でエボシを当てた田中裕子くらい。ジブリアニメで声は意味をなしてませんから。

──じゃあ押井さん。宮崎さん、高畑さんの監督作を除いたジブリアニメでいいと思ったのは？

押井　近藤（喜文）さんの『耳をすませば』かな。あの作品だけは、ジブリの呪縛をほとんど感じなかったから。

──それは意外です。だって『カントリー・ロード』ですよ？

押井　そうであってもだよ。ただし、面白いかと言われると、そんなことはないし、もう一度観たいとも思わない。別に好きじゃないし、あの家族は気持ち悪いと思うくらいだけど、それでも近藤さんはジブリの呪縛には囚われていない。本気で作っているし、宮さんの言うことも聞かなかったんじゃないのかな。唯一抵抗したのが近藤さんだったということなんだよ。

　ほかの連中は呪縛に打ち克つどころか、呪縛に気づいたかどうかも怪しいくらい。ただ麻呂だけは呪縛の正体に、あるときから少しだけ自覚的になったみたいだけどね。

　どちらにしろ、第三のジブリ監督を育てようとしたのはトシちゃんの戦略ではあったものの、結果的にはことごとく失敗した。だからスタジオを閉めるしかなかったけれど、それは最初から判っていたことなんだよ。スタジオは監督を育てられない。アニメスタジオは一代限りで終わるものなんですよ。





米林宏昌（よねばやし ひろまさ）



　アニメーター・アニメ監督。73年石川県生まれ。96年にジブリに入社し『もののけ』『山田くん』等の動画、『千と千尋』『ハウル』『ポニョ』『風立ちぬ』等の原画を担当した。『アリエッティ』で初監督。14年12月にジブリを退社し、スタジオポノックを設立。その長編第１作が『メアリと魔女の花』（17）。「麻呂」はニックネーム。





英国のファンタジー小説



　『床下の小人たち』のこと。英国の作家メアリー・ノートンの『小人の冒険』シリーズの第１巻。原作の主人公の名前もアリエッティ。小人たちの生活ぶりが細かく描かれ、それがとても魅力的。原作の人気から英国では何度もＴＶドラマ化されていていくつものバージョンがある。97年にはハリウッドで実写映画化され、日本では『ボロワーズ／床下の小さな住人たち』というタイトルでソフト化された。





ピーター・ジャクソン



　監督・脚本家・製作者。61年ニュージーランド生まれ。初の長編『バッド・テイスト』（87）で話題となり、『乙女の祈り』（94）でヴェネツィア映画祭銀獅子賞受賞。トールキンの『指輪物語』の映画化『ロード・オブ・ザ・リング』（01～03）を原作通り３部作で作りファンタジーブームを起こす。その後、『指輪物語』の前日譚に当たる『ホビット』（12～14）を〝もしトールキンが『指輪』のあとにこれを書いていたら〟というアプローチで映画化。こちらも３部作にしてそれぞれ大ヒットさせた。その他の作品に『キング・コング』（05）等。





『ロード・オブ・ザ・リング』



　トールキンの原作『旅の仲間』『二つの塔』『王の帰還』をそのまま映画化。原作の舞台である〝中つ国〟をリアルに創造し、ファンタジーのスタンダードを一気に格上げしてくれた。最後の章『王の帰還』はオスカーレースで、作品賞、ジャクソンの監督賞・脚色賞をはじめ11部門を受賞した。





看板建築



　関東大震災後、住居併用の商店が用いた日本独自の建築様式。建物の前面にモルタル等で装飾を施している。『パト１』に登場するシゲさんの下宿・久保商店がこの看板建築。モデルは築地に実在する「ナンデモヤ」という店。





『うる星１』



　『うる星やつら　オンリー・ユー』（83）のこと。押井の長編アニメ第１作。かつてあたると婚約していたという少女エルの登場で繰り広げられるドタバタラブコメディ。原作者・高橋留美子は絶賛したと言われている。公開時の併映作は相米慎二の『ションベン・ライダー』だった。





原作



　英国の作家ジョーン・Ｇ・ロビンソンの同名児童文学。舞台は英国ノーフォーク州の架空の村。孤独を抱える少女アンナがマーニーと出会って人を愛すること、愛されることを知る物語。





これまでのジブリ、これからのアニメーション





ジブリとそのパトロン



──これで一応、スタジオジブリが制作した作品は網羅しました。宮崎さんはまた新作を作ると発表しましたが、それはさておき、ポストジブリというか、日本の次のアニメーションはどうなるのか？　押井さんはどう考えていらっしゃいます？

押井　ポストジブリだとか、ポスト宮崎とかよく聞くけど、そういう存在はありませんから。言うのは結構だけど、実体のないことを言うなと言いたい。その根拠は何なんだってこと。

──一般的には新海誠監督や細田守監督、庵野秀明監督等がポスト宮崎と言われているようです。収益を上げることができるからなんでしょうかね。

押井　ありえません。『君の名は。』は観てないけど、ありえないでしょう。こんなこと言うと、いつも叩かれるんだけどさ。たまたま当たっただけでしょ？　映画は水ものだからそんなこともある。でも、だからといってポスト宮崎にはならない。

　極論しちゃえば、映画なんて勘違いでしかヒットしないの。ジブリも完全な勘違い。ただその勘違いを、言わば意図的に、自覚的に繰り返したのが鈴木敏夫という男の大仕事なんですよ。ジブリというアニメーションのスタジオが、30年にわたって成立していたからくりはそこにある。その本質を理解しているのはおそらくトシちゃんだけ。宮さんは判ってないよ。

──ということは、鈴木敏夫と押井守だけが知っている真実なんですね。

押井　ほかにいないとは言い切れないけど、敢えて言ってみるとそうなる。張本人の鈴木敏夫と、側でずっと見てきた僕。必然性はあると思うよ。

──高畑さんは？

押井　高畑さんはまた面白い人で、判っているという以前に、そういうことにまったく興味がない。自分が映画を作ること以外はどうでもいいの。ジブリがどうなろうと知ったことじゃない。

──じゃあ、これからの日本のアニメは？

押井　いや、何もないんじゃない？　何だかんだ言っても、日本の戦後のエンタテインメントは正力松太郎が作り出した世界。彼はとっくに亡くなり、その弟子のような存在で最後まで日テレの番頭を務めた氏家（齊一郎）さんも鬼籍に入り、彼らを知る奥田（誠治）さんも日テレを去り、確実に時代が一巡りして変わったんですよ。これからどうなるかは誰にも判らないけれど、僕に言わせれば「系譜はついに絶えた」。ジブリはその末裔。ジブリにはそういう大きなパトロンがいたという事実を無視することはできない。これを言わなかったらジブリというスタジオを語る意味はないよ。

──パトロンというかスポンサーを探すのが難しい時代になったということですか？

押井　それもある。でも、やっぱり系譜が絶えたことが大きい。系譜って大事なんだよ。日本の戦後のエンターテインメントはプロ野球からプロレス、テレビ放送、ある意味映画まで、全部その系譜に連なっている。その系譜の背後には、いつも言っているけど、マルクスの亡霊が取り付いているんだから。

　でも、それがもう全部死に絶えた。今後どうなるかなんて誰にも判らない。たぶん、世知辛くなるんじゃない？　もうすでにそうなっていて、昔のように才能を育てようなんて気は毛頭ない。完成品を求めているだけだよ。それはアニメの世界に限らず、映画もＴＶも芸能人も同じ。「（才能のある人材や、優秀な作品が）ないのなら、どこかから輸入してこい」という発想。

──でも、映画に関して言うと、その輸入作品は以前ほどヒットしませんからね。

押井　ハリウッドの映画は（日本では）苦戦を強いられているよね。海外で大ヒットした映画が日本ではダメというのはよくある話だし、その一方で「なぜこれが？」という日本映画がヒットしたりする。でも、それを海外に持って行ってもまるっきりお話にならないわけだし。要するに日本がガラパゴス化していて、とりわけ若い観客のガラパゴス化が激しいんだよ。果たして、いまの日本の映画界はそれに対応しているのだろうかとは思うよね。

　こういう話になると、僕の下の世代の監督たちは食いついてくる。彼らは一生懸命考えているから。どうやれば観客の需要にかなう作品を作れるのか？　そもそも、どうやって監督として生き残って行くのか？　神山や、たぶん細田守や新海も、間違いなくいろいろ考えていますよ。まあ、僕はとっくの昔に諦めてるから。もう知ったことじゃないけどさ。

──そんなこと言わないでくださいよ。

押井　いや、本当にそうなんだから仕方ないって。ある時代が終わったことは間違いないんだから。次に誰が現れ、誰が（エンターテインメント業界を）牽引していくのか、誰にも判らない。

　ただひとつ、アニメ業界ではっきり言えるのは、アニメファンの多様化。彼らの嗜好が細分化されていて、しかもひとつのサイクルのスケールが小さくなっていること。





ジブリアニメは〝絵本〟



──そうやって見ると、ジブリは確かに大きな存在でしたね。

押井　一般の観客レベルにまでアニメーションの市場を広げたというのがジブリの最大の功績だから。

──でも、そのジブリのファンがアニメファンになってオタクになるというのはあまり聞いたことがないですよ。

押井　それはまた別の話。ジブリの作品には〝萌え〟がないから。そういう〝萌え〟が好きなアニメファンのフェチとは一致してないの。あの宮さんのフェチを理解するにはそれなりの知識や教養が必要になる。だから鈴木敏夫──ジブリというスタジオと言ってもいいんだけど、彼がアニメファンに目配せしていた時代と、一切無視していた時代があるわけじゃない。『トトロ』のあたりくらいまではアニメファンを動員できたから、彼らも視野に入れていたけど、そのあとは一般の観客だけを見るようになった。アニメファンはそこで置き去りにされたかたちになったんだよ。これは言い方を換えると、ジブリというスタジオはアニメファンだけではやっていけなかったことになる。

　それにしても面白いよね。『アニメージュ』の編集長だったトシちゃんが、アニメファンから離れなくてはジブリは成功しないと思ったわけだから。ちゃんとアニメファンの本質を理解していたということなのかもしれない。彼じゃないと下せない決断だったんだよ。

──一般の観客はジブリの作品を観にいくとき、アニメーションを観にいくという感覚はあったんでしょうか。

押井　なかったと思う。僕の知人がとても上手いことを言ったんだよ。「ジブリは絵本」と言うわけ。何世代経ってもみんなが読んでいる共通の絵本であるってね。その作家が大好きというコアな人ももちろんいるだろうけど、多くの人はひとつの通過儀礼のように絵本に接している。この作家の次回作が早く読みたいとか、数年続編が出ないからといって切望するわけでもない。これが漫画だったりすると、早く続きが読みたくなるけど、絵本の場合はそうはならないから。

　これは確かに言いえて妙だと思ったよ。漫画には大好きなキャラクターがいたり、憧れるキャラがいたりするけど、ジブリの作品に関してはそういうのも薄いから。

──確かに、そういう感覚は薄いですね。

押井　普通、これだけ大ヒットすればキャラクタービジネスに行きそうなのに、それもしなかった。もしかしたらそういう時期があったのかもしれないけど、結局はミッキーマウスを目指さなかった。

──そもそもジブリのアニメグッズって主人公のものがあまりないんじゃないですか？　『トトロ』の場合はトトロで、メイやサツキのフィギュアを欲しがる人はあまりいない。『千と千尋』だって、あれだけ凄い数字を弾き出したのに千尋のグッズってあまり見たことがないですよ。

押井　宮さんがそういうのは好きじゃないというのがあるだろうけど、あの鈴木敏夫ならそういうビジネスを考えてもおかしくない。にもかかわらずやってないところを見ると、そういうのはジブリにとってはプラスにならないと判断したからだよ。トシちゃんは、日本におけるキャラクタービジネスを信用していなかったのかもしれない。

──それで言うと続編もないですよ。ハリウッドのビジネスだったら『千尋』の続編やスピンオフ等が作られるのは普通。今度はハクの話なんていかにも考え付きそうじゃないですか。でもジブリは、『トトロ』の短編は作っているとはいえ、ちゃんとした劇場用の続編は１本もない。

押井　それはある意味、潔いよね。

　実は僕は『ナウシカ』の続編を作ってはどうかと提案したことがあるんだけどさ。それこそみんなが観たいと思うんだよ。この作品はアニメファン的な濃度が高いから、とりわけオタクたちは観たいんじゃないかと考えたわけ。監督を庵野にやらせたりしたらマニアは大喜び間違いなしでしょ、きっと。

──それは観てみたいかも！

押井　うん。でも、戦争状態になった血みどろの『ナウシカ２』というのは、ジブリの路線としてはありえないだろうね。

──確かに続きが観たいのは『ナウシカ』くらいで、あとの作品はちゃんと１作で完結しているという印象ですね。

押井　そういう意味では正当な映画人だったんだよ、宮さんは。

　ジブリのような会社は世界から見ても珍しいんじゃないかな。宮崎駿という稀代のアニメーターに特化したスタジオ。しかも、そこが、日本の映画史を塗り替える作品を連発していたんだから、語るに値する〝事件〟だったんだよ。

　さっきの知人が言った「ジブリは絵本」説は本当に正しくて、おそらくそういうかたちでみんなの記憶に残り続けるんだと思うよ。たとえ宮さんが亡くなったとしても、そのあともちゃんとみんながその作品を観ることになる。でも、そうなるのは宮さんの作品だけで、高畑さんやその他の若い監督の作品は消える運命にあると思うけどね。





不世出のアニメーター、宮崎駿



──ジブリ美術館はどうなんですか。そういうジブリの作品に触れることができるんですよね？

押井　始まった頃は宮さんの道楽だと思っていたけど、いまはちゃんと需要を満たしているんじゃない？　アトラクションも何もないのに、いまでも入場券を手に入れるには苦労するというから人気があるんだよ。しかも、来館者のほとんどは小学生の子供とその親。デートスポットにもなっていない。ジブリのアニメーションに触れた子供たちの追体験の場にちゃんとなっている。きっちり美術館しているんだよ。おそらく、宮さんが最初に考えた構想通りに機能しているんじゃない？

──押井さんはジブリ・キャラクターのなかで誰が好きですか？

押井　特にないかなー……強いて言えばクシャナ。本当に強いて言えばだけど。「なぎはらえ！」ってやつだよ。まあ、声を当てていたのが（榊原）良子さんというのもあるかもしれないけど。それに、彼女のそのオーディションの現場になぜか僕はいたし。良子さんがクシャナのセリフを読んでいたのを、いまでもよく覚えているから。あとはロボット兵かな。

　そうやって考えると、純粋に宮さんのキャラクターに入れ込んだ覚えはないね。麻紀さんはどうなの？

──すみません！　私はマルクルなんです。別にショタじゃないんですが、彼は神木隆之介君の声を含めてかわいかった。映画を観たあと、しばらく「芋はきらいじゃ」ばかり言ってましたから（笑）。あとは押井さんと同じロボット兵。あのフィギュアは欲しい。

押井　ほら、やっぱりメインキャラクターじゃなくて脇なんだよ。

──宮崎さん自身はどうなんでしょう？　好きな作品とかキャラクターとか。

押井　それは聞いたことがないから判らないけど、僕が想像するに『ナウシカ』は最初の作品であることも手伝って、自分のなかでも特別なんじゃないかな。でも、作品として宮さんが評価するという意味で言ったら『ラピュタ』かもしれない。

──漫画映画という自分の好きなジャンルだからでしょうか？

押井　あと表現のレベルでも。アニメーターとしての作業に対する客観的な評価としても高いんじゃないかな。

　宮さんは「自分以上のアニメーターはいない」と思っている人で、それは正しいから。沖浦（啓之）たちのテクニックも認めているだろうけど、自分が描く世界とは違うと考えていて、自分のタイプとしては、やはり自分が一番だと思ってるんじゃない？

──その「自分のタイプ」って？

押井　動かすこと自体が生み出す感動、みたいなものかな。飛んだり跳ねたり走ったりすることだけで、エモーショナルな何かを喚起できる力。そういうことが表現できるのは宮さんだけ。上手いヤツはいくらでもいるけど、そういう力をもっているのは宮さんだけなんです。それはテクニック以前の話で、ひと言で言っちゃえば〝ナチュラル・ボーン・アニメーター〟。

　それに、いまどきの上手なアニメーターは、アニメーションの洪水のなかで育ったから、オリジナルたり得ない宿命がある。でも、宮さんがアニメーターとして育った時代は、アニメーションそのものが貴重品。おそらく宮さんたちは自分が見たいものは自分で作ったんだよ。だからオリジナルの強みがある。そういう意味でも不世出のアニメーターなんですよ。

──その技術だけで興行収入３００億円の作品を作ったんだから、やっぱり凄いですよね。

押井　いや、その数字は何も関係ないよ。興行に携わっている人には重要かもしれないけど、日本の映画界においてはたいした問題じゃない。ハリウッドの映画史を塗り替えたという『アバター』だって、もうすぐ消える運命だと思う。映画の歴史を俯瞰して考えれば、最終的に残るのはエポックメイキングな作品であって、数字を上げることに特化した作品じゃないから。

　とはいえ、さっきも言った通り、宮さんの作品は残る。数字に関係なく確実に残る。ずっと残って、次の子供たち、そしてまた次の子供たちを喜ばせ続けるんだよ。





『君の名は。』



　16年製作の長編アニメーション。監督・脚本・原作は新海誠。飛騨で暮らす女子高生と、東京で暮らす男子高生がなぜか赤い糸で結ばれていたというラブストーリー。興収２５０億円という『千尋』に続く大ヒット作となった。





正力松太郎（しょうりき まつたろう）



　実業家・政治家。１８８５年富山県生まれ。内務省を辞職し、読売新聞の経営権を買収して社長に。52年に日本テレビ初代社長に就任した。プロ野球の父、テレビ放送の父、原子力の父と呼ばれている。69年逝去。





奥田誠治（おくだ せいじ）



　映画製作者。56年福島県生まれ。80年に日本テレビに入社。『ナウシカ』オンエアをきっかけに宮崎駿らと知り合い、『魔女宅』『もののけ』『千尋』『ハウル』等の製作を務めた。押井作品『スカイ・クロラ』でも製作総指揮に名を連ねている。





神山



　神山健治（かみやま けんじ）のこと。アニメ監督・脚本家。66年埼玉県生まれ。押井塾出身。劇場作では『ミニパト』（02）、ＴＶシリーズでは『攻殻機動隊 STAND ALONE COMPLEX』（02）で初監督。劇場アニメの代表作に『東のエデン』（09～10）、『００９ RE:CYBORG』（12）、『ひるね姫～知らないワタシの物語～』（17）がある。なお『立喰師』ではロッテリア店長神山役で出演している。





榊原良子（さかきばら よしこ）



　俳優・声優。56年千葉県生まれ。押井作品には欠かせないヴォイスアクター。『パト』シリーズの南雲しのぶの声で知られる。『うる星１』ではエル、『イノセンス』ではハラウェイ、『スカイ・クロラ』では笹倉永久を担当した。





神木隆之介（かみき　りゅうのすけ）



　俳優・声優。93年埼玉県生まれ。子役からキャリアを始め、声優デビューは『千尋』の坊。『アリエッティ』で翔、『君の名は。』では瀧、『メアリと魔女の花』はピーターの声を当てている。役者としても活躍し『桐島、部活やめるってよ』（12）、『るろうに剣心 京都大火編／伝説の最期編』（14）、『バクマン。』（15）、『３月のライオン』（17）、『ジョジョの奇妙な冒険 ダイヤモンドは砕けない 第一章』（17）等に出演している。





『アバター』



　09年米英映画。監督はジェームズ・キャメロン。パンドラという星で繰り広げられる人間ＶＳ先住民ナヴィ族の戦い。その一族をモーションキャプチャーを多用して表現し、３Ｄで上映した。世界興収は歴代ナンバーワンヒットの27億ドル。全米は７億６０００万ドルで、『スター・ウォーズ／フォースの覚醒』の９億３６００万ドルに破られ２位になった。一応キャメロンは、本作を入れて５部作にするつもりらしい……。





──今回は、押井さんとの関りが深いおふたりに登場していただき鼎談をお願いしました。株式会社プロダクション・アイジー代表取締役社長で数々の押井監督作品にプロデューサーとして参加されている石川光久さんと、スタジオジブリのプロデューサーの鈴木敏夫さんと長年仕事を続けて来られた高橋望さんです。

押井　まさに〝監督vsプロデューサー〟という構図だね（笑）。

　石川のことはあまり説明もいらないだろうけど、一応、高橋くんを紹介しておくと、彼は『アニメージュ』の編集者としてトシちゃん（鈴木敏夫）の下で働いていたんですよ。彼に対する当時の私の印象は〝鈴木敏夫の懐刀〟。初めて会ったときのトシちゃんの紹介も「うちのエースですから」だったからね。これは今でも覚えている。

　懐刀でありエースであるということは、何を意味しているかと言えば、当事者には絶対ならないタイプ。そういう人間の傍らで、距離を保ちながら接する人。あらゆることに対して決して深入りしないんですよ。

　それが高橋くんのユニークなところ。鈴木敏夫に洗脳された人はそれこそゴマンといるんだけど、その免疫があったのは、私の知る限りでは高橋くんと麻紀さんだけですよ。

高橋　鈴木さんがジブリの専任になる時には連れていかれたし、その後もちょっと離れていても、結局は周辺に呼び戻されてしまう。鈴木さんは自分の周りにたくさんの手下を置いているんだけど、やっぱりひとりぐらいは本当のことを言うヤツがいたほうがバランスが取れると思ったんじゃないかな？　鈴木さんは、やっぱり怖い人で、面と向かって意見を言ったりする人は少ないんですよ。そんなこんなで、そういう役目を僕が請け負うかたちになったんです。

押井　要するに客観性を持っていると判断されたんだよ。

高橋　この間、鈴木さんの本に批判も含めて自由に書いていいからって原稿を頼まれて書いたんだけど、当人からはまだまだ（批判が）足らないと言われましたね。そういうの、期待されているんだと思います。

──押井さんとは一緒に仕事をしたことはあるんですか？

押井　仕事で直接的に関わったことはないけど、よく一緒に遊んでいたよね？　よくおしゃべりもしたし、その人となりについてはちゃんと判っているという感じかな。

高橋　いや、仕事でも『スカイ・クロラ The Sky Crawlers』（08）ではいっしょにベネチア行ったりしたじゃないですか（笑）。

──鈴木さんに対する距離の取り方、つまりベタベタしない上に、批判的ですらあるというところは、もしかして押井さんと鈴木さんの関係性に重なる部分もあるんですか？

高橋　いや、違うと思います。ベタベタですよ（笑）。何度かふたりが一緒のところを目撃してますが、とても仲がいい。本当にベタベタ。実際は距離を置くような関係じゃない。お互い、残り少ない人生なんだから、ふたりで凄いモノ、作っちゃえばいいのにって思います……というようなことを、さっきの本に書いたんですが、鈴木さんはピンと来てないようで「（押井さんとは）そういう関係じゃないからさー…」みたいなことを言ってましたね。

押井　トシちゃんがそう言ったのは、そんなふうに一緒に仕事をしたら決裂することが判っているからだよ。これまで何度かそういう企画もあったけど結局、実現には至ってない。ガッツリ組んだのは『天使のたまご』（85）だけなんだから。まあ、あれだけでいいやって感じなんじゃない？　ふたりとも（笑）。

──ところで、先ほど高橋さんがおっしゃっていた「鈴木さんは怖い」という話なんですが……。

押井　アニメ業界、トシちゃんだけじゃなく結構、そういう人は多いよ。石川だってそういうところあるし。

石川　よく言うよ。

押井　そう？　結構なもんじゃない？　制作会議じゃ怒号が飛び交ってるじゃん。いや、飛び交っているんじゃなく、一方的に石川が怒号を浴びせてる。石川はアニメーターにはめちゃくちゃ甘いけど、監督や制作にはとても厳しいって、判っているよね？

石川　いや、確かなのは、僕が押井さんには甘いってことですよ。

押井　どこが甘いんだよ。

石川　僕は作品単位で考えている。その作品にとって、どう付き合えばいいのか？　どういう関係を結び、どういう人材を集めればいいのか？　その作品が一番いい形になるよういつも考えるんです。

　押井さんがＩ．Ｇで仕事をしてくれるときは、そういう人材を集めることも、僕の重要な仕事になる。やっぱり、黄瀬（和哉）の作監、小倉（宏昌）さんの背景と美術だと、押井さんのやりたいものがちゃんと形になるから。

　押井さんが「黄瀬に甘い」とか「小倉さんに甘い」と言うけど、僕はそう思ってはいない。たとえば押井さんが４年に一度、Ｉ．Ｇで作品を作るとき、僕としてはそういうスタッフを集めているか、集められるかを重視している。押井さんが望んでいる作品を作ってもらうために、ですよ。

　押井さんは、僕が彼らのケア的なことをやっているから「甘い」と言ってるんであって、実は押井さんに「甘い」というのが真実だと思うんだけど。

──石川さんは、まず作品ありきで考えていらっしゃるわけですね。

石川　作品単位で考えているということで言えば、『鹿の王 ユナと約束の旅』（21年９月10日公開予定 監督：安藤雅司　宮地昌幸）もそうなんです。うちのプロデューサーの松下（慶子）が、どうしてもこの作品をやりたいと言う。なぜかと言えば、ジブリが培ってきたノウハウ、イヌや馬など四本脚の動物を描く技術をアニメ業界に残したいからだと。そういう絵を描けるアニメーターが本当にいなくなっちゃったからなんだよね。

高橋　なるほど！

石川　それを聞いて思い出したのが『人狼 JIN-ROH』（00）だった。大塚（伸治）さんが描いた、オオカミが水のところを走るシーンの美しさに僕、感動しちゃったんですよ。

　だから、なるほどあれか、って感じになり、『鹿の王』を〈東京タワー〉にするのはどうだろうかと考えたんです。60年も前、３３３メートルものタワーを建てたのは誰かといえば、とび職などの職人なんです。彼らは、安全基準なんていうのが曖昧だった時代に、持てる技術全てをつぎ込んでわずか１年半であの塔を建ててしまった。『鹿の王』も同じで、アニメの職人たちが、その技術の粋を集めて創る作品にしようと。

　資金繰りをはじめ、本当に大変だったんだけど、出来上がった映像を観て僕は驚いた。ジブリの匂いがプンプンするし、さすがだと思った。そして、これはアニメの〈東京タワー〉になると確信したから。

高橋　それは凄いじゃないですか。

石川　うん。でも、今はまだ電波塔なんだけど。

高橋　どういう意味ですか？

石川　電波塔として造られたタワーが、なぜ〈東京タワー〉となり60年にもわたり愛され続けたかというと、レストランを開いたり展望台を作ったりと、お客さんを集めたからですよ。そうやって単なる電波塔から、愛される〈東京タワー〉へと変わっていった。

　だから『鹿の王』も、今からしっかり宣伝して、多くの人に観てもらい、みなさんに愛されることによって〈東京タワー〉へと変わることが出来ると思っているんですよ、僕は。

高橋　それは素晴らしいですね。監督は安藤（雅司）さん？

石川　そう。安藤さんは凄いよ。本当に上手い。『千と千尋の神隠し』（01）や『君の名は。』（16）などの大ヒット作を筆頭に、あらゆる作品の作監をやっている。

　そんな安藤さんの言葉で印象的だったのは、「監督は、作監のことなんて考えずに、好き勝手、非情、非道なことをやらせるものだ。でも、自分は作監でもあるので、どうしてもブレーキをかけてしまう」という言葉。

　確かにそれも事実なんだけど、じゃあ宮崎さんや押井さんは作監に非道なことをやらせて、自分が大満足できる理想の作品を作れたかというと、そうでもないんじゃないかと思う。何が言いたいかと言うと、妥協できるかどうか、というのが監督の条件のひとつじゃないかということ。

押井　映画は常に妥協の産物です。

石川　そうでしょ？　でも、妥協したくない安藤さんは、監督が作監をするべきじゃないと言っていたんだよね。でも、僕がこの作品に投資したのは、職人たちに電波塔を作ってもらうことだったから、安藤さんが監督なのは当然なの。こういう作品はたぶん、ジブリでは許されないんじゃないかなあ。

高橋　押井さんは『鹿の王』、ご覧になったんですか？

押井　観てないけど、予想はつく。安藤くんは本当に、めちゃくちゃ優秀なアニメーターですよ。今の日本で五指に入る才能。それは間違いない。だから、アニメーターとしては最高の仕事をする。でも、監督としてはどうなのか？　ということだよね。私は監督だから、彼を監督として考えると当然、評価の軸は変わって来る。

　言っちゃなんだけど、宮さんを含めて、アニメーター出身の監督で感心したことは一度もないからね、私は。根本的に仕事のやり方がもう違うんです。

　それは才能以前の話。監督は監督として育つしかないんだよ。

石川　でもさ、そういうのって押井さんの良さだよね。そうやって思い込むのってさ。

押井　思い込みもへちまもあるか！（笑）

石川　そういう押井さんの姿勢、素晴らしいと思うよ。そういうんじゃないと押井さんじゃないから。ただ、僕が言いたいのは、押井さんはお金などは関係ないと言っているけど、やっぱりベースになるのはお金じゃない？　仕事なわけだから。

押井　あのさ、私が予算を無視して仕事したことが一回でもある？

石川　ないよ。それはないけど、ちゃんとお金のリターンがあったこともないよ！

押井　それは監督の仕事ではありません！

石川　ヒットしたという記憶がない。押井さんと一緒に仕事して、ちゃんとヒットしてお金になったという記憶は、ありません！！！

高橋　いやー、凄いなー（爆笑）。

押井　よく言うよ。

石川　それは認めるでしょ？　押井さん！

──『GHOSTIN THE SHELL／攻殻機動隊』（95）とか、リターンなかったんですか？

石川　ぜんっぜん！！

──お金の面ではそうだったかもしれませんが、映画史やアニメ史には名前を残しましたよね？

石川　そういう面ではね。そういう監督であるということは、ちゃんと認めていますよ。

──Ｉ．Ｇの名前も、『機動警察パトレイバー』や『攻殻機動隊』シリーズと一緒に大きくなった印象があります。押井さんはよく「自分の作品はヒットしないかもしれないけど、10年後まで残る」云々とおっしゃってますが、実際、そうなる場合が多いですよね？

石川　いや、それは判っていますよ。最初に『パト１』（『機動警察パトレイバー the Movie』）（89）の絵コンテを見たとき、本当に凄いと思ったし、これが出来たら金字塔になると思ったから。

　もうひとつはそのとき、押井さんという「人間」が面白いと思ったんだよね。監督のキャラクターを含めて面白かったし、押井さんの言葉で役に立つことも多かった。そういうことを積み重ねて、この業界でやっていくのも悪くないかなと思ったというのは確かにある。

　多分、押井さんと出会っていなければ、僕もこの業界で続いてなかったと思うし、続けてもいなかったと思う。おそらく１年くらいで（スタジオを）閉めちゃったんじゃないかな。

高橋　世の中の人の多くは、やはりＩ．Ｇといえば最初に押井さんをイメージしちゃうんじゃないんですかね？

石川　それはあるかもしれない。今でも監督としてはちゃんと尊敬しているけれど、最近は、自分の才能にあぐらをかいているというか、言っていることとやっていることが違うんじゃないかなーって。

押井　なんだよ、それ。はっきり具体的に言えよ。オレがいつあぐらをかいて、いつどんなデタラメを言ったのか、言ってみろよ。

石川　いやあ……どうかなあ……。





プロデューサーは監督に、どう対抗していくのか？





高橋　で（笑）、話を戻すと、僕は、今日、プロデューサーと監督の関係について考えたいなあと思って来たんです。監督っていうのは作品を「人質」にとっているわけで、プロデューサーもスタジオそのものをもある種の「恐怖政治」によって支配することができる。そういうのに対して、プロデューサーといわれる人は、どう対抗するのか。いい関係を作っていくのか、というところに非常に興味があります。

　たとえば細田守という監督の話をすると、彼は齋藤優一郎というプロデューサーと組んでいるんだけど、力関係でいうと齋藤くんは常に細田監督に対して弱い立場なわけですよ。現状のスタジオ地図は細田監督の作品を作るための場だから、当然ではあるんだけど、でも、このままだと地図は窮屈な場所になってしまうと思うし、齋藤君も疲弊してくると思う。

　だからこそ、若い監督を育てて、新しいタイプの作品も作っていく、そういうことが地図を風通しのいい場所にすることにつながるし、結果的には細田監督のためでもあると思う。

　押井さんからも、昔「第２ジブリを作って若い奴の作品をやれ」、と言われたことがあります。おそらく通じる話だと思います。

押井　そうだったかも。

高橋　鈴木さんもプロデューサーとして監督とどういう距離感を保つか、ということは考えてきたんだと思うんです。振り返ると、ジブリの場合は、高畑さんと宮崎さんのふたりの監督を擁していたことは非常に大きかったと。

　この間、鈴木さんに「『天空の城ラピュタ』（86）をやったとき、なぜそのままジブリに行かず、『魔女の宅急便』（89）に至るまで、（『アニメージュ』の）編集長とプロデューサー業の二足の草鞋を履き続けたんですか？」って聞いたんです。その答えは「簡単に言えば、そのほうが便利だったから。自分が雑誌の編集長をやっているということで、宮崎さんが尊重してくれて、ベタベタした関係にならずにすんだ」というようなことを言ってましたね。

押井　そういう鈴木敏夫は私も見ていて、プロデューサーか編集者、どっちかはっきりすればと言ったこともある。結局、ジブリのほうに収まったけれど、実際のところ、トシちゃんが関わった監督は宮さんと高畑さんのふたりだけなんだよ。

　宮さんは、トシちゃんが高畑さんにも撮らせていることを、凄く嫌がっていた時期があったの。宮さんが稼いで、高畑さんが使い倒すという関係が続いていたからだよね。宮さんは、（高畑さんには）もう撮らせるなって言っていたのに、トシちゃんは頑として譲らず、撮らせ続けたわけだ。

　その理由はもちろん、選択肢として必要だったから。高畑さんがいなくなったら、宮さんとトシちゃんの関係はどうなるのか？　どっちがヘゲモニー（主導権）を握るのかという話になる。

　実際、高畑さんが亡くなってからは、トシちゃんも宮さんをコントロール出来てないと思うよ。いまの宮さんが言うことを聞くのは、多分奥さんだけ。いまだに奥さんのことだけは怖いから（笑）。

高橋　判ります（笑）。

　で、今回、僕がお伺いしたいのは石川さんのプロデュース術なんですよ。おそらく鈴木さんとは違うかたちで押井さんをはじめとした監督との関係性を築いているんだろうと思っているので。

石川　今回のこの鼎談がひとつの答えになるかもしれない。最初は押井さんとの対談というオファーだったんだけど、絶対にひとり入れたほうがいいと、僕は思ったんですよ。そのほうが押井さんにもちゃんと話が伝わるし、活字にしたときも判りやすいし面白いだろうって。じゃあ、誰がいいのかとなると、やっぱりみんなを知っている上にプロデューサーでもある高橋くんしかいなくて。さっきの齋藤さんの話じゃないけど、３人必要なんですよ。

高橋　僕が聞いた話によると、石川さんは押井さんとあまり喋らないし、たまにしか会わない。お金の話は年に一度と決めていて、押井さんとコミュニケーションをとるときは人を上手く使う……今回のように（笑）。自分が直接やるときは、ここぞというときだけ、とか、いろいろ耳に入っている。石川さんのプロデュース術というのは、鈴木さんとは違うかたちで、押井さんとの関係性を上手に作っているのかな？　なんて思っているんですが。

石川　喋らないのは確かだね。なぜって、押井さんとは別に話す必要がないから。押井さんはワンちゃんみたいなものなんですよ。困ったことがあれば尻尾を振ってやって来て、上手くいっていればまったくこっちに来ない、絶対に。問題は、押井さんは尻尾を振るのが実にうまいってことなの。

押井　それは順序が違います。オレが石川と話すときは第三者を立てるようにしたんだよ！　そうしないと、「オレ、そんなこと言った？」「覚えてないなー」になっちゃうじゃん。だから今回、こうやって高橋くんがいるのは大正解なんだよ。

高橋　なるほど（笑）。

押井　高橋くんがいうことは正しいんだよ。監督もプロデューサーも選択肢をもつことがすべてなの。どうやってヘゲモニーを握るのか？　選択肢のない人間は永遠にヘゲモニーを握れないから。それは戦争でも政治家でも、みんな同じ。選択肢をもつことでしかヘゲモニーは獲得できない。

　じゃあ、なぜサシで付き合うことが悪いかと言えば、白黒つけざるを得なくなるから。それを繰り返していれば、いつか必ず破綻する。

石川　そう思います。

押井　オレ、基本的には石川と付き合いたいと思っているから。

高橋　おー。

押井　なぜかと言えば、一応、信用しているから。逃げたことないし。世の中には逃げるプロデューサーは山のようにいる。でも、石川は逃げない、絶対。しかも、責任もちゃんと取る。さらに、仕事に入ったら一切文句は言わない。

──押井さん、昔こうおっしゃってましたよ。「石川に流れ着くまで、相棒を選ぶ根拠を持ってなかった」って。

石川　たぶん、僕はこういうことだと思っているんですよ。

　信頼とは何かといえば、「出来ないことを出来るとは言わないこと」。僕はそう思っている。

　これをみんな間違えていて、押井さんのファンだったり、気に入られたい人は、その場でつくろっちゃうんだよね。押井さん、そういうの見抜くから。

　僕は、自分の力だけで出来ないと判ることに関しては、簡単にＯＫは出さない。だから、はぐらかす。でも、そこに誰か、第三者を入れることで動き出すこともある。そういう配置のようなことは、いつも考えているよね。

高橋　ということは石川さんは、押井さんがやりたいと言った企画でも、断る場合もあるわけですね？

押井　あるどころか、石川はほとんど断っているよ。私が企画を持って行って、石川が「やりましょう！」と言ったのは、『立喰師列伝』（06）だけ。それも何年もかけてやっと出したＯＫだからね！

──『ガルム・ウォーズ』（16）は違うんですか？

押井　あれは違う。『ガルム』に関しては大人の事情ばかりで、今回の趣旨じゃないから割愛するけど、監督がプロデューサーに望むのは、さっき言った３項目だけ。「逃げない、責任を取る、（制作に入ったら）一切口出しをしない」。石川はそれが出来ている、極めて稀有なプロデューサーです。

　石川とは仕事ありきで付き合っていて、もし個人と個人だったら、多分、長続きはしないと思う。性格も違えば生き方も違う。似ているところがあるとすれば、金とか名誉とかいうこと以前に、モチベーションを大切にしているところだけ。

石川　そうだよね。

押井　もし石川が金の亡者だったら、とっくに別れているよ。

　石川がビルの一室でこの仕事を始めたときから知っているんだから、金儲けよりも人間や才能を大切にしたいと考えていることは判っている。

　だから、信用しているんです！

　悔しいけれど、結局はいつも石川のところに戻っている。残念ながらそれは認めざるを得ない。今でもやっぱりＩ．Ｇが自分のホームグラウンドだと思っているし。どこがどうのとは言えないけど、精神的に仕事がしやすい。あとは、ちゃんと意見してくれる人がいるということも大きい。言うことすべてが通っていたらモチベーションもなくなるよ。外に出ると、そんな人とはなかなか巡り合えないからさ。

　社会的にでかいことをしたいとか、自分の自我を拡張したいタイプのプロデューサーはたくさんいるなかで、本当に貴重な人材です。

──敏夫さんはそっちのタイプですか？

押井　それに近い。大衆動員主義者だから。何度も言っているけど、毛沢東やスターリンと同じ。大衆動員することで高揚感を得ているだけなんだから。

高橋　鈴木さんは上司、『アニメージュ』だったら尾形（英夫）初代編集長とか、ジブリだったら徳間（康快）社長とかに最終的な責任は押し付けて、その下でできるだけ自由にやりたいことを実現するというタイプでしたね。要するに編集者的立場が得意な人なんですよ。そういう人から見ると、石川さんのように、全責任を背負いつつ、会社を立ち上げ切り盛りしている人は特別。尊敬の念を持っていたと思いますよ。

──石川さんとは対極なんですね。

押井　うん、それに石川、金使わないし。うどんしか食ってないんだもん。

高橋　（笑）。

石川　おっしゃる通り、僕はケチなんですよ。でも、ケチな自分は好きなの（笑）。タクシーを使ってもいいだろうって思うんだけど、やっぱりその金があれば動画一枚買えちゃうじゃん、って今でも考えてしまう（笑）。だから結局は乗らずに電車を使うんだよね。

押井　（笑）。

高橋　凄い！

石川　でも、セコくはないと思っている。ケチとセコいのって違うよね？

押井　それは私も判っている。いつもケチ呼ばわりしているけど、多分１０００回ぐらい言っていると思うけど、セコいと思ったことは一度もない。なぜなら、石川は使うときにはちゃんと使うから。そういうところでは絶対にケチらない。そこも信用している要素のひとつ。これまで何人ものプロデューサーと付き合ったけど、最初からずーっと付き合っているのは石川だけだという理由は、そこにもある。

高橋　やっぱりおふたりの関係性って特殊ですよね。べったりでもない、どういう距離感を保てばいいのかということに腐心している。

　さっき、押井さんに儲けさせてもらった記憶がないと言いつつ、押井さんとは仕事を続けている。石川さんはやっぱり、押井さんのことを何とかしたいと思っているのか？　そういうところもお尋ねしたいですよね。

石川　（そういう気持ちが）ないか、あるのかで言ったら、悔しいけどあるんですよ。悔しいけど、ある（笑）。

　経営者としてはいかがなものかと思ってはいるんですけどね。

押井　何言ってるの！　私は石川に頼りっきりなんかじゃないよ！

石川　まあ、それはそうなんだけどさ。

押井　それはずるいと思うよ、石川。『スカイ・クロラ』からこっち、Ｉ．Ｇで仕事してないじゃない。その間、「いい加減、仕事させろよ」と言っても、「あんた、自分で食えてるじゃん」って。「どこかで食いぶち拾ってこい」と言われてるんですよ、私は。

　それって、まさにイヌなわけだ。飼い犬でもなければ、ノラでもない。イヌだからといって繋がれるつもりも毛頭ない。たださ、イヌにだって一宿一飯の義理はあるってこと。

高橋　この鼎談のタイトル、「イヌにだって一宿一飯の義理はある」がいいんじゃないですか？（笑）　この言葉がふたりの関係性をよく表している。

　押井さんもほかのところで作品を作ったり、石川さんも、すでにＩ．Ｇはとても大きくなったから、押井さんと組む必要もない。それでも離れないって、やっぱり押井さんにそういう魅力を感じているってことなんですか？　もちろん、押井さんにそういう人間的な魅力があることは判っていますが、仕事の面ではどう考えていらっしゃるんだろうって。

石川　多分、押井さんって、そこまで疲れてないと思っているのね。監督として消耗してないというか、たとえ70歳になってもまだまだ余力はあるというか。見ようによっては『スカイ・クロラ』以降、充電していると取れないこともない。いろんなことをやって忙しくはしているんだけど、確かに本当の映画は撮っていない。そういうところに、賭けてみたいという気持ちはあると思うんだよね。

押井　石川って（Ｉ．Ｇが）転機にあるときとか、ヤバそうなときとかに私を呼ぶ傾向にあるんですよ。そういうときは、博打をうてる人間じゃないとダメだから。私に博打体質があるかといえば、多分ある。

　寺山修司が言っていたけど、博打にハマるやつというのは、負ける予感に震えるんだって。これが病みつきになるんだというんだよね。彼が競馬評論家をやっていたときの言葉なんだけど、それは正しいと思っている。勝ったときの美酒に味をしめるわけではないということですよ。少なくとも私は、負ける予感に震えるんだ。

　でも、石川は博打をうちはするが負ける博打はやりたくないタイプだと思ってるけどね。

石川　『イノセンス』（04）は大きな転機になった。会社を脱皮させるという面で。今までの構造から脱皮するきっかけになった作品が『イノセンス』だったので、Ｉ．Ｇの歴史を語る上ではとても重要な作品。この作品があったからこそ、いまのＩ．Ｇはあるという感じかなあ。

──石川さんと押井さん、何か新しい企画を練っているんですか？

石川　それは言えないね（笑）。

押井　言えるわけがない（笑）。

石川　押井さんの気持ちが変わらなければ実現すると思うよ。

押井　石川はこの10年間、「あんたの賞味期限は切れかけている」ってずーっと言い続けてるからね。

高橋　（笑）

押井　でも、私に言わせれば、監督の賞味期限なんてのは当の本人が決めることなんだよ。新藤兼人みたいに車いすに乗ってまでやろうとは思わないけど、体がいうことをきく間はやりたいと思っているだけ。

　まあ、どっちにしろ、オーダーが来なくなったらやめなきゃいけないんだよ、監督という仕事は。いまもオーダーが来たらやっているだけで、自分の企画でやった最後の作品は『立喰師』だからね。何か企画を出してくれと言われて出したことはあるけど、自分の企画としてはそれが最後だよ。

──じゃあ、そのおふたりが抱えているっぽい企画は？

石川　だから、言えません。押井さん次第なんだから。

高橋　ところで、今更だけど、どうしてこの鼎談をやることになったんですか？

押井　そこはひと言いっておきたいことなんだよ。最近、ジブリは態度が悪いの！

高橋　それを僕に言われても……。

──最初は、私が断捨離しているときに発見した、宮崎さんと押井さんの対談を使う予定だったんです。『パト２』（『機動警察パトレイバー ２ the Movie』）（93）のとき、『アニメージュ』でやったおふたりの対談のテープ起こしが出てきて、めちゃくちゃ面白かったので、それをこの増補版の対談にしようと思ったんです。『アニメージュ』の編集部に尋ねたら、おふたりがＯＫなら大丈夫だと言うのでジブリに打診したところ、ダメだと言われたんです。押井さんはその４万字にも及ぶテープ起こしの校正までしてくださったんですけどね。

押井　私のほうからもお願いしたんだよ。そのまえに、宮さんと私の対談を再録したいというオファーがジブリのほうから来て、私は快くＯＫを出したのに、だよ。そりゃあどういう了見なんだってなるじゃない？

高橋　まあ、そうですかね。

──いや、押井さん、それは既存の本をデジタル化したいというオファーだったんですよ。あとは、あまりに昔の対談過ぎると言うのも問題だったようですけどね。

押井　言うに事欠いて、昔の言葉には責任がもてないって言ってるんだよ。何年監督やってんだよ、って言いたくなるじゃん。そんなのモノを作っている人間の言葉じゃないよ。私は自分の言ったことには責任を取る。

石川　僕も取ります……っていうか、そこから始まったんだ。知らなかったよ（笑）。





押井守→鈴木敏夫



拝啓 鈴木敏夫さま





　ご無沙汰してます。

　最後にお会いしたときには、脊椎の軟骨が磨り減ってもはや痕跡すら存在しない、立つも座るも塗炭の苦しみ、車の運転も二〇分が限度という悲惨なお話を伺いましたが、その後の腰の調子は如何でしょうか。それもこれも積年の猫背ガニ股不摂生の当然の結果であり、因果は巡る水車なのでしょうが、他山の石以て玉を攻む（たざんのいしもってたまをおさむ、と読みます）日々筋トレとストレッチに励みながら他人事として心配しております。

　さて今回は往復書簡という形式ですが、いまどき往復書簡とは珍しいと近場の若者たちに訊いてみたら案の定というかやっぱりというか、そんなもの読んだことも聞いたこともないという予想通りの反応で、かつて著名な作家やら文学者やらの往復書簡が誌面を賑わしていた時代を知る身には寂しい限りであり、手っ取り早く結論のみを知りたがる昨今の風潮からすれば週いち月いちの書簡の往復など迂遠な形式に過ぎぬということなのでしょうが、さいわいにも今回はオチがついたところで単行本に収録ということなので短気な当今の読者にも優しい企画になっております。まあ、それはそれで何のための往復書簡なのだと言えなくもないのですが、コロナ蔓延の御時世に口角泡を飛ばして面談するもならず、オンライン対談など真っ平御免のデジタル不適合オヤジ同士とあっては是非もありません。まずは執筆の労を取っていただけたことに感謝致しますが、かれこれ四〇年になろうかというカンケイにも拘らず真面まともな書簡ひとつ交わしたことがないという不面目を思えば、この程度の労は惜しむというほどのこともなく、どうせ口伝えのゴースト本を乱発してるんだからたまには自分で書いても罰はあたらない筈だとも思っております。

　さて敏トシちゃん──といきなりの「ちゃん」づけで恐縮ですが、年下の身も省みず長年に渡ってトシちゃん呼ばわりしてきたのは、部下でも手下でもないのに鈴木さん敏夫さんと呼ぶのが不愉快であるばかりでなく、真摯な議論を交わす対手たいしゅには年齢も序列もカンケイないと自ら期するところがあったからです。思えば映画から世事、業界スキャンダルの真偽に至るまでなんでもかんでも喋り倒し、最後は激論となって怒声罵声の応酬に及ぶことも屢々しばしばでしたが、激昂して恫喝紛いというより恫喝そのものを口にするときも手前ぇ貴様呼ばわりが出なかったのは、私らのカンケイが単なる友人でなく、いい加減なオヤジつきあいでもなかったからでしょう。そういえば初対面の時から私を「押井さん」と呼び続けているのは編集者の習い性なのか世代を異にする余裕なのか、時宜を失して訊かぬまま今日に至りますが、この際だから是非とも教えて戴きたいものです。まあ、押井クンなどと呼ばれれば、それはそれで不愉快でありオレはあんたの生徒じゃねえぞということになるやもしれず、なかなかに難しいことではあります。ちなみに私を押井クンと呼びつづけたのは死んだ師匠だけでした。

　と言うところでようやく本題に入りますが、この本の趣旨がスタジオジブリに対する悪口雑言にないという事情に関しては「まえがき」を読んで戴くとして、今回の増補版の「増補」「追加」「オマケ」の真打ちとして敏ちゃんに登場を願ったのは他でもありません。鈴木敏夫というプロデューサーを語ることを抜きにして「ジブリという現象」を語ることはできない、とそう確信しているからです。宮さんの得意技であり、私もまたよくするところの「確信的推論おもいこみ」ではありません。正真正銘の確信であり、本来ならこのジブリ本も「鈴木敏夫論」もしくは「鈴木敏夫読本」「鈴木敏夫悪人伝」であるべきだとすら思っていたのですが、それでは編集者も出版元も納得しませんし、何より読者に資するところがあまりといえばなさ過ぎると思われたので、このような体裁となった次第なのであり、「増補」「追加」「オマケ」としてならばそれが許されるであろうし読者もまた得心するであろうと考えたのです。がしかし、考えはしたものの敏ちゃんという一筋縄ではいかない極悪人がその生涯を賭けた野望を簡単にゲロする筈もなく、先にあげた膨大なゴースト本の類いを読んでも（無駄と知りつつ少しは読んだのです）明々白々あからさまな嘘こそ書かれてはいないけれども都合の悪いことには敢えて触れないという高度な情報操作によってことの真相が隠蔽されていることは事情を知る者にとって既知あたりまえであるに過ぎません。対談という形式では例によってのらりくらりと言い抜けていつもの馬鹿話に終始するに違いない──コロナ禍という事情は嘘ではありませんが、ただでさえ「口から生まれた桃太郎侍」の敏ちゃん相手に敵の牙城でアウェイの闘いに臨んでも勝ち目は薄い、それどころか敏ちゃんのアジトに蟠踞（ばんきょ、と読みます）しているに違いない変異型のバイ菌に侵される危険すらあると、賢明にもそう判断してかくなる手段に及んだのです。発語された言葉パロールは人をして情動に走らせますが、記述された言葉ラングには言い抜けのできないロゴスが宿るものです。いまにして思えば企画書、それも虚偽でたらめと策謀いかさまに満ちた不実ペテンなテキスト以外に、およそ敏ちゃんの文章というものを読んだ記憶がないという事実は真に驚くべきことです。それもまた言葉という魔術の可能性と限界を知る、世間知と処世訓のカタマリともいうべき現世的悪魔人間アクマニンゲンの悪辣きわまる戦術だったに違いありません。

　そんなイカサマはこのわたしが許しまっしぇん。

　「やっぱヤメたわ、オレ忙しいし」などと言い逃れしようものなら、業界の人間が忖度して語らなかったあんなこともこんなこともみんなまとめて私が書いちゃうから覚悟しろ。

　謹申つつしんでもうす

押井守





　ということで、敏ちゃんが初めて自らの手で書き記すであろう「スタジオジブリの真実」の楽しいお便りをお待ち申し上げまあす。





鈴木敏夫→押井守



　いろんな質問に答える前に、まずは冥福を祈りたい。押井さんも共に旅をした、あの亀ちゃん＊１が死んだ。ぼくにしても何も知らなかったが、この４月の頭から入院しており、余命３か月と言われていて、結局１か月しかもたなかった。病気はガン。詳しくはわからないが、肺から膵臓に転移したらしい。亡くなったのは５月１日。享年73歳。合掌。

　押井さんだって他人事じゃない。ぼくにしても。同じ世代だし。いまのうちに、身の回りの整理を始めることを勧めたい。

　さて、ユーラシア大陸の西の果て、アイルランドとアラン島を訪ねた旅、むろん、憶えているよね。訪ねる前に、みんなで、アラン島のドキュメンタリービデオを見た日が懐かしい。場所は宮さんの事務所、阿佐ヶ谷だったか吉祥寺だったか？　あのビデオは、確か、押井さんが用意したものだった。

　アラン島は岩だらけで木も土もない。仕方ないので、海の水が運ぶ砂を集めて畑を作りそこでジャガイモを作る。それが過酷に見えて、そのシーンがアタマにこびりついている。

　メンバーは、宮さんに押井さん、そして、亀ちゃんに古林＊２とぼくだっけ？

　そして、同じメンバーで２週間の旅に出た。通訳は、いつもお世話になっているロンドン在住の○○さんだった。時期は６月、この季節、ガイドの女性に聞いたら、一か月丸々、雨が続くと。そして、こんな諺もあると聞いた。１週間に雨が10日降ると。ところが、到着した日はともかく、その後は、ずっと雨が降らず、帰国の一日前だけ雨が降った。何故、降らなかったのか？

　そして到着の夜に食べた、この世のものとは思えないくらい不味かったすき焼き。ダブリンに着いて早々、何故そんなものを食べる羽目に陥ったのか？　かすかに憶えているのは、そのガイドさんが、美味しいですよと勧めたこと。で、店に向かうと、これが空港から遙か遠かった。やっとこさ、到着して直ぐに分かったが、なんと、その店は彼女の経営する店だった。むろん、他に客はいなかった。

　様々な謎を思い出すけど、このまま行くとダブリンだけで話は終わってしまう。それは別の機会に譲るとして、一気に、アラン島へ。

　押井さんが、映画に登場する同じショットを探してウロウロしていた。作品名を言っていた気がするが、忘れた。その事は良く憶えている。でも、崖だけは怖がっていたね。腹這いになって、おそるおそる下を見下ろす場所まで匍匐前進。聞けば、高所恐怖症だと威張る始末。他のメンバーは立ったまま、崖下を覗く場所まで歩いていくのに。

　宮さんとぼくのふたりが意地悪く押井さんの事を揶揄ったことも記憶にある。そこは絶景、本当に素晴らしい風景が目前にあるのに、結局、押井さんはそれを見ようとしなかった。この時、確信したね。押井さんは観念の人だと。

　で、アラン島を後にして、というのも、その島は無、何も無い。このまま居続けたら、社会復帰出来ないと宮さんが言い出し、３日後、ぼくは泣く泣く島を後にした。ぼくなど、今だから言うけど、すっかりリラックスして、このままこの島で暮らしたい気分だった。

　で、アレは何処だっけ？　ホテルが見つからなくて、仕方なく、みんなで連れ込み宿に宿泊することになり、亀ちゃんが突如、肥って肉付きの良かった押井さんの事を怪しげな赤い照明のダブルベッドに押し倒し、押井さんの胸のあたりを弄り始め、やめろと叫んで抵抗する押井さんを無視して、「我慢していれば気持ち良くなるよ」と説得していたのは？

　呆れた宮さんが「もうやめなよ」と亀ちゃんを諭していた事も憶えている。それにこれは認めるけど、当時の押井さんは可愛かった。今とは別人。笑うと目が無くなって、人なつっこい童顔の青年だった。

　ともあれ、楽しかったよねえ。それに、みんな、若かった。だから、こんな馬鹿も出来た。

　とここまで書いて思い出した。そういえば、ぼくは押井さんに感謝しなければならない、忘れていた大事な話がある。どうしてそうなったのか、今となっては不明だが、夜の食事の時に酒が出た。見た目はオレンジ、美味しそうに見えたぼくは、一口でこれを飲み干した。後で聞くとそれはウオッカだったらしく、誰が飲んでも酔っぱらう。で、フォークとナイフを持って、肉を食おうとしたが、フォークにもナイフにも力が入らなくて、途中で皿の上に落としてしまう。

　そんなぼくを、宮さんはじめみんなは笑って見ていたけど、見かねた押井さんが部屋までぼくをおんぶして運んでくれた。いつの日か、きちんとお礼をすべきと思っていたが、この機会に、礼を述べたい。ありがとう〜。

　ちなみに、フォークもナイフも落としてしまったぼくの料理に手を伸ばしてきたのは、冒頭に書いた亀ちゃんだった。「食べないなら、ぼくが。もったいないし」。酩酊していても、頭だけは、はっきりしている。ぼくには貴重な体験だった。

　ともあれ、かれこれ30年前くらい前の話。別の旅と話がこんがらがっているかもしれない。けど、まあまあ。以前、アランについてのみ別の本に書いた事もある。

　ついでだから、話してしまうと、ぼくは本を出す時、こう決めている。

　自分で刊行したいと思ったモノは、全て自分で書く。そうじゃないとき、つまり、要望があってそれに答えるとき、ジブリの話が多いのだけど、誰かに聞き書きして貰う。

　押井さん、そういうわけで、ぼくが自分で書いた本も数冊あるのだよ。それも送ってあるのだけど…。

　さて、質問への返事を書く。

　押井さんはぼくのことを敏ちゃんと呼ぶが、ぼくが押井さんと〝さん付け〟で呼び続ける理由は、ふたりの間に距離が欲しいから。共同事業者になって、ひとつの仕事をする時は、馴れ合ったらおしまい。その関係をどうやって作り出すのかと言えば、第一に、日頃の接し方が大事になる。一緒に仕事をする時は、その他人行儀が役に立つ。

　今回は、図らずもアイルランドとアランの話になってしまった。他の質問への回答はまたの機会に。

押井守→鈴木敏夫



トシちゃんへ





　亀さんのことは高橋望モークン＊１からのメールで知りました。今年に入って知人の訃報を聞くのは大塚さんと○○につづいて三件目です。あの人はどうしているかしらと疎遠になった知人の消息を知るのは訃報ばかりで、歳を重ねて生き続けることはそういうことなのだと思いつつ、聞けば敏ちゃんが「人生は生き残ったやつの勝ちだ」と言ったとか言わないとか、その見解に関しては全然同意ですが、敏ちゃんの訃報だけはまだ聞きたくないと思うそのわけは、あんたが死んだら世の中が少しだけ寂しくなる──もう少し見ていたい他人だからです。

　というところで早速のお返事ありがとう。記憶違いなのか記憶の捏造かはお互いさまだから問わないけれど、アラン島珍道中の面子はスポンサーの宮さんと敏ちゃん亀さん私の四人で、古林はいませんでした。ロンドン郊外高級連れ込み宿での亀さん御乱行はともかく、「敏ちゃん急性アルコール中毒事件」のいきさつを当人が仔細に覚えていたのは天晴アッパレと褒めてあげましょう。意識不明となった敏ちゃんをホテルの部屋まで担いで運び、パンイチにして寝かせてあげたのは確かにこの私です。ウェールズの古都に響き渡る敏ちゃんの壮烈なゲップに辟易しながら歩いた夜道の記憶はいまも忘れ難く、日本人の恥だという宮さんの冷酷な御宣託とともに墓まで担いでいくべき黒歴史でしょう。若かったといえばそれまでですが「アラン島幽霊出没事件」やら「宮さん爆睡トトロ事件」やら思い出せば枚挙に暇なく、まさに本が一冊書けそうな旅行ではありましたが、最も印象に残っているのはアラン島の荒涼とした風景を前に敏ちゃんが洩らした「日本に帰りたくない」の一言でした。噫ああ稀代の仕事人間にしてこの一語あり、陰謀に日々奔走する権謀術数主義者マキャベリストにして人生を憶わしむるかアランの古跡……感動すること頻りでしたが、これも異国の旅の為せる感傷かんちがいなあに帰国すれば直ちに本性を露見するさと思ったらその通りで確かに人生は映画のようにはいかないと今更ながら思い知った次第。ことのついでにもうひとつ、旅は道連れとは言いながらオッサン四人の海外旅行でもっとも問題となるのがホテルの相部屋問題であり、旅の当初こそカントクと編集者がそれぞれペアを組んで宿泊したものの、夜ごとの亀さんの襲撃に音を上げた敏ちゃんの提案で相方を変更したことは覚えているでしょうか。宮さんの無尽蔵の蘊蓄うんちくと豪快な鼾いびきに辟易していた私がこの提案にのったのが大間違いで、その結果としてアラン島での「亀さん襲撃事件」を招いたのはとんだ見込み違いでしたが、さらに相方を変更して敏ちゃんと相部屋となり、その醜悪なブリーフ姿や毎朝のトイレ篭城癖にはうんざりしたものの、夜ごと映画を語り尽くせたことは、いまにして思えば貴重な経験ではありました。亀さんが宮さんを襲撃したかどうかは知らないし知りたくもないけど。

　敏ちゃん、映画を語り明かしたウェールズの夜を覚えているかい（ここはＪ・ボールドウィン調です）。あれほどの情熱がいまもあるかどうか、立場を異にするとはいえ互いに映画に半生かけて拘り続けたことでいまや映画への思いは語り尽くせるほど単純なものではあり得ないにせよ、こと映画について語ること映画を語ることについて語ることに関して言うなら、敏ちゃんほど語るに値した相方は他にいなかったし今もいないことは紛れもない事実であり、あんたが死んだら世の中少しだけ寂しくなると書いたのはそういう意味でもあるのだよ。

　というところで、敏ちゃんの回想に乗せられて思わず筆が滑ってしまったが本題を忘れたわけでは毛頭ない。敏ちゃんの映画人生の、いや映画も何もすべてをひっくるめた編集者人生の総括を、わけてもその集大成ともいうべきスタジオジブリの鈴木敏夫的な鈴木敏夫による鈴木敏夫視線の総括というやつを是が非でも聞かせて貰いたい。適当にはぐらかして事無きを得ようと思ってるんだろう、どうせ。歌舞伎の台詞でもあるまいし、さあさあさあと繰り上げたところで本音を吐くとも思えないけど、残った人生もあと僅かではあることだし、このまま棺桶に持ち込んでも悔いが残るだけ。誰もが敏ちゃんに聞きたがっている「ジブリの真実」ってやつを、ここらでその片鱗なりと書き残してみてはいかがなものかと、他ならぬこの私が、あのウェールズの映画の夜がそう言ってるんだよ（ここんとこ唐十郎調だから、判るよね）。

　まあ、こんな調子で詰め寄ったところで埒もなし、本当のところはとっくにお見通しなんだけど、これが面白いことに私が何を言おうが書こうが世間さまは一向に気に掛けない。世間ってのは知りたいこと聞きたいことしか興味がないんだってことも遺憾ながらお見通しってわけなんだけど、それでも言いたいことを言い、書きたいことを書かなきゃ気が済まないのは、あんただって同じ筈なのに、こと自分のことに関しては興味がないってふりをしつづけて生きてきたんだ、鈴木敏夫って人間は。

　ホントにそれでいいのか、敏ちゃん。

　みんな死んじゃった、みんなぐわんで死んでいくんだ。

　あんたもわたしも早晩そうやって死んでいくんだとしたら（その通りなんだけど）そろそろ潮時なんじゃないのかと、そうは思わないか。死ぬほど喋ってもいちばん肝心なことは語らないってのが鈴木敏夫の人生観なんだろうけど、少しだけちょっとだけでいいからさあ。

　私が言っても駄目なんだ、私が書いても無駄なんだ。

　敏ちゃんが自ら語り、語ったその言葉のあとでいかに振る舞い、どう生きていくか、それが見たいんだ。こんだけつきあった仲なんだから、軽口叩きながらホントのことを洩らしてきた間柄なんだから、いっぺんぐらいお願い聴いてくれてもええのと違うかい。

　ホントに関係者が忖度して言わなかったあれもこれも全部バラしちゃうぞ。

　説得したり懇願したり恫喝したりでうんざりしたことだろうけど、ここまで真剣に語り掛ける人間は私を措いて他にいないんだよ。

　というわけで、待たるる次号（あんたの得意のキャッチだ）。
