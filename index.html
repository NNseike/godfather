　アラン島の荒涼とした風景を前に、ぼくがふと洩らした言葉、「日本へ帰りたくない」。いや、感心した。押井さん、よく覚えていたね。

　あれは、ぼくの本心。あんなに居心地のいい場所は、その後、多少は世界を回ったけど、何処にもありゃしない。心からそう思った。何がいいって、無、無だよ。あの島の魅力は。この世のパラダイス。あの島にいたら、何もやる気が起きない。自堕落でいられる。究極の快楽がある。ただ、呆然と日がな一日過ごしているうちに、気がついたら死んでいる。そんな夢を見させてくれる島だった。

　あのとき、誰かとこんな話をしたこともおぼえている。自殺願望の人がいて、この島へやって来たのはいいけど、島に来て１時間もしないうちに自殺する気が失せてしまう。なんちゅ～か、人間の生きるエネルギーのすべてを奪い去って「無」にする島だったよね。その快感たるや、この世のモノじゃ無い。

　で、宮さんが何と言ったか、記憶にある？　アラン島に到着して２日目の夜だった。

「明日、この島を離れよう！　ここに留まったら、社会復帰出来ない！」

　え、何故？　そりゃあ無いぜ、来たばかりなのに。それに、いいじゃん、たとえ社会復帰できなくても。いや、もう少しだけでいい、この気分に浸っていたい。そう思って、宮さんの横顔を見ると、それまで見たことの無い怖い顔をしていた。

　そのとき、心底、思った。ああ、ぼくとこの人は決定的に違う人種なんだ、と。微妙なんだけどね。誰しも人は両面がある。前向きと後ろ向き。その伝でいうなら、ぼくのほうが宮さんよりもほんの少しだけ負の要素が大きい。あるいは、種類が違うのか？

　でも、同時にこうも考えた。この人について行けば、もうひとつのこの世のパラダイスに出会えるかもしれないと。

　結局、２泊だか３泊して、ぼくらはアラン島を後にした。６人乗りの小さな飛行機で、窓から下の海を見ながら、ぼくは渡哲也を口ずさんでいた。





　何処で生きても 流れ者

　どうせさすらい ひとり身の

　明日は何処やら 風に聞け





　ぼくは、帰る場所を持たない渡哲也が好きだった。





　ふと訪れたこの島にそのままいついていたら、いったい何が起きたのか？　そんな想像を巡らせる。すると、頭の中にドーパミンが発生して心地よくなる。しかし、そういう時って、実は役に立たない、本当にくだらない事を考える。今は日本語しか出来ないけど、しばらくこの島に暮らせば、そのうち英語を話し、そして、ケルトの言葉を話し、ぼくは日本人じゃなくなってしまうとか。

　虚構から現実を見る。それはこの上ない楽しいひと時だった。しかし、宮さんのひとことで夢は破れた。現実に引き戻された。そういう人なのだ。宮さんという人は。

　息子の吾朗がそんな宮さんとぼくを比較して、こんな事を言った事がある。

　鈴木さんは、居心地のいい部屋を作ってまず自分が楽しみ、そこへ友人たちを招いて、共に楽しむ。しかし、親父は違う。自分の居心地の良い空間を作ろうとはしない。他人に見せて、他人が徹底的に喜ぶ様を見て、ようやく自分も楽しむ。

　この指摘は、ふたりの違いを的確にいいあてている。

　宮さんに出会わなかったら、ぼくはどんな人生を送ったのだろうか？　いろんな媒体でぼくはこう語り続けた。ぼくの人生は受け身だと。これはカッコつけでも、何でもない。主体的に生きるのが面倒なのだ。

　宮さんという働き者に出会ったから、ぼくも少しは働いた。そうでなければ、何もやらなかった気がする。

　中里介山に「大菩薩峠」という大長編小説がある。ぼくは、その主人公机龍之介の地獄巡りの旅が大好きだ。受け身の生き方は、龍之介の必殺技、音無しの構えに学んだ。「大菩薩峠」を大好きな堀田善衛が命名した〝受け身の剣法〟に。堀田善衛は、主人公でありながら受け身という剣法は世界でも珍しいと書いていた。





　アラン島を後にして、ぼくらは英国の南端を目指した。英国の南端だったと思う。そして、ある町の小さなレストランで、ぼくらはお茶を飲んだ。お店は、おばさんが切り盛りしていた。その横で、おじさんがアコーディオンを上手に弾いていた。

　ぼくは片言の英語でおばさんと会話をした。そして、みんなで記念写真を撮った。ぼくは彼女の名前と住所を聞いた。

　そして、帰国後、その写真を彼女に送り文通が始まった。10年続いた。最後の便りの内容は今でもよく覚えている。今回は最期の便りだ。店を閉めることになったので、この文通も終わりにしようと書いてあった。

　いまさらだけど聞きたい。押井さんは、アラン島に留まりたいとは思わなかったの？　そして、もう一度、アランを訪ねた理由は何だったの？

　そして、もうひとつ。押井さんとは公開の場で何度も話した。誰か、それをまとめてくれないものか。通しで一度、読んでみたい。





鈴木 敏夫（すずき　としお）




１９４８年愛知県生まれ。株式会社スタジオジブリ代表取締役プロデューサー。慶應義塾大学卒業後、徳間書店に入社。『週刊アサヒ芸能』、『アニメージュ』編集長などを経て、スタジオジブリに移籍。映画プロデューサーとして、大ヒット作を手掛ける。著書に『風に吹かれて』、『ALL ABOUT TOSHIO SUZUKI』（永塚あき子編）など。





押井守→鈴木敏夫



トシちゃんへ





　ようやくにして本音の返信ありがとう。

　本音の片鱗でもいいからさあ、とは書いたけど。ほんとうに片鱗なんだね。

　今回もトボケて逃げちゃうんだろうと密かに確信していたので、ちょっとだけ感心しました。

　受動的な人生とはその通り。ホンモノの悪党ってのは人生を放棄してるものだし、だからこそ他人さまを利用することを屁とも思わないもんだからね。目先の利益や名声を追うようなケチなやつはさんざん見て来たけど、そういうのは小悪党って言うんだよ。トシちゃんが本質的に後ろ向きの人間だってのはその通りで、いまどき中里介山の「大菩薩峠」だの渡哲也の「東京流れ者」だの語ってること自体が、おそろしく反時代的で後ろ向きな生き方の証明なんだ。言っとくけど、そんな小説や映画を語れる人間なんて、あんたの周りには私を措いて他に存在しないんだからね。

　トシちゃんが好きなのはあのフレーズらしいけど、こんなのもあるんだよ。





　夢はいらない 花ならば

　花は散ろうし 夢も散る

　どうせ散るなら 男花





　私が映画を撮るたびにトシちゃんの出番を作って手間暇かけて殺してあげてるのは何のためだと思う？　こないだの女子高校生ものでは撮影に余裕がなかったから殺さなかったけど、色っぽい女優さんの御御足おみあしたっぷり拝ませてあげたのを忘れちゃいないよね。それにしても、宮さんという大魔王に出会ってしまったのが運の尽きだったけど、それもまた人生です。トシちゃん以外に語り合う人間もいないんだし、腐れ縁だと思って最後までつきあってあげてください。でも、わたしを巻き込もうなんて思わぬように。けっこう苦労して逃亡に成功したんだから。

　というところで、なんとか最後に実のある往復書簡になったようで担当編集者も一安心したことでしょう。

　つきあってくれて、どうもありがとう。

　コロナが落ち着いたらまた何処かで会いましょう。

　最後に提案のあった対談集の件について。

　そんなに読みたいなら、編集者なんだからあんたが出しなさい。





あとがき





　『テレビブロス』の映画欄で初めてとりあげたスタジオジブリの作品が『崖の上のポニョ』でした。関係者のインタビューではあまりに普通。だったら宮崎さんとも縁のある押井さんに語ってもらおう！　ということになったのです。

　ところがというか、案の定というか、「ストーリーがない」「思いつき」「言い訳」……もう容赦ナシ。でも、その一方で「類いまれな想像力」「息を呑むような美しさ」。ちゃんといいところはいいと拍手を送るのです。

　そのとき押井さんは「ジブリに対する否定的な言葉はまず活字にならない」とおっしゃっていましたが、なぜか『ブロス』はＯＫ。むしろ、その正直な言葉の数々は大きな反響を呼び、以来、ジブリ作品が公開されるたびに押井さんに語っていただき、気がつけば『ブロス』の人気企画になっていたのです。

　簡単に言ってしまえば、本書はその「完全版」です。ブロスのその企画のファンから「全作品の押井解説を読みたい」という声が上がり、『風の谷のナウシカ』から『思い出のマーニー』まで、押井さんにとことん語っていただくことになりました。

　ボロクソのときもありますし、褒めるときもあります。ただ、不思議なことに、お話を聞いているうちに、「ジブリアニメをもう一度、観たくなる」という気持ちになってしまうのです。押井さんのお話を聞いたあとで観ると、まったく違うように見えるのではないかと思えるからです。ということはつまり、本書は「ジブリアニメのもうひとつの楽しみ方」にもなっているのかもしれません。これってちょっと、押井さんの意図したものではないのかもしれませんが、それだけ振り幅がある本だと解釈していただけると幸いです。

　それにしても押井さん、宮崎さんとケンカしすぎです。「もう、ずーっと会ってない」というわりにはケンカの回数が多すぎます。

　でも、ケンカするほど仲がいいのかもしれません。押井さんが宮崎さんの話をするときの楽しそうな顔を見ていて、そんなことを思ってしまいました。こんなこと言うと、また押井さんに「何言ってんの！　全然違うんだから！」って言われそうですが。

　さて、最後にこの本を一緒に作ってくださった方々にお礼を言わせてください。前作『友だちはいらない。』のときもがんばってくださった編集の櫻木さん。時間のないなか、表紙の絵を描いてくださった監督・アニメーターの湯浅政明さん。そして、もちろん押井さん。みなさんのおかげでこの本が出来上がりました。

　本当にありがとうございました。

        const chunkSize = 400;
        let textChunks = [];
        let currentPage = 0;

        const textDisplay = document.getElementById('text-display');
        const inputBox = document.getElementById('input-box');
        const pageInfo = document.getElementById('page-info');

        // 文章を約400文字ずつの配列に分割する
        function chunkText() {
            for (let i = 0; i < fullText.length; i += chunkSize) {
                textChunks.push(fullText.substring(i, i + chunkSize));
            }
        }

        // 指定されたページの文章を表示する
        function displayPage(pageNumber) {
            if (pageNumber >= 0 && pageNumber < textChunks.length) {
                textDisplay.textContent = textChunks[pageNumber];
                pageInfo.textContent = `${pageNumber + 1} / ${textChunks.length}`;
            }
        }

        // キーが押された時の処理
        document.addEventListener('keydown', (e) => {
            // Enterキーが押されたら次のページへ
            if (e.key === 'Enter') {
                e.preventDefault();
                if (currentPage < textChunks.length - 1) {
                    currentPage++;
                    displayPage(currentPage);
                }
                inputBox.value = '';
            }

            // Backspaceキーが押され、入力バーが空の時に前のページへ
            if (e.key === 'Backspace') {
                if (inputBox.value === '') {
                    if (currentPage > 0) {
                        currentPage--;
                        displayPage(currentPage);
                    }
                }
            }
        });

        // ページ読み込み時の初期化処理
        function init() {
            chunkText();
            displayPage(currentPage);
            inputBox.focus();
        }

        // 実行
        init();

    </script>
