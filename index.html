　その時に逃げたかったら、逃げればいいじゃん。逃げて、堕ちていけば、それは堕ちていく人だし。そんなに自分に十字架を背負わせて生きても仕方がない。もうちょっと気楽に生きようよっていう考え方が僕にはあって。

竹熊　庵野秀明と言う人を語る時、ポイントはやっぱりあの「逃げちゃダメだ」って言葉になるんじゃないかと思うんですよ。彼の根底をつきうごかしている衝動というか、ほとんど強迫観念に近いものがあって。

貞本　だから（マンガ版とアニメ版の）最大の違いは、そこだと思いますけれどもね。主人公の性格が違うというのは。

竹熊　実は『クイック・ジャパン』の二回目の庵野インタビュー（本書第一部）では、そのへんを追及したかったんですよ。その「逃げちゃダメだ」という言葉は、彼の個人史にも関わって来る問題じゃないかと。そうすると、案の定かつて逃げて失敗した経験とかが、いろいろ出て来ましてね。

貞本　僕の言ってることも、結果的には「逃げちゃダメだ」なわけですけどね。最終的にはそうなんだけど……。なんて言うんですかね。問題に直面する時の〝もがき方〟が違うって感じですかね。

大泉　ウチのかみさんがね、貞本さんのマンガがちゃんと終わるのが、何年かかるかって計算したら、六年かかるって。そのぐらい待つと。

貞本　待ってもらっちゃ、困る（笑）。





［父親と母親（１）]





竹熊　「逃げちゃダメだ」に関して、もう少し補足してみたいんですが。最後の二話が放映されて、ファンの間ですごい論争を巻き起こしましたよね。最近でこそ少なくなったけど、「庵野、逃げたな」みたいな声が巻き起こって。そういう感想をあちこちから聞いたんですよ。

摩砂雪　よく言われてましたよね。

竹熊　僕、放映中は『エヴァ』を見てなかったんです。番組が終了してからビデオで全部見たんですね。で、どういう逃げ方をしたのかなと思って、意地悪な期待半分で見たんですよ。そうしたら、ああ逃げてねえや、これはと（笑）。

貞本　本人からしてみたら直球だと思いますけれども。

竹熊　うん。本人にすれば逃げてないと思うんですよ。だから逆に、作品としてはあんなになっちゃったんじゃないかと。僕は、『エヴァ』というアニメは、庵野秀明という人間と合わせてひとつの「作品」だと思ったんですね。そう考えた時に、これは近来稀に見るすごい作品じゃないかと思って。

　そのへん皆さんはどう思われますか。最後の二話について、あるいは庵野さんの「逃げちゃダメだ」というキーワードについて、どう思われるのか。

鶴巻　もちろん最後の二話って、一番簡単な作り方は、全部設定をバラして、ストーリー的にちゃんと終わらせるのがいいんですよ。他のアニメーションもそうやってるわけじゃないですか。でも、それだけでいいのか？　謎を全部種明かしして、シンジがハイ幸せになりましたでいいんですかみたいな疑問があるんだと思うんです、庵野さんには。

　本当はもっと早い段階で、種明かしのネタを全部考えて、シナリオ書いちゃうのが一番楽なんですよ。でも庵野さんは、それでは楽らくしすぎだと思ったんでしょう。だからもっと粘ってみたいと思って、ああなったんだと思いますよ。

竹熊　それで、鶴巻さんはどう思われました？

鶴巻　あれはできないなと思いました。僕ならもっと楽な道を選びますよ。あれ出したら、もう自分の中で引き出しがなくなっちゃうでしょう？　僕なら、やっぱり次も作りたいと思うだろうから、じゃあ今回は最後の引き出しを開けずにおこうと思いますよ、絶対。でも庵野さんは最後の引き出しを開けちゃっているってことで、そこはやっぱりすごいと。

竹熊　すごいけれども、ではやって良かったのか、悪かったのか。

鶴巻　まあ、良かったんじゃないですか。あれがなかったら、「大した作品じゃなかった」とさえ言えると思いますよ。

佐藤　盛り上がったけれども、サクッと終わっちゃったという、よくあるアニメになって。

鶴巻　そう。たとえば半年たったら忘れられている作品って、いくらでもあるわけじゃないですか。

竹熊　その点『エヴァ』は、いまだに引っ張っているわけですからね。やっぱりあの最終二話があったからですかね。

鶴巻　そうだと思います。

貞本　実は最初の企画段階でも、最終話の構成案、あったんですよ。そこでのセリフって、７まんま『ナディア』でしたからね。セリフまで同じで。なんてセリフだったかな。

佐藤　「生きろ」とか。

貞本　そうそう、親父が「生きろ」とか言うんだ。そんな感じでした。

佐藤　最後に（父と子が）理解し合う瞬間が、もう別れる瞬間やったみたいな話で、トーンと世代交代をして、そのまんま流星になって終わりみたいな感じのようなことは、最初の最初にちょろっと言ってましたけど。私もそれ聞いて、『ナディア』でんなあ、みたいな（笑）。

鶴巻　最初の頃はけっこう、親子、父と子の葛藤を描くみたいなことを（庵野さんは）言ってましたよ。

貞本　たとえば８ミサトにも親父のトラウマがあるし……。

鶴巻　９リツコの場合も〝母親との葛藤〟になってるけど、最初のシナリオでは、たしか親父だったんですよね。だから庵野さんは〝父親と子供の葛藤〟っていうモチーフを延々と繰り返してるのに、（そう意図して）作っているにも関わらず、結局、全部ダメになっていく。テーマとして描き切れない。『ナディア』もそうだったんですけど。

摩砂雪　それでしまいにはもう、親父のことなんか、別に俺、描きたくないんだとか言い出して（笑）。親父なんか初めっからいらなかったって。

佐藤　最近のキーワードは、ゲンドウはいらなかったっていう。「ゲンドウいらない」って（笑）。

摩砂雪　親父がいつもネックになってるみたい。ストーリーの邪魔になって、どんどん脇道へ行ってしまうみたいな。





［父親と母親（２）]





竹熊　僕はそこ（父と子の葛藤というテーマ）に疑問がありましてね。というのは、親父っていうのは、目に見える障害というか、子供にとってのわかりやすい敵ですよね。だから非常にドラマが作りやすいところがあるんです。梶原一騎の作品が典型的ですけれども。ところが『エヴァ』を見ていると、あれだけ〝目に見える壁〟として描いているはずの父親（ゲンドウ）が、なんか希薄なんですよ。

　かわりにものすごく濃密なのが〝母親のイメージ〟ですね。だから庵野さんの中では母親の問題というのが、父親以上にあるのではないかという疑問があるんです。だって、受胎とか出産のイメージがあんなに続出するアニメなんて、ちょっと例がないでしょう。

貞本　男から見た女性のイメージですよね。

竹熊　もちろん男から見た女性です。具体的な母親というよりは、〝母性〟と言いますかね。ロジックの通用しない、わけのわからない存在。そこに子供が取り込まれてしまう。父親の場合はロジック＆暴力っていうか、わかりやすい権力で抑圧するけれども、母親は、ある種真綿で首をしめるような、善意による取り込み方をするでしょう。僕は『エヴァ』を見ていて、むしろそっちに対する恐怖感を感じたんです。

鶴巻　『エヴァ』の企画が立ち上がっている頃に、『セーラームーン』とか１０『ああっ、女神さま』とかが流行ってたんです。いわゆる母性的というか、男にとって都合のいい女性が母親的に接してくれるという話がバーッと流行ってて、庵野さんは、それが「気に入らん」みたいな話をしてたんですよ。

　だから、自分は父性的な話をやりたいんだと。（エヴァの元ネタになった）『愛と幻想のファシズム』って、かなり父権的な話じゃないですか。強権的な、ファシズム的な話なんで。『エヴァ』はむしろああいうふうにしたいという話をしてて、ゆえにゲンドウの存在は……みたいなセッティングをしたんだけど……。

竹熊　でも、そうはなってないでしょう。

鶴巻　そう。したにもかかわらず、ならなかった。

佐藤　主役を男にした段階で親父の存在が出て来たわけではなくて、過去のロボットアニメのポイントは親父だ（主人公の乗るロボットは必ず科学者である父が作るというお約束）といった、もっと単純な理由からポンと出て来てるんだと思いますね。

貞本　『トップをねらえ！』を、そのまま『エヴァ』にも生かしただけのキャラクター発注表だったんですよ、最初は。１１あのコーチの位置にいるわけですね、ゲンドウは。

鶴巻　だけど、どうやっても父性が欠如してしまうというのは、庵野さんのキーワードかなと思いますけれどもね。

佐藤　でも『トップ』の時からそうだったでしょう。あの作品にも親父コンプレックスみたいなのがあるんですけど……。

貞本　初めに（主人公の）親父が死んじゃってっていう。

鶴巻　それがコンプレックスになって、主人公の少女が宇宙を目指す。





［父親と母親（３）]





竹熊　どうも気になりますね。庵野さんのロングインタビューを二回やって、必ず自分の父親の話は出るでしょう。ところが母親の話は、一切出ませんね。

大泉　お母さんについては、一回も出ませんでしたね。

竹熊　出ませんでした。でも俺、庵野さんに怒られるかもしれないけど、母親の存在が何もないとはとても思えないんですよ。

鶴巻　そういえば、母親の話をされたことがないですね。

竹熊　全然、興味がないみたいな。でも、１２シンジ君がエヴァの中で溶けちゃったりするでしょう。あれは父性的な抑圧じゃないですよね。あきらかに子宮に取り込まれるようなイメージが『エヴァ』にはあって。

大泉　たとえば融合っていう言葉とか。

竹熊　僕自身は、思春期にすごい母親との確執があったんで、どうしてもそういう見方をしちゃうんですよね。僕が『エヴァ』とシンクロしたのは、そこなんです。だから絶対何かあるなと思ったんだけど。

貞本　僕も四六時中マンガを描いてると、だんだん辛くなって来て、その時に相談する相手っていうのは、やっぱり女性がいいじゃないですか。男なら、皆ね。だから辛い辛いとか言ってると、庵野さんが「お前、なんだかんだ言いながら、帰ったら、かみさんいていいよ」とかいう話になるわけですよ。そういう相談相手が俺にはいない、みたいな話になって。

　だから結局（アニメシリーズを）やってる最中に、いろいろたまったものが消化できなくなっちゃって、そこにいわゆる女性コンプレックスみたいなものが出て来て、テーマがすり変わって行ったんじゃないかと。

竹熊　うん。その女性というか母性コンプレックスみたいなところは、俺自身にもあるんですよ。俺もいまだに独身だしね（笑）。付き合う女がいても、結局その人が母親的存在になっちゃうんですよね。

　そうすると、あれだけ母親から逃げたのに、結局は母親と付き合うのかってところでジレンマに陥るといいますかね。『エヴァ』でも、もろに出て来るじゃないですか。１３ミサトさんのセリフが。あれ、父親と母親を置き換えてるだけでしょう。そういう話、一切出ませんか。庵野さんから。

鶴巻　そういう話、聞いたことがない。

大泉　うん。ただ恋人ができる時に、必ず自分は恋人に母親の役割を求めてしまって、それで失敗するっていうことを言ってたじゃないですか、インタビューでは。

竹熊　そこは俺と一緒なんですよ（笑）。





［父親と母親（４）]





摩砂雪　庵野の母ちゃんてさあ、パイオツ（死語）でっけえのかなあ（笑）。

貞本　あれは趣味だと思うけどね。

鶴巻　庵野さんって、たとえば男のメンタリティよりは女のメンタリティを描くことに、すげえこだわるじゃないですか。あのへんはどうなんでしょう。

全員　こだわる、こだわる。

摩砂雪　女描けるのが格好いいとか。でも描けてないでしょ（笑）。

貞本　庵野さんに、（いつも主人公を）なんで女にすんの？　とか言った時に、けっこう怒ってね。なんか言い返されたんだけど。よく覚えてないんだよな。

鶴巻　言い訳はホラ、アフレコのスタジオに、女がたくさん並んでたら楽しいとか（笑）。

貞本　違う、もうちょっとマジな話だったな。なんかね、自分の考えていることを男の言葉にするのなんて、そんなの見たくないんだ、みたいな。

佐藤　単に本音になってしまうと（笑）。

貞本　自分は男だから、それを男の言葉にしても創作が入らないわけだから、そんなのは自分から見たら〝華〟に見えないと。そういうふうに（真意を）捉えましたけれどね。その時は。

鶴巻　でも庵野さんは、そういう生っぽい部分が欲しいんじゃないんですか。本当は。

佐藤　男の悪役。１４『ナディア』のガーゴイルなんかはそうですよね。そういう男に本音をダーッとしゃべらせるんだけど、宮崎さんもいつもあれやってるみたいな感じで、それだけは（本当は）やりたくないというようなことは、ちょろっと言いますよね。

摩砂雪　でも本音で語ってるとは、全然思えないけどな（笑）。庵野の描く男のキャラクターが。

竹熊　やっぱりゲンドウにしても、人間になってませんものね。抑圧装置としては機能しているけれども。（本書スタッフの河田に向かって）このへん河田君はどう思う？

河田　庵野さんに限らないんですけれども、アニメを作る人って、主人公を女の子にしたがるじゃないですか。

貞本　まあ営業的な面が。

佐藤　営業、営業（笑）。

河田　でも営業って言われるんだけど、若い男の作家ほど女の子にしたがるじゃないですか。すごく。それって本人が男になりたくないのかな、とか思っちゃうんですよ。やっぱり男同士の関係だとライバルになったり、関係に暴力的なものが介在して来るじゃないですか。そういう暴力的な部分ををモラルで押さえ込んでしまって、それで自分が（幻想のイメージの中での）女の子になるみたいな。そういうものになりたがっているのかなという気が、すごくしたんですけど。だけど、どこかで（男の）ロマンにも飢えてるから、（照れ隠しで）ナニワ節をパロディーすれすれのところでやる。

佐藤　それは誰に限らずあると思いますよ。

竹熊　あのね、僕と庵野さんは同い年なんですが、男の描き手が、ことさらに女を描きたがるのって、僕らの世代からなんですよ。僕も子供の頃にマンガ描いてたんですけど、全然女が描けなかったんです。ただ高校ぐらいになってから、少女マンガがすごい流行って、男もみんな読むようになった。そしたら今度は女しか描きたくないって奴が出て来たの。それで俺らの世代で、二派に分かれるんですよ。

　その前は、少年マンガ見ると女が全然描けてないし、少女マンガ見ると男が描けてないわけ。ところが七〇年代の終わりにそれが逆転して来た。少女マンガが勢い出て、男の子を主人公にするようになりましたよね。代わりに少年マンガが落ち込んで、逆転現象を起こしたんですよ。そのあたりで派生物として、少年マンガからラブコメが出て、ロリコン物が出て来るようになったでしょう。そうすると、今度は可愛い女の子しか描きたくないという奴が同世代の男から出はじめて、あれっと思ったのね。

佐藤　今、美少女系マンガはだいたいそうなってますよね。男はもうなんか、絵で描いたようなマッチョなキャラクター。ゲームキャラ見て描いたような紋切りのキャラクターと、女の子はもう、自分だけの世界の中で、デザインも性格もソリッドしていくようなキャラクターになっていますね。大半の人はそういう組合せしか描けない。

竹熊　アニメで言うと、１５『マクロス』あたりから、その傾向がハッキリ出てきましたね。





［父親と母親（５）]





貞本　サルベージの回（二〇話）があるじゃない。僕はあれ、母親の胎内（エヴァのエントリープラグ）で溶けてしまったシンジを、ミサトたちが「こっちに来なさい、こっちに来なさい」って必死で呼びかけて、現実の世界に救い出す話だと思ってね。すごくいい話だねって庵野さんに言ったんです。そしたら庵野さんが「お貞さだはそういうふうに取ったんだ」って言って、ガーンとショックを受けた。

鶴巻　あれは庵野さんの考えでは、母親がミサトのもとにシンジを返したっていう話なんでしよう。

貞本　「私とひとつにならない？」っていうミサトやアスカやレイのセリフは、本当は母親側の誘惑だったっていうのを聞いて、ガーンと。庵野さんはそう思ってたんだけど、僕だけ勘違いしてたのかって。

佐藤　えっ、そうじゃなかったんですか。

摩砂雪　違う、違う。あれは母親の声なんだって（笑）。

貞本　外界でリツコがいろいろプログラム組んでたじゃないですか。あれってプログラムがあの映像を作って、現実の世界に帰ってきなさい、こっち（現実）に来なさいと言っているのかと、僕は思ったんですよ。

鶴巻　ああ、なるほど。

貞本　僕は単純に、あれは男のリビドーにひっかけて来るプログラムだと思って。シンジを現実の世界に戻すために、リビドーに訴えて……。一方母親は「本当はどっちにしたいの」って、シンジの本意を聞きたがっているという。母親がそういうふうに、もうこっち来なさいよ、私のところに来て、楽になりなさいよと。でも作り手（庵野さん）はそう考えてなかったわけで、ショックでしたね。

竹熊　だからエロチックであると同時に、気持ちの悪いシーンなんだよね。

佐藤　僕も貞本さんと同じで、お母さんの声が最後に別に聞こえるから、お母さんにはわかってないんやろうなと思いましたよ。だから他は全部、こっち（現実）に帰って来いの誘惑だから、アスカがシンジに帰ってこーい、レイもシンジに帰ってこーい、ミサトも、シンジ帰ってこーい、というふうに……。

貞本　そういうふうに見たよね。

佐藤　それでお母さんの声は、また別に、なんかこっちに来なさーいと。両者がシンジを引っ張りあうような。

摩砂雪　今の時点ではそうなる（笑）。





［庵野秀明は「変われる」のか？（１）]





竹熊　この間、この「欠席裁判」の件で打ち合せをした時に、庵野さんが言ってたんですよ。最終話をなぜああしたかという理由を含めて、やはり自分が真実を話すと、まだ自己を保つ自信がないと。つまりミもフタもないことを言っちゃうかも知れないし、それはまだ自分の口からは言えない。でも、このメンツの口から出るんだったら、みたいなことを言ってましてね。

大泉　言ってましたね。そういう言い方をしたと思う。

竹熊　自分が言うと自己崩壊を起こしちゃうんで、みたいな。そう言われて見当つきます？

大泉　貞本さんが以前どこかに書かれたか、言われたかしたことで、ショックで旅に出たことがあるらしいんですよ。それがどういうことかって聞いたら……。

竹熊　教えてくれないんだよね。

大泉　すげえ嫌な顔されて。

貞本　それはいつの話なんですか。

鶴巻　『ナディア』のコンテ集に貞本さんが書いた文章のこと？　あれはけっこうショックがあったみたいで。

貞本　肉食え、肉って書いて（笑）。

鶴巻　今度もまた同じことを言われているわけですよ。結局ね。

竹熊　それ、なんて書いてあったんですか。

貞本　僕は単純に庵野さんのキャラの使い方が気に入らなかっただけだから。それをただ書いてただけで。キャラクターを一杯出したのに、全部同じになっちゃってるのが、僕は許せなかったんですよ。

竹熊　キャラは全部庵野さん自身だと言ってますよね。まあ創作って普通そうなんですけれど。全部作者の分身ですから。ただそれにしても、幅がないということですか。

貞本　そうですね。だからたとえば１６『ナディア』に出てきた三人組だったら、事前に庵野さんがあれこれ言ってるわけじゃない。こういう三人組にして欲しい、主人公につかず離れず、でも彼らは最後まで悪人でいて、とか。でもそれが、たった八話で主人公側についちゃって、いい人三人になっちゃったのが、僕はすでに許せない。

竹熊　この間、彼は河田君と言うんだけど、面白いことを言ったんだよね。彼は今、富野由悠李さんの本を作ろうと思って、富野さんのインタビューをやってるんですよ。それで、富野さんの作品には〝他者〟が出てくるんだけど、庵野さんの作品にはそれがないって言ってて。

河田　富野さんて、ガンコそうに見えても他人に興味があると思うんですよ。だから女の人なんか執拗に見るじゃないですか。反対に庵野さんって、（自分の人格が）変わらなきゃっていう強迫観念があるけど、本当はそんなに変わるつもりがないっていうか。

大泉　結局自分以外には、興味がないとか。

河田　変われないじゃないですか。その変われない自分について語らなきゃいけないってことなんだと思うんですよ。人間なんかそうそう変われるものではないから、逃げたり、ダメになってしまいそうだったら、さてどうするとか。

そういう話を物語として作っていけばいいんだけど、できない。本当は庵野さんって頭の中で考えるだけで、現実の自分を変える気がないから、あの最終回みたいな極端な観念劇になってしまうんです。それで最後に急に帳尻合わせて、作品の中で自己憧着しちゃう。他人にしても、無理矢理同じような「いい人」にしちゃったり。

鶴巻　ミもフタもない（笑）。

河田　「逃げてもいい」って言われる貞本さんのほうが、現実的に逃げてないような感じがするんですよ。だからちゃんと黒い髪で日本人でやりましょうとか、主人公を男の子にしましょうとかおっしゃるわけでしょう。

鶴巻　貞本さんは逃げてないと思う。庵野さんは逃げちゃダメだと思いこみたいっていうか。





［庵野秀明は「変われる」のか？（２）]





貞本　彼、「人生とは変わることだ」とか、よくテーマとして選ぶじゃないですか。でも庵野さんって、絶対変わらない人なんですよ（笑）。

河田　そう言っただけで、安心して、自己完結しちゃってる。

貞本　だから、僕が肉食えってことをエッセイの最後に書いたのは、たぶん庵野さんが一番変われるのは、あなたが肉を食べた瞬間ではないか。まず実生活から変えたらどうですかっていうので書いたんですよ。ちょっと自分で書いて、これはきついだろうなと。でもこれで変われなきゃ、付き合う価値ないなと、俺は思ったから。

竹熊　それで彼（河田）は、そういうふうな内容の手紙を、庵野さんに書いて。そうしたら庵野さんが読んでくれたんですね。それで俺と会った時に、河田君の手紙良かったって言ってたんですよ。河田君が言いたいことってさ、結局、自閉はダメだと言いながら、自閉に向かっているのは庵野さんじゃないかということ？

河田　というか、それについて言ってる自分に酔っちゃってますよね。

貞本　それはちょっとひどい……（笑）。

河田　太宰治が『人間失格』なんかで、二日酔い的に自己嫌悪を撒き散らして、同情を買いながら、最後にバーのマダムに「天使みたいないい人でした」と言わせちゃうみたいな。ファンも作者のその姿に自分を重ねて。野火ノビタさんとの感じなんか、太宰とファンの連帯感に近い気がする。

摩砂雪　だから俺たちも、それだよって言ったんですよ。

鶴巻　自分のことを、俺は太宰治だみたいなことを、まだ言うんだけど（笑）。

佐藤　でも最初「逃げちゃダメ」って言ってたのに、最後に「逃げてもいい」というキーワードをキャラクターにしゃべらせたでしょう。あれ、貞本さんと話をしてからだったかな。

貞本　うん。最終話で、結局、どうしたらいいって（庵野さんが）聞いてくるから、「逃げたらダメだ」っていう人が、「逃げてもいいよ」って言われたら、たいていの人は楽になって、気持ちいいよって答えたんですよ。そうしたら。

佐藤　フィルムの中に、それポンと入れてるんですよ。この間の「逃げたらあかん」というのは、どうやってオチにつなげるんかなと思ってたら、もう逃げてもええことになってた（笑）。

竹熊　それで二六話の最後の最後で、「僕はここにいてもいいんだ」になりますよね。あのへんが唐突なんで、皆、とまどっちゃったということだと思うんだけど。

貞本　いや、当時流行ってた、そのへんのセラピー物の小説とかっていうのを、僕が読んだ限りでは、たいてい最後のテーマは……。

竹熊　自己を受け入れるってやつ。今のままの自分を肯定するという。

貞本　そうそう。結局、逃げたければ逃げなさいとかですね。まあ、深く考えるなみたいな。ちょっとラテンに行きなさいとか……そんなテーマが多かったんですよ（笑）。たいていあの種の本は、いや逃げていいですよって。そういったものになってんだよという話をしたんですね。庵野さんに。そうしたら……。

竹熊　素直に出しちゃった？

貞本　だと思いますよ。

佐藤　自分自身が、そこで癒された部分もあったんかな。

貞本　ウワーッと思いましたけどね。脚本見たら、言ったことストレートに入れてるわと（笑）。

佐藤　本当にだから、それまで何日もずっと悩んで、それで最後に貞本さんが、その話をして。初め、電話で話したんでしたっけ。

貞本　いや、なんか夜中にいきなり僕のところに来て。

佐藤　そしたら貞本さんの話を聞いて、それをサクッとそのまま。

貞本　最初、親父を踏みつけて、自分の中の親父を殺して、乗り越えていくようなラストにするとか言ってたのに。

鶴巻　それは言葉づらだけ（笑）。

竹熊　大月さん、そのへんはどうなんですか。

大月　なんだかね。二五、二六話の前に話し合いをして、もう次からどうのこうのって（作品が作れないというような）辛しん辣らつな状況になった時に、いまだに覚えてんだけど、テレ東のプロデューサーと三人で新宿で飲んでて、庵野さんがもう『エヴァ』やめる、という話になった時があるんですわ。まあ本当にやめる気だったかどうか、それは本人しか知らないでしょうけど。それで、やるならやるという根拠を示せと言われたんですよ。

竹熊　庵野さんから？　すごいこと言いますね。

大月　それでね、だから庵野さん、ちゃんとやってくださいみたいな。テレ東のプロデューサーは女の人だったから、女の理論で攻めてたんだけど。まあ、庵野さんはこんな顔してるわけだ。それで、私からもきつい本音というのを聞きたかったらしくて。だから私も割と幼児体験っていうか、父親はアル中で病院に入ってたものですから。私、それで三歳の時に父親の頭を包丁で刺したことありまして（笑）。その話を聞きたかったらしくて。

　もうだから、このままだとテレビ（放映）は止まっちまうし、どうしようもねえからと思って、まあ最後の私の決め手で、そういう人生の大事態で自分はどう対処したかという話を、もう一生懸命したら、「やる」と言ってくれて。私はもう『エヴァンゲリオン』と言ったら、あの新宿の夜ですわね。それがすべて。

竹熊　庵野さんが降りると言い出して。やめると言い出して。

大月　うん。これ以上俺は傷つきたくないし、もうやっとられんと言って、どうのこうの言ってくるから、「世間をなめるな」と私は言って。それで私の原体験みたいな話をして。そしたら目がキラキラして来ました。よっぽど嬉しかったんでしょうね。人の悲惨な話聞くのが（笑）。





［シンジはなぜ乗ったか（１）]





竹熊　摩砂雪さんは、この件に関しては？

摩砂雪　なんなんだろうね。お貞が「逃げていい」とかって言ったのは、いつぐらいなの？

貞本　二五、六話のシナリオに詰まってた頃だと思うよ。

摩砂雪　俺には、その前から言ってたよ。言ってたような気がするんだよ。だってもう仕事から逃げたいって言ってたから（笑）。

鶴巻　誰が？

摩砂雪　庵野。どうやったら『エヴァ』やめられるか、とくとくとそればっかり話ししてんだよね。

佐藤　僕をはじめ、他の人は、なんだかんだって、頑張ってくださいよみたいな言い方やから。毎日、庵野さん追い詰めて、「どうですか、どうですか」ばっかり言ってます。

摩砂雪　俺なんか、根が悪人だから、やめちゃえ、やめちゃえって（笑）。だってもう俺達も辛くなって来てたから（笑）。だから１７二〇話であれ（性器のドＵＰアップ）出して、それが視聴者にひっかかって、もう放送打ち切りになるのが夢だとかって言ってたもん（笑）。

鶴巻　ああ、言ってた、言ってた。

摩砂雪　打ち切りにならんかなって（笑）。いや、マジで言ってたよ。

貞本　本気だなと思ったもん。

摩砂雪　でもさ、逃げちゃダメだってことは重要だった？　俺達の中では、そんなに感じてなかったんじゃない？

鶴巻　でも、シンジがどうしてもロボットに乗らないという部分で苦労してたのは、確かなんですよ。あんな普通の少年を、なんでいきなり乗せられるかっていう。乗れって言われたって乗らないし、嫌でしょう。ロボットにどうやったら乗るのか、理由がわからないという話で。例えばあそこでレイがガラガラと押されて出て来て、かわりにケガしてる娘っ子を乗せちゃうぞみたいな感じで脅される部分も、全部シンジを（エヴァに）乗せるための仕掛けなんですよね。あそこで（レイが）別に出て来る必要はないわけですから、本当は。

摩砂雪　だからあれが、親父に……というか。

鶴巻　要するに見ている人達に、ああ男ならこんな状況になったら、乗らなきゃいかんよねみたいな感じに思わせる仕掛けなんですよ。ただ単に。その中で、やっぱりその一つとして「逃げちゃダメだ」っていう、その、もう少し悩んで乗るみたいな主旨が欲しかったから。なんとかシンジがロボットに乗る、悩んで悩んで乗るっていう。そういう理由づけが欲しかったのが最初だと思うんですね。

竹熊　僕は一話を見て、もちろんすごくよくできてると思ったんだけど。でもやっぱり逃げちゃダメだとか、なぜロボットに乗るかという動機づけは、まだ成功しきっていないと思うんですね。結局、乗せたいから乗せたわけでしょう。でもそこにリアリズムが欲しいわけじゃないですか。そこをちょっとアクロバティックにやっちゃったなという感じはありますね。実際には乗るわけないんだから。リアルに考えれば。

貞本　シナリオ上では、もっと変でしたよ。これじゃ乗らないでしょうって感じだった。ところが画面見たら、音楽とかでバーッと盛り上がるんで、ああアニメーションっていいなって思ったけど。たぶん初めて見た人は、だまされて感激するだろうっていうタイミングで音楽が入るし。

大泉　完璧にだまされました。もう綾波がそこで出されたら、俺は男だ、乗るしかないだろうって。

貞本　文字づらでは、これは乗らないでしょうと、僕は思いましたけれどもね。

摩砂雪　ダメでしたよね。シナリオ見て、全然ダメだと思って。なんとかなるのかって。だからシナリオ見た段階で、俺、もっとマンガっぽい話にするのかと思ったんだよ。

竹熊　あんまり四の五の言わずにみたいな。

摩砂雪　そうそう。そういう流れの感触で作るのかなっていう。『トップ』もそれに似たような感じで始まるから。そうしたら、でだしからいきなり『ナディア』の最終話みたいなテンションで持って行っちゃったわけじゃない。エッと思ったんだよ。あの時、俺、やっべえと思った。「本マ当ジに最終回までこのテンション維持できんの？」っていう（笑）。

鶴巻　でも貞本さんのマンガ版では、頭の方で綾波が初号機に乗って助けに来るエピソードがあるじゃないですか。

大泉　ええ、ありますね。

鶴巻　シナリオの二稿にはあるんですよ。だからあのケガが、暴走事故のケガではなくて、最初にシンジを助けようと思ったせいでケガしたというふうにしたら、さらにシンジが乗らなければいけない理由になるのではないかと思って。

　要するに、本当のところシンジが、どうやったって乗ってくれない話だったのを、とにかくいろんな材料をくっつけて、シンジが乗るように、なんとかしようと思ったという。その流れで綾波も出したんですよね。

貞本　マンガを描く時は、たぶんそれが残ってたから。こうすればシンジは、この女の子は自分のために傷ついていると思い込むだろうと。本当は違うんだけど、そう思うだろうから、乗れるなと。さらにその上に、実は主人公はこんなことで乗ったわけではなくて、親父に対する反抗もあってというか。どうせ乗らないだろうと親父が思ってるなら、それなら乗ってやると。

鶴巻　貞本さんのマンガの方は、親父とシンジには、そういう関わりがあるからいいんですけれど、アニメの方にはそれがないんで。





［シンジはなぜ乗ったか（２）]





竹熊　『ガンダム』の一話の話は、その時点でもう出てました？

摩砂雪　即、出てた。

鶴巻　ずっと出てましたもん。

佐藤　当時はなにかというと、すぐ、あれ。

竹熊　じゃあなにかというと、『ガンダム』の一話を見て？

貞本　秒数的に、カットごとに書いていって。

鶴巻　『ガンダム』の一話の全カットを、チャート図みたいに書いてましたね。敵がやってきて、望遠鏡で覗いて、アムロの家に行って、ムサイに行って、シャアが出て来てみたいな流れを全部書いて。そしたら途中で「完璧だ！」（笑）。「こんなの、絶対越えられない！」とか言ってて（笑）。

佐藤　一〇何分目がアムロがガンダムの所に走って行くシーンで、こうバッと立つのが何秒目で、「あーっ！」とかって。

摩砂雪　流れがスムーズ過ぎるとかいう感じで。

河田　みなさんは、一話でアムロがガンダムに乗っちゃうのは、違和感ありますか？

貞本　ないなあ、僕は。

河田　富野さんてそういう時、自分しか乗れる人間がいなかったら、人間は乗るもんだと、本当に思ってると思うんですよ。少なくとも、乗るべきだと信じてると思うんです。それって「男」ってことですよね（笑）。ところが、なんで自分はそう思えないんだろうってことなんじゃないですかね、庵野さんは。

佐藤　庵野さんは、最初、絵コンテの直前まで、「やります、僕が乗ります」ってセリフを入れなかったんですよ。

河田　『ガンダム』のアムロは、あんなふうにいくら自閉して見えても、ああいう局面になると社会性で生きてる男だっていうのが目覚めて、やっぱり乗るだろうというふうに（富野監督は）感じたと思うんだけど。そこが『エヴァ』の一話では、そういう人間関係の手触りが見えなかったので。たとえば『ガンダム』なら１８アムロとフラウの関係みたいな。

鶴巻　でも、庵野さんがそこで乗る・乗らないということで、本当に悩んでたかどうかということは、わからないですよ。だって最初、綾波が出て来ないシナリオでも、庵野さんは一応通したわけだから。

貞本　要するにお約束というか、主人公はロボットに乗らなければいけないというのが、まず大前提にありますよね。それに踊らされて「富野さんの１９『Ｖガンダム』と同じ失敗をしてしまった！」とか言ってましたよね。やったあとに。

佐藤　「乗せちゃったー！」とか言うてました。

竹熊　たとえば乗らない主人公、という可能性もあったかも知れないんだ。じゃあ。

佐藤　まあ、綾波をそのまま乗せちゃって。

貞本　シンジの性格を考えた時、そこから入っていった方がスムーズだったかも知れないですね。

竹熊　あるいは、それこそ五話、六話くらい使って、乗るまでの話っていうのが。

貞本　ただ大前提として、一話に、絶対ロボット出さなきゃいけないというのが。

竹熊　綾波が乗って目茶苦茶な目にあうっていうのを何話か使って見せて、だから自分（シンジ）が乗るしかないというところまでテンションを持って行くというのだったら、俺は納得したんだけど。最低でも三話、四話使ってさ。

鶴巻　そこはやっぱりね、あの人は、エンターテイナーであるし。やっぱり商売を考えるプロデューサーでもあったわけですよ。そうするとやっぱり、第一話では……。

竹熊　主人公がロボットに乗るところまではもって行かないと、と。

鶴巻　それがでも、だんだんと疲れて来て、最後のほうは、もう（笑）。でもあの二五話、二六話にしたって、庵野さんなりに勝算があってやってることだと思うから。つまりあれは非難されることも含めて、俺の勝ちだみたいなところでやってるんだろうと思うんですよね。だってあの頃は、二五話、二六話の前の段階で、人気が出ていましたから。（なにやっても話題になると）わかっていたし。

　ただ庵野さんにしてみても、最初の段階では、果たして『ナディア』ぐらいに人気でるの、この作品？　みたいな気持ちだったと思う。だから、あまりに（セオリーを）外したものは作りたくないというのは、あったと思いますよ。





［綾波レイの微笑み]





河田　一話がどうこうとか、テクニック的に失敗したとかどうとかというのも、見ている方の無責任な立場から言うと、どうでも良くて。六話で全部納得させてもらったんですよ。あの２０シンジと綾波の話で。ああ、これがやりたかったんだなと。

鶴巻　あれで終わったって言ってた（笑）。

摩砂雪　あれを早く持って来過ぎたって。

貞本　あれを最終回の方に持って行くべきだったみたいな話をしてますね。

摩砂雪　だからそこで綾波がシンジに心開いちゃったから、もうここで終わってるよ、この話。

貞本　ただこれは庵野さんにも言ったんだけど、結局、六話で終わっちゃったと思っても、実はそういうのは（まだ内実が）伴っているわけではなくて、反復するしかないものだから。だからもう一回繰り返して、実質が伴って来るような話にすればいいんじゃないかと。

鶴巻　『エヴァンゲリオン』って反復の話じゃないですか。一話で乗れ、乗れって言われて、やだ、やだって言ってるのに乗っちゃうわけでしょう。にもかかわらず、四話でも、やっぱり「もうやだ、やだ」と言ってて、また戻って来て乗るわけでしょう。一九話で、やだやだと言ってて乗りますよね。六話でも、やだやだ言ったけど、乗ってて。

　まあぶっちゃけた話を言っちゃえば、もっとシリーズ構成ができてればなとは思いますけど。でも結局そういう話なんだっていうか、ああいうのがパワーがあるということだろうなと。六話で、もうあんないいエピソードを持って来ちゃうことは、出し惜しみしていない。

貞本　けっこう、あの反復はうまく行ってるなと思う。２１一九話だっけ。「僕は乗ります」と言ったのは。あれは「逃げちゃダメだ」と言って乗るのとは、やっぱり違う。同じ乗るにしても違うから、うまく行ってるなと思ったけど。

佐藤　最初の一、二話で、アニメのディテール好きのマニアの心がつかみ終わって、マニア向けにそういう設定がたくさんあって、これはオタクの心にイケてる、イケてるっていう（笑）、そういう期待がガーッとあがって来て。それで三話、四話あたりで、なんか『Ｖガンダム』みたいな話で、（普通のアニメとは違うぞという期待が）ポーッと上がって来て、それで五話の綾波の話でガーンと来て。

竹熊　あれは良かったですね。

佐藤　そう。それで六話あたりで、一一月の一日目かな。その時に、同人誌即売会があった時には、もうどこも皆『エヴァ』『綾波』ですよ。庵野さん、勝利宣言とか言って（笑）。

摩砂雪　あれは六話のコンテが終了した時点で勝利宣言してたんだ。て言うか、最後のシーンって、ほとんど俺のコンテそのまんまなんだけど。「行くのか、これで本当に？」って、あいつ聞いてくんだよ。で、うん、このベタベタなのも、俺いいと思うんだけどって言って。お前のシナリオどおりだとどうやってもこうなるよと。じゃあこれでいってみようって、やってみて。ここの「レイの最後の笑い」、ここさえ良ければ、もうエヴァは成功だって。勝ったって言ってたね。

貞本　あれがつらかったんだよ（笑）。見たときアーッって。もう（マンガの）連載がなければ、直したいとかね。

大泉　そのところで貞本さんのマンガは、そんなにニコッと笑ってなかったじゃないですか。（絵として）ものすごい抑制してるんだけども、やっぱりちゃんと笑ってるように見えるんですね。あれは貞本さんのすごいテクニックだなと。

貞本　あれ、実は雑誌掲載の方は、もうちょっと笑ってるんですよ。単行本で描き直してるんですよ。

大泉　あそこで本当に笑っちゃったらおしまいだと。





［最終二話について]





竹熊　声優さんにとってみても、『エヴァ』というのは、特別みたいですね。

大泉　皆、すごいいれこんでるっていう。２２ドイツ語を一生懸命勉強された方とか。

竹熊　２３ミサトさんの声の人（三石琴乃）も、いまだ冷静に振り返れないみたいなことを言ってますね。『エヴァ』に関しては。

貞本　脚本を見て、泣いたとか。庵野さんは、それ聞いて拳を上げて、ガッツ！（笑）

摩砂雪　それ何話の時だっけ。

貞本　二五話。

竹熊　それはミサトさんの人が脚本で泣いた？

貞本　それでガッツだと。僕のマンガの担当も泣いてて、その話をしたら、もう一度ガッツポーズ（笑）。勝ったと。世の中に二人ほど泣いてくれる人がいたから。でも終わってからいろいろ言われて、けっこうヘナヘナしてたよね。あのガッツはなんだったんだ（笑）。

摩砂雪　二五話を作ってる時は「俺って天才」とか言ってて。それが放映されたら、部屋から放心状態になって出てきてさ。なんでこんな変なものを俺は作ったんだと（笑）。

佐藤　最終回だってそうじゃないですか。

摩砂雪　いや、最終回はなんにも言わないんだ。二五話は、とにかくすごい気に入ってたらしいんだよ。自分で。そしたら、もう放映されたの見たら、「俺ってバカ…」みたいな（笑）。

佐藤　それでそのあとの、パソコン通信のリアクションを遠目に見て（笑）。もう相手にしないとか言いながらも、それでもこうやって、横目でモニターを。「見ないんでしょう」って言ったら、「うん、見ない」。

貞本　でも、僕はあの二五、二六話でいいと思う。単純に、二四話から二五話への繋つなぎの話が抜けてるだけだと思ったけどね。だから今やってる本来の二五話（リテイク版）が。それが抜けてるだけじゃんと。僕は最初の脚本見てたから。本来の二五話が入ったら、きれいにテレビ版の二五、二六話につながるはずだから。一話分抜けてるだけだな。いいじゃんって。

摩砂雪　それは作ってる本人達だからわかるっていうのは、あったんだけどね。

貞本　だからきれいに、僕の中ではつながってる。でも普通の人は、あの二四話の続きを見たいのに、それが抜け落ちていたから。それで頭がカーッとなって。

大泉　まったくそうですね。

貞本　関連性が見えなかったから。

鶴巻　まあ本来の二五話のシナリオはできてたわけだから。

貞本　僕はそれを見てたから、まあいいんじゃないですか、これでもっていう感じで。

佐藤　今回はだから、新二五・二六話と言いますか、いわゆるリバース編という形でやるわけですけど。なんとなくお客さんの方は、ああ二四話のあとに、これが来るんやと思ってくれれば。本来の二五話があれば、テレビ版の最終回がその次に来たとしても……。

竹熊　それなりには納得する？

佐藤　うん。ああ、なるほどこういう具合に世界がほぐれていくのねというのを感じると思うんで。まあ今回リテイク版では二五・二六話ともにまったく直しちゃいますけど。

摩砂雪　でも俺、ちょっと納得しないのはさ、なんだっけ。二五話で、２４ケース１で、ミサトの場合と、アスカの場合とかやっといて。それが二六話で、ケース２はどうしたんだ（笑）。描けなくなっちゃったなあって。

佐藤　時間がないんでやめちゃいましたみたいな形になりましたね。

摩砂雪　ちょっとあそこがげせなかったんですね。作ってて。

竹熊　この間『クイック・ジャパン』に、『エヴァ』の批評同人誌書いてる人が送って来まして。その人、最初は最終二話否定論者だったんですよ。それで中のセリフの一個一個、全部細かく分析しているうちに、途中から大肯定論者に変わって行くんだよね。テレビアニメで、ここまで徹底した個人表現は、生まれて初めて見たって。

貞本　だからストーリーの中のシンジの悩みじゃないんですよ、あれ。

竹熊　庵野さんの悩みでしょう。

貞本　庵野さんの悩み。『エヴァ』の主人公って、二五、二六話だけ、急に変わっちゃったんですよ。

竹熊　だからエヴァンゲリオンに乗る行為を「アニメ制作」、キャラを庵野さんに置き換えてやってみたら、全部よくわかる（笑）。こんなにわかりやすい話はないと。それで、よくもまあこんなプライヴェートな表現を、堂々とテレビでやったなというところで、感動しちゃって。その人、庵野ファンになっちゃったんですよ。最初は否定論者だったんだけど。

佐藤　たいていは、作家は作品の上では神様やからね。ファンにしたらいきなり神様が降りて来て、ギャーギャーしゃべったら「うるさい神様！」みたいな話でね（笑）。だいたいのアニメファン、八割、九割はそうやもんね。（自分のことを）わかってくれへんという部分で、よく庵野さんはぶーたれるわけなんですけど。まあ無理やでって言うんですけど。

竹熊　それでリテイク版の話なんですけど、この間庵野さんに会ったら、なんか「奇跡を見せなきゃなんないんですよ」ってなことを言ってましたけどね。作り直しの二六話は、奇跡を見せなきゃなんないんですよって。

摩砂雪　たしかに悩んでた（笑）。





［オタク批判]





竹熊　庵野さんのメディアにおける発言で、いわゆるオタク批判があるじゃないですか。そのへんみなさん、どういう具合に考えてらっしゃいますか。

河田　まあ『エヴァンゲリオン』という作品そのものがそういうテーマじゃないですか。オタクとしての自分をどう変えるかという……。

竹熊　後半、特にそうだよね。

鶴巻　ただ、まったく同じ意味で、さっきあなた（河田）が言ったのと同じ意味で、あの人もそうなわけ。だからオタク達に「お前は、こういうことしてちゃいかん！」と言っていながら、本人にもループして帰って来る。しかもその人達と庵野さんもいつまでも変わらないという部分では一緒でっていう（笑）。

大泉　寅さんみたいですね。

竹熊　僕も、庵野さんのオタク批判って、結局自己批判でしょうと言ったら、一応認めたんだけど。でも、じゃあなんで、他人を攻撃するような言い方をするんですかって言ったら、その方が面白いからみたいなことを言うからさ。じゃあ怒られてもしょうがないじゃないですか、ってことになっちゃうんだけど（笑）。

大泉　批評、中傷は辛いとか。

摩砂雪　いやあ、あれは人の気をひきたいだけだもんね。庵野はそれがあるからね。長年つきあっていれば、だいたいわかるよね。なんか、みんな彼を神格化してるから。俺から見れば、そういう人間じゃないよあいつは、と思っちゃうよ。

佐藤　もうとってもタチの悪い、ただのオタクって感じですか？

摩砂雪　そうそう。

貞本　まあ僕らから見れば変わってないんだけど。世間の評価の方が変になっちゃった（笑）。

大泉　変な方向で（笑）。

摩砂雪　だからヘンに正当化されちゃってて。それで困惑してんのじゃないのかな。まあ、本人もいい気になってるとこ、あるんだけど。

竹熊　それに乗っちゃっている私達っていうのもあるんだけど（笑）。

大泉　ちょっと竹熊さんと一緒に増長させてるかも知れない。

佐藤　ああ、それはあるかも（笑）。

摩砂雪　いや、だから他人はそういうふうに思ってもいいと思うんですよ。それも含めて庵野は、『エヴァ』は自分達で考えてくれ、自分達なりに受け取ってくれみたいな問いかけ方だったんじゃないの？

竹熊　今、こういう形での時代のヒーローが他にいないのが問題なんですよ。たまたま庵野さんが、そこにはまっちゃったという部分があるんですよね。昔だったら、ロックの人とか、いろいろいたわけだけど。





［自殺願望（１）]





佐藤　（大月氏に）庵野さん、放映が終わってからどうだったんですか。終わってからこんなふうに言われてとか。あっちで取材受けてこんなこと言われてみたいなこと言ってました？

大月　ああ、終わってからの方が、庵野さんはすごかったね。だからなんか一番ひどい時に、飲み屋に行って、四人で行った時も。

貞本　ああ、あれもねえ。

大月　三時間ぐらい飲み屋にいて、一言もしゃべんなかったもんね。

摩砂雪　いや、しゃべったことが例の……。

鶴巻　『クィック・ジャパン』でも、言ってますよね、確か。屋上に登って……。

摩砂雪　あれ、僕はみんなに聞きたいんだ。あれ（自殺未遂）にみんなね、惹かれちゃうのが、ちょっと庵野の罠なんじゃないかって（笑）。

貞本　そんなに苦悩してるとは、思っちゃいけないんですよ（笑）。

摩砂雪　俺達はそれをわかってんだけど、他の客がいる飲み屋の席で、庵野が「俺は自殺したい」とかってとつとつとやりだすわけよ。これはまずいなって言って、それを打ち消すために、こっちはフォローしてさ。「お前、人前でそんな話するな」って。それでその場で終わると思ったら、今度はスタッフの打ち上げでそれを言う。なんてかっこ悪いやつだと思って（笑）。一五〇人ぐらいいたかな。あの打ち上げ。

鶴巻　いましたね。

摩砂雪　それで俺とマッキー（鶴巻氏）はあれ聞いて、もう頭抱えてしゃがみこんじゃって。庵野、それ言わなきゃお前はかっこいい男なのに、なんでここで、皆の前で言っちゃうんだって。

佐藤　それでまたそこで言ったことが、かっこいいと言う人もおるんだから（笑）。

摩砂雪　そしたら、本人もいい気になっていろんなところで（メディアで）言いだしちゃったわけでしょう。

竹熊　それはね、ちょっとこっちにも罪が多少あるよね（笑）。

大泉　いやあ、だって自殺考えましたっていうほうが強烈なヒキがあるもんね。

竹熊　まあジャーナリズムのスケベ根性ってやつで。純粋に記事として考えた時には、ウリになりますから。

佐藤　いや、本に載ってるぶんには、人生にはいろんなシチュエーションがあって、恋に破れたりとか、会社をクビになったりとかと同じように、自殺も考えたって書いてあると、ああいろいろ考えてるのね、となるんですが。でも今までなんだかんだ文句言いながらもついて来たスタッフの目の前で、それを言うのは、ちょっとちゃうでっていうのがあるなぁと。

大泉　それは、でもそうですよね。

佐藤　まあお客さんに対しては、俺も悩んでるっていうのは、それは一種のサービスですから、いいんですけど。

貞本　しょっちゅうそういうの、真っ先に僕ら聞かされるわけじゃない。中央線に飛びこみたくなったんだよとか言って。ここで飛び込めば死ねるんだと思ったんだよねとか言って。

摩砂雪　だってもう、山賀なんか。

貞本　どうしてお前、そこで飛び込まなかったんだと（笑）。

摩砂雪　お前飛び込んだら、俺、絶対拍手しちゃうよって（笑）。

佐藤　ある私が連れていったイベントの帰りに庵野さんからそれ言われてですね。気が遠くなって、私が飛び込もうかと思いましたよ。

貞本　ガイナックスの屋上から飛び降りようと思ったっていっても、「あんた、あそこから飛び降りても、足が折れるだけだよ」って、ノドまで出かかったんだけど。

佐藤　それで病院入って、ほんまに足の指骨折だけとか、よけいかっこわるい。

鶴巻　当然、ああいう精神医学の本、たくさん読んでたわけだから。

貞本　あてられちゃったのかも知れないね。

大泉　でも野火さんが、庵野さんは分裂病だって書いて。ものすごく最初それでグッときてましたよね。

鶴巻　まあそういう意味では、ああいう人達に周りを固められて、庵野秀明像というのができていくわけですよ。たとえば庵野さん、その手の精神医学の本をたくさん読んでて、アイデンティティっていうのは、周りから作られていくアイデンティティと、自分の中からできていくアイデンティティがある。周りから作られていくアイデンティティが過大になっちゃうと、鬱になる。自分の方から作っていくアイデンティティが過大になり過ぎると躁になるんだみたいな話を延々していたわけですよ。

　そんな話をしてるけど、「あなたが人からこうだ、ああだと言われたいんじゃないの」っていう。俺は監督なのだと自分の中から出て来るのではなくて、「監督なんでしょう」と周りから言われたいんじゃないの？　ってな感じがしてね。そういうことを言うと、やっぱり「うーん」と鬱になっちゃう。

竹熊　庵野さんと初対面の時に、吉祥寺のベトナム料理屋で飲んだんですよ。それでポツポツと話してて、なんか『エヴァ』を作ることで周りの心は補完したけれども、自分の穴は埋められないっていうことをＡＴフィールド張りながら言ってて。

摩砂雪　なんでそう固いこと言うかなあ（笑）。

竹熊　それで俺が、ついポロッと、「庵野さんって、悩むのお好きなんですか」って言ったら、「好きですね」とか答えて（笑）。

摩砂雪　その悩んでる自分に酔ってるんだな。酔うのが好きなんだよ。

貞本　いかんですね。それは。

摩砂雪　だけど、このスタッフでは、絶対同調するようなことはないからさ。もう平気でズケズケと。

竹熊　ああ、それは言ってました。だからつまり解毒して欲しいわけですよ、この座談会で。

摩砂雪　自分が変に神格化された部分を矯正してもらおうっていうのが、あるのかな。でも、それってずるいなって思うんだよ（笑）。

鶴巻　自分もそうだと思い込んじゃう人なんですよ、あの人は。だから野火さんとかに、あなたは分裂病の星ですとか言われると、そうかも知れないとか思っちゃうタイプ。だから、そこで、あなたは人にホメられて、いい気になってるだけだよっていうふうに言われたい。そういうふうにも言われたいっていう。

河田　まさに太宰治とファンの関係ですね。

佐藤　そうそう。太宰とファンというのはありますね。

竹熊　太宰って、最後に玉川上水で愛人と一緒に飛び込んだって言うけどさ、あれってものの本によると、最後まで太宰本人はあがいてらしいよね。死にたくなくて。ポーズで心中しようとしたら、女の方が本気になっちゃって、無理矢理引き摺りこんだという説がある（笑）。

摩砂雪　ああ、本当には死なないでしょう。何回もやるんだよね。

鶴巻　庵野さん、助かっちゃうんですよね（笑）。それがまたトラウマになったりとか。





［精神攻撃]





竹熊　最後に気楽なエピソードがあれば。庵野さんに関する笑えるエピソードとかですね。

摩砂雪　いや、笑えるエピソードは、やっぱり『トップ』の時だよね。あの時俺は違う仕事やってて、庵野は『トップ』の五、六話の立ち上げで、脚本を書いてたんですよ。スタジオには原画マンも動画マンもいない時と期きで。俺と庵野の二人だけ。それから向こうの方で赤井（孝美）先生がコンピューターの仕事をやってたのかな。それで二人で、隣同士の席で、あれこれくっだらない話ばっかりしながらやってたんだけど。なんかのきっかけで、どんな死に方をしたら一番嫌かという話が出たんですよ。

　ああ、最初はどんな死に方かじゃなくて、お前の一番嫌なことをやってやるっていう話だったのかな。それで「お前の寝てる間にな、お前の歯ぐきに恥垢を塗り付けてやる」とか。そういう話をしていて。それでもっと嫌なことは何かって言ったら、「お前が崖から落ちそうな時に、俺はお前の目の前でチンチン出して、しょんしょんを顔にぶっかけてやる」って。

佐藤　尻を見せるとか言ってなかったですか？

摩砂雪　そんなのも言ってたかな。そしたらやっぱりウンコだよな。それで話は戻るけど「お前が死ぬ時、一番最後に見るのは俺のチンチンだ」って（爆笑）。そういう話をずっとしてたら、赤井先生が立ち上がって、バーンと怒ってやって来て、「お前ら、いつまでそんな話してんだ！」って。延々、それで一晩中やってましたね。二人でなんか。問答みたいに。

竹熊　うわー、それはすごい。

摩砂雪　だからあの当時は面白かった。そんなことばかりやってて。

貞本　『ナディア』までは気楽に作ってたよね。

摩砂雪　『ナディア』っていうか、『トップ』の頃。『ナディア』もそうだけど。

竹熊　他になんか、あります？

摩砂雪　でも、あれだよ。マッキーのところに話に行った時は、真面目な話するじゃない。俺のところに顔のぞかせる時は、すっげえくだらない話するよ。なんかチンチンだマンマンだって言って。

竹熊　鶴巻さん、なんかないですか。笑える話。

摩砂雪　庵野がこいつと話してる時は、真面目な話で、俺のところに来る時はバカな話で。だからマッキーと真面目な話したら、ついでにこっちでくだらないこと言って帰って行く。けっこうゆだねてるよ、マッキーに。こっちは気が楽でいいんだけど。

竹熊　ああ、そうか。真面目な話は鶴巻さん。

磨砂昔　真面目っていうか、あれですね。マッキーはブレイン・ワークみたいな感じが好きなんで。それで俺は、そっちよりはフィルム作る方が好きだから。演出的なやり方とか、見せ方とか、そっちの方が好きなんですよ。マッキーは話とか考えるの好きだものね。それ知ってるから、マッキーに来るっていう。絵とかレイアウトとかは僕の方で。

鶴巻　変に頭でっかちにしちゃったかなと思っちゃいますけど。

摩砂雪　そんなことないんじゃない。

鶴巻　ほら、使徒の精神攻撃のエピソードとか。

貞本　きっかけは２５一六話？

鶴巻　そうですね。

摩砂雪　マッキー、だって一六話では、もっとすごいことやろうって言ってたんだろ。でも歩留り考えて、出せなかった。だから映画でやってやるって。一六話でできなかったことをやってやるって。

貞本　なんで電車なの？

摩砂雪　いや、マッキーが好きなんだよ。

鶴巻　最初は庵野さんが、線だけでキャラが会話するってどう思うって、俺のところに聞きに来て。

摩砂雪　そうそう。それで画面に白いラインが流れて。皆、包帯が流れたって言ってたんだよね。あれね。

鶴巻　線だけで会話しようとしてたんだけど、さすがにテンションがもたないと思ったので。本当はもっと感じとしては２６『王立』のラストのイメージシーンがあるじゃないですか。あんな感じで、もうめくるめくような映像の渦の中で、自分の過去の記憶の中のいろんな人達が言葉をシンジに投げ掛けるのが、使徒との会話になっているみたいな感じの話にしたかったんですけれど、そんなの、とてもあの時点ではできない。

摩砂雪　でも庵野は、それ嫌がってさ。線の表現は天才的だって言ったんじゃない。自分で。こんなのやった奴いねえよって。

竹熊　線の表現をやろうって言ったのは、庵野さんですか。

摩砂雪　２７カリグラフみたいにして。

竹熊　ありますね。あの二人のシンジが会話する場面が。横線と縦線で。

貞本　だから２８線撮りがそのまま流れてると見せかけて、横線が出て来るところで、業界人はエッとなるという。線撮りにとうとうなっちゃった～とか思わせといて。実は、っていう（笑）。





［自殺願望（２）]





大泉　最後にもうひとついいですか。

貞本　また綾波ですか（笑）。

大泉　綾波の話で恐縮なんですけど（爆笑）。

佐藤　ここぞとばかりという感じですね。

大泉　あの二四話の時に、ああ、やっぱり綾波、宙を飛んでたなということなんですが。

摩砂雪　まあ飛んでる絵は出さないんですけれどもね。飛ばなきゃ、あそこまで来れないでしょう。

大泉　飛んでたなというのがあって、ああ、やっぱり彼女は人間じゃなかったのかというので、納得したんですけれど。僕、貞本さんのマンガ読んでると、貞本さんのマンガの綾波は、人間にしか見えないんですよ。どうすんのかなと思って。

貞本　それは違う話なんです。僕のは人間ですよ。だから綾波を人間にしてくださいと、延々と庵野さんには言ってたんですけれどもね。

摩砂雪　でも死ぬ綾波は、たぶんあれだと思うよ。一番人間に近づいた使徒なんだよ。

貞本　死んじゃった方ね。

摩砂雪　うん。死んじゃった方。あそこであっさりポンと切っちゃって。

佐藤　リセットされちゃったからね。

貞本　ゲンドウに対してのレイの接し方がちょっと変わって来るとか、そういうのを描ける余裕が全然ないのをわかっていながら、あそこでレイを殺すのは、僕には理解できなくて。

鶴巻　だから僕は、反対したんですよ。あそこでレイ殺すのは。そのあと２９三人目のレイは二人目と違うというシチュエーションでちゃんと描けるのであれば、その余裕があるのであれば、いいですけれど。それで結局、なんのフォローもしていないですよね。涙が出るぐらいで。

大泉　僕はそれで、じゃあ３０コアがこっちのレイへ入ったから、その記憶が残って、涙が出たのかなと思ったんですよ。

摩砂雪　でも、コアじゃないけど、レイの記憶っていうのは、もう３１ダミープラグで延々残っているわけですよ。

大泉　ああ、プラグで残るんですか。

摩砂雪　そのたびに水槽にひたってるでしょう。３２飯食いに行こうって言った時の。

大泉　ああ、なるほど。

摩砂雪　あの周りが実は水槽で、そこにたくさんのレイ達が見てて、それのどれかの入れ物に、またその記憶が移植されている。

佐藤　バックアップを取ってるわけですね。ハードから。

大泉　そこまでは頭が回りませんでした。

摩砂雪　レイは、本当にリツコが言う通りの入れ物なんですよ。

鶴巻　魂は一つしかなくて。

摩砂雪　そう、魂は一つしかない。ただ記憶は一つしかないけど、感情というものは、また違うものじゃないですか。そういう感覚でやってたから、三人目のレイは……。

貞本　オリジナルがどんどん薄まって行っちゃう。ちょっとずれて来る。

大泉　ああ、なるほど。分かりました。非常に。あと、二五話か二六話のどっちか忘れましたけれど、綾波が自殺願望を告白しますよね。「私は無に帰りたい」と。

佐藤　死にたいというところね。

大泉　死にたいのに、あの人（ゲンドウ）が死なせてくれないと。そしたらゲンドウがいきなりバコッと出て来て、「お前は今日のためにあったのだ」と言うと、「はい」って立ち上がって、どこかへ行く。

佐藤　あれは二五話。そこから３３人類補完計画が。

摩砂雪　あれはまた映画で描かれるんです。

竹熊　ああ、そうなのか。

大泉　それでその自殺願望なんですけど、要するにレイは自分の一番無意識のキャラクターなんだと言われると、やはり庵野さんというのは、無意識的に自殺願望のある人なのかなと。

摩砂雪　あれはねえ、絶対に自分じゃあ死ねない人間なんですよ（爆笑）。

竹熊　そんなこと言ってたら、意地になって死んじゃうかも。

摩砂雪　いや、本当にだから、俺なんかより山賀とか赤井先生なんかの方が、「なぜその時死なん！」なんて言えるんだよね。本当に庵野のことを知ってるから。

大泉　なるほど。

摩砂雪　お前は絶対死ねねえだろうみたいな。

鶴巻　僕の知り合いでも、本当に自殺した人は、「死にたい」なんて言わなかったですよ。

大泉　言わないよね。

摩砂雪　言う奴っていうのは、まだ救いがあるってことですよね。

貞本　いや、まあそういう人が友達にいてですね。単純にかっこいいと思っただけだと思いますよ（笑）。

鶴巻　『ナディア』の時にも、３４前田真宏さんともめたじゃないですか。『ナディア』が自殺するところを、前田さんが「俺は描けん」と言って、でも「どうしても飛び降りてくれ」みたいな感じで。

佐藤　さんざん言ってましたね。

河田　じゃあレイというのは、庵野さんから見た、自殺することができる人？

竹熊　実際、自爆してるよね。

大泉　自爆してますね。

貞本　レイというのは、要するにアダムの意識が入ってる。死にたかったんじゃないですか。ユイも死にたかったんですから。死んじゃったわけですから。死にたくて、一回死んだのを、この世に復活させたのは、ゲンドウだから。

佐藤　まあ、そういう意味では、他人の意見を気にする人やから、あれだけ大勢のお客さんから悪口言われたら、やっぱりアカンかったのかなと思いますね。今言うのもなんですが。電車に飛び込みたくなったのは、ほんまかなあとは思いますね。

摩砂雪　いや、やってみたらどうかなって思っただけなんじゃないの。

佐藤　精神病院行きたいぞとかですね。

摩砂雪　一応、診察に行ったんでしょう。どうしようかって相談しに来るから、「じゃ、行ってみれば」って。

佐藤　「はい、これ電話帳」と渡しました（笑）。

摩砂雪　だからそんなの、なんで人に意見求めるの？　みたいな感じで（笑）。それで病院行ったら、（医者が）俺よりバカだったから、もういいやって（笑）。

佐藤　本で読んだ通りのこと言われたらしいんですよ。

摩砂雪　次、何言うかわかるから、もういいとか言ってね。

竹熊　もらった薬飲んでも、気持ちよくなんないとか言って。そんなん、なるわけない。

貞本　最高の薬は、宮崎さんから電話かかってきたらしくて。その時、休めって言われたんだよね。「お前は、もう休んでもいい。半年仕事しなくてもいい」とか言われた時に、嬉しそうに僕のところに報告しにきました（笑）。





［終りに]





竹熊　一応この本のタイトルは『スキゾ・エヴァンゲリオン』と『パラノ・エヴァンゲリオン』にしたいと庵野さんが言ってきたんですけど、これ、摩砂雪さんが言い出したんですか？

摩砂雪　何が？

鶴巻　映画をそういうタイトルにしたら、と僕が言ったのを。

竹熊　ああ、鶴巻さんか。

鶴巻　『死と再生』って、なんか中学生っぽかったんで、ちょっと嫌だった。あんまり直截すぎて嫌だったんで。もうちょっとひねった方が。でも、あれが庵野さんかということですね。

摩砂雪　いや、いいんじゃない？　あいつのプライヴェートフィルムだもん（笑）。

貞本　あとが本当になくなっちゃうと思うよ。劇場版なんてやらずにあのままほっといた方が、寸止めの感じでよかったのに。ずっと長くやって欲しいなあ。人ごとながら。

摩砂雪　お貞もずるいなあ。

竹熊　いや、本日はものすごくディープな話が出まして、すごい座談会になったと思います。ただ、ちょっとまずい話も（笑）。大月さん、スポンサーとしてはどうですか、今日の話は。

大月　いや、もう売るつもりないから（笑）。

一同　（爆笑）

佐藤　今のも、ちゃんと入れとかなあかんね。

摩砂雪　俺なんか、早く解放されたいよ（笑）。庵野、今、次の話しかしないもんね。次の、こういう企画なんだって。こういうアニメを作りたいって。

鶴巻　二六話終わったら、今度はこれやるんだって。

摩砂雪　そうそう。一応、二五、二六話の打ち合せしてたらさ、（『エヴァ』と関係ない話してるんで）なんなんですか、それって。

竹熊　そういうこと言うんだったら、自殺しないですな。

大泉　みなさんのお話で庵野幻想がふっとびました。どうも本日はありがとうございました。





１

本座談会は『新世紀エヴァンゲリオン』のメインスタッフによる、「庵野秀明欠席裁判」の後編である。前編は本書と同時刊行の『庵野秀明・スキゾエヴァンゲリオン』に収録されている。あわせてお読みいただきたい。





２

アルカディア号とは、『宇宙海賊キャプテンハーロック』（松本零士・作）で、主人公ハーロックと仲間たちが乗る海賊宇宙戦艦。その中枢である大コンピューターには、建造者でありハーロックの親友だった大山トチローの心が移植されている。





３

テレビ放映の半年前から現在まで『少年エース』（角川書店）誌上で連載中の、貞本氏によるマンガ版『新世紀エヴァンゲリオン』。アニメ版に比べ、シンジの性格がやや積極的だったりと、作品カラーやストーリー展開も庵野エヴァとは違った落ち着いた肌触り。貞本氏の体質を反映した、「もうひとつのエヴァ」といった趣。





４

五話の冒頭、エヴァ零号機が起動実験中に暴走し、パイロットのレイが危険な状態になったとき、ゲンドウが加熱したハッチを素手でこじあけてレイを救出した。その際、壊れて歪んだゲンドウの眼鏡を、レイはゲンドウとの絆として大事に持っていた。





５

第一話で、エヴァに乗せられそうになったシンジが呟く「逃げちゃダメだ。逃げちゃダメだ……」というモノローグ。まだシンジの性格的な背景が描かれていなかったためもあり、ミサトの「シンジ君。何のためにここに来たの？」といったセリフと共に、その強迫的な葛藤の在り方が多少唐突に感じられた。庵野監督自身の気分・テーマが、説明なしでフライングしてしまったような印象だ。マンガ版にはこのセリフはなく、シンジの態度の〝投げやり〟さが強調されている。





６

九一年に終了した『ナディア』から九五年の『エヴァンゲリオン』までの、庵野監督のブランクのこと。ただし実際には形にならなかっただけで、この間さまざまな企画や作品に関係しており、まったくのブランクであったわけではない。





７

『ふしぎの海のナディア』最終回。

敵ネオアトランティスの母船レッドノアでの最終決戦の後、ナディアの父ネモ艦長は、最後に一言「生きろ」と言い残し、自ら犠牲となって主人公たちの脱出の血路を開く。このシーンをはじめ『ナディア』には、庵野監督の自殺や生死に対する、性急かつナイーブな思い入れが反映された描写が多く見られる。





８

幼い頃のミサトは、家庭内の人間関係に不器用で仕事に逃げてばかりだった父親が嫌いだった。しかしセカンドインパクトの最中、その父親は自らの命と引き換えにミサトの命を救う。この結果ミサトはアンビバレンツなファザーコンプレックスに陥り、成長してもなお、恋人にその感情を向けてしまう自分を嫌悪している。





９

リツコの母・赤木ナオコは、ゲンドウへの恋に破れ、自殺した。自ら「潔癖症」と語るリツコは、そんな母親の生々しい〝女〟の部分を嫌っていたはずが、いつか自身も、同じ男へのかなわぬ恋にのめり込んでいく。





１０

藤島康介の同名マンガ（月刊アフタヌーン連載）を原作とするＯＶＡシリーズ。平凡な少年が、ひょんなことから女神と暮らすことになり……という、ラブコメ・ファンタジーの王道をゆく作品。





１１

『エースをねらえ』の宗方コーチのごとく、『トップをねらえ！』の主人公ノリコをシゴきまくり、努力と根性を叩き込んだ太田コウイチロウコーチのこと。





１２

一九・二〇話において、エヴァに強くシンクロし過ぎた（シンクロ率４００％）シンジは、エヴァと一体化し、エントリープラグ内を満たす羊水状の液体（ＬＣＬ）に溶け込んで、肉体の輪郭を失ってしまう。





１３

一五話でミサトは恋人の加持に対し、こう心情を吐露する。「父を憎んでいた私が父に良く似た人を好きになる。すべてをふっきるつもりでネルフを選んだけれど……でもそれも父のいた組織。結局使徒に復讐することでみんなゴマかしてきたんだわ。その上こうやって、都合のいいときだけ男にすがろうとする、ズルい女なのよ。」





１４

『ふしぎの海のナディア』に登場する、世界支配を企む組織「ネオ・アトランティス」の指導者。

庵野監督は当時、「ナディアの登場人物中いちばん自分の人格が出ている」といった発言をしている。

声の清川元夢氏は、特撮物の悪役を多く演じた、監督憧れの声優。





１５

アニメ世代が初めて作り手にまわった『超時空要塞マクロス』あたりから、アイドルファンがアイドルに対するような性的思い入れをアニメキャラにそのまま込めるような、フェチ的傾向があらわれはじめた。

その背景として『マクロス』が生み出された八〇年代前半という時代は、それ以前の『ガンダム』のように、「社会と関わりながら個人が成長していく」というテーマが薄れていったことがあげられる。

良くも悪くも、社会によって自分の在り方が規定されているという実感が薄れ、結果、消費生活の中での自分たちの感覚に開き直ったような、フェチ趣味や恋愛至上主義的な作風が表面化した。

しかし『マクロス』のヒロインであるリン・ミンメイは、主人公をアッシーにつかうといった、わがままで甘え上手な現代的な女性像を体現してそれなりに生臭いインパクトを放っており、昨今よく見られる、男性に都合のいいイメージだけを追及した人工的なアニメキャラとはまた違った印象だった。





１６

ナディアが先祖から受け継ぐ謎の宝石「ブルーウォーター」を狙う、グランディス、サンソン、ハンソンの泥棒一味。『タイムボカンシリーズ』の悪役「三バカトリオ」へのオマージュ的なキャラクターである。物語途中からナディアたちと行動を共にするようになり、彼女らの相談相手として、庵野監督の人生観をセリフに託されるようになっていった。





１７

二〇話では、安ホテルの鏡に写るベッドの映像にかぶって、加持と抱き合うミサトの喘ぎ声が一分間に渡って続くシーンが放映された。放映時間が放映時間だっただけに（夕方六時半）、テレビ東京には視聴者の抗議が殺到した。





１８

ガンダムの一話では、日常生活に無頓着で子供っぽい主人公アムロにしきりと世話を焼く幼なじみの女の子として、フラウ・ボウが描かれている。当時のドラマではありがちな設定だったのだろうが、今となっては懐かしい感じのする人間関係の肌触りだ。アムロは、隣人であったフラウの家族の死に逆上し、ガンダムに乗る。





１９

富野由悠季監督の『Ｖガンダム』では、当初一話として放映される予定だったエピソードで主人公がガンダムに乗らないため、四話として制作された回が一話として放映された。スポンサーサイドを配慮してのことか、詳しい事情はわからないが、ストーリーの流れに混乱を招き、非常にわかりにくいものになってしまった。





２０

五・六話では、前半の山場「ヤシマ作戦」を背景に、レイのキャラクターとシンジとの関係の発端が描かれた。自分だけがエヴァに乗って怖い思いをする理不尽に、投げやりになるシンジ。ゲンドウとの関係をこの世との唯一の絆としてその命令に殉じ、平然と身を投げ出してシンジの盾になるレイ。

レイの身を案じ涙を流すシンジ。

それを見て、自分の心に起こった波立ちに戸惑うレイ。

「ごめんなさい、こういう時、どんな顔すればいいのか、わからないの」

「笑えばいいと思うよ」

二人の間に芽生えた新たな関係性の物語が、二人の心をかたちづくる瞬間だ。





２１

父親であり、ネルフ司令官でもあるゲンドウの冷酷な命令によってクラスメイトのトウジを傷つけられ、怒ったシンジ。彼はそれまで向かい合うことから逃げていたゲンドウを初めて自分の意思で拒絶し、エヴァを降りる。しかしその直後、過去最強の第一四使徒が襲来した。ネルフの人々の絶望的な戦いを目の当たりにし、また加持の「自分が今、なにをすべきなのか。後悔のないようにな」という言葉によって、シンジは意思的に状況を引き受け、再びエヴァに乗る。





２２

ドイツ系クォーターのアスカを演じるため、声優の宮村優子は「駅前留学」したらしい。





２３

ミサト役を演じた人気声優。現在の声優ブームの立て役者の一人。

代表作は『美少女戦士セーラームーン』シリーズの月野うさぎなど。





２４

二五話では、シンジに続いてアスカ・レイ・ミサトのトラウマも暴かれたが、シンジ以外は結末が描かれずじまいとなった。





２５

使徒の体内に取り込まれたシンジが、幻想の電車内で〝もう一人の自分〟と対話するエピソード。実験的な映像（人物を画面に横切る線に象徴させ、線同士が会話する）も試みられた。





２６

山賀博之監督『王立宇宙軍』で、人工衛星で宇宙に打ち上げられた主人公シロツグは、地平線から昇る太陽の光を浴び、人類の欲望が繰り返し生み出してきた愚かで偉大な歴史と、そこに刻まれた膨大な喜怒哀楽の物語に思いを馳せる。

彼が脳裏にフラッシュバックさせていくイメージが、めくるめく映像で数分間に渡り描かれた。





２７

カナダのアニメ作家ノーマン・マクラレンによって考案された、フィルムに直接傷を付けたり着色したりする技法。シネカリグラフ。

かつてアマチュアの特撮映画などでは、シネカリ光線が多用された。





２８

フィルムが間に合わないアテレコのとき、登場人物をただ線のみで描いた仮のフィルムが作成される。

声優はこの線に向かって自分の声を入れ、これを線撮りと称する。





２９

クローン（？）人間であるレイは、一つの個体が死んでも、記憶とデータはダミープラグに記憶され、別の個体に受け継がれていく。シンジと心を通わせ始めていたレイは、リツコの母・赤木ナオコ博士に殺されたレイに続く二人目であり、二三話で使徒と共に自爆し死亡した。それ以降のレイは三人目になる。





３０

すべての使徒が持ち、その心臓部と思われる光球。





３１

レイの記憶とパーソナルデータを移植された、人の思考を真似る機械。人が乗り込み、エヴァの心となるエントリープラグの代用品。

一八話では、その凶暴な性質が露わになった。





３２

一七話で、裸で巨大な試験管のような水槽に入り、ダミーシステムに記憶を移植中のレイと、それを見詰めるゲンドウの会話。

「レイ、あがっていいぞ」

「ハイ」

「食事にしよう」

いつになく穏やかな表情のゲンドウと、レイの微笑み。あやしい想像が膨らむシーンだ。





３３

ネルフとその上部組織であるゼーレにとって、使徒迎撃が表の目的とすれば、人類補完計画はそれを利用しながら秘密裏に進める真の最終目標と言えるのではないか。

「死海文書」の記述に沿って進められているというゼーレにとってのそれは、南極で発見した（？）第一使徒アダムを利用して何らかの方法で「神」を創る、あるいは人類が神となる計画であるようだ。

しかしゲンドウにとっては、表向きゼーレの任務遂行を装いながら、個々に別れた人間の心を一つにまとめその孤独を埋めあうという別の〝補完〟を企てているらしい。





３４

六三年鳥取生まれ。代表作は、ビデオクリップ『ギタリズム』監督、『ふしぎの海のナディア』設定デザイン、演出、絵コンテなど。





　　　０



【注意】以下の文章がよくわからない読者は「ロック」を「アニメ」、「音楽事務所」を「ＧＡＩＮＡＸ」、「ライブ『福音』」を「エヴァンゲリオン」と読み替えてみること。ただしそれが正解か否かは保証の限りではありませんので、悪しからず。

　　　１



　ここにひとつのロックバンドがある。

　もとはといえば大学の文化祭用に結成された同級生バンドなのだが、メンバー全員に才能があり、当然、文化祭では大受け。その勢いで地元のライブハウスに出演したらこれもバカ受けで、あれよあれよとインディーズのトップグループに成長してしまった。

　これは〝いいだしっぺ〟の男の、プロデュース能力による部分が大きい。彼も同じロック好きの学生なのだが、なぜか自分では楽器を持たず、才能のある仲間を集めてはプロデュースすることに生きがいを感じるという変わった男だった。初期ビートルズのマネージャーで〝５人目のビートルズ〟とまで呼ばれたブライアン・エプスタインの役割に近い……といえば、わかる奴にはわかるだろう。

　この男の尽力で、ライブハウスとの交渉も最初から有利な条件で進み、結成後一年もする頃には、都会の有名ライブハウスから出演依頼が舞い込むというありさまだった。アマチュアとはいえ最初から有能なプロデューサー込みで出発したわけだから、そこらのバンドが束になったってかなうわけがない。

　実際この男が集めた学生たちの才能は群を抜いていた。メンバー全員が古今東西のあらゆる音楽に精通しており、それらのおいしい部分をサンプリングし、カットアップして、入念なアレンジを施したうえで作品に仕上げる。メンバーのありあまるテクニックとセンスが、作品を単なるパクリ以上のものにしていた。実際、彼らが何かをパクればパクるほどファンは喜び、元ネタ探しに熱中した。ネタが割れても人気に影響はない。なぜなら彼らの作る曲は、間違いなく元ネタ以上に面白かったのだから。

　　　２



　彼らは確信犯だった。「所詮パクリじゃんかよ」と陰口を叩かれても気にしなかった。それどころか陰口を叩く奴を心の底で軽蔑さえした。なぜなら陰口男が作っている曲だって、子供時代に影響されたミュージシャンの稚拙なパクリだったからだ。周囲を見渡すとそんな連中ばっかしだ。しかもたちの悪いことに、そういう奴らに限って自分の作品が無意識のパクリであることに気づかず、あくまでもオリジナルだと信じているのだ。なんと度し難い愚かな連中だろう。

　彼らは思う。もはやこの世にオリジナルなんて存在しないのだと。あらゆる音楽はすでに作曲し尽くされ、演奏し尽くしされたのだ。われわれは少しばかり遅く生まれすぎたかもしれない。でも嘆いてみても仕方がないことだ。

　昔と違って演奏や録音技術は比べものにならぬほど進歩している。あとはセンスさえあれば、コピー以上のコピーにすることも可能ではないのか。彼らが賭ける一点がそこだった。見果てぬオリジナルの幻想を追うより、その方が現実的だし、なによりも楽しいではないか。

　インディー時代に彼らは数枚のアルバムを発表し、ショップのインディー・コーナーで記録的な売り上げを達成した。売り上げは次の作品に惜しみなく注ぎこまれ、それがさらに作品のクォリティを上げていく。実際のところこれだけ稼いだインディーバンドは空前絶後かもしれない。

　　　３



　こんな彼らを業界が放っておくわけがない。あちこちの音楽事務所からプロデビューの誘いがもたらされた。しかし彼らの決断は業界を驚かせるに充分だった。なんと彼らは全ての誘いを断ると、自主ＣＤの売上げをもとに自分たち専門の音楽事務所を設立し、大手レコード会社と直で交渉を始めたのだ。もちろん事務所の社長は〝いいだしっぺ〟のあの男である。

　いったいこの男の交渉がどれだけ見事なものだったか、当事者以外には知るよしもないが、ともあれ彼らのプロ・デビュー作品は、まさに空前絶後の破天荒なやり方で姿を現わしたのだった。

　ファーストＣＤには通常の音楽製作の一〇倍の予算が計上され、いきなり日米同時発売という暴挙に出たのである。アメリカでは大ヒットまではいかなかったものの、かなりの賞賛を持って迎えられた。国内の衝撃はそれ以上だった。彼らはたちまち日本のトップグループへと踊り出たのだ。

　ファーストＣＤ『翼』は、生きる目標のないシラケ切った若者が、自らの存在を確認するために人類最初の宇宙飛行士になる物語をベースにした一大ロック・オペラだ。主人公が宇宙に出る理由なんて実は存在しない。彼は生きることに飽き飽きしていた。そうして最後には「飽きることにも飽きた」のだった。だから宇宙飛行士になった。なんでもいい、普通の人間にはできないデカイ事をすれば、この煉れん獄ごくのような倦怠から免れるかもしれないから。

　この主人公が、実は作詞・作曲・演奏をしたメンバー各人の姿であることは明白である。昨日まで一介のインディー・バンドに過ぎなかった若者達が、いきなりロックの本場に殴り込みをかけ成功するというのは、確かに宇宙飛行に匹敵する快挙と言えるだろう。

　　　４



　実は、最初からメンバー全員には、ある「合意」があった。それは、空前のデビューをして最初に業界の頂点に立ったら、その瞬間にバンドも事務所も解散して「普通の一音楽ファン」に戻る、というものである。

　せっかく成功したのになんてことを、と思う人が大部分かもしれない。だが、それこそは究極の「アマチュア」たる彼らの美学だったのだ。

「だってプロになるなんて、そんなのカッコ悪いじゃないですか。生活のために音楽をやるなんて……。僕ら好きで音楽を始めたわけだし、それが生活のために音楽するとなったら、好きもキライもなくなっちゃうでしょ？　プロにとっての音楽はまずメシ食うためにあるんだからさ。ただ僕らの音楽はそこらのプロには絶対負けないって思いはあったし、事実その通りだったしね。ただインディーというだけで馬鹿にされるのもシャクだから、一度だけプロになってそいつらの鼻をあかしてやろうと。それで何事もなかったような顔してアマチュアに戻るの。こいつはカッコイイ！ってその時は思ってたんだけどね（笑）」

　メンバーのひとりが、後に筆者に語った回想である。

　　　５



　さて結論を先に言うならば、彼らは解散しなかった。いや正確には「できなかった」というのが正しい。

　やはりファースト作品に資金をかけすぎたのだ。もちろんかけただけのことはあった。『翼』の作品としてのクオリティは現在の水準から見てもトップクラスだし、それはポピュラー・ミュージック・シーンにおいては既に伝説である。しかし結果として借金が残ってしまったのも事実だった。

　億に近い額であり、彼らの実力をもってしても返済に数年は要するだろう。まあそれはそれで仕方がない。これもパーティの後始末だと思って、しばらくプロのふりを続けるのも悪くはないさ。

　彼らはその後『頂』や『海』といった作品を次々にリリースして大ヒットを飛ばした。最良のアマチュアリズムを武器とする彼らにとって、そこらのプロは初めから敵ではなかった。プロとはまず「生活」であるから、仕事にあたってはペース配分を第一に考える。しかし彼らの作品は常に全力疾走、しかも常に作りたいものしか作らないのだ。彼ら自身音楽ファンであるから、自分自身に素直に作ればそれはファンの求めるものと重なり、ゆえにヒットに繫つながるという好循環がそこに発生する。

　心はアマチュアのまま、凡百のプロを凌りよう駕がすること。これほど痛快なことがあるだろうか。こうした日々を送るうちに、解散の話もウヤムヤとなったのは、必然といえよう。

　だが、この頃から少しづつではあったが、メンバー間を言葉にならぬある種の違和感が包むようにもなっていたのだ。

　　　６



　思うにその矛盾は『翼』が完成した直後に発生していたのである。あれはなによりも「やることに意義がある」行為だった。だから「やること」をやってしまったら、すぐにも襲ってくるであろう退屈から逃れるために、次の「やること」を探さなければならない。

　繰り返すが、アマチュアは「好きなこと」しかできない。だから彼らも「好きなこと」しかやらなかった。才能のある奴が「好きなこと」をやるのだから、それは面白いに決まっている。

　しかしここに問題が発生する。人間は飽きる動物だからだ。たとえ「好きなこと」であっても、同じことを繰り返せばいつかは飽きてくるだろう。人間は成長し、変化するのだ。メンバー間の「好きなこと」だって時間が経てば微妙に違ってくるし、その差異を押し殺して当初からの行為を続けるとしたら、それでは彼らが否定した「プロ」と同じになってしまう。デビュー後数年経って、彼らはそうしたジレンマに陥ったのだ。

　そもそも彼らは「究極のコピー・バンド」としてデビューしていた。では、コピー・バンドがコピーに飽きたなら、何をやればいいのか。

　オリジナルをやるしかないではないか。

　しかし「オリジナルなんて存在しない」というのが彼らの出発点だったはずである。

　この矛盾は容易には解消できそうにもなかった。新作の企画は次々に上がっていたが、どれもメンバー全員を満足させるものではなかった。ジレンマに耐えかねて、メンバーがひとり、またひとりと去っていった。バンド結成のいいだしっぺだったかのプロデューサーにしてからが、もはや音楽でやることはなくなったと言い残して、事務所を去ってしまった。

　　　７



　最後まで残されたメンバーのひとりが、新しい「やること」を提案した。それは一見、これまで彼らが作ってきた作品とどこも違いはないように思えた。それはやはり過去のあらゆる作品のエッセンスを「これでもか」と凝縮したものだったからだ。

　しかしその男には確信があった。勝算はわからないが、少なくともそれは今の自分たちがやるべきことだという確信である。

　テーマは『福音』。神の縮小コピーとして生まれた人間が、今度は反対に神をコピーして、そのコピーによって神を倒すという、全曲一〇時間に及ぶ壮大なものだ。

　これを自分達がこれまでに獲得したあらゆる音楽知識と作詞作曲能力を駆使し、最高度の演奏技術でもって会場で「ライブ録音」する。しかも曲は途中までしか出来ておらず、後半はその場で考えながら即興で演奏するのだという。

　それはライブとはいえ、スタジオ録音並みのクォリティで演奏する。そんな音がライブで飛び出たら、観客はのけぞるだろう。

　誰もが無茶だと思った。だが発案者にとって無茶は百も承知だ。無茶だからこそやる意義があるのだ。演奏の途中で力尽きたら、その姿をそのまま観客に見せつけてやればいい。自分たちのそのみっともない姿こそが、まぎれもない「オリジナル」なのだから。

　　　８



　ファンの期待を一心に背負ってライブ『福音』は始まった。前半は熱狂の渦だった。まさにそれは過去の彼らのエッセンスが夢のようなクォリティで繰り広げられていたからだ。

　観客は、まさか彼らが後半即興でやるとは思ってもいない。メンバーは必死で演奏し心の不安を押し潰した。なにしろ裏ではリーダーが時々舞台のソデに引っ込んでは、次に演奏する曲の詞やフレーズを死にもの狂いで考えるという常軌を逸した光景が展開しているのだ。

　五時間ほど経過したあたりで、観客も事態の異様さに気がつき始めた。メンバーはぶっ通しの演奏に疲労困憊だ。客だって疲れている。なのに休憩が入る気配がない。ステージ進行も変だ。あの曲はさっきもやったぞ。アンコールでもないのにどうしたわけだ。前奏が長過ぎる。この曲なんて間奏が三〇分あって、その間リーダーがどこかに行ってしまった。あれ。出てきたと思ったらメンバー全員に楽譜を渡したぞ。どうなってんだこのライブは？

　演奏のクォリティは落ちる一方だが、テンションは上がる一方で目が離せない。何かとんでもないものを俺たちは見ているのかもしれない。

　ギターの弦がぶち切れた。キーボードが仰向けにぶっ倒れて失神した。ドラムのスティックが折れて仕方なく素手で叩いている。両手が血まみれだ。それでも誰も演奏をやめない。これはもうライブなんてもんじゃない。こいつらみんなキチガイだ！

　ついにステージは演奏不能の状態に陥った。楽器がほぼ使用不可能となり、あらかたのメンバーが力つきて失神したからだ。会場の電源がショートして、マイクすら通らない。ステージでは熱気で衣裳をかなぐり捨てたリーダーが全裸で歌っている。いやあれは歌ではない。ただマントラのように「逃げちゃだめだ！」と叫んでいるのだ。

　逃げちゃだめだ逃げちゃだめだ逃げちゃだめだ逃げちゃだめだ逃げちゃだめだ……。

　ブーイングが起きて客が次々と帰り始める。それでもリーダーは叫ぶことをやめない。残った観客は、ただただ唖然としてその光景を見守るのみ。

　やがてリーダーもその場に崩れ落ち、そのままステージは終了した………。





　私にとって『新世紀エヴァンゲリオン』というアニメは、要するにこういう作品です。

            // Backspaceキーが押され、入力バーが空の時に前のページへ
            if (e.key === 'Backspace') {
                if (inputBox.value === '') {
                    if (currentPage > 0) {
                        currentPage--;
                        displayPage(currentPage);
                    }
                }
            }
        });

        // ページ読み込み時の初期化処理
        function init() {
            chunkText();
            displayPage(currentPage);
            inputBox.focus();
        }

        // 実行
        init();

    </script>
</body>
</html>
