大月　それでロボット物をやりたいと。だからウルトラマンが鎧着たやつとかいう話は、もうその頃からしてたですね。

竹熊　ウルトラマンが鎧着て（笑）。

貞本　企画自体は『ウル』の一年ぐらい前にあったんですよね。

摩砂雪　『ウル』の前にあったでしょう？　『エヴァ』の元になる企画が。

鶴巻　最初は『トップをねらえ！』のマシン兵器みたいなロボットだったから。

摩砂雪　それでなんか女の子が中に……という話だったけど。

貞本　２６『イクサー１』みたいなやつだったよ。

佐藤　九一年～九三年までに、（企画が）たくさんあったんですよ。

貞本　そうそう。岡田さんは別に企画を出してたのですが庵野さんは、実はこういうのをやりたいんだって言って、『トップをねらえ！』より、ちょっとドロドロした感じのやつを出して。でも、誰もそれに食いつかなかったんです。どういう作品なのかと聞いたらちゃんと説明できなかったもんだから（笑）。

竹熊　じゃあ固まってなかったわけですね。作品全体のイメージが。

鶴巻　そうですね。庵野さん、ビジュアル・イメージ優先で入っていくから。

摩砂雪　でも、あの当時、第二東京市とか言ってなかった？　それが長野にあってっていう。八ヶ岳を中心にして、環状線が回ってる都市があって……。

鶴巻　山の上から超高層ビルがのぞいてるとか、ロボットがでっかい電池を背負ってるとか、コードをいつもひきずっているとか、そういうビジュアルから入っていっちゃって。それで貞本さんが「どういう話なの？」っていうと、話は全然考えていません（笑）。

佐藤　コックピットに液体が入ってて、中で女の子がゴボゴボ、こんなチューブつけてるいうのを見ました。

竹熊　ああ、レイの原型みたいな。

佐藤　そうそう。最初、そういう絵をホワイトボードに描くんですよ。それで「これはなんか、ええことがあるんですか」と言うと、「俺にそんなこと聞くな」と（笑）。

貞本　こういう試験管に女の子がただ入ってて、ボコボコしてて。それが操縦席とかって言って。

佐藤　それがオリジナルビデオの企画だったから、岡田さん達との案では、女の子が主人公で、言わば『トップをねらえ！』のお姉さまと、ノリコと、そういう組み合わせみたいなのが、また新しくできないか？　みたいな話を、するわけです。それから『オリンピア』とか、いろいろ企画が順に上がっていって。ボードが先行するのもあれば、アイデアが先行するのもあってみたいな感じで。少し発表したものもありました。

竹熊　なかなか形としては、固まらなかった。

佐藤　そうですわ。

貞本　それで全部なくなった時に、庵野さんが、最初に自分が出したやつを持ってきて。一年ぐらいたってから、人にそれを説明できるようになって。

竹熊　それは山賀さんなんかと、全然違うでしょう。その辺の作り方というか。

貞本　そうですね。

大泉　山賀さんの場合はコンセプトから入る。

摩砂雪　理論的だよね。

貞本　山賀さんの考え方は、僕すごくよくわかるんです。同じ作り方をするんで。

竹熊　逆に言うと、庵野さんはとにかく理屈抜きで、強烈なビジュアルの印象から入っていく。

貞本　食いつきはいいですね。

竹熊　華があるわけですよね。

佐藤　ああ、これかというのを先にポンと出しちゃいますから。

鶴巻　ただ山賀さんの『ウル』は、全貌が見えづらかった。『王立』は参加していないからわからないですけど、『ウル』は参加していて、まったく全貌が見えてこないわけですよ。どういう作品なのかが、僕にはまったくわからないっていうのがあるんです。庵野さんの場合は、要するにコードを引っ張っているロボットがビル街で戦うのはわかるんですが。

貞本　俺は逆。俺は『ウル』の方がわかる。

竹熊　それはもう資質の差ですね。

貞本　（山賀とは）パッと話したらピンとくるもん。作品のカラーみたいなものが。逆に『エヴァ』は、ロボットがコード引いてると。でもそれってビジュアルだけでしょ。それは『イクサー１』のワンシーンでもいいし、『マドックス01』のワンシーンにもはまるし、どんな作品のワンシーンでもはまるじゃないですか。

竹熊　絵として。

貞本　でもそれだけでは『エヴァンゲリオン』っていう作品全体のカラーが見えないから。主人公はどういうキャラクターかと聞いていくと、結局『トップをねらえ！』だしなあ。だから庵野さんの頭の中のイメージが断片的だから、作品そのものの色とか匂いがわからないんですよ。

竹熊　でもそこのところで庵野さんは、ちゃんと悩んだわけですよね。

貞本　悩んだというよりも、庵野さん、そこの部分は、皆で考えてくださいって（笑）。

佐藤　良くも悪くも本編にもそのまま出てますよね。

貞本　だから企画立ち上げの頃の会議って、じっと黙って聞いてるから、「庵野さん、どう思うんですか」って尋ねると、「いや、俺は聞く立場だから」って。皆がしゃべっているのを聞いて、答えを見つけ出す。『ウル』の場合もそうでしたね。

鶴巻　ウルの前もそうだったんでしょう。『エヴァ』の場合も、山賀さんとか赤井さんとか貞本さんとかいるところでは、なんにもしゃべらないで。

竹熊　それで大月さんね、ちょっと大月さんに振りたいんですけれども（笑）。そこのところで、庵野さんがイメージを出されたわけですよね。それで大月さんは、どんなふうにお感じになったか。

大月　ああ。あの時、チョコチョコ、チョコチョコ、抽象的な話と具体的な話と、お前は本当にダメでバカな奴だっていうのを、延々あの時に言われて、考え直せと、その根性を叩きなおせと言われて。庵野さんに、さんざんお説教されまして。

竹熊　庵野さんに、大月さんがですか？

大月　ええ。それで庵野さんが「ちょっと待って、今度、企画書作ってくるから」って言って。しばらく音沙汰なかったから、ああ、俺は捨てられたなと思ったんですよ。よそでやっちゃうのかなと思ってて。そしたら連絡がありまして、企画書持ってきたんですけど、そしたらそこに貞本さんの絵が一杯描いてある。最初のイメージボードみたいなのが。

　それを持ってきて、その時はまだコピーとかいただけなくて、「見せるだけ」と言って、見せてくれたんですね（笑）。それでこれは、はっきり言って、変な言葉ですけれど、「ああ、モノになるな」と。

竹熊　モノになる。

大月　モノになるなと。

佐藤　いわゆる、イケテるっていうことですか。

大月　イケテるなと。庵野さんも、これでイケるかって聞いてくるので、ＯＫだと。それで庵野さんは企画書作りをどんどんやっていって、私は現場探しですね。『エヴァ』の作画とかを受注してくれる会社を探したわけです。テレビでやろうと。一本あたりいくらで、どうのこうのと。ところがね、現場が、ことごとく受けてくれなかった（笑）。

摩砂雪　内容は充実していても実際は大変なこともやってるわけだし、しかも売れないのが目に見えてるからでしょう（笑）。

佐藤　売れる、売れないはあまり関係ないですよね。良くも悪くもナディア・ショックみたいなのがあったでしょう。あそこ（ガイナ）の仕事は大変だというウワサですね。

鶴巻　制作会社にしてみたら、自転車操業で、とりあえず作品作ってなきゃいけないんだから。

摩砂雪　だからお金にならない。

大月　それでまあ私もいろいろ粘って。そしたら一社だけ、名乗りをあげてくださったのが、２７タツノコプロ。タツノコの植田さんが、ＳＦオタクだったので、是非やりたいって。「会社を説得するから」って言ってくれて。

竹熊　ああ、それでタツノコが。

大月　要するにタツノコ自体が、よくわかってなかったんですね。ガイナさんのことを（笑）。

竹熊　ああ、どんなに大変なことになるか（笑）。

大月　どんなことになるかを。タツノコの植田さん、会社を騙しちゃったわけですよ。それで打ち合せに入って。そしたら今度は庵野さんの方がなんだかゴネはじめた（笑）。

摩砂雪　あの『マクロス』でね、あの会社の内情を知ってたからね。

貞本　入口がタツノコなんですね。

竹熊　ああそうだ。『マクロス』もタツノコだったからね。

摩砂雪　それでああいうような感じになっちゃうんじゃないかっていう感じで、俺にも言ってたの、「極力そういうの避けるから」って。

鶴巻　でもどこか出てました？　タツノコ以外に。

摩砂雪　あと葦プロかなんか。

大月　だから本当はＩＧにも頼みました。

貞本　ああ、そうですね。

摩砂雪　初め言ってたもんね。ＩＧとタツノコになったんだ。

竹熊　ＩＧさんっていうのも、なかなか厳しい会社なんでしょう。

大月　いろいろキビシイですよ。あそこの社長は。

竹熊　載せられないじゃないですか。そんなこと言っても（笑）。じゃあその辺を大月さんは、苦労されたと。

大月　苦労してね。あとそれと、タツノコと言っても、中核でベガさんが入りました。ベガエンタテイメントっていう新しい会社で。ホントによくやってくださったと思ってます。

　それでその頃、２８『ヤマトタケル』も私やってたんですよ。企画とか設定とか。アニメの。東宝のタイアップの。その『ヤマトタケル』の二話が、けっこういい話でして。ベガがやるとこうなるって言って、あの時点でのベガの最高傑作。山本さんのコンテと演出で『ヤマトタケル』の二話。

　その頃、私は他にタツノコで２９『テッカマン・ブレード２』とかのＯＶＡやってて……。

貞本　これぐらいのクオリティの会社だっていうので見せたら……。

竹熊　それなのにゴネるわけですか。しようがないね（笑）。

大泉　駄々っ子だね。まるで。

大月　やってみないとわかんないからって言って、それで行って、その場で、俺、机引っ繰り返すかもしんねえって言ったから、とりあえず会うだけ会えって言って、タツノコの植田さんと庵野さんを引き合わせたんですよ。

　それであとで植田さんから、「いや、なかなかいい話進んだよ」って言って。大丈夫かって聞いて、やってみないとわかんないけど、とりあえずいいやって話になって。手を打って。

竹熊　じゃあ、庵野さんも納得したわけですね。

貞本　最初、皆いまみたいにガイナックスとして参加するんじゃなくて、皆引き連れて、その会社に入るっていうイメージでしたからね。だからガイナで制作するんじゃなくて、知り合いの人間だけ集めて、その会社に制作拠点を持って行くって、そういう考え方をしてたから、母体はすごく大事と思ってたんじゃないですか。

佐藤　原作をガイナでやって、外受けのチームでまるごと抜けるっていうか、その枠ごとで出向していくようなスタイル。

摩砂雪　『ナディア』もそうだもんね。タックに任せて、一応ガイナが母体なんだけど制作母体はあくまでタックで。

佐藤　あれはタックから来た、うちが下請けなんですけど。

摩砂雪　タックから発注されて、下請けなんだけど、でも一応タックには制作的なことをやらせといて、うちがメインでやるっていう。

佐藤　あれはうちの制作管理能力が弱いので……。

摩砂雪　いまだにないから（笑）。

貞本　だからＩＧにした方がいいかなと……。

大月　会議らしい会議って、『エヴァンゲリオン』でやったのは、一回きりだな。ガイナで。

竹熊　庵野さんと大月さんとの個人的な話し合いみたいなものが、メインでずっと行ったわけですか。

大月　あとはだからいつも、庵野さんがガイナさんの代表で、貞本さんや摩砂雪さんや鶴巻さんや佐藤さんとどういう話をしてるのか、私は一切知りませんでしたけれど。打ち合せはいつも庵野さん一人で来て、いつも新宿のスナックで会って、それで六時間ぐらい飲んで。その時に、電池切れたら止まるロボットやとか、そういう話はしましたけれど。だからプロジェクト・エヴァというのは、ないんですよ、実態は（笑）。

竹熊　それって結局、庵野さんと大月さんのことでしょう？

大月　うん。

大泉　びっくりしましたよ。この人がいなかったらあの感動は得られなかった（笑）。

大月　二話で「エビチュビール」とかやってた時も、テレビ東京さんか代理店かで、代理店で会議やったのかな。テレビ東京の副部長さんと。それで副部長さんが、あの「エビスビール」はダメとか、あそこはダメと指摘されて。あとＦＵＳＯもダメね。

竹熊　ああ、画面に登場するトラックのメーカー名ですね。

摩砂雪　トウジの服もダメになったんだよね。

大月　そうそう。ＦＩＬＡって書いてあったから。一話はそんなに（局チェック）入んなかったんですよ。全然入んなかった。

竹熊　二話は入ったんですか。

大月　二話は入ったですね。「エビチュ」が入ったですね。あとはＦＵＳＯ。それで局の人がチェックして、これ直してくださいって言ったら、庵野さん下向いてるわけですよ。ウンともスンとも言わない。皆さんよくご存じの沈黙が流れるわけです（笑）。

竹熊　庵野さんの沈黙（笑）。

大月　それでテレビ局さんは帰って、代理店と俺と庵野さんで飯食いに行って、その時もずっと黙っている。それで代理店と別れて、二人で帰ってきたのかな。帰り道に「どうすんの」って聞いたら、「直すわけねえだろ」と（笑）。

　最初はエビスビールだったんですよ。エビスビールをエビチュに変えても、これだってひっかかるだろうってことになって。最後なんだか、何ビールになったんだっけ。

竹熊　ボアビール。

大月　いまにして思えば、当初はそういう牧歌的なやりとりで。良かったですよね。後半の苦労を考えたら（笑）。

鶴巻　最初の頃の商品名の問題だって、説得したんでしょう。ここは直さなくていいけど、ここは直せとかって。

大月　庵野さんはああいう人だし、それでテレビ局だって局の自負があるから。私も精神的に強くなかったから、もう逃げちゃおうかなって（笑）。でもまあ、なんとかなるだろうと思って。相当、だからあの人、テレビ局さんとは、かなりやったですね。それでタツノコさんの植田さんが、けっこうフォローしてくださって。助かったです。

佐藤　始まりの頃は、植田さんがいないと、なかなか話がまとまらなかったですよ。

鶴巻　でもダメなものはダメっていうのはあるわけでしょう。いくら庵野さんがここはゆずらんと言ったところで、やっぱりこれはダメだよってところはある。

大月　要するに、本当にまずかったのはエビスとＦＵＳＯ。メーカー名。

竹熊　ああ、そうだったんですか。

大月　うちも粘って。タツノコの植田さんと、私の方で粘って。表現というものの真意がここで失われたら、全ての表現というものは、社会上、成り立たないのではないかとか。要するにテレビは公共の場ではあるけれども、公共の場で表現は個人を出してはいけないのかとか、私もいろいろ理論武装しまして、電話口で粘って頑張りました。「わかりました。じゃあ、何かあったらどうしますか」「全部責任取りますから」って言って、オンエアしたっていうのも、いくつかありますよね。

竹熊　あの、３０アハン、ウフンのところ（二〇話）はどうだったんですか。

大月　あれ、私、オンエアじゃ見てなかったんですよ（笑）。この間、庵野さんと、編集用のビデオで、初めて見たんですよ。「庵野さんよ、俺、やっぱこれ知ってたらさ、止めたわ」って（爆笑）。

竹熊　じゃあ、大月さんは作品には一切不介入を貫いたわけですね。

大月　いやだから、その設定とか内容に関しての話というのは、ほとんど最初のうちだけ。オンエア始まってからは（内容面で）私にはなんの相談もなかったし、それはもっぱらタツノコの植田さんの方と相談してて。

　庵野さんが私と会う時は、もう要するに怒りの権化であったりとか。作画が終わらないとか。どうのこうのとか。それで恋愛がどうしたとか（笑）。そういうもろもろ。グチ聞き役で。あとは観念的な話であるとか、哲学の話であるとか、社会情勢であるとかで。二人の会話の中には、『エヴァ』のエの字も出なかったですね。逆に、ああ『エヴァ』の話はしたくねえんだなと。俺ぐらいといる時はと思ってました。

竹熊　大月さんと話す時は。

大月　うん。それは植田さんがやってくださってるから、俺は『エヴァ』の話は一切やめようと思って。だからいまだに、本当に、皆さんの前で申し訳ないけど、俺は一〇話から一九話ぐらい、ほとんど見てないんですよ。昨日、うちの若い社員が『エヴァ』のテレビ特報を作ったんだけど、そしたら３１青いエヴァンゲリオンが、槍投げてんだよね。空の使徒目がけて。すげえなあと思ってね。昨日、初めて見ました（笑）。

大泉　昨日ですか。名場面ですよ（笑）。

大月　ヒューッと飛んでって。それで３２黒いエヴァンゲリオンは、まだ見たことがないんですよ。

佐藤　（呆れて）もうＬＤに入ってますよ、あれ。先月ですよ、売り出しは。

大月　それで『エヴァ』の打ち上げで、どこか新宿のビルの六階か八階でやった時に、プラモをガッと並べたんですわ。こんなのが出るでって言って。それで俺がバンダイさんから借りてきて、佐藤さんと一緒に並べたんだけど、黒いのがあるんですわ。「誰が許可したんだ、こんなもの」。

全員　（爆笑）。

大月　なんで、こんなのあるんだって。知らなかったんですよ、黒いのは。

佐藤　出てるがな、テレビに。大月さんその時、メーカーが勝手にこんなん作りおってみたいなことを言うてですね（笑）。僕が「でも、よくできてますよね」って言うたら「えっ」とかって驚くんですわ、この人。

大月　ライバルで出てくるんですかって。

鶴巻　僕、冗談だとばっかり思ってたら、そうだったんですね。庵野さんが、「本当に見てねえんだよ、あの人」って（笑）。

大月　制作している最中、月に一回、庵野さん私の家に来るんですわ。私、中野のアパートで一人で暮らしてるんですけれど。月に一回は、なんか飲んだ帰りとか、泊まってっていい？　とか言って、泊まっていきましたね。朝起きて、二人で中野ブロードウェイまで歩いて行って、中古のＬＤ屋とまんだらけ見て、それで庵野さんはガイナに、私は会社に行くみたいな。月一回は、そういう。

貞本　やってる最中ですか。

大月　やってる最中。庵野さんは、六回ぐらいウチに泊まったんじゃないのかな。仕事の話はしないですよ。だいたい女の話ばっかり（笑）。あとは『エヴァ』はやっただけ無駄だったとか、結局、お前（大月）に遊ばれただけだったとか。さんざん言ってたんだけど。本当のところ、お前だけがいい思いしたとか。私、手取り三〇万で、給料全然変わんなかったんですけど。

摩砂雪　え、部長さんになったんじゃないの？

大月　いや、あれは『エヴァ』の前だったのよ。だから『エヴァ』やったから部長になったとか、ご褒美で海外旅行とか、全部デマですよ。

竹熊　ああ、そういう噂が流れたわけですね。『エヴァ』で出世した大月さんって（笑）。

貞本　さらに出世できないんですか？　もう一本ぐらい当たったら。

大月　もう一本は、もうないでしょう。

摩砂雪　なんか、末は専務様だって言ってたなあ、誰かさんは（笑）。

大月　私がもう一回庵野さんに引っ張ってこられたのは、やっぱり二〇話のアヘアヘ事件の後始末と、あと二五、二六話のネタ出し。特に二五話の時は、やっぱり二人で新宿の飲み屋で延々としゃべって。だからこの間も、竹熊さんも実験材料にされちゃったけど、こっちは延々話さなければなんないんですよ。庵野さんは延々聞いてるわけ。

竹熊　聞いてましたね。僕と大月さんの会話を。

大月　それでネタを拾うの。私もだから、庵野さんと会う前は、心理学の本とか、そういうのは読まなかったんだけど、でもいまの彼氏（庵野さん）に聞かせてやらなければならない話とか、昔の記憶とか、昔感動したものの共通項は一緒だったので、それをガッと溜めて会うわけ。

　だからものすごい疲れんの。彼と話すと。二時間、一方的に大学教授みたいに話すから。こうだ、こうだって。それで目の色見ながら、ピカッと光ったかなと思ったら、もっと突っ込んで行くわけ。だから二五話の３３Ａパートのところとかで、（その時の大月氏の話を）けっこう使っていただいたので。まさか、ああいう話になるとは思いませんでしたが（笑）。





［綾波レイについて（１）］





大泉　次に貞本さんから、『エヴァ』の立ち上げの話を伺いたいんですが、『ＥＶＥ』（角川書店）によると、庵野さんから血液型とかを書いた簡単なイメージ・メモを渡されたと。それでものすごく気になるんですけれども。綾波レイの血液型って、何型っていう設定だったんですか。

貞本　レイの血液型？　無口な少女と書いてあったことしかおぼえてないな。

大泉　ああ、血液型もなんも書いてない。

佐藤　大泉さん、どうしてそんなこと聞きたがるんですか？

竹熊　いや彼、綾波レイの、ミーハーなんですよ（笑）。

佐藤　ああ、アヤナミストなんですね（笑）。

竹熊　それで綾波レイについては、やはり貞本さんが綾波研究家だから、貞本さんに聞いてくれと言われてるんだよね、庵野さんから。

佐藤　なんせ本人やから。研究家というより（笑）。

貞本　あのキャラに関しては、『エヴァ』とは関係なく、こういう女の子を作ってみたいなというのが最初にあって、包帯少女だとか、そういうのは、別に作ってたんですよね。

竹熊　それは『エヴァ』の企画とは別で。

貞本　別ですね。なんだったかな。３４『スノウ・グース』っていう小説があるんですよ。誰が書いたんだっけ。その『スノウ・グース』っていう小説を読んだ直後で、すごい感動して、それでその主人公の女の子、ビジュアルにしたら、どんな感じかなあって。最後の場面で部屋に入ったら、油絵の中に、白い女の子が描いてあって、なんにもない部屋に女の子が立っているように見えたとか。そういうビジュアルイメージがありましてね。それから、ちょうど大槻ケンヂにはまってて……。

竹熊　筋肉少女帯の。

貞本　あの辺にはまってて。『何処へでも行ける切手』とか、あと『福耳の子供』っていう曲があったかな。それにちょろっと女の子のモノローグが入るんですよ。ボソボソっていう。この声がすごくいいとかって言って、この声でしゃべるような女の子にしたいと、マッキー（鶴巻氏）に聞かせたんだよね。ほぼ林原さんのいまの声に近いですけどね、不思議なんですけど。別に庵野さんには、こういう声の人探してなんて言ってないんだけれども、似てるよね。（曲に入っているのは）もうちょっと若い声だけど。

　もともとの庵野さんのメモに、ボソボソッとしゃべるような女の子で、暗くて無口とか書いてあったから、ちょっと自分の思ってたイメージを、じゃあこれ使っちゃえって。

大泉　じゃあ本当その数行で、あとは貞本さんの中でバーッと広がって、出てきたわけですね。

貞本　でも絵を作った先から、庵野さんとかに任せちゃいましたから。だから最初のビジュアルだけですけれどもね。包帯を巻くとか。でも不思議と思ってたイメージの方に、ズルズルと向こうから来てくれる感じがしましたね。

鶴巻　アルビノっぽいというのが、貞本さんのアイデアなんですかね。目が赤いっていうのは、どうなんですか。あれは誰が？

貞本　目を赤くしたのは庵野さん。庵野さんが、確かそれで行こうと言ったんだけど。例のごとく大月さんと話したあとに帰ってきたら、まあ夜延々と僕に向かって話すわけですよ。今日話したこと、みたいな（笑）。

佐藤　ちゃんと報告もやってたんですね。委員会報告みたいな。

貞本　なんか特徴が足りないって言われて。髪の毛の色と目の色は、やっぱりアニメっぽくしてくれと。見た瞬間にキャラクターがわかる色にしてくれと。

鶴巻　でも最初は日本人にしようみたいな話をしてましたよね。

貞本　全部日本人、髪の毛黒、肌の色、全員一緒っていうので、形状だけで描きわける方向で行きたいというふうに言って。それで髪の毛の青だけは、前の企画の『ウル』の主人公が一人だけ青なんですよ。それだけ持ってきて、女の子、全てのキャラクターは黒なんだけど、この女の子だけ髪の毛を青にしたいと。それでやったらなんか、庵野さんが「赤い目にしない？」とかって言い始めて。「えーっ、赤い目？」それで塗ってみたら、あっ、かっこいいって。

大泉　へえ。最初のイメージボードではまだ赤くないですものね。





［綾波レイについて（２）］





大泉　それで庵野さんに対する批判としてわりと多いのは、キャラクターのコアには全部自分がいるというなら、非常に自閉的な世界じゃないかと。本当の他者というものを考えないなら、しょせんオタクじゃないか。ただすごく思うのは、自分の内側を掘って行って、面白いキャラクターを出してくるっていうのは、創造的だと、それはぴったり来たんじゃないかと。

竹熊　それは基本ですよね。

大泉　それでなんで綾波レイが、あんなに人気が出てしまったのか。庵野さんは自分で、自分のなんか無意識をピュアな形で出したんだとかなんか言ってるけど……。

竹熊　そこをどう思われます？

摩砂雪　あんまりなんか興味ないと言ってるよ。レイには。全然ないって。

貞本　よくわかんない、実質は。

摩砂雪　ただ、庵野、興味あるって言ったら、どっちかと言ったら、ミサトの方なんじゃない？　女として。

竹熊　アスカとかは？

摩砂雪　アスカもね、違う意味で、最近興味が出てきたみたい（笑）。

一同　（爆笑）

貞本　違った興味がわいてきて、失敗してるわけ？（笑）

摩砂雪　だからミサトは興味ありすぎて失敗したから、もしかして途中でアスカにふりだしたんじゃないの。

鶴巻　二二話を、いま直してるのは、アスカ劇でしょう。

河田　アスカがぶっ壊れた回ですか

鶴巻　ミサトをやっぱりちゃんと描かなければならなかった。本当は初期設定というか、このポジションにいる女だっていうところを、ちゃんと決めて描いていくことが、作品としてやるべきことだった。ところが、肩入れしすぎていく過程で、ミサトはシンジとはなんの関係もない女になっていくという。あれはやっぱりね。

貞本　生々し過ぎるんだけど、その生々しさが……。

鶴巻　いいんですけどね。それはいいんですけけど。

貞本　作品の中にはまってない。

鶴巻　そう。作品を高める役にはなってないっていう感じですか。ミサトのキャラクターだけが立って、あれで泣いた女もいるっていう話を聞きますけど。作品の中には、別にはまってないと……。

貞本　『エヴァンゲリオン』としてははまってないんだけど、庵野劇場としては、はまってるっていう。

竹熊　でも、ミサトさんが後半の方で、シンジ君にちょっかい出そうとするじゃないですか。それでシンジ君に拒絶されて。

佐藤　ああ、皆、そう見るとか言って、庵野さんはすぐ怒るんですけど。

竹熊　うん。でもあれ、知りあいの主婦が、えらい感動したよね。寂しかったのはシンジじゃなくて自分だってことだよね。あれはすげえリアルだって。

摩砂雪　あの時は、本当にそう思ってたのかもしれないね（笑）。





［『エヴァ』の始まり（２）］





竹熊　それで『エヴァ』がそういう形で始まって、こういう結末とか、こういう話になるっていうのは、最初からイメージとしてあったんでしょうか。スタッフの皆さんの中に。

鶴巻　いや、まあないでしょう。それは当然。

竹熊　じゃあ最初はもうちょっと普通のロボット物と？

貞本　３５『トップ』ぐらいの大団円が来るに違いないと思ってましたよね。

竹熊　一応企画書の段階で、最後までの、二六話分のサブタイトルつけてますよね。

鶴巻　でも最終話は大団円と書いてあるだけでしたから。

竹熊　ああ、そうそう、全ての謎が解かれて大団円（笑）。

鶴巻　と書いてあるだけでした。

竹熊　じゃあ考えてなかったのかな。

貞本　最初の企画段階の大団円は、もっとしっかりとした話になる予定だったと思う。ラストに最後の使徒と月面で戦うシーンがあって。それで、何年かしたら、その月の表面にメッセージが書かれているというような、『トップ』みたいなイメージかなあと皆で話してたんですよね。

竹熊　だいぶ変わっちゃったわけですね。

貞本　その時の月のイメージが、たぶんずっと残ってんだと思いますよ。レイに関しては。割とキーワードにあったよね。最初の頃、月っていうのは。ＥＤの『ＦＬＹ　ＭＥ　ＴＯ　ＴＨＥ　ＭＯＯＮ』にもあるし。

佐藤　結局、いま作り直してるとこでもありますんで、その辺はちょっと……。

竹熊　まあこの辺はねえ。実は『クイック・ジャパン』九号のインタビューの時にも、だいぶその辺の話、出たんですよ。ただやっぱりゲラの段階でカットしてくれっていうので。

貞本　覚えてないんじゃないかな。グチャグチャになって。

大泉　あのオープニングのカバラっていうのは、何かあったんですか。

貞本　俺は知らないなあ。

鶴巻　企画書にも出てて、ちょうどだから、死海文書の謎というような。

貞本　ゼーレを設定する時に、ゼーレをどういう団体にするかっていうのが。俺はフリーメイソンみたいにしたいって言ったんだけど。

鶴巻　僕は、やはり一筋縄ではいかない世界っていうか、わかっていることもあればわかってないこともあるという、そういう世界がやりたかった。

　こうなるんだと思ってたら全然違っていて、どんどんすかされていく世界というか。こうだと思って、そこにブチ当たっていくとそんなものは全然ない、みたいな。そういう世界観にしたいと思って。

　ちょうどその頃、古本屋で『死海文書の謎』を見かけたんです。それでちょっと立ち読みしたんですよ。ブ厚い本で高かったんで、どうしようかなとか思って、買わずにちょっと立ち読みして、後日行ったら、もう売れ切れてなかったんですよ。『死海文書』は、いまはけっこうあちこちに出ているけれども。

竹熊　本屋の『エヴァ』コーナーに積んでありますよね（笑）。

佐藤　先日、毎日新聞の電話取材を受けましてね、マンガのコーナーのところに『死海文書』なんてハードカバーが置いてあって『エヴァンゲリオン』の副読本て書いてあるんですけど、これってなんなんですかって、電話かかってきて、説明に苦労しました。本屋が勝手に置いてるんですよって（笑）。

貞本　あれも結局『ナディア』の置き土産で、最終回あたりで敵の３６ガーゴイルが光に触れて、塩になっちゃうというシーンがあって。だから最初の『エヴァ』の企画書では、南極で大爆発を起こしたというのが、死海で爆発したことになってたんですよ。

鶴巻　死海蒸発事件。

貞本　死海蒸発事件になってましたね。最初の企画では。だから『ナディア』と世界観をつなげて行って。たぶん庵野さんはそれを考えていたと思いますよ

佐藤　パラレル的なところでね。

竹熊　実は『ナディア』の続編だったみたいな。

鶴巻　いちおう、そういうつもりではやってんじゃないですか、たぶん。だからあの世界では、一九世紀の終わりに、パリに円盤が現れたという記述が残っているみたいな世界だというようなつもりでは作ってるんじゃないかと思う。

貞本　最初はそのぐらい考えてたと思うよ。もうちょっとマンガ的な世界だと思いますけれどもね。





［綾波レイについて（３）］





大泉　ちょっとまた僕、なんで綾波レイって、あんなに人気が出たんですか。

佐藤　（笑）やっぱそれかいな。

大月　あのね、僕だけの意見で言うと、最初に貞本さんのキャラ表をパッと見た時に、やっぱり一番先にレイに目がいったのね。まだあの頃、髪の毛の色、茶だったか黒だったか。ああ、これはいいわと言って。だからいまは綾波のあとだから、ショートカットとか、広末涼子とか当たり前だけど、あの頃は、ショートカットの女の子なんてあんまりいなかったでしょう。

大泉　確かに。

大月　あとは、あの包帯ね。僕は『エヴァンゲリオン』をやろうと、もうこの男と心中しようと思ったのは、やっぱり綾波の包帯でしたよ。

佐藤　おお。綾波と心中。

大泉　僕も綾波出てなかったら、見てませんよ。はっきり言って。

竹熊　やっぱり五話でつかまれるんだよね。

大泉　いや、俺は一話の綾波……。

貞本　一話じゃちょっと違うよね。五話というのとは。小学生とか中学生、だいたい女の子とかが、綾波レイが好きな女の子は、だいたい五話なんだけど、ちょっと病的に見る人は、一話だよね（笑）。

鶴巻　包帯が病気ですね。

佐藤　こうカメラがパンしていくところ、包帯が見えてくるところがいいんですよ。来た、来た、来たー！　って。

竹熊　フランスのイラストレーターで、包帯女の写真を元にしてイラスト描いてる人（ロマン・スロコンブ）がいるじゃないですか。それは関係ない？

貞本　僕が包帯女で一番意識したのは、やっぱり３７吉田戦車だと思いますね。

竹熊　ああ、吉田さん。

貞本　当時、読んだ時に、隣に美術やってる佐々木っていうのがいてですね。この女の子いいよねとか言って。血が出てるよーとか言って。あとから考えてみたら、ああ、そういえば包帯と言ったら、吉田さんがいたなとか思って。

佐藤　『戦え！　軍人君』ですか。

貞本　頭の中にたぶん残っていたから。

竹熊　吉田さんって、本当に普通の好青年なんだけどね。なんでああいう作品描くんだか、まったくわかんないんですよ。

大泉　好青年でいるために。違うのかな（笑）。

竹熊　いや、本当に病的なところ、一切ないんだよね。

鶴巻　僕、いわゆるＳＦファンだったんで、吉田さんの作品を読むと、いつも子供の頃に読んでたＳＦと同じ匂いを感じるんです。ＳＦマインドがあるというか、モノの考え方がＳＦ的だというか。





［カヲルについて］





竹熊　ああ、せっかく摩砂雪さんもいらっしゃるから、ちょっと尋ねたいんですが。カヲル君の回（二四話）って、摩砂雪さんがかなりやってるんですよね。

摩砂雪　あれはでも、半分はお貞が。

竹熊　あのスケジュールのどたん場のところで、あのクオリティっていうのはすごいじゃないですか。

摩砂雪　あれはでも、なんていうのか。半分ぐらい、半分はないか三分の一はバンクで。

鶴巻　でも昔やっぱり、一か月で半パート原画やってって人だから……。

貞本　すごいと思いましたけどね。

鶴巻　いま、そんなことできる人いないよ。

大泉　いや、でもあそこでいきなり３８「歌はいいねえ」っていうセリフが出せるセンスはすごいなと思ってね（笑）。

鶴巻　あれはなんなんですか。

摩砂雪　いや、あれはあとで庵野と見ててさ、これじゃあただのキチガイじゃないかって。こんな奴いたら、「俺、絶対好きにならないよ」って言ってたよ（笑）。

貞本　あれはあれでいいんだけど、最初のシーンの「歌はいいねえ」って大爆笑だった（笑）。想像してた言い方と違っていたから。

竹熊　あれはでも全国のやおい女が悲鳴をあげたっていう。テレビの前で。

摩砂雪　そこまで行くと思わなんだ。

鶴巻　でも狙いすましてますよね。

摩砂雪　それはあとで思うだけでさ。なんか作ってる時、なにも考えなしだよ、必死こいてるし。

竹熊　あれスケジュール的には、どれぐらいでやったんですかね。一か月で？

摩砂雪　うん。三週間ぐらい。絵描いてんの、二週間一杯ぐらいですよね。それでカッティング（編集作業）入んなきゃいけないんで、その間、もうどうしても仕事を回さなきゃいけないんだけど、もうレイアウトもできてなくて。そうしたらお貞が、やっぱ、カヲル君が初めて出る回で、気にしてたらしいんですね。それで庵野がずるいから、いや、お貞が気にしてるみたいだよって言うんだよ。

　それでお貞の部屋に行ったら、ちょうどマンガが……詰まってるって。いや、違う、もうなんかマンガ描くのに疲れてたのね。それでアニメもたまに描きたいとか言ってたから、ああいいな、じゃあやってくださいって。

貞本　違う、あれマンガの二巻の表紙の作業とかかっちゃってさ。表紙と連載分のマンガ描けって。もうすごいスケジュールじゃない。もう地獄だよって。それでアニメやるって逃げたんだよね（笑）。それで結局、本編のマンガの締め切りを伸ばしてもらって単行本の表紙描いてたら、中途半端な時間が残っちゃって。その時間を次の回のスケジュール切り上げに使えば、あとあと楽だなあと思ったんだけど。どうしようかな、どうしようかなというところで。それでやっぱり本編の中で、一番うるさいんですよ。皮肉を言う人なんですよ。

竹熊　ああ、摩砂雪さんが。

貞本　「お貞は一人だけいいよな」（笑）。

摩砂雪　俺、言うかな、そんな。いやだからさぁ、なんで作監やらないの？　と思ったんだけどさ。一回ぐらいやって欲しかったよね。でも庵野が俺に言ったのは、やっぱカヲル君の回は、お貞、作監やりたがってるみたいだよって。

貞本　だから、本当にマンガがなければ、本当にやりたいよって話はしたんだけど。

摩砂雪　それで、あっ、これはラッキーって言って、うちの仕事ってフィルムのカッティングに時間をすごいかけるんですよ、とにかく。もうシロミだけでも、自分でタイミングはかって線引いて。間とか、ここで何本ぐらい動いてとか。そうすると、三〇時間とか、それぐらいかかっちゃうわけですよ。たった二〇分ちょっと作るだけで。その間、とにかく仕事を回さなければいけない状態でどうするかと言った時、お貞が来てくれて、手伝ってくれたから。もう本当にあの時は助かった。感動モンだよ。

貞本　本当は二週間ぐらいでできるはずだったんだけど、結局表紙のイラストが押しちゃって、四日か五日間分ぐらい。

摩砂雪　でも、けっこう描いてくれて、助かったよ。

貞本　レイアウトだけですよ。

摩砂雪　あと作画もちょっとやってもらって。

佐藤　もうちょっと前のタイミングで、クライマックスをＴＶでやるっていうのがあればどっちみち二月にマンガは休んでとか、そういうところですね。

貞本　そう。最終回あたり、どうせ無茶苦茶になるだろうから……手伝うしかないというか、その時に休まざるを得ないだろうなと思ったけど。なんか、そうも言ってられないっていう。それが繰り上げられて、こっちが大変だっていうので。最終回は手伝えないかもしれないけれど、まあ二四話ぐらいだったら。ちょうど単行本で切れ目があったんで。

摩砂雪　だから本当はマッキー（鶴巻氏）やるはずだったんだよな。二四話な。そうだよ。初めマッキーで。俺に二五話が来るはずだったんだ。

佐藤　（本来の）二五話がなくなったんで、繰り上げ当選という話で。

竹熊　しかし僕は、この期に及んで、新キャラを出すかと思いましたよ。

佐藤　新キャラと言っても、オープニングからずっと引っ張ってて。

貞本　予定構成段階で、このキャラはイケるとずっと思ってましたからね。

佐藤　あれは裏シンジ君と、表シンジ君。

大泉　もう一つは、綾波とカヲルは同じ生命体なわけでしょう。えーと、「あなたは私だ」じゃない、「君は僕と同じだね」というカヲルのセリフがあって。

佐藤　使徒の遺伝子みたいな感じのものを、なんとなく握ってるってことかな。

大泉　だからすごい二四話でキューッとしまっているわけですね。全体の話が。それで次、どうなるんだろうと。

佐藤　と思ったら、あの二五話かい、って皆さん（笑）。

竹熊　それで二四話では何の伏線もなく、「君たちリリンは」なんてセリフがあったでしょう（笑）。最初、「リリン」って何のことかと思ったんだけど。

摩砂雪　二四話まで来て、まだ謎を提議するんだもん。普通はもう大風呂敷広げまくったあとだから、たたまないといけない時期のはずでしょう。

竹熊　あの時点で吉田戦車が、けっこうファンで見てて。それであと五話、いや六話いるかなみたいな。もう、これじゃ終わんないなって。

鶴巻　その通りだった（笑）。

竹熊　リリンとかリリスって、あれはユダヤ教の言葉でしょう。

大泉　ユダヤ教、カバラ。

竹熊　カバラの裏教義だよね。

貞本　それで聖書とかカバラの謎をずっと引っ張ってたのに、リリスに触れていないのが、なんかこう、庵野さんの中のプライドを傷つけたという感じで。

竹熊　ああ、そう。じゃあとにかく説明抜きで出しちゃうと。

貞本　一応触れとかないと。俺は知ってんだぞって、とりあえず出しとかないと。きっとそう（笑）。

摩砂雪　なんか、途中から言ってたよね。

佐藤　最初に考えたところと、あとから広がった設定をまとめ直すために、猛烈に勉強している時期があって。その時の勉強の成果を小出しにするタイミングが、あの時点でしか、もうなかったという（笑）。

　実はネタ的に量が結構あったんで。全部本当にまとめきれんのかい？　みたいな話になって、二四話で、五、六話分のネタがまた入ったいうのは、それはその通りですよ。その時点で本来の二五、二六話はもうできないとわかってましたし。

大泉　だから理解しきれないんですね。それでなんであそこでカヲルが死ななきゃいけないかっていう時に、ああ、自分が生まれて来たのが、リリスの子供だったからということを、そこで納得したからっていう理解でいいんですか。

佐藤　どうなんですかね。

摩砂雪　違うんですよ。あれは、初めは等身大のエヴァが出てくるはずだったんだよね。初期設定だと。その等身大エヴァがカヲルを追撃するという話だった。

竹熊　ああ、小さいエヴァが出てくる。

摩砂雪　そう。人間と同じ等身大のが。

竹熊　ああ、それはなんか『別冊ＪＵＮＥ』に載ってた……二四話の初稿にそういうのが出てましたね。

摩砂雪　で、なんか最後にカヲルを潰すのが弐号機なんだよね。アスカが追っ掛けて行って。違ったっけ？

鶴巻　そんな感じなんだけど、ケリつけるのシンジじゃなきゃマズイでしょうって話になって。

摩砂雪　ああ、そうか。

貞本　まあカヲルって自殺願望というかね。あの人の。





［綾波レイについて（４）］





竹熊　あとなんか聞きたいことは。

大泉　俺はもう、貞本さんに聞きたいことが。

佐藤　綾波ですね（笑）。

貞本　綾波は、でも、本当はよくわからないっていう。でも、人によって、いろいろはまる場所は違うんだけれども。どうしてはまるのかというのは、やっぱり興味があるから。

佐藤　でも正直な話、僕がイメージボードを見た時もそう、今度の企画はだいたいできたって、庵野さんにポンと見せてもらったときに、どのキャラクターがいいかとか聞かれて。まあたぶんその時は、『セーラームーン』や『女神さま』が流行りでしたから、お姉さま系でしたらミサトでしょうけれども、僕は、これっていうふうに言ったのが、やっぱり綾波でした。なんでって言ったら、やっぱりストーリー自体が謎でしょ？

竹熊　まあレイは謎の象徴みたいな。

佐藤　そう。象徴はこれやと思います。単にキャラクターの色分け、描き分けのための記号じゃなく、ストーリーの謎を象徴するキャラ、という点で。あとはやっぱり包帯のイラスト（笑）。

鶴巻　単純に、絵そのものよりは、要するに設定が好きだったんです。綾波に関して。

貞本　一番いじれるのでね。

鶴巻　というか、僕、隠微な感じがいいかなと思ったんだけど。

貞本　俺は対極な感じしてたな。

鶴巻　なんか、最初の設定では確かゲンドウの妻が死んでしまったので、その代わりにクローン人間を作ったと、要するにゲンドウにとっては、妻であり娘なわけですね。それでシンジにとっては母であり、彼女であると。そういう感じで……母であるんだけれども、やっぱりエッチしたいってやつ。

竹熊　近親相姦的な匂いもするし。

鶴巻　だから、そのへんはすごい好きで。もっと出して欲しいと思ったんですけど、結局そこら辺の隠微なところはあまり出さなくなってきて。どういう理由かわからないけど。

貞本　最初にデザインした時に、もうシチュエーションとして、頭に一番最初にできたのが、ゲンドウが自分の部屋に帰ると、レイが一人裸で待っている。

大泉　うわー！

鶴巻　そういう感じですよ。

貞本　そのイメージでふくらましてきましたから、最初の。

竹熊　ああ、そういうシーンはなかったけれども。ああ、でも３９「食事にしようか、レイ」っていうのはありましたな。レイが裸になって大きな試験管みたいなところに入ってて、その前でゲンドウが。

鶴巻　セックスしちゃったら、おしまいなんですよ。セックスしないところがいいんであって。

竹熊　永遠の処女というかね。





［綾波レイについて（５）］





大泉　それで、レイは人間じゃないわけなんですね。

鶴巻　最終的には人間じゃない。でもそこはずっと最後まで悩んでましたね。本当に人間じゃなくしましょうみたいなアイデアもあったんだけど、僕はけっこう最後の頃まで、ちゃんと人間にしてくれ、せめて遺伝子的には人間にしてくれって話を、ずっとしてた。でも結局なんか、ダメだったみたい。この話しちゃっていいのかな。たぶん、違うんですよ。

大泉　それで人間らしくなった二番目のレイをいっぺん殺して、そのあとで三番目のレイが出て来て、その三番目が泣くじゃないですか。涙を流す。ということは、二番目の時の記憶の受け継ぎみたいなのはあるんですか。

佐藤　前に起こったことの、なんか響き合いみたいなのが。

摩砂雪　ある程度の感じで「ある」っていう。

大泉　俺はまた、なんか、こいつは使徒と一緒だから、コアの受け渡しがあるのかと。

貞本　もともとのアダムの遺伝子を受け継がれている女だから、すごく残虐性があって、元は。根が狂暴で。

鶴巻　人間じゃない、心のどこかに人間にとってはもう理解不能なブラックボックスみたいな部分があってという要素があるんです。

竹熊　それを抜き取られているわけだ。その残虐性を。

貞本　いやいや、半分は残ってるわけです。半分はユイの遺伝子です。

鶴巻　デビルマン状態なわけです。

竹熊　なるほど。

貞本　それで前のレイが、なんとなくこだわっていたゲンドウとの絆みたいなものを、メガネを見るわけじゃないですか。そんなものを壊すっていうか。

鶴巻　でも僕はコンテ描いてる時は、そう思ってなかったから。

貞本　そういうふうな話で、なんであんなところでメガネ壊すのって言ったら、いや、一番目のレイの記憶が残ってて、残虐性があるんだよとかって庵野さんが。

鶴巻　僕はあとでそれを聞いて。じゃあそういうふうに言ってくださいよって。

佐藤　あの時、コンテはなんでそんなふうに描いたんですか。

鶴巻　どうだったんだけな。貞本さんにも、以前、他のことで聞かれたんだけどね。コンテ描いてる時には、自分なりに決着つけるんだけど、いざどうだったのと言われると忘れてるっていう。

大泉　というわけで『パラノ・エヴァンゲリオン』では綾波の（笑）、『エヴァ』と庵野さんのさらに濃いコアな話になっていくわけですね。

以下『パラノ・エヴァンゲリオン』第二部「庵野秀明〝欠席裁判〟（後編）」に続く。





１

大阪ＳＦ大会。ここでは、後のガイナックスの中核メンバーが中心となり主催した第三・四回大会でオープニング上映されたアニメーションのことを指している。





２

八二年放映。キャラクターデザインの美樹本晴彦、メカデザインと脚本の河森正治をはじめ、『ヤマト』『ガンダム』を見て育った世代が中心になって作った、最初の商業アニメである。

宇宙人の大艦隊による戦闘の中を漂流するマクロス要塞艦の内部につくられた都市では、若者たちが消費生活を謳歌しているというとんでもない設定は、当時の冷戦下の気分と妙にダブって見えて面白い。リアリティの基準の置き場において、マンガにおける江口寿史のような転換点といえるだろう。八四年の河森監督による映画化はＯＶＡによるジャンルの自閉と先細り前夜の、アニメブーム最後のお祭りとなった。





３

『マクロス』制作の実質的中心となったアニメ制作会社。





４

ファンの間で「板野サーカス」と呼ばれる、三次元的かつ超スピードのメカバトルシーンで名を轟かせた天才アニメーター。『伝説巨神イデオン』後半や、『超時空要塞マクロス』でのミサイル飛び交う空中戦が有名。ＯＶＡ『メガゾーン23パート２』などの監督も務める。





５

六三年鳥取生まれ。映画監督。ビデオクリップ『ギタリズム』監督、『ガメラ２』怪獣デザイン、『ナディア』設定、演出、絵コンテなど。





６

六一年鳥取生まれ。大阪芸大在学中に、庵野・山賀と出会い、ダイコンフィルムの中核メンバーとなる。『プリンセスメイカー』シリーズのゲームデザインやキャラクターデザインを始め、マンガ・映像等のメディアを越えて活躍するアーティスト。現在は有限会社ナインライブス代表取締役。





７

スタジオぬえのメンバーとして、『超時空要塞マクロス』のテレビシリーズにメカデザイン・脚本で参加。劇場版『超時空要塞マクロス・愛おぼえていますか』で初監督。その後、長く監督作がなかったが、九五年『マクロスプラス』で久々に監督を務めた。ＳＦ・アニメファンがそのまま作り手にまわった最初の世代のひとり。





８

アニメーター。『太陽の王子ホルスの大冒険』『ルパン三世』『未来少年コナン』『ルパン三世カリオストロの城』などでの宮崎駿らとコンビを組んだ仕事をはじめ、『侍ジャイアンツ』など、テレビアニメの黎明期から活躍。ダイナミックな職人芸的仕事で注目された。





９

八七年公開。当時弱冠二五歳の山賀博之監督とガイナックス・スタッフによる、異世界が舞台のファンタジー……に見せかけた、きわめてリアルな青春物語。練りに練った脚本と設定、それ以前はほとんどアマチュアだったスタッフの若き情熱のほとばしった入魂の作画と、プロ第一作にしては驚くべき巨額の制作費（八億）、坂本龍一の音楽、ハリウッドでのプレミア公開と、話題には事欠かなかった。興行的には苦戦を強いられたが、何よりそこに込められた志の高さとリアリティーが、業界やアニメファン、同時代の心ある表現者（と、その予備軍）に与えた衝撃は計り知れない。





１０

岡田斗司夫脚本、赤井孝美監督による東映戦隊シリーズの過激な右翼パロディー。『太陽戦隊サンバルカン』の替え歌による主題歌は、今もってオタクのカラオケにおける定番になっている。





１１

五七年大阪生まれ。近畿大学在学中に岡田斗司夫と共にＳＦファンダム活動を開始。八一年の日本ＳＦ大会「ＤＡＩＣＯＮⅢ」を主催し、その企画時に庵野、赤井らと出会う。八二年に日本発のガレージキット専門店「ゼネラルプロダクツ」を設立（現在は解散）。ガイナックス設立時には発起人・取締役として参加。現ガイナックス取締役・統括本部長。





１２

キングレコード内にある、アニメ・特撮サントラ専門レーベルの老舗。サンライズ系ロボットアニメや、円谷特撮ドラマなどのサントラを多く発売してきた。





１３

七一年放映の、円谷巨大ヒーローもの。同年の『帰ってきたウルトラマン』『仮面ライダー』とともに、第二次怪獣ブームの一翼を担った。ちなみに裏番組は『シルバー仮面』だった。





１４

映画化もされ、都市論ブームも起こした荒俣宏のベストセラー伝奇小説のＯＶＡ化。九二年発表。





１５

六一年東京生まれ。アニメーター。『めぞん一刻』『Ｆ』『トップをねらえ』『ナディア』などに参加。





１６

俳優。代表作は『時計仕掛けのオレンジ』『カリギュラ』など。





１７

八三年開催の日本ＳＦ大会「ＤＡＩＣＯＮⅣ」を運営するスタッフの育成を、アニメ制作を通じて行うという目的で八二年に結成。「ＤＡＩＣＯＮⅣ」終了後はそのまま自主映画制作グループとなり、現ガイナックスの母体となった。八五年までに『愛國戰隊大日本』『帰ってきたウルトラマン』『快傑のうてんき』『八岐之大蛇の逆襲』などを制作した。





１８

ダイコンフィルム制作、庵野秀明監督・主演による八ミリ大作。実相寺昭雄監督そのままの画面作りと、上原正三を思わせる情念的な脚本、入魂のセットと特撮は、八ミリ映画の限界に挑戦したといっても過言ではない。主題歌はオリジナルの没テイクを発掘使用というマニアックさなのに、ウルトラマンを演じるのは、着色したウインドブレーカーを着ただけの（素顔の）庵野氏という大技が清々しい。





１９

アニメーター。演出家。監督作に『老人Ｚ』『ＪＯＪＯの奇妙な冒険』『ゴールデンボーイ』などがある。





２０

庵野氏が、大阪芸大時代に課題で制作した短編ＣＭフィルム。





２１

『マクロス』の二五話のサブタイトル。海外発注を多用したため、作画の平均レベルがおそろしく低かったテレビ版『マクロス』。しかし、ストーリーのクライマックスにあたるこのエピソードだけは、メインスタッフとスター・アニメーターが総動員され、オタク魂が炸裂！　当時としては異常なクオリティーをほこり、オタク受けする映像の雛形のひとつとなった。





２２

アニメーター。主な参加作品は、『ナディア』『ああっ女神さま！』『おたくのビデオ』『メタルファイターＭＩＫＵ』など。





２３

高橋留美子の出世作のアニメ化。八一年放映開始。「月にいつまでも帰らないかぐや姫」というか「魔法の国に帰らないサリーちゃん」というか。日常と非日常が曖昧になり、ミニマルなテーマパーク化したような作風のはしり。演出の押井守や若手アニメーターの暴走。また文学からＳＦ・アニメ、日常生活にいたるまでの楽屋オチ的パロディーの乱発などで、ファンとの共犯関係に訴え支持を確立した。若者向けのエロティックなアニメ絵キャラの出現、作り手自身の夢であろう「エンドレスな学園祭感覚」の作品化と、八〇年代的サブカルチャーとしてのアニメを体現した最初の作品にして代表作といえるだろう。





２４

古き良き下町の悪ガキの日常を描いた傑作テレビマンガ『ど根性ガエル』の、八一年放映のリメイク。演出の芝山努ひきいる亜細亜堂が制作母体となり、枚数を使えない経済的状況を逆手にとった、大胆にデフォルメされた動きで独特のスタイルを作り出した。前作ではアニメーターとして舞台設定を担当した芝山は、本作でも実在感のある生活空間を作り上げている。





２５

九五年放映。『３×３アイズ』の高田裕三原作の、日本古代神話を下敷きにしたファンタジーのアニメ化。





２６

平野俊彦監督の、八五年発表のＯＶＡシリーズ。当時、『ガンダム』以来のリアルな群像劇的ロボットアニメは、類似企画乱発のため、ジャンルとしてパワーと新鮮さが失われていた。その反動としてファンや制作者の間で、かつてのスーパーロボットヒーローを懐かしむ風潮が起こっていた（逆にいえば、そこにしかモチーフが見出だせないオタク世代が、制作の中枢を占めるようになってきた）。そこで現れはじめた「アニメ絵美少女＋巨大メカ」という典型的オタク向けアニメの元祖的作品。音楽は、マジンガーから宇宙刑事まで、東映特撮ヒーローやスーパーロボット物を無数に担当してきた渡辺宙明。





２７

アニメ制作会社の老舗。七〇年代初頭、『ガッチャマン』『キャシャーン』『ポリマー』など、群を抜くＳＦ設定とハードでシリアスなドラマ（それに涙腺まで描き込まれた、濃くバタ臭い天野キャラ）で独自のポジションを確立。その後、「タイムボカン」シリーズなどでギャグ路線を開花させ、八〇年代以後もその両者をミックス・洗練させた『未来警察ウラシマン』などの佳作を送り出している。





２８

九四年の東宝特撮映画のメディアミックスの一貫として制作された、テレビシリーズアニメ。内容は映画とはかなり異なる。





２９

九二年にテレビ放映された『テッカマンブレード』の続編として、翌九三年に制作されたＯＶＡシリーズ。テレビのシリアスな作風とうって変わった活劇調の作品。『Ｚガンダム』に対する『ＺＺガンダム』といったニュアンスだろうか。





３０

安ホテルの鏡に写るベッドの映像にかぶって、加持と抱き合うミサトの喘ぎ声が一分間にわたって続くシーンが放映された。放映時間が放映時間だっただけに（夕方六時半）、テレビ東京には視聴者の抗議が殺到した。





３１

二二話でレイの零号機が、衛星軌道上の使徒をロンギヌスの槍で攻撃するシーン。





３２

一七、一八話で、トウジが乗り込んだエヴァ参号機のこと。





３３

アニメのテレビシリーズで、ＣＭが入るまでの前半部分のこと。





３４

スポーツライター出身のアメリカ人作家ポール・ギャリコの寓話的短編小説。孤独な男と少女の、一羽の傷ついたグースを挾んだ心の交流を描いた「大人のためのおとぎ話」的ファンタジー。新潮文庫にて入手可。





３５

静まりかえった暗い地表に、突然浮かび上がる光の帯が、数千年後の地球に帰り着いた主人公二人を迎える。それは、時を隔てて別れることになった友人と交わした、約束どおりの言葉「オカエリナサイ」。『トップ』のラストシーンは、すれっからしのマニアさえも唸らせるものだった。

どの作品にも、その時点での全力を投入するガイナックスは、ドラマティックな仕掛けに満ちたラストの盛り上げ方に定評がある。





３６

『ふしぎの海のナディア』に登場する、世界支配を企む組織「ネオ・アトランティス」の指導者。庵野監督は当時、「いちばん自分の人格が出ている」といった発言をしている。声の清川元夢氏は、特撮物の悪役を多く演じた、監督憧れの声優。





３７

『伝染るんです。』『戦え！　軍人くん』などで知られる、いわゆる「不条理マンガ」の代表的作家。





３８

二四話、夕陽をバックに、ベートーベンの『第九』の鼻歌を歌いながら登場したカヲルが、シンジにむかって開口一番口にしたセリフ。





３９

一七話で、裸で巨大な試験管のような水槽に入り、ダミーシステムに記憶を移植中のレイと、それを見詰めるゲンドウの会話。

「レイ、あがっていいぞ」

「ハイ」

「食事にしよう」

いつになく穏やかな表情のゲンドウと、レイの微笑み。おそらく本当に食事をするだけなのだろうが、妙に思わせぶりなシーンである。ふとどきな想像を膨らませたパロディーも、コミケやアンソロジー本などで多数出ているようだ。

綾波レイとは何か？　それは、永遠に心と軀からだを引き裂かれ続ける魂。

綾波レイとは何か？　それは、現在、世界で一番美しい女優。

綾波レイとは何か？　もちろん、サタンである。

綾波レイとは何か？　そして、神である。

綾波レイとは何か？　それは、決して癒やされることのない傷に巻かれた、白い包帯。

綾波レイとは何か？　それは、赤い瞳と青い髪、そして透き通るように白い肌を持つ女。

綾波レイとは何か？　それは、偏食の子供。

綾波レイとは何か？　それは、冷酷な女。

綾波レイとは何か？　それは、世界最強の女子中学生。

綾波レイとは何か？　それは、日本中のマザコン男とサディストのために、供された贄にえ。

綾波レイとは何か？　それは、虚無の底から立ち現れた、透明な光。

綾波レイとは何か？　それは、奴隷。

綾波レイとは何か？　それは、アヘン。

綾波レイとは何か？　そして、ユーフォリア。

綾波レイとは何か？　それは、かつて誰からも、心の底から愛されたことのない、孤独。

綾波レイとは何か？　それは、生まれ出る前から、修復不可能までに虐待された幼児。

綾波レイとは何か？　それは、水のように甘く透明な声を持つ、女性ジャズボーカリスト。

綾波レイとは何か？　それは、自殺しても自殺しても自殺できない、悲しき自殺志願者。

綾波レイとは何か？　それは、世界一醜悪グロテスクなモンスター。

綾波レイとは何か？　もっと認識すべきだと思うんですよ、僕らには何もないっていうことを。そう、私には、何もないもの。

綾波レイとは何か？　それは、激しい愛によって生じた激しい暴力によって産み出された、虐げられた命。

綾波レイとは何か？　それは、息子を取り込むために吐き気がするほどの醜態を演じる、グレイト・バッド・マザー。

綾波レイとは何か？　それは、限りないエロスの力。

綾波レイとは何か？　それは、同時に生じる、目の眩くらむようなタナトスの力。

綾波レイとは何か？　それは、単細胞な女。

綾波レイとは何か？　それは、やはり残念ながら、男によって創られた女。

綾波レイとは何か？　それは、永遠に嗅かぐことのできない、綾波のにおい。

綾波レイとは何か？　それは、今綾波の声でマインド・コントロールをかけられたら、僕は必ずかかってしまうだろう、と思わせる声優林原めぐみの実力。

綾波レイとは何か？　どうやら人間の綾波も読めるらしい、という秘かな喜び。

綾波レイとは何か？　それは、はにかんで、頰ほおを染める、一四の女の子。

綾波レイとは何か？　できれば、法定伝染病に認定したいビョーキ。

綾波レイとは何か？　それは、どんな敵にもひるむことのない、不ふ羈きの魂。

綾波レイとは何か？　それは、手折れそうにしなやかな肢体と、しっかりと実った果肉を持つ、一四歳にして完成された女体。

綾波レイとは何か？　それは、子供を守るためにはどんなことだってやる、あがきつづける母親。

綾波レイとは何か？　それは。セル画。

綾波レイとは何か？　それは、拒絶することで欲望を燃え上がらせる、禁忌。

綾波レイとは何か？　それは、グルに完全に帰依することによって、人間の持つあらゆる迷いを超越した者の持つ、聖性。

綾波レイとは何か？　それは、長い時間をかけてゆっくりとときほぐされていくはずだった、硬い、殻のようなこころ。

綾波レイとは何か？　それは、地獄のようなスケジュールが見えているのに、多くの制作スタッフに心中を覚悟させた、魔のキャラクター。

綾波レイとは何か？　それは、水の女。ある時はつるはしもたたないほど硬い、頑なな氷の岩盤となり、ある時は全てを見通せるほど透明な泉水となり、ある時は人を温かく包む湯となり、ある時は濡れ濡れと光る蠱こ惑わくの樹液となり、ある時は間欠泉のようにほとばしる熱湯となる。

綾波レイとは何か？　それは、逆手で雑巾を絞る、古風な娘。

綾波レイとは何か？　それは、人の無意識の底に潜み、万華鏡のようにあらゆる角度から生の本質に関する問いを問うてくる、夢の女。

綾波レイとは何か？　それは、零。零は、全くの無であると同時に、あらゆるものを包含する。

綾波レイとは何か？　それは、玩具。

綾波レイとは何か？　それは、デビルマンではなく、マンデビルである。勇者アモンに打ち勝った不動明の意識と、消えてしまった碇ユイの意識。

綾波レイとは何か？　それでもやはり、デビルマンである。レイの意識の奥底にある、母・碇ユイの激情。

綾波レイとは何か？　それは、あらゆる意味で、『新世紀エヴァンゲリオン』の、つまりわれわれが生きるこの世界を最も濃縮した形で出現した作品の「コア」。

綾波レイとは何か？　それは、無意識の底にひそむ、パンドラの函はこのかぎ穴。

綾波レイとは何か？　それは、アイデンティティをズタズタにされた、哀しき人造人間。

綾波レイとは何か？　それは、無数のクローンの一体であることを知りながら、個を生き抜こうとする絶対矛盾。

綾波レイとは何か？　それは、本物より美しい、フェイク。

綾波レイとは何か？　それは、誰が何と言おうと、世界一ウルフヘアが似合う少女。

綾波レイとは何か？　それは、碇ゲンドウの「人じん類るい皆殺ほかん計画」のために、用意されたサリン。

綾波レイとは何か？　それは「やっぱ拾伍話の、エレベーターの中の綾波の作画が一番きれいだな。でも、拾六話の『そう、よかったわね』って言うハイキー処理の綾波もいいよなあ」などと、僕にオタクみたいなことを初めて言わせたキャラクター。

綾波レイとは何か？　それは、ドグマ。

綾波レイとは何か？　それは、この世で最も不確かなトポロジーを生きる現存在ダーザイン。

綾波レイとは何か？　それは、ユングの集合的無意識から完全に見離された、夢を見ない脳。

綾波レイとは何か？　それは、使徒の流す、涙。

綾波レイとは何か？　それは、死の時計を背負って立つ永劫。

綾波レイとは何か？　僕は、綾波レイを見るたびに、次のような想いにとらわれる。綾波レイが存在するとは、何と不思議なことだろう、まるで世界そのもののように。

綾波レイとは何か？　それは、一言でいえば、こう呼ばれるべきものであった。「絶望」。

綾波レイとは何か？　それは、永遠の命。
